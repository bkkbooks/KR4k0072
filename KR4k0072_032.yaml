body:
  text: 第三十二卷黃秀才徼靈玉馬墜淨幾明窗不染塵圖書鎮日與相親偶然談及風流事多少風流誤了人話説唐乾符年間揚州一秀士姓黃名損字益之年方二十一歲生得丰姿韶秀一表人才兼之學富五車才傾八斗同輩之中推為才子原是閥閲名門因父母早喪家道零落父親手裡遺下一件寶貝是一塊羊脂白玉雕成個馬兒喚做玉馬墜色澤溫潤鏤刻精工雖然是小小東西等間也沒有第二件勝得他的黃損秀才自幼愛惜佩帶在身不曾頃刻之離偶一日間遊市中遇著一個老叟生得怎生模樣頭帶箬葉冠身穿百衲襖腰系黃絲絛手執逍遙扇童顏鶴發碧眼方瞳不是蓬萊仙長也須學道高人那老者看著黃生微微而笑黃生見其儀容古雅竦然起敬邀至茶坊獻茶敘話那老者所談無非是理學名言玄門妙諦黃生不覺嘆服正當語酣之際黃生偶然舉袂老者看見了那玉馬墜兒道乞借一觀黃生即時解下雙手獻與老者老者看了又看嘖嘖嘆賞問道此墜價值幾何老漢意欲奉價相求未審郎君允否黃生答道此乃家下祖遺之物老翁若心愛便當相贈何論價乎老者道既蒙郎君慷慨不吝老漢何敢固辭老漢他日亦有所報遂將此墜懸挂在黃絲絛上揮手而別其去如飛生愕然驚怪想道此老定是異人恨不曾問其姓名也這段話擱過不提卻説荊襄節度使劉守道平昔慕黃生才名差官持手書一封白金彩幣聘為幕賓如何叫做幕賓但凡幕府軍民事冗要人商議況一應章奏及書札亦須要個代筆必得才智兼全之士方稱其職厚其禮幣奉為上賓所以謂之幕賓又謂之書記有官職者則謂之記室參軍黃損秀才正當窮困無聊之際卻聞得劉節使有此美意遂欣然許之先寫了回書打發來人約定了日期自到荊州謁見差官去了黃生收拾衣裝別過親友一路搭船行至江州忽見巨舟泊岸篷窗雅潔朱欄油幕甚是整齊黃生想道我若趁得此船何愁江中波浪之險乎適有一水手上岸沽酒黃生尾其後而問之此舟從何而來今往何處水手答道徽人姓韓今往蜀中做客黃生道此去蜀中必從荊江而過小生正欲往彼未審可容附舟否水手道船頗寬大那爭趁你一人只是主人家眷在上未知他意允否若何黃生取出青蚨三百奉為酒資求其代言水手道官人但少停於此待我稟過主人方敢相請須臾水手沽酒回來黃生復囑其善言方便水手應允不一時見船上以手相招黃生即登舟相問水手道主人最重斯文説是個單身秀士並不推拒但前艙貨物充滿只可於艄頭存坐夜間在後火艙歇宿主人家眷在於中艙切須謹慎勿取其怪遂引黃生見了主人韓翁言談之間甚相器重是夜黃生在後火艙中坐了一回方欲解衣就寢忽聞箏聲淒婉其聲自中艙而出黃生披衣起坐側耳聽之乍雄乍細若沈若浮或如雁語長空或如鶴鳴曠野或如清泉赴壑或如亂雨灑窗漢宮初奏明妃曲唐家新譜雨淋鈴唐時第一琵琶手是康崑崙第一箏手是郝善素揚州妓女薛瓊瓊獨得郝善素指法瓊瓊與黃生最相契厚僖宗皇帝妙選天下知音女子入宮供奉揚州刺史以瓊瓊應選黃生思之不置遂不忍復聽彈箏今日所聞箏聲宛似瓊瓊所彈黃生暗暗稱奇時夜深人靜舟中俱已睡熟黃生推篷而起悄然從窗隙中窺之見艙中一幼女年未及笄身穿杏紅輕綃雲發半嚲嬌艷非常燃蘭膏焚鳳腦纖手如玉撫箏而彈須臾曲罷蘭銷篆滅杳無所聞矣那時黃生神魂俱蕩如逢神女仙妃薛瓊瓊輩又不足道也在艙中展轉不寐吟成小詞一首詞云生平無所願願伴樂中箏得近佳人纖手子砑羅裙上放嬌聲便死也為榮一夜無眠巴到天明起坐但取花箋一幅楷寫前詞後題維揚黃損四字疊成方勝藏於懷袖梳洗已畢頻頻向中艙觀望絶無動靜少頃韓翁到後艄答拜就拉往前艙獻茶黃生身對老翁心懷幼女自覺應對失次心中慚悚而韓翁殊不知也忽聞中艙金盆聲響生意此女盥漱急急起身從船舷而過偷眼窺睹窗櫺不甚分明而香氣芬馥撲於鼻端生之魂已迷而骨已軟矣急於袖中取出花箋小詞從窗隙中投入誠恐舟人旁瞷移步遠遠而立兩隻眼覷定窗櫺真個是目不轉睛卻説中艙那女子梳妝盥手剛畢忽聞窗間簌簌之響取而觀之解開方勝乃是小詞一首讀罷贊嘆不已仍折做方勝藏於裙帶上錦囊之中明明曉得趁船那秀才夜來聞箏而作情詞俱絶心中十分欣慕但內才如此不知外才何如遂啓半窗舒頭外望見生凝然獨立如有所思麟鳳之姿皎皎絶塵雖潘安衛無以過也心下想道我生長賈家恥為販夫販婦若與此生得偕伉儷豈非至願本欲再看一時為舟中耳目甚近只得掩窗黃生亦退於艙後然思慕之念益切時舟尚停泊未開黃生假推上岸屢從窗邊往來女聞窗外履聲亦必啓窗露面四目相視未免彼此送情只是不能接語正是彼此滿懷心腹事大家都在不言中到午後韓翁有鄰舟相識拉上岸於酒家相款舟人俱整理篷楫為明早開船之計黃生注目窗櫺適此女推窗外望見生忽然退步若含羞退避者少頃復以手招生生喜出望外移步近窗女乃倚窗細語道夜勿先寢妾有一言黃生再欲叩之女已掩窗而去矣黃生大喜欲狂恨不能一拳打落日頭把孫行者的磕睡蟲遍派滿船之人等他呼呼睡去獨留他男女二人敘一個心滿意足正是無情不恨良宵短有約偏嫌此日長至夜韓翁扶醉而歸到船即睡捱至更深舟子俱已安息微聞隔壁彈指三聲黃生急整冠起視時新月微明輕風徐拂女已開半戶向外而立黃生即於船舷上作揖女於艙中答禮生便欲跨足下艙女不許向生道慕君之才本欲與君吐露心腹幸勿相逼黃生亦不敢造次乃矬身坐於窗口女問生道君何方人氏有妻室否黃生答道維揚秀才家貧未娶女道妾之母裴姓亦維揚人也吾父雖徽籍浮家蜀中向到維揚聘吾母為側室止生妾一人十二歲吾母見背今三年喪畢吾父移妾歸蜀耳黃生道既如此則我與小娘子同鄉故舊安得無情乎幸述芳名當銘胸臆女道妾小字玉娥幼時吾母教以讀書識字頗通文墨昨承示佳詞逸思新美君真天下有心人也願得為伯鸞婦效孟光舉案齊眉妾願足矣黃生道小娘子既有此心我豈木石之比誓當竭力圖之若不如願當終身不娶以報高情女道慕君才調不羞自媒異日富貴勿令妾有白頭之嘆黃生道卿家雅意陽侯河伯實聞此言如有負心天地不宥但小娘子乃尊翁之愛女小生逆旅貧儒即使通媒尊翁未必肯從異日舟去人離相會不知何日不識小娘子有何奇策使小生得遂盟言女道夜話已久嚴父酒且醒矣難以盡言此後三月必到涪州十月初三日乃水神生日吾父每出入必往祭賽舟人盡行君以是日能到舟次一會當為決終身之策幸勿負約使妾望穿兩眸也黃生道既蒙良約敢不趨赴言畢舒手欲握女臂忽聞韓翁酒醒呼茶女急掩窗黃生逡巡就寢忽忽如有所失從此合眼便見此女頃刻不能忘情此女亦不復啓窗見生矣舟行月餘方抵荊江正值上水順風舟人欲趕程途催生登岸生雖徘徊不忍難以推託將酒錢贈了舟子別過韓翁取包裹上岸復佇立凝視中艙淒然欲淚女亦微啓窗櫺停眸相送俄頃之間揚帆而去迅速如飛黃生盼望良久不見了船不覺墮淚傍人問其緣故黃生哽咽不能答一語正是不如意事常八九可與人言無二三黃生呆立江岸直至天晚只得就店安歇次早問了守帥府前投了名刺劉公欣然接納敘起敬慕之意隨即開筵相待黃生於席間思念玉娥食不下咽劉公見其精神恍惚疑有心事再三問之黃生含淚不言但雲中途有病未痊劉公亦好言撫慰至晚劉公親自送入書館鋪設極其華整黃生心不在焉郁郁而已過了數日黃生恐誤玉娥之期托言欲往鄰郡訪一故友暫假出外月餘即返劉公道軍務倥傯政欲請教且待少暇當從尊命又過了數日生再開言劉公只是不允生度不可強又公館守衛嚴密夜間落鎖不便出入一連躊蹰了三日夜更無良策忽一日問館童道此間何處可以散悶館童道一牆之隔便是本府後花園中亭臺樹木盡可消遣黃生命童子開了書館引入後園遊玩了一番問道花園之外還有何處館童道牆外便是街坊周圍有人巡警日則敲梆夜則打更老爺法度好不嚴哩黃生聽在肚裡暗暗打帳除非如此如此是夜和衣而臥寢不成寐捱到五更鼓聲已絶寂無人聲料此際司更的辛苦了一夜必然困倦此時不去更待何時近牆有石榴樹一株黃生攀援而上聳身一跳出了書房的粉牆靜悄悄一個大花園園牆上都有荊棘黃生心生一計將石塊填腳先扒開那些棘刺逾牆而出並無人知覺早離了帥府趁此天色未明拽開腳步便走忙忙若喪家之狗急急如漏網之魚有詩為證已效郗生入幕何當乾木逾垣豈有牆東窺宋卻同月下追韓次日館中童子早起承值叫聲奇怪門不開戶不開房中不見了黃秀才忙去報知劉公劉公見説吃了一驚親到書房看了一遍一步步看到後園見棘刺扒動牆上有缺想必那沒行止的秀才從此而去正不知甚麼急務當下傳梆升帳拘巡警員役詢問皆雲不知劉公責治了一番因他説鄰邦訪友差人於襄鄧各府逐縣挨查緝訪並無蹤影嘆息而罷話分兩頭卻説黃秀才自離帥府挨門出城又怕有人追趕放腳飛跑逢人問路晚宿早行徑望涪州而進自古道無巧不成話趕到涪州剛剛是十月初三日且説黃秀才在帥府中擔擱多日如何還趕得上只因客船重大且是上水有風則行無風則止黃秀才從陸路短盤風雨無阻所以趕著了沿江一路抓尋只見高檣巨艦比次湊集如魚鱗一般逐只挨去並不見韓翁之舟心中早已著忙莫非忙中有錯還是再捱轉去方欲回步只見前面半箭之地江岸有枯柳數株下面單單泊著一隻船兒上前仔細觀看那船上寂無一人止中艙有一女子獨倚蓬窗如有所待那女子非別正是玉娥因為有黃生之約恐衆人耳目之下相接不便在父親前只説愛那柳樹之下泊船僻靜有趣韓翁愛女言無不從此時黃生一見其喜非小謾説洞房花燭夜且喜他鄉遇故知那玉娥望見黃生笑容可掬其船離岸尚遠黃生便欲上玉娥道水勢甚急須牽纜至近方可黃生依言便舉手去牽那纜兒也是合當有事那纜帶在柳樹根上被風浪所激已自鬆了黃生去拿他時便脫了結你説巨舟在江濤洶湧之中何等力氣黃生又是個書生不是筋節的一隻手如何帶得住説時遲那時快只叫得一聲阿呀但見舟逐順流下水去若飛電若現若隱瞬息之間不知幾裡黃生沿岸叫呼衆船上都往水神廟祭賽去了便有來往舟只那涪江水勢又與下面不同離川江不遠瞿塘三峽一路下來如銀河倒瀉一般各船過此一個個手忙腳亂自顧且不暇何暇顧別人黃生狂走約有一二十里到空闊處不見了那船又走二十來裡料無覓處欲待轉去報與韓翁知道又恐反惹其禍對著江面痛哭了一聲想起遠路天涯孤身無倚欲再見劉公又無顏面況且盤纏缺少有家難奔有國難投不如投向江流或者得小娘子魂魄相見也見我黃損不是負心之人罷罷罷人生自古誰無死留與風流作話文黃秀才方欲投江只聽得背後一人叫道不可不可黃生回頭看時不是別人正是維揚市上曾遇著請他玉馬墜兒這個老叟黃生見了那老叟又羞又苦淚如雨下老叟道郎君有何痛苦説與老漢知道或者可以分懮一二黃生道到此地位不得不説了但將初遇玉娥及相約涪江纜斷舟行之事備細述了一遍老叟呵呵大笑道原來如此些須小事如何便拚得一條性命黃生道老翁是局外之人把這事看得小依小生看來比天更高比海更闊這事大得多哩老叟把十指一輪説道老漢頗通數學方才輪算尊可命不該絶郎君還有相會之期此去前面一里之外有一茅庵是我禪兄所居郎君但往借宿徐以此事求之彼必能相濟老漢不及奉陪黃生道老翁若不同去恐禪師未必相信不肯留宿老叟道郎君前所惠玉馬墜兒老漢佩帶在身我禪兄所常見但以此為信可也説罷就黃絲絛上解下玉馬墜來遞與黃生黃生接得在手老叟竟自飄然去了黃生為心事擾亂依舊不曾問得姓名懊悔無及天色已晚且自前去約行一里之外果然荒野中獨獨有個茅庵其門半掩黃生捱身而入佛堂中一盞琉璃燈半明不滅居中放個蒲團一位高年胡僧與塑的西番羅漢無二盤膝打坐雙眸緊閉如入定之狀黃生不敢驚動端跪於前約有一個時辰胡僧開眼看見喝道何物俗子敢來混人黃生再拜奉上玉馬墜代老叟致意今晚求借一宿胡僧道一宿不難但塵路茫茫郎君此行將何底止黃生道小生黃損正有心願欲求聖僧指迷遂將玉娥涪州之約始終敘述因叩首問計胡僧道俺出家人心如死灰那管人間兒女之事黃生拜求不已胡僧道郎君念既至誠可通神明但觀郎君必是仕宦中人品大丈夫以致身青雲顯宗揚名為本此事須於成名之後從容及之黃生又拜道小生舉目無親口食尚然不周那有功名之念適間若非老翁相救已作江中之鬼矣胡僧道佛座下有白金十兩聊助郎君費且往長安俟機緣到日當有以報命耳説罷依先閉目入定去了黃生身體亦覺困倦就蒲團之側曲肱而枕之猛然睡去醒將轉來已是黎明時候但見破敗荒庵牆壁俱無並不見坐禪胡僧的蹤迹上邊佛像也剝落破碎不成模樣佛座下露出白晃晃一錠大銀錠上鑿有黃損二字黃生叫聲慚愧方知夜來所遇真聖僧也向佛前拜禱了一番取了這錠銀子權為路費徑往長安正是人有逆天之時天無絶人之路萬事不由人計較一生都是命安排話分兩頭卻説韓翁同舟人賽神回來不見了船急忙尋問別個守船的看見都説斷了纜被流水滾下去多時了我們沒本事救得韓翁大驚一路尋將下來聞岸上人所説亦是如此抓尋了兩三日並無影響痛哭而回不在話下再説揚州妓女薛瓊瓊鴇兒叫做薛媼為女兒瓊瓊以彈箏充選入宮供奉已及二載薛媼自去了這女兒門戶蕭條乃買舟欲往長安探女希求天子恩澤其舟行至漢水見有一覆舟自上流而下回避不迭砰的一聲正觸了船頭那只船就停止不行了舟人疑覆舟中必有財物遂牽近岸邊用斧劈開其中有一女子薛媼聞知忙教救出已是淹淹將盡只有一絲未斷原來冬天水寒但是下水便沒了命只因此女藏在中艙船底遮蓋暖氣未泄所以留得這一息生氣舟中貨物已自漂失了便有存留舟人都分散去訖薛媼為去了女兒瓊瓊正想沒有個替代見此女容貌美麗喜不可言慌忙將通身濕衣解下置於絮被之內自己將肉身偎貼那女子得了暖氣漸漸蘇醒然後將薑湯粥食慢慢扶持又將好言撫慰女子漸能言語索取濕衣中錦囊薛媼問其來歷女子答道奴家姓韓小字玉娥隨父往蜀舟至涪州父親同舟人往賽水神奴家獨守舟中偶因纜脫漂沒到此薛媼道可曾適人麼玉娥道與維揚黃損秀才曾有百年之約錦囊中藏有花箋小詞即黃郎所贈也薛媼道黃秀才原是我女兒瓊瓊舊交此人才貌雙全與小娘子正是一對良緣小娘子不須懮慮隨老身同到長安來年大比黃秀才必來應舉那時待老身尋訪他來與娘子續秦晉之盟豈不美乎玉娥道若得如此便是重生父母自此玉娥遂拜薛媼為義母薛媼亦如己女相待正是休言事急且相隨受恩深處親骨肉不一日行到長安薛媼賃了小小一所房子同玉娥住下其時瓊瓊入宮進御龐幸無比曉得假母到來無繇相會但遣人不時饋送些東西候問玉娥又扃戶深藏終日針指以助薪水之費所以薛媼日用寬然有餘光陰似前不覺歲盡春來怎見得有詩為證爆竹聲中一歲除春風送暖入屠蘇千門萬戶瞳瞳日總把新桃換舊符且説除夜玉娥想著母死父離情人又無消息暗暗墜淚是夜睡去夢見天門大開一尊羅漢從空中出現玉娥拜訴衷情羅漢將黃紙一書從空擲下紙上寫維揚黃損佳音六字玉娥大喜方欲開看忽聞霹靂一聲驀然驚覺乃是人家歲朝開門放火炮聲響玉娥想了一回淒然不樂其日新年只得強起梳妝薛媼往鄰家拜年去了玉娥垂下竹簾立於門內眼覷街市上人來人往心中想道今年是大比之期不知黃郎曾到長安否若得他此地經過重逢一面應著夜來之夢也不枉奴死裡逃生方才轉動念頭忽見一個胡僧當簾而立高叫道募化有緣男女玉娥從簾中仔細一看那胡僧面貌與夜來夢中所見羅漢無異不覺竦然起敬孤身女子卻又不好招接他正在躊躇那胡僧竟自揭簾而入玉娥倒退幾步閃在一旁胡僧走入中庭盤膝而坐頂上現出毫光數道直透天門玉娥大驚跪拜無數稟道弟子墮落火坑有夙緣未了望羅漢指示迷津救拔苦海胡僧道汝誠念皈依但尚有塵劫未脫老僧贈汝一物可密藏於身畔不許一人知道他日夫婦重逢自有靈驗當下取出一件寶貝贈與玉娥乃是玉馬墜兒玉娥收訖即見一道金光沖天而起胡僧忽然不見玉娥知是聖僧顯化望空拜謝將玉馬墜牢繫襟帶之上薛媼回來並不提起滿懷心事無人訴一炷心香禮聖僧再説黃損秀才得胡僧助了盤纏一徑往長安應試然雖如此心上只挂著玉娥也不去溫習經史也不去靜養精神終日串街走巷尋覓聖僧庶幾一遇早出晚回終日悶悶而已試期已到黃生只得隨例入場舉筆一揮絶不思索他也只當應個故事那有心情去推敲磨練誰知那偏是應故事的文字容易入眼正是不願文章中天下只願文章中試官金榜開時高高挂一個黃損名字除授部郎之職其時呂用之專權亂政引用無籍小人左道惑衆中外嫉之如仇然怕他權勢不敢則聲黃損獨條陳他前後姦惡事事有據天子聽信敕呂用之免官就第黃生少年高第又上了這個疏做了天下第一件快心之事那一個不欽服他真個名傾朝野長安貴戚聞黃生尚未娶妻多央媒説合求他為壻黃生心念玉娥有盟言在前只是推託不允那時薛媼也風聞得黃損登第欲待去訪他到是玉娥教他且慢貴易交富易妻人情乎未知黃郎真心何如這也是他把細處話分兩頭且説呂用之間居私第終日講爐鼎之事差人四下緝訪名姝美色以為婢妾有人誇薛媼的養女名曰玉娥天下絶色只是不肯輕易見人呂用之道只怕求而沒有那怕有而難求當下差乾僕數十人以五百金為聘也不通名道姓竟撒向薛媼家中直入臥房搶出玉娥不由分説抬上花花暖轎望呂府飛奔而走嚇得薛媼軟做一團急忙裡想不出的道理後來曉得呂府中要人聲也不敢則了欲待投訴黃損恐無益於事反討他抱怨只得忍氣吞聲不在話下且説玉娥到了府中呂用之親自捲簾看見姿容絶世喜不自勝即命丫鬟養娘扶至香房又取出錦衣數箱奇樣首飾教他裝扮玉娥只是啼哭將首飾擲之於地一件衣服也不肯穿丫鬟養娘回復呂相公呂相公只教莫難為了他好言相勸衆人領命你一句我一句只是勸他順從玉娥全然不理正是萬事可將權勢使寸心不為綺羅移姻緣自古皆前定堪笑狂夫妄用機卻説呂家門生故吏聞得相公納過新寵都來拜賀免不得做慶賀筵席飲至初更只見後槽馬夫吁吁堂上稟事適間有白馬一匹約長丈餘不知那裡來的突入後槽嚙傷群馬小人持棍趕他那馬直入內宅去了呂用之大驚道那有此事即命乾僕明火執杖同著馬夫於各房搜檢馬屁也不聞得一個都來回話呂相公心知不祥之事不肯信以為然只怪馬夫妄言下老實打四十棍革去不用衆客咸不歡而散呂用之乘著酒興徑入新房玉娥兀自哭哭啼啼呂用之一般也會幫襯説道我富貴無比你若順從明日就立你為夫人一生受用不盡玉娥道奴家雖是女流亦知廉恥曾許配良人一女不更二夫況相公珠翠成群豈少奴家一人願賜矜憐以全名節呂用之那裡肯聽用起拔山之力抱向床頭按住親解其衣玉娥雙手拒之氣力不加口中罵聲不絶正在危急之際忽有白馬一匹約長丈餘從床中奔出向呂用之亂撲亂咬呂用之著忙只得放手喝教侍婢上前那白馬在房中亂舞逢著便咬咬得侍婢十損九傷呂用之驚惶逃竄比及呂用之出了房門那白馬也不見了呂用之明明曉得是個妖孽暗地差人四下訪求高人禳解次日有胡僧到門自言善能望氣預知凶吉今見府上妖氣深重特來禳解門上通報了用之即日請進甚相敬禮胡僧道府上妖氣深重主有非常之禍呂用之道妖氣在於何處胡僧道似在房闈之內待老僧細查呂用之親自引了胡僧各戶觀看行至玉娥房頭胡僧大驚道妖氣在此不知此房中是相公何人呂用之道新納小妾尚未成婚胡僧道恭喜相公洪福齊天得遇老僧若成親之後相公必遭其禍矣此女乃上帝玉馬之精來人間行禍者今已到相公府中若不早些發脫禍必不免呂用之被他説著玉馬之事連呼為神人請問如何發脫胡僧道將此女速贈他人使他人代受其禍相公便沒事了呂用之雖然愛那女色性命為重説得活靈活現怎的不怕又問了贈與誰人方好胡僧道只揀相公心上第一個不快的將此女贈之一月之內此人必遭其禍相公可高枕無懮也呂用之被黃損一本劾奏罷官心中最恨的那時便定了個主意即忙作禮道領教領教分付乾僕備齋相款多取金帛厚贈胡僧道相公天下福人老僧特來相救豈敢受賜連齋也不吃拂衣而去分明一席無稽話卻認非常禳禍功呂用之當時差人喚取薛媼到府説話薛媼不敢不來呂用之便道你女兒年幼不知禮數我府中不好收用聞得新進士黃損尚無妻室此人與我有言我欲將此女送他解釋其恨須得你親自送去善言道達必得他收納方好薛媼叩首道相公鈞旨敢不遵依呂用之又道房中衣飾箱籠盡作嫁姿你可自去收拾竟自抬去連你女兒也不消相見了薛媼聞言正中其懷中堂自有人引進香房玉娥見薛媼到來認是呂用之著他來勸解心頭突突的跳薛媼向女兒耳邊低説道你如今好了相公不用著我另送與一個知趣的人玉娥道奴家所以貪生忍恥跟隨到此只望黃郎一會若轉贈他人與陷身此地何異奴家寧死不願為逐浪之萍隨風之絮也薛媼道方才説知趣的人兒正是黃郎房中衣飾箱籠盡數相贈快些出門防他有翻悔之事玉娥道原來如此當下母子二人忙忙的收拾停當囑咐丫鬟養娘寄謝相公喚下腳力一道煙去了鰲魚脫卻金鉤去擺尾搖頭再不來卻説黃損間坐衙齋忽見門役來報有維揚薛媽媽求見黃生忙教請進薛媼一見了黃生連稱賀喜黃生道下官何喜可賀薛媼道老身到長安已半年有餘平時不敢來冒瀆今日特奉一貴官之命送一位小娘子到府成親黃生問道貴官是那個薛媼道是新罷職的呂相公公黃生大怒道這個姦雄敢以美人局戲我若不看你舊時情分就把你叱吒一場薛媼道官人休惱那美人非別卻是老身的女兒與官人有瓜葛的黃生聞言就把怒容放下了五分從容問道令愛瓊瓊久已入宮供奉以下更有誰人與下官有何瓜葛薛媼道是老身新認的小女姓韓名玉娥黃生大驚道你在那裡相會來薛媼便把漢江撈救之事説了一遍近日被呂相公用強奪去女兒抵死不從不知何故分付老身送與官人權為修好之意黃生搖首道既被呂用之這廝奪去必然點污豈有白白髮出之理又如何偏送與下官薛媼道只問我女兒便知黃生道莫非不是那維揚韓玉娥麼薛媼道見有官人所贈花箋小詞為證遂出諸袖中還是被水浸濕過的都皺了黃生見之提起昔日涪江光景不覺慘然淚下即刻命肩輿人從同薛媼迎接玉娥到衙相會兩下抱頭大哭哭罷各敘衷腸玉娥舉玉馬墜對生説道妾若非此物必為呂賊所污當以頸血濺其衣不復得見君面矣黃生見墜大驚道此玉馬墜原是吾家世寶去年涪洲獻與胡僧芳卿何以得之玉娥道妾除夜曾得一夢次日歲朝遇一胡僧宛如夢中所見將此墜贈我囑咐我夫妻相會都在這個墜上妾謹藏於身那夜呂賊用強相犯忽有白馬從床頭奔出欲嚙呂賊呂賊驚惶逃去後聞得也有個胡僧對呂賊説白馬為妖不利主人所以將妾贈君欲貽禍於君耳黃生道如此説你我夫妻重會皆胡僧之力胡僧皆神人玉馬墜真神物也今日禮當謝之遂命設下香案供養玉馬墜於上擺列酒脯之儀夫妻雙雙下拜薛媼亦從旁叩頭忽見一白馬約長丈餘從香案上躍出騰空而起衆人急出戶看之見雲端裡面站著一人鬚眉可辨那人是誰維揚市上初相識再向涪江渡口逢今日雲端來顯相方知玉馬主人翁那人便是起首説維揚市上相遇請那玉馬墜的老翁老翁跨上白馬須臾煙雲繚繞不知所往黃生想起江頭活命之恩望空再拜看案上玉馬墜已不見矣是夜黃損與玉娥遂為夫婦薛媼養老送終黃損又差人持書往蜀中訪問韓翁迎來奉養歲時必設老叟及胡僧神位焚香禮拜後黃損官至御史中丞玉娥生三子併列仕途夫婦百年諧老有詩贊云一曲箏聲江上聽知音遂締百年盟死生離合皆前定不是姻緣莫強爭
