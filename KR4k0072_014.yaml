body:
  text: 第十四卷鬧樊樓多情周勝仙太平時節日偏長處處笙歌入醉鄉聞説鸞輿且臨幸大家拭目待君王這四句詩乃詠御駕臨幸之事從來天子建都之處人傑地靈自然名山勝水湊著賞心樂事如唐朝便有個曲江池宋朝便有個金明池都有四時美景傾城士女王孫佳人才子往來遊玩天子也不時駕臨與民同樂如今且説那大宋徽宗朝年東京金明池邊有座酒樓喚作樊樓這酒樓有個開酒肆的范大郎兄弟范二郎未曾有妻室時值春末夏初金明池遊人賞玩作樂那范二郎因去遊賞見佳人才子如蟻行到了茶坊裡來看見一個女孩兒方年二九生得花容月貌這范二郎立地多時細看那女子生得色色易迷難拆隱深閨藏柳陌足步金蓮腰肢一捻嫩臉映桃紅香肌暈玉白嬌姿恨惹狂童情態愁牽艷客芙蓉帳裡作鸞凰雲雨此時何處覓原來情色都不由你那女子在茶坊裡四目相視俱各有情這女孩兒心裡暗暗地喜歡自思量道若是我嫁得一個似這般子弟可知好哩今日當面挫過再來那裡去討正思量道如何著個道理和他説話問他曾娶妻也不曾那跟來女子和奶子都不知許多事你道好巧只聽得外面水盞響女孩兒眉頭一縱計上心來便叫賣水的傾一盞甜蜜蜜的糖水來那人傾一盞糖水在銅盂兒裡遞與那女子那女子接得在手才上口一呷便把那個銅盂兒望空打一丟便叫好好你卻來暗算我你道我是兀誰那范二聽得道我且聽那女子説那女孩兒道我是曹門裡周大郎的女兒我的小名叫作勝仙小娘子年一十八歲不曾吃人暗算你今卻來算我我是不曾嫁的女孩兒這范二自思量道這言語蹺蹊分明是説與我聽這賣水的道告小娘子小人怎敢暗算女孩兒道如何不是暗算我盞子裡有條草賣水的道也不為利害女孩兒道你待算我喉嚨卻恨我爹爹不在家裡我爹若在家與你打官司奶子在傍邊道卻也叵耐這廝茶博士見裡面鬧吵走入來道賣水的你去把那水好好挑出來對面范二郎道他既過幸與我如何我不過幸隨即也叫賣水的傾一盞甜蜜蜜糖水來賣水的便傾一盞糖水在手遞與范二郎二郎接著盞子吃一口水也把盞子望空一丟大叫起來道好好你這個人真個要暗算人你道我是兀誰我哥哥是樊樓開酒店的喚作范大郎我便喚作范二郎年登一十九歲未曾吃人暗算我射得好弩打得好彈兼我不曾娶渾家賣水的道你不是風是甚意思説與我知道指望我與你作媒你便告到官司我是賣水怎敢暗算人范二郎道你如何不暗算我的盂兒裡也有一根草葉女孩兒聽得心裡好歡喜茶博士入來推那賣水的出去女孩兒起身來道俺們回去休看著那賣水的道你敢隨我去這子弟思量道這話分明是教我隨他去只因這一去惹出一場沒頭腦官司正是言可省時休便説步宜留處莫胡行女孩兒約莫去得遠了范二郎也出茶坊遠遠地望著女孩兒去只見那女子轉步那范二郎好喜歡直到女子住處女孩兒入門去又推起簾子出來望范二郎心中越喜歡女孩兒自入去了范二郎在門前一似失心風的人盤旋走來走去直到晚方才歸家且説女孩兒自那日歸家點心也不吃飯也不吃覺得身體不快做娘的慌問迎兒道小娘子不曾吃甚生冷迎兒道告媽媽不曾吃甚娘見女兒幾日只在床上不起走到床邊問道我兒害甚的病女孩兒道我覺有些渾身痛頭疼有一兩聲咳嗽周媽媽欲請醫人來看女兒爭奈員外出去未歸又無男子漢在家不敢去請迎兒道隔一家有個王婆何不請來看小娘子他喚作王百會與人收生作針線作媒人又會與人看脈知人病輕重鄰里家有些些事都浼他周媽媽便令迎兒去請得王婆來見了媽媽媽媽説女兒從金明池走了一遍回來就病倒的因由王婆道媽媽不須説得待老媳婦與小娘子看脈自知周媽媽道好好迎兒引將王婆進女兒房裡小娘子正睡哩開眼叫聲少禮王婆道穩便老媳婦與小娘子看脈則個小娘子伸出手臂來教王婆看了脈道娘子害的是頭疼渾身痛覺得懨懨地惡心小娘子道是也王婆道是否小娘子道又有兩聲咳嗽王婆不聽得萬事皆休聽了道這病蹺蹊如何出去走了一遭回來卻便害這般病王婆看著迎兒奶子道你們且出去我自問小娘子則個迎兒和奶子自出去王婆對著女孩兒道老媳婦卻理會得這病女孩兒道婆婆你如何理會得王婆道你的病喚作心病女孩兒道如何是心病王婆道小娘子莫不見了甚麼人歡喜了卻害出這病來是也不是女孩兒低著頭叫沒王婆道小娘子實對我説我與你做個道理救了你性命那女孩兒聽得説話投機便説出上件事來那子弟喚作范二郎王婆聽了道莫不是樊樓開酒店的范二郎那女孩兒道便是王婆道小娘子休要煩惱別人時老身便不認得若説范二郎老身認得他的哥哥嫂嫂不可得的好人范二郎好個伶俐子弟他哥哥見教我與他説親小娘子我教你嫁范二郎你要也不要女孩兒笑道可知好哩只怕我媽媽不肯王婆道小娘子放心老身自有個道理不須煩惱女孩兒道若得恁地時重謝婆婆王婆出房來叫媽媽道老媳婦知得小娘子病了媽媽道我兒害甚麼病王婆道要老身説且告三杯酒吃了卻説媽媽道迎兒安排酒來請王婆媽媽一頭請他吃酒一頭問婆婆我女兒害甚麼病王婆把小娘子説的話一一説了一遍媽媽道如今卻是如何王婆道只得把小娘子嫁與范二郎若還不肯嫁與他這小娘子病難醫媽媽道我大郎不在家須使不得王婆道告媽媽不若與小娘子下了定等大郎歸後卻作親且眼下救小娘子性命媽媽允了道好好怎地作個道理王婆道老媳婦就去説回來便有消息王婆離了周媽媽家取路徑到樊樓來見范大郎正在匱身裡坐王婆叫聲萬福大郎還了禮道王婆婆你來得正好我卻待人使人來請你王婆道不知大郎喚老媳婦作甚麼大郎道二郎前日出去歸來晚飯也不吃道身體不快我問他那裡去來他道我去看金明池直至今日不起害在床上飲食不進我待來請你看脈范大娘子出來與王婆相見了大娘子道請婆婆看叔叔則個王婆道大郎大娘子不要入來老身自問二郎這病是甚的樣起范大郎道好好婆婆自去看我不陪了王婆走到二郎房裡見二郎睡在床上叫聲二郎老媳婦在這裡范二郎閃開眼道王婆婆多時不見我性命休也王婆道害甚病便休二郎道覺頭疼惡心有一兩聲咳嗽王婆笑將起來二郎道我有病你卻笑我王婆道我不笑別的我得知你的病了不害別病你害曹門裡周大郎女兒是也不是二郎被王婆道著了跳起來道你如何得知王婆道他家教我來説親事范二郎不聽得説萬事皆休聽得説好喜歡正是人逢喜信精神爽話合心機意趣投當下同王婆廝趕著出來見哥哥嫂嫂哥見兄弟出來道你害病卻便出來二郎道告哥哥無事了也哥嫂好快活王婆對范大郎道曹門裡周大郎家特使我來説二郎親事大郎歡喜話休煩絮兩下説成了下了定禮都無別事范二郎間時不著家從下了定便不出門與哥哥照管店裡且説那女孩兒間時不作針線從下了定也肯做活兩個心安意樂只等周大郎歸來做親三月間下定直等到十一月間等得周大郎歸少不得鄰里親戚洗塵不在話下到次日周媽媽與周大郎説知上件事周大郎道定了未媽媽道定了也周大郎聽説雙眼圓睜看著媽媽罵道打脊老賤人得誰言語擅便説親他高殺也只是個開酒店的我女兒怕沒大戶人家對親卻許著他你倒了志氣乾出這等事也不怕人笑話正恁的罵媽媽只見迎兒叫媽媽且進來救小娘子媽媽道作甚迎兒道小娘子在屏風後不知怎地氣倒在地慌得媽媽一步一跌走向前來看那女孩兒倒在地下未知性命如何先見四肢不舉從來四肢百病惟氣最重原來女孩兒在屏風後聽得作爺的罵娘不肯教他嫁范二郎一口氣塞上來氣倒在地媽媽慌忙來救被周大郎擋住不得他救罵道打脊賊娘辱門敗戶的小賤人死便教他死救他則甚迎兒見媽媽被周大郎擋住自去向前卻被大郎一個漏風掌打在一壁廂即時氣倒媽媽迎兒向前救得媽媽蘇醒媽媽大哭起來鄰舍聽得周媽媽哭都走來看張嫂鮑嫂毛嫂刁嫂擠上一屋子原來周大郎平昔為人不近道理這媽媽甚是和氣鄰舍都喜他周大郎看見多人便道家間私事不必相勸鄰舍見如此説都歸去了媽媽看女兒時四肢冰冷媽媽抱著女兒哭本是不死因沒人救卻死了周媽媽罵周大郎你直恁地毒害想必你不捨得三五千貫房奩故意把我女兒壞了性命周大郎聽得大怒道你道我不捨得三五千貫房奩這等奚落我周大郎走將出去周媽媽如何不煩惱一個觀音也似女兒又伶俐又好針線諸般都好如何教他不煩惱離不得周大郎買具棺木八個人抬來周媽媽見棺材進門哭得好苦周大郎看著媽媽道你道我割捨不得三五千貫房奩你看女兒房裡但有的細軟都搬在棺材裡只就當時叫仵作人等入了殮即時使人吩咐管墳園張一郎兄弟二郎你兩個便與我砌坑子吩咐了畢話休絮煩功德水陸也不做停留也不停留只就來日便出喪周媽媽教留幾日那裡拗得過來早出了喪埋葬已了各人自歸可憐三尺無情土蓋卻多情年少人話分兩頭且説當日一個後生的年三十餘歲姓朱名真是個暗行人日常慣與仵作約做幫手也會與人打坑子那女孩兒入殮及砌坑都用著他這日葬了女兒回來對著娘道一天好事投奔我我來日就富貴了娘道我兒有甚好事那後生道好笑今日曹門裡周大郎女兒死了夫妻兩個爭競道女孩兒是爺氣死了斗別氣約莫有三五千貫房奩都安在棺材裡有恁的富貴如何不去取之那作娘的道這個事卻不是耍的事又不是八棒十三的罪過又兼你爺有樣子二十年前時你爺去掘一家墳園揭開棺材蓋尸首覷著你爺笑起來你爺吃了那一驚歸來過得四五日你爺便死了孩兒切不可去不是耍的事朱真道娘你不得勸我去床底下拖出一件物事來把與娘看娘道休把出去罷原先你爺曾把出去使得一番便休了朱真道各人命運不同我今年算了幾次命都説我該發財你不要阻當我你道拖出的是甚物事原來是一個皮袋裡面盛著些挑刀斧頭一個皮燈盞和那盛油的罐兒又有一領蓑衣娘都看了道這蓑衣要他做甚朱真道半夜使得著當日是十一月中旬卻恨雪下得大那廝將蓑衣穿起卻又帶一片是十來條竹皮編成的一行帶在蓑衣後面原來雪裡有腳迹走一步後面竹片扒得平不見腳迹當晚約莫也是二更左側吩咐娘道我回來時敲門響你便開門雖則京城熱鬧城外空闊去處依然冷靜況且二更時分雪又下得大兀誰出來朱真離了家回身看後面時沒有腳迹迤邐到周大郎墳邊到蕭牆矮處把腳跨過去你道好巧原來管墳的養只狗子那狗子見個生人跳過牆來從草窠裡爬出來便叫朱真日間備下一個油糕裡面藏了些藥在內見狗子來叫便將油糕丟將去那狗子見丟甚物過來聞一聞見香便吃了只叫得一聲狗子倒了朱真卻走近墳邊那看墳的張二郎叫道哥哥狗子叫得一聲便不叫了卻不作怪莫不有甚做不是的在這裡起去看一看哥哥道那做不是的來偷我甚麼兄弟道卻才狗子大叫一聲便不叫了莫不有賊你不起去我自起去看一看那兄弟爬起來披了衣服執著槍在手裡出門來看朱真聽得有人聲悄悄地把蓑衣解下捉腳步走到一株楊柳樹邊那樹好大遮得正好卻把斗笠掩著身子和腰蹭在地下蓑衣也放在一邊望見裡面開門張二走出門外好冷叫聲道畜生做甚麼叫那張二是睡夢裡起來被雪雹風吹吃一驚連忙把門關了走入房去叫哥哥真個沒人連忙脫了衣服把被匹頭兜了道哥哥好冷哥哥道我説沒人約莫也是三更前後兩個説了半晌不聽得則聲了朱真道不將辛苦意難近世間財抬起身來再把斗笠戴了著了蓑衣捉腳步到墳邊把刀撥開雪地俱是日間安排下腳手下刀挑開石板下去到側邊端正了除下頭上斗笠脫了蓑衣在一壁廂去皮袋裡取兩個長釘插在磚縫裡放上一個皮燈盞竹筒裡取出火種吹著了油罐兒取油點起那燈把刀挑開命釘把那蓋天板丟在一壁叫小娘子莫怪暫借你些個富貴卻與你做功德道罷去女孩兒頭上便除頭面有許多金珠首飾盡皆取下了只有女孩兒身上衣服卻難脫那廝好會去腰間解下手巾去那女孩兒脖項上擱起一頭係在自脖項上將那女孩兒衣服脫得赤條條地小衣也不著那廝可霎叵耐處見那女孩兒白淨身體那廝淫心頓起按捺不住姦了女孩兒你道好怪只見女孩兒睜開眼雙手把朱真抱住怎地出豁正是曾觀前定録萬事不由人原來那女兒一心牽挂著范二郎見爺的罵娘斗別氣死了死不多日今番得了陽和之氣一靈兒又醒將轉來朱真吃了一驚見那女孩兒叫聲哥哥你是兀誰朱真那廝好急智便道姐姐我特來救你女孩兒抬起身來便理會得了一來見身上衣服脫在一壁二來見斧頭刀仗在身邊如何不理會得朱真欲待要殺了卻又捨不得那女孩兒道哥哥你救我去見樊樓酒店范二郎重重相謝你朱真心中自思別人兀自壞錢取渾家不能得恁的一個好女兒救將歸去卻是兀誰得之朱真道且不要慌我帶你家去教你見范二郎則個女孩兒道若見得范二郎我便隨你去當下朱真把些衣服與女孩兒著了收拾了金銀珠翠物事衣服包了把燈吹滅傾那油入那油罐兒裡收了行頭揭起斗笠送那女子上來朱真也爬上來把石頭來蓋得沒縫又捧些雪鋪上卻教女孩兒上脊背來把蓑衣著了一手挽著皮袋一手綰著金珠物事把斗笠戴了迤邐取路到自家門前把手去門上敲了兩三下那娘的知是兒子回來放開了門朱真進家中娘的吃一驚道我兒如何尸首都馱回來朱真道娘不要高聲放下物件行頭將女孩兒入到自己臥房裡面朱真提起一把明晃晃的刀來覷著女孩兒道我有一件事和你商量你若依得我時我便將你去見范二郎你若依不得我時你見我這刀麼砍你作兩段女孩兒慌道告哥哥不知教我依甚的事朱真道第一教你在房裡不要則聲第二不要出房門依得我時兩三日內説與范二郎若不依我殺了你女孩兒道依得依得朱真吩咐罷出房去與娘説了一遍話休絮煩夜間離不得伴那廝睡一日兩日不得女孩兒出房門那女孩兒道你曾見范二郎麼朱真道見來范二郎為你害在家裡等病好了卻來取你自十一月二十頭日至次年正月十五日當日晚朱真對著娘道我每年只聽得鰲山好看不曾去看今日去看則個到五更前後便歸朱真吩咐了自入城去看燈你道好巧約莫也是更儘前後朱真的老娘在家只聽得叫有火急開門看時是隔四五家酒店裡火起慌殺娘的急走入來收拾女孩兒聽得自思道這裡不走更待何時走出門首叫婆婆來收拾娘的不知是計入房收拾女孩兒從熱鬧裡便走卻不認得路見走過的人問道曹門裡在那裡人指道前面便是迤邐入了門又問人樊樓酒店在那裡人説道只在前面女孩兒好慌若還前面遇見朱真也沒許多話女孩兒迤邐走到樊樓酒店見酒博士在門前招呼女孩兒深深地道個萬福酒博士還了喏道小娘子沒甚事女孩兒道這裡莫是樊樓酒博士道這裡便是女孩兒道借問則個范二郎在那裡麼酒博士思量道你看二郎直引得光景上門酒博士道在酒店裡的便是女孩兒移身直到匱邊叫道二郎萬福范二郎不聽得都休聽得叫慌忙走下匱來近前看時吃了一驚連聲叫滅滅女孩兒道二哥我是人你道是鬼范二郎如何肯信一頭叫滅滅一隻手扶著凳子卻恨凳子上有許多湯桶兒慌忙用手提起一支湯桶兒來覷著女子臉上丟將過去你道好巧去那女孩兒太陽上打著大叫一聲匹然倒地慌殺酒保連忙走來看時只見女孩兒倒在地下性命如何正是小園昨夜東風惡吹折江梅就地橫酒博士看那女孩兒時血浸著死了范二郎口裡兀自叫滅滅范大郎見上頭鬧吵急走出來看了只聽得兄弟叫滅滅大郎問兄弟如何作此事良久定醒問做甚打死他二郎道哥哥他是鬼曹門裡販海周大郎的女兒大郎道他若是鬼須沒血出如何計結去酒店門前哄動有二三十人看即時地方便入來捉范二郎范大郎對衆人道他是曹門裡周大郎的女兒十一月已自死了我兄弟只道他是鬼不想是人打殺了他我如今也不知他是人是鬼你們要捉我兄弟去容我請他爺來看尸則個衆人道既是恁地你快去請他來范大郎急急奔到曹門裡周大郎門前見個奶子問道你是兀誰范大郎道樊樓酒店范大郎在這裡有些急事説聲則個奶子即時入去請不多時周大郎出來相見罷范大郎説了上件事道敢煩認尸則個生死不忘周大郎也不肯信范大郎間時不是説謊的人周大郎同范大郎到酒店前看見也呆了道我女兒已死了如何得再活有這等事那地方不容范大郎分説當夜將一行人拘鎖到次早解入南衙開封府包大尹看瞭解狀也理會不下權將范二郎送獄司監候一面相尸一面下文書行使臣房審實作公的一面差人去墳上掘起看時只有空棺材問管墳的張一張二説道十一月間雪下時夜間聽得狗子叫次早開門看只見狗子死在雪裡更不知別項因依把文書呈大尹大尹焦躁限三日要捉上件賊人展個兩三限並無下落好似金瓶落井全無信鐵槍磨針尚少功且説范二郎在獄司間想此事好怪若説是人他已死過了見有入殮的仵作及墳墓在彼可證若説是鬼打時有血死後有尸棺材又是空的展轉尋思委決不下又想道可惜好個花枝般的女兒若是鬼倒也罷了若不是鬼可害了他性命夜裡翻來覆去想一會疑一會轉睡不著直想到茶坊裡初會時光景便道我那日好不著迷哩四目相視急切不能上手不論是鬼不是鬼我且慢慢裡商量直恁性急壞了他性命好不罪過如今陷於縲紲這事又不得明白如何是了悔之無及轉悔轉想轉想轉悔捱了兩個更次不覺睡去夢見女子勝仙濃妝而至范二郎大驚道小娘子原來不死小娘子道打得偏些雖然悶倒不曾傷命奴兩遍死去都只為官人今日知道官人在此特特相尋與官人了其心願休得見拒亦是冥數當然范二郎忘其所以就和他雲雨起來枕席之間歡情無限事畢珍重而別醒來方知是夢越添了許多想悔次夜亦復如此到第三夜又來比前愈加眷戀臨去告訴道奴壽陽未絶今被五道將軍收用奴一心只憶著官人泣訴其情蒙五道將軍可憐給假三日如今限期滿了若再遲延必遭呵斥奴從此與官人永別官人之事奴已拜求五道將軍但耐心一月之後必然無事范二郎自覺傷感啼哭起來醒了記起夢中之言似信不信剛剛一月三十個日頭只見獄卒奉大尹鈞旨取出范二郎赴獄司勘問原來開封府有一個常賣董貴當日綰著一個籃兒出城門外去只見一個婆子在門前叫常賣把著一件物事遞與董貴是甚的是一朵珠子結成的梔子花那一夜朱真歸家失下這朵珠花婆婆私下撿得在手不理會得直幾錢要賣一兩貫錢作私房董貴道要幾錢婆子道胡亂董貴道還你兩貫婆子道好董貴還了錢徑將來使臣房裡見了觀察説道恁地即時觀察把這朵梔子花徑來曹門裡教周大郎周媽媽看認得是女兒臨死帶去的即時差人捉婆子婆子説兒子朱真不在當時搜捉朱真不見卻在桑家瓦裡看耍被作公的捉了解上開封府包大尹送獄司勘問上件事情朱真抵賴不得一一招伏當案薛孔目初擬朱真劫墳當斬范二郎免死刺配牢城營未曾呈案其夜夢見一神如五道將軍之狀怒責薛孔目道范二郎有何罪過擬他刺配快與他出脫了薛孔目醒來大驚改擬范二郎打鬼與人命不同事屬怪異宜徑行釋放包大尹看了都依擬范二郎歡天喜地回家後來娶妻不忘周勝仙之情歲時到五道將軍廟中燒紙祭奠有詩為證情郎情女等情癡只為情奇事亦奇若把無情有情比無情翻似得便宜
