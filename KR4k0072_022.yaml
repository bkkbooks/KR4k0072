body:
  text: 第二十二卷呂純陽飛劍斬黃龍暮宿蒼梧朝遊蓬島朗吟飛過洞庭邊嶽陽樓酒醉借玉山作枕容我高眠出入無蹤往來不定半是風狂半是顛隨身用提籃背劍貨賣雲煙人間飄蕩多年曾占東華第一筵推倒玉樓種吾奇樹黃河放淺栽我金蓮手卒碎珊瑚翻身北海稽首虛皇高座前無難事要功成八伯行滿三千這只詞兒名曰沁園春乃是一位陸地大羅神仙所作那位神仙是誰姓呂名岩表字洞賓道號純陽子自從黃梁夢得悟跟隨師父鍾離先生每日在終南山學道或一日洞賓曰弟子蒙我師度脫超離生死長生妙訣俺道門中輪回還有盡處麼師父曰如何無盡自從混沌初分以來一小劫該十二萬九千六百年世上混一聖賢皆盡一大數二十五萬九千二百年儒教已盡阿修劫三十八萬八千八百年俺道門已盡襄劫七十七萬七千七百年釋教已盡此是劫數洞賓又問我師閻浮世上高低闊遠南北東西俱有盡處麼師父曰如何無盡處且説中原之地東至日出西至日沒南至南蠻北至幽燕兩輪日月一合乾坤四百座軍州三千座縣分七百座巡檢司此是中原之地洞賓曰弟子欲遊中原從何而起從何而止師曰九九之數屬陽先從山前九州山後九州兩淮三九二十七軍州河北四九三十六軍州關西五九四十五軍州西川六九五十四軍州荊湖七九六十三軍州江南九九八十一軍州海外潮陽四州共計四百座軍州洞賓曰四百座軍州有多少人煙師曰世上三山六水一分人煙洞賓又問我師成道之日到今該多壽數師父曰數著漢朝四百七年晉朝一百五十七年唐朝二百八十八年宋朝三百一十七年算來計該一千年一百歲有零洞賓曰師父計年一千一百歲有零度得幾人師父曰只度得你一人洞賓曰緣何只度得弟子一人只是俺道門中不肯慈悲度脫衆生師父若教弟子三年嚴限只在中原之地度三千餘人興俺道家師父聽得説呵呵大笑吾弟住口世上衆生不忠者多不孝者廣不仁不義衆生如何做得神仙吾教汝去三年但尋得一個來也是汝之功洞賓曰只就今日拜辭吾師弟子云遊去了師父曰且住且住你去未得吾有法寶未曾傳與汝道童與吾取過降魔太阿神光寶劍來道童取到師父曰此劍是吾師父東華帝君傳與吾吾傳與汝這洞賓雙膝跪下領我師法旨師父曰此劍能飛取人頭言説住址姓名念咒罷此劍化為青龍飛去斬首口中銜頭而來有此靈顯有咒一道飛去者如此如此再有收回咒一道如此如此言罷洞賓納頭拜授背了劍曰告吾師弟子只今日拜辭下山去師曰且住且住你去未得汝若要下山依我三件事方可去洞賓曰告我師不知那三件事師曰第一件到中原之地休尋和尚鬧依得麼洞賓曰依得師曰第二件將吾寶劍去要將回來休失落了依得麼洞賓曰依得師曰第三件與你三年限滿休違了如違了限即當斬首滅形依得麼洞賓曰依得師父大喜道好去好去洞賓曰蒙我師傳法與弟子年代劫數地理路途寶劍法語弟子都省悟了今作詩一首拜謝吾師弟子下山度人去也詩曰二十四神清三千功行成雲煙籠地軸星月遍空明玉子何須種金丹豈用耕個中玄妙訣誰道不長生作詩已罷師父呵呵大笑吾弟汝去三年度得人也回來度不得人也回來休違限次寶劍休失落了休惹和尚鬧速去速回洞賓拜辭師父下山卻不知度得人也度不得正是情知語是鉤和線從頭鉤出是非來這洞賓一就下山按落雲頭來到閻浮世上尋取有緣得道之士整整行了一年絶無蹤迹有詩為證自隱玄都不記春幾回滄海變成塵我今學得長生法未肯輕傳與世人洞賓行了一年沒尋人處如之奈何眉頭一縱計上心來在山中曾聽得師父説來直上太虛頂上觀看但是紫氣現處五霸諸侯黑氣現處山妖水怪青氣現處得道神仙去那無人煙處喝聲起一道雲頭直到太虛頂上東觀西望遠遠見一處青氣充天而起洞賓道好此處必有神仙雲行一萬風行八千料在千里路雲頭一片去心留不住看看行到青氣現處不知何所洞賓喚土地安在一陳風過處土地現形怎生模樣衣裁五短帽裹三山手中藜杖老龍形腰間皂絛黑虎尾土地唱喏告上仙呼喚小聖不知有何法旨洞賓曰下界何處青氣現者誰家男子婦人土地道下界西京河南府在城銅駝巷口有個婦人殷氏約年三十有餘不曾出嫁纍世奉道積有陰果此女唐朝殷開山的子孫七世女身因此青氣現洞賓曰速退風過處土地去了去説洞賓墜下雲端化作醃臢道人直入城來到銅駝巷口見牌一面上寫殷家澆造細心耐點清油蠟燭鋪中立著個女娘魚魫冠兒道裝打扮眉間青氣現洞賓見了叫聲好不知高低正是踏破鐵鞋無覓處得來全不費工夫洞賓叫聲稽首看那娘子正與澆蠟燭待詔説話回頭道先生過一遭洞賓上前一看見怒氣太重叫聲可惜去袖內拂下一張紙來上有四句詩曰出山罰願度三千尋遍閻浮未結緣特地來時真有意可憐殷氏骨難仙詩後寫道口口仙作這個女娘見那道人袖中一幅紙拂將下來交人拾起看時二口為呂知是呂祖師化身便教人急忙趕去尋這個先生先生化陳清風不見了殷氏心中懊悔正是無緣對面不相逢只因這四句詩風魔了這女娘一十二年後來坐化而亡只説洞賓不覺又早一年光景無尋人處且去太虛頂上觀看只見一匹馬飛來到面前下馬離鞍背上宣筒裡取出請書來告上仙東京開封府馬行街居住奉道信官王惟善於今月十四日請道一壇就家庭開建奉真清醮三百六十分位齋請往來道士二千員恭為純陽真人度誕之辰特賫請狀拜請洞賓聽説吾忘其所以來朝是吾生日符官有勞心力遠來符官曰小聖直到終南山見老師父説上仙在中原之地特尋到此得見上仙洞賓於荊筐籃內取一個仙果與符使吃了拜謝上馬而去洞賓一道雲頭直到東京人不到處墜下雲頭立住了腳若還這般模樣被人識破把頭一擺喝聲變變作一個醃臢疥癩先生入城行到馬行街只見揚幡挂榜做好事上朝請聖邀真洞賓卻好到人若有願天必從之且看那齋主有緣度他洞賓到壇上看卻是個中貴官太尉好善奉真修道眉間微微有些青氣洞賓肚內思量此人時節未到顯些神通化他初心不退久後成其正果洞賓吃罷齋支襯錢五百文白米五斗洞賓言曰貧道善能水墨畫用水一碗也不用筆取將絹一匹畫一幅山水相謝齋襯衆人稟了太尉取絹一幅與先生先生磨那碗墨水去絹上一潑壞了那幅絹太尉見道這廝無禮捉弄下官與我拿來先生見太尉焦躁轉身便去衆人趕來只見先生化陳清風而去但見有幅白紙吊將下來衆人拿白紙來見太尉太尉打開看時有四句言語道齋道欲求仙骨及至我來不識要知貧道姓名但看絹畫端的太尉教取恰才壞了的絹再展開來看不看時萬事全休看了納頭便拜見甚麼來正是神仙不肯分明説誤了閻浮世上人王太尉取污了絹來看時完然一幅全身呂洞賓才信來的先生是神仙悔之不及將這幅仙畫送進入後宮太后娘娘裱褙了內府侍奉王太尉奏過將房屋宅子納還朝廷伴當家人都散了直到武當山出家山中採藥遭遇純陽真人得度為仙這是後話且説洞賓呂先生三年將滿限期一人不曾度得如之奈何心中悶倦只得再在太虛頂上觀看青氣現處只見正南上有青氣一股急駕雲頭望著青氣現外約行兩個時辰見青氣至近喝聲住喚此間山神安在風過處山神現形金盔金甲錦袍手執著開山斧躬身唱喏告上仙有何法旨洞賓道下方青氣現處是個甚麼人家山神曰下界江西地面黃州黃龍山下有個公公姓傅法名永善廣行陰騭纍世積善因此有青氣現洞賓曰速退聚成形散則為氣先生墜下雲來直到黃龍山下傅家庭前正見傅太公家齋僧直至草堂上見傅太公先生曰結緣增福開發道心太公曰先生少怪老漢家齋僧不齋道洞賓曰齋官儒釋道三教從來總一家太公曰偏不敬你道門你那道家説謊太多洞賓曰太公那見俺道家説謊太多太公曰秦皇漢武尚且被你道家捉弄何況我等先生曰從頭至尾説俺道家怎麼捉弄秦皇漢武太公曰豈不聞白氏諷諫曰海漫漫直下無底傍無邊雲濤雪浪最深處人傳中有三神山山上多生不死藥服之羽化為神仙秦皇漢武信此語方士年年採藥去蓬萊今古但聞名煙水茫茫無覓處海溫溫風浩浩眼穿不見蓬萊島不見蓬萊不肯歸童男童女舟中老徐福狂言多誑誕上元太乙虛祈禱君看驪山頂上茂陵頭畢竟悲風吹蔓草何況玄元聖祖五千言不言藥不言仙不言白日上青天傅太公言畢先生曰我道家説謊你那佛門中有甚奇德處太公曰休言靈山活佛且説俺黃龍山黃龍寺黃龍長老慧南禪師講經説法廣開方便之門普度群生接引菩提之路説法如雲度人如雨法座下聽經聞法者每日何止數千盡皆歡喜幾曾見你道門中闡揚道法普度群生只是獨吃自疴因此不敬道門呂先生不聽萬事全休聽得時怒氣填胸問太公這和尚今日説法麼太公道一年四季不歇何在乎今日呂先生不別太公提了寶劍徑上黃龍山來與慧南長老斗聖誰勝誰贏正是蝸角虛名蠅頭微利算來直恁甘忙事皆前定誰弱與誰強且趁間身未老盡容他些子疏狂百年裡渾教是醉三萬六千場思量能幾許懮愁同雨一半相妨又何須抵死説短論長幸對清風明月簞紋展簾幕高張江南好千鍾美酒一曲滿庭芳卻才説不了呂先生徑望黃龍山上來尋那慧南長老話中且説黃龍禪師擂動法鼓鳴鐘擊磬集衆上堂説法正欲開口啓齒只見一陳風有一道青氣撞將入來直衝到法座下長老見了用目一觀暗暗地叫聲苦魔障到了便把手中界尺去卓上按住大衆道老僧今日不説法不講經有一轉語問你大衆其中有答得的麼言未了去那人叢裡走出那先生來道和尚你快道來長老曰老僧今年膽大黃龍山下扎寨袖中起金錘打破三千世界先生呵呵大笑道和尚前年不膽大去年不膽大明年亦不膽大只今年膽大你再道來和尚言老僧今年膽大先生道住貧道從來膽大專會偷營劫寨奪了袖中金錘留下三千世界衆人聽得發一聲喊好似一風撼折千竿竹百萬軍中半夜潮衆人道好個先生答得好長老拿界方按定衆人肅靜先生道和尚這四句只當引子不算輸贏我有一轉語和你賭賽輸贏不賭金珠富貴去背上拔出那口寶劍來插在磚縫裡雙手拍著衆人聽貧道説和尚贏斬了小道小道贏要斬黃龍先生説罷嚇得人人失色個個吃驚只見長老道你快道來先生言鐵牛耕地種金錢石刻兒童把線穿一粒粟中藏世界半升鐺內煮山川白頭老子眉垂地碧眼胡僧手指天休道此玄玄未盡此玄玄內更無玄先生説罷便問和尚答得麼黃龍道你再道來先生道鐵牛耕地種金錢黃龍道住和尚言自有紅爐種玉錢比先毫髮不曾穿一粒能化三千界大海須還納百川六月爐頭噴猛火三冬水底納涼天誰知此禪真妙用此禪禪內又生禪先生道和尚輸了一粒化不得三千界黃龍道怎地説近前來老僧耳聾先生不知是計趲上法座邊被黃龍一把手卒住我問你一粒化不得三千界你一粒怎地藏世界且論此一句我且問你半升鐺內煮山川半升外在那裡先生無言可答和尚道我的禪大合小你的禪小合大本欲斬你佛門戒殺饒你這一次手起一界尺打得先生頭上一個疙瘩通紅了臉衆人一齊賀將起來先生沒出豁看著黃龍長老大笑三聲三搖頭三拍手拿了寶劍入了鞘子望外便走衆人道輸了呀黃龍禪師按下界方大衆老僧今日大難到了不知明日如何有一轉語曰五五二十五會打賀山鼓黃龍山下看相撲卻來這裡吃一賭大地甜瓜徹底甜生擦瓜兒連蒂苦大衆你道甚麼三鼓掌三搖頭三聲大笑作甚麼生咦本是醍醐味番成毒藥仇今夜三更後飛劍斬吾頭禪師道罷衆人皆散和尚下座入方丈集衆道老僧今日對你們説夜至三更先生飛劍來斬老僧老僧有神通躲得過神通小些沒了頭你衆僧各自小心衆僧合掌下跪長老慈悲救度則個黃龍長老點頭伸兩個指頭言不數句話不一席救了一寺僧衆正是勸君莫結冤冤深難解結一日結成冤千日解不徹若將恩報冤如湯去潑雪若將冤報冤豺狼重見蠍我見結冤人盡被冤磨折黃龍長老道衆僧牢關門戶休點燈燭各人裹頂頭巾戴頂帽兒躲此一難來日早見衆僧出方丈自言自語今日也説法明日也説法説出這個禍來一寺三百餘僧有分切西瓜一般都被切了頭去膽大的在寺裡膽小的連夜走了且説長老喚門公來門公到面前唱個喏長老道近前來耳邊低低道了言語門公領了法旨自去天色已晚鬧了黃龍寺中半夜不安迹話中卻説呂先生坐在山岩裡自思限期已近不曾度得一人師父説道休尋和尚鬧被他打了一界尺就這般乾罷和尚不是你便是我飛將劍去斬了黃龍教人説俺有氣度若不斬他回去見師父如何答應抬頭觀看星移斗轉正是三更時分取出劍來分咐道吾奉本師法旨帶將你做護身之寶休誤了我你去黃龍山黃龍寺見長老慧南禪師不問他行住坐臥間速取將頭來念念有詞喝聲道疾豁剌剌一聲響亮化作一條青龍徑奔黃龍寺去呂先生喝聲采去了多時約莫四更天氣卻似石沈滄海線斷風箏不見回來急念收咒語念到有三千餘遍不見些兒消息呂先生慌了手腳倘或失了寶劍斬首滅形連忙起身駕起雲頭直到黃龍寺前墜下雲頭見山門佛殿大門一齊開著卻是長老吩咐門公教他都不要關閉呂先生見了道可惜早知這和尚不準備直入到方丈一劍揮為兩段徑到方丈裡面兩枝大紅燭點得明晃地焚著一爐好香香煙繚繞禪床上坐著黃龍長老長老高聲大叫多口子你要劍在這裡進來取去呂先生揭起簾子走將入方丈去道和尚還我劍來長老用手一指那口劍一半插在泥裡呂先生肚裡思量我去拔劍被他暗算如之奈何道和尚罷罷罷你還了我劍兩解手長老道多口子老僧不與你一般見識本欲斬了你看你師父面洞賓聽得直恁利害就拔劍在手斬這廝大踏步向前雙手去拔劍卻便似萬萬斤生鐵鑄牢在地上盡平生氣力來拔不動分毫黃龍大笑多口子自古道人無害虎心虎無傷人意我要還了你劍教你回去見師父去你心中卻要拔劍斬吾吾不還你劍有氣力拔了去呂先生道他禁法禁住了如何拔得去便念解法越念越牢永拔不起呂先生道和尚還了我劍罷休長老道我有四句頌你若參得透還了你劍先生道你道來和尚懷中取出一幅紙來紙上畫著一個圈當中間有一點下面有一首頌曰丹在劍尖頭劍在丹心裡若人曉此因必脫輪回死呂先生見了不解其意黃龍曰多口子省得麼洞賓頓口無言黃龍禪師道聲俺護法神安在風過處護法神現形怎生打扮頭頂金盔紺紅撒發朱纓渾身金甲妝成慣帶手中拿著降魔寶杵貌若顏童護法神向前問訊不知我師呼召有何法旨黃龍曰護法神與我將這多口子押入困魔岩待他參透禪機引來見吾每日天廚與他一個饅頭護法神曰領我師法旨護法神道先生快請行呂先生道那裡去護法神曰走走如不走交你認得三洲感應護法韋馱尊天手中寶杵只重得八萬四千斤你若不走直壓你入泥裡去呂先生自思量師父教我不要惹和尚只得跟著護法神入困魔岩參禪不在話下卻説黃龍寺僧衆五更都到方丈參見長老長老道夜來驚恐你們衆僧曰得蒙長老佛法浩大無些動靜長老道你們自好睡卻好鬧了一夜衆僧道沒有甚執照長老用手一指衆人見了這口寶劍卻似分開八片頂陽骨傾下半桶冰雪水衆僧一齊禮拜方見長老神通廣大法力高強山前山後城裡城外男子女人僧尼道俗都來方丈看劍的人不知其數鬧了黃龍山鼎沸了黃州府卻説呂先生坐在困魔岩耳畔聽得鬧嚷嚷地便召山神山神現形唱喏問寺中為甚熱鬧山神曰告上仙城裡城外人都來看這口寶劍人人拔不起因此熱鬧洞賓道速退山神去了先生自思鬧了黃州師父知道怎地分説自首免罪韋天不在走出洞門駕雲而起且説韋天到困魔岩不見了呂先生徑來方丈報與黃龍禪師走了呂先生不知吾師要趕他也不趕禪師道護法神免勞生受且回天宮化陳清風而去卻説呂先生一道雲頭直到終南山洞門口立著見道童向前稽首道童施禮呂先生道道童師父在麼道童言老師父山中採藥不在洞中呂先生徑上終南山尋見師父雙膝跪下俯伏在地鍾離師父呵呵大笑自已知道了道弟子引將徒弟來了不知度得幾人先將劍來還我呂先生告罪説不是處望乞老師父將就解救弟子師父曰吾再三吩咐休惹和尚們你頭上的疙瘩尚然未消有何面目見吾你神通短淺法力未精如何與人鬥勝徒弟不曾度得一個妝這辱門敗戶的事俺且饒你初犯一次速去取劍來呂先生拜告吾師免弟子之罪此劍被他禁住了不能得回師父言吾修書一封將去與吾師兄闢支佛看自然還你不可輕易休損壞了封皮去荊筐籃裡取出這封書來呂先生見了納頭便拜吾師過去未來俱已知道得了書直到黃龍寺墜下雲來伽藍通報長老呂先生在方丈外聽法旨黃龍道喚他進來伽藍曰吾師有請洞賓直到方丈裡合掌頂禮來時奉本師法旨有封書在此長老已知道教取書來呂先生雙手獻上長老拆開上面一個圓圈圈外有一點在上下有四句偈曰丹只是劍劍只是丹得劍知丹得丹知劍黃龍曰覷汝師父面皮取了劍去忙走向前將劍輕輕拔起拜謝吾師呂岩請問吾師法語圈子裡一點本師法語圈子上一點不知是何意故黃龍曰你肯拜我為師傳道與你呂先生言情願皈依我佛前三拜後三拜禮佛三拜三三九拜合掌跪膝諦聽黃龍曰汝在座前言一粒粟中藏世界小合大圈子上一點吾答一粒能化三千界大合小圈子內一點這是道吾傳與你呂先生聽罷大徹大悟如漆桶底脫謝吾師弟子回終南山去拜謝師父黃龍曰吾傳道與汝久後休言自會或詩或詞留為表記就取文房四寶將來呂先生磨墨蘸筆作詩一首詩曰踤碎葫蘆踏折琴生來只念道門深今朝得悟黃龍術方信從前枉用心作詩已畢拜謝了黃龍禪師徑回終南山見了本師納還了寶劍從此定性修真養道數百年不下山去功成行滿成陸地神仙正是朝騎白鹿升三島暮跨青鸞上九霄後府人於鳳翔府天慶觀壁上見詩一首字如龍蛇之形詩後大書回道人三字詳之知為純陽祖師也詩曰得道年來八百秋不曾飛劍取人頭玉皇未有天符至且貨烏金混世流
