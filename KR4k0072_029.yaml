body:
  text: 第二十九卷盧太學詩酒傲王侯衛河東岸浮丘高竹捨雲居隱鳳毛遂有文章驚董賈豈無名譽駕劉曹秋天散步青山郭春日催詩白兔毫醉倚湛盧時一嘯長風萬里破洪濤這首詩係本朝嘉靖年間一個才子所作那才子是誰姓盧名楠字少一字子赤大名府浚縣人也生得丰姿瀟灑氣宇軒昂飄飄有出塵之表八歲即能屬文十歲便嫻詩律下筆數千言倚馬可待人都道他是李青蓮再世曹子建後身一生好酒任俠放達不羈有輕財傲物之志真個名聞天下才冠當今與他往來的俱是名公巨卿又且世代簪纓家資巨富日常供奉擬於王侯所居在城外浮邱山下第宅壯麗高聳雲漢後房粉黛一個個聲色兼妙又選小奚秀美者數人教成吹彈歌曲日以自娛至於僮僕廝養不計其數宅後又構一園大可兩三頃鑿池引水疊石為山制度極其精巧名曰嘯圃大凡花性喜暖所以名花俱出南方那北地天氣嚴寒花到其地大半凍死因此至者甚少設或到得一花一草必為巨大畹所有他人亦不易得這浚縣又是個拗處比京都更難故宦家園亭雖有俱不足觀偏盧楠立心要勝似他人不惜重價差人四外構取名花異卉怪石奇峰落成這園遂為一邑之勝真個景致非常但見樓臺高峻庭院清幽山疊岷峨怪石花栽閬苑奇葩水閣遙通行塢風軒斜透松寮回塘曲檻層層碧浪漾琉璃疊嶂層巒點點蒼苔鋪翡翠牡丹亭畔孔雀雙棲芍藥欄邊仙禽對舞縈紆松徑緑陰深處小橋橫屈曲花岐紅艷叢中喬木聳煙迷翠黛意淡如無雨洗青螺色濃似染木蘭舟蕩漾芙蓉水際鞦韆架搖拽垂楊影裡朱檻畫欄相掩映湘簾繡幕兩交輝盧楠日夕吟花課鳥笑傲其間雖南面王樂亦不是過凡朋友去相訪必留連盡醉方止倘遇著個聲氣相投知音的知己便兼旬纍月款留在家不肯輕放出門若有人患難來投奔的一一都有賫發決不令其空過因此四方慕名來者絡繹不絶真個是座上客常滿尊中酒不空盧楠只因才學高廣以為掇青紫如拾針芥那知文福不齊任你錦繡般文章偏生不中試官之意一連走上幾次不能勾飛黃騰達他道世無識者遂絶意功名不圖進取惟與騷人劍客羽士高僧談禪理論劍術呼盧浮白放浪山水自稱浮丘山人曾有五言古詩云逸翮奮霄漢高步躡天關褰衣在椒塗長風吹海瀾瓊樹系遊鑣瑤華代朝餐恣情戲靈景靜嘯喈鳴鸞浮世信淆濁焉能濡羽翰話分兩頭卻説浚縣知縣姓汪名岑少年連第貪酷無比性復猜刻又酷好杯中之物若擎著酒杯便直飲到天明自到浚縣不曾遇著對手平昔也曉得盧楠是個才子當今推重交遊甚廣又聞得邑中園亭推他家為最酒量又推尊第一因這三件有心要結識他做個相知差人去請來相會你道有這般好笑的事麼別個秀才要去結交知縣還要捱風緝縫央人引進拜在門下認為老師四時八節饋送禮物希圖以小博大若知縣自來相請便似朝廷徵聘一般何等榮耀還把名帖粘在壁上誇炫親友這雖是不肖者所為有氣節的未必如此但知縣相請也沒有不肯去的偏有盧楠比他人不同知縣一連請了五六次只當做耳邊風全然不睬只推自來不入公門你道因甚如此那盧楠才高天下眼底無人天生就一副俠腸傲骨視功名如敝蓰等富貴猶浮雲就是王侯卿相不曾來拜訪要請去相見他也斷然不肯先施怎肯輕易去見個縣官真個是天子不得臣諸侯不得友絶品的高人這盧楠已是個清奇古怪的主人撞著知縣又是個耐煩瑣碎的冤家請人請到四五次不來也只索罷了偏生只管去纏帳見盧楠決不肯來卻到情願自去就教又恐盧楠他出先差人將帖子訂期差人領了言語一直徑到盧家把帖子遞與門公説道本縣老爺有緊要話差我來傳達你相公相煩引進門公不敢怠慢即引到園上來見家主差人隨進園門盡目看時只見水光繞緑山色送青竹木扶疏交相掩映林中禽鳥聲如鼓吹那差人從不曾見這般景致今日到此恍如登了洞天仙府好生歡喜想道怪道老爺要來遊玩原來有恁地好景我也是有些緣分方得至此觀玩這番也不枉為人一世遂四下行走恣意飽看灣灣曲曲穿過幾條花徑走過數處亭臺來到了個所在周圍盡是梅花一望如雪霏霏馥馥清香沁人肌骨中間顯出一座八角亭子朱甍碧瓦畫棟雕梁亭中懸一個扁額大書玉照亭三字下邊坐著三四個賓客賞花飲酒旁邊五六個標致青衣調絲品竹按板而歌有高太史梅花詩為證瓊姿只合在瑤臺誰向江南處處栽雪滿山中高士臥月明林下美人來寒依疏影蕭蕭竹春掩殘香漠漠苔自去漁郎無好韻東風愁寂幾回開門公同差人站在門外候歌完了先將帖子稟知然後差人向前説道老爺令小人多多拜上相公説既相公不屑到縣老爺當來拜訪但恐相公他出又不相值先差小人來期個日子好來請教二來聞府上園亭甚好順便就要遊玩大凡事當湊就不起那盧楠見知縣頻請不去恬不為怪卻又情願來就教未免轉過念頭想他雖然貪鄙終是個父母官兒肯屈己敬賢亦是可取若又峻拒不許外人只道我心胸褊狹不能容物了又想道他是個俗吏這文章定然不曉得的那詩律旨趣深奧料必也沒相干若論典籍他又是個後生小子徼幸在睡夢中偷得這進士到手已是心滿意足諒來還未曾識面至於理學禪宗一發夢想所不到了除此之外與他談論有甚意味還是莫招攬罷卻又念其來意如拒絶了似覺不情正沈吟間小童斟上酒來他觸境情生就想到酒上道倘會飲酒亦可免俗問來人道你本官可會飲酒麼答道酒是老爺的性命怎麼不會飲盧楠又問能飲得多少答道但見拿著酒杯整夜吃去不到酩酊不止也不知有幾多酒量盧楠心中喜道原來這俗物卻會飲酒單取這節罷隨教童子取個帖兒付與來人道你本官既要來遊玩趁此梅花盛時就是明日罷我這裡整備酒盒相候差人得了言語原同門公一齊出來回到縣裡將帖子回覆了知縣知縣大喜正要明日到盧楠家去看梅花不想晚上人來報新按院到任連夜起身往府不能如意差人將個帖兒辭了知縣到府接著按院伺行香過了回到縣時往還數日這梅花已是紛紛玉瓣堆香砌片片瓊英繞畫欄汪知縣因不曾赴梅花之約心下怏怏指望盧楠另來相邀誰知盧楠出自勉強見他辭了即撇過一邊那肯又來相請看看已到仲春時候汪知縣又想到盧楠園上去遊春差人先去致意那差人來到盧家園中只見園林織錦堤草鋪茵鶯啼燕語蝶亂蜂忙景色十分艷麗須臾轉到桃蹊上那花渾如萬片丹霞千重紅錦好不爛熳有詩為證桃花開遍上林春耀服繁華色艷濃含笑動人心意切幾多消息五更風盧楠正與賓客在花下擊鼓催花豪歌狂飲差人執帖子上前説知盧楠乘著酒興對來人道你快回去與本官説若有高興即刻就來不必另約衆賓客道使不得我們正在得趣之時他若來了就有許多文謅怎能盡興還是改日罷盧楠道説得有理便是明日遂取個帖子打發來人回復知縣你道天下有這樣不巧的事次日汪知縣剛剛要去遊春誰想夫人有五個月身孕忽然小産起來暈倒在地血污浸漬身子嚇得知縣已是六神無主還有甚心腸去吃酒只得又差人辭了盧楠這夫人一病直至三月下旬方才稍可那時盧楠園中牡丹開放冠絶一縣真是好花有牡丹詩為證洛陽千古斗春芳富貴真誇濃艷妝一自清平傳唱後至今人尚説花王汪知縣為夫人這病亂了半個多月情緒不佳終日只把酒來消悶連政事也懶得去理次後聞得盧家牡丹茂盛想要去賞玩因兩次失約不好又來相期差人送三兩書儀就致看花之意盧楠日子便期了卻不肯受這書儀璧返數次推辭不脫只得受了那日天氣晴爽汪知縣打帳早衙完了就去不道剛出私衙左右來報吏科給事中某爺告養親歸家在此經過正是要道之人敢不去奉承麼急忙出郭迎接饋送下程設宴款待只道一兩日就行還可以看得牡丹那知某給事又是好勝的人教知縣陪了遊覽本縣勝景之處盤桓七八日方行等到去後又差人約盧楠時那牡丹已萎謝無遺盧楠也向他處遊玩山水離家兩日矣不覺春盡夏臨倏忽間又早六月中旬汪知縣打聽盧楠已是歸家在園中避暑又令人去傳達要賞蓮花那差人徑至盧家把帖兒教門公傳進須臾間門公出來説道相公有話喚你當面去分付差人隨著門公直到一個荷花池畔看那池團團約有十畝多大堤上緑槐碧柳濃陰蔽日池曲紅妝翠蓋艷色映人有詩為證凌波仙子斗新妝七竅虛心吐異香何似花神多薄幸故將顏色惱人腸原來那池也有個名色喚做灩碧池池心中有座亭子名曰錦雲亭此亭四面皆水不設橋梁以采蓮舟為渡乃盧楠納涼之處門公與差人下了采蓮舟蕩動畫槳頃刻到了亭邊係舟登岸差人舉目看那亭子周圍朱欄畫檻翠幔紗窗荷香馥馥清風徐徐水中金魚戲藻梁間紫燕尋巢鷗鷺爭飛葉底鴛鴦對浴岸旁去那亭中看時只見藤床湘簟石榻竹兒瓶中供千葉碧蓮爐內焚百和名香盧楠科頭跣足斜據石榻面前放一帙古書手中執著酒杯旁邊冰盤中列著金桃雪藕沈李浮瓜又有幾味案酒一個小廝捧壺一個小廝打扇他便看幾行書飲一杯酒自取其樂差人未敢上前在側邊暗想道同是父母生長他如何有這般受用就是我本官中過進士還有許多勞碌怎及得他的自在盧楠抬頭看見即問道你就是縣裡差來的麼差人應道小人正是盧楠道你那本官到也好笑屢次訂期定日卻又不來如今又説要看荷花恁樣不爽利虧他怎地做了官我也沒有許多間工夫與他纏帳任憑他有興便來不奈煩又約日子差人道老爺多拜上相公説久仰相公高才如渴思漿巴不得來請教連次皆為不得已事羈住故此失約還求相公期個日子小人好去回話盧楠見來人説話伶俐卻也聽信了他乃道既如此竟在後日差人得了言語討個回帖同門公依舊下船手華到柳陰堤下上岸自去回復了知縣那汪知縣至後日早衙發落了些公事約莫午牌時候起身去拜盧楠誰想正值三伏之時連日酷熱非常汪知縣已受了些暑氣這時卻又在正午那輪紅日猶如一團烈火熱得他眼中火冒口內煙生剛到半路覺道天旋地轉從橋上直撞下來險些兒悶死在地從人急忙救起抬回縣中送入私衙漸漸蘇醒分付差人辭了盧楠一面請太醫調治足足裡病了一個多月方才出堂理事不在話下且説盧楠一日在書房中查點往來禮物檢著汪知縣這封書儀想道我與他水米無交如何白白裡受他的東西須把來消豁了方才幹淨到八月中差人來請汪知縣中秋夜賞月那知縣卻也正有此意見來相請好生歡喜取回帖打發來人説多拜上相公至期準赴那知縣乃一縣之主難道剛剛只有盧楠請他賞月不成少不得初十邊就有鄉紳同僚中相請況又是個好飲之徒可有不去的理麼定然一家家捱次都到至十四這日辭了外邊酒席於衙中整備家宴與夫人在庭中玩賞那晚月色分外皎潔比尋常更是不同有詩為證玉宇淡悠悠金波徹夜流最憐圓缺處曾照古今愁風露孤輪影山河一氣秋何人吹鐵笛乘醉倚南樓夫妻對酌直飲到酩酊方才入寢那知縣一來是新起病的人元神未復二來連日沈酣糟粕趁著酒興未免走了酒字下這道兒三來這晚露坐夜深著了些風寒三合湊又病起來眼見得盧楠賞月之約又虛過了調攝數日方能痊可那知縣在衙中無聊量道盧楠園中桂花必盛意欲借此排遣適值有個江南客來打抽豐送兩大壇惠山泉酒汪知縣就把一壇差人轉送與盧楠盧楠見説是美酒正中其懷無限歡喜乃道他的政事文章我也一概勿論只這酒中想亦是知味的了即寫帖請汪知縣後日來賞桂花有詩為證涼影一簾分夜月天宮萬斛動秋風淮南何用歌招隱自可淹留桂樹叢自古道一飲一啄莫非前定像汪知縣是個父母官肯屈己去見個士人豈不是件異事誰知兩下機緣未到臨期定然生出事故不能相會這番請賞桂花汪知縣滿意要盡竟日之歡罄夙昔仰想之誠不料是日還在眠床上外面就傳板進來報山西理刑趙爺行取入京已至河下恰正是汪知縣鄉試房師怎敢怠慢即忙起身梳洗出衙上轎往河下迎接設宴款待你想兩個得意師生沒有就相別之理少不得盤桓數日方才轉身這桂花已是飄殘金粟隨風舞零亂天香滿地鋪卻説盧楠索性剛直豪爽是個傲上矜下之人見汪知縣屢次卑詞盡敬以其好賢遂有俯交之念時值九月末旬園中菊花種數甚多內中惟有三種為貴那三種鶴翎剪絨西施每一種各有幾般顏色花大而媚所以貴重有菊花詩為證不共春風斗百芳自甘籬落傲秋霜園林一片蕭疏景幾朵依稀散晚香盧楠因想汪知縣幾遍要看園景卻俱中止今趁此菊花盛時何不請來一玩也不枉他一番敬慕之情即寫帖兒差人去請次日賞菊家人拿著帖子來到縣裡正值知縣在堂理事一徑走到堂上跪下把帖子呈上稟道家相公多拜上老爺園中菊花盛開特請老爺明日賞玩汪知縣正想要去看菊因屢次失約難好啓齒今見特地來請正是挖耳當招深中其意看了帖子乃道拜上相公明日早來領教那家人得了言語即便歸家回覆家主道汪老爺拜上相公明日絶早就來那知縣説明日早來不過是隨口的話那家人改做絶早就來這也是一時錯訛之言不想因這句錯話上得罪於知縣後來把天大傢俬弄得罄盡險些兒連性命都送了正是舌為利害本口是禍福門當下盧楠心下想道這知縣也好笑那見赴人筵席有個絶早就來之理又想道或者慕我家園亭要盡竟日之遊分付廚夫大爺明日絶早就來酒席須要早些完備那廚夫聽見知縣早來恐怕臨時誤事隔夜就手忙足亂收拾盧楠到次早分付門上人今日若有客來一概相辭不必通報又將個名帖差人去邀請知縣不到朝食時酒席都已完備排設在燕喜堂中上下兩席並無別客相陪那酒席鋪設得花錦相似正是富家一席酒窮漢半年糧且説知縣那日早衙投文已過也不退堂就要去赴酌因見天色太早恐酒席未完吊一起公事來問那公事卻是新拿到一班強盜專在衛河裡打劫來往客商因都在娼家宿歇露出馬腳被捕人拿住解到本縣當下一訊都招內中一個叫做石雪哥又扳出本縣一個開肉鋪的王屠也是同夥即差人去拿到知縣問道王屠石雪哥招稱你是同夥贓物俱窩頓你家從實供招免受刑罰王屠稟道爺爺小人是個守法良民就在老爺馬足下開個肉鋪生理平昔間就街市上不十分行走那有這事莫説與他是個同夥就是他面貌從不曾識認老爺不信拘鄰里來問平日所行所為就明白了知縣又叫石雪哥道你莫要誣陷平人若審出是扳害的登時就打死你這奴才石雪哥道小的並非扳害真實是同夥王屠叫道我認也認不得你如何是同夥石雪哥道王屠我與你一向同做夥計怎麼詐不認得就是今日本心原要出脫你的只為受刑不過一時間説了出來你不可怪我王屠叫屈連天道這是那裡説起知縣喝交一齊夾起來可憐王屠夾得死而復蘇不肯招承這強盜咬定是個同夥雖夾死終不改口是巳牌時分夾到日已倒西兩下各執一詞難以定招此時知縣一心要去赴宴已不耐煩遂依著強盜口詞葫蘆提將王屠問成斬罪其傢俬盡作贓物入官畫供已畢一齊發下死囚牢裡即起身上轎到盧楠家去吃酒不提你道這強盜為甚死咬定王屠是個同夥那石雪哥當初原是個做小經紀的人因染了時疫癥把本錢用完連幾件破家夥也賣來吃在肚裡及至病好卻沒本錢去做生意只存得一隻鍋兒要把去賣幾十文錢來營運度日旁邊卻又有些破的生出一個計較將鍋煤拌著泥兒塗好做個草標兒提上街去賣轉了半日都嫌是破的無人肯買落後走到王屠對門開米鋪的田大郎門首叫住要買那田大郎是個近覷眼卻看不出損處一口就還八十文錢石雪哥也就肯了田大郎將錢遞與石雪哥接過手剛在那裡數明不想王屠在對門看見叫道大郎你且仔細看看莫要買了破的這是嘲他眼力不濟乃一時戲謔之言誰知田大郎真個重新仔細一看看出那個破損處來對王屠道早是你説不然幾乎被他哄了果然是破的連忙討了銅錢退還鍋子石雪哥初時買成了心中正在歡喜次後討了錢去心中痛恨王屠恨不得與他性命相博只為自己貨兒果然破損沒個因頭難好開口忍著一肚子惡氣提著鍋子轉身臨行時還把王屠怒目而視巴不能等他問一聲就要與他廝鬧那王屠出自無心那個去看他石雪哥見不來招攬只得自去不想心中氣悶不曾照管得腳下絆上一交把鍋子打做千百來塊將王屠就恨入骨髓思想沒了生計欲要尋條死路詐那王屠卻又捨不得性命沒甚計較就學做夜行人到也順溜手到擒來做了年餘嫌這生意微細合入大隊裡在衛河中巡綽得來大碗酒大塊肉好不快活那時反又感激王屠起來他道是當日若沒有王屠這一句話賣成這只鍋子有了本錢這時只做小生意過日那有恁般快活及至惡貫滿盈被拿到官情真罪當料無生理卻又想起昔年的事來那日若不是他説破賣這幾十文錢做生意度日不見致有今日所以扳害王屠一口咬定死也不放故此他便認得王屠王屠卻不相認後來直到秋後典刑齊綁在法場上王屠問道今日總是死了你且説與我有甚冤仇害我致此説個明白死也甘心石雪哥方把前情説出王屠連喊冤枉要辨明這事你想此際有那個來采你只好含冤而死正是只因一句間言語斷送堂堂六尺軀間話休題且説盧楠早上候起已至巳牌不見知縣來到又差人去打聽回報説在那裡審問公事盧楠心上就有三四分不樂道既約了絶早就來如何這時候還問公事停了一回還不見到又差人去打聽來報説這件公事還未問完哩盧楠不樂有六七分了想道是我請他的不是只得耐這次罷俗語道得好等人性急略過一回又差人去打聽這人行無一箭之遠又差一人前去頃刻就差上五六個人去打聽少停一齊轉來回覆説正在堂上夾人想這事急切未得完哩盧楠聽見這話湊成十分不樂心中大怒道原來這俗物一無可取卻只管來纏帳幾乎錯認了如今幸爾還好即令家人撤開下面這桌酒席走上前居中向外而坐叫道快把大杯灑熱酒來洗滌俗腸家人都稟道恐大爺一時來到盧楠睜起眼喝道口走還説甚大爺我這酒可是與俗物吃的麼家人見家主發怒誰敢再言只得把大杯斟上廚下將肴饌供出小奚在堂中宮商迭奏絲竹並呈盧楠飲了數杯又討出大碗一連吃上十數多碗吃得性起把巾服都脫去了跣足蓬頭踞坐於椅上將肴饌撤去止留果品案酒又吃上十來大碗連果品也賞了小奚惟飲寡酒又吃上幾碗盧楠酒量雖高原吃不得急酒因一時惱怒連飲了幾十碗不覺大醉就靠在桌上鼻句鼻句睡去家人誰敢去驚動整整齊齊都站在兩旁伺候裡邊盧楠便醉了外面管園的卻不曉得遠遠望見知縣頭踏來急忙進來通報到了堂中看見家主已醉到吃一驚道大爺已是到了相公如何先飲得這個模樣衆家人聽得知縣來到都面面相覷沒做理會齊道那桌酒便還在但相公不能勾醒卻怎好管園的道且叫醒轉來扶醉陪他一陪也罷終不然特地請來冷淡他去不成衆家人只得上前叫喚喉嚨都喊破了如何得醒漸漸聽得人聲喧雜料道是知縣進來慌了手腳四散躲過單單撇下盧楠一人只因這番有分教佳賓賢主變為百世冤家好景名花化作一場春夢正是盛衰有命天為主禍福無門人自生且説汪知縣離了縣中來到盧家園門首不見盧楠迎接也沒有一個家人俟候從人亂叫門上有人麼快去通報大爺到了並無一人答應知縣料是管門的已進去報了遂吩咐不必呼喚竟自進去只見門上一個扁額白地翠書嘯圃兩個大字進了園門一帶都是柏屏轉過灣來又顯出一座門樓上書隔凡二字過了此門便是一條松徑繞出松林打一看時但見山嶺參差樓臺縹眇草木蕭疏花竹圍環知縣見布置精巧景色清幽心下暗喜道高人胸次自是不同但不聞得一些人聲又不見盧楠相迎未免疑惑也還道是園中徑路錯雜或者從別道往外迎我故此相左一行人在園中任意東穿西走反去尋覓主人次後來到一個所在卻是三間大堂一望菊花數百霜英燦爛楓葉萬樹擁若丹霞橙橘相亞纍纍如金池邊芙蓉千百株顏色或深或淺緑水紅葩高下相映鴛鴦鳧鴨之類戲狎其下汪知縣想道他請我看菊必在這個堂中了徑至堂前下轎走入看時那裡見甚酒席惟有一人蓬頭跣足居中向外而坐靠在桌上打鼻句此外更無一個人影從人趕向前亂喊老爺到了還不起來汪知縣舉目看他身上服色不像以下之人又見旁邊放著葛巾野服吩咐且莫叫喚看是何等樣人那常來下帖的差人向前仔細一看認得是盧楠稟道這就是盧相公醉倒在此汪知縣聞言登時紫漲了面皮心下大怒道這廝恁般無理故意哄我上門羞辱欲得教從人將花木打個希爛又想不是官體忍著一肚子惡氣急忙上轎分付回縣轎夫抬起打從舊路直至園門首依原不見一人那些皂快沒一個不搖首咋舌道他不過是個監生如何將官府恁般藐視這也是件異事知縣在轎上聽見自覺沒趣惱怒愈加想道他總然才高也是我的治下曾請過數遍不肯來見情願就見又饋送銀酒我亦可為折節敬賢之至矣他卻如此無理將我侮慢且莫説我是父母官即便平交也不該如此到了縣裡怒氣不息即便退入私衙不提且説盧楠這些家人小廝見知縣去後方才出頭到堂中看家主時睡得正濃直至更餘方醒衆人説道適才相公睡後大爺就來見相公睡著便起身而去盧楠道可有甚話説衆人道小人們恐難好答應俱走過一邊不曾看見盧楠道正該如此又懊悔道是我一時性急不曾分付閉了園門卻被這俗物直至此間踐污了地上教管園的明早快挑水將他進來的路徑掃滌乾淨又著人尋訪常來下帖的差人將向日所送書儀並那壇泉酒發還與他那差人不敢隱匿遂即到縣裡去繳還不在話下卻説汪知縣退到衙中夫人接著見他怒氣沖天問道你去赴宴如何這般氣惱汪知縣將其事説知夫人道這都是自取怪不得別人你是個父母官橫行直撞少不得有人奉承如何屢屢卑污苟賤反去請教子民他總是有才與你何益今日討恁般怠慢可知好麼汪知縣又被夫人搶白了幾句一發怒上加怒坐在交椅上氣憤憤的半晌無語夫人道何消氣得自古道破家縣令只這四個字把汪知縣從睡夢中喚醒放下了憐才敬士之心頓提起生事害人之念當下口中不語心下躊躇尋思計策安排盧生必置之死地方泄吾恨當夜無話汪知縣早衙已過次日喚一個心腹令史進衙商議那令史姓談名遵頗有才乾慣與知縣通贓過付是一個積年滑吏當下知縣先把盧楠得罪之事敘過次説要訪他過惡參之以報其恨談遵道老爺要與盧楠作對不是輕舉妄動的須尋得一件沒躲閃的大事坐在他身上方可完得性命那參訪一節恐未必了事在老爺反有乾礙汪知縣道卻是為何談遵道盧楠與小人原是同裡曉得他多有大官府往來且又傢俬豪富平昔雖則恃才狂放卻沒甚違法之事總然拿了少不得有天大分上到上司處挽回決不至死的田地那時懷恨挾仇老爺豈不反受其纍汪知縣道此言雖是但他恁般放肆定有幾件惡端你去細細訪來我自有處談遵答應出來只見外邊繳進原送盧楠的書儀泉酒知縣見了轉覺沒趣無處出氣遷怒到差人身上説道不該收他的回來打了二十毛板就將銀酒都賞了差人正是勸君莫作傷心事世上應多切齒人話分兩頭卻説浮邱山腳下有個農家叫做鈕成老婆金氏夫妻兩口家道貧寒卻又少些行止因此無人肯把田與他耕種歷年只在盧楠家做長工過日二年前生了個兒子那些一般做工的同盧家幾個家人斗分子與他賀喜論起鈕成恁般窮漢只該辭了才是十分情不可卻稱家有無胡亂請衆人吃三杯可也罷了不想他卻弄空頭裝好漢寫身子與盧楠家人盧才抵借二兩銀子整個大大筵席款待衆人鄰里盡送湯餅熱烘烘倒像個財主家行事外邊正吃得快活那得知孩子隔日被貓驚了這時了帳十分敗興不能勾盡歡而散那盧才肯借銀子與鈕成原懷著個不良之念你道為何因見鈕成老婆有三四分顏色指望以此為繇要勾搭這婆娘誰知緣分淺薄這婆娘情願白白裡與別人做些交易偏不肯上盧才的樁兒反去學向老公説盧才怎樣來調戲鈕成認做老婆是貞節婦人把盧才恨入骨髓立意要賴他這項銀子盧才踅了年餘見這婆娘妝喬做樣料道不能勾上鉤也把念頭休了一味索銀兩下面紅了好幾場只是沒有有人教盧才個法兒道他年年在你家做長工何不耐到發工銀時一併扣清可不幹淨盧才依了此言再不與他催討等到十二月中打聽了發銀日子緊緊伺候那盧楠田産廣多除了家人顧工的也有整百每年至十二月中預發來歲工銀到了是日衆長工一齊進去領銀盧楠恐家人們作弊短少了衆人的親自唱名親發還賞一頓酒飯吃個醉飽叩謝而出剛至宅門口盧才一把扯住鈕成問他要銀那鈕成一則還錢肉痛二則怪他調戲老婆乘著幾杯酒興反撒賴起來將銀塞在兜肚裡罵道狗奴才只欠得這丟銀子便生心來欺負老爺今日與你性命相博當胸撞個滿懷盧才不曾提防踉踉蹌蹌倒退了十數步幾乎跌上一交惱動性子趕上來便打那句狗奴才卻又犯了衆怒家人們齊道這廝恁般放潑總使你的理直到底是我家長工也該讓我們一分怎地欠了銀子反要行凶打這狗亡八齊擁上前亂打常言道雙拳不敵四手鈕成獨自一個如何抵當得許多人著實受了一頓拳腳盧才看見銀子藏在兜肚中扯斷帶子奪過去了衆長工再三苦勸方才住手推著鈕成回家不道盧楠在書房中隱隱聽得門首喧嚷喚管門的查問他的家法最嚴管門的恐怕連纍從實稟説盧楠即叫盧才進去説道我有示在先不許擅放私債盤算小民如有此等定行追還原券重責逐出你怎麼故違我法卻又截搶工銀行凶打他這等放肆可惡登時追出蔸肚銀子並那紙文契打了二十逐出不用分付管門的鈕成來時著他來見我領了銀券去管門的連聲答應出來不提且説鈕成剛吃飽得酒食受了這頓拳頭腳尖銀子原被奪去轉思轉惱愈想愈氣到半夜裡火一般發熱起來覺道心頭脹悶難過次日便爬不起來到第二日早上對老婆道我覺得身子不好莫不要死你快去叫我哥哥來商議自古道無巧不成書原來鈕成有個嫡親哥子鈕文正賣與令史談遵家為奴金氏平昔也曾到談遵家幾次路徑已熟故此教他去叫當下金氏聽見老公説出要死的話心下著忙帶轉門兒冒著風寒一徑往縣中去尋鈕文那談遵四處察訪盧楠的事過並無一件知縣又再三催促到是個兩難之事這一日正坐在公廨中只見一個婦人慌慌張張的走入來舉目看時不是別人卻是家人鈕文的弟婦金氏向前道了萬福問道請問令史我家伯伯可在麼談遵道到縣門前買小菜就來你有甚事恁般驚惶金氏道好教令史得知我丈夫前日與盧監生家人盧才費口夜間就病起來如今十分沈重特來尋伯伯去商量潭遵聞言不勝歡喜忙問道且説為甚與他家費口金氏即將與盧才借銀起直至相打之事細細説了一遍談遵道原來恁地你丈夫沒事便罷有些山高水低急來報知包在我身上與你出氣還要他一注大財鄉彀你下半世快活金氏道若得令史張主可知好麼正説間鈕文已回金氏將這事説知一齊同去臨出門談遵又囑付道如有變故速速來報鈕文應允離了縣中不消一個時辰早到家中推門進去不見一些聲息到床上看時把二人嚇做一跳原來直僵僵挺在上面不知死過幾時了金氏便號淘大哭起來正是夫妻本是同林鳥大限來時各自飛那些東鄰西舍聽得哭聲都來觀看齊道虎一般的後生活活打死了可憐可憐鈕文對金氏説道你且莫哭同去報與我主人再作區處金氏依言鎖了大門囑付鄰里看覷則個跟著鈕文就走那鄰里中商議道他家一定去告狀了地方人命重情我們也須呈明脫了干係隨後也往縣裡去呈報其時遠近村坊盡知鈕成已死早有人報與盧楠那盧楠原是疏略之人兩日鈕成不去領這銀券連其事卻也忘了及至聞了此信即差人去尋獲盧才送官那知盧才聽見鈕成死了料道不肯幹休已先逃之夭夭不在話下且説鈕文金氏一口氣跑到縣裡報知談遵談遵大喜悄悄的先到縣中稟了知縣出來與二人説明就裡教了説話流水寫起狀詞單告盧楠強占金氏不遂將鈕成擒歸打死教二人擊鼓叫冤鈕文依了家主領著金氏不管三七念一執了一塊木柴把鼓亂敲口內一片聲叫喊救命衙門差役自有談遵分付並無攔阻汪知縣呼得擊鼓即時升堂喚鈕文金氏至案前才看狀詞恰好地鄰也到了知縣專心在盧楠身上也不看地鄰呈子是怎樣情繇假意問了幾句不等發房即時出簽差人捉盧楠立刻赴縣公差又受了談遵的叮囑道大爺惱得盧楠要緊你們此去只除婦女孩子其餘但是男子漢盡數拿來衆皂快素知知縣與盧監生有仇況且是個大家若還人少進不得他家大門遂聚起三兄四弟共有四五十人分明是一群猛虎此時隆冬日短天已傍晚彤雲密布朔風凜冽好不寒冷談遵要奉承知縣陪出酒漿與衆人先發個興頭一家點起一根火把飛奔至盧家門首發一聲喊齊搶入去逢著的便拿家人們不知為甚嚇得東倒西歪兒啼女哭沒奔一頭處盧楠娘子正同著丫頭們在房中圍爐向火忽聞得外麵人聲鼎沸只道是漏了火急叫丫鬟們觀看尚未動步房門口早有家人報道大娘不好了外邊無數人執著火把打進來也盧楠娘子還認做強盜來打劫驚得三十六個牙齒磴磴的相打慌忙叫丫鬟快閉上房門言猶未了一片火光早已擁入房裡那些丫頭們奔走不迭只叫大王爺饒命衆人道胡説我們是本縣大爺差來拿盧楠的什麼大王爺盧楠娘子見説這話就明白向日丈夫怠慢了知縣今日尋事故來擺布便道既是公差難道不知法度的我家總有事在縣量來不過戶婚田土的事罷了須不是大逆不道如何白日裡不來黑夜間率領多人明火執杖打入房帷乘機搶劫明日到公堂上去講該得何罪衆公差道只要還了我盧楠但憑到公堂上去講遂滿房遍搜一過只揀器皿寶玩取勾像意方才出門又打到別個房裡把姬妾們都驚得躲入床底下去各處搜到不見盧楠料想必在園上一齊又趕入去盧楠正與四五個賓客在暖閣上飲酒小優兩傍吹唱恰好差去拿盧才的家人在那裡回話又是兩個亂喊上樓報道相公禍事到也盧楠帶醉問道有何禍事家人道不知為甚許多人打進大宅搶劫東西逢著的便被拿住今已打入相公房中去了衆賓客被這一驚一滴酒也無了齊道這是為何可去看來便要起身盧楠全不在意反攔住道由他自搶我們且吃酒莫要敗興快斟熱酒來家人跌足道相公外邊恁般慌亂如何還要飲酒説聲未了忽見樓前一派火光閃爍衆公差齊擁上樓嚇得那幾個小優滿樓亂滾無處藏躲盧楠大怒喝道甚麼人敢到此放肆叫人快拿衆公差道本縣大爺請你説話只怕拿不得的一條索子套在頸裡道快走快走盧楠道我有何事這等無禮偏不去衆公差道老實説向日請便請你不動如今拿到要拿去的牽著索子推的推扯的扯擁下樓來家人共拿了十四五個衆人還想連賓客都拿內中有人認得俱是貴家公子又是有名頭秀才遂不敢去惹他一行人離了園中一路鬧炒炒直至縣裡這幾個賓客放心不下也隨來觀看躲過的家人也自出頭奉著主母之命將了銀兩趕來央人使用打探不在話下且説汪知縣在堂等候堂前燈籠火把照輝渾如白晝四下絶不聞一些人聲衆公差押盧楠等直至丹墀下舉目看那知縣滿面殺氣分明坐下個閻羅天子兩行隸卒排列也與牛頭夜叉無二家人們見了這個威勢一個個膽戰心驚衆公差跑上堂稟道盧楠一起拿到了將一乾人帶上月臺齊齊跪下鈕文金氏另跪在一邊惟有盧楠挺然居中而立汪知縣見他不跪仔細看了一看冷笑道是一個土豪見了官府猶恁般無狀在外安得不肆行無忌我且不與你計較暫請到監裡去坐一坐盧楠倒走上三四步橫挺著身子説道就到監裡去坐也不妨只要説個明白我得何罪昏夜差人抄沒知縣道你強占良人妻女不遂打死鈕成這罪也不小盧楠聞言微微笑道我只道有甚天大事情原來為鈕成之事據你説止不過要我償他命罷了何須大驚小怪但鈕成原系我家傭奴與家人盧才口角而死卻與我無乾即使是我打死亦無死罪之律若必欲借彼證此橫加無影之罪以雪私怨我盧楠不難屈承只怕公論難泯汪知縣大怒道你打死平人昭然耳目卻冒認為奴污衊問官抗拒不跪公堂之上尚敢如此狂妄平日豪橫不問可知矣今且勿論人命真假只抗逆父母官該得何罪喝都教拿下去打衆公差齊聲答應趕向前一把揪翻盧楠叫道士可殺而不可辱我盧楠堂堂漢子何惜一死卻要用刑任憑要我認那一等罪無不如命不消責罰衆公差那裡繇他做主按倒在地打了三十知縣喝教住了並家人齊發下獄中監禁鈕成尸首著地方買棺盛殮發至官壇候驗鈕文金氏乾證人等召保聽審盧楠打得血肉淋漓兩個家人扶著一路大笑走出儀門這幾個朋友上前相迎家人們還恐怕來拿遠遠而立不敢近身衆友問道為甚事就到杖責盧楠道並無別事汪知縣公報私仇借家人盧才的假人命裝在我名下要加個小小死罪衆友驚駭道不信有此等奇冤內中一友叫道不打緊待小弟回去與家父説了明日拉合縣鄉紳孝廉與縣公講明料縣公難滅公論自然開釋盧楠道不消兄等費心但憑他怎地擺布罷了只有一件緊事煩到家間説一聲教把酒多送幾壇到獄中來衆友道如今酒也該少飲盧楠笑道人生貴在適意貧富榮辱俱身外之事於我何有難道因他要害我就不飲酒了這是一刻也少不得的正在那裡説話一個獄卒推著背道快進獄去有話另日再説那獄卒不是別人叫做蔡賢也是汪知縣得用之人盧楠睜起眼喝道口走可惡我自説話與你何乾蔡賢也焦躁道呵呀你如今是個在官人犯了這樣公子氣質且請收起用不著了盧楠大怒道什麼在官人犯就不進去便怎麼蔡賢還要回話有幾個老成的將他推開做好做歹勸盧楠進了監門衆友也各自回去盧楠家人自歸家回覆主母不在話下原來盧楠出衙門時談遵緊隨在後察訪這些説話一句句聽得明白進衙報與知縣知縣到次早只説有病不出堂理事衆鄉官來時門上人連帖也不受至午後忽地升堂喚齊金氏一乾人犯並忤作人等監中吊出盧楠主僕徑去檢驗鈕成尸首那忤作人已知縣主之意輕傷盡報做重傷地鄰也理會得知縣要與盧楠作對齊咬定盧楠打死知縣又哄盧楠將出鈕成傭工文券只認做假的盡皆扯碎嚴刑拷逼問成死罪又加二十大板長枷手扭下在死囚牢裡家人們一概三十滿徒三年召保聽候發落金氏鈕文乾證人等發回寧家尸棺俟詳轉定奪將招繇疊成文案並盧楠抗逆不跪等情細細開載在內備文申報上司雖衆鄉紳力為申理知縣執意不從有詩為證縣令從來可破家冶長非罪亦堪嗟福堂今日容高士名圃無人理百花且説盧楠本是貴介之人生下一個膿窠瘡兒就要請醫家調治的如何經得這等刑杖到得獄中昏迷不醒幸喜合監的人知他是個有錢主兒奉承不暇流水把膏藥末藥送來家中娘子又請太醫來調治外修內補不勾一月平服如舊那些親友絡繹不絶到監中候問獄卒人等已得了銀子歡天喜地繇他們直進直出並無攔阻內中單有蔡賢是知縣心腹如飛稟知縣主魆地到監點閘搜出五六人來卻都是有名望的舉人秀士不好將他難為教人送出獄門又把盧楠打上二十四五個獄卒一概重責那獄卒們明知是蔡賢的緣故咬牙切齒因是縣主得用之人誰敢與他計較那盧楠平日受用的高堂大廈錦衣玉食眼內見的是竹木花卉耳中聞的是笙簫細樂到了晚間嬌姬美妾倚翠偎紅似神仙般散誕的人如今坐於獄中住的卻是鑽頭不進半塌不倒的房子眼前見的無非死犯重囚言事嘈雜面目凶頑分明一班妖魔色怪耳中聞的不過是腳鐐手木丑鐵鏈之聲到了晚間提鈴喝號擊柝鳴鑼唱那歌兒何等淒慘他雖是豪邁之人見了這般景像也未免睹物傷情恨不得肋下頃刻生出兩個翅膀來飛出獄中又恨不得提把板斧劈開獄門連衆犯也都放走一念轉著受辱光景毛髮倒豎恨道我盧楠做了一世好漢卻送在這個惡賊手裡如今陷於此間怎能勾出頭日子總然掙得出去亦有何顏面見人要這性命何用不如尋個自盡到得乾淨又想道不可不可昔日成湯文王有夏臺裡之囚孫臏馬遷有刖足腐刑之辱這幾個都是聖賢尚忍辱待時我盧楠豈可短見卻又想道我盧楠相知滿天下身列縉紳者也不少難道急難中就坐觀成敗還是他們不曉得我受此奇冤須索寫書去通知教他們到上司處挽回遂寫起若干書啓差家人分頭投遞那些相知也有見任也有林下見了書札無不駭然也有直達汪知縣要他寬罪的也有托上司開招的那些上司官一來也曉得盧楠是當今才子有心開釋都把招詳駁下縣裡回書中又露個題目教盧楠家屬前去告狀轉批別衙門開招出罪盧楠得了此信心中暗喜卻教家人往各上司訴冤果然都批發本府理刑勘問理刑官先已有人致意不在話下卻説汪知縣幾日間連接數十封書札都是與盧楠求解的正在躊躇忽見各上司招詳又都駁轉過了幾日理刑廳又行牌到縣吊卷提人已明知上司有開招放他之意心下老大驚懼想道這廝果然神通廣大身子坐在獄中怎麼各處關節已是布置到了若此番脫漏出去如何饒得我過一不做二不休若不斬草除根恐有後患當晚差談遵下獄教獄卒蔡賢拿盧楠到隱僻之處遍身鞭朴打勾半死推倒在地縛了手足把土囊壓住口鼻那消一個時辰嗚呼哀哉可憐滿腹文章到此冤沈獄底正是英雄常抱千年恨風木寒煙空斷魂話分兩頭卻説浚縣有個巡捕縣丞姓董名紳貢士出身任事強幹用法平恕見汪知縣將盧楠屈陷大辟十分不平只因官卑職小不好開口每下獄查點便與盧楠談論兩下遂成相知那晚恰好也進監巡視不見了盧楠問衆獄卒時都不肯説惱動性子一片聲喝打方才低低説大爺差談令史來討氣絶已拿向後邊去了董縣丞大驚道大爺乃一縣父母那有此事必是你們這些奴才索詐不遂故此謀他性命快引我去尋來衆獄卒不敢違逆直引至後邊一條夾道中劈面撞著談遵蔡賢喝教拿住上前觀看只見盧楠仰在地上手足盡皆綁縛面上壓個土囊董縣丞叫左右提起土囊高聲叫喚也是盧楠命不該死漸漸蘇醒與他解去繩索扶至房中尋些熱湯吃了方能説話乃將談遵指揮蔡賢打罵謀害情繇説出董縣丞安慰一番教人伏事他睡下然後帶談遵二人到於廳上思想這事雖然是縣主之意料今敗露也不敢承認欲要拷問談遵又想他是縣主心腹只道我不存體面反不為美單喚過蔡賢要他招承與談遵索詐不遂同謀盧楠性命那蔡賢初時只推縣主所遣不肯招承董縣丞大怒喝教夾起來那衆獄卒因蔡賢向日報縣主來閘監打了板子心中懷恨尋過一副極短極緊的夾棍才套上去就喊叫起來連稱願招董縣丞即便教住了衆獄卒恨著前日的毒氣只做不聽見倒務命收緊夾得蔡賢叫爹叫娘連祖宗十七八代盡叫出來董縣丞連聲喝住方才放了把紙筆要他親供蔡賢只得依著董縣丞説話供招董縣丞將來袖過分付衆獄卒此二人不許擅自釋放待我見過大爺然後來取起身出獄回衙連夜備了文書次早汪知縣升堂便去親遞汪知縣因不見談遵回覆正在疑惑又見董縣丞呈説這事暗吃一驚心中雖恨他沖破了網卻又奈何他不得看了文書只管搖頭恐沒這事董縣丞道是晚生親眼見的怎説沒有堂尊若不信喚二人對證便了那談遵猶可恕這蔡賢最是無理連堂尊也還污衊若不究治何以懲戒後人汪知縣被道著心事滿面通紅生怕傳揚出去壞了名聲只得把蔡賢問徒發遣自此懷恨董縣丞尋兩件風流事過參與上司罷官而去此是後話不提再説汪知縣因此謀不諧遂具揭呈送各上司又差人往京中傳送要道之人大抵説盧楠恃富橫行鄉黨結交勢要打死平人抗送問官營謀關節希圖脫罪把情節做得十分利害無非要張揚其事使人不敢救援又教談遵將金氏出名連夜刻起冤單遍處粘帖布置停當然後備文起解到府那推官原是沒擔當懦怯之輩見汪知縣揭帖並金氏冤單果然恐怕是非不敢開招照舊申報上司大凡刑獄經過理刑問結別官就不敢改動盧楠指望這番脫離牢獄誰道反坐實了一重死案依舊發下浚縣獄中監禁還指望知縣去任再圖昭雪那知汪知縣因扳翻了個有名富豪京中多道他有風力到得了個美名行取入京升為給事之職他已居當道盧楠總有通天攝地的神通也沒人敢翻他招案有一巡按御史樊某憐其冤枉開招釋罪汪給事知道授意與同科官劾樊巡按一本説他得了賄賂賣放重囚罷官回去著府縣原拿盧楠下獄因此後來上司雖知其冤誰肯捨了自己官職出他的罪名光陰迅速盧楠在獄不覺又是十有餘年經了兩個縣官那時金氏鈕文雖都病故汪給事卻升了京堂之職威勢正盛盧楠也不做出獄指望不道災星將退那年又選一個新知縣到任只因這官人來有分教此日重陰方啓照今朝甘露不成霜卻説浚縣新任知縣姓陸名光祖乃浙江嘉興府平湖縣人氏那官人胸藏錦繡腹隱珠璣有經天緯地之才濟世安民之術出京時汪公曾把盧楠的事相囑心下就有些疑惑想道雖是他舊任之事今已年久與他還有甚相干諄諄教諭其中必有緣故到任之後訪問邑中鄉紳都為稱枉敘其得罪之繇陸公還恐盧楠是個富家央浼下的未敢全信又四下暗暗體訪所説皆同乃道既為民上豈可以私怨羅織陷人大辟欲要申文到上司與他昭雪又想道若先申上司必然行查駁勘便不能決截了事不如先開釋了然後申報遂吊出那宗卷來細細查看前後招繇並無一毫空隙反復看了幾次想道此事不得盧才如何結案乃出百金為信賞錢立限與捕役要拿盧才不一月忽然獲到將嚴刑究訊審出真情遂援筆批雲審得鈕成以領工食銀於盧楠家為盧才叩債以致爭鬥則鈕成為盧氏之雇工人也明矣雇工人死無家翁償命之理況放債者才叩債者才廝打者亦才釋才坐楠律何稱焉才遁不到官纍及家翁死有餘辜擬抵不枉盧楠久陷於獄亦一時之厄也相應釋放云云當日監中取出盧楠當堂打開枷木丑釋放回家合衙門人無不驚駭就是盧楠也出自意外甚以為異陸公備起申文把盧才起釁根繇並受枉始末一一開敘親至府中相見按院呈遞按院看了申文道他擅行開釋必有私弊問道聞得盧楠家中甚富賢令獨不避嫌乎陸公道知縣但知奉法不知避嫌但知問其枉不枉不知問其富不富若是不枉夷齊亦無生理若是枉陶朱亦無死法按院見説得詞正理直更不再問乃道昔張公為廷尉獄無冤民賢令近之矣敢不領教陸公辭謝而出不提且説盧楠回至家中合門慶幸親友盡來相賀過了數日盧楠差人打聽陸公已是回縣要去作謝他卻也素位而行換了青衣小帽娘子道受了陸公這般大德大恩須備些禮物去謝他便好盧楠説我看陸公所為是有肝膽的豪傑不比那齷齪貪利的小輩若送禮去反輕褻他了娘子道怎見得是反為輕褻盧楠道我沈冤十餘載上官皆避嫌不肯見原陸公初蒞此地即廉知枉毅然開釋此非有十二分才知十二分膽識安能如此今若以利報之正所謂故人知我我不知故人也如何使得即輕身而往陸公因他是個才士不好輕慢請到後堂相見盧楠見了陸公長揖不拜陸公暗以為奇也還了一禮遂教左右看坐門子就扯把椅子放在傍邊看官你道有恁樣奇事那盧楠乃久滯的罪人虧陸公救拔出獄此是再生恩人就磕穿頭也是該的他卻長揖不拜若論別官府見如此無禮心上定然不樂了那陸公毫不介意反又命坐可見他度量寬洪好賢極矣誰想盧楠見教他傍坐倒不悅起來説道老父母但有死罪的盧楠沒有傍坐的盧楠陸公聞言即走下來重新敘禮説道是學生得罪了即遜他上坐兩下談今論古十分款洽只恨相見之晚遂為至友有詩為證昔聞長揖大將軍今見盧生抗陸君夕釋桁陽朝上坐丈夫意氣薄青雲話分兩頭卻説汪公聞得陸公釋了盧楠心中不忿又托心腹連按院劾上一本按院也將汪公為縣令時挾怨誣人始末細細詳辨一本倒下聖旨將汪公罷官回去按院照舊供職陸公安然無恙那時談遵已省察在家專一挑寫詞狀陸公廉訪得實參了上司拿下獄中問邊遠充軍盧楠從此自謂餘生絶意仕進益放於詩酒家事漸漸淪落絶不為意再説陸公在任分文不要愛民如子況又發姦摘隱剔清利弊姦宄懾伏盜賊屏迹合縣遂有神明之稱聲名振於都下只因不附權要止遷南京禮部主事離任之日士民攀轅臥轍泣聲盈道送至百里之外那盧楠直送五百餘裡兩下依依不捨欷歔而別後來陸公纍官至南京吏部尚書盧楠家已赤貧乃南遊白下依陸公為主陸公待為上賓每日供其酒資一千縱其遊玩山水所到之處必有題詠都中傳誦一日遊采石李學士祠遇一赤腳道人風致飄然盧楠邀之同飲道人亦出葫蘆中玉液以酌盧楠楠飲之甘美異常問道此酒出於何處道人答道此酒乃貧道所自造也貧道結庵於廬山五老峰下居士若能同遊當恣君斟釃耳盧楠道既有美醞何憚相從即刻到李學士祠中作書寄謝陸公不攜行李隨著那赤腳道人而去陸公見書嘆道翛然而來翛然而去以乾坤為逆旅以七尺為蜉蝣真狂士也屢遣人於廬山五老峰下訪之不獲後十年陸公致政歸田朝廷遣官存問陸公使其次子往京謝恩從人遇之於京都寄問陸公安否或雲遇仙成道矣後人有詩贊云命蹇英雄不自繇獨將詩酒傲公侯一絲不挂飄然去贏得高名萬古留後人又有一詩警戒文人莫學盧公以傲取禍詩曰酒癖詩狂傲骨兼高人每得俗人嫌勸人休蹈盧公轍凡理還須學謹謙
