body:
  text: 第三十九卷汪大尹火焚寶蓮寺削髮披緇修道燒香禮佛心虔不宜潛地去胡纏致使清名有玷念佛持齋把素看經打坐參禪逍遙散誕勝神仙萬貫腰纏不羡話説昔日杭州金山寺有一僧人法名至慧從幼出家積資富裕一日在街坊上行走遇著了一個美貌婦人不覺神魂蕩漾遍體酥麻恨不得就抱過來一口水咽下肚去走過了十來家門面尚回頭觀望心內想道這婦人不知是甚樣人家卻生得如此美貌若得與他同睡一夜就死甘心又想道我和尚一般是父娘生長怎地剃掉了這幾莖頭髮便不許親近婦人我想當初佛爺也是扯淡你要成佛作祖止戒自己罷了卻又立下這個規矩連後世的人都戒起來我們是個凡夫那裡打熬得過卻可恨昔日置律法的官員你們做官的出乘駟馬入羅紅顏何等受用也該體恤下人積點陰騭偏生與和尚做盡對頭設立恁樣不通理的律令如何和尚犯姦便要責杖難道和尚不是人身就是修行一事也出於各人本心豈是捉縛加拷得的又歸怨父母道當時既是難養索性死了倒也乾淨何苦送來做了一家貨今日教我寸步難行恨著這口怨氣不如還了俗去娶個老婆生男育女也得夫妻團聚又想起做和尚的不耕而食不織而衣住下高堂清捨燒香吃茶恁般受用放掉不下一路胡思亂想行一步懶一步慢騰騰的蕩至寺中昏昏悶坐未到晚便去睡臥心上記挂這美貌婦人難得到手長吁短嘆怎能合眼想了一回又嘆口氣道不知這佳人姓名居止我卻在此癡想可不是個呆子又想道不難不難女娘弓鞋小腳料來行不得遠路定然只在近處拼幾日工夫到那答地方尋訪消息或者姻緣有分再得相遇也未可知那時暗地隨去認了住處尋個熟腳務要弄他到手算計已定盼望天明起身洗盥取出一件新做的綢絹褊衫並著乾鞋淨襪打扮得輕輕薄薄走出房門正打從觀音殿前經過暗道我且問問菩薩此去可能得遇遂雙膝跪到拜了兩拜向桌上拿過簽筒搖了兩三搖撲的跳出一根取起看時乃是第十八簽注著上上二字記得這四句簽訣上云天生與汝有姻緣今日相逢豈偶然莫惜勤勞問貪懶管教目下勝從前求了這簽喜出望外道據這簽訣明明説只在早晚相遇不可錯過機會又拜了兩拜放下籤筒急急到所遇之處見一婦人冉冉而來仔細一覷正是昨日的歡喜冤家身伴並無一人跟隨這時又驚又喜想道菩薩的簽果然靈驗此番必定有些好處緊緊的跟在後邊那婦人向著側邊一個門面揭起班竹簾兒跨腳入去卻又掉轉頭對他嘻嘻的微笑把手相招這和尚一發魂飛天外喜之不勝用目四望更無一人往來慌忙也揭起簾兒徑鑽進去問訊那婦人也不還禮綽起袖子望頭上一撲把僧帽打下地來又趕上一步舉起尖趫趫小腳兒一蹴谷碌碌直滾開在半邊口裡格格的冷笑這和尚惟覺得麝蘭撲鼻説道娘子休得取笑拾取帽子戴好那婦人道你這和尚青天白日到我家來做甚至慧道多感娘子錯愛見招至此怎説這話此時色膽如天也不管他肯不肯向前摟抱將衣服亂扯那婦人笑道你這賊禿真是不見婦人面的怎的就恁般粗鹵且隨我進來灣灣曲曲引入房中彼此解衣抱向一張榻上行事剛剛膚肉相湊只見一個大漢手提鋼斧搶入房來喝道你是何處禿驢敢至此姦騙良家婦女嚇得至慧戰做一團跪到在地下道是小僧有罪了望看佛爺面上乞饒狗命回寺去誦十部法華經保佑施主福壽綿長這大漢那裡肯聽照頂門一斧砍翻在地你道被他一斧還是死也不死原來想極成夢並非實境這和尚撒然驚覺想起夢中被殺光景好生害怕乃道偷情路險莫去惹他不如本分還俗倒得安穩自此即蓄髮娶妻不上三年癆瘵而死離寺之日曾作詩云少年不肯戴儒冠強把身心赴戒壇雪夜孤眠雙足冷霜天剃髮髑髏寒朱樓美女應無分紅粉佳人不許看死後定為惆悵鬼西天依舊黑漫漫適來説這至慧和尚雖然破戒還俗也還算做完名全節如今説一件故事也是佛門弟子只為不守清規弄出一場大事帶纍佛面無光山門失色這話文出在何處出在廣西南寧府永淳縣在城有個寶蓮寺這寺還是元時所建纍世相傳房廊屋舍數百多間田地也有上千餘畝錢糧廣盛衣食豐富是個有名的古剎本寺住持法名佛顯以下僧衆約有百餘一個個都分派得有職掌凡到寺中遊玩的便有個僧人來相迎先請至淨室中獻茶然後陪侍遍寺隨喜一過又擺設茶食果品相待十分盡禮雖則來者必留其中原分等則若遇官宦富豪另有一般延款這也不必細説大凡僧家的東西賽過呂太后的筵宴不是輕易吃得的卻是為何那和尚們名雖出家利心比俗人更狠這幾甌清茶幾碟果品便是釣魚的香餌不管貧富就送過一個疏簿募化錢糧不是托言塑佛妝金定是説重修殿宇再沒話講便把佛前香燈油為名若遇著肯捨的便道是可擾之家面前千般諂諛不時去説騙設遇著不肯捨的就道是鄙吝之徒背後百樣詆毀走過去還要唾幾口涎沫所以僧家再無個饜足之期又有一等人自己親族貧乏尚不肯周濟分文到得此輩募緣偏肯整幾兩價布施豈不是捨本從末的癡漢有詩為證人面不看看佛面平人不施施僧人若念慈悲分緩急不如濟苦與憐貧惟有寶蓮寺與他處不同時常建造殿宇樓閣並不啓口向人募化為此遠近士庶都道此寺和尚善良分外敬重反肯施捨比募緣的倒勝數倍況兼本寺相傳有個子孫堂極是靈應若去燒香求嗣的真個祈男得男祈女得女你道是怎地樣這般靈感原來子孫堂兩傍各設下淨室十數間中設床帳凡祈嗣的須要壯年無病的婦女齋戒七日親到寺中拜禱向佛討笤如討得聖笤就宿於淨室中一宵每房只宿一人若討不得聖笤便是舉念不誠和尚替他懺悔一番又齋戒七日再來祈禱那淨室中四面嚴密無一毫隙縫先教其家夫男僕周遭點檢一過任憑揀擇停當至晚送婦女進房安歇親人僕從睡在門外看守為此並無疑惑那婦女回去果然便能懷孕生下男女且又魁偉肥大疾病不生因有這些效驗不論士宦民庶眷屬無有不到子孫堂求嗣就是鄰邦隔縣聞知也都來祈禱這寺中每日人山人海好不熱鬧布施的財物不計其數有人問那婦女當夜菩薩有甚顯應也有説夢佛送子的也有説夢羅漢來睡的也有推託沒有夢的也有羞澀不肯説的也有祈後再不往的也有四時不常去的你且想佛菩薩昔日自己修行尚然割恩斷愛怎肯管民間情欲之事夜夜到這寺裡託夢送子可不是個亂話只為這地方元是信巫不信醫的故此因邪入邪認以為真迷而不悟白白裡送妻女到寺與這班賊禿受用正是分明斷腸草錯認活人丹原來這寺中僧人外貌假作謙恭之態卻到十分貪淫姦惡那淨室雖然緊密俱有暗道可入俟至鐘聲定後婦女睡熟便來姦宿那婦女醒覺時已被輕薄欲待聲張又恐反壞名頭只得忍羞而就一則婦女身無疾病且又齋戒神清二則僧人少年精壯又重價修合種子丸藥送與本婦吞服故此多有胎孕十發九中那婦女中識廉恥的好似啞子吃黃連苦在心頭不敢告訴丈夫有那一等無恥淫蕩的倒借此為繇不時取樂如此浸淫不知年代也是那班賊禿惡貫已盈天遣一位官人前來那官人是誰就是本縣新任大尹姓汪名旦祖貫福建泉州晉江縣人氏少年科第極是聰察曉得此地夷漢雜居土俗悍最為難治蒞任之後摘伏發隱不畏豪橫不上半年治得縣中姦宄斂迹盜賊潛蹤人民悅服訪得寶蓮寺有祈嗣靈應之事心內不信想道既是菩薩有靈只消祈禱何必又要婦女在寺宿歇其中定有情弊但未見實迹不好輕舉妄動須到寺親驗一番然後相機而行擇了九月朔日特至寶蓮寺行香一行人從簇擁到寺前汪大尹觀看那寺周圍都是粉牆包裹牆邊種植高槐古柳血紅的一座朱漆門樓上懸金書扁額題著寶蓮禪寺四個大字山門對過乃是一帶照牆傍牆停下許多空轎山門內外燒香的往來擠擁看見大尹到來四散走去那些轎夫也都手忙腳亂將轎抬開汪大尹分付左右莫要驚動他們住持僧聞知本縣大爺親來行香撞起鍾鼓喚齊僧衆齊到山門口跪接汪大尹直至大雄寶殿方才下轎看那寺院果然造得齊整但見層層樓閣疊疊廊房大雄殿外彩雲繚繞罩朱扉接衆堂前瑞氣氤氳籠碧瓦老檜修篁掩映畫梁雕棟蒼松古柏蔭遮曲檻回欄果然淨土人間少天下名山僧占多汪大尹向佛前拈香禮拜暗暗禱告要究求嗣弊竇拜罷佛顯率衆僧向前叩見請入方丈坐下獻茶已畢汪大尹向佛顯道聞得你合寺僧人焚修勤謹戒行精嚴都虧你主持之功可將年貫開來待我申報上司請給度牒與你就署為本縣僧官永持此寺佛顯聞言喜出意外叩頭稱謝汪大尹又道還聞得你寺中祈嗣最是靈感可有這事麼佛顯稟道本寺有個子孫堂果然顯應的汪大尹道祈嗣的可要做甚齋醮佛顯道並不要設齋誦經止要求嗣婦女身無疾病舉念虔誠齋戒七日在佛前禱祝討得聖笤就旁邊淨室中安歇祈得有夢便能生子汪大尹道婦女家在僧寺安歇只怕不便佛顯道這淨室中四圍緊密一女一室門外就是本家親人守護並不許一個間雜人往來原是穩便的汪大尹道原來如此我也還無子嗣但夫人不好來得佛顯道老爺若要求嗣只消親自拈香祈禱夫人在衙齋戒也能靈驗汪大尹道民俗都要在寺安歇方才有效怎地夫人不來也能靈驗佛顯道老爺乃萬民之主況又護持佛法一念之誠便與天地感通豈是常人之可比你道佛顯為何不要夫人前來俗語道得好賊人心虛他做了這般勾當恐夫人來時隨從衆多看出破綻故此阻當誰知這大尹也是一片假情探他的口氣當下汪大尹道也説得是待我另日竭誠來拜且先去遊玩一番即起身教佛顯引導從大殿旁穿過便是子孫堂那些燒香男女聽説知縣進來四散潛躲不迭汪大尹看這子孫堂也是三間大殿雕梁繡柱畫棟飛甍金碧耀目正中間一座神廚內供養著一尊女神珠冠瓔珞繡袍彩帔手內抱著一個孩子旁邊又站四五個男女這神道便叫做子孫娘娘神廚上黃羅繡幔兩下銀鉤挂開舍下的神鞋五色相兼約有數百餘雙繡幡寶蓋重重疊疊不知其數架上畫燭火光照徹上下爐內香煙噴薄貫滿殿庭左邊供的又是送子張仙右邊便是延壽星官汪大尹向佛前作個揖四下間走一回又教佛顯引去觀宿歇婦女的淨室原來那房子是逐間隔斷上面天花頂板下邊盡鋪地平中間床幃桌椅擺設得甚是濟楚汪大尹四遭細細看覷真個無絲毫隙縫説是鼠蟲螞蟻無處可匿汪大尹尋不出破綻原轉出大殿上轎佛顯又率衆僧到山門外跪送汪大尹在轎上一路沈吟道看這淨室周回嚴密不像個有情弊的但一塊泥塑木雕的神道怎地如此靈感莫不有甚邪神託名誑惑左想右算忽地想出一個計策回至縣中喚過一個令史分付道你悄地去喚兩名妓女假妝做家眷今晚送至寶蓮寺宿歇預備下朱墨汁兩碗夜間若有人來姦宿暗塗其頭明早我親至寺中查勘切不可走漏消息令史領了言語即去接了兩個相熟表子來家喚做張媚姐李婉兒令史將前事説與兩個妓女見説縣主所差怎敢不依捱到傍晚妓女妝束做良家模樣顧下兩乘轎子僕從扛抬鋪蓋把硃墨汁藏在一個盒子中跟隨於後一齊至寶蓮寺內令史揀了兩間淨室安頓停當留下家人自去回復縣主不一時和尚教小沙彌來掌燈送茶是晚祈嗣的婦女共有十數餘人那個來查考這兩個妓女是不曾燒香討笤過的須臾間鐘鳴鼓響已是起更時分衆婦女盡皆入寢親戚人等各在門外看守和尚也自關閉門戶進去不提且説張媚姐掩上門兒將銀朱碗放在枕邊把燈挑得明亮解衣上床心中有事不敢睡著不時向帳外觀望約莫一更天氣四下人聲靜悄忽聽得床前地平下格格的響還道是扇蟲作耗抬頭看時見一扇地平板漸漸推過在一邊地下鑽出一個人頭直立起來乃是一個和尚到把張媚姐嚇了一跳暗道原來這些和尚設下恁般賊計姦騙良家婦女怪道縣主用這片心機且不做聲看那和尚輕手輕腳走去吹滅燈火步到床前脫卸衣服揭開帳幔捱入被中張媚姐只做睡著那和尚到了被裡騰身上去款款托起雙股就弄起來張媚姐假作夢中驚醒説道你是何人夤夜至此淫污舉手推他下去那和尚雙手緊緊摟抱説道我是金身羅漢今特來送子與你口中便説下邊恣意狂蕩那和尚頗有本領雲雨之際十分勇猛張媚姐是個宿妓也還當他不起頑得個氣促聲喘趁他情濃深處伸手蘸了銀朱向和尚頭上盡都抹到這和尚只道是愛他全然不覺一連耍了兩次方才起身下床遞過一個包兒道這是調經種子丸每服三錢清晨滾湯送下連服數日自然胎孕堅固生育快易説罷而去張媚姐身子已是煩倦朦朧合眼覺得身邊又有人捱來這和尚更是粗鹵方到被中雙手流水拍開兩股望下亂搡張媚姐還道是初起的和尚推住道我頑了兩次身子疲倦正要睡臥如何又來怎地這般不知饜足和尚道娘子不要錯認了我是方才到的新客滋味還未曾嘗怎説不知饜足張媚姐看見和尚輪流來宿心內懼怕説道我身體怯弱不慣這事休得只管胡纏和尚道不打緊我有絶妙春意丸在此你若服了就通宵頑耍也不妨得即伸手向衣服中摸個紙包遞與張媚姐恐怕藥中有毒不敢吞服也把銀朱塗了他頭上那和尚比前的又狠直戲到雞鳴時候方去原把地平蓋好不提再説李婉兒才上得床不想燈火被火蛾兒撲滅卻也不敢合眼更餘時候忽然床後簌簌的聲響早有一人扯起帳子鑽上床來捱身入被把李婉兒雙關抱緊一張口就湊過來做嘴李婉兒伸手去摸他頭上乃是一個精光葫蘆卻又性急便蘸著墨汁滿頭摩弄問道你是那一房長老這和尚並不答言徑來行事那話兒長大堅硬猶如一根渾槍剛鞭李婉兒年紀比張媚姐還小幾年性格風騷經著這件東西又驚又喜想道一向聞得和尚極有本事我還未信不想果然不覺興動遂聳身而就這場雲雨端的快暢一個是空門釋子一個是楚館佳人空門釋子假作羅漢真身楚館佳人錯認良家少婦一個似積年石臼經幾多碎搗零椿一個似新打木樁盡耐得狂風驟浪一個不管佛門戒律但姿歡娛一個雖奉縣主叮嚀且圖快樂渾似阿難菩薩逢魔女猶如玉通和尚戲紅蓮雲雨剛畢床後又鑽一個來低低説道你們快活得勾了也該讓我來頑頑難道定要十分盡興那和尚微微冷笑起身自去後來的和尚到了被中輕輕款款把李婉兒滿身撫摸李婉兒假意推託不肯和尚捧住親個嘴道娘子想是適來被他頑倦了我有春意丸在此與你發興遂嘴對嘴吐過藥來李婉兒咽下肚去覺得香氣透鼻交接之間體骨酥軟十分得趣李婉兒雖然淫樂不敢有誤縣主之事又蘸了墨汁向和尚頭上周圍摸轉説道倒好個光頭和尚道娘子我是個多情知趣的妙人不比那一班粗蠢東西若不棄嫌常來走走李婉兒假意應承雲雨之後一般也送一包種子丸藥到雞鳴時分珍重而別正是偶然僧俗一宵好難算夫妻百夜恩話分兩頭且説那夜汪大尹得了令史回話至次日五鼓出衙喚起百餘名快手民壯各帶繩索器械徑到寶蓮寺前分付伏於兩旁等候呼喚隨身止帶十數餘人此時天已平明寺門未開教左右敲開裡邊住持佛顯知得縣主來到衣服也穿不及又喚起十數個小和尚急急趕出迎接直到殿前下轎汪大尹也不拜佛徑入方丈坐下佛顯同衆僧叩見汪大尹討過衆僧名簿查點佛顯教道人撞起鐘鼓喚集衆僧那些和尚都從睡夢中驚醒聞得知縣在方丈中點名個個慌忙奔走不一時都已到齊汪大尹教衆僧把僧帽盡皆除去那些和尚怎敢不依但不曉得有何緣故當時不除到也罷了才取下帽子內中顯出兩個血染的紅頂一雙墨塗的黑頂汪大尹喝令左右將四個和尚鎖住推至面前跪下問道你這四人為何頭上塗抹紅朱黑墨那四僧還不知是那裡來的面面相覷無言可對衆和尚也各駭異汪大尹連問幾聲沒奈何只得推稱同伴中取笑並非別故汪大尹笑道我且喚取笑的人來與你執證即教令史去喚兩個妓女誰知都被那和尚們盤桓了一夜這時正好熟睡那令史和家人險些敲折臂膊喊破喉嚨方才驚覺起身跟至方丈中跪下汪大尹問道你二人夜來有何所見從實説來二妓各將和尚輪流姦宿並贈春意種子丸藥及朱墨塗頂前後事一一細説袖中摸出種子春意丸呈上衆僧見事已敗露都嚇得膽戰心驚暗暗叫苦那四個和尚一味叩頭乞命汪大尹喝道你這班賊驢焉敢假託神道哄誘愚民姦淫良善如今有何理説佛顯心生一計教衆僧徐徐跪下稟道本寺僧衆盡守清規止有此四人貪淫姦惡屢訓不悛正欲合詞呈治今幸老爺察出罪實該死其餘實是無乾望老爺超拔汪大尹道聞得昨晚求嗣的甚衆料必室中都有暗道這四個姦淫的如何不到別個房裡恰恰都聚在一處入我彀中難道有這般巧事佛顯又稟道其實淨室惟此兩間有個私路別房俱各沒有汪大尹道這也不難待我喚衆婦女來問若無所見便與衆僧無乾即差左右將祈嗣婦女盡皆喚至盤問異口同聲俱稱並無和尚姦宿汪大尹曉得他怕羞不肯實説喝令左右搜檢身邊各有種子丸一包汪大尹笑道既無和尚姦宿這種子丸是何處來的衆婦人個個羞得是面紅頸赤汪大尹又道想是春意丸你們通服過了衆婦人一發不敢答應汪大尹更不窮究發令回去那些婦女的丈夫親屬在旁聽了都氣得遍身麻木含著羞恥領回不提佛顯見搜出了衆婦女種子丸又強辨是入寺時所送兩個妓女又執是姦後送的汪大尹道事已顯露還要抵賴教左右喚進民壯快手人等將寺中僧衆盡都綁縛止空了香公道人並兩個幼年沙彌佛顯初時意欲行凶因看手下人衆又有器械遂不敢動手汪大尹一面分付令史將兩個妓女送回起身上轎一行人押著衆僧在前那時哄動了一路居民都隨來觀看汪大尹回到縣中當堂細審用起刑具衆和尚平日本是受用之人如何熬得才套上夾棍就從實招稱汪大尹録了口詞發下獄中監禁準備文書申報上司不在話下且説佛顯來到獄中與衆和尚商議一個計策對禁子凌志説道我們一時做下不是悔之無及如今到了此處料然無個出頭之期但今早拿時都是空身把甚麼來使用我寺中向來積下的錢財甚多若肯悄地放我三四人回寺取來禁牌的常例自不必説分外再送一百兩雪花那凌志見説得熱鬧動火便道我們同輩人多不繇一人作主這百金四散分開所得幾何豈不是有名無實如出得二百兩與衆人另外我要一百兩偏手若肯出這數即今就同你去佛顯一口應承道但憑禁牌分付罷了怎敢違拗凌志即與衆禁子説知私下押著四個和尚回寺到各房搜括果然金銀無數佛顯先將三百兩交與凌志衆人得了銀子一個個眉花眼笑佛顯又道列位再少待片時待我收拾幾床鋪蓋進去夜間也好睡臥衆人連稱道有理縱放他們去打疊這四個和尚把寺中短刀斧頭之類裹在鋪蓋之中收拾完備教香公喚起幾個腳夫一同抬入監去又買起若干酒肉遍請合監上下把禁子灌得爛醉專等黃昏時候動手越獄正是打點劈開生死路安排跳出鬼門關且説汪大尹因拿出這個弊端心中自喜當晚在衙中秉燭而坐定稿申報上司猛地想起道我收許多凶徒在監倘有不測之變如何抵擋即寫朱票差人遍召快手各帶兵器到縣直宿防衛約莫更初時分監中衆僧取出刀斧一齊訥喊砍翻禁子打開獄門把重囚盡皆放起殺將出來高聲喊叫有冤報冤有仇報仇只殺知縣不傷百姓讓我者生擋我者死其聲震天動地此時值宿兵快恰好剛到就在監門口戰鬥汪大尹衙中聞得連忙升堂縣旁百姓聽得越獄都執槍刀前來救護和尚雖然拚命都是短兵快手俱用長槍故此傷者甚多不能得出佛顯知事不濟遂教衆人住手退入監中把刀斧藏過揚言道謀反的止是十數餘人都已當先被殺我等俱不願反容至當堂稟明汪大尹見事已定差刑房吏帶領兵快到監查驗將應有兵器盡數搜出當堂呈看汪大尹大怒向衆人説道這班賊驢淫惡滔天事急又思謀反我若莫有防備不但我一人遭他凶手連滿城百姓盡受荼毒了若不盡誅何以警後喚過兵快將出的刀斧給散與他分付道惡僧事雖不諧久後終有不測難以防制可乘他今夜反獄除一應人犯留明日審問其餘衆僧各砍首級來報衆人領了言語點起火把蜂擁入監佛顯見勢頭不好連叫謀反不是我等言還未畢頭已落地須臾之間百餘和尚齊皆斬訖猶如亂滾西瓜正是善惡到頭終有報只爭來早與來遲汪大尹次日吊出衆犯審問獄中緣何藏得許多兵器衆犯供出禁子凌志等得了銀子私放僧人回去帶進兵器等情汪大尹問了詳細原發到獄查點禁子凌志等俱已殺死遂連夜備文申詳上司將寶蓮寺盡皆燒毀其審單云看得僧佛顯等心沈欲海惡熾火坑用智設機計哄良家祈嗣穿墉穴地強邀信女通情緊抱著嬌娥兀的是菩薩從天降難推去和尚則索道羅漢夢中來可憐嫩蕊新花拍殘狂蝶卻恨溫香軟玉拋擲終風白練受污不可洗也黑夜忍辱安敢言乎乃使李婉兒朱抹其頂又遣張媚姐墨涅其顛紅艷欲流想長老頭橫沖經水黑煤如染豈和尚頸倒浸墨池收送福堂波羅蜜自做甘受陷入色界磨兜堅有口難言乃藏刀劍於皮囊寂滅翻成賊虐顧動干戈於圜棘慈悲變作強梁夜色正昏護法神通開犴狴鐘聲甫定金剛勇力破拘攣釜中之魚既漏網而又跋扈柙中之虎欲走壙而先噬人姦窈窕淫良善死且不宥殺禁子傷民壯罪欲何逃反獄姦淫其罪已重戮尸梟首其法允宜僧佛顯衆惡之魁粉碎其骨寶蓮寺藏姦之藪火焚其巢庶發地藏之姦用清無垢之佛這篇審單一出滿城傳誦百姓盡皆稱快往時之婦女曾在寺求子生男育女者丈夫皆不肯認大者逐出小者溺死多有婦女懷羞自縊民風自此始正各省直州府傳聞此事無不出榜戒諭從今不許婦女入寺燒香至今上司往往明文嚴禁蓋為此也後汪大尹因此起名遂欽取為監察御史有詩為證子嗣原非可強求況於入寺起淫偷從今勘破鴛鴦夢涇渭分源莫混流
