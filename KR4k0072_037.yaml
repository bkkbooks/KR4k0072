body:
  text: 第三十七卷杜子春三入長安想多情少宜求道想少情多易入迷總是七情難斷滅愛河波浪更堪悲話説隋文帝開皇年間長安城中有個子弟姓杜雙名子春渾家韋氏家住城南世代在揚州做鹽商營運真有萬萬貫家資千千頃田地那杜子春倚藉著父祖資業那曉得稼穡艱難且又生性豪俠要學那石太尉的奢華孟嘗君的氣概宅後造起一座園亭重價構取名花異卉巧石奇峰妝成景致曲房深院中置買歌兒舞女艷妾妖姬居於其內每日開宴園中廣召賓客你想那揚州乃是花錦地面這些浮浪子弟輕薄少年卻又盡多有了杜子春恁樣撒漫財主再有那個不來雖無食客三千也有幫間幾百相交了這般無藉肯容你在家受用不成少不得引誘到外邊遊蕩杜子春心性又是活的有何不可但見輕車怒馬春陌遊行走狗擎鷹秋田較獵青樓買笑纏頭那惜千緡博局呼盧一擲常輸十萬畫船簫管恣意逍遙選勝探奇任情散誕風月場中都總管煙花寨內大主盟杜子春將銀子認做沒根的如土塊一般揮霍那韋氏又是掏得水出的女兒家也只曉得穿好吃好不管間帳看看家中金銀搬完屯鹽賣完手中乾燥央人四處借債揚州城中那個不曉得杜子春是個大財主才説得聲東也送至西也送至又落得幾時脾胃到得沒處借時便去賣田園貨屋宅那些債主見他産業搖動都來取索那時江中蘆洲也去了海邊鹽場也脫了只有花園住宅不捨得與人到把衣飾器皿變賣他是用過大錢的這些少銀兩猶如吃碗泡茶頃刻就完了你想杜子春自幼在金銀堆裡滾大起來使滑的手若一刻沒得銀用便過不去難道用完了這項卻就罷休不成少不得又把花園住宅出脫大凡東西多的時節便覺用之不盡若到少來偏覺得易完賣了房屋身子還未搬出銀兩早又使得乾淨那班朋友見他財産已完又向旺處去了誰個再來趨奉就是奴僕見家主弄到恁般地位贖身的贖身逃走的逃走去得半個不留姬妾女婢標致的準了債去粗蠢的賣來用度也自各散去訖單單剩得夫妻二人搬向幾間接腳屋裡居住漸漸衣服凋敝米糧欠缺莫説平日受恩的不來看覷他就是杜子春自己也無顏見人躲在家中正是床頭黃金盡壯士無顏色杜子春在揚州做了許多時豪傑一朝狼狽再無面目存坐得住悄悄的歸去長安祖居投托親戚原來杜陵韋曲二姓乃是長安巨族宗支十分蕃盛也有為官作宦的也有商賈經營的排家都是至親至戚因此子春起這念頭也不指望他資助若肯借貸便好度日豈知親眷們都道子春潑天家計盡皆弄完是個敗子借貸與他斷無還日為此只推著沒有並無一個應承便十二分至戚情不可卻也有周濟些的怎當得子春這個大手段就是熱鍋頭上灑著一點水濟得甚事好幾日飯不得飽吃東奔西趁沒個頭腦偶然打向西門經過時值十二月天氣大雪初晴寒威凜烈一陳西風正從門圈子裡刮來身上又無綿衣肚中又餓刮起一身雞皮栗子把不住的寒顫嘆口氣道我杜子春豈不枉然平日攀這許多好親好眷今日見我淪落便不禮我怎麼受我恩的也做這般模樣要結那親眷何用要施那仁義何用我杜子春也是一條好漢難道就沒再好的日子正在那裡自言自語偶有一老者從旁走過見他嘆氣便立住腳問道郎君為何這般長嘆杜子春看那老者生得童顏鶴髮碧眼龐眉聲似銅鍾須如銀線戴一頂青絹唐巾披一領茶褐道袍腰系絲絛腳穿麻履若非得道仙翁定是修行長者杜子春這一肚子氣惱正莫發脫處遇著這老者來問就從頭備訴一遍那老者道俗語有云世情看冷暖人面逐高低你當初有錢是個財主人自然趨奉你今日無錢是個窮鬼便不禮你又何怪哉雖然如此天不生無祿之人地不長無根之草難道你這般漢子世間就沒個慷慨仗義的人周濟你的只是你目下須得銀子幾何才勾用度子春道只三百兩足矣老者道量你好大手段這三百兩乾得甚事再説多些子春道三千兩老者搖手道還要增些子春道若得三萬兩我依舊到揚州去做財主了只是難討這般好施主老者道我老人家雖不甚富卻也一生專行好事便助你三萬兩袖裡取出三百個錢遞與子春聊備一飯之費明日午時可到西市波斯館裡會我郎君勿誤那老者説罷徑一直去了子春心中暗喜道我終日求人一個個不肯周濟只道一定餓死誰知遇著這老者發個善心一送便送我三萬兩豈不是天上吊下來的造化如今且將他贈的錢買些酒飯吃了早些安睡明日午時到波斯館裡領他銀子去走向一個酒店中把三百錢都先遞與主人家放開懷抱吃個醉飽回至家中去睡卻又想道我杜子春聰明一世懵懂片時我家許多好親好眷尚不禮我這老者素無半面之識怎麼就肯送我銀子況且三萬兩不是當耍的便作石頭也老重一塊量這老者有多大傢俬便把三萬兩送我若不是見我嗟嘆特來寬慰我的必是作耍我的怎麼信得他明日一定是不該去卻又想道我細看那老者倒像個至誠的我又不曾與他求乞他沒有銀子送我便罷了説那謔話怎的難道是捨真財調假謊先送我三百個錢買這個謊説明日一定是該去去也是不去也是想了一會笑道是了是了那裡是三萬兩銀子敢只把三萬個錢送我總是三萬之數也不見得俗諺道得好飢時一粒勝似飽時一斗便是三萬個錢也值三十多兩勾我好幾日用度豈可不去子春被這三萬銀子在肚裡打攪整整一夜不曾得睡巴到天色將明不想精神因倦到一覺睡去及至醒來早已日將中了忙忙的起來梳洗他若是個有見識的昨日所贈之錢還留下幾文到這早買些點心吃了去也好只因他是松溜的手兒撒漫的性兒沒錢便煩惱及至錢入手時這三百文又不在他心上了況聽見有三萬銀子相送已喜出望外那裡算計至此他的肚皮兩日到餓服了卻也不在心上梳裹完了臨出門又笑道我在家也是間那波斯館又不多遠做我幾步氣力不著便走走去何妨若見那老者不要説起那銀子的事只説昨夜承賜銅錢今日特來相謝大家心照豈不美哉原來波斯館都是四夷進貢的人在此販賣寶貨無非明珠美玉文犀瑤石動是上千上百的價錢叫做金銀窠裡子春一心想著要那老者的銀子又怕他説謊這兩隻腳雖則有氣沒力的一步步蕩到波斯館來一隻眼卻緊緊望那老者在也不在到得館前正待進門恰好那老者從裡面出來劈頭撞見那老者瞋道郎君為甚的爽約我在辰時到此漸漸的日影挫西還不見來好守得不耐煩你豈不曉得秦末張子房曾遇黃石公於圮橋之上約後五日五更時分到此傳授兵書只因子房來遲又約下五日直待走了三次半夜裡便去等候方才傳得三略之法輔佐漢高祖平定天下封為留侯我便不如黃石公看你怎做得張子房敢是你疑心我沒銀子把你麼我何苦討你的疑心你且回去我如今沒銀子了只這一句話嚇得子春面如土色懊悔不及恰像折翅的老鶴兩隻手不覺直掉了下去想道三萬銀子到手快了怎麼恁樣沒福到熟睡了去弄到這時候如今他卻不肯了又想道他若也像黃石公肯再約日子情願隔夜找個鋪兒睡在此伺候又想道這老官兒既有心送我銀子早晚總是一般的又吊什麼古今論什麼故事又想道還是他沒有銀子故把這話來遮掩正在胡猜亂想那老者恰像在他腹中走過一遭的便曉得了乃道我本待再約個日子也等你走幾遭兒則是你疑我道一定沒有銀子故意弄這腔調罷罷罷有心做個好事何苦又要你走可隨我到館裡來子春見説原與他銀子又像一個跳虎撥著關捩子直豎起來急鬆鬆跟著老者徑到西廊下第一間房內開了壁廚取出銀子一剗都是五十兩一個元寶大錠整整的六百個便是三萬兩擺在子春面前精光耀目説道你可將去再做生理只不要負了我相贈的一片意思你道杜子春好不莽撞也不問他姓甚名誰家居那裡剛剛拱手説得一聲多謝多謝便領三十來個腳夫竟把銀子挑回家去杜子春到明日絶早就去買了一匹駿馬一付鞍鞴又做幾件時新衣服便去誇耀衆親眷説道據著你們待我我已餓死多時了誰想天無絶人之路卻又有做方便的送我好幾萬銀子我如今依舊往揚州去做鹽商特來相別有一首感懷詩在此請政詩云九叩高門十不應耐他凌辱耐他憎如今騎鶴揚州去莫問腰纏有幾星那些親眷們一向訕笑杜子春這個敗子豈知還有發迹之日這些時見了那首感懷詩老大的好沒顏色卻又想道長安城中那有這等一捨便捨三萬兩的大財主難道我們都不曉得一定沒有這事也有説他祖上埋下的銀子想被他掘著了也有説道莫非窮極無計交結了響馬強盜頭兒這銀子不是打劫客商的便是偷竊庫藏的都在半信半不信之間這也不在話下且説子春那銀子裝上幾車出了東都門徑上揚州而去路上不則一日早來到揚州家裡渾家韋氏迎著道看你氣色這般光彩行裡又這般沈重多分有些錢鈔但不知那一個親眷借貸你的子春笑道銀倒有數萬卻一分也不是親眷的備細將西門下嘆氣波斯館裡贈銀的情節説了一遍韋氏便道世間難得這等好人可曾問他甚麼名姓等我來生也好報答他的恩德子春卻呆了一晌説道其時我只看見銀子連那老者也不看見竟不曾問得我如今謹記你的言語倘或後來再贈我的銀子時節我必先問他名姓便了那子春平時的一起賓客聞得他自長安還後帶得好幾萬銀子來依舊做了財主無不趨奉似蠅攢蟻附一般因而攛掇他重妝氣象再整風流只他是使過上百萬銀子的這三萬兩能勾幾時揮霍不及兩年早已罄盡無餘了漸漸賣了馬騎驢賣了驢步走熬枯受淡度過日子豈知坐吃山空立吃地陷終是沒有來路日久歲長怎生捱得悔道千錯萬錯我當初出長安別親眷這日送什麼感懷詩分明與他告絶了如今還有甚嘴臉好去干求他便是干求料他也決不禮我弄得我有家難奔有國難投教我怎處韋氏道倘或前日贈銀子的老兒尚在再贈你些也不見得子春冷笑道你別癡心妄想知那個老兒生死若何貧富若何怎麼還望他贈銀子只是我那親眷都是肺腑骨肉到底割不斷的常言傍生不如傍熟我如今沒奈何只得還至長安去求那親眷正是要求生活計難惜臉皮羞杜子春重到長安好不卑詞屈體去求那衆親眷豈知親眷們如約會的一般都説道你還去求那頂尖的大財主我們有甚力量扶持得你起只這冷言冷語帶譏帶訕的教人怎麼當得險些把子春一氣一個死忽一日打從西門經過劈面遇著老者子春不勝感愧早把一個臉都掙得通紅了那老者問道看你氣色像個該得一注橫財的只是身上衣服怎麼這般襤褸莫非又消乏了子春謝道多蒙老翁送我三萬銀子我只説是用不盡的不知略撒漫便沒有了想是我流年不利故此沒福消受以至如此老者道你家好親好眷遍滿長安難道更沒周濟你的子春聽見説親眷周濟這句話兩個眉頭就攢著一堆答道親眷雖多一個個都是一錢不捨的慳吝鬼怎比得老翁這般慷慨老者道我如今本當再贈你些才是只是你三萬銀子不勾用得兩年若活了一百歲教我那裡去討那百多萬贈你休怪休怪把手一拱望西去了正是須將有日思無日休想今人似昔人那老者去後子春嘆道我受了親眷們許多訕笑怎麼那老者最哀憐我的也發起説話來敢是他硬做好漢送了我三萬銀子如今也弄得手頭乾了只是除了他教我再望著那一個搭救正在那裡自言自語豈知老者去不多遠卻又轉來説道人家敗子也盡有從不見你這個敗