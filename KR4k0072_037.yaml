城南祖居盡值上萬多銀子衆親眷們都是圖謀的我既窮了左右沒有面孔在長安住還要這宅子怎麼常言道有千年産沒千年主不如將來變賣且作用度省得靠著米囤卻鋨死了這叫做杜子春三入長安豈不是天生的一條的癡漢有詩為證莫恃黃金積滿階等間費盡幾時來十年為俠成何濟萬里投人誰見哀卻表子春到得長安再不去求衆親眷連那老兒也怕去見他只住在城南宅子裡請了幾個有名的經紀將祖遺的廳房土庫幾所下連基地時值價銀一萬兩一一面議定親筆填了文契托他絶賣只道這價錢是甕中捉鱉手到拿來豈知親眷們量他窮極故意要死他的貨偏不肯買那經紀都來回了子春嘆道我杜子春直恁的命低似這寸金田地偏有賣主沒有受主敢則經紀們不濟須自家出去尋個頭腦剛剛到得大街上早望見那老者在前面來了連忙的躲在衆人叢裡思量避他豈知那老者卻從背後一把曳住袖子叫道郎君好負心也只這一聲羞得杜子春再無容身之地老者道你全不記在西門嘆氣之日乎老夫雖則涼薄也曾兩次助你好幾萬銀子且莫説你怎麼樣報我難道喏也唱不得一個見了我到躲了去我何不把這銀子料在水裡也地的響一聲子春謝罪道我杜子春單隻不會做人家心肝是有的寧不知感老翁大恩只是兩次銀子都一造的蕩廢望見老翁不勝慚愧就恨不得立時死了以此躲避豈敢負心那老者便道既是這等則你回心轉意肯做人家我還肯助你子春道我這一次若再改了就對天設下個誓來老者笑道誓到不必設你只把做人家的勾當説與我聽著子春又道我祖上遺下海邊上鹽場若干所城裡城外衝要去處店房若乾間長江上下蘆洲若干裡良田若干頃極是有利息的我當初要銀錢用都瀾賤的典賣與人了我若有了銀子盡數取贖回來不消兩年便可致富然後興建義莊開闢義冢親故們羸老的養膳他幼弱的撫育他孤孀的存恤他流離顛沛的拯救他尸骸暴露的收埋他我於名教復圓矣老者道你果有此心我依舊助你便向袖裡一摸卻又摸出三百個錢遞與子春約道明日午時到波斯館裡來會我再早些便好子春因前次受了酒家之氣今番也不去吃酒別了老者一徑回去一頭走一頭思想道我杜子春天生莽漢幸遇那老者兩次贈我銀子我不曾問得他名姓被妻子埋怨一個不了如今這次須不可不問只待天色黎明便投波斯館去在門上坐了一會方才那老者走來此時尚是辰牌時分老者喜道今日來得恰好我想你説的做人家勾當若銀子少時怎濟得事須把三十萬兩助你算來三十萬要六千個元寶錠便數也數得一日故此要你早些來便引子春入到西廊下房內只一搬搬出六千個元寶錠來交付明白叮囑道老夫一生家計盡在此了你若再敗時節也不必重來見我子春拜謝道敢問老翁高姓大名府上那裡老者道你待問我怎的莫非你思量報我麼子春道承老翁前後共送了四十三萬這等大恩還有甚報得只是狗馬之心一毫難盡若老翁要宅子住小子賣契尚在袖裡便敢相奉老者笑道我若要你這宅子我只守了自家的銀子卻不好子春道我杜子春貧乏了平時親識沒有一個看顧我的獨有老翁三次周濟想我杜子春若無可用之處怎肯便捨這許多銀子倘或要用我杜子春敢不水裡水裡去火裡火裡去老者點著頭道用便有用你去處只是尚早且待你家道成立三年之後來到華山雲臺峰上老君祠前雙檜樹下見我便了有詩為證四十三萬等間輕末路猶然諱姓名他日雲臺雖有約不知何事用狂生卻説子春把那三十萬銀子扛回家去果然這一次頓改初心也不去整備鞍馬也不去製備衣服也不去辭別親眷悄悄的雇了車馬收拾停當徑往揚州原來有了銀子就是天上打一個霹靂滿京城無有不知的那親眷們都説道他有了三十萬銀子一般財主體面況又沾親豈可不去餞別也有説道他沒了銀子時節我們不曾禮他怎麼有了銀子便去餞別這個叫做前倨後恭反被他小覷了我們到底願送者多不願送者少少的拗不過多的一齊備了酒出東都門外與杜子春餞別只見酒到三巡子春起來謝道列位高親光送小子信口謅得個曲兒回敬一杯休得見笑你道是什麼曲兒原來都是敘述窮若無處求人的意思只教那親眷們聽著坐又坐不住去又去不得倒是不來送行也罷了何苦自討這場沒趣曲云我生來是富家從幼的喜奢華財物撒漫賤如沙覷著囊資漸寡看看手內光光乍看看身上絲絲挂歡娛博得嘆和嗟枉教人作話靶待求人難上難説求人最感傷朱門走遍自倣徨沒半個錢兒到掌若沒有城西老者寬洪量三番相贈多情況這微軀已喪路途旁請列位高親主張子春唱罷拍手大笑向衆親眷説聲請了洋洋而去心裡想道我當初沒銀子時節去訪那親眷們莫説請酒就是一杯茶也沒有今日見我有了銀子便都設酒出門外送我原來銀子這般不可少的我怎麼將來容易蕩費了一路上好生感嘆到得揚州韋氏只道他止賣得些房價在身不勾撒漫故此服飾輿馬比前十分收斂豈知子春在那老者眼前立下個做人家的誓願又被衆親眷們這席酒識破了世態改轉了念頭早把那扶興不扶敗的一起朋友盡皆謝絶影也不許他上門方才陸續的將典賣過鹽場客店蘆洲稻田逐一照了原價取贖回來果然本錢大利錢也大不上兩年依舊潑天巨富又在兩淮南北直到瓜州地面造起幾所義莊莊內各有義田義學義冢不論孤寡老弱但是要養育的就給衣食供膳他要講讀的就請師傅教訓他要殯殮的就備棺槨埋葬他莫説千里內外感被恩德便是普天下那一個不贊道杜子春這等敗了還掙起人家才做得家成又乾了多少好事豈不是天生的豪傑原來子春牢記那老者期約在心剛到三年便把家事一齊交付與妻子韋氏説道我杜子春三入長安若沒那老者相助不知這副窮骨頭死在那裡他約我家道成立三年之外可到華山雲臺峰上老君祠前雙檜樹下與他相見卻有用著我的去處如今已是三年時候須索到華山去走一遭韋氏答道你受他這等大恩就如重生父母一般莫説要用著你便是要用我時也説不得了況你貧窮之日留我一個在此尚能支持如今現有天大傢俬又不怕少了我吃的又不怕少了我穿的你只管放心自去便了當日整治一杯別酒親出城西餞送子春上路竹葉杯中辭少婦蓮花峰上訪真人子春別了韋氏也不帶從人獨自一個上了牲口徑往華山路上前去原來天下名山無如五嶽你道那五嶽中嶽嵩山東嶽泰山北嶽恆山南嶽衡山西嶽華山這五嶽都是神仙窟宅五嶽之中惟華山最高四面看來都是方的如刀斧削成一片故此俗人稱為削成山到了華山頂上別有一條小路最為艱險須要攀藤附葛而行約莫五十餘裡才是雲臺峰子春抬頭一望早見兩株檜樹青翠如蓋中間顯出一座血紅的山門門上豎著扁額乃是太上老君之祠六個老大的金字此時乃七月十五中元令節天氣尚熱況又許多山路走得子春渾身是汗連忙拭淨斂容向前頂禮仙像只見那老者走將出來比前大是不同打扮得似神仙一般但見他戴一頂玲瓏碧玉星冠被一領織錦絳綃羽衣黃絲綬腰間婉轉紅雲履足下蹣跚頦下銀須灑灑鬢邊華髮斑斑兩袖香風飄瑞靄一雙光眼露朝星那老者遙問道郎君果能不負前約遠來相訪乎子春上前納頭拜了兩拜躬身答道我這身子都是老翁再生的既蒙相約豈敢不來但不知老翁有何用我杜子春之處老者道若不用你要你沖炎冒暑來此怎的便引著子春進入老君祠後這所在乃是那老者煉藥去處子春舉目看時只見中間一所大堂堂中一座藥灶玉女九人環灶而立青龍白虎分守左右堂下一個大甕有七尺多高甕口有五尺多闊滿甕貯著清水西壁下鋪著一張豹皮老者教子春靠壁向東盤膝坐下卻去提著一壺酒一盤食來你道盤中是甚東西乃是三個白石子子春暗暗想道這硬石子怎生好吃原來煮熟的就如芋頭一般味尤甘美子春走了許多山路正在飢渴之際便把酒食都吃盡了其時紅日沈西天色傍晚那老者分付道郎君不遠千里冒暑而來所約用你去處單在於此須要安神定氣坐到天明但有所見皆非實境任他怎生樣凶險怎生樣苦毒都只忍著不可開言分付已畢自向藥灶前去卻又回頭叮囑道郎君切不可忘了我的分付便是一聲也則不得的牢記牢記子春應允剛把身子坐定鼻息調得幾口早看見一個將軍長有一丈五六頭戴鳳翅金盔身穿黃金鎧甲帶領著四五千人馬鳴鑼擊鼓訥喊搖旗擁上堂來喝問西壁下坐著的是誰總麼不回避我快通名姓子春全不答應激得將軍大怒喝教人攢箭射來也有用刀夾背斫的也有用槍當心戳的好不利害子春謹記老者分付只是忍著並不做聲那將軍沒奈何他引著兵馬也自去了金甲將軍才去又見一條大蟒蛇長可十餘丈將尾纏住子春以口相向焰焰的吐出兩個舌尖抵入鼻子孔中又見一群狼虎從頭上撲下咆哮之聲振動山谷那獠牙就如刀鋸一般鋒利遍體咬傷流血滿地又見許多凶神惡鬼都是銅頭鐵角猙獰可畏跳躍而前子春任他百般簸弄也只是忍著猛地裡又起一陳怪風刮得天昏地黑大雨如注堂下水湧起來直漫到胸前轟天的霹靂當頭打下電火四掣鬚髮都燒子春一心記著老者分付只不做聲漸漸的雷收雨息水也退去子春暗暗喜道如今天色已霽想再沒有甚麼驚嚇我了豈知前次那金甲大將軍依舊帶領人馬擁上堂來指著子春喝道你這雲臺山妖民到底不肯通名姓難道我就奈何不得你便令軍士疾去揚州擒他妻子韋氏到來説聲未畢韋氏已到按在地上先打三百殺威棒打得個皮開肉綻鮮血迸流韋氏哀叫道賤妾雖無容德奉事君子有年豈無伉儷之情乞賜一言救我性命子春暗想老者分付説是隨他所見皆非實境安知不是假的況我受老者大恩便真是妻子如何顧得並不開言激得將軍大怒遂將韋氏千刀萬剮韋氏一頭哭一頭罵只説枉做了半世夫妻忍心至此我在九泉之下誓必報冤子春只做不聽得一般將軍怒道這賊妖術已成留他何用便可一併殺了只見一個軍士手提大刀走上前來向子春頸上一揮早已身首分為兩處你看杜子春剛才掙得成家卻又死於非命豈不痛惜可憐遊魂渺渺歸何處遺業忙忙付甚人那子春頸上被斫了一刀已知身死早有夜叉在領了他魂魄竟投十地閻君殿下都道子春是個雲臺峰上妖民合該押赴酆都地獄遍受百般苦楚身軀靡爛原來被業風一吹依然如舊卻又領子春魂魄託生在宋州原任單父縣丞叫做王勘家做個女兒從小多災多病針灸湯藥無時間斷漸漸長成容色甚美只是説不出一句言語來是個啞的同鄉有個進士叫做盧圭因慕他美貌要求為妻王家推辭啞的不好相許盧圭道與我做媳婦只要有容有德豈在説話便是啞不強似長舌的卻便下了財禮迎取過門夫妻甚是相得早生下兒子已經兩歲生得眉清目秀紅的是脣白的是齒真個可愛忽一日盧圭抱著撫弄卻問王氏道你看這樣兒子生得好麼王氏笑而不答盧圭怒道我與你結髮三載未嘗肯出一聲這是明明鄙賤著我還説甚恩情那裡總要兒子何用到提著兩隻腳向石塊上只一撲可憐掌上明珠撲做一團肉醬子春卻忘記了王家啞女兒就是他的前身看見兒子被丈夫活活撲死了不勝愛惜剛叫得一個噫字豈知藥灶裡迸出一道火光連這所大堂險些燒了其時天已將明那老者忙忙向前提著子春的頭髮將他浸在水甕裡良久方才火息老者跌腳嘆道人有七情乃是喜怒懮懼愛惡欲我看你六情都盡惟有愛情未除若再忍得一刻我的丹藥已成和你都升仙了難得如此子春懊悔無地走到堂上看那藥灶時只見中間貫著手臂大一根鐵柱不知仙藥都飛在那裡去了老者脫了衣服跳入灶中把刀在鐵柱上刮得些藥末下來教子春吃了遂打發下山子春伏地謝罪説道我杜子春不才有負老師囑付如今情願跟著老師出家只望哀憐弟子收留在山上罷老者搖手道我這所在如何留得你可速回去不必多言子春道既然老師不允容弟子改過自新三年之後再來效用老者道你若修得心盡時就在家裡也好成道若修心不盡便來隨我亦有何益慎之勉之子春領命拜別下山不則一日已至揚州韋氏接著問道那老者要你去有何用處子春道不要説起是我不才負了這老翁一片美情韋氏問其緣故子春道他是個得道之人教我看守丹灶囑付不許開言豈知我一時見識不定失口叫了一個噫字把他數十年辛勤修命的丹藥都弄走了他道我再忍得一刻他的丹藥成就連我也做了神仙這不是壞了他的事連我的事也壞了以此歸來重加修省韋氏道你為甚卻道這噫字子春將所見之事細細説出夫妻不勝嗟嘆自此之後子春把天大傢俬丟在腦後日夕焚香打坐滌慮凝神一心思想神仙路上但遇孤孀貧苦之人便動千動百的捨與他雖不比當初敗廢卻也漸漸的十不存一倏忽之間又是三年一日對韋氏説道如今待要再往雲臺求見那老者超脫塵凡所餘傢俬儘著勾你用度譬如我已死不必更想念了那韋氏也是有根器的聽見子春要去絶無半點留念只説道那老者為何肯捨這許多銀子送你明明是看你有神仙之分故來點化怎麼還不省得明早要與子春餞行豈知子春這晚題下一詩留別韋氏已潛自往雲臺去了詩云驟興驟敗人皆笑旋死旋生我自驚從今撒手離塵網長嘯一聲歸白雲你道子春為何不與韋氏面別只因三年齋戒一片誠心要從揚州步行到彼恐怕韋氏差撥伴當跟隨整備車馬送他故此悄地出了門去兩隻腳上都走起繭子來方才到得華州地面上了華山徑奔老君祠下但見兩株檜樹比前越加蔥翠堂中絶無人影連那藥灶也沒些蹤迹子春嘆道一定我杜子春不該做神仙師父不來點化我了雖然如此我發了這等一個願心難道不見師父就去了不成今日死也死在這裡斷然不回去了便住在祠內草衣木食整整過了三年守那老者不見只得跪在仙像前叩頭祈告雲竊惟弟子杜子春下土愚民塵凡濁骨奔逐貨利之場迷戀身色之內蒙本師慨發慈悲指皈大道奈弟子未斷愛情難成正果遣歸修省三載如初再叩丹臺一誠不二洗心滌慮六根淨清無為養性修真萬緣去除都盡伏願道緣早啓仙馭速臨拔凡骨於塵埃開迷蹤於覺路云云子春正在神前禱祝忽然祠後走出一個人來叫道郎君你好至誠也子春聽見有人説話抬起頭來看時卻正是那老者又驚又喜向前叩頭道師父想殺我也弟子到此盼望三年怎的再不能一面老者笑道我與你朝夕不離怎説三年不見子春道師父既在此間弟子緣何從不看見老者道你且看座上神像比我如何子春連忙走近老君神像之前定睛細看果然與老者全無分別乃知向來所遇即是太上老君便伏地請罪謝道弟子肉眼怎生認得只望我師哀憐弟子早傳大道老君笑道我因怕汝處世日久塵根不一故假攝七種情緣歷歷試汝今汝心下已皆清淨又何言哉我想漢時淮南王劉安專好神仙直感得八公下界與他修合丹藥煉成之日合宅同升連那雞兒狗兒吃了鼎中藥末也得相隨而去至今雞鳴天上犬吠雲間既是你已做神仙豈有妻子偏不得道我這有神丹三丸特相授汝可留其一持歸與韋氏服之教他免墮紅塵早登紫府子春再拜受了神丹卻又稟道我弟子貧窮時節投奔長安親眷都道我是敗子並無一個慈悲我的如今弟子要同妻韋氏再往長安將城南祖居捨為太上仙祠祠中禱造丈六金身供奉香火待衆親眷聚集曉喻一番也好打破他們這重魔障不知我師可容許我弟子否老君贊道善哉善哉汝既有此心待金像鑄成之日吾當顯示神通挈汝升天未為晚也正是十年一覺揚州夢贏得人間敗子名話分兩頭卻説韋氏自子春去後卻也一心修道屏去繁華將所遺傢俬盡行布施只在一個女道士觀中投齋度日滿揚州人見他夫妻雲遊的雲遊乞丐的乞丐做出這般行徑都莫知其故忽一日子春回來遇著韋氏兩個俱是得道之人自然不言而喻便把老君所授神丹付與韋氏服了只做抄化模樣徑赴長安去投見那衆親眷呈上一個疏簿説把城南祖居捨作太上老君神廟特募黃金十萬兩銬造丈六天身供奉殿上要勸那衆親眷共結善緣其時親眷都笑道他兩次得了橫財盡皆廢敗這不必説了後次又得一大注做了人家如何三年之後白白的送與人去只他丈夫也罷了怎麼韋氏平時既不諫阻又把分撥與他用度的亦皆散捨豈不夫妻兩個都是薄福之人消受不起致有今日眼見得這座祖宅還值萬數銀子怎麼又要捨作道院別來募化黃金興鑄仙像這等癡人便是募得些些左右也被人騙去我們禮他則甚盡都閉了大門推辭不管間事子春夫妻含笑而歸那親眷們都量定杜子春夫妻斷然鑄不起金像的故此不肯上疏豈知半月之後子春卻又上門遞進一個請帖兒寫著道子春不自量力謹捨黃金六千斤鑄造老君仙像仰仗衆緣法相完成擬於明日奉像升座特備小齋啓請大德同觀勝事幸勿他辭那親眷們看見無不驚訝嘆道怎麼就出得這許多金子又怎麼鑄造得這等神速連忙差人前去打聽只見衆親眷門上和滿都城士庶人家都是同日有一個杜子春親送請帖也不知杜子春有多少身子都道這事有些蹺蹊到次日沒一個不來到得城南只見人山人海填街塞巷合城男女都來隨喜早望見門樓已都改造過了造得十分雄壯上頭寫著栲栳大金字是太上行宮四個字進了門樓只見殿宇廊廡一剗的金碧輝煌耀睛奪目儼如天宮一般再到殿上看時真個黃金鑄就的丈六天身莊嚴無比衆親眷看了無不搖首咋舌道真個他弄起恁樣大事業但不知這些金子是何處來的又見神座前擺下一大盤蔬菜一卮子酒暗暗想道這定是他辦的齋了縱便精潔無過有一兩器不消一個人便一口吃完了怎麼下個請帖要遍齋許多人衆你道好不古怪只見子春夫婦但遇著一個到金像前瞻禮的便捧過齋來請他吃些沒個不吃沒個不贊道甘美那親眷們正在驚嘆之際忽見金像頂上透了一道神光化做三朵白雲中間的坐了老君左邊坐了杜子春右邊坐了韋氏從殿上出來升到空裡約莫離地十餘丈高只見子春舉手與人衆作別説道橫眼凡民只知愛惜錢財焉知大道但恐三災橫至四大崩摧積下傢俬拋於何處可不省哉可不惜哉曉喻方畢只聽得一片笙簫仙樂響振虛空旌節導前幡蓋擁後冉冉升天而去滿城士庶無不望空合掌頂禮有詩為證千金散盡貧何惜一念皈依死不移慷慨丈夫終得道白雲朵朵上天梯
