事商量一會欲待將這靴到太師府中面質一番誠恐乾礙體面取怪不便欲待擱起不提奈事非同小可曾經過兩次當官又著落緝捕使臣拿下任一郎問過事已張揚一時糊塗過去他日事發難推不知倘聖上發怒罪責非小左思右想只得分付王觀察冉貴自去也叫人看轎著人將靴兒薄子藏在身邊同大尹徑奔一處來正是踏破鐵鞋無覓處得來全不費工夫當下太尉大尹徑往蔡太師府中門首伺候報覆多時太師叫喚入來書院中相見起居茶湯已畢太師曰這公事有些下落麼太尉道這賊已有主名了卻是乾礙太師面皮不敢擅去捉他太師道此事非同小可我卻如何護短得太尉道太師便不護短未免吃個小小驚恐太師道你且説是誰直恁地礙難太尉道乞屏去從人方敢胡言太師即時將從人趕開太尉便開了文匣將坐薄呈上與太師檢看過了便道此事須太師爺自家主裁卻不乾外人之事太師連聲道怪哉怪哉太尉道此繫緊要公務休得見怪下官太師道不是怪你卻是怪這只靴來歷不明太尉道薄上明寫著府中張乾辦定做並非謊言太師道此靴雖是張乾定造交納過了與他無涉説起來我府中冠服衣靴履襪等件各自派一個養娘分掌或是府中自製造的或是往來饋送一出一入的一一開載明白逐月繳清報數並不紊亂待我吊查底薄便見明白即便著人去查那一個管靴的養娘喚他出來當下將養娘喚至手中執著一本薄子太師問道這是我府中的靴兒如何得到他人手中即便查來當下養娘逐一查檢看得這靴是去年三月中自著人製造的到府不多幾時卻有一個門生叫做楊時便是龜山先生與太師極相厚的升了近京一個知縣前來拜別因他是道學先生衣敝履穿不甚齊整太師命取圓領一襲銀帶一圍京靴一雙川扇四柄送他作嗄程這靴正是太師送與楊知縣的果然前件開寫明白太師即便與太尉大尹看了二人謝罪道恁地又不幹太師府中之事適間言語衝撞只因公事相逼萬望太師海涵太師笑道這是你們分內的事職守當然也怪你不得只是楊龜山如何肯恁地做作其中還有緣故如今他任所去此不遠我潛地喚他來問個分曉你二人且去休説與人知道二人領命作別回府不提太師即差乾辦火速去取楊知縣來往返兩日便到京中到太師跟前茶湯已畢太師道知縣為民父母卻恁地這般做作這是迷天之罪將上項事一一説過楊知縣欠身稟道師相在上某去年承師相厚恩未及出京在邸中忽患眼痛左右傳説此間有個清源廟道二郎神極是肸蠁有靈便許下願心待眼痛痊安即往拈香答禮後來好了到廟中燒香卻見二郎神冠服件件齊整只腳下烏靴綻了不甚相稱下官即將這靴捨與二郎神供養去訖只此是真實語知縣生平不欺暗室既讀孔孟之書怎敢行盜跖之事望太師詳察太師從來曉得楊龜山是個大儒怎肯胡做聽了這篇言語便道我也曉得你的名聲只是要你來時問個根由他們才肯心服管待酒食作別了知縣自去分付休對外人泄漏知縣作別自去正是日前不作虧心事半夜敲門不吃驚太師便請過楊太尉滕大尹過來説開就裡便道恁地又不幹楊知縣事還著開封府用心搜捉便了當下大尹做聲不得仍舊領了靴兒作別回府喚過王觀察來分付道始初有些影如今都成畫餅你還領這靴去寬限五日務要捉得賊人回話當下王觀察領這差使好生愁悶便到使臣房裡對冉貴道你看我晦氣千好萬好全仗你跟究出任一郎來既是太師府中事體我只道官官相護就了其事卻如何從新又要這個人來卻不道是生菜鋪中沒買他處我想起來既是楊知縣捨與二郎神只怕真個是神道一時風流興發也不見得怎生地討個證據回復大尹冉貴道觀察不説我也曉得不幹任一郎事也不幹蔡太師楊知縣事若説二郎神所為難道神道做這等虧心行當不成一定是廟中左近妖人所為還到廟前廟後打探些風聲出來捉得著觀察休歡喜捉不著觀察也休煩惱觀察道説得是即便將靴兒與冉貴收了冉貴卻裝了一條雜貨擔兒手執著一個玲瓏琅的東西叫做個驚閨一路搖著徑奔二郎神廟中來歇了擔兒拈了香低低祝告道神明鑒察早早保佑冉貴捉了楊府做不是的也替神道洗清了是非拜罷連討了三個笤都是上上大吉冉貴謝了出門挑上擔兒廟前廟後轉了一遭兩隻眼東觀西望再也不閉看看走至一處獨扇門兒門傍卻是半窗門上挂一頂半新半舊斑竹簾兒半開半掩只聽得叫聲貨賣過來冉貴聽得叫回頭看時卻是一個後生婦人便道告小娘子叫小人有甚事婦人道你是收買雜貨的卻有一件東西在此胡亂賣幾文與小廝買嘴吃你用得也用不得冉貴道告小娘子小人這個擔兒有名的叫做百納倉無有不收的你且把出來看婦人便叫小廝拖出來與公公看當下小廝拖出什麼東西來正是鹿迷秦相應難辨蝶夢莊周未可知當下拖出來的卻正是一隻四縫皮靴與那前日潘道士打下來的一般無二冉貴暗暗喜不自勝便告小娘子此是不成對的東西不值甚錢小娘子實要許多只是不要把話來説遠了婦人道胡亂賣幾文與小廝們買嘴吃只憑你説罷了只是要公道些冉貴便去便袋裡摸一貫半錢來便交與婦人道只恁地肯賣便收去了不肯時勉強不得正是一物不成兩物見在婦人説甚麼大事再添些罷冉貴道添不得挑了擔兒就走小廝就哭起來婦人只得又叫轉冉貴來便道多少添些不打甚緊冉貴又去摸出二十文錢來道罷罷貴了貴了取了靴兒往擔內一丟挑了便走心中暗喜這事已有五分了且莫要聲張還要細訪這婦人來歷方才有下手處是晚將擔子寄與天津橋一個相識人家轉到使臣房裡王觀察來問時只説還沒有消息到次日吃了早飯再到天津橋相識人家取了擔子依先挑到那婦人門首只見他門兒鎖著那婦人不在家裡了冉貴眉頭一皺計上心來歇了擔子捱門兒看去只見一個老漢坐著個矮凳兒在門首將稻草打繩冉貴陪個小心問道伯伯借問一聲那左首住的小娘子今日往那裡去了老漢住了手抬頭看了冉貴一看便道你問他怎麼冉貴道小子是賣雜貨的昨日將錢換那小娘子舊靴一隻一時間看不仔細換得虧本了特地尋他退還討錢老漢道勸你吃虧些罷那雌兒不是好惹的他是二郎廟裡廟官孫神通的親表子那孫神通一身妖法好不利害這舊靴一定是神道替下來孫神通把與表子換些錢買果兒吃的今日那雌兒往外婆家去了他與廟官結識非止一日不知甚麼緣故有兩三個月忽然生疏近日漸漸來往了你若與他倒錢定是不肯惹毒了他對孤老説了就把妖術禁你你卻奈何他不得冉貴道原來恁地多謝伯伯指教冉貴別了老漢復身挑了擔子嘻嘻的喜容可掬走回使臣房裡來王觀察迎著問道今番想得了利市了冉貴道果然你且取出前日那只靴來我看王觀察將靴取出冉貴將自己換來這只靴比照一下毫釐不差王觀察忙問道你這靴那裡來的冉貴不慌不忙數一數二細細分剖出來我説不幹神道之事眼見得是孫神通做下的不是更不須疑王觀察歡喜的沒入腳處連忙燒了利市執杯謝了冉貴如今怎地去捉只怕漏了風聲那廝走了不是耍處冉貴道有何難哉明日備了三牲禮物只説去賽神還願到了廟中廟主自然出來迎接那時擲盞為號即便捉了不費一些氣力觀察道言之有理也還該稟知大尹方去捉人當下王觀察稟過大尹大尹也喜道這是你們的勾當只要小心在意休教有失我聞得妖人善能隱形遁法可帶些法物去卻是豬血狗血大蒜臭屎把他一灌再也出豁不得王觀察領命便去備了法物過了一夜明晨早到廟中暗地著人帶了四般法物遠遠伺候捉了人時便前來接應分付已了王觀察卻和冉貴換了衣服衆人簇擁將來到殿上拈香廟官孫神通出來接見宣讀疏文未至四五句冉貴在傍斟酒把酒盞望下一擲衆人一齊動手捉了廟官正是渾似皂雕追紫燕真如猛虎啖羊羔再把四般法物劈頭一淋廟官知道如此作用隨你潑天的神通再也動彈不得一步一棍打到開封府中來府尹聽得捉了妖人即便升廳大怒喝道叵耐這廝帝輦之下輒敢大膽興妖作怪淫污天眷姦騙寶物有何理説當下孫神通初時抵賴後來加起刑法來料道脫身不得只得從前一一招了招稱自小在江湖上學得妖法後在二郎廟出家用錢夤緣作了廟官為因當日在廟中聽見韓夫人禱告要嫁得一個丈夫一似二郎神模樣不合輒起姦心假扮二郎神模樣淫污天眷騙得玉帶一條只此是實大尹叫取大枷枷了推向獄中教禁子好生在意收管須要請旨定奪當下疊成文案先去稟明瞭楊太尉太尉即同到蔡太師府中商量奏知道君皇帝倒了聖旨下來這廝不合淫污天眷姦騙寶物準律凌遲處死妻子沒入官追出原騙玉帶尚未出笏仍歸內府韓夫人不合輒起邪心永不許入內就著楊太尉做主另行改嫁良民為婚當下韓氏好一場惶恐卻也了卻想思債得遂平生之願後來嫁得一個在京開官店的遠方客人説過不帶回去的那客人兩頭往來盡老百年而終這是後話開封府就取出廟官孫神通來當堂讀了明斷貼起一片蘆席明寫犯由判了一個剮字推出市心加刑示衆正是從前作過事沒興一齊來當日看的真是挨肩疊背監斬官讀了犯由劊子叫起惡殺都來一齊動手剮了孫神通好場熱鬧原系京師老郎傳流至今編入野史正是但存夫子三分禮不犯蕭何六尺條自古姦淫應橫死神通縱有不相饒
