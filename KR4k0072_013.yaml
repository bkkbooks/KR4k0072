body:
  text: 第十三卷勘皮靴單證二郎神柳色初濃餘寒似水纖雨如塵一陳東風縠紋微皺碧波粼粼仙娥花月精神奏鳳管鸞簫斗新萬歲聲中九霞杯內長醉芳春這首詞調寄柳梢青乃故宋時一個學士所作單表北宋太祖開基傳至第八代天子廟號徽宗便是神霄玉府虛淨宣和羽士道君皇帝這朝天子乃是江南李氏後主轉生父皇神宗天子一日在內殿看玩歷代帝王圖像見李後主鳳神體態有蟬脫穢濁神遊八極之表再三贊嘆後來便夢見李後主投身入宮遂誕生道君皇帝少時封為端王從小風流俊雅無所不能後因哥哥哲宗天子上仙群臣扶立端王為天子即位之後海內義安朝廷無事道君皇帝頗留意苑囿宣和元年遂即京城東北隅大興工役鑿池築囿號壽山銀嶽命宦官梁師成董其事又命朱面力取三吳二浙三川兩廣珍異花木瑰奇竹石以進號曰花石綱竭府庫之積聚萃天下之伎巧凡數載而始成又號為萬歲山奇花美木珍禽異獸充滿其中飛樓傑觀雄偉瑰麗不可勝言內有玉華殿保和殿瑤林殿大寧閣天真閣妙有閣層巒閣琳霄亭騫鳳垂雲亭説不盡許多景致時許侍臣蔡京王黼高俅童貫楊戩梁師成縱步遊賞時號宣和六賊有詩為證瓊瑤錯落密成林竹檜交加爾有陰恩許塵凡時縱步不知身在五雲深單説保和殿西南有一坐玉真軒乃是官家第一個寵幸安妃娘娘妝閣極是造得華麗金鋪屈曲玉檻玲瓏映徹輝煌心目俱奪時侍臣蔡京等賜宴至此留題殿壁有詩為證保和新殿麗秋輝詔許塵凡到綺闈雅宴酒酣添逸興玉真軒內看安妃不説安妃娘娘寵冠六宮單説內中有一位夫人姓韓名玉翹妙選入宮年方及笄玉珮敲磐羅裙曳雲體欺皓雪之容光臉奪芙蓉之嬌艷只因安妃娘娘三千寵愛偏在一身韓夫人不沾雨露之恩時值春光明媚景色撩人未免恨起紅茵寒生翠被月到瑤階愁莫聽其鳳管蟲吟粉壁怨不寐於鴛衾既厭曉妝漸融春思長吁短嘆看看惹下一場病來有詞為證任東風老去吹不斷淚盈盈記春淺春深春寒春暖春雨春晴都斷送佳人命落花無定挽春心芳草猶迷舞蝶緑楊空語流鶯玄霜著意搗初成回首失雲英但如醉如癡如狂如舞如夢如驚香魂至今迷戀問真仙消息最分明幾夜相逢何處清風明月蓬瀛漸漸香消玉減柳顰花困太醫院診脈吃下藥去如水澆石一般忽一日道君皇帝在於便殿敕喚殿前太尉楊戩前來天語傳宣道此位內家原是卿所進奉今著卿領去到府中將息病體等得痊安再許進宮未遲仍著光祿寺每日送膳太醫院伺候用藥略有起色即便奏來當下楊戩叩頭領命即著官身私身搬運韓夫人宮中箱籠裝奩一應動用什物器皿用暖輿抬了韓夫人隨身帶得養娘二人侍兒二人一行人簇擁著都到楊太尉府中太尉先去對自己夫人説知出廳迎接便將一宅分為兩院收拾西園與韓夫人居住門上用鎖封著只許太醫及內家人役往來太尉夫妻二人日往候安一次間時就封閉了門門傍留一轉桶傳遞飲食消息正是映階碧草自春色隔葉黃鸝空好音將及兩月漸覺容顏如舊飲食稍加太尉夫妻好生歡喜排下酒席一當起病一當送行當日酒至五巡食供兩套太尉夫婦開言道且喜得夫人貴體無事萬千之喜旦晚奏過官裡選日入宮未知夫人意下何如韓夫人叉手告太尉夫人道氏兒不幸惹下一天愁緒臥病兩月才得小可再要於此寬住幾時伏乞太尉夫人方便且未要奏知官裡只是在此打攪深為不便氏兒別有重報不敢有忘太尉夫人只得應允過了兩月卻是韓夫人設酒還席叫下一名説評話的先生説了幾回書節次説及唐朝宣宗宮內也是一個韓夫人為因不沾雨露之恩思量無計奈何偶向紅葉上題詩一首流出御溝詩曰流水何太急深宮盡日間殷勤謝紅葉好去到人間卻得外面一個應試官人名喚於佑拾了紅葉就和詩一首也從御溝中流將進去後來那官人一舉成名天子體知此事卻把韓夫人嫁與於佑夫妻百年偕老而終這裡韓夫人聽到此處驀上心來忽地嘆一口氣口中不語心下尋思若得奴家如此僥幸也不枉了為人一世當下席散收拾回房睡至半夜便覺頭痛眼熱四肢無力遍身不疼不癢無明業火熬煎依然病倒這一場病比前更加沈重正是屋漏更遭連夜雨船遲更遇打頭風太尉夫人早來候安對韓夫人説道早是不曾奏過官裡宣取入宮夫人既到此地且是放開懷抱安心調理且未要把入宮一節記挂在心韓夫人謝道感承夫人好意只是氏兒病入膏肓眼見得上天遠入地便近不能報答夫人厚恩來生當效犬馬之報説罷一絲兩氣好傷感人太尉夫人甚不過意便道夫人休如此説自古吉人天相眼下凶星退度自然貴體無事但説起來吃藥既不見效枉淘壞了身子不知夫人平日在宮可有甚願心未經答謝或者神明見責也不可知韓夫人説道氏兒入宮以來每日愁緒縈絲有甚心情許下願心但今日病勢如此既然吃藥無功不知此處有何神聖祈禱極靈氏兒便對天許下願心若得平安無事自當拜還太尉夫人説道告夫人得知此間北極佑聖真君與那清源妙道二郎神極是靈應夫人何不設了香案親口許下保安願心待得平安奴家情願陪夫人去賽神答禮未知夫人意下何如韓夫人點頭應允侍兒們即取香案過來只是不能起身就在枕上以手加額禱告道氏兒韓氏早年入宮未蒙聖眷惹下業緣病癥寄居楊府若得神靈庇護保佑氏兒身體康健情願繡下長幡二首外加禮物親詣廟廷頂禮酬謝當下太尉夫人也拈香在手替韓夫人禱告一回作別不提可霎作怪自從許下願心韓夫人漸漸平安無事將息至一月之後端然好了太尉夫婦不勝之喜又設酒起病太尉夫人對韓夫人説道果然是神道有靈勝如服藥萬倍卻是不可昧心負了所許之物韓夫人道氏兒怎敢負心目下繡了長幡還要屈夫人同去了還心願未知夫人意下如何太尉夫人答道當得奉陪當日席散韓夫人取出若干物事制辦賽神禮物繡下四首長幡自古道得好火到豬頭爛錢到公事辦憑你世間稀奇作怪的東西有了錢那一件不做出來不消幾日繡就長幡用根竹竿叉起果然是光彩奪目選了吉日良時打點信香禮物官身私身簇擁著兩個夫人先到北極佑聖真君廟中廟官知是楊府鈞眷慌忙迎接至殿上宣讀疏文挂起長幡韓夫人叩齒禮拜拜畢左右兩廊遊遍廟官獻茶夫人分付當道的賞了些銀兩上了轎簇擁回來一宿晚景不提明早又起身到二郎神廟中卻惹出一段蹊蹺作怪的事來正是情知語是鉤和線從前釣出是非來話休煩絮當下一行人到得廟中廟官接見宣疏拈香禮畢卻好太尉夫人走過一壁廂韓夫人向前輕輕將指頭挑起銷金黃羅帳幔來定睛一看不看時萬事全休看了時吃那一驚不小但見頭裹金花幞頭身穿赭衣繡袍腰系藍田玉帶足登飛鳳烏靴雖然土木形骸卻也豐神俊雅明眸皓齒但少一口氣兒説出話來當下韓夫人一見目眩心搖不覺口裡悠悠揚揚漏出一句俏語低聲的話來若是氏兒前程遠大只願將來嫁得一個丈夫恰似尊神模樣一般也足稱生平之願話猶未了恰好太尉夫人走過來説道夫人你卻在此禱告甚麼韓夫人慌忙轉口道氏兒並不曾説甚麼太尉夫人再也不來盤問遊玩至晚歸家各自安歇不提正是要知心腹事但聽口中言卻説韓夫人到了房中卸去冠服挽就烏雲穿上便服手托香腮默默無言心心念念只是想著二郎神模樣驀然計上心來分付侍兒們端正香案到花園中人靜處對天禱告若是氏兒前程遠大將來嫁得一個丈夫好像二郎尊神模樣煞強似入宮之時受千般淒苦萬種愁思説罷不覺紛紛珠淚滾下腮邊拜了又祝祝了又拜分明是癡想妄想不道有這般巧事韓夫人再三禱告已畢正待收拾回房只聽得萬花深處一聲響亮見一尊神道立在夫人面前但見龍眉鳳目皓齒鮮脣飄飄有出塵之姿冉冉有驚人之貌若非閬苑瀛洲客便是餐霞吸露人仔細看時正比廟中所塑二郎神模樣不差分毫來去手執一張彈弓又像張仙送子一般韓夫人又驚又喜驚的是天神降臨未知是禍是福喜的是神道歡容笑口又見他説出話來便向前端端正正道個萬福啓朱脣露玉齒告道既蒙尊神下降請到房中容氏兒展敬當時二郎神笑吟吟同夫人入房安然坐下夫人起居已畢侍立在前二郎神道早蒙夫人厚禮今者小神偶然間步碧落之間聽得夫人禱告至誠小神知得夫人仙風道骨原是瑤池一會中人祗因夫人凡心未靜玉帝暫謫下塵寰又向皇宮內苑享盡人間富貴榮華謫限滿時還歸紫府證果非凡韓夫人見説歡喜無任又拜禱道尊神在上氏兒不願入宮若是氏兒前程遠大將來嫁得一個良人一似尊神模樣偕老百年也不辜負了春花秋月説甚麼富貴榮華二郎神微微笑道此亦何難只恐夫人立志不堅姻緣分定自然千里相逢説畢起身跨上檻窗一聲響亮神道去了韓夫人不見便罷既然見了這般模樣真是如醉如癡和衣上床睡了正是歡娛嫌夜短寂寞恨更長番來覆去一片春心按納不住自言自語想一回定一回適間尊神降臨四目相視好不情長怎地又瞥然而去想是聰明正直為神不比塵凡心性是我錯用心機了又想一回道是適間尊神丰姿態度語笑雍容宛然是生人一般難道見了氏兒這般容貌全不動情還是我一時見不到處放了他去算來還該著意溫存便是鐵石人兒也告得轉今番錯過未知何日重逢好生擺脫不下眼巴巴盼到天明再做理會及至天明又睡著去了直到傍午方才起來當日無情無緒巴不到晚又去設了香案到花園中禱告如前若得再見尊神一面便是三生有幸説話之間忽然一聲響亮夜來二郎神又立在面前韓夫人喜不自勝將一天愁悶已冰消瓦解了即便向前施禮對景忘懷煩請尊神入房氏兒別有衷情告訴二郎神喜孜孜堆下笑來便攜夫人手共入蘭房夫人起居已畢二郎神正中坐下夫人侍立在前二郎神道夫人分有仙骨便坐不妨夫人便斜身對二郎神坐下即命侍兒安排酒果在房中一杯兩盞看看説出衷腸話來道不得個春為茶博士酒是色媒人當下韓夫人解佩出湘妃之玉開脣露漢署之香若是尊神不嫌穢褻暫息天上征輪少敘人間恩愛二郎神欣然應允攜手上床雲雨綢繆夫人傾身陪奉忘其所以盤桓至五更二郎神起身囑付夫人保重再來相看起身穿了衣服執了彈弓跨上檻窗一聲響亮便無蹤影韓夫人死心塌地道是神仙下臨心中甚喜只恐太尉夫妻催他入宮只有五分病裝做七分病間常不甚十分歡笑每到晚來精神炫耀喜氣生春神道來時三杯已過上床雲雨至曉便去非止一日忽一日天氣稍涼道君皇帝分散合宮秋衣偶思韓夫人就差內侍捧了旨意敕賜羅衣一襲玉帶一圍到於楊太尉府中韓夫人排了香案謝恩禮畢內侍便道且喜娘娘貴體無事聖上思憶娘娘故遣賜羅衣玉帶就問娘娘病勢已痊須早早進宮韓夫人管待使臣便道相煩內侍則個氏兒病體只去得五分全賴內侍轉奏寬限進宮實為恩便內侍應道這個有何妨礙聖上那裡也不少娘娘一個人入宮時只説娘娘尚未全好還須耐心保重便了韓夫人謝了內侍作別不提到得晚間二郎神到來對韓夫人説道且喜聖上寵眷未衰所賜羅衣玉帶便可借觀夫人道尊神何以知之二郎神道小神坐觀天下立見四方諒此區區小事豈有不知之理夫人聽説便一發將出來看二郎神道大凡世間寶物不可獨享小神缺少圍腰玉帶若是夫人肯捨施時便完成善果夫人便道氏兒一身已屬尊神緣分非淺若要玉帶但憑尊神將去二郎神謝了上床歡會未至五便起身手執彈弓拿了玉帶跨上檻窗一聲響亮依然去了卻不道是若要人不知除非己莫為韓夫人與太尉居止雖是一宅分為兩院卻因是內家內人早晚愈加堤防府堂深穩料然無間雜人輒敢擅入但近日來常見西園徹夜有火唧唧噥噥似有人聲息又見韓夫人精神旺相喜容可掬太尉再三躊蹰便對自己夫人説道你見韓夫人有些破綻出來麼太尉夫人説道我也有些疑影只是府中門禁甚嚴決無此事所以坦然不疑今者太尉既如此説有何難哉且到晚間著精細家人從屋上扒去打探消息便有分曉也不要錯怪了人太尉便道言之有理當下便喚兩個精細家人分付他如此如此教他不要從門內進去只把摘花梯子倚在牆外待人靜時直扒去韓夫人臥房看他動靜即來報知此事非同小可的勾當須要小心在意二人領命去了太尉立等他回報不消兩個時辰二人打看得韓夫人房內這般這般便教太尉屏去左右方才將所見韓夫人房內坐著一人説話飲酒夫人口口聲聲稱是尊神小人也仔細想來府中牆垣又高防間又密就有歹人插翅也飛不進或者真個是神道也未見得太尉聽説吃那一驚不小叫道怪哉果然有這等事你二人休得説謊此事非同小可二人答道小人並無半句虛謬太尉便道此事只許你知我知不可泄漏了消息二人領命去了太尉轉身對夫人一一説知雖然如此只是我眼見為真我明晚須親自去打探一番便看神道怎生模樣捱至次日晚間太尉復喚過昨夜打探二人來分付道你兩人著一個同我過去著一人在此伺候休教一人知道分付已畢太尉便同一人過去捏腳捏手輕輕走到韓夫人窗前向窗眼內把眼一張果然是房中坐著一尊神道與二人説不差便待聲張起來又恐難得脫身只得忍氣吞聲依舊過來分付二人休要與人胡説轉入房中對夫人説個就裡此乃必是韓夫人少年情性把不住心猿意馬便遇著邪神魍魎在此污淫天眷決不是凡人的勾當便須請法官調治你須先去對韓夫人説出緣由待我自去請法官便了夫人領命明早起身到西園來韓夫人接見坐定茶湯已過太尉夫人屏去左右對面論心便道有一句話要對夫人説知夫人每夜房中卻是與何人説話唧唧噥噥有些風聲吹至我耳朵裡只是此事非同小可夫人須一一説知不要隱瞞則個韓夫人聽説滿面通紅便道氏兒夜間房中並沒有人説話只氏兒與養娘們間話消遣卻有甚人到來這裡太尉夫人聽説便把太尉夜來所見模樣一一説過韓夫人嚇得目睜口呆罔知所措太尉夫人再三安慰道夫人休要吃驚太尉已去請法官到來作用便見他是人是鬼只是夫人到晚間務要陪個小心休要害怕説罷太尉夫人自去韓夫人到捏著兩把汗看看至晚二郎神卻早來了但是他來時那彈弓緊緊不離左右卻説這裡太尉請下靈濟宮林真人手下的徒弟有名的王法官已在前廳作法比至黃昏有人來報神道來了法官披衣仗劍昂然而入直至韓夫人房前大踏步進去大喝一聲你是何妖邪卻敢淫污天眷不要走吃吾一劍二郎神不慌不忙便道不得無禮但見左手如托泰山右手如抱嬰孩弓開如滿月彈發似流星當下一彈正中王法官額角上流出鮮血來霍地望後便倒寶劍丟在一邊衆人慌忙向前扶起往前廳去了那神道也跨上檻窗一聲響亮早已不見當時卻是怎地結果正是説開天地怕道破鬼神驚卻説韓夫人見二郎神打退了法官一發道是真仙下降愈加放心再也不慌且説太尉已知法官不濟只得到賠些將息錢送他出門又去請得五嶽觀潘道士來那潘道士專一行持五雷天心正法再不苟且又且足智多謀一聞太尉呼喚便來相見太尉免不得將前事一一説知潘道士便道先著人引領小道到西園看他出沒去處但知是人是鬼太尉道説得有理當時潘道士別了太尉先到西園韓夫人臥房上上下下看了一會又請出韓夫人來拜見了看了他氣色轉身對太尉説太尉在上小道看起來韓夫人面上部位氣色並無鬼祟相侵只是一個會妖法的人做作小道自有處置也不用書符咒水打鼓搖鈴待他來時小道甕中捉鱉手到拿來只怕他識破局面再也不來卻是無可奈何太尉道若得他再也不來便是乾淨了我師且留在此間話片時則個説話的若是這廝識局知趣見機而作恰是斷線鷂子一般再也不來落得先前受用了一番且又完名全節再去別處利市有何不美卻不道是得意之事不可再作得便宜處不可再往卻説那二郎神畢竟不知是人是鬼卻只是他嘗了甜頭不達時務到那日晚間依然又來韓夫人説道夜來氏兒一些不知冒犯尊神且喜尊神無事切休見責二郎神道我是上界真仙只為與夫人仙緣有分早晚要度夫人脫胎換骨白日飛升叵耐這蠢物便有千軍萬馬怎地近得我韓夫人愈加欽敬歡好倍常卻説早有人報知太尉太尉便對潘道士説知潘道士稟知太尉低低分付一個養娘教他只以服事為名先去偷了彈弓教他無計可施養娘去了潘道士結束得身上緊簇也不披法衣也不仗寶劍討了一根齊眉短棍只教兩個從人遠遠把火照著分付道若是你們怕他彈子來時預先躲過讓我自去看他彈子近得我麼二人都暗笑道看他説嘴少不得也中他一彈卻説養娘先去以服事為名挨挨擦擦漸近神道身邊正與韓夫人交杯換盞不堤防他偷了彈弓藏過一壁廂這裡從人引領潘道士到得門前便道此間便是丟下法官三步做兩步躲開去了卻説潘道士掀開簾子縱目一觀見那神道安坐在上大喝一聲舞起棍來匹頭匹腦一徑打去二郎神急急取那彈弓時再也不見只叫得一聲中計連忙退去跨上檻窗説時遲那時快潘道士一棍打著二郎神後腿卻