body:
  text: 第四十卷馬當神風送滕王閣山藏異寶山含秀沙有黃金沙放光好事若藏人肺腑言談語話不尋常這四句詩單説著自古至今有那一等懷才抱德韜光晦迹的文人秀才就比那奇珍異寶良金美玉藏於土泥之中一旦出世遇良工巧匠切磋琢磨方始成器故秀才二字不可亂稱秀者江山之秀才者天下之才但凡人胸中藏秀氣腹內有才識出言吐語自是一般所以謂之不尋常説話的兀的説這才學則甚因在下今日要説一樁風送滕王閣的故事那故事出在大唐高宗朝間有一秀士姓王名勃字子安祖貫山西晉州龍門人氏幼有大才通貫九經詩書滿腹時處一十三歲常隨母舅遊於江湖一日從金陵欲往九江路經馬當山下此乃九江第一險處怎見得有陸魯望馬當山銘為證山之險莫過於太行水之險莫過於呂梁合二險而為一吾又聞乎馬當王勃舟至馬當忽然風濤亂滾碧波際天雲陰罩野水響翻空那船將次傾覆滿船的人盡皆恐懼虔誠禱告江神許願保護惟有王勃端坐船上毫無懼色朗朗讀書舟人怪異問道滿船之人死在須臾今郎君全無懼色卻是為何王勃笑道我命在天豈在龍神舟人大驚道郎君勿出此言王勃道我當救此數人之命道罷遂取紙筆吟詩一首擲於水中須臾雲收霧散風浪俱息其詩曰唐聖非狂楚江淵異汨羅平生仗忠節今日任風波此時滿船人相賀道郎君奇才能動江神乃是獲安不然諸人皆不免水厄王勃道生死在天有何可避衆人深服其言少頃船皆泊岸舟人視時即馬當山也舟人皆登岸王勃上岸獨自間遊正行之間只見當道路邊青松影裡緑檜陰中見一古廟王勃向前看時上面有朱紅漆牌金篆書字寫著敕賜中原水府行宮王勃一見就身邊取筆吟詩一首於壁上詩曰馬當山下泊孤舟岸側蘆花簇翠流忽睹朱門斜半掩層層瑞氣鎖清幽詩罷走入廟中四下看時真個好座廟宇怎見得有詩為證碧瓦連雲起朱門映日開一團金作棟千片玉為街帝子親書額名人手篆碑庇民兼護國風雨應時來王勃行至神前焚香祝告已畢又賞玩江景多時正欲歸舟忽於江水之際見一老叟坐於塊石之上碧眼長眉須鬢皤然顏如瑩玉神清氣爽貌若神仙王勃見而異之乃整衣向前與老人作揖老叟道子非王勃乎王勃大驚道某與老叟素不相識亦非親舊何以知勃名姓老叟道我知之久矣王勃知老叟不是凡人隨拱手立於塊石之側老叟命勃同坐王勃不敢再三相讓方坐老叟道吾早來聞爾於船內作詩義理可觀子有如此清才何不進取身達青雲之上而困於家食受此旅況之淒涼乎王勃答道家寒窘迫缺乏盤費不能特達以此流落窮途有失青雲之望老叟道來日重陽佳節洪都閻府君欲作滕王閣記子有絶世之才何不竟往獻賦可獲資財數千且能垂名後世王勃道此到洪都有幾多路程老叟道水路共七百餘裡王勃道今已晚矣止有一夕焉能得達老叟道子但登舟我當助清風一帆使子明日早達洪都王勃再拜道敢問老丈仙耶神耶老叟道吾即中源水君適來山上之廟便是我的香火王勃大驚又拜道勃乃三尺童稚一介寒儒肉眼凡夫冒瀆尊神請勿見罪老叟道是何言也但到洪都若得潤筆之金可以分惠王勃道果有所贈豈敢自私老叟笑道吾戲言耳須臾有一舟至老叟令王勃乘之勃乃再拜辭別老叟上船方才解纜張帆但見祥風縹眇瑞氣盤旋紅光罩岸紫霧籠堤王勃駭然回視江岸老叟不知所在已失故地矣只見風聲颯颯浪勢淙淙帆開若翅展舟去似星飛回頭已失卻千山眨眼如趨百里晨雞未唱須臾忽過鄱陽漏鼓猶傳仿佛已臨江右這叫做運去雷轟薦福碑時來風送滕王閣頃刻天明船頭一望果然已到洪都王勃心下且驚且喜分付舟人只於此相等攬衣登岸徐步入城看那洪都果然好景有詩為證洪都風景最繁華仿佛參差十萬家水緑山藍花似錦連城帶閣鎖煙霞是日正九月九日王勃直詣帥府正見本府閻都督果然開宴遍請江左名儒士夫秀士俱會堂上太守開筵命坐酒果排列佳肴滿席請各處來到名儒分尊卑而坐當日所坐之人與閻公對席者乃新除濃州牧學士宇文鈞其間亦有赴任官亦有進士劉祥道張禹錫等其他文詞超絶抱玉懷珠者百餘人皆是當世名儒王勃年幼坐於座末少頃閻公起身對諸儒道帝子舊閣乃洪都絶景是以相屈諸公至此欲求大才作此滕王閣記刻石為碑以記後來留萬世佳名使不失其勝迹願諸名士勿辭為幸遂使左右朱衣吏人捧筆硯紙至諸儒之前諸人不敢輕受一個讓一個從上至下卻好輪到王勃面前王勃更不推辭慨然受之滿座之人見勃年幼卻又面生心各不美相視私語道此小子是何氏之子敢無禮如是耶此時閻公見王勃受紙心亦怏怏遂起身更衣至一小廳之內閻公口中不言自思道吾有壻乃長沙人也姓吳名子章此人有冠世之才今日邀請諸儒作此記若諸儒相讓則使吾壻作此文以光顯門庭也是何小子輒敢欺在堂名儒無分毫禮讓分付吏人觀其所作可來報知良久一吏報道南昌故郡洪都新府閻公道此乃老生常談誰人不會一吏又報道星分翼軫地接衡廬閻公道此故事也又一吏報道襟三江而帶五湖控蠻荊而引甌越閻公不語又一吏報道物華天寶龍光射鬥牛之墟人傑地靈徐孺下陳蕃之榻閻公道此子意欲與吾相見也又一吏報道雄州霧列俊彩星馳臺隍枕夷夏之邦賓主接東南之美閻公心中微動想道此子之才信亦可人數吏分馳報句閻公暗暗稱奇又一吏報道落霞與孤鶩齊飛秋水共長天一色閻公聽罷不覺以手拍幾道此子落筆若有神助真天才也遂更衣復出至座前賓主諸儒盡皆失色閻公視王勃道觀子之文乃天下奇才也欲邀勃上座王勃辭道待俚語成篇然後請教須臾文成呈上閻公公視之大喜遂令左右從上至下遍示諸儒一個個面如土色莫不驚伏不敢擬議一字其全篇刻在古文中至今為人稱誦閻公乃自攜王勃之手坐於左席道帝子之閣風流千古有子之文使吾等今日雅會亦得聞於後世從此洪都風月江山無價皆子之力也吾當厚報正説之間忽有一人離席而起高聲道是何三尺童稚將先儒遺文偽言自己新作瞞昧左右當以盜論兀自揚揚得意耶王勃聞言大驚太守閻公舉目視之乃其壻吳子章也子章道此乃舊文吾收之久矣閻公道何以知之子章道恐諸儒不信吾試念一遍當下子章遂對衆客之前朗朗而誦從頭至尾無一字差錯念畢座間諸儒失色閻公亦疑衆猶豫不決王勃聽罷顏色不變徐徐説道觀公之記問不讓楊修之學子建之能王平之閲市張松之一覽吳子章道是乃先儒舊文吾素所背誦耳王勃又道公言先儒舊文別有詩乎子章道無詩道罷王勃遂起身離席對諸儒問道此文果新文舊文乎後有詩八句諸公莫有記之者否問之再三人皆不答王勃乃拂紙如飛有如宿構其詩曰滕王高閣臨江渚玉鳴鑾罷歌舞畫棟朝飛南浦雲珠簾暮卷西山雨間雲潭影日悠悠物換星移幾度秋閣中帝子今何在檻外長江空自流詩罷呈上太守閻公並座間諸儒其壻吳子章看畢王勃道此新文舊文乎子章見之大慚惶恐而退衆賓齊起坐向閻公道王子之作性令壻之記性皆天下罕有真可謂雙璧矣閻公曰諸公之言誠然也於是吳子章與王勃互相欽敬滿座歡然飲宴至暮方散衆賓去後閻公獨留勃飲次日王勃告辭閻公乃賜五百縑及黃白酒器共值千金勃拜謝辭歸閻公使左右相送下船舟人解纜而行勃但聞水聲潺潺疾如風雨詰旦船復至馬當山下維舟泊岸王勃將閻公所贈金帛攜至廟中陳於中源水君之前叩頭稱謝起身見壁上所題之詩宛然如新遂依前韻復作詩一首好風一夜送輕舟倏忽征帆達上流深感神功知夙契來生願得伴清幽王勃題詩已畢步出南門欲買牲牢酒禮以獻看岸邊船已不見了其舟人亦不知所在正猶豫間忽然祥雲瑞靄籠罩廟堂香風起處見一老人坐於石磯之上即前日所見中源水君勃向前再拜謝道前得蒙上聖助一帆之風到於洪都使勃得獲厚利勃當備牲牢酒禮至廟下拜謝尊神以表吾心老人見説俯首而笑子適來言供備牲牢者何牢也吾聞少牢者羊大牢者牛禮諸侯無故不殺牛大夫無故不殺羊吾豈可以一帆風而受子之厚獻乎吾水府以好生為德殺生以祀吾亦不敢享也更不必費子措置適來觀子廟下留題有伴我清幽之意吾亦甚喜但子命數未終凡限未絶更俟數年吾當圖相會耳王勃遂稽首拜謝道願從尊命然勃之壽算前程可得聞乎老叟道壽算者陰府主之不敢輕泄天機而招陰禍吾言子之窮通無害也吾觀子之軀神強而骨弱氣清體羸況子腦骨虧陷目睛不全子雖有子建之才高士之俊終不能貴矣況富貴乃神主之人之一鍾一粟皆由分定何況卿相乎昔孔子大聖為帝王師範尚不免陳蔡之厄所謂秀而不實者也子但力行善事而自有天曹注福窮通壽夭皆不足計矣子切記之於是與勃作別叟行數步復又走回對王勃道吾有少意相托子若過長蘆之祠當買陰帛與我焚之王勃道此何由也老叟道吾昔負長蘆之神薄債未償子可與吾償之王勃道非勃不捨適來觀上聖殿上金錢堆積如山何不以此還之老叟道汝不知殿上之錢皆是貪利酷求之人害物私心之輩損人益己克衆成家偶一過此妄求非福神不危而心自危之所以求獻於廟此乃枉物譬如吾之贓矣焉敢用哉王勃再拜受教老叟即化清風而去王勃駭然仍攜金帛之類離馬當山趁船徑往長蘆每思神所説腦骨虧陷目睛不全終不能貴心懷怏怏不樂船至長蘆正思神叟所囑化財還債之言忽然寒風大作雪浪翻空群鴉繞船噪聲不絶其鴉或歇桅櫓或落船頭船不能進滿船人莫不驚駭畏懼王勃亦自駭然乃問舟人此是何處舟人道此是長蘆地方王勃聽了方想江神之言遂焚香默禱江神候風息上岸買金錢答還祝畢香煙未絶群鴉皆散浪息風平於是一船人莫不欣喜次日舟人以船泊岸王勃買金錢十萬下船復至夜來風起之處焚化船乃前進後來羅隱先生到此曾作八句詩道江神有意憐才子倏忽威靈助去程一夕清風雷電疾滿碑佳句雪冰清直教麗藻傳千古不但雄名動兩京不是明靈祠客洪都佳景絶無聲王勃親遠任海隅策騎往省至一驛舍欲求暫歇方詢問驛吏忽聞驛堂上一人口呼王君久不拜見今日何由至此王勃聞言大驚視之略有面善似曾相識忘其姓名只見其人道王君何忘乎昔日洪府相會學士宇文鈞也勃大喜乃整衣而揖遂邀王勃同坐敘話間命驛吏獻茶茶罷學士道某想昔日洪府之樂安知今日有海道之懮豈不悲哉王勃道學士因何至此學士道鈞纍任教授後越闕為右司諫官唐天子欲征高麗鈞直諫觸犯龍顏將鈞遷於海島千里獨行方悲寂寞何期旅邸得遇故人某有遷客詩一首為君誦之詩曰萬里為遷客孤舟泛渺芒湖田多種藕海島半收糧願遂歸秦計勞收闢瘴方每思緘口者帝德在君旁王勃道有犯無隱事君之禮學士雖為遷客直聲播於千古矣遂答詩一首詩曰食祿只懮貧何名是直臣能言真為國獲罪豈慚人海驛程程遠霜髯日日新史官如下筆應也淚沾巾當夜二人互相吟詠至半夜同宿於驛舍次日學士置酒管待王勃畢至第三日學士邀勃同行俄然天色下雨復留海驛二人談論終日不倦至第五日方始天晴二人同下海船飲食宿臥皆於一處船開數日至大洋深波之中忽然狂風怒吼怪浪波番其舟在水飄飄如一葉似欲傾覆舟人皆大恐學士宇文鈞心中大驚駭嘆道遠謫海隅不想又遭風波此實命也王勃面不改容因述昔年馬當山遇風始末並敘中源水君兩次相遇之語真個是死生有命富貴在天風波雖有不足介意談論方終卻見波濤暫息風浪不生舟人皆喜滿船之人忽聞水上仙樂飄然而至五色祥雲從天降下浮於水面看看來到王勃船邊衆人皆驚只見祥雲影裡幢幡寶蓋絳節旌旗錦衣對對繡襖攢攢花帽雙雙朱衣簇簇兩行擺開前面有數十人皆仙娥玉女仙衣灼灼玉珊珊前有一青衣女童手執碧符遂呼王勃道奉娘娘之命特來召子王勃愕然問女童道娘娘是何人也女童道乃掌天下水籍文薄上仙高貴玉女吳彩鸞便是今於蓬萊方丈翠華居止其內有馬當山水君舉子文章貫古今特來請子同往蓬萊方丈作詞文記以表蓬萊之佳景可速往不可違娘娘之命王勃道與君人神異途焉有相召之言我聞生死分定於天壽算乃陰府所主豈有玉女召我作文何召之有吾實不從道罷女童道君如不去中源水君必自至矣道猶未了只見一朵烏雲自東南角上而來看看至近到於船邊從空墜下就水面之上見一神人頭戴黃羅包巾身穿百花繡袍手仗除妖七星劍高聲大叫王勃吾奉蓬萊仙女敕召汝作文詞何不往也況中源水君亦在蓬萊赴會今衆仙等之久矣子亦有仙骨之分昔日你曾廟下題詩願伴清幽豈可忘之王勃聽言自思馬當山中源水君曾言日後遇於海島豈非前定乎遂欣然道願從命矣神人見説遂召鬼卒牽馬來至舟側王勃甚喜亦忘深淵意為平地乃回身與學士及滿船之人作別牽衣出艙望水面攀鞍上馬但見烏雲慘慘黑霧漫漫雲霄隱隱滿船之人及宇文鈞學士無不驚駭回視王勃不知所在須臾霧散雲收風恬浪靜滿船之人俱各無事唯有王勃乃作神仙去矣從來才子是神仙風送南昌豈偶然賦就滕王高閣句便隨仙仗伴中源
