瑞虹彼此相敬相愛如魚似水半年之後即懷六甲到得十月滿足生下一個孩子朱源好不喜歡寫書報知妻子光陰迅速那孩子早又周歲其年又值會試瑞虹日夜向天禱告願得丈夫黃榜題名早報蔡門之仇場後開榜朱源果中了六十五名進士殿試三甲該選知縣恰好武昌縣缺了縣官朱源就討了這個缺對瑞虹道此去仇人不遠只怕他先死了便出不得你的氣若還在時一個個拿來瀝血祭獻你的父母不怕他走上天去瑞虹道若得相公如此用心奴家死亦瞑目朱源一面差人回家接取家小在揚州伺候一同赴任一面候吏部領憑不一日領了憑限辭朝出京原來大凡吳楚之地作宦的都在臨清張家灣雇船從水路而行或徑赴任所或從家鄉而轉但從其便那一路都是下水又快又穩況帶著家小若沒有勘合腳力陸路一發不便了每常有下路糧船運糧到京交納過後那空船回去就攬這行生意假充座船請得個官員坐艙那船頭便去包攬他人貨物圖個免稅之利這也是個舊規卻説朱源同了小奶奶到臨清雇船看了幾個艙口都不稱懷只有一隻整齊中了朱源之意船頭遞了姓名手本磕頭相見管家搬行李安頓艙內請老爺奶奶下船燒了神福船頭指揮衆人開船瑞虹在艙中聽得船頭説話是淮安聲音與賊頭陳小四一般無二問丈夫什麼名字朱源查那手本寫著船頭吳金叩首姓名都不相同可知沒相干了再聽他聲口越聽越象轉展生疑放心不下對丈夫説了假託分付説話喚他近艙瑞虹閃於背後廝認其面貌又與陳小四無異只是姓名不同好生奇怪欲待盤問又沒個因繇偶然這一日朱源的座師船到過船去拜訪那船頭的婆娘進艙來拜見奶奶送茶為敬瑞虹看那婦人雖無十分顏色也有一段風流瑞虹有心問那婦人道你幾歲了那婦人答道二十九歲了又問那里人氏答道池陽人氏瑞虹道你丈夫不像個池陽人那婦人道這是小婦人的後夫瑞虹道你幾歲死過丈夫的那婦人道小婦人夫婦為運糧到此拙夫一病身亡如今這拙夫是武昌人氏原在船上做幫手喪事中虧他一力相助小婦人孤身無倚只得就從了他頂著前夫名字完這場差使瑞虹問在肚裡暗暗點頭將香帕賞他那婦人千恩萬謝的去了瑞虹等朱源下船將這話述與他聽了眼見吳金即是陳小四正是賊頭朱源道路途之間不可造次且耐著他到地方上施行還要在他身上追究餘黨瑞虹道相公所見極明只是仇人相見分外眼睜這幾日何如好過恨不得借滕王閣的順風一陳吹到武昌飲恨親冤已數年枕戈思報嘆無緣同舟敵國今相遇又隔江山路幾千卻説朱源舟至揚州那接取大夫人的還未曾到只得停泊碼頭等候瑞虹心上一發氣悶等到第三日忽聽得岸上鼎沸起來朱源叫人問時卻是船頭與岸上兩個漢子扭做一團廝打只聽得口口聲聲説道你幹得好事朱源見小奶奶氣悶正沒奈何今番且借這個機會敲那賊頭幾個板子權發利市當下喝教水手與我都拿過來原來這班水手與船頭面和意不和也有個緣故當初陳小四縊死了瑞虹棄船而逃沒處投奔流落到池陽地面偶值吳金這只糧船起運少個幫手陳小四就上了他的船見吳金老婆像個愛吃棗兒湯的豈不正中下懷一路行姦賣俏搭識上了兩個如膠似漆反多那老公礙眼船過黃河吳金害了個寒癥陳小四假意殷勤贖藥調理那藥不按君臣一服見效吳金死了婦人身邊取出私財把與陳小四只説借他的東西斷送老公過了一兩個七又推説欠債無償就將身子白白裡嫁了他雖然備些酒食暖住了衆人卻也中心不伏為此緣由所以面和意不和聽得艙裡叫一聲都拿過來蜂擁的上岸將三個人一齊扣下船來跪於將軍柱邊朱源問道為何廝打船頭稟道這兩個人原是小人合本橕船夥計因盜了資本背地逃走兩三年不見面今日天遣相逢小人與他取討他倒圖賴小人兩個來打一個望老爺與小人做主朱源道你二人怎麼説那兩個漢子道小人並沒此事都是一派胡言朱源道難道一些影兒也沒有平地就廝打起來那兩個漢子道有個緣故當初小的們雖曾與他合本橕船只為他迷戀了個婦女小的們恐誤了生意把自己本錢收起各自營運並不曾欠他分毫朱源道你兩個叫什麼名字那兩個漢子不曾開口到是陳小四先説道一個叫沈鐵甏一個叫秦小元朱源卻待再問只見背後有人扯拽回頭看時卻是丫鬟悄悄傳言説道小奶奶請老爺説話朱源走進後艙見瑞虹雙行流淚扯住丈夫衣袖低聲説道那兩個漢子的名字正是那賊頭一夥同謀打劫的人不可放他走了朱源道原來如此事到如今等不得到武昌了慌忙寫了名帖分付打轎喝叫地方將三人一串兒縛了自去拜揚州太守告訴其事太守問了備細且教把三個賊徒收監次日面審朱源回到船中衆水手已知陳小四是個強盜也把謀害吳金的情節細細稟知朱源又把這些緣繇備寫一封書帖送與太守並求究問餘黨太守看了忙出飛簽差人拘那婦人一併聽審揚州城裡傳遍了這出新聞又是強盜又是姦淫事情有婦人在內那一個不來觀看臨審之時府前好不熱鬧正是好事不出門惡事傳千里卻説太守坐堂吊出三個賊徒那婦人也提到了跪於階下陳小四看見那婆娘也到好生驚怪道這廝打小事如何連纍家屬只見太守卻不叫吳金名字竟叫陳小四吃這一驚非小凡事逃那實不過叫一聲不應再叫一聲不得不答應了太守相公冷笑一聲道你可記得三年前蔡指揮的事麼天網恢恢疏而不漏今日有何理説三個人面面相覷卻似魚膠粘口一字難開太守又問那時同謀還有李癩子白滿胡蠻二凌歪嘴餘蛤蟲巴如今在那裡陳小四道小的其時雖在那裡一些財帛也不曾分受都是他這幾個席卷而去只問他兩個便知沈鐵甏秦小元道小的雖然分得些金帛卻不像陳小四強姦了他家小姐太守已知就裡恐礙了朱源體面便喝住道不許間話只問你那幾個賊徒今在何處秦小元説當初分了金帛四散去了聞得李癩子白滿隨著山西客人販買絨貨胡蠻二凌歪嘴餘蛤蟲巴三人逃在黃州橕船過活小的們也不曾相會太守相公又叫婦人上前問道你與陳小四姦密毒殺親夫遂為夫婦這也是沒得説了婦人方欲抵賴只見階下一班水手都上前稟話如此如此這般這般説得那婦人頓口無言太守相公大怒喝教選上號毛板不論男婦每人且打四十打得皮開肉綻鮮血迸流當下録了口詞三個強盜通問斬罪那婦人問了凌遲齊上刑具發下死囚牢裡一面出廣捕挨獲白滿李癩子等太守問了這件公事親到船上答拜朱源就送審詞與看朱源感謝不盡瑞虹聞説也把愁顏放下七分又過幾日大奶奶已是接到瑞虹相見一妻一妾甚是和睦大奶奶又見兒子生得清秀愈加歡喜不一日朱源於武昌上任管事三日便差的當捕役緝訪賊黨胡蠻二等果然胡蠻二凌歪嘴在黃州江口橕船手到拿來招稱餘蛤蟲巴一年前病死白滿李癩子見跟陝西客人在省城開鋪朱源權且收監待拿到餘黨一併問罪省城與武昌縣相去不遠捕役去不多日把白滿李癩子二人一索子捆來解到武昌縣朱源取了口詞每人也打四十備了文書差的當公人解往揚州府裡以結前卷朱源做了三年縣宰治得那武昌縣道不拾遺犬不夜吠行取御史就出差淮揚地方瑞虹囑付道這班強盜在揚州獄中連歲停刑想未曾決相公到彼可了此一事就與奴家瀝血祭奠父親並兩個兄弟一以表奴家之誠二以全相公之信還有一事我父親當初曾收用一婢名喚碧蓮曾有六個月孕因母親不容就嫁出與本處一個朱裁為妻後來聞得碧蓮所生是個男兒相公可與奴家用心訪問若這個兒子還在可主張他復姓以續蔡門宗祀此乃相公萬代陰功説罷放聲大哭拜倒在地朱源慌忙扶起道你方才所説二件都是我的心事我若到彼定然不負所託就寫書信報你得知瑞虹再拜稱謝再説朱源赴任淮揚這是代天子巡狩又與知縣到任不同真個號令出時霜雪凜威風到處鬼神驚其時七月中旬未是決囚之際朱源先出巡淮安就托本處府縣訪緝朱裁及碧蓮消息果然訪著那兒子已八歲了生得堂堂一貌府縣奉了御史之命好不奉承即日香湯沐浴換了衣履送在軍衛供給申文報知察院朱源取名蔡續特為起奏一本將蔡武被禍事情備細達於聖聰蔡氏當先有汗馬功勞不可令其無後今有幼子蔡續合當歸宗俟其出幼承襲其凶徒陳小四等秋後處決聖旨準奏了其年冬月朱源親自按臨揚州監中取出陳小四與吳金的老婆共是八個一齊綁赴法場剮的剮斬的斬乾乾淨淨正是善有善報惡有惡報若還不報時辰未到朱源分付劊子手將那幾個賊徒之首用漆盤盛了就在城隍廟裡設下蔡指揮一門的靈位香花燈燭三牲祭醴把幾顆人頭一字兒擺開朱源親制祭文拜奠又於本處選高僧做七七功德超度亡魂又替蔡續整頓個家事囑付府縣青目其母碧蓮一同居住以奉蔡指揮歲時香火朱裁另給銀兩別娶諸事俱已停妥備細寫下一封家書差個得力承捨賫回家中報知瑞虹瑞虹見了書中之事已知蔡氏有後諸盜盡已受刑瀝血奠祭舉手加額感謝天地不盡是夜瑞虹沐浴更衣寫下一紙書信寄謝丈夫又去拜謝了大奶奶回房把門拴上將剪刀自刺其喉而死其書雲賤妾瑞虹百拜相公臺下虹身出武家心嫻閨訓男德在義女德在節女而不節行禽何別虹父韜韋今不戒曲蘖迷神誨盜亡身禍及母弟一時併命妾心膽俱裂浴淚彌年然而隱忍不死者以為一人之廉恥小闔門之仇怨大昔李將軍忍恥降虜欲得當以報漢妾雖女流志竊類此不幸歷遭強暴衷懷未申幸遇相公拔我於風波之中諧我以琴瑟之好識荊之日便許復仇皇天見憐宦遊早遂諸姦貫滿相次就縛而且明正典刑瀝血設饗蔡氏已絶之宗復蒙披根見本世祿復延相公之為德於衰宗者天高地厚何以喻茲妾之仇已雪而志以遂矣失節貪生貽玷閥閲妾且就死以謝蔡氏之宗於地下兒子年已六歲嫡母憐愛必能成立妾雖死之日猶生之年姻緣有限不獲面別聊寄一箋以表衷曲大奶奶知得瑞虹死了痛惜不已殯殮悉從其厚將他遺筆封固付承捨寄往任上朱源看了哭倒在地昏迷半晌方醒自此患病閉門者數日府縣都來候問朱源哭訴情繇人人墮淚俱誇瑞虹節孝今古無比不在話下後來朱源差滿回京歷官至三邊總制瑞虹所生之子名曰朱懋少年登第上疏表陳生母蔡瑞虹一生之苦乞賜旌表聖旨準奏特建節孝坊至今猶在有詩贊云報仇雪恥是男兒誰道裙叉有執持堪笑真小諒不成一事枉嗟咨
