body:
  text: 第三十六卷蔡瑞虹忍辱報仇酒可陶情適性兼能解悶消愁三杯五盞樂悠悠痛飲翻能損壽謹厚化成凶險精明變作昏流禹疏儀狄豈無由狂藥使人多咎這首詞名為西江月是勸人節飲之語今日説一位官員只因貪杯上受了非常之禍話説這宣德年間南直隸淮安府淮安衛有個指揮姓蔡名武家資富厚婢僕頗多平昔別無所好偏愛的是杯中之物若見了酒連性命也不相顧人都叫他做蔡酒鬼因這件上罷官在家不但蔡指揮會飲就是夫人田氏卻也一般善酌二人也不像個夫妻到像兩個酒友偏生奇怪蔡指揮夫妻都會飲酒生得三個兒女卻又滴酒不聞那大兒蔡韜次子蔡略年紀尚小女兒到有一十五歲生時因見天上有一條虹霓五色燦爛正環在他家屋上蔡武以為祥瑞遂取名叫做瑞虹那女子生得有十二分顏色善能描龍畫鳳刺繡拈花不獨花工伶俐且有智識才能家中大小事體到是他掌管因見父母日夕沈湎時常規諫蔡指揮那裡肯依話分兩頭且説那時有個兵部尚書趙貴當年未達時住在淮安衛間壁家道甚貧勤苦讀書夜夜直讀到雞鳴方臥蔡武的父親老蔡指揮愛他苦學時常送柴送米資助趙貴後來連科及第直做到兵部尚書思念老蔡指揮昔年之情將蔡武特升了湖廣荊襄等處遊擊將軍是一個上好的美缺特地差人將文憑送與蔡武蔡武心中歡喜與夫人商議打點擇日赴任瑞虹道爹爹依孩兒看起來此官莫去做罷蔡武道卻是為何瑞虹道做官的一來圖名二來圖利故此千鄉萬里遠去如今爹爹在家日日只是吃酒並不管一毫別事倘若到任上也是如此那個把銀子送來豈不白白裡乾折了盤纏辛苦路上還要擔驚受怕就是沒得銀子趁也只算是小事還有別樣要緊事體擔干係哩蔡武道除了沒銀子趁罷了還有甚麼干係瑞虹道爹爹你一向做官時不知見過多少了難道這樣事到不曉得那遊擊官兒在武職裡便算做美任在文官上司裡不過是個守令官不時衙門伺候東迎西接都要早起晏眠我想你平日在家單管吃酒自在慣了倘到那裡依原如此豈不受上司責罰這也還不算利害或是信地盜賊生髮差撥去捕獲或者別處地方有警調遣去出征那時不是馬上定是舟中身披甲胃手執戈矛在生死關係之際倘若一般終日吃酒豈不把性命送了不如在家安間自在快活過了日子卻去討這樣煩惱吃蔡武道常言説得好酒在心頭事在肚裡難道我真個單吃酒不管正事不成只為家中有你掌管我落得快活到了任上你替我不得時自然著急不消你擔隔夜懮況且這樣美缺別人用銀子謀乾尚不能勾如今承趙尚書一片好意特地差人送上大門我若不去做反拂了這段來意我自有主意在此你不要阻當瑞虹見父親立意要去便道爹爹既然要去把酒來戒了孩兒方才放心蔡武道你曉得我是酒養命的如何全戒得只是少吃幾杯罷遂説下幾句口號老夫性與命全靠水邊酉寧可不吃飯豈可不飲酒今聽汝忠言節飲知謹守每常十遍飲今番一加九每常飲十升今番只一斗每常一氣吞今番分兩口每常床上飲今番下地走每常到三更今番二更後再要裁減時性命不直狗且説蔡武次日即教家人蔡勇在淮關寫了一隻民座船將衣飾細軟都打疊帶去粗重家夥封鎖好了留一房家人看守其餘童僕盡隨往任所又買了許多好酒帶路上去吃擇了吉日備豬羊祭河作別親戚起身下船稍公扯起篷由揚州一路進發你道稍公是何等樣人那稍公叫做陳小四也是淮安府人年紀三十已外雇著一班水手共有七人喚做白滿李癩子沈鐵甏秦小元胡蠻二餘蛤蟲巴凌歪嘴這班人都是凶惡之徒專在河路上謀劫客商不想今日蔡武晦氣下了他的船隻陳小四起初見發下許多行李眼中已是放出火來及至家小下船又一眼瞧見瑞虹美艷心中愈加著魂暗暗算計且遠一步兒下手省得在近處容易露人眼目不一日將到黃州乃道此去正好行事了且與衆兄弟們説知走到稍上對衆水手道艙中一注大財鄉不可錯過乘今晚取了罷衆人笑道我們有心多日了因見阿哥不説起只道讓同鄉分上不要了陳小四道因一路來沒個好下手處造化他多活了這幾日衆人道他是個武官出身從人又衆不比其他須要用心陳小四道他出名的蔡酒鬼有什麼用少停等他吃酒到分際放開手砍他娘罷了只饒了這小姐我要留他做個押艙娘子商議停當少頃到黃州江口泊住買了些酒肉安排起來衆水手吃個醉飽揚起滿帆舟如箭放那一日正是十五剛到黃昏一輪明月如同白晝至一空闊之處陳小四道衆兄弟就此處罷莫向前了霎時間下篷拋錨各執器械先向前艙而來迎頭遇著一個家人那家人見勢頭來得凶險叫聲老爺不好了説時遲那時快叫聲未絶頂門上已遭一斧翻身跌倒那些家人一個個都抖衣而顫那裡動彈得被衆強盜刀砍斧切連排價殺去且説蔡武自從下船之後初時幾日酒還少吃以後覺道無聊夫妻依先大酌瑞虹勸諫不止那一晚與夫人開懷暢飲酒量已吃到九分忽聽得前艙發喊瑞虹急叫丫鬟來看那丫鬟嚇得寸步難移叫道老爺前艙殺人哩蔡奶奶驚得魂不附體剛剛立起身來衆凶徒已趕進艙蔡武兀自朦朧醉眼喝道我老爹在此那個敢沈鐵甏早把蔡武一斧砍倒衆男女一齊跪下道金銀任憑取去但求饒命衆人道兩件俱是要的陳小四道也罷看鄉里情上饒他砍頭與他個全尸罷了即教快取索子兩個奔向後艄取出索子將蔡武夫妻二子一齊綁起止空瑞虹蔡武哭對瑞虹道不聽你言致有今日聲猶未絶都攛向江中去了其餘丫鬟等婢一刀一個殺個乾淨有詩為證金印將軍酒量高緑林暴客氣雄豪無情波浪兼天湧疑是胥江起怒濤瑞虹見閣家都殺獨不害他料必然來污辱奔出艙門望江中便跳陳小四放下斧頭雙手抱住道小姐不要驚恐還你快活瑞虹大怒罵道你這班強盜害了我全家尚敢污辱我麼快快放我自盡陳小四道你這花容月貌教我如何捨得一頭説一頭抱入後艙瑞虹口中千強盜萬強盜罵不絶口衆人大怒道阿哥那裡不尋了一個妻子卻受這賤人之辱便要趕進來殺陳小四拉住道衆兄弟看我分上饒他罷明日與你陪情又對瑞虹道快些住口你若再罵時連我也不能相救瑞虹一頭哭心中暗想我若死了一家之仇那個去報且含羞忍辱待報仇之後死亦未遲方才住口跌足又哭陳小四安慰一番衆人已把尸首盡拋入江中把船揩抹乾淨扯起滿蓬又使到一個沙洲邊將箱籠取出要把東西分派陳小四道衆兄弟且不要忙趁今日十五團圓之夜待我做了親衆弟兄吃過慶喜筵席然後自由自在均分豈不美哉衆人道也説得是連忙將蔡武帶來的好酒打開幾壇將那些食物東西都安排起來團團坐在艙中點得燈燭輝煌取出蔡武許多銀酒器大家痛飲陳小四又抱出瑞虹坐在旁邊道小姐我與你郎才女貌做對夫妻也不辱抹了你今夜與我成親圖個白頭到老瑞虹掩著面只是哭衆人道我衆兄弟各人敬阿嫂一杯酒便篩過一杯送在面前陳小四接在手中拿向瑞虹口邊道多謝衆弟兄之敬你略略沾些兒瑞虹那裡采他把手推開陳小四笑道多謝列位美情待我替娘子飲罷拿起來一飲而盡秦小元道哥不要吃單杯吃個雙雙到老又送過一杯陳小四又接來吃了也篩過酒逐個答還吃了一會陳小四被衆人勸送吃到八九分醉了衆人道我們暢飲不要難為新人哥先請安置罷陳小四道既如此列位再請寬坐我不陪了抱起瑞虹取了燈火徑入後艙放下瑞虹掩上艙門便來與他解衣那時瑞虹身不由主被他解脫乾淨抱向床中任情取樂可惜千金小姐落在強徒之手暴雨摧殘嬌蕊狂風吹損柔芽那是一宵恩愛分明夙世冤家不提陳小四且説衆人在艙中吃酒白滿道陳四哥此時正在樂境了沈鐵甏道他便樂我們卻有些不樂秦小元道我們有甚不樂沈鐵甏道同樣做事他到獨占了第一件便宜明日分東西時可肯讓一些麼李癩子道你道是樂我想這一件正是不樂之處哩衆人道為何不樂李癩子道常言説的好斬草不除根萌芽依舊發殺了他一家恨不得把我們吞在肚裡方才快活豈肯安心與陳四哥做夫妻倘到人煙湊聚所在叫喊起來衆人性命可不都送在他的手裡衆人盡道説得是明日與陳四哥説明一發殺卻豈不幹淨答道陳四哥今夜得了甜頭怎肯殺他白滿道不要與陳四哥説知悄悄竟行罷李癩子道若瞞著他殺了弟兄情上就到不好開交我有個兩得其便的計兒在此趁陳四哥睡著打開箱籠將東西均分四散去快活陳四哥已受用了一個妙人多少留幾件與他後來露出事來止他自己受纍與我衆人無乾或者不出醜也是他的造化恁樣又不傷了弟兄情分又連纍我們不著可不好麼衆人齊稱道好立起身把箱籠打開將出黃白之資衣飾器皿都均分了只揀用不著的留下幾件各自收拾打了包裹把艙門關閉將船使到一個通官路所在泊住一齊上岸四散而去篋中黃白皆公器被底紅香偏得意蜜房割去別人甜狂蜂猶抱花心睡且説陳小四專意在瑞虹身上外邊衆人算計全然不知直至次日巳牌時分方才起身來看一人不見還只道夜來中酒睡著走至稍上卻又不在再到前艙去看那裡有個人的影兒驚駭道他們通往何處去了心內疑惑復走到艙中看那箱籠俱已打開逐只檢看並無一物止一隻內存些少東西並書帖之類方明白衆人分去敢怒而不敢言想道是了他們見我留著這小姐恐後事露故都悄然散去又想道我如今獨自個又行不得這船住在此又非長策到是進退兩難欲待上涯村中覓個人兒幫行到有人煙之處恐怕這小姐喊叫出來這性命便休了勢在騎虎留他不得了不如斬草除根罷提起一柄板斧搶入後艙瑞虹還在床上啼哭雖則淚痕滿面愈覺千嬌百媚那賊徒看了神蕩魂迷臂垂手軟把殺人腸子頓時熔化一柄板斧撲禿的落在地下又騰身上去捧著瑞虹淫媾可憐嫩蕊嬌花怎當得風狂雨驟那賊徒恣意輕薄了一回説道娘子我曉的你勞碌了待我去收拾些飲食與你將息跳起身往稍上打火煮飯忽地又想起道我若迷戀這女子性命定然斷送欲要殺他又不忍下手罷罷只算我晦氣棄了這船也向別處去過日倘有采頭再覓注錢財原掙個船兒依舊快活那女子留在船中有命時便遇人救了也算我一點陰騭卻又想道不好不好如不除他終久是個禍根只饒他一刀與他全尸罷煮些飯食吃飽將平日所積囊資並留下的些小東西疊成一個大包放在一邊尋了一條索子打個圈兒趕入艙來這時瑞虹恐又來淫污已是穿起衣服向著裡床垂淚思算報仇之策不堤防這賊徒來謀害説時遲那時快這賊徒奔近前左手托起頭兒右手就將索子套上瑞虹方待喊叫被他隨手扣緊盡力一收瑞虹疼痛難忍手足亂動撲的跳了幾跳直挺挺橫在床上便不動了那賊徒料是已死即放了手到外艙拿起包裹提著一根短棍跳上涯大踏步而去正是雖無並枕歡娛落得一身乾淨原來瑞虹命不該絶喜得那賊打的是個單結雖然被這一收時氣絶昏迷才放下手結就鬆開不比那吊死的越墜越緊咽喉間有了一線之隙這點氣回復透出便不致於死漸漸蘇醒只是遍體酥軟動撣不得倒像被按摩的捏了個醉楊妃光景喘了一回覺的頸下難過勉強掙起手扯開心內苦楚暗哭道阿爹當時若聽了我的言語那有今日只不知與這伙賊徒前世有甚冤業閣家遭此慘禍又哭道我指望忍辱偷生還圖個報仇雪恥不道這賊原放我不過我死也罷了但是冤沈海底安能瞑目轉思轉哭愈想愈哀正哭之間忽然稍上撲通的一聲響亮撞得這船幌上幾幌睡的床鋪險些攧翻瑞虹被這一驚哭也倒止住了側耳聽時但聞隔船人聲喧鬧打號橕篙本船不見一些聲息疑惑道這班強盜為何被人撞了船卻不開口莫非那船也是同夥又想道或者是捕盜船兒不敢與他爭論便欲喊叫又恐不能了事方在惶惑之際船倉中忽地有人大驚小怪又齊擁入後艙瑞虹還道是這班強盜暗道此番性命定然休矣只聽衆人説道不知何處官府打劫的如此乾淨人樣也不留一個瑞虹聽了這話已知不是強盜了掙扎起身高喊救命衆人趕向前看時見是美貌女子扶持下床問他被劫情由瑞虹未曾開言兩眼淚珠先下乃將父親官爵籍貫並被難始末一一細説又道列位大哥可憐我受屈無伸乞引到官司告理擒獲強徒正法也是一點陰騭衆人道原來是位小姐可惱受著苦了但我們都做主不得須請老爹來與你計較內中一個便跑去相請不多時一人跨進艙中衆人齊道老爹來也瑞虹舉目看那人面貌魁梧服飾齊整見衆人稱他老爹料必是個有身家的哭拜在地那人慌忙扶住道小姐何消行此大禮有話請起來説瑞虹又將前事細説一遍又道求老爹慨發慈悲救護我難中之人生死不忘大德那人道小姐不消煩惱我想這班強盜去還未遠即今便同你到官司呈告差人四處追尋自然逃走不脫瑞虹含淚而謝那人分付手下道事不宜遲快扶蔡小姐過船去罷衆人便來攙扶瑞虹尋過鞋兒穿起走出艙門觀看乃是一隻雙開篷頂號貨船過得船來請入艙中安息衆水手將賊船上家火東西盡情搬個乾淨方才起篷開船你道那人是誰原來姓卞名福漢陽府人氏專在江湖經商掙起一個老大家業打造這只大船衆水手俱是家人這番在下路脫了糧食裝回頭貨歸家正趁著順風行走忽地被一陳大風直打向到岸邊去稍公把舵務命推揮全然不應徑向賊船上當稍一撞見是座船恐怕拿住費嘴好生著急合船人手忙腳亂要橕開去不道又擱在淺處牽扯不動故此打號用力因見座船上沒個人影卞福以為怪異教衆水手過船來看已後聞報止有一個美女子如此如此要求搭救卞福即懷下不良之念用一片假情哄得過船便是買賣了那裡是真心肯替他伸冤理枉那瑞虹起初因受了這場慘毒正無門伸訴所以一見卞福猶如見了親人一般求他救濟又見説出那班言語便信以為真更不疑惑到得過船心定想起道此來差矣我與這客人非親非故如何指望他出力跟著同走雖承他一力當擔又未知是真是假倘有別樣歹念怎生是好方在疑慮只見卞福自去安排著佳肴美釀承奉瑞虹説道小姐你一定餓了且吃些酒食則個瑞虹想著父母那裡下得咽喉卞福坐在旁邊甜言蜜語勸了兩小杯開言道小子有一言商議不知小姐可肯聽否瑞虹道老客有甚見諭卞福道適來小子一時義憤許小姐同到官司告理卻不曾算到自己這船貨物我想那衙門之事元論不定日子的倘或牽纏半年六月事體還不能完妥貨物又不能脫去豈不兩下擔擱不如小姐且隨我回去先脫了貨物然後另換一個小船與你一齊下來理論這事就盤桓幾年也不妨得更有一件你我是個孤男寡女往來行走必惹外人談議總然彼此清白誰人肯信可不是無絲有線況且小姐舉目無親身無所歸小子雖然是個商賈家中頗頗得過若不棄嫌就此結為夫婦那時報仇之事水裡水去火裡火去包在我身上一個個緝獲來與你出氣但未知尊意若何瑞虹聽了這片言語暗自心傷簌簌的淚下想道我這般命苦又遇著不良之人只是落在他套中料難擺脫乃嘆口氣道罷罷父母冤仇事大辱身事小況已被賊人玷污總今就死也算不得貞節了且待報仇之後尋個自盡以洗污名可也躊躇已定含淚答道官人果然真心肯替奴家報仇雪恥情願相從只要發個誓願方才相信卞福得了這句言語喜不自勝連忙跪下設誓道卞福若不與小姐報仇雪恥翻江而死道罷起來分付水手就前途村鎮停泊買辦魚肉酒果之類合船吃杯喜酒到晚成就好事不則一日已至漢陽誰想卞福老婆是個拈酸的領袖吃醋的班頭卞福平昔極懼怕的不敢引瑞虹到家另尋所在安下叮囑手下人不許泄漏內中又有個請風光博笑臉的早去報知那婆娘怒氣沖天要與老公廝鬧卻又算計沒有許多間工夫淘氣倒一字不提暗地教人尋下掠販的期定日期一手交錢一手交人到了是日那婆娘把卞福灌得爛醉反鎖在房一乘轎子拾至瑞虹住處掠販的已先在彼等候隨那婆娘進去教人報知瑞虹説大娘來了瑞虹無奈只得出來相迎掠販的在旁細細一觀見有十二分顏色好生歡喜那婆娘滿臉堆笑對瑞虹道好笑官人作事顛倒既娶你來家如何又撇在此成何體面外人知得只道我有甚緣故適來把他理怨一場特地自來接你回去有甚衣飾快些收拾瑞虹不見卞福心內疑惑推辭不去那婆娘道既不願同住且去間玩幾日也見得我親來相接之情瑞虹見這句説得有理便不好推託進房整飾那婆娘一等他轉了身便與掠販的議定身價教家人在外兌了銀兩喚乘轎子哄瑞虹坐下轎夫抬起飛也似走直至江邊一個無人所在掠販的引至船邊歇下瑞虹情知中了姦計放聲號哭要跳向江中怎當掠販的兩邊扶挾不容轉動遂推入艙中打發了中人轎夫急忙解纜開船揚著滿帆而去且説那婆娘賣了瑞虹將屋中什物收拾歸去把門鎖上回到家中卞福正還酣睡那婆娘三四個把掌打醒數説一回打罵一回整整鬧了數日卞福腳影不敢出門一日捉空踅到瑞虹住處看見鎖了門戶吃了一驚詢問家人方知被老婆賣去久矣只氣得發昏章第十一那卞福只因不曾與瑞虹報仇後來果然翻江而死應了向日之誓那婆娘原是個不成才的爛貨自丈夫死後越發恣意把傢俬貼完又被姦夫拐去賣與煙花門戶可見天道好還絲毫不爽有詩為證忍恥偷生為父仇誰知姦計覓風流勸人莫設虛言誓湛湛青天在上頭再説瑞虹被掠販的納在船中一味悲號掠販的勸慰道不必啼泣還你此去豐衣足食自在快活強如在卞家受那大老婆的氣瑞虹也不理他心內暗想欲待自盡怎奈大仇未報將為不死便成淫蕩之人躊躇千百萬遍終是報仇心切只得寧耐看個居止下落再作區處行不多路已是天晚泊船掠販的逼他同睡瑞虹不從和衣縮在一邊掠販的便來摟抱瑞虹亂喊殺人掠販的恐被鄰船聽得弄出事來放手不迭再不敢去纏他徑載到武昌府轉賣與樂戶王家那樂戶家裡先有三四個粉頭一個個打扮的喬喬畫畫傅粉塗脂倚門賣俏瑞虹到了其家看見這般做作轉加苦楚又想道我今落在煙花地面報仇之事已是絶望還有何顏在世遂立意要尋死路不肯接客偏又作怪但是瑞虹走這條門路就有人解救不致傷身樂戶與鴇子商議道他既不肯接客留之何益倘若三不知做出把戲倒是老大利害不如轉貨與人另尋個罷常言道事有湊巧物有偶然恰好有一紹興人姓胡名悅因武昌太守是他親戚特來打抽豐倒也作成尋覓了一大注錢財那人原是貪花戀酒之徒住的寓所近著妓家間時便去串走也曾見過瑞虹是個絶色麗人心內著迷幾遍要來入馬因是瑞虹尋死覓活不能到手今番聽得樂戶有出脫的消息情願重價娶為偏房也是有分姻緣一説就成胡悅娶瑞虹到了寓所當晚整備著酒肴與瑞虹敘情那瑞虹只是啼哭不容親近胡悅再三勸慰不止到沒了主意説道小娘子你在娼家或者道是賤事不肯接客今日與我成了夫婦萬分好了還有甚苦情只管悲慟你且説來若有疑難事體我可以替你分懮解悶倘事情重大這府中太爺是我舍親就轉托他與你料理何必自苦如此瑞虹見他説話有些來歷方將前事一一告訴又道官人若能與奴家尋覓仇人報冤雪恥莫説得為夫婦便做奴婢亦自甘心説罷又哭胡悅聞言答道原來你是好人家子女遭此大難可憐可憐但這事非一時可畢待我先教舍親出個廣捕到處挨緝一面同你到淮安告官拿衆盜家屬追比自然有個下落瑞虹拜倒在地道若得官人如此用心生生世世銜結報效胡悅扶起道既為夫婦事同一體何必出此言遂攜手入寢那知胡悅也是一片假情哄騙過了幾日只説已托太守出廣捕緝獲去了瑞虹信以為實千恩萬謝又住了數日雇下船隻打疊起身正遇著順風順水那消十日早至鎮江另雇小船回家把瑞虹的事擱過一邊毫不提起瑞虹大失所望但到此地位無可奈何遂吃了長齋日夜暗禱天地要求報冤在路非止一日已到家中胡悅老婆見娶個美人回來好生妒忌時常廝鬧瑞虹總不與他爭論也不要胡悅進房這婆娘方才少解原來紹興地方慣做一項生意凡有錢能幹的便到京中買個三考吏名色鑽謀好地方選一個佐二官出來俗名喚做飛過海怎麼叫做飛過海大凡吏員考滿依次選去不知等上幾年若用了錢乙選在別人前面指日便得做官這謂之飛過海還有獨自無力四五個合做夥計一人出名做官其餘坐地分贓到了任上先備厚禮結好堂官叨攬事管些小事體經他衙裡少不得要詐一兩五錢到後覺道聲息不好立腳不住就悄地桃之夭夭十個裡邊難得一兩個來去明白完名全節所以天下衙官大半都出紹興那胡悅在家住了年餘也思量到京乾這樁事體更兼有個相知見在當道寫書相約有扶持他的意思一發喜之不勝即便處置了銀兩打點起程單慮妻妾在家不睦與瑞虹計議要帶他同往許他謀選彼處地方訪覓強盜蹤迹瑞虹已被騙過一次雖然不信也還希冀出外行走或者有個機會情願同去胡悅老婆知得翻天作地與老公相打相罵胡悅全不作準擇了吉日雇得船隻同瑞虹徑自起身一路無話直至京師尋寓所安頓了瑞虹次日整備禮物去拜那相知官員誰想這官人一月前暴病身亡閣家慌亂打點扶柩歸鄉胡悅沒了這個倚靠身子就酥了半邊思想銀子帶得甚少相知又死這官職怎能弄得到手欲待原復歸去又恐被人笑恥事在兩難狐疑未決尋訪同鄉一個相識商議這人也是走那道兒的正少了銀兩不得完成遂設計哄騙胡悅包攬替他圖個小就設或短少尋人借債胡悅合該晦氣被他花言巧語説得熱鬧將所帶銀兩一包兒遞與那人把來完成了自己官職悄地一溜煙徑赴任去了胡悅止剩得一雙空手日逐時需漸漸欠缺寄書回家取索盤纏老婆正惱著他那肯應付分文自此流落京師逐日東走西撞與一班京花子合了夥計騙人財物一日商議要大大尋一注東西但沒甚為由卻想到瑞虹身上要把來認作妹子做個美人局算計停當胡悅又恐瑞虹不肯生出一段説話哄他道我向日指望到此選得個官職與你去尋訪仇人不道時運乖蹇相知已死又被那天殺的騙去銀兩淪落在此進退兩難欲待回去又無處設法盤纏昨日與朋友們議得個計策到也盡通瑞虹道是甚計策胡悅道只説你是我的妹子要與人為妾倘有人來相看你便見他一面等哄得銀兩到手連夜悄然起身他們那裡來尋覓順路先到淮安送你到家訪問強徒也了我心上一件未完事瑞虹初時本不欲得次後聽説順路送歸家去方才許允胡悅討了瑞虹一個肯字歡喜無限教衆光棍四處去尋主顧正是安排地網天羅計專待落坑墮塹人話分兩頭卻説浙江溫州府有一秀士姓朱名源年紀四旬以外尚無子嗣娘子幾遍勸他取個偏房朱源道我功名淹蹇無意於此其年秋榜高登到京會試誰想福分未齊春闈不第羞歸故里與幾個同年