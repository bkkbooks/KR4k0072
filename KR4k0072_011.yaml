body:
  text: 第十一卷蘇小妹三難新郎聰明男子做公卿女子聰明不出身若許裙叉應科舉女兒那見遜公卿自混沌初闢乾道成男坤道成女雖則造化無私卻也陰陽分位陽動陰靜陽施陰受陽外陰內所以男子主四方之事女子主一室之事主四方之事的頂冠束帶謂之丈夫出將入相無所不為須要博古通今達權知變主一室之事的三綹梳頭兩截穿衣一日之計止無過饔飧井臼終身之計止無過生男育女所以大家閨女雖曾讀書識字也只要他識些姓名記些帳目他又不應科舉不求名譽詩文之事全不相干然雖如此各人資性不同有等愚蠢的女子教他識兩個字如登天之難有等聰明的女子一般過目成誦不教而能吟詩與李杜爭強作賦與班馬爭勝這都是山川秀氣偶然不鍾於男而鍾於女且如漢有曹大家他是個班固之妹代兄續成漢史又有個蔡琰制胡笳十八拍流傳後世晉時有個謝道韞與諸兄詠雪有柳絮隨風之句諸兄都不及他唐時有個上官婕妤中宗皇帝教他品第朝臣之詩臧否一一不爽至於大宋婦人出色的更多就中單表一個叫作李易安一個叫作朱淑真他兩個都是閨閣文章之伯女流翰苑之才論起相女配夫也該對個聰明才子爭奈月下老錯注了婚籍都嫁了無才無學之人每每怨恨之情形於筆札有詩為證鷗鷺鴛鴦作一池曾知羽翼不相宜東君不與花為主何似休生連理枝那李易安有傷秋一篇調寄聲聲慢尋尋覓覓冷冷清清淒淒慘慘戚戚乍暖還寒時候正難將息三杯兩盞淡酒怎敵他晚來風力雁過也總傷心卻是舊時相識滿地黃花堆積憔悴損如今有誰杴摘守著窗兒獨自怎生得黑梧桐更兼細雨到黃昏點點滴滴這次第怎一個愁字了得朱淑真時值秋間丈夫出外燈下獨坐無聊聽得窗外雨聲滴點吟成一絶哭損雙眸斷盡腸怕黃昏到又昏黃那堪細雨新秋夜一點殘燈伴夜長後來刻成詩集一卷取名斷腸集説話的為何單表那兩個嫁人不著的只為如今説一個聰明女子嫁著一個聰明的丈夫一唱一和遂變出若干的話文正是説來文士添佳興道出閨中作美談話説四川眉州古時謂之蜀郡又曰嘉州又曰眉山山有蟆順峨眉水有岷江環湖山川之秀鍾於人物生出個博學名儒來姓蘇名洵字允明別號老泉當時稱為老蘇老蘇生下兩個孩兒大蘇小蘇大蘇名軾字子瞻別號東坡小蘇名轍字子由別號穎濱兩子都有文經武緯之才博古通今之學同科及第名重朝廷俱拜翰林學士之職天下稱他兄弟謂之二蘇稱他父子謂之三蘇這也不在話下更有一樁奇處那山川之秀偏萃於一門兩個兒子未為希罕又生個女兒名曰小妹其聰明絶世無雙真個聞一知二問十答十因他父兄都是個大才子朝談夕講無非子史經書目見耳聞不少詩詞歌賦自古道近朱者赤近墨者黑況且小妹資性過人十倍何事不曉十歲上隨父兄居於京師寓中有繡球花一樹時當春月其花盛開老泉賞玩了一回取紙筆題詩才寫得四句報説門前客到老泉擱筆而起小妹間步到父親書房之內看見卓上有詩四句天巧玲瓏玉一丘迎眸爛熳總清幽白雲疑向枝間出明月應從此處留小妹覽畢知是詠繡球花所作認得父親筆迹遂不待思索續成後四句雲瓣瓣折開蝴蝶翅團團圍就水晶球假饒借得香風送何羡梅花在隴頭小妹題詩依舊放在卓上款步歸房老泉送客出門復轉書房方欲續完前韻只見八句已足讀之詞意俱美疑是女兒小妹之筆呼而問之寫作果出其手老泉嘆道可惜是個女子若是個男兒可不又是制科中一個有名人物自此愈加珍愛其女恣其讀書博學不復以女工督之看看長成一十六歲立心要妙選天下才子與之為配急切難得忽一日宰相王荊公著堂候官請老泉到府與之敘話原來王荊公諱安石字介甫未得第時大有賢名平時常不洗面不脫衣身上虱子無數老泉惡其不近人情異日必為姦臣曾作辨姦論以飢之荊公懷恨在心後來見他大蘇小蘇連登制科遂捨怨而修好老泉亦因荊公拜相恐妨二子進取之路也不免曲意相交正是古人結交在意氣今人結交為勢利從來勢利不同心何如意氣交情深是日老泉赴荊公之召無非商量些今古談論了一番時事遂取酒對酌不覺忘懷酩酊荊公偶然誇能小兒王雱讀書只一遍便能背誦老泉帶酒答道誰家兒子讀兩遍荊公道到是老夫失言不該班門弄斧老泉道不惟小兒只一遍就是小女也只一遍荊公大驚道只知令郎大才卻不知有令愛眉山秀氣盡屬公家矣老泉自悔失言連忙告退荊公命童子取出一卷文字遞與老泉道此乃小兒王雱窗課相煩點定老泉納於袖中唯唯而出回家睡至半夜酒醒想起前事不合自誇女孩兒之才今介甫將兒子窗課屬吾點定必為求親之事這頭親事非吾所願卻又無計推辭沈吟到曉梳洗已畢便將王雱所作次第看之真乃篇篇錦繡字字珠璣又不覺動了個愛才之意但不知女兒緣分如何我如今將這文卷與女兒觀之看他愛也不愛遂隱下姓名分付丫鬟道這卷文字乃是個少年名士所呈求我點定我不得間暇轉送與小姐教他到批閲完時速來回話丫鬟將文字呈上小姐傳達太老爺分付之語小妹滴露研朱從頭批點須臾而畢嘆道好文字此必聰明才子所作但秀氣泄盡華而不實恐非久長之器遂於卷面批雲新奇藻麗是其所長含蓄雍容是其所短取巍科則有餘享大年則不足後來王雱十九歲中了頭名狀元未幾夭亡可見小妹知人之明這是後話卻説小妹寫罷批語叫丫鬟將文卷納還父親老泉一見大驚這批語如何回復得介甫必然取怪一時污損了卷面無可奈何卻好堂候官到門奉相公鈞旨取昨日文卷面見太爺還有話稟老泉此時手足無惜只得將卷面割去重新換過加上好批語親手交堂候官收訖堂候官道相公還分付得有一言動問貴府小姐曾許人否倘未許人相府願諧秦晉老泉道相府議親老夫豈敢不從只是小女貌丑恐不足當金屋之選相煩好言達上但訪問自知並非老夫推託堂候官領命回復荊公荊公看見卷面換了已有三分不悅又恐怕蘇小姐容貌真個不揚不中兒子之意密地差人打聽原來蘇東坡學士常與小妹互相嘲戲東坡是一嘴鬍子小妹嘲云口角幾回無覓處忽聞毛裡有聲傳小妹額顱凸起東坡答嘲云未出庭前三五步額頭先到畫堂前小妹又嘲東坡下頦之長雲去年一點相思淚至今流不到腮邊東坡因小妹雙眼微摳復答云幾回拭臉深難到留卻汪汪兩道泉訪事的得了此言回復荊公説蘇小姐才調委實高絶若論容貌也只平常荊公遂將姻事擱起不提然雖如此卻因相府求親一事將小妹才名播滿了京城以後聞得相府親事不諧慕名來求者不計其數老泉都教呈上文字把與女孩兒自閲也有一筆塗倒的也有點不上兩三句的就中只有一卷文字做得好看他卷面寫有姓名叫做秦觀小妹批四句雲今日聰明秀才他年風流學士可惜二蘇同時不然橫行一世這批語明説秦觀的文才在大蘇小蘇之間除卻二蘇沒人及得老泉看了已知女兒選中了此人分付門上但是秦觀秀才來時快請相見餘的都與我辭去誰知衆人呈卷的都在討信只有秦觀不到卻是為何那秦觀秀才字少遊他是揚州府高郵人腹飽萬言眼空一世生平敬服的只有蘇家兄弟以下的都不在意今日慕小妹之才雖然玉求售又怕損了自己的名譽不肯隨行逐隊尋消問息老泉見秦觀不到反央人去秦家寓所致意少遊心中暗喜又想道小妹才名得於傳聞未曾面試又聞得他容貌不揚額顱凸出眼睛凹進不知是何等鬼臉如何得見他一面方才放心打聽得三月初一日要在嶽廟燒香趁此機會改換衣裝覷個分曉正是眼見方為的傳聞未必真若信傳聞語枉盡世間人從來大人家女眷入廟進香不是早定是夜為甚麼早則人未來夜則人已散秦少遊到三月初一日五更時分就起來梳洗打扮個遊方道人模樣頭裹青布唐巾耳後露兩個石碾的假玉環兒身穿皂布道袍腰系黃絛足穿淨襪草履項上挂一串拇指大的數珠手中托一個金漆鉢盂侵早就到東嶽廟前伺候天色黎明蘇小姐轎子已到少遊走開一步讓他轎子入廟歇於左廊之下小妹出轎上殿少遊已看見了雖不是妖嬈美麗卻也清雅幽間全無俗韻但不知他才調真正如何約莫焚香已畢少遊卻循廊而上在殿左相遇少遊打個問訊雲小姐有福有壽願發慈悲小妹應聲答云道人何德何能敢求布施少遊又問訊雲願小姐身如藥樹百病不生小妹一頭走一頭答應隨道人口吐蓮花半文無捨少遊直跟到轎前又問訊雲小娘子一天歡喜如何撒手寶山小妹隨口又答雲風道人恁地貪癡那得隨身金穴小妹一頭説一頭上轎少遊轉身時口中喃出一句道風道人得對小娘子萬千之幸小妹上了轎全不在意跟隨的老院子卻聽得了怪這道人放肆方欲回身尋鬧只見廊下走出一個垂髫的俊童對著那道人叫道相公這裡來更衣那道人便先走童兒後隨老院子將童兒肩上悄地捻了一把低聲問道前面是那個相公童兒道是高郵秦少遊相公老院子便不言語回來時就與老婆説知了這句話就傳入內裡小妹才曉得那化緣的道人是秦少遊假妝的付之一笑囑付丫鬟們休得多口話分兩頭且説秦少遊那日飽看了小妹容貌不醜況且應答如響其才自不必言擇了吉日親往求親老泉應允少不得下財納幣此是二月初旬的事少遊急欲完婚小妹不肯他看定秦觀文字必然中選試期已近欲要象簡烏紗洞房花燭少遊只得依他到三月初三禮部大試之期秦觀一舉成名中了制科到蘇府來拜丈人就稟復完婚一事因寓中無人欲就蘇府花燭老泉笑道今日挂榜脫白挂緑便是上吉之日何必另選日子只今晚便在小寓成親豈不美哉東坡學士從傍贊成是夜與小妹雙雙拜堂成就了百年姻眷正是聰明女得聰明壻大登科後小登科其夜月明如晝少遊在前廳筵宴已畢方欲進房只見房門緊閉庭中擺著小小一張卓兒卓上排列紙墨筆硯三個封兒三個盞兒一個是玉盞一個是銀盞一個瓦盞青衣小鬟守立旁邊少遊道相煩傳語小姐新郎已到何不開門丫鬟道奉小姐之命有三個題目在此三試俱中式方準進房這三個紙封兒便是題目在內少遊指著三個盞道這又是甚的意思丫鬟道那玉盞是盛酒的那銀盞是盛茶的那瓦盞是盛寡水的三試俱中玉盞內美酒三杯請進香房兩試中了一試不中銀盞內清茶解渴直待來宵再試一試中了兩試不中瓦盞內呷口淡水罰在外廂讀書三個月少遊微微冷笑道別個秀才來應舉時就要告命題容易了下官曾應過制科青錢萬選莫説三個題目就是三百個我何懼哉丫鬟道俺小姐不比平常盲試官之乎者也應個故事而已他的題目好難哩第一題是絶句一首要新郎也做一首合了出題之意方為中式第二題四句詩藏著四個古人猜得一個也不差方為中式到第三題就容易了止要做個七字對兒對得好便得飲美酒進香房了少遊道請第一題丫鬟取第一個紙封拆開請新郎自看少遊看時封著花箋一幅寫詩四句道銅鐵投洪冶螻蟻上粉牆陰陽無二義天地我中央少遊想道這個題目別人做定猜不著則我曾假扮做雲遊道人在嶽廟化緣去相那蘇小姐此四句乃含著化緣道人四字明明嘲我遂於月下取筆寫詩一首於題後雲化工何意把春催緣到名園花自開道是東風原有主人人不敢上花臺丫鬟見詩完將第一幅花箋折做三疊從窗隙中塞進高叫道新郎交卷第一場完小妹覽詩每句頂上一字合之乃化緣道人四字微微而笑少遊又開第二封看之也是花箋一幅題詩四句強爺勝祖有施為鑿壁偷光夜讀書縫線路中常憶母老翁終日倚門閭少遊見了略不凝思一一注明第一句是孫權第二句是孔明第三句是子思第四句是太公望丫鬟又從窗隙遞進少遊口雖不語心下想道兩個題目眼見難我不倒第三題是個對兒我五六歲時便會對句不足為難拆開第三幅花箋內出對雲閉門推出窗前月初看時覺道容易仔細想來這對出得盡巧若對得平常了不見本事左思右想不得其對聽得譙樓三鼓將闌構思不就愈加慌迫卻説東坡此時尚未曾睡且來打聽妹夫消息望見少遊在庭中團團而步口裡只管吟哦閉門推出窗前月七個字右手做推窗之勢東坡想道此必小妹以此對難之少遊為其所困矣我不解圍誰為撮合急切思之亦未有好對庭中有花缸一隻滿滿的貯著一缸清水少遊步了一回偶然倚缸看水東坡望見觸動了他靈機道有了欲待教他對了誠恐小妹知覺連纍妹夫體面不好看相東坡遠遠站著咳嗽一聲就地下取小小磚片投向缸中那水為磚片所激躍起幾點撲在少遊面上水中天光月影紛紛淆亂少遊當下曉悟遂援筆對雲投石沖開水底天丫鬟交了第三遍試卷只聽呀的一聲房門大開內又走出一個侍兒手捧銀壺將美酒斟於玉盞之內獻上新郎口稱才子請滿飲三杯權當花紅賞勞少遊此時意氣揚揚連進三盞丫鬟擁入香房這一夜佳人才子好不稱意正是歡娛嫌夜短寂寞恨更長自此夫妻和美不在話下後少遊宦遊浙中東坡學士在京小妹思想哥哥到京省視東坡有個禪友叫做佛印禪師嘗勸東坡急流勇退一日寄長歌一篇東坡看時卻也寫得怪異每二字一連共一百三十對字你道寫的是甚字野野鳥鳥啼啼時時有有思思春春氣氣桃桃花花發發滿滿枝枝鶯鶯雀雀相相呼呼喚喚岩岩畔畔花花紅紅似似錦錦屏屏堪堪看看山山秀秀麗麗山山前前煙煙霧霧起起清清浮浮浪浪促促潺潺湲湲水水景景幽幽深深處處好好追追遊遊傍傍水水花花似似雪雪梨梨花花光光皎皎潔潔玲玲瓏瓏似似墜墜銀銀花花折折最最好好柔柔茸茸溪溪畔畔草草青青雙雙蝴蝴蝶蝶飛飛來來到到落落花花林林裡裡鳥鳥啼啼叫叫不不休休為為憶憶春春光光好好楊楊柳柳枝枝頭頭春春色色秀秀時時常常共共飲飲春春濃濃酒酒似似醉醉間間行行春春色色裡裡相相逢逢競競憶憶遊遊山山水水心心息息悠悠歸歸去去來來休休役役東坡看了兩三遍一時念將不出只是沈吟小妹取過一覽瞭然便道哥哥此歌有何難解待妹妹念與你聽即時朗誦云野鳥啼野鳥啼時時有思有思春氣桃花發春氣桃花發滿枝滿枝鶯雀相呼喚鶯雀相呼喚岩畔岩畔花紅似錦屏花紅似錦屏堪看堪看山山秀麗秀麗山前煙霧起山前煙霧起清浮清浮浪促潺湲水浪促潺湲水景幽景幽深處好深處好追遊追遊傍水花傍水花似雪似雪梨花光皎潔梨花光皎潔玲瓏玲瓏似墜銀花折似墜銀花折最好最好柔茸溪畔草柔茸溪畔草青青雙雙蝴蝶飛來到蝴蝶飛來到落花落花林裡鳥啼叫林裡鳥啼叫不休不休為憶春光好為憶春光好楊柳楊柳枝枝春色秀春色秀時常共飲時常共飲春濃酒春濃酒似醉似醉間行春色裡間行春色裡相逢相逢競憶遊山水競憶遊山水心息心息悠悠歸去來歸去來休休役役東坡聽念大驚道吾妹敏悟吾所不及若為男子官位必遠勝於我矣遂將佛印原寫長歌並小妹所定句讀都寫出來做一封兒寄與少遊因述自己再讀不解小妹一覽而知之故少遊初看佛印所書亦不能解後讀小妹之句如夢初覺深加愧嘆答以短歌云未及梵僧歌詞重而意復字字如聯珠行行如貫玉想妝惟一覽顧我勞三復裁詩思遠寄因以真類觸汝其審思之可表豫心曲短歌後製成疊字詩一首卻又寫得古怪憶別離時聞漏轉期歸阻久伊思靜少遊書信到時正值東坡與小妹在湖上看采蓮東坡先拆書看了遞與小妹問道汝能解否小妹道此詩乃倣佛印禪師之體也即念云靜思伊久阻歸期久阻歸期憶別離憶別離時聞漏轉時聞漏轉靜思伊東坡嘆道吾妹真絶世聰明人也今日采蓮勝會可即事各和一首寄與少遊使知你我今日之遊東坡詩成小妹亦就小妹詩云一闋新歌聲嗽玉津楊緑在人蓮采東坡詩云酒力微醒時已暮飛如馬去歸花賞照少遊詩念出小妹疊字詩道是采蓮人在緑楊津在緑楊津一闋新一闋新歌聲嗽玉歌聲嗽玉采蓮人東坡疊字詩道是賞花歸去馬如飛去馬如飛酒力微酒力微醒時已暮醒時已暮賞花歸二詩寄去少遊讀罷嘆賞不已其夫婦酬和之詩甚多不能詳述後來少遊以才名被徵為翰林學士與二蘇同官一時郎舅三人並居史職古所希有於是宣仁太后亦聞蘇小妹之才每每遣內官賜以絹帛或飲饌之類索他題詠每得一篇宮中傳誦聲播京都其後小妹先少遊而卒少遊思念不置終身不復娶雲有詩為證文章自古説三蘇小妹聰明勝丈夫三難新郎真異事一門秀氣世間無
