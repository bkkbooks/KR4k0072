body:
  text: 第三十三卷十五貫戲言成巧禍聰明伶俐自天生懵懂癡呆未必真嫉妒每因眉睫淺戈矛時起笑談深九曲黃河心較險十重鐵甲面堪憎時因酒色亡家國幾見詩書誤好人這首詩單表為人難處只因世路窄狹人心叵測大道既遠人情萬端熙熙攘攘都為利來蚩蚩蠢蠢皆納禍去持身保家萬千反覆所以古人云顰有為顰笑有為笑顰笑之間最宜謹慎這回書單説一個官人只因酒後一時戲笑之言遂至殺身破家陷了幾條性命且先引下一個故事來權做個德勝頭回卻説故宋朝中有一個少年舉子姓魏名鵬舉字衝霄年方一十八歲娶得一個如花似玉的渾家未及一月只因春榜動選場開魏生別了妻子收拾行囊上京取應臨別時渾家分付丈夫得官不得官蚤蚤回來休拋閃了恩愛夫妻魏生答道功名二字是俺本領前程不索賢卿懮慮別後登程到京果然一舉成名除授一甲第二名榜眼及第在京甚是華艷動人少不得修了一封家書差人接取家眷入京書上先敘了寒溫及得官的事後卻寫下一行道是我在京中早晚無人照管已討了一個小老婆專候夫人到京同享榮華家人收拾書程一徑到家見了夫人稱説賀喜因取家書呈上夫人拆開看了見是如此如此這般這般便對家人道官人直恁負恩甫能得官便娶了二夫人家人便道小人在京並沒見有此事想是官人戲謔之言夫人到京便知端的休得懮慮夫人道恁地説我也罷了卻因人舟未便一面收拾起身一面尋覓便人先寄封平安家書到京中去那寄書人到了京中尋問新科魏榜眼寓所下了家書管待酒飯自回不提卻説魏生接書拆開來看了並無一句間言間語只説道你在京中娶了一個小老婆我在家中也嫁了一個小老公早晚同赴京師也魏生見了也只道是夫人取笑的説話全不在意未及收好外面報説有個同年相訪京邸寓中不比在家寬轉那人又是相厚的同年又曉得魏生並無家眷在內直到裡面坐下敘了些寒溫魏生起身去解手那同年偶翻桌上書帖看見了這封家書寫得好笑故意朗誦起來魏生措手不及通紅了臉説道這是沒理的事因是小弟戲謔了他他便取笑寫來的那同年呵呵大笑道這節事卻是取笑不得的別了就去那人也是一個少年喜談樂道把這封家書一節頃刻間遍傳京邸也有一班妒忌魏生少年登高科的將這樁事只當做風聞言事的一個小小新聞奏上一本説這魏生年少不檢不宜居清要之職降處外任魏生懊恨無及後來畢竟做官蹲蹬不起把錦片也似一段美前程等間放過去了這便是一句戲言撒漫了一個美官今日再説一個官人也只為酒後一時戲言斷送了堂堂七尺之軀連纍三個人枉屈害了性命卻是為著甚的有詩為證世路崎嶇實可哀傍人笑口等間開白雲本是無心物又被狂風引出來卻説南宋時建都臨安繁華富貴不減那汴京故國去那城中箭橋左側有個官人姓劉名貴字君薦祖上原是有根基的人家到得君薦手中卻是時乖運蹇先前讀書後來看看不濟卻去改業做生意便是半路上出家的一般買賣行中一發不是本等伎倆又把本錢消折去了漸漸大房改換小房賃得兩三間房子與同渾家王氏年少齊眉後因沒有子嗣娶下一個小娘子姓陳是陳賣糕的女兒家中都呼為二姐這也是先前不十分窮薄的時做下的勾當至親三口並無間雜人在家那劉君薦極是為人和氣鄉里見愛都稱他劉官人你是一時運限不好如此落莫再過幾時定時有個亨通的日子説便是這般説那得有些些好處只是在家納悶無可奈何卻説一日間坐家中只見丈人家裡的老王年近七旬走來對劉官人説道家間老員外生日特令老漢接取官人娘子去走一遭劉官人便道便是我日逐愁悶過日子連那泰山的壽誕也都忘了便同渾家王氏收拾隨身衣服打疊個包兒交與老王背了分付二姐看守家中今日晚了不能轉回明晚須索來家説了就去離城二十餘裡到了丈人王員外家敘了寒溫當日坐間客衆丈人女壻不好十分敘述許多窮相到得客散留在客房裡宿歇直到天明丈人卻來與女壻攀話説道姐夫你須不是這般算計坐吃山空立吃地陷咽喉深似海日月快如梭你須計較一個常便我女兒嫁了你一生也指望豐衣足食不成只是這等就罷了劉官人嘆了一口氣道是泰山在上道不得個上山擒虎易開口告人難如今的時勢再有誰似泰山這般憐念我的只索守困若去求人便是勞而無功丈人便道這也難怪你説老漢卻是看你們不過今日賫助你些少本錢胡亂去開個柴米店撰得些利息來過日子卻不好麼劉官人道感蒙泰山恩顧可知是好當下吃了午飯丈人取出十五貫錢來付與劉官人道姐夫且將這些錢去收拾起店面開張有日我便再應付你十貫你妻子且留在此過幾日待有了開店日子老漢親送女兒到你家就來與你作賀意下如何劉官人謝了又謝馱了錢一徑出門到得城中天色卻早晚了卻撞著個相識順路在他家門首經過那人也要做經紀的人就與他商量一會可知是好便去敲那人門時裡面有人應喏出來相揖便問老兄下顧有何見教劉官人一一説知就裡那人便道小弟間在家中老兄用得著時便來相幫劉官人道如此甚好當下説了些生意的勾當那人便留劉官人在家現成杯盤吃了三杯兩盞劉官人酒量不濟便覺有些朦朧起來抽身作別便道今日相擾明早就煩老兄過寒家計議生理那人又送劉官人至路口作別回家不在話下若是説話的同年生併肩長攔腰抱住把臂拖回也不見得受這般災悔卻教劉官人死得不如五代史李存孝漢書中彭越卻説劉官人馱了錢一步一步捱到家中敲門已是點燈時分小娘子二姐獨自在家沒一些事做守得天黑閉了門在燈下打瞌睡劉官人打門他那裡便聽見敲了半晌方才知覺答應一聲來了起身開了門劉官人進去到了房中二姐替劉官人接了錢放在桌上便問官人何處那移這項錢來卻是甚用那劉官人一來有了幾分酒二來怪他開得門遲了且戲言嚇他一嚇便道説出來又恐你見怪不説時又須通你得知只是我一時無奈沒計可施只得把你典與一個客人又因捨不得你只典得十五貫錢若是我有些好處加利贖你回來若是照前這般不順溜只索罷了那小娘子聽了欲待不信又見十五貫錢堆在面前欲待信來他平白與我沒半句言語大娘子又過得好怎麼便下得這等狠心辣手疑狐不決只得再問道雖然如此也須通知我爹娘一聲劉官人道若是通知你爹娘此事斷然不成你明日且到了人家我慢慢央人與你爹娘説通他也須怪我不得小娘子又問官人今日在何處吃酒來劉官人道便是把你典與人寫了文書吃他的酒才來的小娘子又問大姐姐如何不來劉官人道他因不忍見你分離待得你明日出了門才來這也是我沒計奈何一言為定説罷暗地忍不住笑不脫衣裳睡在床上不覺睡去了那小娘子好生擺脫不下不知他賣我與甚色樣人家我須先去爹娘家裡説知就是他明日有人來要我尋到我家也須有個下落沈吟了一會卻把這十五貫錢一垛兒堆在劉官人腳後邊趁他酒醉輕輕的收拾了隨身衣服款款的開了門出去拽上了門卻去左邊一個相熟的鄰舍叫做朱三老兒家裡與朱三媽宿了一夜説道丈夫今日無端賣我我須先去與爹娘説知煩你明日對他説一聲既有了主顧可同我丈夫到爹娘家中來討個分曉也須有個下落那鄰舍道小娘子説得有理你只顧自去我便與劉官人説知就理過了一宵小娘子作別去了不提正是鰲魚脫卻金鉤去擺尾搖頭再不回放下一頭卻説這裡劉官人一覺直至三更方醒見桌上燈猶未滅小娘子不在身邊只道他還在廚下收拾家火便喚二姐討茶吃叫了一回沒人答應卻待掙扎起來酒尚未醒不覺又睡了去不想卻有一個做不是的日間賭輸了錢沒處出豁夜間出來掏摸些東西卻好到劉官人門首因是小娘子出去了門兒拽上不關那賊略推一推豁地開了捏手捏腳直到房中並無一人知覺到得床前燈火尚明周圍看時並無一物可取摸到床上見一人朝著裡床睡去腳後卻有一堆青錢便去取了幾貫不想驚覺了劉官人起來喝道你須不近道理我從丈人家借辦得幾貫錢來養身活命不爭你偷了我的去卻是怎的計結那人也不回話照面一拳劉官人側身躲過便起身與這人相持那人見劉官人手腳活動便拔步出房劉官人不捨搶出門來一徑趕到廚房裡恰待聲張鄰舍起來捉賊那人急了正好沒出豁卻見明晃晃一把劈柴斧頭正在手邊也是人急計生被他綽起一斧正中劉官人面門撲地倒了又復一斧斫倒一邊眼見得劉官人不活了嗚呼哀哉伏惟尚饗那人便道一不做二不休卻是你來趕我不是我來尋你索性翻身入房取了十五貫錢扯條單被包裹得停當拽扎得爽俐出門拽上了門就走不提次早鄰舍起來見劉官人家門也不開並無人聲息叫道劉官人失曉了裡面沒人答應捱將進去只見門也不關直到裡面見劉官人劈死在地他家大娘子兩日前已自往娘家去了小娘子如何不見免不得聲張起來卻有昨夜小娘子借宿的鄰家朱三老兒説道小娘子昨夜黃昏時到我家宿歇説道劉官人無端賣了他他一徑先到爹娘家裡去了教我對劉官人説既有了主顧可同到他爹娘家中也討得個分曉今一面著人去追他轉來便有下落一面著人去報他大娘子到來再作區處衆人都道説得是先著人去到王老員外家報了凶信老員外與女兒大哭起來對那人道昨日好端端出門老漢贈他十五貫錢教他將來作本如何便恁的被人殺了那去的人道好教老員外大娘子得知昨日劉官人歸時已自昏黑吃得半酣我們都不曉得他有錢沒錢歸遲歸早只是今早劉官人家門兒半開衆人推將進去只見劉官人殺死在地十五貫錢一文也不見小娘子也不見蹤迹聲張起來卻有左鄰朱三老兒出來説道他家小娘子昨夜黃昏時分借宿他家小娘子説道劉官人無端把他典與人了小娘子要對爹娘説一聲住了一宵今日徑自去了如今衆人計議一面來報大娘子與老員外一面著人去追小娘子若是半路裡追不著的時節直到他爹娘家中好歹追他轉來問個明白老員外與大娘子須索去走一遭與劉官人執命老員外與大娘子急急收拾起身管待來人酒飯三步做一步趕入城中不提卻説那小娘子清早出了鄰舍人家挨上路去行不上一二裡早是腳疼走不動坐在路旁卻見一個後生頭帶萬字頭巾身穿直縫寬衫背上馱了一個搭膊裡面卻是銅錢腳下絲鞋淨襪一直走上前來到了小娘子面前看了一看雖然沒有十二分顏色卻也明眉皓齒蓮臉生春秋波送媚好生動人正是野花偏艷日村酒醉人多那後生放下搭膊向前深深作揖小娘子獨行無伴卻是往那裡去的小娘子還了萬福道是奴家要往爹娘家去因走不上權歇在此因問哥哥是何處來今要往何方去那後生叉手不離方寸小人是村里人因往城中賣了絲帳討得些錢要往褚家堂那邊去的小娘子道告哥哥則個奴家爹娘也在褚家堂左側若得哥哥帶挈奴家同走一程可知是好那後生道有何不可既如此説小人情願伏侍小娘子前去兩個廝趕著一路正行行不到二三里田地只見後面兩個人腳不點地趕上前來趕得汗流氣喘衣襟敞開連叫前面小娘子慢走我卻有話説知小娘子與那後生看見趕得蹊蹺都立住了腳後邊兩個趕到跟前見了小娘子與那後生不容分説一家扯了一個説道你們幹得好事卻走往那裡去小娘子吃了一驚舉眼看時卻是兩家鄰舍一個就是小娘子昨夜借宿的主人小娘子便道昨夜也須告過公公得知丈夫無端賣我我自去對爹娘説知今日趕來卻有何説朱三老道我不管間帳只是你家裡有殺人公事你須回去對理小娘子道丈夫賣我昨日錢已馱在家中有甚殺人公事我只是不去朱三老道好自在性兒你若真個不去叫起地方有殺人賊在此煩為一捉不然須要連纍我們你這裡地方也不得清淨那個後生見不是話頭便對小娘子道既如此説小娘子只索回去小人自家去休那兩個趕來的鄰舍齊叫起來説道若是沒有你在此便罷既然你與小娘子同行同止你須也去不得那後生道卻也作怪我自半路遇見小娘子偶然伴他行一程路兒卻有甚皂絲麻線要勒我回去朱三老道他家有了殺人公事不爭放你去了卻打沒對頭官司當下不容小娘子和那後生做主看的人漸漸立滿都道後生你去不得你日間不作虧心事半夜敲門不吃驚便去何妨那趕來的鄰舍道你若不去便是心虛我們卻和你罷休不得四個人只得廝挽著一路轉來到得劉官人門首好一場熱鬧小娘子入去看時只見劉官人斧劈倒在地死了床上十五貫錢分文也不見開了口合不得伸了舌縮不上去那後生也慌了便道我恁的晦氣沒來由和那小娘子同走一程卻做了干連人衆人都和哄著正在那裡分豁不開只見王老員外和女兒一步一攧走回家來見了女壻身尸哭了一聲便對小娘子道你卻如何殺了丈夫劫了十五貫錢逃走出去今日天理昭然有何理説小娘子道十五貫錢委是有的只是丈夫昨晚回來説是無計奈何將奴家典與他人典得十五貫身價在此説過今日便要奴家到他家去奴家因不知他典與甚色樣人家先去與爹娘説知故此趁他睡了將這十五貫錢一垛兒堆在他腳後邊拽上門到朱三老家住了一宵今早自去爹娘家裡説知臨去之時也曾央朱三老對我丈夫説既然有了主顧可同到我爹娘家裡來交割卻不知因甚殺死在此那大娘子道可又來我的父親昨日明明把十五貫錢與他馱來作本養贍妻小他豈有哄你説是典來身價之理這是你兩日因獨自在家勾搭上了人又見家中好生不濟無心守耐又見了十五貫錢一時見財起意殺死丈夫劫了錢又使見識往鄰舍家借宿一夜卻與漢子通同計較一處逃走現今你跟著一個男子同走卻有何理説抵賴得過衆人齊聲道大娘子之言甚是有理又對那後生道後生你卻如何與小娘子謀殺親夫卻暗暗約定在僻靜處等候一同去逃奔他方卻是如何計結那人道小人自姓崔名寧與那小娘子無半面之識小人昨晚入城賣得幾貫絲錢在這裡因路上遇見小娘子小人偶然問起往哪裡去的卻獨自一個行走小娘子説起是與小人同路以此作伴同行卻不知前後因依衆人那裡肯聽他分説搜索他搭膊中恰好是十五貫錢一文也不多一文也不少衆人齊發起喊來道是天網恢恢疏而不漏你卻與小娘子殺了人拐了錢財盜了婦女同往他鄉卻連纍我地方鄰里打沒頭官司當下大娘子結扭了小娘子王老員外結扭了崔寧四鄰舍都是證見一哄都入臨安府中來那府尹聽得有殺人公事即便升廳便叫一乾人犯逐一從頭説來先是王老員外上去告説相公在上小人是本府村莊人氏年近六旬只生一女先年嫁與本府城中劉貴為妻後因無子取了陳氏為妾呼為二姐一向三口在家過活並無片言只因前日是老漢生日差人接取女兒女壻到家住了一夜次日因見女壻家中全無活計養贍不起把十五貫錢與女壻作本開店養身卻有二姐在家看守到得昨夜女壻到家時分不知因甚緣故將女壻斧劈死了二姐卻與一個後生名喚崔寧一同逃走被人追捉到來望相公可憐見老漢的女壻身死不明姦夫淫婦贓證現在伏乞相公明斷府尹聽得如此如此便叫陳氏上來你卻如何通同姦夫殺死了親夫劫了錢與人一同逃走是何理説二姐告道小婦人嫁與劉貴雖是個小老婆卻也得他看承得好大娘子又賢慧卻如何肯起這片歹心只是昨晚丈夫回來吃得半酣馱了十五貫錢進門小婦人問他來歷丈夫説道為因養贍不周將小婦人典與他人典得十五貫身價在此又不通我爹娘得知明日就要小婦人到他家去小婦人慌了連夜出門走到鄰舍家裡借宿一宵今早一徑先往爹娘家去教他對丈夫説既然賣我有了主顧可到我爹媽家裡來交割才走得到半路卻見昨夜借宿的鄰家趕來捉住小婦人回來卻不知丈夫殺死的根由那府尹喝道胡説這十五貫錢分明是他丈人與女壻的你卻説是典你的身價眼見的沒巴臂的説話了況且婦人家如何黑夜行走定是脫身之計這樁事須不是你一個婦人家做的一定有姦夫幫你謀財害命你卻從實説來那小娘子正待分説只見幾家鄰舍一齊跪上去告道相公的言語委是青天他家小娘子昨夜果然借宿在左鄰第二家的今早他自去了小的們見他丈夫殺死一面著人去趕趕到半路卻見小娘子和那一個後生同走苦死不肯回來小的們勉強捉他轉來卻又一面著人去接他大娘子與他丈人到時説昨日有十五貫錢付與女壻做生理的今者女壻已死這錢不知從何而去再三問那小娘子時説道他出門時將這錢一堆兒堆在床上卻去搜那後生身邊十五貫錢分文不少卻不是小娘子與那後生通同作姦贓證分明卻如何賴得過府尹聽他們言言有理就喚那後生上來道帝輦之下怎容你這等胡行你卻如何謀了他小老婆劫了十五貫錢殺死了親夫今日同往何處從實招來那後生道小人姓崔名寧是鄉村人氏昨日往城中賣了絲賣得這十五貫錢今早偶然路上撞著這小娘子並不知他姓甚名誰那裡曉得他家殺人公事府尹大怒喝道胡説世間不信有這等巧事他家失去了十五貫錢你卻賣的絲恰好也是十五貫錢這分明是支吾的説話了況且他妻莫愛他馬莫騎你既與那婦人沒甚首尾卻如何與他同行共宿你這等頑皮賴骨不打如何肯招當下衆人將那崔寧與小娘子死去活來拷打一頓那邊王老員外與女兒並一乾鄰佑人等口口聲聲咬他二人府尹也巴不得結了這段公案拷訊一回可憐崔寧和小娘子受刑不過只得屈招了説是一時見財起意殺死親夫劫了十五貫錢同姦夫逃走是實左鄰右捨都指畫了十字將兩人大枷枷了送入死囚牢裡將這十五貫錢給還原主也只好奉與衙門中人做使用也還不勾哩府尹疊成文案奏過朝廷部覆申詳倒下聖旨説崔寧不合姦騙人妻謀財害命依律處斬陳氏不合通同姦夫殺死親夫大逆不道凌遲示衆當下讀了招狀大牢內取出二人來當廳判一個斬字一個剮字押赴市曹行刑示衆兩人渾身是口也難分説正是啞子謾嘗黃蘖味難將苦口對人言看官聽説這段公事果然是小娘子與那崔寧謀財害命的時節他兩人須連夜逃走他方怎的又去鄰舍人家借宿一宵明早又走到爹娘家去卻被人捉住了這段冤枉仔細可以推詳出來誰想問官糊塗只圖了事不想捶楚之下何求不得冥冥之中積了陰騭遠在兒孫近在身他兩個冤魂也須放你不過所以做官的切不可率意斷獄任情用刑也要求個公平明允道不得個死者不可復生斷者不可復續可勝嘆哉間話休題卻説那劉大娘子到得家中設個靈位守孝過日父親王老員外勸他轉身大娘子説道不要説起三年之久也須到小祥之後父親應允自去光陰迅速大娘子在家巴巴結結將近一年父親見他守不過便叫家裡老王去接他來説叫大娘子收拾回家與劉官人做了周年轉了身去罷大娘子沒計奈何細思父言亦是有理收拾了包裹與老王背了與鄰舍家作別暫去再來一路出城正值秋天一陳烏風猛雨只得落路往一所林子去躲不想走錯了路正是豬羊走屠宰之家一腳腳來尋死路走入林子裡去只聽他林子背後大喝一聲我乃靜山大王在此行人住腳須把買路錢與我大娘子和那老王吃那一驚不小只見跳出一個人來頭帶乾紅凹面巾身穿一領舊戰袍腰間紅絹搭膊裹肚腳下蹬一雙烏皮皂靴手執一把朴刀舞刀前來那老王該死便道你這剪徑的毛團我須是認得你做這老性命著與你兌了罷一頭撞去被他閃過空老人家用力猛了撲地便倒那人大怒道這牛子好生無禮連搠一兩刀血流在地眼見得老王養不大了那劉大娘子見他凶猛料道脫身不得心生一計叫做脫空計拍手叫道殺得好那人便住了手睜員怪眼喝道這是你甚麼人那大娘子虛心假氣的答道奴家不幸喪了丈夫卻被媒人哄誘嫁了這個老兒只會吃飯今日卻得大王殺了也替奴家除了一害那人見大娘子如此小心又生得有幾分顏色便問道你肯跟我做個壓寨夫人麼大娘子尋思無計可施便道情願伏侍大王那人回瞋作喜收拾了刀杖將老王尸首攛入澗中領了劉大娘子到一所莊院前來甚是委曲只見大王向那地上拾些土塊拋向屋上去裡面便有人出來開門到得草堂之上分付殺羊備酒與劉大娘子成親兩口兒且是説得著正是明知不是伴事急且相隨不想那大王自得了劉大娘子之後不上半年連起了幾主大財家間也豐富了大娘子甚是有識見早晚用好言語勸他自古道瓦罐不離井上破將軍難免陳中亡你我兩人下半世也勾吃用了只管做這沒天理的勾當終須不是個好結果卻不道是梁園雖好不是久戀之家不若改行從善做個小小經紀也得過養身活命那大王早晚被他勸轉果然回心轉意把這門道路撇了卻去城市間賃下一處房屋開了一個雜貨店遇間暇的日子也時常去寺院中念佛持齋忽一日在家間坐對那大娘子道我雖是個剪徑的出身卻也曉得冤各有頭債各有主每日間只是嚇騙人東西將來過日子後來得有了你一向買賣順溜今已改行從善間來追思既往止曾枉殺了兩個人又冤陷了兩個人時常挂念思欲做些功德超度他們一向未曾對你説知大娘子便道如何是枉殺了兩個人那大王道一個是你的丈夫前日在林子裡的時節他來撞我我卻殺了他他須是個老人家與我往日無仇如今又謀了他老婆他死也是不甘心的大娘子道不恁地時我卻那得與你廝守這也是往事休題了又問殺那一個又是甚人那大王道説起來這個人一發天理上放不過去且又帶纍了兩個人無辜償命是一年前也是賭輸了身邊並無一文夜間便去掏摸些東西不想到一家門首見他門也不閂推進去時裡面並無一人摸到門裡只見一人醉倒在床腳後卻有一堆銅錢便去摸他幾貫正待要走卻驚醒了那人起來説道這是我丈人家與我做本錢的不爭你偷去了一家人口都是餓死起身搶出房門正待聲張起來是我一時見他不是話頭卻好一把劈柴斧頭在我腳邊這叫做人急計生綽起斧來喝一聲道不是我便是你兩斧劈倒卻去房中將十五貫錢盡數取了後來打聽得他卻連纍了他家小老婆與那一個後生喚做崔寧説他兩人謀財害命雙雙受了國家刑法我雖是做了一世強人只有這兩樁人命是天理人心打不過去的早晚還要超度他也是該的那大娘子聽説暗暗地叫苦原來我的丈夫也吃這廝殺了又連纍我家二姐與那個後生無辜被戮思量起來是我不合當初執證他兩人償命料他兩人陰司中也須放我不過當下權且歡天喜地並無他説明日捉個空便一徑到臨安府前叫起屈來那時換了一個新任府尹才得半月正值升廳左右捉將那叫屈的婦人進來劉大娘子到於階下放聲大哭哭罷將那大王前後所為怎的殺了我丈夫劉貴問官不肯推詳含糊了事卻將二姐與那崔守朦朧償命後來又怎的殺了老王姦騙了奴家今日天理昭然一一是他親口招承伏乞相公高抬明鏡昭雪前冤説罷又哭府尹見他情詞可憫即著人去捉那靜山大王到來用刑拷訊與大娘子口詞一些不差即時問成死罪奏過官裡待六十日限滿倒下聖旨來勘得靜山大王謀財害命連纍無辜準律殺一家非死罪三人者斬加等決不待時原問官斷獄失情削職為民崔寧與陳氏枉死可憐有司訪其家諒行優恤王氏既系強徒威逼成親又有伸雪夫冤著將賊人家産一半沒入官一半給與王氏養贍終身劉大娘子當日往法場上看決了靜山大王又取其頭去祭獻亡夫並小娘子及崔寧大哭一場將這一半傢俬捨入尼姑庵中自己朝夕看經念佛追薦亡魂盡老百年而終有詩為證善惡無分總喪軀只因戲語釀殃危勸君出話須誠信口舌從來是禍基
