穩看到左邊中間柱腳歪斜把磚去墊偏有這等作怪的事左墊也不平右墊又不穩索性拆開來看卻原來下面有塊三角沙石尖頭正向著上邊所以墊不平乃道這些匠工精鳥帳這塊石怎麼不去了留在下邊便將手去一攀這石隨手而起拿開石看時到吃一驚下面雪白的一大堆銀子其錠大小不一上面有幾個一樣大的腰間都束著紅絨其色甚是鮮明又喜又怪喜的是得這一大注財物怪的是這幾錠紅絨束的銀子他不知藏下幾多年了顏色還這般鮮明當下不管好歹將衣服做個兜兒抓上許多原把那塊石蓋好飛奔進房向床上倒下喻氏看見連忙來問是那裡來的施復無暇答應見兒子也在房中即叫道觀保快同我來口中便説腳下亂跑喻氏即解其意父子二人來至外邊教兒子看守自己勻幾次搬完這些匠人酒還吃未完哩施復搬完了方與渾家説知其故夫妻三人好不喜把房門閉上將銀收藏約有二千餘金紅絨束的止有八錠每錠準準三兩收拾已完施復要拜天地換了巾帽長衣開門出來那些匠人手忙腳亂打點安柱上梁見柱腳倒亂乃道這是誰個弄壞了又要費一番手腳施復道你們墊得不好須還要重整一整工人知是家長所為誰敢再言流水自去收拾那曉其中奧妙施復仰天看了一看乃道此時正是卯時了快些豎起來衆匠人聞言七手八腳一會兒便安下柱子抬梁上去裡邊托出一大盤拋梁饅首分散衆人鄰里們都將著果酒來與施復把盞慶賀施復因掘了藏愈加快活分外興頭就吃得個半醺正是人逢喜事精神爽月到中秋分外明施復送客去後將巾帽長衣脫下依原隨身短衣相幫衆人到巳牌時分偶然走至外邊忽見一個老兒龐眉白髮年約六十已外來到門首相了一回乃問道這裡可是施家麼施復道正是你要尋那個老兒道要尋你們家長問句話兒施復道小子就是老翁有甚話説請裡面坐了那老兒聽見就是家主把他上下只管瞧看又道你真個是麼施復笑道我不過是平常人那個肯假老兒舉一舉手道老漢不為禮了乞借一步話説拉到半邊問道宅上可是今日卯時上梁安柱麼施復道正是老兒又道官人可曾在左邊中間柱下得些財采施復見問及這事心下大驚想道他卻如何曉得莫不是個仙人因道著心事不敢隱瞞答道果然有些老兒又道內中可有八個紅絨束的錠麼施復一發駭異乃道有是有的老翁何由知得這般詳細老兒道這八錠銀子乃是老漢的所以知得施復道既是老翁的如何卻在我家柱下老兒道有個緣故老漢叫做薄有壽就住在黃江南鎮上止有老荊兩口別無子女門首開個糕餅饅頭等物點心鋪子日常用度有餘積至三兩便傾成一個錠兒老荊孩子氣把紅絨束在中間無非尊重之意因牆卑室淺恐露人眼目縫在一個暖枕之內自謂萬無一失積了這幾年共得八錠以為老夫妻身後之用盡有餘了不想今早五鼓時分老漢夢見枕邊走出八個白衣小廝腰間俱束紅絛在床前商議道今日卯時盛澤施家豎柱安梁親族中應去的都已到齊了我們也該去矣有一個問道他們都在那一個所在一個道在左邊中間柱下説罷往外便走有一個道我們住在這裡一向如不別而行覺道忒薄情了遂俱覆轉身向老漢道久承照管如今卻要拋撇幸勿見怪那時老漢夢中不認得那八個小廝是誰也不曉得是何處來的問他道八位小官人是幾時來的如何都不相認小廝答道我們自到你家與你只會得一面你就把我們撇在腦後故此我們便認得你你卻不認得我又指腰間紅絛道這還是初會這次承你送的你記得了麼老漢一時想不著幾時與他的心中止挂欠無子見其清秀欲要他做個乾兒又對他道既承你們到此何不住在這裡父子相看幫我做個人家怎麼又要往別處去八個小廝笑道你要我們做兒子不過要送終之意但我們該旺處去的你這老官兒消受不起道罷一齊往外而去老漢此時覺道睡在床上不知怎地身子已到門首再三留之頭也不回惟聞得説道天色晏了快走罷一齊亂跑老漢追將上去被草根絆了一交驚醒轉來與老荊説知就疑惑這八錠銀子作怪到早上拆開枕看時都已去了欲要試驗此夢故特來相訪不想果然施復聽罷大驚道有這樣奇事老翁不必煩惱同我到裡面來坐薄老道這事已驗不必坐了施復道你老人家許多路來料必也餓了見成點心吃些去也好這薄老兒見留他吃點心到也不辭便隨進來只見新豎起三間堂屋高大寬敞木材巨壯衆匠人一個個乒乒乓乓耳邊惟聞斧鑿之聲比平常愈加用力你道為何這般勤謹大凡新豎屋那日定有個犒勞筵席利市賞錢這些匠人打點吃酒要錢見家主進來故便假殷勤討好薄老兒看著如此熱鬧心下嗟嘆道怪道這東西欺我消受他不起要望旺處去原來他家恁般興頭咦這銀子卻也勢利得狠哩不一時來至一小客座中施復請他坐下急到裡邊向渾家説知其事喻氏亦甚怪異乃對施復道這銀子既是他送終之物何不把來送還做個人情也好施復道正有此念故來與你商量喻氏取出那八錠銀子把塊布兒包好施復袖了分付討些酒食與他吃復到客座中摸出包來道你看可是那八錠麼薄老兒接過打開一看分毫不差乃道正是這八個怪物那老兒把來左翻右相看了一回對著銀子説道我想你縫在枕中如何便會出來黃江涇到此有十里之遠人也怕走還要趁個船兒你又沒有腳怎地一回兒就到了這裡口中便説心下又轉著苦掙之難失去之易不覺眼中落下兩點淚來施復道老翁不必心傷小子情願送還贈你老人家百年之用薄老道承官人厚情但老漢無福享用所以走了今若拿去少不得又要走的何苦討恁般煩惱吃施復道如今乃我送你的料然無妨薄老只把手來搖道不要不要老漢也是個知命的勉強來一定不妙施復因他堅執不要又到裡邊與渾家商議喻氏道他雖不要只我們心上過意不去又道他或者消受這十錠不起一二錠量也不打緊施復道他執意一錠也不肯要喻氏道我有個道理在此把兩錠裹在饅頭裡少頃送與他作點心到家看見自然罷了難道又送來不成施復道此見甚妙喻氏先支持酒肴出去薄老坐了客位施復對面相陪薄老道沒事打攪官人不當人子施復道見成菜酒何足挂齒當下三杯兩盞吃了一回薄老兒不十分會飲不覺半醉施復討飯與他吃罷將要起身作謝家人托出兩個饅頭施復道兩個粗點心帶在路上去吃薄老道老漢酒醉飯飽連夜飯也不要吃了路上如何又吃點心施復道總不吃帶回家去便了薄老兒道不消得不消得老漢家中做這項生意的日逐自有官人留下賞人罷施復把來推在袖裡道我這饅頭餡好比你鋪中滋味不同將回去吃便曉得那老兒見其意殷勤不好固辭乃道沒甚事到此又吃又袖罪過罪過拱拱手道多謝了往外就走施復送出門前那老兒自言自語道來便來了如今去不知可就有便船施復見他醉了恐怕遺失了這兩個饅頭乃道老翁不打緊我家有船教人送你回去那老兒點頭道官人難得你這樣好心可知有恁般造化施復喚個家人分付道你把船送這大伯子回去務要送至家中認了住處下次好去拜訪家人應諾薄老兒相辭下船離了鎮上望黃江涇而去那老兒因多了幾杯酒一路上問長問短十分健談不一時已到將船泊住扶那老兒上岸送到家中媽媽接著便問老官兒可有這事麼老兒答道千真萬真口中便説卻去袖裡摸出那兩個饅頭遞與施復家人道大官宅上事忙不留吃茶了這饅頭轉送你當茶罷施家人答道我官人特送你老人家的如何卻把與我薄老道你官人送我已領過他的情了如今送你乃我之情你不必固拒家人再三推卻不過只得受了相別下船依舊搖回到自己河下把船纜好拿著饅頭上岸恰好施復出來一眼看見問道這饅頭我送薄老官的你如何拿了回來答道是他轉送小人當茶再三推辭不脫勉強受了他的施復暗笑道原來這兩錠銀那老兒還沒福受用卻又轉送別人想道或者到是那人造化也未可知乃分付道這兩個饅頭滋味比別的不同莫要又與別人答應道小人曉得那人來到裡邊尋著老婆將饅頭遞與還未開言説是那裡來的被夥伴中叫到外邊吃酒去了原來那人已有兩個兒女正害著疳膨食積病癥當下婆娘接在手中想道若被小男女看見偷去吃了到是老大利害不如把去大娘換些別樣點心哄他罷即便走來向主母道大娘丈夫適才不知那裡拿這兩個饅頭我想小男女正害肚腹病儻看見偷吃了這病卻不一發加重欲要求大娘換甚不傷脾胃的點心哄那兩個男女説罷將饅頭放在卓上喻氏不知詳細遂揀幾件付與他去將饅頭放過少頃施復進來把薄老轉與家人饅頭之事説向渾家又道誰想到是他的造化喻氏聽了乃知把來換點心的就是答道原來如此卻也奇異便去拿那兩個饅頭遞與施復道你拍這饅頭開來看施復不知何意隨手拍開只聽得桌上口當的一響舉目看時乃是一錠紅絨束的銀子問道饅頭如何你又取了他的喻氏將那婆娘來換點心之事説出夫妻二人不勝嗟嘆方知銀子趕人麾之不去命裡無時求之不來施復因憐念薄老兒時常送些錢米與他到做了親戚往來死後又買塊地兒殯葬後來施德胤長大娶朱恩女兒過門夫妻孝順施復之富冠於一鎮夫婦二人各壽至八十外無疾而終至今子孫蕃衍與灘闕朱氏世為姻誼雲有詩為證六金還取事雖微感德天心早鑒知灘闕巧逢恩義報好人到底得便宜
