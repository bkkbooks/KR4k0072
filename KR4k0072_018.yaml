body:
  text: 第十八卷施潤澤灘闕遇友還帶曾消縱理紋返金種得桂枝芬從來陰騭能回福舉念須知有鬼神這首詩引著兩個古人陰騭的故事第一句説還帶曾消縱理紋乃唐朝晉公裴度之事那裴度未遇時一貧如洗功名蹭蹬就一風鑒以決行藏那相士説足下功名事且不必問更有句話如不見怪方敢直言裴度道小生因在迷途故求指示豈敢見怪相士道足下螣蛇縱理紋入口數年之間必致餓死溝渠連相錢俱不肯受裴度是個知命君子也不在其意一日偶至香山寺間遊只見供卓上光華耀目近前看時乃是一圍寶帶裴度檢在手中想道這寺乃冷落所在如何卻有這條寶帶翻閲了一回又想道必有甚貴人到此禮佛更衣祗候們不小心遺失在此定然轉來尋覓乃坐在廊廡下等候不一時見一女子走入寺來慌慌張張徑望殿上而去向供卓上看了一看連聲叫苦哭倒於地裴度走向前問道小娘子因何恁般啼泣那女子道妾父被人陷於大辟無門伸訴妾日至此懇佛陰近日幸得從輕贖緩妾家貧無措遍乞高門昨得一貴人矜憐助一寶帶妾以佛力所致適攜帶呈於佛前稽首叩謝因贖父心急竟忘收此帶倉忙而去行至半路方覺急急趕來取時已不知為何人所得今失去這帶妾父料無出獄之期矣説罷又哭裴度道小娘子不必過哀是小生收得故在此相候把帶遞還那女子收淚拜謝請問姓字他日妾父好來叩謝裴度小娘子有此冤抑小生因在貧鄉不能少助為愧還人遺物乃是常事何足為謝不告姓名而去過了數日又遇向日相士不覺失驚道足下曾作何好事來裴度答云無有相士道足下今日之相比先大不相牟陰德紋大見定當位極人臣壽登耄耋富貴不可勝言裴度當時猶以為戲語後來果然出將入相歷事四朝封為晉國公年享上壽有詩為證縱理紋生相可憐香山還帶竟安然淮西蕩定功英偉身系安危三十年第二句説是返金種得桂枝芬乃五代竇禹鈞之事那竇禹鈞薊州人氏官為諫議大夫年三十而無子夜夢祖父説道汝命中已該絶嗣壽亦只在明歲及早行善或可少延禹鈞唯唯他本來是個長者得了這夢愈加好善一日薄暮於延慶寺側拾得黃金三十兩白金二百兩至次日清早便往寺前守候少頃見一後生涕泣而來禹鈞迎住問之後生答道小人父親身犯重罪禁於獄中小人遍懇親知共借白金二百兩黃金三十兩昨將去贖父因主庫者不在而歸為親戚家留款多吃了杯酒把東西遺失今無以贖父矣竇公見其言已合銀數乃袖中摸出還之道不消著急偶爾拾得在此相候久矣這後生接過手打開看時分毫不動叩頭泣謝竇公扶起分外又贈銀兩而去其他善事甚多不可枚舉一夜復夢祖先説道汝合無子無壽今有還金陰德種種名挂天曹特延算三紀賜五子顯榮竇公自此愈積陰功後果連生五子長儀次儼三侃四五僖俱仕宋為顯官竇公壽至八十二沐浴相別親戚談笑而卒安樂老馮道有詩贈之云燕山竇十郎教子有義方靈椿一株老丹桂五枝芳説話的為何道這兩樁故事只因亦有一人曾還遺金後來雖不能如二公這等大富大貴卻也免了一個大難享個大大家事正是種瓜得瓜種豆種豆一切禍福自作自受説這蘇州府吳江縣離城七十里有個鄉鎮地名盛澤鎮上居民稠廣土俗淳朴俱以蠶桑為業男女勤謹絡緯機杼之聲通宵徹夜那市上兩岸綢絲牙行約有千百餘家遠近村坊織成綢匹俱到此上市四方商賈來收買的蜂攢蟻集挨擠不開路途無佇足之隙乃出産綿繡之鄉積聚綾羅之地江南養蠶所在甚多惟此鎮處最盛有幾句口號為證東風二月暖洋洋江南處處蠶桑忙蠶欲溫和桑欲乾明如良玉發奇光繅成萬縷千絲長大筐小筐隨絡床美人抽繹沾唾香一經一緯機杼張咿咿軋軋諧宮商花開錦簇成匹量莫懮入口無餐糧朝來鎮上添遠商且説嘉靖年間這盛澤鎮上有一人姓施名復渾家喻氏夫妻兩口別無男女家中開張綢機每年養幾筐蠶兒妻絡夫織甚好過活這鎮上都是溫飽之家織下綢匹必積至十來匹最少也有五六匹方才上市那大戶人家積得多的便不上市都是牙行引客商上門來買施復是個小戶兒本錢少織得三四匹便去上市出脫一日已積了四匹逐匹把來方方折好將個布袱兒包裹一徑來到市中只見人煙輳集語話喧闐甚是熱鬧施復到個相熟行家來賣見門首擁著許多賣綢的屋裡坐下三四個客商主人家站在匱身裡展看綢匹估喝價錢施復分開衆人把綢遞與主人家主人家接來解開包袱逐匹翻看一過將稱準了一準喝定價錢遞與一個客人道這施一官是忠厚人不耐煩的把些好銀子與他那客人真個只揀細絲稱準付與施復施復自己也摸出等子來準一準還覺輕些又爭添上一二分也就罷了討張紙包好銀子放在兜肚裡收了等子包袱向主人家拱一拱手叫聲有勞轉身便走行不上半箭之地一眼覷見一家街沿之下一個小小青布包兒施復趲步向前拾起袖過走到一個空處打開看時卻是兩錠銀子又有三四件小塊兼著一文太平錢兒把手手顛一手顛約有六兩多重心中歡喜道今日好造化拾得這些銀子正好將去湊做本錢連忙包好也揣在兜肚裡望家中而回一頭走一頭想如今家中見開這張機盡勾日用了有了這銀子再添上一張機一月出得多少綢有許多利息這項銀子譬如沒得再不要動他積上一年共該若干到來年再添上一張一年又有多少利息算到十年之外便有千金之富那時造什麼房子買多少田産正算得熟滑看看將近家中忽地轉過念頭想道這銀兩若是富人掉的譬如牯牛身上拔根毫毛打什麼緊落得將來受用若是客商的他拋妻棄子宿水餐風辛勤掙來之物今失落了好不煩惱如若有本錢的他拚這帳生意扯直也還不在心上儻然是個小經紀只有這些本錢或是與我一般樣苦掙過日或賣了綢或脫了絲這兩錠銀乃是養命之根不爭失了就如絶了咽喉之氣一家良善沒甚過活互相埋怨必致鬻身賣子儻是個執性的氣惱不過骯髒送了性命也未可知我雖是拾得的不十分罪過但日常動念使得也不安穩就是有了這銀子未必真個營運發積起來一向沒這東西依原將就過了日子不如原往那所在等失主來尋還了他去到得安樂隨復轉身而來正是多少惡念轉善多少善念轉惡勸君諸善奉行但是諸惡莫作當下施復來到拾銀之處靠在行家匱邊等了半日不見失主來尋他本空心出門的腹中漸漸飢餓欲待回家吃了飯再來猶恐失主一時間來又不相遇只得忍著等候少頃只見一個村莊後生汗流滿面闖進行家高聲叫道主人家適來銀子忘記在匱上你可曾檢得麼主人家道你這人好混帳早上交銀子與了你這時節卻來問我你若忘在匱上時莫説一包再有幾包也都拿去了那後生連把腳跌道這是我的種田工本如今沒了卻怎麼好施復問道約莫有多少那後生道起初在這裡賣的絲銀六兩二錢施復道把什麼包的有多少件數那後生道兩大錠又是三四塊小的一個青布銀包包的施復道恁樣不消著急我拾得在此相候久矣便去兜肚裡摸出來遞與那人那人連聲稱謝接過手打開看時分毫不動那時往來的人當做奇事擁上一堆都問道在那裡拾的施復指道在這階沿頭拾的那後生道難得老哥這樣好心在此等候還人若落在他人手裡安肯如此如今到是我拾得的了情願與老哥各分一半施復道我若要何不全取了卻分你這一半那後生道既這般送一兩謝儀與老哥買果兒吃施復笑道你這人是個呆子六兩三兩都不要要你一兩銀子何用那後生道老哥銀子又不要何以相報衆人道看這位老兄是個厚德君子料必不要你報不若請到酒肆中吃三杯見你的意罷了那後生道説得是便來邀施復同去施復道不消得不消得我家中有事莫要擔擱我工夫轉身就走那後生留之不住衆人道你這人好造化掉了銀子一文錢不費便撈到手那後生道便是不想世間原有這等好人把銀包藏了向主人叫聲打攪下階而去衆人亦贊嘆而散也有説施復是個呆子拾了銀子不會將去受用卻呆站著等人來還也有説這人積此陰德後來必有好處不提衆人且説施復回到家裡渾家問道為甚麼去了這大半日施復道不要説起將到家了因著一件事復身轉去擔擱了這一回渾家道有甚事擔擱施復將還銀之事説向渾家渾家道這件事也做得好自古道橫財不富命窮人儻然命裡沒時得了他反生災作難到未可知施復道我正為這個緣故所以還了他去當下夫婦二人不以拾銀為喜反以還銀為安衣冠君子中多有見利忘義的不意愚夫愚婦到有這等見識從來作事要同心夫唱妻和種德深萬貫錢財如糞土一分仁義值千金自此之後施復每年養蠶大有利息漸漸活動那育蠶有十體二光八宜等法三稀五廣之忌第一要擇蠶種蠶種好做成繭小而明厚堅細可以繅絲如蠶種不好但堪為綿纊不能繅絲其利便差數倍第二要時運有造化的就蠶種不好依般做成絲繭若造化低的好蠶種也要變做綿繭北蠶三眠南蠶俱是四眠眠起飼葉各要及時又蠶性畏寒怕熱惟溫和為得候晝夜之間分為四時朝暮類春秋正晝如夏深夜如冬故調護最難江南有謠云做天莫做四月天蠶要溫和麥要寒秧要日時麻要雨采桑娘子要晴乾那施復一來蠶種揀得好二來有些時運凡養的蠶並無一個綿繭繅下絲來細員勻緊潔淨光瑩再沒一根粗節不勻的每筐蠶又比別家分外多繅出許多絲來照常織下的綢拿上市去人看時光彩潤澤都增價競買比往常每匹平添錢多銀子因有這些順溜幾年間就增上三四張綢機家中頗頗饒裕裡中遂慶個號兒叫做施潤澤卻又生下一個兒子寄名觀音大士叫做觀保年才二歲生得眉目清秀到好個孩子話休煩絮那年又值養蠶之時才過了三眠合鎮闕了桑葉施復家也只勾兩日之用心下慌張無處去買大率蠶市時天色不時陰雨蠶受了寒濕之氣又食了冷露之葉便要僵死十分之中只好存其半這桑葉就有餘了那年天氣溫暖家家無恙葉遂短闕且説施復正沒處買桑葉十分焦躁忽見鄰家傳説洞庭山餘下桑葉甚多合了十來家過湖去買施復聽見帶了些銀兩把被窩打個包兒也來趕船這時已是未牌時候開船搖櫓離了本鎮過了平望來到一個鄉村地名灘闕這去處在太湖之傍離盛澤有四十里之遠天已傍晚過湖不及遂移舟進一小港泊住穩纜停橈打點收拾晚食卻忘帶了打火刀石衆人道那個上涯去取討個火利便好施復卻如神差鬼使一般便答應道待我去取了一把麻骨跳上岸來見家家都閉著門兒你道為何天色未晚人家就閉了門那養蠶人家最忌生人來沖從蠶出至成繭之時約有四十來日家家緊閉門戶無人往來任你天大事情也不敢上門當下施復走過幾家初時甚以為怪道這些人家想是怕鬼拖了人去日色還在天上便都閉了門忽地想起道呸自己是老看蠶到忘記了這取火乃養蠶家最忌的卻兜攬這帳如今那裡去討欲待轉來又想道方才不應承來到也罷了若空身回轉教別個來取得時反是老大沒趣或者有家兒不養蠶的也未可知依舊又走向前去只見一家門兒半開半掩他也不管三七草一做兩步跨到簷下卻又不敢進去站在門外舒頸望著裡邊叫聲有人麼裡邊一個女人走出來問道什麼人施復滿面陪著笑道大娘子要相求個火兒婦人道這時節別人家是不肯的只我家沒忌諱便點個與你也不妨得施復道如此多謝了即將麻骨遞與婦人接過手進去點出火來