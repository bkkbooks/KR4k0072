body:
  text: 第五卷大樹坡義虎送親舉世芒芒無了休寄身誰識等浮漚謀生盡作千年計公道還當萬古留西下夕陽誰把手東流逝水絶回頭世人不解蒼天意恐使身心半夜愁這八句詩奉勸世人公道存心天理用事莫要貪圖利己謀害他人常言道使心用心反害其身你不存天理皇天自然不佑昔有一人姓韋名德乃福建泉州人氏自幼隨著父親在紹興府開個傾銀鋪兒那老兒做人公道利心頗輕為此主顧甚多生意盡好不幾年掙了好些傢俬韋德年長娶了鄰近單裁縫的女兒為媳那單氏到有八九分顏色本地大戶情願出百十貫錢討他做偏房單裁縫不肯因見韋家父子本分手頭活動況又鄰居一夫一妻遂就了這頭親事何期婚配之後單裁縫得病身亡不上二年韋老亦病故韋德與渾家單氏商議如今舉目無親不若扶柩還鄉單氏初時不肯拗丈夫不過只得順從韋德先將店中粗重家夥變賣打疊行李顧了一隻長路船擇個出行吉日把父親靈柩裝載夫妻兩口兒下船而行原來這稍公名叫做張稍不是個善良之輩慣在河路內做些淘摸生意的因要做這私房買賣生怕夥計泄漏卻尋著一個會橕船的啞子做個幫手今日曉得韋德傾銀多年囊中必然充實又見單氏生得美麗自己卻沒老婆兩件都動了火下船時就起個不良之心奈何未得其便一日因風大難行泊舟於江郎山下張稍心生一計只推沒柴要上山砍些亂柴來燒這山中有大蟲時時出來傷人定要韋德作伴同去韋德不知是計隨著張稍而走張稍故意灣灣曲曲引到山深之處四顧無人正好下手張稍砍下些叢木在地卻教韋德打捆韋德低著頭只顧檢柴不防張稍從後用斧劈來正中左肩撲地便倒重復一斧向腦袋劈下血如湧泉結果了性命張稍連聲道乾淨乾淨來年今日叫老婆與你做周年説罷把斧頭插在腰裡柴也不要了忙忙的空身飛奔下船單氏見張稍獨自回來就問丈夫何在張稍道沒造化遇了大蟲可憐你丈夫被他銜了去虧我跑得快脫了虎口連砍下的柴也不敢收拾單氏聞言捶胸大哭張稍解勸道這是生成八字內注定虎傷哭也沒用單氏一頭哭一頭想道聞得虎遇夜出山不信白日裡就出來傷人況且兩人雙雙同去如何偏揀我丈夫吃了他又全沒些損傷好不奇怪便對張稍道我丈夫雖然銜去只怕還掙得脫不死張稍道貓兒口中尚且挖不出食何況於虎單氏道然雖如此奴家不曾親見就是真個被虎吃了少不得存幾塊骨頭煩你引奴家去檢得回來也表我夫妻之情張稍道我怕虎不敢去單氏又哀哀的哭將起來張稍想道不引他去走一遍他心不死便道娘子我引你去看不要哭單氏隨即上岸同張稍進山路來先前砍柴是走東路張稍恐怕婦人看見死尸卻引他從西路走單氏走一步哭一步走了多時不見虎迹張稍指東話西只望單氏倦而思返誰知他定要見丈夫的骨血方才指實張稍見單氏不肯回步扯個謊望前一指小娘子你只管要行兀的不是大蟲來了單氏抬頭而看才問一聲大蟲在那裡聲猶未絶只聽得林中口舌喇的一陳怪風忽地跳出一隻吊睛白額虎不歪不斜正望著張稍當頭撲來張稍躲閃不及只叫得一聲阿呀被虎一口銜著背皮跑入深林受用去了單氏驚倒在地半日方醒眼前不見張稍已知被大蟲銜去始信山中真個有虎丈夫被虎吃了此言不謬心中害怕不敢前行認著舊路一步步哭將轉來未及出山只見一個似人非人的東西從東路直衝出來單氏只道又是只虎叫道我死也望後便倒耳根邊忽聽説娘子你如何卻在這裡雙手來扶單氏睜眼看時卻是丈夫韋德血污滿面所以不像人形原來韋德命不該死雖然被斧劈傷一時悶絶張稍去後卻又醒將轉來掙扎起身扯下腳帶將頭裹縛停當他步出山來尋張稍講話卻好遇著單氏單氏還認著丈夫被虎咬傷以致如此聽韋德訴出其情方悟張稍欺心使計謀害他丈夫假説有虎後來被虎咬去此乃神明遣來剿除凶惡夫妻二人感謝天地不盡回到船中那啞子做手勢問船主如何不來韋德夫妻與他説明本末啞子合著掌忽然念出一聲南無阿彌陀佛便能説話將張稍從前過惡一一説出再問他時依舊是個啞子此亦至異之事也韋德一路相幫啞子行船直到家中將船變賣了造一個佛堂與啞子住下日夜燒香韋德夫婦終身信佛後人論此事詠詩四句偽言有虎原無虎虎自張稍心上生假使張稍心地正山中有虎亦藏形方才説虎是神明遣來剿除凶惡此亦理之所有看來虎乃百獸之王至靈之物感仁吏而渡河伏高僧而護法見於史傳種種可據如今再説一個義虎知恩報恩成就了人間義夫節婦為千古佳話正是説時節婦生顏色道破姦雄喪膽魂話説大唐天寶年間福州漳浦縣下鄉有一人姓勤名自勵父母俱存家道粗足勤自勵幼年時就聘定同縣林不將的女兒潮音為妻茶棗俱已送過只等長大成親勤自勵十二歲上就不肯讀書出了學堂專好使槍輪棒父母單生的這個兒子甚是姑息不去拘管著他年登十六生得身長力大猿臂善射武藝過人常言同聲相應同氣相求自有一班無賴子弟三朋四友和他檠鷹放鷂駕犬馳馬射獵打生為樂曾一日射死三虎忽見個黃衣老者策杖而前稱贊道郎君之勇雖昔日卞莊李存孝不是過也但好生惡殺萬物同情自古道人無害虎心虎無傷人意郎君何故必欲殺之此獸乃百獸之王不可輕殺當初黃公有道術能以赤刀制虎尚且終為虎害郎君若自恃其勇好殺不已將來必犯天道之忌難免不測之懮矣勤自勵聞言省悟即時折箭為誓誓不殺虎忽一日獨往山中打生得了幾項野味而回行至中途地名大樹坡見一黃斑老虎誤陷於檻阱之中獵戶偶然未到其虎見勤自勵到來把前足跪地俯首弭耳口中作聲似有乞憐之意自勵道業畜我已誓不害你了但你今日自投檻阱非乾我事其虎眼觀自勵口中嗚嗚不已自勵道我今做主放你你今後切莫害人虎聞言點頭自勵破阱放虎虎得命狂跳而去自勵道人以獲虎為利我卻以放虎為仁我欲仁而使人失其利非忠恕之道也遂將所得野味置於阱中空手而回正是得放手時須放手可施恩處便施恩只因勤自勵不務本業家道漸漸消乏又且素性慷慨好客時常引著這伙三朋四友到家蒿惱索酒索食勤公勤婆愛子之心無所不至初時猶勉強支持以後支持不來只得對兒子説道你今年已大長不思務本作家日逐遊蕩有何了日別人家兒子似你年紀或農或商胡亂得些進益以養父母似你有出氣無進氣家事日漸凋零兀自三兄四弟酒食征逐不知做爹娘的將沒作有千難萬難就是衣飾典賣也有盡時將來手足無措連爹娘也有餓死之日哩我如今與你説過再引人上門時茶也沒有一杯與他吃了你莫著急勤自勵被爹娘教訓了一遍默默無言走出去了真個好幾日沒有人上門蒿惱約莫一月有餘勤自勵又引十來個獵戶到家借鍋煮飯勤公也道容他煮罷勤婆不肯道費柴費火還是小事只是才説得兒子回心清淨了這幾日老娘心裡好不喜歡今日又來纏帳開了端辭得那一個他日又賠茶賠酒老娘支持得怕了索性做個冷麵莫慣他罷勤公見勤婆不允閃過一邊勤婆將中門閉了從門內説道我家不是公館柴火不便別處去利市衆人聞言只索去了勤自勵滿面羞慚嘆口氣想道我自小靠爹娘過活沒處賺得一文半文家中來路又少也怪爹娘不得聞得安南作亂朝廷各處募軍本府奉節度使文牒大張榜文衆兄弟中已有幾個應募去了憑著我一身本事一刀一槍或者博得個衣錦還鄉也不見得守著這六尺地上帶纍爹娘受氣非丈夫之所為也只是一件爹娘若知我應募從軍必然不允功名之際只可從權我自有個道理當下瞞過勤公勤婆竟往府中投軍太守試他武藝出衆將他充為隊長軍政司上了名字不一日招募數足領兵官點名編號給了口糧制辦衣甲器械擇個出征吉日放炮起身勤自勵也不對爹娘説知直到上路三日之後遇了個縣中差役方才寫寄一封書信回來勤公拆書開看時寫道男自勵無才無能纍及爹娘今已應募充為隊長前往安南幸然有功必然衣錦還鄉爹娘不必挂念勤公看畢呆了半響開口不得勤婆道兒子那裡去了寫什麼言語在書上你不對我説勤公道對你説時只怕急壞了你兒子應募充軍從征安南去了勤婆笑道我説多大難事等兒子去十日半月後喚他回來就是了勤公道婦道家不知利害安南離此有萬里之遙音信尚且難通況他已是官身此去刀劍無情凶多吉少萬一做了沙場之鬼我兩口兒老景誰人侍奉勤婆就哭天哭地起來勤公也流淚不止過了數日林親家亦聞此信特地自來問個端的勤公勤婆遮瞞不得只得實説了傷感了一場林公回去説知舉家都不歡喜正是樂莫樂兮新相知悲莫悲兮生別離他人分離猶自可骨肉分離苦殺我光陰似箭不覺三年勤自勵一去杳無音信林公頻頻遣人來打探消息都則似金針墮海銀瓶落井全沒些影響同縣也有幾個應募去的都則如此林公的媽媽梁氏對丈夫説道勤郎一去三年不回不知死活存亡女兒年紀長成了把他擔誤不是個常法你也該與勤親家那邊討個決裂雖然親則是親各兒各女兩個肚皮裡出來的我女兒還不認得女壻的面長面短卻教他活活做孤孀不成林公道阿媽説的是即忙來到勤家對勤公道小女年長令郎杳無歸信倘只是不歸作何區處老荊日夜愁煩特來與親家商議勤公已知其意便道不肖子無賴有誤令愛芳年但事已如此求親家多多上復親母耐心再等三年若六年不回任憑親家將令愛別許高門老漢再無言語林公見説得達理只得唯唯而退回來與媽媽説知梁氏向來知道女壻不學本分心中不喜今三年不回正中其意聽説還要等三年好不焦燥恨不得十日縮做一日把三年一霎兒過了等女兒再許個好人光陰似箭不覺又過了三年林公道勤親家之約已滿了我再去走一番看他更有何説梁氏道自古道一言即出駟馬難追他既有言在前如今怪不得我了有路自行又去對他説甚麼且待女兒有了對頭才通他知道也不遲林公又道阿媽説得是然雖如此也要與孩兒説知梁氏道潮音這丫頭有些古怪劣別只如此對他説勤郎六年不回教他改配他人他料然不肯反被勤老兒笑話須得如此如此林公又道阿媽説得是次日梁氏正同女兒潮音一處坐只見林公從外而來故意大驚小怪的説道阿媽你知道麼怪道勤郎無信回來原來三年前便死於戰陳了昨日有軍士在安南回是他親見的潮音聽説面如土色閣淚而不敢下慌忙走進自己房裡去了媽媽亦假做嘆息連稱可憐過了數日林婆對女兒説道死者不能復生他自沒命可惜你青春年少我已教你父親去尋媒説合將你改配他人乘這少年時夫妻恩愛莫教挫過潮音道母親差矣爹把孩兒從小許配勤家一女不吃兩家茶勤郎在奴是他家妻勤郎死奴也是他家婦豈可以生死二心奴斷然不為媽媽道孩兒休如此執見爹媽單生你一人並無兄弟你嫁得著人時爹媽也有半子之靠況且未過門的媳婦守節也是虛名現放著活活的爹媽你不念他日後老景淒涼卻去戀個死人可不是個癡愚不孝之輩潮音被罵不敢回言就有男媒女妁來説親事潮音拗爹媽不過心生一計對爹媽説道爹媽主張孩兒焉敢有違只是孩兒一聞勤郎之死就將身別許他人於心何忍容孩兒守制三年以畢夫妻之情那時但憑爹媽不然孩兒寧甘一死決不從命林公與梁氏見女兒立志甚決怕他做出短見之事只得繇他正是一人立志萬夫莫奪卻説勤公夫婦見兒子六年不歸眼見得林家女兒是別人家的媳婦了後來聞得媳婦立志要守三年心下不勝之喜若巴得這三年內兒子回家還是我的媳婦光陰似箭不覺又過了三年潮音只認丈夫真死這三年之內素衣蔬食如真正守孝一般及至年滿竟絶了葷腥之味身上又不肯脫素穿色説起議婚便要尋死林公與媽媽商議女孩兒執性如此改嫁之事多應不成如之奈何梁氏道密地擇了人家在我哥哥家受聘不要通女孩兒得知到臨嫁之期只説內侄做親來接女孩兒哄得他易服上轎鼓樂人從都在半路迎接事到其間不怕他不從林公又道媽媽説得是林公果然與舅子梁大伯計議定了許了李承務家三舍人自説親以至納聘都在梁大伯家裡夫妻兩口去受聘時對女兒只説梁大伯大兒子定親潮音那裡疑心吉期將到梁大伯假説某日與兒子完婚特迎取姐夫一家到家中去接親梁氏先自許過他一定都來至期大伯差人將兩頂轎子來接姐姐和外甥女梁氏自己先裝扮了教女兒換了色服同去潮音不知是計只得易服隨行女孩兒家不出閨門不知路徑行了一會忽然山凹裡燈籠火把鼓樂喧天都是取親的人衆中途等候擺列轎前吹打而來潮音覺道事體有變沒奈何在轎內啼啼哭哭衆人也那裡管他只顧催趲轎夫飛走到一個去處忽然陰雲四合下一陳大雨衆人在樹林中暫歇等雨過又行走不上幾步抖然起一陳狂風燈火俱滅只見一隻黃斑吊睛白額虎從半空中跳將下來衆人發聲喊都四散逃走未知性命如何已見亡魂喪膽風定虎去衆人叫聲謝天吹起火來整頓重行只見轎夫叫道不好了起初兩乘轎子都是實的如今一乘是空的舉火照時正不見了新人轎門都撞壞了不是被大蟲銜去是什麼梁氏聽説嗚嗚的啼哭起來這些娶新的沒了新人好沒興頭樂人也不吹打了燈火也息了一半衆人商量道如何是好欲待追尋黑夜不便也沒恁般膽氣欲待各散去訖怕又遇別個虎不若聚做一塊同到林家再作區處所謂乘興而去敗興而回且説林公正閉著門在家裡收拾聽得敲門甚急忙來開看只見兩乘轎子依舊抬轉許多人從一個個垂頭喪氣都如喪家之狗吃了一驚正不是甚麼緣故莫非女孩兒不從在轎裡又弄出什麼把戲心頭猶如幾百個榔捶打著急問其故梁氏在轎中哭將出來哽哽咽咽一字也説不出衆人將中途遇虎之事敘了一遍林公也捶胸大慟懊悔無及早知我兒如此薄命依他不嫁也罷如今斷送得他好苦一面令人去報李承務和梁大伯兩家知道一面聚集莊客準備獵具專等天明打點搜山捕獲大蟲並尋女兒骨殖正是悲悲切切思閨女口口聲聲恨大蟲話分兩頭卻説勤自勵自從應募投軍從征安南力戰有功都督哥舒翰用為帳下虞侯解所佩寶劍賜之甚加信用三年之後吐番入寇勤自勵又隨哥舒翰調兵征討平定之後朝廷拜哥舒翰為大元帥率領本部將校雄軍十萬鎮守潼關勤自勵以兩次軍功那時已做到都指揮之職何期安祿反亂殺到潼關哥舒翰正值患病抵敵不住開關納降勤自勵孤掌難鳴棄其部下隻身仗劍而逃一路辛苦不提事有湊巧恰好林公嫁女這一晚勤自勵回到家中見了父母拜伏於地口稱恕孩兒不孝之罪勤公勤婆仔細看時方才認得是兒子去時雖然長大還沒這般雄偉又添上一嘴鬍鬚邊塞風霜容顏都改變了勤公勤婆痛定思痛不覺流淚勤公道我兒如何一去十年音信全無多有人説你已沒於戰陳哭得做爹媽的眼淚俱枯了勤婆道莫説十年之前就是早回一日也還好不見得媳婦隨了別人勤自勵道我媳婦怎麼説勤婆道你去了三年之後丈人就要將媳婦別許人家是你爹爹不肯勉強留了三年以後媳婦聞你身死自家立志守孝三年如今第十個年頭也難怪他剛剛是今晚出門嫁人勤自勵聽説眉根倒豎牙齒咬得格格的響叫道那個鳥百姓敢討勤自勵的老婆我只教他認一認我手中的寶劍説罷狠狠的仗劍出門爹媽從小管他不下的今日那裡留得他住只得繇他捏著兩把汗在草堂中等候消息正是青龍共白虎同行吉凶事全無未保卻説勤自勵自小認得丈人林公家裡打這條路迎將上去走了多時將近黃昏遇了一陳大雨衣服都沾濕了記得這地方喚做大樹坡有一株古樹約莫十來圍大中間都是空的可以避雨勤自勵走到樹邊捱身入內甚是寬轉那雨雖然大落不多時就止了勤自勵卻待跳出半空中又刮起一陳大風勤自勵想道索性等著過了這陳風走罷又道這風有些腥氣好古怪舒著頭往外張望見兩盞紅燈若隱若現忽地刮喇的一聲響亮如天崩地裂一件東西向前而墜驚得勤自勵倒身入內少頃風定耳邊但聞呻吟之聲此時雲收雨散天邊露出些微月勤自勵就月光下上前看時那呻吟的卻是個女子勤自勵扶起細叩來歷那女子半晌方言説道奴家林氏之女潮音也勤自勵記得妻子的小名未知是否問道你可有丈夫麼潮音道丈夫勤自勵雖曾聘定尚未過門只為他十年前應募從軍久無音信爹媽要將奴改適他姓奴家誓死不從爹媽背地將奴不知許與誰家只説舅舅家來接騙奴上轎中路方知正待尋死忽然一陳狂風火光之下看見個黃斑吊睛白額虎沖人而來徑向轎中將奴銜出撇在此地虎已去了幸不損傷官人不知尊姓何名若得送奴還歸父母之家家中必有厚報勤自勵道則小子便是勤自勵先征安南又征吐番後來又隨哥舒元帥鎮守潼關適才回家聽説你家中將你嫁人在於今晚以此仗劍而來欲剿那些敗壞綱常之輩何期於此相遇這是天遣大蟲送還與我省得我勤自勵舞刀輪劍乃是萬千之幸潮音道官人雖如此説奴家未曾過門不識丈夫之面今日一言之下豈敢輕信官人還是引奴回家使我爹爹識認女壻也不負奴家數年苦守之志勤自勵道你家老禽獸把一女許配兩家這等不仁不義之輩還去見他則甚我如今背你到我家中先參見了舅姑然後遣人通知你家也把那老禽獸羞他一羞説罷不管潮音肯不肯把他負於背上左手向後攔住他的金蓮右手仗劍跳著爛地而回行不多步忽聞虎嘯之聲遙見前山之上雙燈冉冉細視乃一隻黃斑吊睛白額虎那兩個紅燈虎之睛光也勤自勵猛然想著十年之前曾在此處破開檻阱放了一隻黃斑吊睛白額虎今日如何就曉得我勤自勵回家去人叢中銜那媳婦還我豈非靈物遂高聲叫道大蟲謝送媳婦了那虎大嘯一聲跳而藏影後人論起那虎報恩事以為奇談多有題詠惟胡曾先生一首最好詩曰從來只道虎傷人今日方知虎報恩多少負心無義漢不如禽獸有情親再説勤公勤婆在家懸懸而望聽得腳步響忙點燈出來看時只見兒子勤自勵背上負了一個人來到草堂放於地下叫道爹媽則教你今夜認得媳婦勤公勤婆見是個美貌女子細叩來歷方知大蟲報恩送親一段奇事雙雙舉手加額連稱慚愧勤婆遂將媳婦扶到房中粥湯將息次早差人去林親家處報信卻説林公那日黑早便率領莊客繞山尋綽了一遍不見動靜嘆口氣只得回家忽見勤公遣人報喜説夜來兒子已回大蟲銜來送還他家那裡肯信我曉得這是勤親家曉得女孩兒被虎銜去故造此話來奚落我媽媽梁氏道天下何事不有前日我家走失了一隻花毛雞被鄰舍家收著過了一日野貓銜個雞到我家來趕脫了貓兒看那雞正是我家走失的這一隻花毛雞有這般巧事況且虎是個大畜生最有靈性我又聞得一個故事昔時有個書生住在孤村夜間聽得門外聲響看時窗櫺裡伸一隻虎掌進來掌有竹刺甚大書生悟其來意拔出其刺明晚虎銜一羊來謝可見虎通人性或者天可憐女孩兒守志遣那大蟲來送歸勤家亦未可知你且到勤家看女壻曾回不曾回便有分曉林公又道阿媽説得是當日林公來到勤家勤公出迎分賓而坐細述夜來之情林公滿面羞慚謝罪不已求見賢壻和小女之面勤自勵初時不肯認丈人被爹娘先勸了多時又礙渾家的面皮故此只得出來相見氣忿忿的作了個揖就走開去了勤公教勤婆將媳婦裝扮起來卻請林公進房父女會面出於意外猶如夢中相逢歡喜無限要接女兒回家勤公勤婆不肯擇了吉日就於家中拜堂成親李承務家已知勤自勵回來自沒話説後來郭李二元帥恢復長安肅宗皇帝登極清查文武官員肅宗自為太子時曾聞勤自勵征討之功今番賊黨簿籍中沒有他名字嘉其未曾從賊再起為親軍都指揮使纍征安慶緒史思明有功年老致仕夫妻偕老有詩為證但行刻薄人皆怨能布恩施虎亦親奉勸人行方便事得饒人處且饒人
