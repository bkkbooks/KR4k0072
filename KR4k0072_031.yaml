body:
  text: 第三十一卷鄭節使立功神臂弓顛狂彌勒到明州布袋橫拖拄杖頭饒你化身千百億一身還有一身愁話説東京汴梁城開封府有個萬萬貫的財主員外姓張排行第一雙名俊卿這個員外冬眠紅錦帳夏臥碧紗廚兩行珠翠引一對美人扶家中有赤金白銀斑點玳瑁鶻輪珍珠犀牛頭上角大象口中牙門首一壁開個金銀鋪一壁開所質庫他那爹爹大張員外方死不多時只有媽媽在堂張員外好善人叫他做張佛子忽一日在門首觀看見一個和尚打扮非常但見雙眉垂雪橫眼碧波衣披烈火七幅鮫綃杖拄降魔九環錫杖若非圓寂光中客定是楞嚴峰頂人那和尚走至面前道員外拜揖員外還禮畢只見和尚袖中取出個疏頭來上面寫道竹林寺特來抄化五百香羅木員外口中不説心下思量我從小見説竹林寺那曾見有況兼這香羅木是我爹在日許下願心要往東峰岱嶽蓋嘉寧大殿尚未答還員外便對和尚道此是我先人在日許下願心不敢動著若是吾師要別物但請法旨和尚道若員外不肯捨施貧僧到晚自教人取説罷轉身員外道這和尚莫是風天色漸晚員外吃了三五杯酒卻待去睡只見當值的來報員外禍事家中後園火發唬殺員外慌忙走來時只見焰焰地燒著去那火光之中見那早來和尚將著百十人都長七八尺不類人形盡數搬這香羅板去員外趕上看時火光頓息和尚衆人都不見了再來園中一看不見了那五百片香羅木枯炭也沒些個卻是作怪我爹爹許下願心卻如何好一夜不眠但見玉漏聲殘金烏影吐鄰雞三唱喚佳人傅粉施珠寶馬頻嘶催行客爭名奪利幾片曉霞飛海嶠一輪紅日上扶桑員外起來洗漱罷去家堂神道前燒了香向堂前請見媽媽把昨夜事説了一遍道三月二十八日卻如何上得東峰岱嶽與爹爹答還心願媽媽道我兒休煩惱到這日卻又理會員外見説辭了媽媽退去金銀鋪中坐地卻是二月半天氣正是金勒馬嘶芳草地玉樓人醉杏花天只聽得街上鑼聲響一個小節級同個茶酒保把著團書來請張員外團社原來大張員外在日起這個社會朋友十人近來死了一兩人不成社會如今這幾位小員外學前輩做作約十個朋友起社卻是二月半便來團社員外道我去不得要與爹還願時又不見了香羅木如何去得那人道若少了員外一個便拆散了社會員外與決不下去堂前請見媽媽告知衆員外請兒團社緣沒了香羅木與爹爹還願兒不敢去媽媽就手把著錦袋説向兒子道我這一件寶物是你爹爹泛海外得來的無價之寶我兒將此物與爹爹還願心員外接得打開錦袋紅紙包看時卻是一個玉結連絛環員外謝了媽媽留了請書團了社安排上廟那九個員外也準備行李隨行人從不在話下卻説張員外打扮得一似軍官裹四方大萬字頭巾帶一雙撲獸匾金環著西川錦紵絲袍係一條乾紅大匾絛揮一把玉靶壓衣刀穿一雙革翁鞋員外同幾個社友離了家中迤邐前去飢飧渴飲夜住曉行不則一日到得東嶽就客店歇了至日十個員外都上廟來燒香各自答還心願員外便把玉結連絛環捨入炳靈公殿內還願都了別無甚事便在廊下看社火酌獻這幾個都是後生家乘興去遊山員外在後徐徐而行但見山明水秀風軟雲間一岩風景如屏滿目松筠似畫輕煙淡淡數聲啼鳥落花天麗日融融是處緑楊芳草地員外自覺腳力疲困卻教衆員外先行自己走到一個亭子上歇腳只聽得斧鑿之聲看時見一所作場竹笆夾著望那裡面時都是七八尺來長大漢做生活忽地鑿出一片木屑來員外拾起看時正是園中的香羅木認得是爹爹花押疑怪之間只見一個行者開笆門來面前相揖道長老法旨請員外略到山門獻茶員外入那笆門中一似身登月殿步入蓬瀛但見三門高聳梵宇清幽當門敕額字分明兩個金剛形勇猛觀音位接水陸臺寶蓋相隨鬼子母員外到得寺中只見一個和尚出來相揖道外日深荷了辦緣事今日幸得員外至此請過方丈獻茶員外遠觀不審近睹分明正是向日化香羅木的和尚只得應道日昨多感吾師過訪接待不及和尚同至方丈敘禮分賓主坐定點茶吃罷不曾説得一句話只見黃巾力士走至面前暴雷也似聲個喏告我師炳靈公相見嚇得員外神魂蕩漾口中不語心下思量炳靈公是東嶽神道如何來這裡相見那和尚便請員外屏風後少待貧僧斷了此事卻與員外少敘員外領法旨潛身去屏風後立地看時見十數個黃巾力士隨著一個神道入來但見眉單眼細貌美神清身披紅錦袞龍袍腰系藍田白玉帶裹簇金帽子著側面絲鞋員外仔細看時與嶽廟塑的一般只見和尚下階相揖禮畢便問昨夜公事如何炳靈公道此人直不肯認做諸侯只要做三年天子和尚道直恁難勘教押過來只見幾個力士押著一大漢約長八尺露出滿身花繡至方丈和尚便道教你做諸侯有何不可卻要圖王爭帝好打道不了黃巾力士撲翻長漢在地打得几杖子那漢長嘆一聲道休休不肯還我三年天子胡亂認做諸侯罷黃巾力士即時把過文字安在面前教他押了花字便放他去炳靈公抬身道甚勞吾師心力相辭別去和尚便請員外出來坐定和尚道山門無可見意略備水酒三杯少延清話員外道深感吾師見愛道罷酒至面前吃了幾杯便教收過一壁和尚道員外可同往山後間遊員外道謹領法旨二人同至山中間走但見奇峰聳翠佳木交陰千層怪石惹間雲一道飛泉垂素練萬山橫碧落一柱入丹霄員外觀看之間喜不自勝便問和尚此處峭壁直恁險峻和尚道未為險峻請員外看這路水員外低頭看時被和尚推下去員外吃一驚卻在亭子上睡覺來道作怪欲道是夢來口中酒香道不是夢來卻又不見蹤迹正疑惑間只見衆員外走來道員外你卻怎地不來獨自在這裡打磕睡張員外道賤體有些不自在有失陪步得罪得罪也不説夢中之事衆員外遊山都了離不得買些人事整理行裝廝趕歸來單説張員外到家親鄰都來遠接與員外洗拂見了媽媽歡喜不盡只見四時光景急如梭一歲光陰如拈指卻早臘月初頭但見北風凜冽瑞雪紛紛有一隻鷓鴣天詞為證凜冽嚴凝霧氣昏空中瑞雪降紛紛須臾四野難分別頃刻山河不見痕銀世界玉乾坤望中隱隱接崑崙若還下到三更後直要填平玉帝門員外看見雪卻大便教人開倉庫散些錢米與窮漢且説一個人在客店中被店小二埋怨道喏大個漢沒些運智這早晚兀自不起今日又是兩個月不還房錢哥哥你起休那人長嘆一聲苦苦小二哥莫怪我也是沒計奈何店小二道今日前巷張員外散貧你可討些湯洗了頭臉胡亂討得些錢來且做盤纏我又不指望你的那人道罪過你便去帶了那頂搭圾頭巾身上披著破衣服露著腿赤著腳離了客店迎著風雪走到張員外宅前事有鬥巧物有故然卻來得遲些都散了這個人走至宅前見門公唱個喏聞知宅上散貧門公道卻不早來都散了那人聽得叫聲苦匹然倒地員外在窗中看見即時教人扶起傾刻之間三魂再至七魄重來員外仔細看時吃一驚這人正是亭子上夢中見的卻恁地模樣便問那漢你是那里人姓甚名誰見在那裡住那人叉著手告員外小人是鄭州泰寧軍大戶財主人家孩兒父母早喪流落此間見在宅後王婆店中安歇姓鄭名信員外即時討幾件舊衣服與他討些飯食請他吃罷便道你會甚手藝那人道略會些書算員外見説把些錢物與他還了店中便收留他見他會書算又似夢中見的一般便教他在宅中做主管那人卻伶俐在宅中小心向前員外甚是敬重便做心腹人又過幾時但見時光如箭日月如梭不覺又是二月半間那衆員外便商量來請張員外同去出郊一則團社二則賞春那幾個員外隔夜點了妓弟一家帶著一個尋常間來往説得著行首知得張員外有孝怕他不肯帶妓女先請他一個得意的表子在那裡張員外不知是計走到花園中見了幾個行首廝叫了只見衆中走出一個行首來他是兩京詩酒客煙花杖子頭喚做王倩卻是張員外説得著的頂老員外見了卻待要走被王倩一把扯住道員外久別臺顏一向疏失員外道深荷姐姐厚意緣先父亡去持服在身恐外人見之深為不孝便轉身來辭衆員外道俊卿荷諸兄見愛偶賤體不快坐侍不及先此告辭那衆員外和王倩再三相留員外不得已只得就席和王行首並坐衆員外身邊一家一個妓弟便教整頓酒來正吃得半酣只見走一個人入來如何打扮裹一頭藍青頭巾帶一對撲匾金環著兩上領白綾子衫腰系乾紅絨線絛下著多耳麻鞋手中攜著一個籃兒這人走至面前放下籃兒叉著手唱三個喏衆員外道有何話説只見那漢就籃內取出砧刀借個盤子把塊牛肉來切得幾片安在盤裡便來衆員外面前道得知衆員外在此吃酒特來送一勸道罷安在面前唱個喏便去張員外看了暗暗叫苦道我被那廝詐害幾遍了原來那廝是東京破落戶姓夏名德有一個渾名叫做扯驢先年曾有個妹子嫁在老張員外身邊為爭口間氣一條繩縊死了夏德將此人命為繇屢次上門嚇詐在小張員外手裡也詐過一二次衆員外道不須懮慮他只是討些賞賜我們自吃酒道不了那廝立在面前道今日夏德有采遭際這一會員外衆人道各支二兩銀子與他討至張員外面前員外道依例支二兩那廝看著張員外道員外依例不得別的員外二兩你卻要二百兩張員外道我比別的加倍也只四兩如何要二百兩夏德道別的員外沒甚事你卻有些瓜葛莫待我説出來不好看張員外被他直詐到二十兩衆員外道也好了那廝道看衆員外面上罷只求便賜張員外道沒在此間把批子去我宅中質庫內討夏扯驢得了批子唱個喏便出園門一徑來張員外質庫裡揭起青布簾兒走入去人唱個喏衆人還了禮未發迹的貴人問道贖典還是解錢夏扯驢道不贖不解員外有批子在此教支二十兩銀鄭信便問員外買你甚麼支許多銀那廝道買我牛肉吃鄭信道員外直吃得許多牛肉夏扯驢道主管莫問只照批子付與我兩個説來説去一聲高似一聲這鄭信只是不肯付與他將了二十兩銀在手道夏扯驢我説與你銀子已在此了我同到花園中去見員外若是當面分付得有話我便與你夏扯驢罵道打脊客作兒員外與我銀子乾你甚事卻要你作難便與你去員外這批子須不是假的這鄭信和夏扯驢一徑到花園中見衆員外在亭子上吃酒進前唱個喏張員外見鄭信來便道主管沒甚事鄭信道覆使頭蒙臺批支二十兩銀如今自把來取臺旨張員外道這廝是個破落戶把與他去罷夏扯驢就來鄭信手中搶那銀子鄭信那肯與他便對夏扯驢道銀子在這裡員外教把與你我卻不肯你倚著東京破落戶要平白地騙人錢財別的怕你我鄭信不怕你就衆員外面前與你比試你打得我過便把銀子與你打我不過教你許多時聲名一旦都休夏扯驢聽得説我好沒興吃這客作欺負鄭信道莫説你強我會這裡且是寬和你賭個勝負鄭信脫膊下來衆人看了喝采先自人才出衆那堪滿體雕青左臂上三仙仗劍右臂上五鬼擒龍胸前一搭御屏風脊背上巴山龍出水夏扯驢也脫膊下來衆人打一看時那廝身上刺著的是木拐梯子黃胖兒忍字當下兩個在花園中廝打賭個輸贏這鄭信拳到手起去太陽上打個正著夏扯驢撲的倒地登時身死唬得衆員外和妓弟都走了即時便有做公的圍住鄭信拍著手道我是鄭州泰寧軍人見今在張員外宅中做主管夏扯驢來騙我主人我拳手重打殺了他不幹他人之事便把條索子縛我去衆人見説道好漢子與我東京除了一害也不到得償命離不得解進開封府押下凶身對尸這鄭信一發都招認了下獄定罪張員外在府裡使錢教好看他指望遷延等天恩大赦不在話下忽一日開封府大尹出城謁廟正行轎之間只見路傍一口古井黑氣沖天而起大尹便教住轎看了道怪哉便去廟中燒了香回到府不入衙中便教客將請衆官來不多時衆官皆至相見茶湯已畢大尹便道今日出城謁廟路旁見一口古井其中黑氣沖天不知有何妖怪衆官無人敢應只有通判起身道據小官愚見要知井中怪物何不且奏朝廷照會將見在牢中該死罪人教他下井去看驗的實必知休咎大尹依言即具奏朝廷便指揮獄中揀選當死罪人下井要看仔細大尹和衆人到地頭押過罪人把籃盛了用轆轤放將下去只聽鈴響絞上來看時止有骨頭一個下去一個死二人下去一雙亡似此壞了數十人獄中受了張員外囑託也要藏留鄭信大尹臺旨教獄中但有罪人都要押來卻藏留鄭信不得只得押來大尹教他下井去鄭信道下去不辭願乞五件物大尹問要甚五件鄭信道要討頭盔衣甲和靴劍一口一斗酒二斤肉炊餅之類大尹即時教依他所要一一將至面前鄭信唱了諾把酒肉和炊餅吃了披挂衣甲仗了劍衆人喝聲采但見頭盔似雪衣甲如銀穿一雙抹緑皂靴手仗七星寶劍鄭信打扮了坐在籃中轆轤放將下去鈴響絞上來看時不見了鄭信那井中黑氣也便不起大尹再教放下籃去取時杳無蹤迹一似石沈大海線斷風箏大尹知衆官等候多時且各自回衙去卻説未發迹變泰國家節度使鄭信到得井底便走出籃中仗劍在手去井中一壁立地初下來時便黑在下多時卻明鄭信低頭看時見一壁廂一個水口卻好容得身挨身入去行不多幾步抬頭看時但見山嶺相連煙霞繚繞芳草長茸茸嫩緑岩花噴馥馥清香蒼崖郁郁長青松曲澗涓涓流細水鄭信正行之間悶悶不已知道此處是那裡又沒人煙日中前後去松陰竹影稀處望時只見飛簷碧瓦棟宇軒窗想有山人居止遂登危歷險尋徑而往只聞流水松聲步履之下漸漸林麓兩分巒峰四合但見溪深水曲風靜雲間青松鎖碧瓦朱甍修竹映雕簷玉砌樓臺高聳院宇深沈若非王者之宮必是神仙之府鄭信見這一所宮殿便去宮前立地多時更無一人出入抬頭看時只見門上一面紅牌金字寫著日霞之殿裡面寂寥杳無人迹仗劍直入宮門走到殿內只見一個女子枕著件物事齁出地裸體而臥但見蘭柔柳困玉弱花羞似楊妃出浴轉香衾如西子心疼欹玉枕柳眉斂翠桃臉凝紅卻是西園芍藥倚朱欄南海觀音初入定鄭信見了女子這卻是此怪便悄悄地把隻手襯著那女子拿了枕頭的物事又輕輕放下女子頭走出外面看時卻是個乾紅色皮袋鄭信不解其故把這件物事去花樹下將劍掘個坑埋了又回身仗劍入殿中看著那女子盡力一喝道起只見女子閃開那嬌滴滴眼兒慌忙把萬種妖嬈唬做一團回頭道鄭郎你來也妾守空房等你多時妾與你五百年前姻眷今日得見你那女子初時待要變出本相卻被鄭信偷了他的神通物事只得將錯就錯若是生得不好時把來一劍剁了卻見他如花似玉不覺心動便問女子孰氏女子道丈夫你可放下手中寶劍脫了衣甲妾和你少敘綢繆但見暮雲籠帝榭薄靄罩池塘雙雙粉蝶宿芳叢對對黃鸝棲翠柳畫梁悄悄珠簾放下燕歸來小院沈沈繡被薰香人欲睡風定子規啼玉樹月移花影上紗窗女子便叫青衣安排酒來頃刻之間酒至面前百味珍羞俱備飲至數杯酒已半酣女子道今日天與之幸得見丈夫盡醉方休鄭信推辭女子道妾與鄭郎是五百年前姻眷今日豈可推託又吃了多時乃令青衣收過杯盤兩個同攜素手共入蘭房正是繡幌低垂羅衾漫展兩情歡會共訴海誓山盟二意和諧多少雲情雨意雲淡淡天邊鸞鳳水沈沈交頸鴛鴦寫成今世不休書結下來生合歡帶到得天明女子起來道丈夫夜來深荷見憐鄭信道深感娘娘見愛未知孰氏恐另日相見即當報答深恩女子道妾乃日霞仙子我與丈夫盡老百年何有思歸之意這兩口兒同行並坐暮樂朝歡忽一日那女子對鄭信道丈夫你耐靜則個我出去便歸鄭信道到那裡去女子道我今日去赴上界蟠桃宴便歸留下青衣相伴如要酒食旋便指揮有件事囑付丈夫切不可去後宮遊戲若還去時利害非輕那女子分付了暫別兩個青衣伏侍鄭信獨自無聊遂令安排幾杯酒消遣思量卻似一場春夢留落在此適來我妻分付莫去後宮想必另有景致不交我去我再試探則個遂移步出門迤邐奔後宮來打一看又是一個去處一個宮門到得裡面一個大殿金書牌額月華之殿正看之間聽得鞋履響腳步鳴語笑喧雜之聲只見一簇青衣擁著一個仙女出來生得盈盈玉貌楚楚梅妝口點櫻桃眉舒柳葉輕疊烏雲之發風消雪白之肌不饒照水芙蓉恐是凌波菡萏一塵不染百媚俱生鄭信見了喜不自勝只見那女子便道好也何處不尋甚處不覓原來我丈夫只在此間不問事繇便把鄭信簇擁將去叫道丈夫你來也妾守空房等你久矣鄭信道娘娘錯認了我自有渾家在前殿那女子不繇分説簇擁到殿上便教安排酒來那女子和鄭信飲了數杯二人攜手入房向鴛幃之中成夫婦之禮頃刻間雲收雨散整衣而起只見青衣來報前殿日霞娘娘來見這女子慌忙藏鄭信不及日霞仙子走至面前道丈夫你卻走來這裡則甚便拖住鄭信臂膊將歸前殿月華仙子見了柳眉剔豎星眼圓睜道你卻將身嫁他我卻如何便帶數十個青衣奔來直到殿上道姐姐我的丈夫你卻如何奪了日霞仙子道妹妹是我丈夫你卻説甚麼話兩個一聲高似一聲這鄭信被日霞仙子把來藏了月華仙子無計奈何兩個打做一團扭做一塊斗了多時月華仙子覺道斗姐姐不下喝聲起跳至虛空變出本相那日霞仙子也待要變原來被鄭信埋了他的神通便變不得卻輸了慌忙走來見鄭信兩淚交流道丈夫只因你不信我言故有今日之苦又被你埋了我的神通我變不得若要奈何得他可把這件物事還我鄭信見他哀求不已只得走來殿外花樹下掘出那件物事來日霞仙子便再和月華仙子斗聖日霞仙子又輸了走回來鄭信道我妻又怎的奈何他不下日霞仙子道為我身懷六甲贏那賤人不得我有件事告你鄭信道我妻有話但説日霞仙子教青衣去取來不多時把一張弓一隻箭道丈夫此弓非人間所有之物名為神臂弓百發百中我在空中變就神通和那賤人鬥法你可在下看著白的射一箭助我一臂之力鄭信道好你但放心説不了月華仙子又來兩個上雲中變出本相相鬥鄭信在下看時那裡見兩個如花似玉的仙子只見一個白一個紅兩個蜘蛛在空中相鬥鄭信道原來如此只見紅的輸了便走後面白的趕來被鄭信彎弓覷得親一箭射去喝聲著把白蜘蛛射了下來月華仙子大痛失聲便罵鄭信負心賊暗算了我也自往後殿去不提這裡日霞仙子收了本相依元一個如花似玉佳人看著鄭信道丈夫深荷厚恩與妾解圍使妾得遂終身偕老之願兩個自此越説得著行則併肩坐則疊股無片時相捨正是春和淑麗同攜手於花前夏氣炎蒸共納涼於花下秋光皎潔銀蟾與桂偶同圓冬景嚴凝玉體與香肩共暖受物外無窮快樂享人間不盡歡娛倏忽間過了三年生下一男一女鄭信自思在此雖是朝歡暮樂作何道理髮迹變態遂告道感荷娘娘收留在此一住三年生男育女若得前途發迹報答我妻是吾所願日霞仙子見説淚下如雨道丈夫你去不爭教我如何兩個孩兒卻是怎地鄭信道我若得一官半職便來取你們仙子道丈夫你要何處去鄭信道我往太原投軍仙子見説便道丈夫與你一件物事教你去投軍有分發迹便叫青衣取那張神臂剋敵弓便是今時踏凳弩分付道你可帶去軍前立功定然有五等諸侯之貴這一男一女與你扶養在此直待一紀之後奴自遣人送還鄭信道我此去若有發迹之日早晚來迎你母子仙子道你我相遇亦是夙緣今三年限滿仙凡路隔豈復有相見之期乎説罷不覺潸然下淚鄭信初時求去聽説相見無期心中感傷亦流淚不已情願再住幾時仙子道夫妻緣盡自然分別妾亦不敢留君恐誤君前程必遭天譴即命青衣置酒餞別飲至數杯仙子道丈夫你先前攜來的劍和那一副盔甲權留在此他日這兒女還你那時好作信物鄭信道但憑賢妻主意仙子又親勸別酒三杯取一大包金珠相贈親自送出宮門約行數裡之程遠遠望見路口仙子道丈夫你從此出去便是大路前程萬里保重保重鄭信方欲眷戀忽然就腳下起陳狂風風定後已不見了仙子但見青雲藏寶殿薄霧隱回廊靜聽不聞消息之聲回視已失峰巒之勢日霞宮想歸海上神仙女料返蓬萊多應看罷僧繇面捲起丹青一幅圖鄭信抱了一張神臂弓呆呆的立了半晌沒奈何只得前行到得路口看時卻是汾州大路此路去河北太原府不遠那太原府主卻是種相公諱師道見在出榜招軍鄭信走到轅門投軍獻上神臂弓種相公大喜分付工人如法製造數千張遂補鄭信為帳前管軍指揮後來收番纍立戰功都虧那神臂弓之用十餘年間直做到兩川節度使之職思念日霞公主恩義並不婚娶話分兩頭再説張俊卿員外自從那年鄭信下井之後好生思念每年逢了此日就差主管備下三牲祭禮親到井邊祭奠也是不忘故舊之意如此數年未嘗有缺忽一日祭奠回來覺得身子困倦在廳堂中少憩片時不覺睡去夢見天上五色雲霞燦爛奪目忽然現出一位紅衣仙子左手中抱著一男右手中抱著一女高叫張俊卿這一對男女是鄭信所生今日交付與你你可好生撫養鄭信發迹之後送至劍門不可負吾之託説罷將手中男女從半空裡撇下來員外接受不迭驚出一身冷汗驀然醒來口稱奇怪尚未轉動只見門公報道方才有個白鬚公公領著一男一女送與員外説道員外在古井邊曾受他之託又有送這個包裹這一口劍説是兩川節度使的信物在內教員外親手開看男女不知好歹特來報知張員外聽説正符了夢中之言打開包裹看時卻是一副盔甲在內和這口劍收起親走出門看時已不見了白鬚公公但見如花似玉的一雙男女約莫有三四歲長成問其來歷但雲娘是日霞公主教我去跟尋鄭家爹爹再叩其詳都不能言張員外想道鄭信已墮井中幾曾出來那裡又有兒女莫非是同名同姓的又想起嶽廟之夢分明他有五等諸侯之貴心中委決不下且收留著這雙男女好生撫養一面打探鄭信消息光陰如箭看看長大張員外把作自己親生兒女看成男取名鄭武女取名彩娘張員外自有一子年紀相方叫做張文一文一武如同胞兄弟同在學堂攻書彩娘自在閨房針指又過了幾年並不知鄭信下落忽一日張員外走出廳來忽見門公來報有兩川節度使差來進表官員寫了員外姓名居址問到這裡他要親自求見員外心中疑慮忙教請進只見那差官頭頂纏棕大帽腳踏粉底烏靴身穿蜀錦窄袖襖子腰系間銀純鐵挺帶行來魁岸之容面帶風塵之色從者牽著一匹大馬相隨張員外降階迎接敘禮已畢那差官取出一包禮物並書信一封説道節使鄭爺多多拜上張員外拆書看時認得是鄭信筆迹書上寫道信向蒙恩人青目獄中又多得看覷此乃莫大之恩也前入古井自分無幸何期有日霞仙子之遇伉儷三年復贈資斧送出汾州投軍纍立戰功今叨福庇得撫蜀中向無鴻雁有失奉侯今因進表之便薄具黃金三十兩蜀錦十端權表微忱儻不畏蜀道之難肯到敝治光顧信之萬幸懸望懸望張員外看罷舉手加額道鄭家果然發迹變泰又不忘故舊遠送禮物真乃有德有行之人也遂將向來夢中之事一一與差官説知差官亦驚訝不已是日設筵款待差官那差官雖然是有品級的武職卻受了節使分付言語來迎取張員外的好生謙謹張員外就留他在家中作寓日日宴會間話休敘過了十來日公事了畢差官催促員外起身張員外與院君商量要帶那男女送還鄭節使又想女兒不便同行只得留在家中單帶那鄭武上路隨身行李童僕四人和差官共是七個馬一同出了汴京望劍門一路進發不一日到了節度使衙門差官先入稟復鄭信忙教請進私衙以家人之禮相見員外率領鄭武拜認父親敘及白髮公公領來相托獻上盔甲腰刀信物並説及兩番奇夢鄭信念起日霞仙子情分淒然傷感屈指算之恰好一十二年男女皆一十二歲仙子臨行所言分毫不爽其時大排筵會管待張員外禮為上賓就席間將女兒彩娘許配員外之子張文親家相稱此謂以德報德也卻説鄭信思念日霞仙子不已於綿江之傍建造日霞行宮極其壯麗歲時親往行香再説張員外住了三月有餘思想家鄉鄭信不敢強留安排車馬送出十里長亭之外贈遺之厚自不必説又將黃金百兩托員外施捨嶽廟修造炳靈公大殿後來因金兀朮入寇天子四下徵兵鄭信帶領兒子鄭武勤王纍敗金兵到汴京復與張俊卿相會方才認得女壻張文及女兒彩娘鄭信壽至五十餘白日看見日霞仙子命駕來迎無疾而逝其子鄭武以父蔭纍官至宣撫使其後金兵入寇不已各郡縣俱仿神臂弓之制多能殺賊到徽欽北狩康王渡江為金兵所追忽見空中有金甲神人率領神兵以神臂弓射賊賊兵始退康王見旗幟上有鄭字以問從駕之臣有人奏言前兩川節度使鄭信曾獻剋敵神臂弓此必其神來護駕耳康王既即位敕封明靈昭惠王立廟於江上至今古迹猶存詩曰鄭信當年未遇時俊卿夢裡已先知運來自有因緣到到手休嫌早共遲
