body:
  text: 第二十六卷薛録事魚服證仙借問白龍緣底事蒙他魚服區區雖然縱適在河渠失其雲雨勢無乃困余且要識靈心能變化須教無主常虛非關喜裡乍昏愚莊周曾作蝶薛偉變為魚話説唐肅宗乾元年間有個官人姓薛名偉吳縣人氏曾中天寶末年進士初任扶風縣尉名聲頗著升為蜀中青城縣主薄夫人顧氏乃是吳縣第一個大族不惟容止端麗兼且性格柔婉夫妻相得愛敬如賓不覺在任又經三年大尹升遷去了上司知其廉能即委他署攝縣印那青城縣本在窮山深谷之中田地磽脊歷年歲歉民貧盜賊生髮自薛少府署印立起保甲之法凡有盜賊協力緝捕又設立義學教育人材又開義倉賑濟孤寡每至春間親往各鄉課農布種又把好言勸諭教他本分為人因此處處田禾大熟盜賊盡化為良民治得縣中真個夜不閉戶路不拾遺百姓戴恩懷德編成歌謠稱頌其美歌云秋至而收春至而耘吏不催租夜不閉門百姓樂業立學興文教養兼遂薛公之恩自今孩童願以名存將何字之薛兒薛孫那薛少府不但謙謹仁慈愛民如子就是待那同僚卻也謙恭虛己百凡從厚原來這縣中有一個縣丞一個主簿兩個縣尉那縣丞姓鄒名滂也是進士出身與薛少府恰是同年好友兩個縣尉一個姓雷名濟一個姓裴名寬這三位官人為官也都清正因此臭味相投每遇公事之暇或談詩或奕棋或在花前竹下開樽小飲彼來此往十分款洽一日正值七夕薛少府在衙中與夫人乞巧飲宴原來七夕之期不論大小人家少不得具些酒果為乞巧穿針之宴你道怎麼叫做乞巧穿針只因天帝有個女兒喚做織女星日夜辛勤織天帝愛其勤謹配與牽牛星為婦誰知織女自嫁牛郎之後貪歡眷戀卻又好梳妝打扮每日只是梳頭再不去調梭弄織天帝瞋怒罰織女住在天河之東牛郎住在天河之西一年只許相會一度正是七月七日到這一日卻教喜鵲替他在天河上填河而渡因此世人守他渡河時分皆於星月之下將彩線去穿針眼穿得過的便為得巧穿不過的便不得巧以此卜一年的巧拙你想那牛郎織女眼巴巴盼了一年才得相會又只得三四個時辰忙忙的敘述想念情還恐説不了那有間工夫又到人間送巧豈不是個荒唐之説且説薛少府當晚在庭中與夫人互相勸酬不覺坐到夜久更深方才入寢不道卻感了些風露寒涼遂成一病渾身如炭火燒的一般汗出如雨漸漸三餐不進精神減少口裡只説道我如今頃刻也捱不過了你們何苦留我在這裡不如放我去罷你想病人説出這樣話頭明明不是好消息了嚇得那顧夫人心膽俱落難道就這等坐視他死了不成少不得要去請醫問卜求神許願原來縣中有一座青城山是道家第五洞天山上有座廟宇塑著一位老君極有靈感真是祈晴得晴祈雨得雨祈男得男祈女得女香火最盛因此夫人寫下疏文差人到老君廟祈禱又聞靈籤最驗一來求他保佑少府延福消災二來求賜一簽審問凶吉其時三位同僚聞得都也素服角帶步至山上行香情願減損自己陽壽代救少府剛是同僚散後又是合縣父老率著百姓們一齊拜禱顯見得少府平日做官好處能得人心如此只是求的簽是第三十二簽那簽訣道百道清泉入大江臨流不覺夢魂涼何須別向龍門去自有神魚三尺長差人抄這簽訣回衙與夫人看了解説不出想道聞得往常間人求的皆如活見一般不知怎地我們求的卻説起一個魚來與相公的病全無著落是吉是凶好生難解以此心上就如十五六個吊桶打水七上八落的轉加憂鬱又想道這簽訣已不見怎的且去訪個醫人來調治倒是正經即差人去體訪卻訪得成都府有個道人李八百他説是孫真人第一個徒弟傳得龍宮祕方有八百個因此人都叫他做李八百真個請他醫的手到病除極有神效他門上寫下一對春聯道藥按韓康無二價杏栽董奉有千株但是請他的難得就來若是肯來這病人便有些生機了他要的謝儀卻又與人不同也有未曾開得藥箱先要幾百兩的也有醫好了不要分文酬謝止要吃一醉的也有聞召即往的也有請殺不去的甚是捉他不定大抵只要心誠他便肯來夫人知得有這個醫家即差下的當人賫了禮物星夜趕去請那李八百恰好他在州裡一請便來夫人心下方覺少寬豈知他一進門來還不曾認脈説道這病勢雖則像個死的卻是個不死的也要請我來則甚當下夫人備將起病根由並老君廟裡占的簽訣盡數説與太醫知道求他用藥那李八百隻是冷笑道這個病從來不上醫書的我也無藥可用唯有死後常將手去摸他的胸前若是一日不冷一日不可下棺待到半月二旬之外他思想食吃自然漸漸蘇醒回來那老君廟簽訣雖則靈應然須過後始驗非今日所能猜度得的到底不肯下藥竟自去了也不知少府這病當真不消吃藥自然無事還是病已犯拙下不得藥的故此託辭而去正是青龍共白虎同行吉凶事全然未保夫人因見李八百去了嘆道這等有名的醫人尚不肯下藥難道還有別一個敢來下藥定然病勢不救唯有奄奄待死而已只見熱了七日七夜越加越重忽然一陳昏迷閉了眼去再叫也不醒了夫人一邊啼哭一邊教人稟知三位同僚要辦理後事那同僚正來問假得了這個凶信無不淚下急至衙中向尸哭了一回然後與夫人相見又安慰一番因是初秋時候天氣還熱分頭去備辦衣衾棺槨到第三日諸色完備理當殯殮入棺其時夫人扶尸慟哭覺得胸前果然有微微暖氣以此信著李八百道人的説話還要停在床裡只見家人們都道從來死人胸前盡有三四日暖的不是一死便冷此何足據現今七月天道炎熱未退倘遇一聲雷響這尸首就登時漲將起來怎麼還進得棺去夫人道李道人元説胸前一日不冷一日不可入棺如今既是暖的就做不信他守到半月二十多日怎忍便三日內帶熱的將他殮了況且棺木已備等我自己日夜守他只待胸前一冷就入棺去也不為遲天那但願李道人的説話靈驗守得我相公重醒回來何但救了相公一命卻不連我救了兩命衆人再三解説夫人終是不聽拗他不過只得依著停下少府在床謹謹看守不在話下卻説少府病到第七日身上熱極便是頃刻也挨不過一心思量要尋個清涼去處消散一消散或者這病還有好的日子因此悄地裡背了夫人瞞了同僚竟提一條竹杖私離衙齋也不要一人隨從倏忽之間已至城外就如飛鳥辭籠遊魚脫網一般心下甚喜早把這病都忘了你道少府是個官怎麼出衙去就沒一個人知道原來想極成夢夢魂兒覺得如此這身子依舊還在床上怎麼去得單苦了守尸的哭哭啼啼無明無夜只望著死裡求生豈知他做夢的飄飄忽忽無礙無拘到也自苦中取樂薛少府出了南門便向山中遊去來到一座山叫做龍安山山上有座亭子乃是隋文帝封兒子楊秀做蜀王建亭於此名為避暑亭前後左右皆茂林修竹長有四面風來全無一點日影所以蜀王每到炎天便率領賓客來此亭中避暑果然好個清涼去處少府當下看見便覺心懷開爽若使我不出城怎知山中有這般境界但是我在青城縣做了許多時尚且不曾到此想那三位同僚怎麼曉得只合與他們知會同攜一尊為避暑之宴可惜有了勝地少了勝友終是一場欠事眼前景物可人遂作詩一首詩云偷得浮生半日間危梯絶壁自躋攀雖然呼吸天門近莫遣乘風去不還薛少府在亭子裡坐了一會又向山中行去那山路上沒有些樹木蔭蔽怎比得亭子裡這般涼爽以此越行越悶漸漸行了十餘裡遠遠望見一條大江你道這江是甚麼江昔日大禹治水從岷山導出岷江過了茂州威州地面又導出這個江水來叫做沱江至今江岸上垂著大鐵鏈也不知道有多少長沈在江底乃是大禹鎖著應龍的去處原來禹治江水但遇水路不通便差那應龍前去隨你幾百里的高山巨石只消他尾子一抖登時就分開做了兩處所以世稱大禹叫個神禹若不會驅使這樣東西焉能八年之間洪水底定至今泗江水上也有一條鐵鏈鎖著水母其形似獼猴一般這沱江卻是應龍皆因水功既成鎖著以鎮後害豈不是個聖迹當下少府在山中行得正悶況又患著熱癥的忽見這片沱江浩浩蕩蕩真個秋水長天一色自然覺得清涼直透骨髓就恨不得把三步並做一步風車似奔來豈知從山上望時甚近乃至下得山來又遠還不曾到得沱江卻被一個東潭隔住這潭也好大哩水清似鏡一般不論深淺去處無不見底況又映著兩岸竹樹秋色可掬少府便脫下衣裳向潭中洗澡原來少府是吳人生長澤國從幼學得泅水成人之後久已不曾弄這本事不意今日到此遊戲大快夙心偶然嘆道人遊到底不如魚健怎麼借得這魚鱗生在我身上也好到處遊去豈不更快只見旁邊有個小魚卻覷著少府道你要變魚不難何必假借待我到河伯處為你圖之説聲未畢這小魚早不見了把少府吃上一驚想道我怎知這水裡有精怪的豈可獨自一個在裡面洗澡不如早早抽身去罷豈知少府既動了這個念頭便少不得墮了那重業障只教衣冠暫解人間纍鱗甲俄看水上生薛少府正在沈呤恰待穿了衣服尋路回去忽然這小魚來報道恭喜河伯已有旨了早見一個魚頭人騎著大魚前後導從的小魚不計其數來宣河伯詔曰城居水遊浮沈異路苟非所好豈有兼通爾青城縣主薄薛偉家本吳人官亦散局樂清江之浩渺放意而遊厭塵世之喧囂拂衣而去暫從鱗化未便終身可權充東潭赤鯉嗚呼縱遠適以忘歸必受神明之罰昧纖鉤而貪餌難逃刀俎之災無或失身以羞吾黨爾其勉之少府聽詔罷回顧身上已都生鱗全是一個金色鯉魚心下雖然駭異卻又想道事已如此且待我恣意遊玩一番也曉得水中的意趣自此三江五湖隨其意向無不遊適原來河伯詔書上説充東潭赤鯉這東潭便似分定的地方一般不論遊到那裡少不得要回到那東潭安歇單則那一味也覺得有些兒不在過了幾日只見這小魚又來對薛少府道你豈不聞山西平陽府有一座山叫個龍門山是大禹治水時鑿將開的山下就是黃河只因山頂上有水接著天河的水直衝下來做黃河的源頭所以這個去處叫做河津目今八月天氣秋潦將降雷聲先發普天下鯉魚無有不到那裡去跳龍門的你如何不稟辭河伯也去跳龍門若跳得過時便做了龍豈不便強似做鯉魚原來少府正在東潭裡面住得不耐煩聽見這個消息心中大喜即便別了小魚竟到河伯處所但見宮殿都是珊瑚作柱玳瑁為梁真個龍宮海藏自與人世各別其時河伯管下的地方岷江沱江巴江渝江涪江黔江平羌江射洪江濯錦江嘉陵江青衣江五溪瀘水七門灘瞿塘三峽那一處鯉魚不來稟辭要去跳龍門的只有少府是金色鯉魚所以各處的都推他為首同見河伯舊規有個公宴就如起送科舉的酒席一般少府和各處鯉魚一齊領了宴謝了恩同向龍門跳去豈知又跳不過點額而回你道怎麼叫做點額因為鯉魚要跳龍門逆水上去把周身的精血都積聚在頭頂心裡就如被朱筆在額上點了一點的以此世人稱下第的皆為點額蓋本於此正是龍門浪急難騰躍額上羞題一點紅卻説青城縣裡有個漁戶叫做趙乾與妻子在沱江上網魚為業豈知網著一個癩頭黿被他把網都牽了去連趙乾也幾乎吊下江裡那妻子埋怨道我們專靠這網做本錢養活兩口今日連本錢都弄沒了那裡還有餘錢再討得個網來況且縣間官府早晚常來取魚你把甚麼應付以此整整爭了一夜趙乾被他絮聒不過只得裝一個釣竿商量來東潭釣魚你道趙乾為何捨了這條大江卻向潭裡釣魚原來沱江流水最急正好下網不好下釣故因想到東潭另做此一行生意那釣鉤上鉤著香香的一大塊油面沒下水中薛少府自龍門點額回來也有許多沒趣好幾日躲在東潭不曾出去覓食肚中飢甚忽然間趙乾的漁船搖來不免隨著他船遊去看看只聞得餌香便思量去吃他的已是到了口邊想道我明知他餌上有個鉤子若是吞了這餌可不被他釣了去我雖是暫時變魚耍子難道就沒處求食偏只吃他釣鉤上的再去船傍周圍遊了一轉怎當那餌香得酷烈恰似鑽入鼻孔裡的一般肚中又飢怎麼再忍得住想道我是個人身好不多重這些些釣鉤怎麼便釣得我起便被他釣了去我是縣裡三衙他是漁戶趙乾豈不認得自然送我歸縣卻不是落得吃了他的方才把口就餌上一合還不曾吞下肚子早被趙乾一掣掣將去了這便叫做眼裡識得破肚裡忍不過那趙乾鉤得一個三尺來長金色鯉魚舉手加額叫道造化造化我再釣得這等幾個便有本錢好結網了少府連聲叫道趙乾你是我縣裡漁戶快送我回縣去那趙乾只是不應竟把一根草索貫了魚鰓放在艙裡只見他妻子説道縣裡不時差人取魚我想這等一個大魚若被縣裡一個公差看見取了去領得多少官價不如藏在蘆葦之中等販子投來私自賣他也多賺幾文錢用趙乾説道有理便把這魚拿去藏在蘆葦中把一領破蓑衣遮蓋回來對妻子説若多賣得幾個錢時拚得沽酒來與你醉飲今夜再發利市安知明日不釣了兩個那趙乾藏魚回船還不多時候只見縣裡一個公差叫做張弼來喚趙幹道裴五爺要個極大的魚做吃今早直到沱江邊來喚你你卻又移到這個所在教我團團尋遍走得個汗流氣喘快些揀一尾大的同我送去趙幹道有纍上下走著屈路了不是我要移到這裡只為前日弄沒了網無錢去買沒奈何只得權到此釣幾尾去做本錢卻又沒個大魚上釣止有小魚三四斤在這裡要便拿了去張弼道裴五爺分付要大魚小的如何去回話撲的跳下船揭開艙板一看果然通是小的欲要把去權時答應又想道這般寬闊去處難道沒個大魚一定這廝姦詐藏在那裡即便上岸各處搜看卻又不見次後尋到蘆葦中只見一件破蓑衣掀上掀下的亂動張弼料道必是魚在底下急走上前揭起看時卻是一個三尺來長的金色鯉魚趙乾夫妻望見口裡只叫得苦張弼不管三七草一提了那魚便走回頭向趙乾説道你哄得我好待稟了裴五爺著實打你這廝少府大聲叫道張弼張弼你也須認得我我偶然遊到東潭變魚耍子你怎麼見我不叩頭到提著我走張弼全然不理只是提了魚一直奔回縣去趙乾也隨後跟來那張弼一路走少府也一路罵提到城門口只見一個把門的軍叫做胡健對張弼説道好個大魚只是裴五爺請各位爺飲宴專等魚來做吃道你去了許久不到又飛出簽來叫你你可也走緊些少府抬頭一看正前日出來的那一座南門叫做迎薰門便叫把門軍道胡健胡健前日出城時節曾分付你道我自私行出去的不要稟知各位爺也不要差人迎接難道我出城不上一月你就不記得了如今正該去稟知各位爺差人迎接才是怎麼把我不放在眼裡這等無狀豈知把門軍胡健也不聽見卻與張弼一般那張弼一徑的提了魚進了縣門薛少府還叫罵不止只見司戶吏與刑曹吏兩個東西相向在大門內下棋那司戶吏道好怕人子這等大魚可有十多斤重那刑曹吏道好一個活潑潑的金色鯉魚只該放在後堂緑漪池裡養他看耍子怎麼就捨得做吃了少府大叫道你兩個吏終日在堂上伏事我的便是我變了魚也該認得怎麼見了我都不站起來也不去報與各位爺知道那兩個吏依舊在那裡下棋只不聽見少府想道俗諺有云不怕官只怕管豈是我管你不著一些兒不怕我莫不是我出城這幾日我的官被勾了縱使勾了官我不曾離任到底也還管得他著且待我見同僚時把這起奴才從頭告訴教他一個個打得皮開肉綻看官們牢記下這個話頭待下回表白且説顧夫人謹守薛少府的尸骸不覺過了二十多日只見肌肉如故並不損壞把手去摸著心頭覺得比前更暖些漸漸的上至喉嚨下至肚臍都不甚冷了想起道人李八百的説話果然有些靈驗因此在指頂上刺出鮮血來寫成一疏請了幾個有名的道士在青城山老君廟裡建醮祈求仙方保護少府回生許下重修廟宇再塑金身的願心宣疏之日三位同僚與通縣吏民無不焚香代禱如當日一般我想古語有雲吉人天相難道薛少府這等好官況兼合縣的官民又都來替他祈禱怕就沒有一些兒靈應只是已死二十多日的人要他依舊又活轉來雖則老君廟裡許下願的從無不驗之人但是閻王殿前投到過的那有退回之鬼正是須知作善還酬善莫道無神定有神卻説是夜道士在醮壇上面鋪下七盞明燈就如北斗七星之狀原來北斗第七個星叫做斗杓春指東方夏指南方秋指西方冬指北方在天上旋轉的只有第四個星叫做天樞他卻不動以此將這天樞星上一燈特為本命星燈若是燈明則本身無事暗則病勢淹纏滅則定然難救其時道士手舉法器朗誦靈章虔心禳解伏陰而去親奏星官要保薛少府重還魂魄再轉陽間起來看這七盞燈時盡皆明亮覺得本命那一盞尤加光彩顯見不該死的符驗便對夫人賀喜道少府本命星燈光彩倍加重生當在旦夕切不可過於哀泣恐驚動他魂魄不安有難回轉夫人含著兩行眼淚謝道若得如此也不枉做這個道場和那晝夜看守的辛苦得了這個消息心中少覺寬解豈知朦朧睡去做成一夢明明見少府慌慌忙忙精赤剝的跑入門來滿身都是鮮血把兩隻手掩著脖子叫道悔氣悔氣我在江上泛舟情懷頗暢忽然狂風陡作大浪掀天把舟覆了卻跌在水去幸遇江神憐我陽壽未絶贈我一領黃金鎖子甲送得出水正待尋路入城不意遇著剪徑的強人要謀這領金甲一刀把我殺了你若念夫妻情分好生看守魂魄送我回去夫人一聞此言不覺放聲大哭就驚醒了想道適間道士只説不死如何又有此惡夢我記得夢書上有一句道夢死得生莫非他眼下災悔脫盡故此身上全無一絲一縷亦未可知只是緊緊的守定他尸骸便了到次日夫人將醮壇上犧牲諸品分送三位同僚這個叫做散福其日就是裴縣尉作主會請各衙也叫做飲福因此裴縣尉差張弼去到漁戶家取個大魚來做好配酒吃終是鄒二衙為著同年情重在席上嘆道這酒與平常宴會不同乃為薛公祈禱回生半是醮壇上的品物今薛公的生死未知何如教我們食怎下咽裴五衙便道古人臨食不嘆偏是你念同年我們不念同僚的聽得道士説他回生不在昨晚便是今日我們且待魚來做下酒拚吃個酩酊只在席上等候他一個消息豈不是公私兩盡當日直到未牌時分張弼方才提著魚到階下原來裴五衙在席上作主單為等魚不到只得停了酒看鄒二衙與雷四衙打雙陸自己在傍邊吃著桃子忽回轉頭看見張弼不覺大怒道我差你取魚如何去了許久若不是飛簽催你你敢是不來了麼張弼只是叩頭把漁戶趙乾藏過大魚的情節備細稟上一遍裴五衙便叫當直的把趙乾拖翻著實打了五十下皮鞭打得皮開肉綻鮮血迸流你道趙乾為何先不走了偏要跟著張弼到縣自討打吃他只戀著這幾文的官價思量領去卻被打了五十皮鞭價又不曾領得豈不與這尾金色鯉魚為貪著香餌上了他的鉤兒一般正是世上死生皆為利不到烏江不肯休裴五衙把趙乾趕了出去取去來看卻是一尾金色鯉魚有三尺多長喜嘆此魚甚好便可付廚上做來吃當下薛少府大聲叫道我那裡是魚就是你的同僚豈可錯認得我了我受了許多人的侮慢正要告訴列位與我出這一口惡氣怎麼也認我做魚便付廚上做吃若要作可不屈我殺了枉做這幾時同僚一些兒契分安在其時同僚們全然不禮少府便情極了只得又叫道鄒年兄我與你同登天寶末年進士在都下往來最為交厚今又在此同官與他們不同怎麼不發一言坐視我死只見鄒二衙對裴五衙道以下官愚見這魚還不該做吃那青城山上老君祠前有老大的一個放生池盡有建醮的人買著魚鱉螺蛤等物投放池內今日之宴既是薛衙送來的散福不若也將此魚投於放生池內見我們為同僚的情分種此因果那雷四衙便從旁説道放魚甚善因果之説不可不信況且酒席美肴饌盡勾多了何必又要吃此時薛少府在階下聽見嘆道鄒年兄好沒分曉既是有心救我何不就送回衙裡去怎麼又要送我上山卻不渴壞了我雖然如此也強如死在庖人之手待我到放生池內依還變了轉來重穿冠帶再坐衙門且莫説趙乾這起狗才看那同僚把甚嘴臉來見我正在躊躇又見那裴五衙答道老長官要放這魚是天地好生之心何敢不聽但打醮是道家事不在佛門那一教要修因果也不在這上想道天生萬物專為養人就如魚這一種若不是被人取吃普天下都是魚連河路也不通了凡人修善全在一點心上不在一張口上故諺語有云佛在心頭坐酒肉穿腸過又云若依佛法冷水莫呷難道吃了這個魚便壞了我們為同僚的心眼見得好魚不作吃倒平白地放了他去安知我們不吃又不被水獺吃了總只一死還是我們自吃了的是少府聽了這話便大叫道你看兩個客人都要放我怎麼你做主人的偏要吃我這等執拗莫説同僚情薄原來賓主之禮也一些沒有的原來雷四衙是個兩可的人見裴五衙一心要做魚吃卻又對鄒二衙道裴長官不信因果多分這魚放生不成了但今日是他做主人要以此奉客怎麼好固拒他我想這魚不是我等定要殺他只算今日是他數盡之日救不得罷了當下少府即大聲叫道雷長官你好沒主意怎麼兩邊攛掇既是勸他放我他便不聽你也還該再勸才是怎麼反勸鄒年兄也不要救我敢則你衙齋冷淡好幾時沒得魚吃了故此待他做來思量飽餐一頓麼只得又叫鄒二衙道年兄年兄你莫不是喬做人情麼故假意勸了這幾句便當完了你是再也不出半聲了自古道得好一死一生乃見交情若非今日我是死的你是活的怎知你為同年之情淡薄如此到底有個放我時節等我依舊變了轉來也少不得學翟廷尉的故事將那兩句題在我衙門之上與你看看年兄年兄只怕你悔之晚矣少府雖則亂叫亂嚷賓主都如不聞當時裴五衙便叫廚役叫做王土良因有手段最整治得好故將這魚交付與他説道又要好吃又要快當不然照著趙乾樣子也奉承你五十皮鞭那王士良一頭答應一頭就伸過手提魚急得少府頂門上飛散了三魂腳板底蕩調了七魄便大聲哭起來道我平昔和同僚們如兄若弟極是交好怎麼今日這等哀告只要殺我哎我知道了一定是妒忌我掌印起此一片惡心須知這印是上司委把我的不是我謀來掌的若肯放我回衙我就登時推印有何難哉説了又哭哭了又説豈知同僚都做不聽見竟被王士良一把提到廚下早取過一個砧頭來放在上面少府舉眼看時卻認得是他手裡一向做廚役的便大叫道王士良你豈不認得我是薛三爺若非我將吳下食譜傳授與你看你整治些甚樣肴饌出來能使各位爺這般作興你你今日也該想我平昔抬舉之恩快去稟知各位爺好好送回衙去卻把我來放在砧頭上待要怎的豈知王士良一些不理右手拿刀在手將魚頭著實按上一下激得少府心中不勝大怒便罵你這狗才敢只會奉承裴五衙全不怕我難道我就沒擺布你處一掙掙起來將尾子向王士良臉上只一潑就似打個耳聒子一般打得王士良耳鳴眼暗連忙舉手掩面不迭將那把刀直拋在地下去了一邊拾刀一邊卻冷笑道你這魚既是恁的健浪停一會等我送你到滾鍋兒裡再遊遊去原來做的最要刀快將魚切得雪片也似薄薄的略在滾水裡面一轉便撈起來加上椒料潑上香油自然鬆脆鮮美因此王士良再把刀去磨一下其時少府叫他不應嘆口氣道這次磨快了刀來就是我命盡之日了想起我在衙雖則患病也還可忍耐如何私自跑出卻受這般苦楚若是我不見這個東潭便見了東潭也不下去洗澡便洗個澡也不思量變魚便思量變魚也不受那河伯的詔書也不至有今日總只未變魚之先被那小魚十分攛掇既變魚之後又被那趙乾把香餌來哄我都是命裡湊著自作自受怎好埋怨那個只可憐見我顧夫人在衙無兒無女將誰倚靠怎生寄得一信與他使我死也瞑目正在號啕大哭卻被王士良將新磨的快刀一刀剁下頭來正是三寸氣在誰肯輸半點便宜七尺軀亡都付與一場春夢眼見得少府這一番真個嗚呼哀哉了未知少府生回日已見魚兒命盡時這裡王士良剛把這魚頭一刀剁下那邊三衙中薛少府在靈床之上猛地跳起來坐了莫説顧夫人是個女娘家就險些兒嚇得死了便是一家們在那裡守尸的那一個不搖首咋舌叫道好古怪好古怪我們一向緊緊的守定在此從沒個貓兒在他身上跳過怎麼就把死尸吊了起來只見少府嘆了口氣問道我不知人事有幾日了夫人答道你不要嚇我你已死去了二十五日只怕不會活哩少府道我何曾死只做得一個夢不意夢去了這許多日便喚家人去看三位同僚此時正在堂上將吃魚教他且放下了箸不要吃快請到我衙裡來講話果然同僚們在堂上飲酒剛剛送到魚正待舉箸只見薛衙人稟説少府活轉來了請三位爺莫吃魚便過衙中講話驚得那三位都暴跳起來説道醫人李八百的把脈老君廟裡鋪燈怎麼這等靈驗得緊忙忙的走過薛衙連叫恭喜恭喜只見少府道列位可曉得適才做的這尾金色鯉魚便是不才若不被王士良那一刀我的夢幾時勾醒那三位茫茫不知其故都説道天下豈有此事請老長官試説一番容下官們洗耳拱聽薛少府道適才張弼取魚到時鄒年兄與雷長官打雙陸裴長官在傍吃桃子張弼稟漁戶趙乾藏了大魚把小魚搪塞裴長官大怒把趙乾鞭了五十這事有麼三位道果是如此只是老長官如何曉得恁詳細少府道再與我喚趙乾張弼和那把守迎薰門軍士胡健戶曹刑曹二吏並廚役王士良來待我問他那三位即便差人都去喚到少府問道趙乾你在東潭釣魚釣得個三尺來長金色鯉魚你妻子教你藏在蘆葦之中上頭蓋著舊蓑衣張弼來取魚時你只推沒有大魚卻被張弼搜出提到迎薰門下門軍胡健説道裴五爺下飛簽催你你可走快些到得縣門門內二吏東西相向在那裡下棋一個説魚大得怕人子做來一定好吃一個説這魚可愛只該畜在後堂池裡不該做王士良把魚按在砧頭上卻被魚跳起尾來臉上打了一下又去磨快了刀方才下手這事可都有麼趙乾等都驚道事俱有的但不知三爺何繇知得少府道這魚便是我做的我自被釣之後那一處不高聲大叫要你們送我回衙怎麼都不聽我卻是甚主意趙乾等都叩頭道小的們實是不聽見若聽見時怎麼敢不送回少府又問裴縣尉道老長官要做魚之時鄒年兄再三勸你放生雷長官在傍邊攛掇只是不聽催喚王士良提去我因放聲大哭説枉做這幾時同僚今日定要殺我豈是仁者所為莫説裴長官不禮連鄒年兄雷長官也更無一言這是何意三位相顧道我們何嘗聽見些兒一齊起身請罪少府笑道這魚不死我也不生已作往事不必再題了遂把趙乾等打發出去同僚們也作別回衙將魚投棄水中從此立誓再不吃魚原來少府叫哭那曾有甚麼聲響但見這魚口動而已乃知三位同僚與趙乾等都不聽見蓋有以也且説顧夫人想起老君廟簽訣的句語無一字不驗乃將求簽打醮事情備細説與少府知道就要打點了願少府驚道我在這裡幾多時但聞得青城山上有座老君廟是極盛的香火怎知道靈應如此即便清齋七日備下明燈淨香親詣廟中償願一面差人估計木料裝嚴金像合用若干工價將家財俸資湊來買辦擇日興工到第七日早上屏去左右只帶一個十二三歲的小門子自出了衙門一步一拜向青城山去剛至半山正拜在地猛然聽得有人叫道薛少府你可曉得麼少府不覺吃了一驚抬頭觀看乃是一個牧童頭戴箬笠橫坐青牛手持短笛從一個山坡邊轉出來的當下少府問道你要我曉得甚麼那牧童道你曉得神仙中有個琴高他本騎著赤鯉升天去的只因在王母座上把那彈雲璈的田四妃覷了一眼動了凡心故此兩個並謫人世如今你的前身便是琴高你那顧夫人便是田四妃為你到官以來迷戀風塵不能脫離故又將你權充東潭赤鯉受著諸般苦楚使你回頭你卻怎麼還不省得敢是做夢未醒哩少府道依你説我的前身乃是神仙今已迷惑又須得一個師父來提醒便好牧童道你要個提醒的人遠不遠千里近只在目前這成都府道人李八百卻不是個神仙他本在漢時叫做韓康一向賣藥長安市上口不二價後來為一女子識破了故此又改名為李八百人只説他傳授得孫真人八百個祕方正不知他道術還在孫真人之上實實活過八百多歲了今你夫妻謫限將滿合該重還仙籍何不去問那李八百教他與你打破塵障原來夫人止與少府説得香願的事不曾説起李八百把脈情繇因此牧童説著李八百名姓少府一些也不曉得心下想道山野牧童知道甚麼無過信口胡談荒唐之説何足深信我只是一步一拜還願便了豈知才回顧頭來那牧童與牛化作一道紫氣沖天而去正是當面神仙猶不識前生世事怎能知少府因自己做魚之事來得奇怪今番看見牧童化風而去心下越發惶惑定道連那牧童也是夢中好生委決不下不一時拜到山頂老君座前叩謝神明保佑再得回生只在早晚選定吉日償還願心拜罷起來看那老君神像正是牧童的面貌又見座旁塑著一頭青牛也與那牧童騎的一般方悟道方才牧童分明是太上老君指引我重還仙籍如何有眼無珠當面錯過乃再拜請罪回至衙中備將牧童的話細細述與夫人知道夫人方説起病危時節曾請成都府道人李八百來看脈他説是死而不死之癥須待死後半月二旬自然慢慢的活將轉來不必下藥臨起身時又説這簽訣靈得緊直到看見魚時方有分曉我想他能顧知過去未來之事豈不真是個仙人莫説老君已經顯出化身指引你去便不是仙人既勞他看脈一場且又這等神驗也該去謝他少府聽罷乃道原來又有這段姻緣如何不去謝他又清齋了七日徒步自往成都府去訪那道人李八百恰好這一日李八百正坐在醫鋪裡面一見少府便問道你做夢可醒了未少府撲地拜下答道弟子如今醒了只求師父指教使弟子脫離風塵早聞大道李八百笑道你須不是沒根基的要去燒丹煉火你前世原是神仙謫下太上老君已明明對你説破自家身子還不省得還來問人敢是你只認得青城縣主簿麼當下少府恍然大悟拜謝道弟子如今真個醒了只是老君廟裡香願尚未償還待弟子了願之後即便棄了官職挈了妻子同師父出家證還仙籍未為晚也遂別了李八百急回至青城縣把李八百的話述語夫人知道夫人也就言上省悟前身元是西王母前彈雲璈的田四妃因動塵念墮落當夜便與少府各自一房安下焚香靜坐修證前因次日少府將印送與鄒二衙署攝備文申報上司一面催趲工役蓋造殿庭裝嚴金像極其齊整剛到工完之日那鄒二衙為著當時許願也要分俸相助約了兩個縣尉到少府衙捨説知此事家人只道還在裡邊靜坐進去通報只見案上遺下一詩竟不知少府和夫人都在那裡去了家人拿那首詩遞與鄒二衙觀看乃是留別同僚吏民的詩云魚身夢幻欣無恙若是魚真死亦真到底有生終有死欲離生死脫紅塵鄒二衙看了這詩不勝嗟嘆乃道年兄總要出家修行也該與我們作別一聲如今覺道忒歉然了諒來他去還未遠即差人四下尋訪再也沒些蹤迹正在驚訝裴五衙笑道二位老長官好不睹事想他還掉不下水中滋味多分又去變鯉魚玩耍去了只到東潭上抓他便了不提同僚們胡猜亂想再説少府和夫人不往別處竟至成都去見那李八百那李八百對著少府笑道你前身元是琴高因為你升仙不遠故令赤鯉專在東潭相候今日依先還你赤鯉騎坐上升何如又對夫人道自你謫後西王母前彈雲璈的暫借董雙成如今依舊該是你去彈了自然神仙一輩叫做會中人再不消甚麼口訣甚麼心法都只是一笑而喻其時少府夫人也對李八百説道你先後賣藥行醫救度普衆功行亦非小可何必久混人世李八百道我數合與你同升故在此相候頃刻間祥雲繚繞瑞靄繽紛空中仙音嘹亮鸞鶴翱翔仙童仙女各執幢幡寶蓋前來接引少府乘著赤鯉夫人駕了紫霞李八百跨上白鶴一齊升天遍成都老幼那一個不看見盡皆望空瞻拜贊嘆不已至今升仙橋聖迹猶存詩云茫茫蕩蕩事端新人既為魚魚復人識破幻形不礙性體形修性即仙真
