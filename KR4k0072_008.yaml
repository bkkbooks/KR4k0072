body:
  text: 第八卷喬太守亂點鴛鴦譜自古姻緣天定不由人力謀求有緣千里也相投對面無緣不偶仙境桃花出水宮中紅葉傳溝三生簿上注風流何用冰人開口這首西江月詞大抵説人的婚姻乃前生注定非人力可以勉強今日聽在下説一樁意外姻緣的故事喚做喬太守亂點鴛鴦譜這故事出在那個朝代何處地方那故事出在大宋景年間杭州府有一人姓劉名秉義是個醫家出身媽媽談氏生得一對兒女兒子喚做劉璞年當弱冠一表非俗已聘下孫寡婦的女兒珠姨為妻那劉璞自幼攻書學業已就到十六歲上劉秉義欲令他棄了書本習學醫業劉璞立志大就不肯改業不在話下女兒小名慧娘年方一十五歲已受了鄰近開生藥鋪裴九老家之聘那慧娘生得姿容艷麗意態妖嬈非常標致怎見得但見蛾眉帶秀鳳眼含情腰如弱柳迎風面似嬌花拂水體態輕盈漢家飛燕同稱性格風流吳國西施並美蕊宮仙子謫人間月殿嫦娥臨下界不提慧娘貌美且説劉公見兒子長大同媽媽商議要與他完姻方待教媒人到孫家去説恰好裴九老也教媒人來説要娶慧娘劉公對媒人道多多上覆裴親家小女年紀尚幼一些妝奩未備須再過幾時待小兒完姻過了方及小女之事目下斷然不能從命媒人得了言語回覆裴家那裴九老因是老年得子愛惜如珍寶一般恨不能風吹得大早些兒與他畢了姻事生男育女今日見劉公推託好生不喜又央媒人到劉家説道令愛今年一十五歲也不算做小了到我家來時即如女兒一般看待決不難為就是妝奩厚薄但憑親家並不計論萬望親家曲允則個劉公立意先要與兒子完姻然後嫁女媒人往返了幾次終是不允裴九老無奈只得忍耐當時若是劉公允了卻不省好些事體止因執意不從到後生出一段新聞傳説至今正是只因一著錯滿盤俱是空卻説劉公回脫了裴家央媒人張六嫂到孫家去説兒子的姻事原來孫寡婦母家姓胡嫁的丈夫孫恆原是舊家子弟自十六歲做親十七歲就生下一個女兒喚名珠姨才隔一歲又生個兒子取名孫潤小字玉郎兩個兒女方在襁褓中孫恆就亡過了虧孫寡婦有些節氣同著養娘守這兩個兒女不肯改嫁因此人都喚他是孫寡婦光陰迅速兩個兒女漸漸長成珠姨便許了劉家玉郎從小聘定善丹青徐雅的女兒文哥為婦那珠姨玉郎都生得一般美貌就如良玉碾成白粉團就一般加添資性聰明男善讀書女工針指還有一件不但才貌雙美且又孝悌兼全間話休題且説張六嫂到孫家傳達劉公之意要擇吉日娶小娘子過門孫寡婦母子相依滿意欲要再停幾時因想男婚女嫁乃是大事只得應承對張六嫂道上覆親翁親母我家是孤兒寡婦沒甚大妝奩嫁送不過隨常粗布衣裳凡事不要見責張六嫂覆了劉公劉公備了八盒羹果禮物並吉期送到孫家孫寡婦受了吉期忙忙的制辦出嫁東西看看日子已近母子不忍相離終日啼啼哭哭誰想劉璞因冒風之後出汗虛了變為寒癥人事不省十分危篤吃的藥就如潑在石上一毫沒用求神問卜俱説無救嚇得劉公夫妻魂魄都喪守在床邊吞聲對泣劉公與媽媽商量道孩兒病勢恁樣沈重料必做親不得不如且回了孫家等待病痊再擇日罷劉媽媽道老官兒你許多年紀了這樣事難道還不曉得大凡病人勢凶得喜事一沖就好了未曾説起的還要去相求如今現成事體怎麼反要回他劉公道我看孩兒病體凶多吉少若娶來家沖得好時此是萬千之喜不必講了倘或不好可不害了人家子女有個晚嫁的名頭劉媽媽道老官你但顧了別人卻不顧自己你我費了許多心機定得一房媳婦誰知孩兒命薄臨做親卻又患病起來今若回了孫家孩兒無事不消説起萬一有些山高水低有甚把臂那原聘還了一半也算是他們忠厚了卻不是人財兩失劉公道依你便怎樣劉媽媽道依著我分付了張六嫂不要題起孩兒有病竟娶來家就如養媳婦一般若孩兒病好另擇吉結親倘然不起媳婦轉嫁時我家原聘並各項使費少不得班足了放他出門卻不是個萬全之策劉公耳朵原是棉花做的就依著老婆忙去叮囑張六嫂不要泄漏自古道若要不知除非莫為劉公便瞞著孫家那知他緊間壁的鄰家姓李名榮曾在人家管過解庫人都叫做李都管為人極是刁鑽專一打聽人家的細事喜談樂道因他做主管時得了些不義之財手中有錢所居與劉家基址相連意欲強買劉公房子劉公不肯為此兩下面和意不和巴不能劉家有些事故幸災樂禍曉得劉璞有病危急滿心歡喜連忙去報知孫家孫寡婦聽見女壻病凶恐防誤了女兒即使養娘去叫張六嫂來問張六嫂欲待不説恐怕劉璞有變孫寡婦後來埋怨欲要説了又怕劉家見怪事在兩難欲言又止孫寡婦見他半吞半吐越發盤問得急了張六嫂隱瞞不過乃説偶然傷風原不是十分大病將息到做親時料必也好了孫寡婦道聞得他病勢十分沈重你怎説得這般輕易這事不是當耍的我受了千辛萬苦守得這兩個兒女成人如珍寶一般你若含糊賺了我女兒時少不得和你性命相博那時不要見怪又道你去到劉家説若果然病重何不待好了另擇日子總是兒女年紀尚小何必恁般忙迫問明白了快來回報一聲張六嫂領了言語方欲出門孫寡婦又叫轉道我曉得你決無實話回我的我令養娘同你去走遭便知端的張六嫂見説教養娘同去心中著忙道不消得好歹不誤大娘之事孫寡婦那裡肯聽教了養娘些言語跟張六嫂同去張六嫂攦脫不得只得同到劉家恰好劉公走出門來張六嫂欺養娘不認得便道小娘子少待等我問句話來急走上前拉劉公到一邊將孫寡婦適來言語細説又道他因放心不下特教養娘同來討個實信卻怎的回答劉公聽見養娘來看手足無措埋怨道你怎不阻擋住了卻與他同來張六嫂道再三攔阻如何肯聽教我也沒奈何如今且留他進去坐了你們再去從長計較回他不要連纍我後日受氣説還未畢養娘已走過來張六嫂就道此間便是劉老爹養娘深深道個萬福劉公還了禮道小娘子請裡面坐一齊進了大門到客坐內劉公道六嫂你陪小娘子坐著待我教老荊出來張六嫂道老爹自便劉公急急走到裡面一五一十學於媽媽又説如今養娘在外怎地回他倘要進來探看孩兒卻又如何掩飾不如改了日子罷媽媽道你真是個死貨他受了我家的聘便是我家的人了怕他怎的不要著忙自有道理便教女兒慧娘你去將新房中收拾整齊留孫家婦女吃點心慧娘答應自去劉媽媽即走向外邊與養娘相見畢問道小娘子下顧不知親母有甚話説養娘道俺大娘聞得大官人有恙放心不下特教男女來問候二來上覆老爹大娘若大官人病體初痊恐未可做親不如再停幾時等大官人身子健旺另揀日罷劉媽媽道多承親母過念大官人雖是身子有些不快卻是偶然傷風原非大病若要另擇日子這斷不能勾的我們小人家的買賣千難萬難方才支持得停當如錯過了卻不又費一番手腳況且有病的人正要得喜事來沖他病也易好常見人家要省事時還借這病來見喜何況我家吉期送已多日親戚都下了貼兒請吃喜筵如今忽地換了日子他們不道你家不肯必認做我們討媳婦不起傳説開去卻不被人笑恥壞了我家名頭煩小娘子回去上覆親母不必擔懮我家干係大哩養娘道大娘話雖説得是請問大官人睡在何處待男女候問一聲好家去回報大娘也教他放心劉媽媽道適來服了發汗的藥正熟睡在那裡我與小娘子代言罷事體總在剛才所言了更無別説張六嫂道我原説偶然傷風不是大病你們大娘不肯相信又要你來如今方見老身不是説謊的了養娘道既如此告辭罷便要起身劉媽媽道那有此理説話忙了茶也還沒有吃如何便去即邀到裡邊又道我房裡醃醃臢臢到在新房裡坐罷引入房中養娘舉目看時擺設得十分齊整劉媽媽又道你看我家諸事齊備如何肯又改日子就是做了親大官人到還要留在我房中歇宿等身子全愈了然後同房哩養娘見他整備得停當信以為實當下劉媽媽教丫鬟將出點心茶來擺上又教慧娘也來相陪養娘心中想道我家珠姨是極標致的了不想這女娘也恁般出色吃了茶作別出門臨行劉媽媽又再三囑付張六嫂是必來覆我一聲養娘同著張六嫂回到家中將上項事説與主母孫寡婦聽了心中到沒了主意想道欲待允了恐怕女壻真個病重變出些不好來害了女兒將欲不允又恐女壻果是小病已愈誤了吉期疑惑不定乃對張六嫂道六嫂待我酌量定了明早來取回信罷張六嫂道正是大娘從容計較計較老身明早來也説罷自去且説孫寡婦與兒子玉郎商議這事怎生計較玉郎道想起來還是病重故不要養娘相見如今必要回他另擇日子他家也沒奈何只得罷休但是空費他這番東西見得我家沒有情義倘後來病好相見之間覺道沒趣若依了他們時又恐果然有變那時進退兩難懊悔卻便遲了依著孩兒有個兩全之策在此不知母親可聽孫寡婦道你且説是甚兩全之策玉郎道明早教張六嫂去説日子便依著他家妝奩一毫不帶見喜過了到第三朝就要接回等待病好連妝奩送去是恁樣縱有變故也不受他們籠絡這卻不是兩全其美孫寡婦道你真是個孩子家見識他們一時假意應承娶去過了三朝不肯放回卻怎麼處玉郎道如此怎好孫寡婦又想了一想道除非明日教張六嫂依此去説臨期教姐姐閃過一邊把你假扮了送去皮箱內原帶一副道袍鞋襪預防到三朝容你回來不消説起倘若不容且住在那裡看個下落倘有三長兩短你取出道袍穿了竟自走回那個扯得你住玉郎道別事便可這事卻使不得後來被人曉得教孩兒怎生做人孫寡婦見兒子推卻心中大怒道縱別人曉得不過是耍笑之事有甚大害玉郎平昔孝順見母親發怒連忙道待孩兒去便了只不會梳頭卻怎麼好孫寡婦道我教養娘伏侍你去便了計較已定次早張六嫂來討回音孫寡婦與他説如此如此恁般恁般若依得便娶過去依不得便另擇日罷張六嫂覆了劉家一一如命你道他為何就肯了只因劉璞病勢愈重恐防不妥單要哄媳婦到了家裡便是買賣了故此將錯就錯更不爭長競短那知孫寡婦已先參透機關將個假貨送來劉媽媽反做了周郎妙計高天下賠了夫人又折兵話休煩絮到了吉期孫寡婦把玉郎妝扮起來果然與女兒無二連自己也認不出真假又教習些女人禮數諸色好了只有兩件難以遮掩恐怕露出事來那兩件第一件是足與女子不同那女子的尖尖趫趫鳳頭一對露在湘裙之下蓮步輕移如花枝招颭一般玉郎是個男子漢一隻腳比女子的有三四隻大雖然把掃地長裙遮了教他緩行細步終是有些蹊蹺這也還在下邊無人來揭起裙兒觀看還隱藏得過第二件是耳上的環兒此乃女子平常時所戴愛輕巧的也少不得戴對丁香兒那極貧小戶人家沒有金的銀的就是銅錫的也要買對兒戴著今日玉郎扮做新人滿頭珠翠若耳上沒有環兒可成模樣麼他左耳還有個環眼乃是幼時恐防難養穿過的那右眼卻沒眼兒怎生戴得孫寡婦左思右想想出一個計策來你道是甚計策他教養娘討個小小膏藥貼在右耳若問時只説環眼生著疳瘡戴不得環子露出左耳上眼兒掩飾打點停當將珠姨藏過一間房裡專候迎親人來到了黃昏時候只聽得鼓樂喧天迎親轎子已到門首張六嫂先入來看見新人打扮得如天神一般好不歡喜眼前不見玉郎問道小官人怎地不見孫寡婦道今日忽然身子有些不健睡在那裡起來不得那婆子不知就裡不