勸因惜他病體初愈恐勞碌了他方才罷手猶兀自老亡八老乞婆相罵劉璞把父親勸出外邊乃問妹子為甚在這房中廝鬧娘子怎又不見慧娘被問心下惶愧掩面而哭不敢則聲劉璞焦躁道且説為著甚的劉婆方把那事細説將劉璞氣得面如土色停了半晌方道家醜不可外揚倘若傳到外邊被人恥笑事已至此且再作區處劉媽媽方才住口走出房來慧娘掙住不行劉媽媽一手扯著便走取巨鎖將門鎖上來至房裡慧娘自覺無顏坐在一個壁角邊哭泣正是饒君掬盡湘江水難洗今朝滿面羞且説李都管聽得劉家喧嚷伏在壁上打聽雖然曉得些風聲卻不知其細底次早劉家丫鬟走出門前李都管招到家中問他那丫鬟初時不肯説李都管取出四五十錢來與他道你若説了送這錢與你買東西吃丫鬟見了銅錢心中動火接過來藏在身邊便從頭至尾盡與李都管説知李都管暗喜道我把這醜事報與裴家攛掇來鬧吵一場他定無顏在此居住這房子可不歸於我了忙忙的走至裴家一五一十報知又添些言語激惱裴九老那九老夫妻因前日娶親不允心中正惱著劉公今日聽見媳婦做下醜事如何不氣一徑趕到劉家喚出劉公來發話道當初我央媒來説要娶親時千推萬阻道女兒年紀尚小不肯應承護在家中私養漢子若早依了我也不見得做出事來我是清清白白的人家決不要這樣敗壞門風的好東西快還了我昔年聘禮另自去對親不要誤我孩兒的大事將高公嚷得面上一回紅一回白想道我家昨夜之事他如何今早便曉得了這也怪異又不好承認只得賴道親家這是那裡説起造恁般言語污辱我家倘被外人聽得只道真有這事你我體面何在裴九老便罵道打脊賤才真個是老亡八女兒現做著恁般醜事那個不曉得了虧你還長著鳥嘴在我面前遮掩趕近前把手向劉公臉上一撳道老亡八羞也不羞待我送個鬼臉兒與你戴了見人劉公被他羞辱不過罵道老殺才今日為甚趕上門來欺我便一頭撞去把裴九老撞倒在地兩下相打起來裡邊劉媽媽與劉璞聽得外面嚷喧出來看時卻是裴九老與劉公廝打急向前拆開裴九老指著罵道老亡八打得好我與你到府裡去説話一路罵出門去了劉璞便問父親裴九因甚清早來廝鬧劉公把他言語學了一遍劉璞道他家如何便曉得了此甚可怪又道如今事已彰揚卻怎麼處劉公又想起裴九老恁般恥辱心中轉惱頓足道都是孫家老乞婆害我家壞了門風受這樣惡氣若不告他怎出得這氣劉璞勸解不住劉公央人寫了狀詞望著府前奔來正值喬太守早堂放告這喬太守雖則關西人又正直又聰明憐才愛民斷獄如神府中都稱為喬青天卻説劉公剛到府前劈面又遇著裴九老九老見劉公手執狀詞認做告他便罵道老亡八縱女做了醜事到要告我我同你去見太爺上前一把扭住兩下又打將起來兩張狀詞都打失了二人結做一團直至堂上喬太守看見喝教各跪一邊問道你二人叫甚名字為何結扭相打二人一齊亂嚷喬太守道不許攙越那老兒先上來説裴九老跪上去訴道小人叫做裴九有個兒子裴政從幼聘下邊劉秉義的女兒慧娘為妻今年都已十五歲了小人因是老年愛子要早與他完姻幾次央媒去説要娶媳婦那劉秉義只推女兒年紀尚小勒不許誰想他縱女賣姦戀著孫潤暗招在家要圖賴親事今早到他家理説反把小人毆辱情極了來爺爺臺下投生他又趕來扭打求爺爺作主救小人則個喬太守聽了道且下去喚劉秉義上去問道你怎麼説劉公道小人有一子一女兒子劉璞聘孫寡婦女兒珠姨為婦女兒便許裴九的兒子向日裴九要娶時一來女兒尚幼未曾整備妝奩二來正與兒子完姻故此不允不想兒子臨婚時忽地患起病來不敢教與媳婦同房令女兒陪伴嫂子那知孫寡婦欺心藏過女兒卻將兒子孫潤假妝過來到強姦了小人女兒正要告官這裴九卻得知了登門打罵小人氣忿不過與他爭嚷實不是圖賴他的婚姻喬太守見説男扮為女甚以為奇乃道男扮女妝自然有異難道你認他不出劉公道婚嫁乃是常事那曾有男子假扮之理卻去辨他真假況孫潤面貌美如女子小人夫妻見了已是萬分歡喜有甚疑惑喬太守道孫家即以女許你為媳因甚卻又把兒子假妝其中必有緣故又道孫潤還在你家麼劉公道已逃回去了喬太守即差人去拿孫寡婦母子三人又差人去喚劉璞慧娘兄妹俱來聽審不多時都已拿到喬太守舉目看時玉郎姊弟果然一般美貌面龐無二劉璞卻也人物俊秀慧娘艷麗非常暗暗欣羡道好兩對青年兒女心中便有成全之意乃問孫寡婦因甚將男作女哄騙劉家害他女兒孫寡婦乃將女壻病重劉秉義不肯更改吉期恐怕誤了女兒終身故把兒子妝去沖喜三朝便回是一時權宜之策不想劉秉義卻教女兒陪臥做出這事喬太守道原來如此問劉公道當初你兒子既是病重自然該另換吉期你執意不肯卻主何意假若此時依了孫家那見得女兒有此醜事這都是你自起釁端連纍女兒劉公道小人一時不合聽了妻子説話如今悔之無及喬太守道胡説你是一家之主卻聽婦人言語又喚玉郎慧娘上去説孫潤你以男假女已是不該卻又姦騙處女當得何罪玉郎叩頭道小人雖然有罪但非設意謀求乃是劉親母自遣其女陪伴小人喬太守道他因不知你是男子故令他來陪伴乃是美意你怎不推卻玉郎道小人也曾苦辭怎奈堅執不從喬太守道論起法來本該打一頓板子才是姑念你年紀幼小又系兩家父母釀成權且饒恕玉郎叩頭泣謝喬太守又問慧娘你事已做錯不必説起如今還是要歸裴氏要歸孫潤實説上來慧娘哭道賤妾無媒苟合節行已虧豈可更事他人況與孫潤恩義已深誓不再嫁若爺爺必欲判離賤妾即當自盡決無顏苟活貽笑他人説罷放聲大哭喬太守見他情詞真懇甚是憐惜且喝過一邊喚裴九老分付道慧娘本該斷歸你家但已失身孫潤節行已虧你若娶回去反傷門風被人恥笑他又蒙二夫之名各不相安今判與孫潤為妻全其體面令孫潤還你昔年聘禮你兒子另自聘婦罷裴九老道媳婦已為醜事小人自然不要但孫潤破壞我家婚姻今原歸於他反周全了姦夫淫婦小人怎得甘心情願一毫原聘不要求老爺斷媳婦另嫁別人小人這口氣也還消得一半喬太守道你既已不願娶他何苦又作此冤家劉公亦稟道爺爺孫潤已有妻子小人女兒豈可與他為妾喬太守初時只道孫潤尚無妻子故此斡旋見劉公説已有妻乃道這卻怎麼處對孫潤道你既有妻子一發不該害人閨女了如今置此女於何地玉郎不敢答應喬太守又道你妻子是何等人家可曾過門麼孫潤道小人妻子是徐雅女兒尚未過門喬太守道這等易處了叫道裴九孫潤原有妻未娶如今他既得了你媳婦我將他妻子斷償你的兒子消你之忿裴九老道老爺明斷小人怎敢違逆但恐徐雅不肯喬太守道我作了主誰敢不肯你快回家引兒子過來我差人去喚徐雅帶女兒來當堂匹配裴九老忙即歸家將兒子裴政領到府中徐雅同女兒也喚到了喬太守看時兩家男女卻也相貌端正是個對兒乃對徐雅道孫潤因誘了劉秉義女兒今已判為夫婦我今作主將你女兒配與裴九兒子裴政限即日三家俱便婚配回報如有不伏者定行重治徐雅見太守作主怎敢不依俱各甘伏喬太守援筆判道弟代姊嫁姑伴嫂眠愛女愛子情在理中一雌一雄變出意外移乾柴近烈火無怪其燃以美玉配明珠適獲其偶孫氏子因姊而得婦摟處子不用逾牆劉氏女因嫂而得夫懷吉士初非玉相悅為婚禮以義起所厚者薄事可權宜使徐雅別壻裴九之兒許裴政改娶孫郎之配奪人婦人亦奪其婦兩家恩怨總息風波獨樂樂不若與人樂三對夫妻各諧魚水人雖兌換十六兩原只一斤親是交門五百年決非錯配以愛及愛伊父母自作冰人非親是親我官府權為月老已經明斷各赴良期喬太守寫畢教押司當堂朗誦與衆人聽了衆人無不心服各各叩頭稱謝喬太守在庫上支取喜紅六段教三對夫妻披挂起來喚三起樂人三頂花花轎兒抬了三位新人新郎及父母各自隨轎而出此事鬧動了杭州府都説好個行方便的太守人人誦德個個稱賢自此各家完親之後都無説話李都管本欲唆孫寡婦裴九老兩家與劉秉義講嘴鷸蚌相持自己漁人得利不期太守善於處分反作成了孫玉郎一段良姻街坊上當做一件美事傳説不以為丑他心中甚是不樂未及一年喬太守又取劉璞孫潤都做了秀才起送科舉李都管自知愧慚安身不牢反躲避鄉居後來劉璞孫潤同榜登科俱任京職仕途有名扶持裴政亦得了官職一門親眷富貴非常劉璞官直至龍圖閣學士連李都管家宅反歸併於劉氏刁鑽小人亦何益哉後人有詩單道李都管為人不善以為後戒詩云為人忠厚為根本何苦刁鑽欲害人不見古人卜居者千金只為買鄉鄰又有一詩單誇喬太守此事斷得甚好鴛鴦錯配本前緣全賴風流太守賢錦被一床遮盡丑喬公不枉叫青天
