body:
  text: 第十五卷赫大卿遺恨鴛鴦絛皮包血肉骨包身強作嬌妍誑惑人千古英雄皆坐此百年同共一坑塵這首詩乃昔日性如子所作單戒那淫色自戕的論來好色與好淫不同假如古詩云一笑傾人城再笑傾人國豈不顧傾城與傾國佳人難再得此謂之好色若是不擇美惡以多為勝如俗語所云石灰布袋到處留跡其色何在但可謂之好淫而已然雖如此在色中又有多般假如張敞畫眉相如病渴雖為儒者所譏然夫婦之情人倫之本此謂之正色又如嬌妾美婢倚翠偎紅金釵十二行錦障五十里櫻桃楊柳歌舞擅場碧月紫雲風流女誇艷雖非一馬一鞍畢竟有花有葉此謂之傍色又如錦營獻笑花陣圖歡露水分司身到偶然留影風雲隨例顏開那惜纏頭旅館長途堪消寂寞花前月下亦助襟懷雖市門之游豪客不廢然女閭之遺正人恥言不得不謂之邪色至如上蒸下報同人道於獸禽鑽穴逾牆役心機於鬼蜮偷暫時之歡樂為萬世之罪人明有人誅幽蒙鬼責這謂之亂色又有一種不是正色不是傍色雖然比不得亂色卻又比不得邪色填塞了虛空圈套污穢卻清淨門風慘同神面刮金惡勝佛頭澆糞遠則地府填單近則陽間業報奉勸世人切須謹慎正是不看僧面看佛面休把淫心雜道心說這本朝宣德年間江西臨江府新淦縣有個監生姓赫名應祥字大卿為人風流俊美落拓不羈專好的是聲色二事遇著花街柳巷舞榭歌臺便戀留不捨就當做家裡一般把老大一個家業也弄去了十之三四渾家陸氏見他恁般花費苦口諫勸赫大卿到道老婆不賢時常反目因這上陸氏立誓不管領著三歲一個孩子喜兒自在一間淨室裡持齋念佛由他放蕩一日正值清明佳節赫大卿穿著一身華麗衣服獨自一個到郊外踏青遊玩有宋張詠詩為證春游千萬家美人顏如花三三兩兩映花立飄飄似欲乘煙霞赫大卿只揀婦女叢聚之處或前或後往來搖擺賣弄風流希圖要逢著個有緣分的佳人不想一無所遇好不敗興自覺無聊走向一個酒館中沽飲三杯上了酒樓揀沿街一副座頭坐下酒保送上酒餚自斟自飲倚窗觀看遊人不出三杯兩盞吃勾半酣起身下樓算還酒錢離了酒館一步步任意走去此時已是未牌時分行不多時漸漸酒湧上來口乾舌燥思量得盞茶來解渴便好正無處求覓忽抬頭見前面林子中幡影搖拽磬韻悠揚料道是個僧寮道院心中歡喜即忙趨向前去抹過林子顯出一個大庵院來赫大卿打一看時周遭都是粉牆包裹門前十來株倒垂楊柳中間向陽兩扇八字牆門上面高懸金字扁額寫著非空庵三字赫大卿點頭道常聞得人說城外非空庵中有標致尼姑只恨沒有工夫未曾見得不想今日趁了這便即整頓衣冠走進庵裡轉東一條鵝卵石街兩邊榆柳成行甚是幽雅行不多步又進一重牆門就是小小三間房子供著韋馱尊者庭中松柏參天樹上鳥聲嘈雜從佛背後轉進又是一條橫街大卿徑望東首行去見一座雕花門樓雙扉緊閉上前輕輕扣了三四下就有個垂髫女童呀的開門那女童身穿緇衣腰系絲絛打扮得十分齊整見了赫大卿連忙問訊大卿還了禮跨步進去看時一帶三間佛堂雖不甚大到也高敞中間三尊大佛相貌莊嚴金光燦爛大卿向佛作了揖對女童道煩報令師說有客相訪女童道相公請坐待我進去傳說須臾間一個少年尼姑出來向大卿稽首大卿急忙還禮用那雙開不開合不合慣輸情專賣俏軟瞇盻的俊眼仔細一覷這尼姑年紀不上二十面龐白皙如玉天然艷冶韻格非凡大卿看見恁般標致喜得神魂飄蕩一個揖作了下去卻像初出鍋的糍粑軟做一塌頭也伸不起來禮罷分賓主坐下想道今日撞了一日並不曾遇得個可意人兒不想這所在到藏著如此妙人須用些水磨工夫撩撥他不怕不上我的鉤兒大卿正在腹中打點草稿誰知那尼姑亦有此心從來尼姑庵也有個規矩但凡客官到來都是老尼迎接答話那少年的如閨女一般深居簡出非細相熟的主顧或是親戚方纔得見若是老尼出外或是病臥竟自辭客就有非常勢要的立心要來認那小徒也少不得三請四喚等得你個不耐煩方纔出來這個尼姑為何挺身而出有個緣故他原是個真念佛假修行愛風月嫌冷靜怨恨出家的主兒偶然先在門隙裡張見了大卿這一表人材到有幾分看上了所以挺身而出當下兩隻眼光就如針兒遇著磁石緊緊的攝在大卿身上笑嘻嘻的問道相公尊姓貴表府上何處至小庵有甚見諭大卿道小生姓赫名大卿就在城中居住今日到郊外踏青偶步至此久慕仙姑清德順便拜訪尼姑謝道小尼僻居荒野無德無能謬承枉顧蓬篳生輝此處來往人雜請裡面軒中待茶大卿見說請到裡面吃茶料有幾分光景好不歡喜即起身隨入行過幾處房屋又轉過一條迴廊方是三間淨室收拾得好不精雅外面一帶都是扶欄庭中植梧桐二樹修竹數竿百般花卉紛紜輝映但覺香氣襲人正中間供白描大士像一軸古銅爐中香煙馥馥下設蒲團一坐左一間放著朱紅廚櫃四個都有封鎖想是收藏經典在內右一間用圍屏圍著進入看時橫設一張桐柏長書卓左設花藤小椅右邊靠壁一張斑竹榻兒壁上懸一張斷紋古琴書卓上筆硯精良纖塵不染側邊有經卷數帙隨手拈一卷翻看金書小楷字體摹仿趙松雪後注年月下書弟子空照薰沐寫大卿問空照是何人答道就是小尼賤名大卿反覆玩賞誇之不已兩個隔著卓子對面而坐女童點茶到來空照雙手捧過一盞遞與大卿自取一盞相陪那手十指尖纖潔白可愛大卿接過啜在口中真個好茶有呂洞賓茶詩為證玉蕊旗槍稱絕品僧家造法極工夫兔毛甌淺香雲白蝦眼湯翻細浪休斷送睡魔離几席增添清氣入肌膚幽叢自落溪岩外不肯移根入上都大卿問道仙庵共有幾位空照道師徒四眾家師年老近日病廢在床當家就是小尼指著女童道這便是小徒他還有師弟在房裡誦經赫大卿道仙姑出家幾年了空照道自七歲喪父送入空門今已十二年矣赫大卿道青春十九正在妙齡怎生受此寂靜空照道相公休得取笑出家勝俗家數倍哩赫大卿道那見得出家的勝似俗家空照道我們出家人並無閑事纏擾又無兒女牽絆終日誦經念佛受用一爐香一壺茶倦來眠紙帳閑暇理絲桐好不安閑自在大卿道閑暇理絲桐彈琴時也得個知音的人兒在傍喝采方好這還罷了則這倦來眠紙帳萬一夢魘起來沒人推醒好不怕哩空照已知大卿下鉤含笑而應道夢魘殺了人也不要相公償命大卿也笑道別的魘殺了一萬個全不在小生心上仙姑恁般高品豈不可惜兩下你一句我一聲漸漸說到分際大卿道有好茶再求另潑一壺來吃空照已會意了便教女童去廊下烹茶大卿道仙姑臥房何處是什麼紙帳也得小生認一認空照此時欲心已熾按納不住口裡雖說道認他怎麼卻早已立起身來大卿上前擁抱先做了個呂字空照往後就走大卿接腳跟上空照輕輕的推開後壁後面又有一層房屋正是空照臥處擺設更自濟楚大卿也無心觀看兩個相抱而入遂成雲雨之歡有小尼姑曲兒為證小尼姑在庵中手拍著卓兒怨命平空裡吊下個俊俏官人坐談有幾句話聲口兒相應你貪我不捨一拍上就圓成雖然不是結髮的夫妻也難得他一個字兒叫做肯二人正在酣美之處不堤防女童推門進來連忙起身女童放下茶兒掩口微笑而去看看天晚點起燈燭空照自去收拾酒果蔬菜擺做一桌與赫大卿對面坐下又恐兩個女童泄漏機關也教來坐在旁邊相陪空照道庵中都是吃齋不知貴客到來未曾備辦葷味甚是有慢赫大卿道承賢師徒錯愛已是過分若如此說反令小生不安矣當下四人杯來盞去吃到半酣大卿起身捱至空照身邊把手勾著頸兒將酒飲過半杯遞到空照口邊空照將口來承一飲而盡兩個女童見他肉麻起身回避空照一把扯道既同在此料不容你脫白二人摔脫不開將袖兒掩在面上大卿上前抱住扯開袖子就做了個嘴兒二女童年在當時情竇已開見師父容情落得快活四人摟做一團纏做一塊吃得個大醉一床而臥相偎相抱如漆如膠赫大卿放出平生本事竭力奉承尼姑俱是初得甜頭恨不得把身子並做一個到次早空照叫過香公賞他三錢銀子買囑他莫要泄漏又將錢鈔教去買辦魚肉酒果之類那香公平昔間捱著這幾碗黃齏淡飯沒甚肥水到口眼也是盲的耳也是聾的身子是軟的腳兒是慢的此時得了這三錢銀子又見要買酒肉便覺眼明手快身子如虎一般健走跳如飛那消一個時辰都已買完安排起來款待大卿不在話下卻說非空庵原有兩個房頭東院乃是空照西院的是靜真也是個風流女師手下止有一個女童一個香公那香公因見東院連日買辦酒肉報與靜真靜真猜算空照定有些不三不四的勾當教女童看守房戶起身來到東院門口恰好遇見香公左手提著一個大酒壺右手拿個籃兒開門出來兩下打個照面即問道院主往那裡去靜真道特來與師弟閑話香公道既如此待我先去通報靜真一手扯住道我都曉得了不消你去打照會香公被道著心事一個臉兒登時漲紅不敢答應只得隨在後邊將院門閉上跟至淨室門口高叫道西房院主在此拜訪空照聞言慌了手腳沒做理會教大卿閃在屏後起身迎住靜真靜真上前一把扯著空照衣袖說道好阿出家人幹得好事敗壞山門我與你到里正處去講扯著便走嚇得個空照臉兒就如七八樣的顏色染的一搭兒紅一搭兒青心頭恰像千百個鐵槌打的一回兒上一回兒下半句也對不出半步也行不動靜真見他這個模樣呵呵笑道師弟不消著急我是耍你但既有佳賓如何瞞著我獨自受用還不快請來相見空照聽了這話方纔放心遂令大卿與靜真相見大卿看靜真姿容秀美丰采動人年紀有二十五六上下雖然長於空照風情比他更勝乃問道師兄上院何處靜真道小尼即此庵西院咫尺便是大卿道小生不知失於奉謁兩下閑敘半晌靜真見大卿舉止風流談吐開爽凝眸留盼戀戀不捨嘆道天下有此美士師弟何幸獨擅其美空照道師兄不須眼熱倘不見外自當同樂靜真道若得如此佩德不淺今晚奉候小坐萬祈勿外說罷即起身別回至西院準備酒餚伺候不多時空照同赫大卿攜手而來女童在門口迎候赫大卿進院看時房廊花徑亦甚委曲三間淨室比東院的更覺精雅但見瀟灑亭軒清虛戶牖畫展江南煙景香焚真臘沈檀庭前修竹風搖一派環聲簾外奇花日照千層錦繡色松陰入檻琴書潤山色侵軒枕簟涼靜真見大卿已至心中歡喜不復敘禮即便就坐茶罷擺上果酒餚饌空照推靜真坐在赫大卿身邊自己對面相陪又扯女童打橫而坐四人三杯兩盞飲勾多時赫大卿把靜真抱置膝上又教空照坐至身邊一手勾著頸項兒百般旖旎旁邊女童面紅耳熱也覺動情直飲到黃昏時分空照起身道好做新郎明日早來賀喜討個燈兒送出門口自去女童叫香公關閉門戶進來收拾家火將湯淨過手腳赫大卿抱著靜真上床解脫衣裳鑽入被中酥胸緊貼玉體相偎赫大卿乘著酒興盡生平才學恣意搬演把靜真弄得魄散魂消骨酥體軟四肢不收委然席上睡至巳牌時分方纔起來自此之後兩院都買囑了香公輪流取樂赫大卿淫欲無度樂極忘歸將近兩月大卿自覺身子困倦支持不來思想回家怎奈尼姑正是少年得趣之時那肯放捨赫大卿再三哀告道多承雅愛實不忍別但我到此兩月有餘家中不知下落定然著忙待我回去安慰妻孥再來陪奉不過四五日之事卿等何必見疑空照道既如此今晚備一酌為餞