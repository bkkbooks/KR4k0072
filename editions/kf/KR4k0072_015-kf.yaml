覺圓有個徒弟叫做去非今年二十六歲專一不學長俊老僧管他不下自今八月間出去至今不見回來他的父母又極護短不說兒子不學好反告小僧謀死今日在此候審若得死的果然是他也出脫了老僧毛潑皮道老師父你若肯請我引你去看如何老和尚道若得如此可知好麼正待走動只見一個老兒同著一個婆子趕上來把老和尚接連兩個巴掌罵道你這賊禿把我兒子謀死在那裡老和尚道不要嚷你兒子如今有著落了那老兒道如今在那裡老和尚道你兒子與非空庵尼姑串好不知怎樣死了埋在他後園指著毛潑皮道這位便是證見扯著他便走那老兒同婆子一齊跟來直到非空庵那時庵傍人家盡皆曉得若老若幼俱來觀看毛潑皮引著老和尚直至裡邊只見一間房裡有人叫響毛潑皮推門進去看時卻是一個將死的老尼姑睡在床上叫喊肚裡餓了如何將飯來我吃毛潑皮也不管他依舊把門拽上同老和尚到後園柏樹下扯開材蓋那婆子同老兒擦磨老眼仔細看依稀有些相像便放聲大哭看的人都擁在一堆問起根由毛潑皮指手劃腳剖說那事老和尚見他認了只要出脫自己不管真假一把扯道去去去你兒子有了快去稟官拿尼姑去審問明白再哭未遲那老兒只得住了把材蓋好離了非空庵飛奔進城到縣前時恰好知縣相公方回那拘老和尚的差人不見了原被告四處尋覓奔了個滿頭汗赫家眾人見毛潑皮老和尚到了都來問道可真是你徒弟麼老和尚道千真萬真眾人道既如此並做一事進去稟罷差人帶一乾人齊到裡邊跪下到先是赫家人上去稟說家主不見緣由並見蒯匠絲絛及庵中小尼所說開棺卻是和尚屍首前後事一一細稟然後老和尚上前稟說是他徒弟三月前驀然出去不想死在尼姑庵裡被伊父母訐告今日已見明白與小僧無乾望乞超豁知縣相公問那老兒道果是你的兒子麼不要錯了老兒稟道正是小人的兒子怎麼得錯知縣相公即差四個公差到庵中拿尼姑赴審差人領了言語飛也似趕到庵裡只見看的人便擁進擁出那見尼姑的影兒直尋到一間房裡單單一個老尼在床將死快了內中有一個道或者躲在西院急到西院門口見門閉著敲了一回無人答應公差心中焦躁俱從後園牆上爬將過去見前後門戶盡皆落鎖一路打開搜看並不見個人跡差人各溜過幾件細軟東西到拿地方同去回官知縣相公在堂等候差人稟道非空庵尼姑都逃躲不知去向拿地方在此回話知縣問地方道你可曉得尼姑躲在何處地方道這個小人們那裡曉得知縣喝道尼姑在地方上偷養和尚謀死人命這等不法勾當都隱匿不報如今事露卻又縱容躲過假推不知既如此要地方何用喝教拿下去打地方再三苦告方纔饒得限在三日內准要一乾人犯召保在外聽候獲到審問又發兩張封皮將庵門封鎖不提且說空照靜真同著女童香公來到極樂庵中那庵門緊緊閉著敲了一大回方纔香公開門出來眾人不管三七二十一一齊擁入流水叫香公把門閉上庵主了緣早已在門傍相迎見他們一窩子都來且是慌慌張張料想有甚事故請在佛堂中坐下一面教香公去點茶遂開言問其來意靜真扯在半邊將上項事細說一遍要借庵中躲避了緣聽罷老大吃驚沈吟了一回方道二位師兄有難來投本當相留但此事非同小可往遠處逃遁或可避禍我這裡牆卑室淺耳目又近倘被人知覺莫說師兄走不脫只怕連我也涉在渾水內如何躲得你道了緣因何不肯起來他也是個廣開方便門的善知識正勾搭萬法寺小和尚去非做了光頭夫妻藏在寺中三個多月雖然也扮作尼姑常恐露出事來故此門戶十分緊急今日靜真也為那樁事敗露來躲避恐怕被人緝著豈不連他的事也出醜因這上不肯相留空照師徒見了緣推託面面相覷沒做理會到底靜真有些賊智曉得了緣平昔貪財便去袖中摸出銀子揀上二三兩遞與了緣道師兄之言雖是有理但事起倉卒不曾算得個去路急切投奔何處望師兄念向日情分暫容躲避兩三日待勢頭稍緩然後再往別處這些少銀兩送與師兄為盤纏之用果然了緣見著銀子就忘了利害乃道若只住兩三日便不妨礙如何要師兄銀子靜真道在此攪擾已是不當豈可又費師兄了緣假意謙讓一回把銀收過引入裡邊去藏躲且說小和尚去非聞得香公說是非空庵師徒五眾且又生得標致忙走出來觀看兩下卻好打個照面各打了問訊靜真仔細一看卻不認得問了緣道此間師兄上院何處怎麼不曾相會了緣扯個謊道這是近日新出家的師弟故此師兄還認不得那小和尚見靜真師徒姿色勝似了緣心下好不歡喜想道我好造化那裡說起天賜這幾個妙人到此少不得都刮上他輪流兒取樂快活當下了緣備辦些素齋款待靜真空照心中有事耳熱眼跳坐立不寧那裡吃得下飲食到了申牌時分向了緣道不知庵中事體若何欲要央你們香公去打聽個消息方好計較長策了緣即教香公前去那香公是個老實頭不知利害一徑奔到非空庵前東張西望那時地方人等正領著知縣鈞旨封鎖庵門也不管老尼死活反鎖在內兩皮封條交叉封好方待轉身見那老頭探頭探腦幌來幌去情知是個細作齊上前喝道官府正要拿你來得恰好一個拿起索子向頸上便套嚇得香公身酥腳軟連聲道他們借我庵中躲避央來打聽的其實不幹我事眾人道原曉得你是打聽的快說是那個庵裡香公道是極樂庵裡眾人得了實信又叫幾個幫手押著香公齊到極樂庵將前後門把好然後叩門裡邊曉得香公回了了緣急急出來開門眾人一擁而入迎頭就把了緣拿住押進裡面搜捉不曾走了一個那小和尚著了忙躲在床底下也被搜出了緣向眾人道他們不過借我庵中暫避其實做的事體與我分毫無乾情願送些酒錢與列位怎地做個方便饒了我庵裡罷眾人道這使不得知縣相公好不利害哩倘然問在何處拿的教我們怎生回答有乾無乾我們總是不知你自到縣裡去分辨了緣道這也容易但我的徒弟乃新出家的這個可以免得望列位做個人情眾人貪著銀子卻也肯了內中又有個道成不得既是與他莫相干何消這等著忙直躲入床底下去一定也有些蹺蹊我們休擔這樣乾紀眾人齊聲道是都把索子扣了連男帶女共是十人好像端午的粽子做一串兒牽出庵門將門封鎖好了解入新淦縣來一路上了緣埋怨靜真連累靜真半字不敢回答正是老龜蒸不爛移禍於空桑是時天色傍晚知縣已是退衙地方人又帶回家去宿歇了緣悄悄與小和尚說道明日到堂上你只認做新出家的徒弟切莫要多講待我去分說料然無事到次日知縣早衙地方解進去稟道非空庵尼姑俱躲在極樂庵中今已緝獲連極樂庵尼姑通拿在此知縣教跪在月台東首即差人喚集老和尚赫大卿家人蒯三並小和尚父母來審那消片刻俱已喚到令跪在月台西首小和尚偷眼看見驚異道怎麼我師父也涉在他們訟中連爹媽都在此一發好怪心上雖然暗想卻不敢叫喚又恐師父認出到把頭兒別轉伏在地上那老兒同婆子也不管官府在上指著尼姑帶哭帶罵道沒廉恥的狗淫婦如何把我兒子謀死好好還我活的便罷小和尚聽得老兒與靜真討人愈加怪異想道我好端端活在此那裡說起卻與他們索命靜真空照還認是赫大卿的父母那敢則聲知縣見那老兒喧嚷呵喝住了喚空照靜真上前問道你既已出家如何不守戒律偷養和尚卻又將他謀死從實招來免受刑罰靜真空照自己罪犯已重心慌膽怯那五臟六腑猶如一團亂麻沒有個頭緒這時見知縣不問赫大卿的事情去問什麼和尚之事一發摸不著個頭路靜真那張嘴頭子平時極是能言快語到這回恰如生漆獲牢魚膠粘住掙不出一個字兒知縣連問四五次剛剛掙出一句道小尼並不曾謀死那個和尚知縣喝道見今謀死了萬法寺和尚去非埋在後園還敢抵賴快夾起來兩邊皂隸答應如雷向前動手了緣見知縣把屍首認做去非追究下落打著他心頭之事老大驚駭身子不搖自動想道這是那裡說起他們乃赫監生的屍首卻到不問反牽扯到我身上的事來真也奇怪心中沒想一頭處將眼偷看小和尚小和尚已知父母錯認了也看著了緣面面相覷且說靜真空照俱是嬌滴滴的身子嫩生生的皮肉如何經得這般刑罰夾棍剛剛套上便暈迷了去叫道爺爺不消用刑容小尼從實招認知縣止住左右聽他供招二尼異口齊聲說道爹爹後園埋的不是和尚乃是赫監生的屍首赫家人聞說原是家主屍首同蒯三俱跪上去聽其情款知縣道既是赫監生如何卻是光頭二尼乃將赫大卿到寺遊玩勾搭成奸及設計剃髮扮作尼姑病死埋葬前後之事細細招出知縣見所言與赫家昨日說話相合已知是個真情又問道赫監生事已實了那和尚還藏在何處一發招來二尼哭道這個其實不知就打死也不敢虛認知縣又喚女童香公逐一細問其說相同知得小和尚這事與他無乾又喚了緣並小和尚上去問你藏匿靜真空照等在庵一定與他是同謀的了也夾起來了緣此時見靜真等供招明白和尚之事已不纏牽在內腸子寬了從從容容的稟道爺爺不必加刑容小尼細說靜真等昨到小尼庵中假說他人紮詐權住一兩日故此誤留其他姦情之事委實分毫不知又指著小和尚道這徒弟乃新出家的與靜真等一發從不相認況此等無恥勾當敗壞佛門體面即使未曾發覺小尼若稍知聲息亦當出首豈肯事露之後還敢藏匿望爺爺詳情超豁知縣見他說的有理笑道話到講得好只莫要心不應口遂令跪過一邊喝叫皂隸將空照靜真各責五十東房女童各責三十兩個香公各打二十都打的皮開肉綻鮮血淋漓打罷知縣舉筆定罪靜真空照設計恣淫傷人性命依律擬斬東房二女童減等杖八十官賣兩個香公知情不舉俱問杖罪非空庵藏奸之藪拆毀入官了緣師徒雖不知情但隱匿奸黨杖罪納贖西房女童判令歸俗赫大卿自作之孽已死勿論屍棺著令家屬領歸埋葬判畢各令畫供那老兒見屍首已不是他兒子想起昨日這場啼哭好生沒趣愈加忿恨跪上去稟知縣依舊與老和尚要人老和尚又說徒弟偷盜寺中東西藏匿在家反來圖賴兩下爭執連知縣也委決不下意為老和尚謀死卻不見形跡難以入罪將為果躲在家這老兒怎敢又與他討人想了一回乃道你兒子生死沒個實據怎好問得且押出去細訪個的確證見來回話當下空照靜真兩個女童都下獄中了緣小和尚並兩個香公押出召保老和尚與那老兒夫妻原差押著訪問去非下落其餘人犯俱釋放寧家大凡衙門有個東進西出的規矩這時一乾人俱從西邊丹墀下走出去那了緣因哄過了知縣不曾出醜與小和尚兩下暗地歡喜小和尚還恐有人認得把頭直低向胸前落在眾人背後也是合當敗露剛出西腳門那老兒又揪住老和尚罵道老賊禿謀死了我兒子卻又把別人的屍首來哄我麼夾嘴連腮只管亂打老和尚正打得連聲叫屈沒處躲避不想有十數個徒弟徒孫們在那裡看出官見師父被打齊趕向前推翻了那老兒揮拳便打小和尚見父親吃虧心中著急正忘了自己是個假尼姑竟上前勸道列位師兄不要動手眾和尚舉眼觀看卻便是去非忙即放了那老兒一把扯住小和尚叫道師父好了去非在此押保差人還不知就裡乃道這是極樂庵裡的尼姑押出去召保的你們休錯認了眾和尚道哦原來他假扮尼姑在極樂庵裡快活卻害師父受累眾人方纔明白是個和尚一齊都笑起來傍邊只急得了緣叫苦連聲面皮青染老和尚分開眾人揪過來一連四五個耳聒子罵道天殺的奴狗你便快活害得我好苦且去見老爺來拖著便走那老兒見了兒子已在又做了假尼姑料道到官必然責罰向著老和尚連連叩頭道老師父是我無理得罪了情願下情陪禮乞念師徒分上饒了我孩兒莫見官罷老和尚因受了他許多荼毒那裡肯聽扭著小和尚直至堂上差人押著了緣也隨進來知縣看見問道那老和尚為何又結扭尼姑進來老和尚道爺爺這不是真尼姑就是小的徒弟去非假扮的知縣聞言也忍笑不住道如何有此異事喝教小和尚從實供來去非自知隱瞞不過只得一一招承知縣錄了口詞將僧尼各責四十去非依律問徒了緣官賣為奴極樂庵亦行拆毀老和尚並那老兒無罪釋放又討連具枷枷了各搽半邊黑臉滿城迎游示眾那老兒婆子因兒子做了這不法勾當啞口無言惟有滿面鼻涕眼淚扶著枷梢跟出衙門那時哄動了滿城男女扶老挈幼俱來觀看有好事的作個歌兒道可憐老和尚不見了小和尚原來女和尚私藏了男和尚分明雄和尚錯認了雌和尚為個假和尚帶累了真和尚斷個死和尚又明白了活和尚滿堂只叫打和尚滿街爭看迎和尚只為貪那褲襠中硬崛崛一個莽和尚弄壞了庵院裡嬌滴滴許多騷和尚且說赫家人同蒯三急奔到家報知主母陸氏聞言險些哭死連夜備辦衣衾棺槨稟明知縣開了庵門親自到庵重新入殮迎到祖塋擇日安葬那時庵中老尼已是餓死在床地方報官盛殮自不必說這陸氏因丈夫生前不肯學好好色身亡把孩子嚴加教誨後來明經出仕官為別駕之職有詩為證野草閑花恣意貪化為蜂蝶死猶甘名庵併入遊僊夢是色非空作笑談
