果然話不虛傳這花卻也奇怪見人來看姿態愈艷光采倍生如對人笑的一般張委心中雖十分驚訝那吞佔念頭全然不改看了一回忽地又起一個惡念對眾人道我們且去齊出了園門眾人問道衙內如何不與他要園張委道我想得個好策在此不消與他說得這園明日就歸於我眾人道衙內有何妙算張委道見今貝州王則謀反專行妖術樞密府行下文書普天下軍州嚴禁左道捕緝妖人本府見出三千貫賞錢募人出首我明日就將落花上枝為由教張霸到府首他以妖術惑人這個老兒熬刑不過自然招承下獄這園必定官賣那時誰個敢買他的少不得讓與我還有三千貫賞錢哩眾人道衙內好計事不宜遲就去打點起來當時即進城寫下首狀次早教張霸到平江府出首這張霸是張委手下第一出尖的人衙門情熟故此用他大尹正在緝訪妖人聽說此事合村男女都見的不由不信即差緝捕使臣帶領幾個做公的押張霸作眼前去捕獲張委將銀佈置停當讓張霸與緝捕使臣先行自己與眾子弟隨後也來緝捕使臣一徑到秋公園上那老兒還道是看花的不以為意眾人發一聲喊趕上前一索捆翻秋公吃這一嚇不小問道老漢有何罪犯望列位說個明白眾人口口聲聲罵做妖人反賊不由分訴擁出門來鄰裡看見無不失驚齊上前詢問緝捕使臣道你們還要問麼他所犯的事也不小只怕連村人都有分哩那些愚民被這大話一嚇心中害怕盡皆洋洋走開惟恐累及只有虞公單老同幾個平日與秋公相厚的遠遠跟來觀看且說張委俟秋公去後便與眾子弟來鎖園門恐還有人在內又檢點一過將門鎖上隨後趕至府前緝捕使臣已將秋公解進跪在月臺上見傍邊又跪著一人卻不認得是誰那些獄卒都得了張委銀子已備下諸般刑具伺候大尹喝道你是何處妖人敢在此地方上將妖術煽惑百姓有幾多黨羽從實招來秋公聞言恰如黑暗中聞個火炮正不知從何處起的稟道小人家世住於長樂村中並非別處妖人也不曉得什麼妖術大尹道前日你用妖術使落花上枝還敢抵賴秋公見說到花上情知是張委的緣故即將張委要佔園打花並仙女下降之事細訴一遍不想那大尹性是偏執的那裡肯信乃笑道多少慕仙的修行至老尚不能得遇神仙豈有因你哭花仙就肯來既來了必定也留個名兒使人曉得如何又不別而去這樣話哄那個不消說得定然是個妖人快夾起來獄卒們齊聲答應如狼虎一般蜂擁上來揪翻秋公扯腿拽腳剛要上刑不想大尹忽然一個頭暈險些兒跌下公座自覺頭目森森坐身不住分咐上了枷扭發下獄中監禁明日再審獄卒押著秋公一路哭泣出來看見張委道張衙內我與你前日無怨往日無仇如何下此毒手害我性命張委也不答應同了張霸和那一班惡少轉身就走虞公單老接著秋公問知其細乃道有這等冤枉的事不打緊明日同合村人具張連名保結管你無事秋公哭道但願得如此便好獄卒喝道這死囚還不走只管哭什麼秋公含著眼淚進獄鄰里又尋些酒食送至門上那獄卒誰個拿與他吃竟接來自去受用到夜間將他上了囚床就如活死人一般手足不能少展心中苦楚想道不知那位神仙救了這花卻又被那廝借此陷害神仙呵你若憐我秋先亦來救拔性命情願棄家入道一頭正想只見前日那仙女冉冉而至秋公急叫道大仙救拔弟子秋先則個仙女笑道汝欲脫離苦厄麼上前把手一指那枷扭紛紛自落秋先爬起來向前叩頭道請問大仙姓氏仙女道吾乃瑤池王母座下司花女憐汝惜花志誠故令諸花返本不意反資奸人讒口然亦汝命中合有此災明日當脫張委損花害人花神奏聞上帝已奪其算助惡黨羽俱降大災汝宜篤志修行數年之後吾當度汝秋先又叩首道請問上仙修行之道仙子道修仙徑路甚多須認本源汝原以惜花有功今亦當以花成道汝但餌百花自能身輕飛舉遂教其服食之法秋先稽首叩謝起來便不見了仙子抬頭觀看卻在獄牆之上以手招道汝亦上來隨我出去秋先便向前攀援了一大回還只到得半牆甚覺吃力漸漸至頂忽聽得下邊一棒鑼聲喊道妖人走了快拿下秋公心下驚慌手酥腳軟倒撞下來撒然驚覺元在囚床之上想起夢中言語歷歷分明料必無事心中稍寬正是但存方寸無私曲料得神明有主張且說張委見大尹已認做妖人不勝歡喜乃道這老兒許多清奇古怪今夜且請在囚床上受用一夜讓這園兒與我們樂罷眾人都道前日還是那老兒之物未曾盡興今日是大爺的了須要盡情歡賞張委道言之有理遂一齊出城教家人整備酒餚徑至秋公園上開門進去那鄰里看見是張委心下雖然不平卻又懼怕誰敢多口且說張委同眾子弟走至草堂前只見牡丹枝頭一朵不存原如前日打下時一般縱橫滿地眾人都稱奇怪張委道看起來這老賊果係有妖法的不然如何半日上倏爾又變了難道也是神仙打的有一個子弟道他曉得衙內要賞花故意弄這法兒來羞我們張委道他便弄這法兒我們就賞落花當下依原鋪設氈條席地而坐放開懷抱恣飲也把兩瓶酒賞張霸到一邊去吃看看飲至日色挫西俱有半酣之意忽地起一陣大風那風好利害善聚庭前草能開水上萍腥聞群虎嘯響合萬松聲那陣風卻把地下這些花朵吹得都直豎起來眨眼間俱變做一尺來長的女子眾人大驚齊叫道怪哉言還未畢那些女子迎風一幌盡已長大一個個姿容美麗衣服華艷團團立做一大堆眾人因見恁般標致通看呆了內中一個紅衣女子卻又說起話來道吾姊妹居此數十餘年深蒙秋公珍重護惜何意驀遭狂奴俗氣熏熾毒手摧殘復又誣陷秋公謀吞此地今仇在目前吾姊妹曷不戮力擊之上報知己之恩下雪摧殘之恥不亦可乎眾女郎齊聲道阿妹之言有理須速下手毋使潛遁說罷一齊舉袖撲來那袖似有數尺之長如風翻亂飄冷氣入骨眾人齊叫有鬼撇了家夥望外亂跑彼此各不相顧也有被石塊打腳的也有被樹枝抓面的也有跌而復起起而復跌的亂了多時方纔收腳點檢人數都在單不見了張委張霸二人此時風已定了天色已昏這班子弟各自回家恰像檢得性命一般抱頭鼠竄而去家人喘息定了方喚幾個生力莊客打起火把覆身去抓尋直到園上只聽得大梅樹下有呻吟之聲舉火看時卻是張霸被梅根絆倒跌破了頭掙扎不起莊客著兩個先扶張霸歸去眾人周圍走了一遍但見靜悄悄的萬籟無聲牡丹棚下繁花如故並無零落草堂中杯盤狼籍殘羹淋漓眾人莫不吐舌稱奇一面收拾家火一面重複照看這園子又不多大三回五轉毫無蹤影難道是大風吹去了女鬼吃去了正不知躲在那裡延捱了一會無可奈何只索回去過夜再作計較方欲出門只見門外又有一伙人提著行燈進來不是別人卻是虞公單老聞知眾人遇鬼之事又聞說不見了張委在園上抓尋不知是真是假合著三鄰四捨進園觀看問明了眾莊客方知此事果真二老驚詫不已教眾莊客且莫回去老漢們同列位還去抓尋一遍眾人又細細照看了一下正是興盡而歸嘆了口氣齊出園門二老道列位今晚不來了麼老漢們告過要把園門落鎖沒人看守得也是我們鄰裡的干係此時莊客們蛇無頭而不行已不似先前聲勢了答應道但憑但憑兩邊人猶未散只見一個莊客在東邊牆角下叫道大爺有了眾人蜂擁而前莊客指道那槐枝上掛的不是大爺的軟翅紗巾麼眾人道既有了巾兒人也只在左近沿牆照去不多幾步只叫得聲苦也原來東角轉灣處有個糞窖窖中一人兩腳朝天不歪不斜剛剛倒插在內莊客認得鞋襪衣服正是張委顧不得臭穢只得上前打撈起來虞單二老暗暗念佛和鄰舍們自回眾莊客抬了張委在湖邊洗淨先有人報去莊上閤家大小哭哭啼啼置備棺衣入殮不在話下其夜張霸破頭傷重五更時亦死此乃作惡的見報正是兩個凶人離世界一雙惡鬼赴陰司次日大尹病愈陞堂正欲吊審秋公之事只見公差稟道原告張霸同家長張委昨晚都死了如此如此這般這般大尹大驚不信有此異事須臾間又見裡老鄉民共有百十人連名具呈前事訴說秋公平日惜花行善並非妖人張委設謀陷害神道報應前後事情細細分剖大尹因昨日頭暈一事亦疑其枉到此心下豁然還喜得不曾用刑即於獄中吊出秋公當堂釋放又給印信告示與他園門張掛不許閑人侵損他花木眾人叩謝出府秋公向鄰里作謝一路同回虞單二老開了園門同秋公進去秋公見牡丹茂盛如初傷感不已眾人治酒與秋公壓驚秋公又答席一連吃了數日酒席閑話休題自此之後秋公日餌百花漸漸習慣遂謝絕了煙火之物所鬻果實錢鈔悉皆佈施不數年間發白更黑顏色轉如童子一日正值八月十五麗日當天萬里無瑕秋公正在花下趺坐忽然祥風微拂彩雲如蒸空中音樂嘹亮異香撲鼻青鸞白鶴盤旋翔舞漸至庭前雲中正立著司花女兩邊幢幡寶蓋仙女數人各奏樂器秋公看見撲翻身便拜司花女道秋先汝功行圓滿吾已奏聞上帝有旨封汝為護花使者專管人間百花令汝拔宅上昇但有愛花惜花的加之以福殘花毀花的降之以災秋公向空叩首謝恩訖隨著眾仙登雲草堂花木一齊冉冉昇起向南而去虞公單老和那合村之人都看見的一齊下拜還見秋公在雲中舉手謝眾人良久方沒此地遂改名昇仙裡又謂之百花村園公一片惜花心道感仙姬下界臨草木同昇隨拔宅淮南不用煉黃金
