body:
  text: 第四卷灌園叟晚逢仙女連宵風雨閉柴門落盡深紅只柳存欲掃蒼苔且停帚階前點點是花痕這首詩為惜花而作昔唐時有一處士姓崔名玄微平昔好道不娶妻室隱於洛東所居庭院寬敞遍植花卉竹木構一室在萬花之中獨處於內童僕都居花外無故不得輒入如此三十餘年足跡不出園門時值春日院中花木盛開玄微日夕徜佯其間一夜風清月朗不忍捨花而睡乘著月色獨步花叢中忽見月影下一青衣冉冉而來玄微驚訝道這時節那得有女子到此行動心下雖然怪異又說道且看他到何處去那青衣不往東不往西徑至玄微麵前深深道個萬福玄微還了禮問道女郎是誰家宅眷因何深夜至此那青衣啟一點朱脣露兩行碎玉道兒家與處士相近今與女伴過上東門訪表姨欲借處士院中暫憩不知可否玄微見來得奇異欣然許之青衣稱謝原從舊路轉去不一時引一隊女子分花約柳而來與玄微一一相見玄微就月下仔細看時一個個姿容媚麗體態輕盈或濃或淡妝束不一隨從女郎盡皆妖艷正不知從那裡來的相見畢玄微邀進室中分賓主坐下開言道請問諸位女娘姓氏今訪何姻戚乃得光降敝園一衣綠裳者答道妾乃楊氏指一穿白的道此位李氏又指一衣絳服的道此位陶氏遂逐一指示最後到一緋衣小女乃道此位姓石名阿措我等雖則異姓俱是同行姊妹因封家十八姨數日雲欲來相看不見其至今夕月色甚佳故與姊妹們同往候之二來素蒙處士愛重妾等順便相謝玄微方待酬答青衣報道封家姨至眾皆驚喜出迎玄微閃過半邊觀看眾女子相見畢說道正要來看十八姨為主人留坐不意姨至足見同心各向前致禮十八姨道屢欲來看卿等俱為使命所阻今乘間至此眾女道如此良夜請姨寬坐當以一尊為壽遂授旨青衣去取十八姨問道此地可坐否楊氏道主人甚賢地極清雅十八姨道主人安在玄微趨出相見舉目看十八姨體態飄逸言詞泠泠有林下風氣近其傍不覺寒氣侵肌毛骨竦然遜入堂中侍女將卓椅已是安排停當請十八姨居於上席眾女挨次而會玄微末位相陪不一時眾青衣取到酒餚擺設上來佳餚異果羅列滿案酒味醇美其甘如飴俱非人世所有此時月色倍明室中照耀如同白日滿坐芳香馥馥襲人賓主酬酢杯觥交雜酒至半酣一紅裳女子滿斟大觥送與十八姨道兒有一歌請為歌之歌雲絳衣披拂露盈盈淡染胭脂一朵輕自恨紅顏留不住莫怨春風道薄情歌聲清婉聞者皆淒然又一白衣女子送酒道兒亦有一歌歌雲皎潔玉顏勝白雪況乃當年對芳月沈吟不敢怨春風自嘆容華暗消歇其音更覺慘切那十八姨性頗輕佻卻又好酒多了幾杯漸漸狂放聽了二歌乃道值此芳辰美景賓主正歡何遽作傷心語歌旨又深刺予殊為慢客須各罰以大觥當另歌之遂手斟一杯遞來酒醉手軟持不甚牢杯纔舉起不想袖在箸上一兜撲碌的連杯打翻這酒若翻在別個身上卻又罷了恰恰裡盡潑在阿措身上阿措年嬌貌美性愛整齊穿的卻是一件大紅簇花緋衣那紅衣最忌的是酒纔沾滴點其色便改怎經得這一大杯酒況且阿措也有七八分酒意見污了衣服作色道諸姊妹有所求吾不畏爾即起身往外就走十八姨也怒道小女弄酒敢與吾為抗耶亦拂衣而起眾女子留之不住齊勸道阿措年幼醉後無狀望勿記懷明日當率來請罪相送下階十八姨忿忿向東而去眾女子與玄微作別向花叢中四散行走玄微欲觀其蹤跡隨後送之步急苔滑一交跌倒掙起身來看時眾女子俱不見了心中想道是夢卻又未曾睡臥若是鬼又衣裳楚楚言語歷歷是人如何又倏然無影胡猜亂想驚疑不定回入堂中卓椅依然擺設杯盤一毫已無惟覺餘馨滿室雖異其事料非禍祟卻也無懼到次晚又往花中步玩見諸女子已在正勸阿措往十八姨處請罪阿措怒道何必更懇此老嫗有事只求處士足矣眾皆喜道妹言甚善齊向玄微道吾姊妹皆住處士苑中每歲多被惡風所撓居止不安常求十八姨相庇昨阿措誤觸之此後應難取力處士倘肯庇護當有微報耳玄微道某有何力得庇諸女阿措道但求處士每歲元旦作一朱幡上圖日月五星之文立於苑東吾輩則安然無恙矣今歲已過請於此月二十一日平旦微有東風即立之可免本日之難玄微道此乃易事敢不如命齊聲謝道得蒙處士慨允必不忘德言訖而別其行甚疾玄微隨之不及忽一陣香風過處各失所在玄微欲驗其事次日即制辦朱幡候至廿一日清早起來果然東風微拂急將幡豎立苑東少頃狂風振地飛沙走石自洛南一路摧林折樹苑中繁花不動玄微方曉諸女皆眾花之精也緋衣名阿措即安石榴也封十八姨乃風神也至次晚眾女各裹桃李花數斗來謝道承處士脫某等大難無以為報餌此花英可延年卻老願長如此衛護某等亦可致長生玄微依其言服之果然容顏轉少如三十許人後得道仙去有詩為證洛中處士愛栽花歲歲朱幡繪採茶學得餐英堪不老何須更覓棗如瓜列位莫道小子說風神與花精往來乃是荒唐之語那九州四海之中目所未見耳所未聞不載史冊不見經傳奇奇怪怪蹺蹺蹊蹊的事不知有多多少少就是張華的博物誌也不過志其一二虞世南的行書廚也包藏不得許多此等事甚是平常不足為異然雖如此又道是子不語怪且擱過一邊只那惜花致福損花折壽乃見在功德須不是亂道列位若不信時還有一段灌園叟晚逢仙女的故事待小子說與列位看官們聽若平日愛花的聽了自然將花分外珍重內中或有不惜花的小子就將這話勸他惜花起來雖不能得道成仙亦可以消閑遣悶你道這段話文出在那個朝代何處地方就在大宋仁宗年間江南平江府東門外長樂村中這村離城只去二里之遠村上有個老者姓秋名先原是莊家出身有數畝田地一所草房媽媽水氏已故別無兒女那秋先從幼酷好栽花種果把田業都撇棄了專於其事若偶覓得種異花就是拾著珍寶也沒有這般歡喜隨你極緊要的事出外路上逢著人家有樹花兒不管他家容不容便陪著笑臉捱進去求玩若平常花木或家裡也在正開還轉身得快倘然是一種名花家中沒有的雖或有已開過了便將正事撇在半邊依依不捨永日忘歸人都叫他是花癡或遇見賣花的有株好花不論身邊有錢無錢一定要買無錢時便脫身上衣服去解當也有賣花的知他僻性故高其價也只得忍貴買回又有那破落戶曉得他是愛花的各處尋覓好花折來把泥假捏個根兒哄他少不得也買有恁般奇事將來種下依然肯活日積月纍遂成了一個大園那園周圍編竹為籬籬上交纏薔薇荼蘼木香刺梅木槿棣棠金雀籬邊遍下蜀葵鳳仙雞冠秋葵鶯粟等種更有那金萱百合剪春羅剪秋羅滿地嬌十樣錦美人蓼山躑躅高良姜白蛺蝶夜落金錢纏枝牡丹等類不可枚舉遇開放之時爛如錦屏遠籬數步盡植名花異卉一花未謝一花又開向陽設兩扇柴門門內一條竹徑兩邊都結柏屏遮護轉過柏屏便是三間草堂房雖草覆卻高爽寬敞窗明亮堂中掛一幅無名小畫設一張白木臥榻桌凳之類色色潔淨打掃得地下無纖毫塵垢堂後精舍數間臥室在內那花卉無所不有十分繁茂真個四時不謝八節長春但見梅標清骨蘭挺幽芳茶呈雅韻李謝濃妝杏嬌疏雨菊傲嚴霜水仙冰肌玉骨牡丹國色天香玉樹亭亭階砌金蓮冉冉池塘芍藥芳姿少比石榴麗質無雙丹桂飄香月窟芙蓉冷艷寒江梨花溶溶夜月桃花灼灼朝陽山茶花寶珠稱貴蠟梅花磬口方香海棠花西府為上瑞香花金邊最良玫瑰杜鵑爛如雲錦繡球郁李點綴風光說不盡千般花卉數不了萬種芬芳籬門外正對著一個大湖名為朝天湖俗名荷花蕩這湖東連吳淞江西通震澤南接龐山湖湖中景致四時晴雨皆宜秋先於岸傍堆土作堤廣植桃柳每至春時紅綠間發宛似西湖勝景沿湖遍插芙蓉湖中種五色蓮花盛開之日滿湖錦雲爛熳香氣襲人小舟蕩槳采菱歌聲泠泠遇斜風微起偎船競渡縱橫如飛柳下漁人艤船曬網也有戲兒的結網的醉臥船頭的沒水賭勝的歡笑之音不絕那賞蓮遊人畫船簫管鱗集至黃昏回棹燈火萬點間以星影螢光錯落難辨深秋時霜風初起楓林漸染黃碧野岸衰柳芙蓉雜間白苹紅蓼掩映水際蘆葦中鴻雁群集嘹嚦乾雲哀聲動人隆冬天氣彤雲密佈六花飛舞上下一色那四時景致言之不盡有詩為證朝天湖畔水連天不唱漁歌即采蓮小小茅堂花萬種主人日日對花眠按下散言且說秋先每日清晨起來掃淨花底落葉汲水逐一灌溉到晚上又澆一番若有一花將開不勝歡躍或暖壺酒兒或烹甌茶兒向花深深作揖先行澆奠口稱花萬歲三聲然後坐於其下淺斟細嚼酒酣興到隨意歌嘯身子倦時就以石為枕臥在根傍自半含至盛開未嘗暫離如見日色烘烈乃把棕拂蘸水沃之遇著月夜便連宵不寐倘值了狂風暴雨即披蓑頂笠周行花間檢視遇有欹枝以竹扶之雖夜間還起來巡看幾次若花到謝時則纍日嘆息常至墮淚又不捨得那些落花以棕拂輕輕拂來置於盤中時嘗觀玩直至乾枯裝入淨瓮滿瓮之日再用茶酒澆奠慘然若不忍釋然後親捧其瓮深埋長堤之下謂之葬花倘有花片被雨打泥污的必以清水再四滌淨然後送入湖中謂之浴花平昔最恨的是攀枝折朵他也有一段議論道凡花一年只開得一度四時中只佔得一時一時中又只佔數日他熬過了三時的冷淡纔討得這數日的風光看他隨風而舞迎人而笑如人正當得意之境忽被催殘巴此數日甚難一朝折損甚易花若能言豈不嗟嘆況就此數日間先猶含蕊後復零殘盛開之時更無多了又有蜂采鳥啄蟲鑽日炙風吹霧迷雨打全仗人去護惜他卻反諮意拗折於心何忍且說此花自芽生根自根生本強者為乾弱者為枝一乾一枝不知養成了多少年月及候至花開供人清玩有何不美定要折他花一離枝再不能上枝枝一去乾再不能附乾如人死不可復生刑不可復贖花若能言豈不悲泣又想他折花的不過擇其巧幹愛其繁枝插之瓶中置之席上或供賓客片時侑酒之歡或助婢妾一日梳妝之飾不思客觴可飽玩於花下閨妝可借巧於人工手中折了一枝鮮花就少了一枝今年伐了此乾明年便少了此乾何如延其性命年年歲歲玩之無窮乎還有未開之蕊隨花而去此蕊竟槁滅枝頭與人之童夭何異又有原非愛玩趁興攀摺既折之後揀擇好歹逢人取討即便與之或隨路棄擲略不顧惜如人橫禍枉死無處申冤花若能言豈不痛恨他有了這段議論所以生平不折一枝不傷一蕊就是別人家園上他心愛著那一種花兒寧可終日看玩假饒那花主人要取一枝一朵來贈他他連稱罪過決然不要若有傍人要來折花者只除他不看見罷了他若見時就把言語再三勸止人若不從其言他情願低頭下拜代花乞命人雖叫他是花癡多有可憐他一片誠心因而住手者他又深深作揖稱謝又有小廝們要折花賣錢的他便將錢與之不教折損或他不在時被人折損他來見有損處必淒然傷感取泥封之謂之醫花為這件上所以自己園中不輕易放人遊玩偶有親戚鄰友要看難好回時先將此話講過纔放進去又恐穢氣觸花只許遠觀不容親近倘有不達時務的捉空摘了一花一蕊那老頭便要面紅頸赤大發喉急下次就打罵他也不容進去看了後來人都曉得他的性子就一葉兒也不敢摘動大凡茂林深樹便是禽鳥的巢穴有花果處越發千百為群如單食果實到還是小事偏偏只揀花蕊啄傷惟有秋先卻將米谷置於空處飼之又向禽鳥祈祝那禽鳥卻也有知覺每日食飽在花間低飛輕舞宛囀嬌啼並不損一朵花蕊也不食一個果實故此產的果品最多卻又大而甘美每熟時就先望空祭了花神然後敢嘗又遍送左近鄰家試新餘下的方鬻一年到有若干利息那老者因得了花中之趣自少至老五十餘年略無倦意筋骨愈覺強健粗衣淡飯悠悠自得有得贏餘就把來周濟村中貧乏自此合村無不敬仰又呼為秋公他自稱為灌園叟有詩為證朝灌園兮暮灌園灌成園上百花鮮花開每恨看不足為愛看園不肯眠話分兩頭卻說城中有一人姓張名委原是個宦家子弟為人奸狡詭譎殘忍刻薄恃了勢力專一欺鄰嚇捨紮害良善觸著他的風波立至必要弄得那人破家蕩產方纔罷手手下用一班如狼似虎的奴僕又有幾個助惡的無賴子弟日夜合做一塊到處闖禍生災受其害者無數不想卻遇了一個又狠似他的輕輕捉去打得個臭死及至告到官司又被那人弄了些手腳反問輸了因妝了幌子自覺無顏帶了四五個家人同那一班惡少暫在莊上遣悶那莊正在長樂村中離秋公家不遠一日早飯後吃得半酣光景向村中閑走不覺來到秋公門首只見籬上花枝鮮媚四圍樹木繁翳齊道這所在到也幽雅是那家的家人道此是種花秋公園上有名叫做花癡張委道我常聞得說莊邊有什麼秋老兒種得異樣好花原來就住在此我們何不進去看看家人道這老兒有些古怪不許人看的張委道別人或者不肯難道我也是這般快去敲門那時園中牡丹盛開秋公剛剛澆灌完了正將著一壺酒兒兩碟果品在花下獨酌自取其樂飲不上三杯只聽得砰砰的敲門響放下酒杯走出來開門一看見站著五六個人酒氣直衝秋公料道必是要看花的便攔住門口問道列位有甚事到此張委道你這老兒不認得我麼我乃城裡有名的張衙內那邊張家莊便是我家的聞得你園中好花甚多特來遊玩秋公道告衙內老漢也沒種甚好花不過是桃杏之類都已謝了如今並沒別樣花卉張委睜起雙眼道這老兒恁般可惡看看花兒打甚緊卻便回我沒有難道吃了你的秋公道不是老漢說謊果然沒有張委那裡肯聽向前叉開手當胸一搡秋公站立不牢踉踉蹌蹌直撞過半邊眾人一齊擁進秋公見勢頭凶惡只得讓他進去把籬門掩上隨著進來向花下取過酒果站在旁邊眾人看那四邊花草甚多惟有牡丹最盛那花不是尋常玉樓春之類乃五種有名異品那五種黃樓子綠蝴蝶西瓜穰舞青猊大紅獅頭這牡丹乃花中之王惟洛陽為天下第一有姚黃魏紫名色一本價值五千你道因何獨盛於洛陽只為昔日唐朝有個武則天皇后淫亂無道寵幸兩個官兒名喚張易之張昌宗於冬月之間要游後苑寫出四句詔來道來朝游上苑火速報春知百花連夜發莫待曉風吹不想武則天原是應運之主百花不敢違旨一夜發蕊開花次日駕幸後苑只見千紅萬紫芳菲滿目單有牡丹花有些志氣不肯奉承女主幸臣要一根葉兒也沒有則天大怒遂貶於洛陽故此洛陽牡丹冠於天下有一隻玉樓春詞單贊牡丹花的好處詞云名花綽約東風裡佔斷韶華都在此芳心一片可人憐春色三分愁雨洗玉人盡日懨懨地猛被笙歌驚破睡起臨妝鏡似嬌羞近日傷春輸與你那花正種在草堂對面周圍以湖石攔之四邊豎個木架子上覆布幔遮蔽日色花本高有丈許最低亦有六七尺其花大如丹盤五色燦爛光華奪目眾人齊贊好花張委便踏上湖石去嗅那香氣秋先極怪的是這節乃道衙內站遠些看莫要上去張委惱他不容進來心下正要尋事又聽了這話喝道你那老兒住在我莊邊難道不曉得張衙內名頭麼有恁樣好花故意回說沒有不計較就勾了還要多言那見得聞一聞就壞了花你便這般說我偏要聞遂把花逐朵攀下來一個鼻子湊在花上去嗅那秋老在傍氣得敢怒而不敢言也還道略看一回就去誰知這廝故意賣弄道有恁樣好花如何空過須把酒來賞玩分付家人快去取秋公見要取酒來賞更加煩惱向前道所在蝸窄沒有坐處衙內止看看花兒酒還到貴莊上去吃張委指著地上道這地下盡好坐秋公道地上齷齪衙內如何坐得張委道不打緊少不得有氈條遮襯不一時酒餚取到鋪下氈條眾人團團圍坐猜拳行令大呼小叫十分得意只有秋公骨篤了嘴坐在一邊那張委看見花木茂盛就起個不良之念思想要吞佔他的斜著醉眼向秋公道看你這蠢老兒不出到會種花卻也可取賞你一杯酒秋公那裡有好氣答他氣忿忿的道老漢天性不會飲酒衙內自請張委又道你這園可賣麼秋公見口聲來得不好老大驚訝答道這園是老漢的性命如何捨得賣張委道什麼性命不性命賣與我罷了你若沒去處一發連身歸在我家又不要做別事單單替我種些花木可不好麼眾人齊道你這老兒好造化難得衙內恁般看顧還不快些謝恩秋公看見逐步欺負上來一發氣得手足麻軟也不去睬他張委道這老兒可惡肯不肯如何不答應我秋公道說過不賣了怎的只管問張委道放屁你若再說句不賣就寫帖兒送到縣裡去秋公氣不過欲要搶白幾句又想一想他是有勢力的人卻又醉了怎與他一般樣見識且哄了去再處忍著氣答道衙內總要買也須從容一日豈是一時急驟的事眾人道這話也說得是就在明日罷此時都已爛醉齊立起身家人收拾家夥先去秋公恐怕折花預先在花邊防護那張委真個走向前便要踹上湖石去采秋先扯住道衙內這花雖是微物但一年間不知廢多少工夫纔開得這幾朵不爭折損了深為可惜況折去不過一二日就謝的何苦作這樣罪過張委喝道胡說有甚罪過你明日賣了便是我家之物就都折盡與你何干把手去推開秋公揪住死也不放道衙內便殺了老漢這花決不與你摘的眾人道這老兒其實可惡衙內采