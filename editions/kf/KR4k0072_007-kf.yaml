body:
  text: 第七卷錢秀才錯佔鳳凰儔漁船載酒日相隨短笛蘆花深處吹湖面風收雲影散水天光照碧琉璃這首詩是宋時楊備游太湖所作這太湖在吳郡西南三十餘裡之外你道有多少大東西二百里南北一百二十里周圍五百里廣三萬六千頃中有山七十二峰襟帶三州那三州蘇州湖州常州東南諸水皆歸一名震澤一名具區一名笠澤一名五湖何以謂之五湖東通長洲松江南通烏程言溪西通義興荊溪北通晉陵滆湖東通嘉興韭溪水凡五道故謂之五湖那五湖之水總是震澤分流所以謂之太湖就太湖中亦有五湖名色曰菱湖游湖莫湖貢湖胥湖五湖之外又有三小湖扶椒山東曰梅梁湖杜圻之西魚查之東曰金鼎湖林屋之東曰東皋裡湖吳人只稱做太湖那太湖中七十二峰惟有洞庭兩山最大東洞庭曰東山西洞庭曰西山兩山分峙湖中其餘諸山或遠或近若浮若沈隱見出沒於波濤之間有元人許謙詩為證週回萬水入遠近數州環南極疑無地西浮直際山三江歸海表一徑界河間白浪秋風疾漁舟意尚閑那東西兩山在太湖中間四面皆水車馬不通欲游兩山者必假舟楫往往有風波之險昔宋時宰相范成大在湖中遇風曾作詩一首白霧漫空白浪深舟如竹葉信浮沈科頭宴起吾何敢自有山川印此心話說兩山之人善於貨殖八方四路去為商為賈所以江湖上有個口號叫做鑽天洞庭內中單表西洞庭有個富家姓高名贊少年慣走湖廣販賣糧食後來家道殷實了開起兩個解庫托著四個夥計掌管自己只在家中受用渾家金氏生下男女二人男名高標女名秋芳那秋芳反長似高標二歲高贊請個積年老教授在家館谷教著兩個兒女讀書那秋芳資性聰明自七歲讀書至十二歲書史皆通寫作俱妙交十三歲就不進學堂只在房中習學女工描鸞刺鳳看看長成十六歲出落得好個女兒美艷非常有西江月為證面似桃花含露體如白雪團成眼橫秋水黛眉清十指尖尖春筍裊娜休言西子風流不讓崔鶯金蓮窄窄瓣兒輕行動一天豐韻高贊見女兒人物整齊且又聰明不肯將他配個平等之人定要揀個讀書君子才貌兼全的配他聘禮厚薄到也不論若對頭好時就賠些妝奩嫁去也自情願有多少豪門富室日來求親的高贊訪得他子弟纔不壓眾貌不超群所以不曾許允雖則洞庭在水中央三州通道況高贊又是個富家這些做媒的四處傳揚說高家女子美貌聰明情願賠錢出嫁只要擇個風流佳婿但有一二分才貌的那一個不挨風緝縫央媒說合說時誇獎得潘安般貌子建般纔乃至訪實都只平常高贊被這伙做媒的哄得不耐煩了對那些媒人說道今後不須言三語四若果有人才出眾的便與他同來見我合得我意一言兩決可不快當自高贊出了這句言語那些媒人就不敢輕易上門正是眼見方為的傳言未必真試金今有石驚破假銀人話分兩頭卻說蘇州府吳江縣平望地方有一秀士姓錢名青字萬選此人飽讀詩書廣知今古更兼一表人才也有西江月為證出落脣紅齒白生成眼秀眉清風流不在著衣新俊俏行中首領下筆千言立就揮毫四坐皆驚青錢萬選好聲名一見人人起敬錢生家世書香產微業薄不幸父母早喪愈加零替所以年當弱冠無力娶妻止與老僕錢興相依同住錢興日逐做些小經紀供給家主每每不敷一飢兩飽幸得其年游庠同縣有個表兄住在北門之外家道頗富就延他在家讀書那表兄姓顏名俊字伯雅與錢生同庚生都則一十八歲顏俊只長得三個月以此錢生呼之為兄父親已逝止有老母在堂亦未曾定親說話的那錢青因貧未娶顏俊是富家之子如何一十八歲還沒老婆其中有個緣故那顏俊有個好高之病立誓要揀個絕美的女子方與他締姻所以急切不能成就況且顏俊自己又生得十分醜陋怎見得亦有西江月為證面黑渾如鍋底眼圓卻似銅鈴痘疤密擺泡頭釘黃發蓬鬆兩鬢牙齒真金鍍就身軀頑鐵敲成楂開五指鼓錘能枉了名呼顏俊那顏俊雖則醜陋最好妝扮穿紅著綠低聲強笑自己以為美更兼他腹中全無滴墨紙上難成片語偏好攀今掉古賣弄才學錢青雖知不是同調卻也借他館地為讀書之資每事左湊著他故此顏俊甚是喜歡事事商議而行甚說得著話休絮煩一日正是十月初旬天氣顏俊有個門房遠親姓尤名辰號少梅為人生意行中頗頗伶俐也領借顏俊些本錢在家開個果子店營運過活其日在洞庭山販了幾擔橙桔回來裝做一盤到顏家送新他在山上聞得高家選婿之事說話中間偶然對顏俊敘述也是無心之談誰知顏俊到有意了想道我一向要覓一頭好親事都不中意不想這段姻緣卻落在那裡憑著我這恁般才貌又有傢俬若央媒去說再增添幾句好話怕道不成那日一夜睡不著天明起來急急梳洗了到尤辰家裡尤辰剛剛開門出來見了顏俊便道大官人為何今日起得恁早顏俊道便是有些正事欲待相煩恐老兄出去了特特早來尤辰道不知大官人有何事見委請裡面坐了領教顏俊到坐啟下作了揖分賓而坐尤辰又道大官人但有所委必當效力只怕用小子不著顏俊道此來非為別事特求少梅作伐尤辰道大官人作成小子賺花紅錢最感厚意不知說的是那一頭親事顏俊道就是老兄昨日說的洞庭西山高家這頭親事於家下甚是相宜求老兄作成小子則個尤辰格的笑了一聲道大官人莫怪小子直言若是第二家小子也就與你去說了若是高家大官人作成別人做媒罷顏俊道老兄為何推託這是你說起的怎麼又叫我去尋別人尤辰道不是小子推託只為高老有些古怪不容易說話所以遲疑顏俊道別件事或者有些東扯西拽東掩西遮東三西四不容易說話這做媒乃是冰人撮合一天好事除非他女兒不要嫁人便罷休不然少不得男媒女妁隨他古怪然須知媒人不可怠慢你怕他怎的還是你故意作難不肯總成我這樁美事這也不難我就央別人去說說成了時休想吃我的喜酒說罷連忙起身那尤辰領借了顏俊家本錢平日奉承他的見他有口弗然不悅之意即忙回船轉舵道大官人莫要性急且請坐下再細細商議顏俊道肯去說便去不肯去就罷了有甚話商量得口裡雖則是恁般說了身子卻又轉來坐下尤辰道不是我故意作難那老兒真個古怪別家相媳婦他偏要相女婿但得他當面看得中意纔將女兒許他有這些難處只怕勞而無功故此不敢把這個難題目包攬在身上顏俊道依你說也極容易他要當面看我時就等他看個眼飽我又不殘疾怕他怎地尤辰不覺呵呵大笑道大官人不是衝撞你說大官人雖則不醜更有比大官人勝過幾倍的他還看不上眼哩大官人若是不把與他見面這事縱沒一分二分還有一厘二厘若是當面一看便萬分難成了顏俊道常言無謊不成媒你與我包荒只說十二分人才或者該是我的姻緣一說便就不要面看也不可知尤辰道倘若要看時卻怎地顏俊道且到那時再有商量只求老兄速去一言尤辰道既蒙吩咐小子好歹去走一遭便了顏俊臨起身又叮嚀道千萬千萬說得成時把你二十兩這紙借契先奉還了媒禮花紅在外尤辰道當得當得顏俊別去不多時就教人封上五錢銀子送與尤辰為明日買舟之費顏俊那一夜在床上睡不著想道倘他去時不盡其心葫蘆提回復了我可不枉走一遭再差一個伶俐家人跟隨他去聽他講甚言語好計好計等待天明便喚家童小乙來跟隨尤大捨往山上去說親小乙去了顏俊心中牽掛即忙梳洗往近處一個關聖廟中求簽卜其事之成否當下焚香再拜把簽簡搖了幾搖撲的跳出一簽拾起看時卻是第七十三簽壁上寫得有簽訣四句雲憶昔蘭房分半釵而今忽把信音乖癡心指望成連理到底誰知事不諧顏俊才學雖則不濟這幾句簽訣文義顯淺難道好歹不知求得此簽心中大怒連聲道不準不準撒袖出廟門而去回家中坐了一會想道此事有甚不諧難道真個嫌我醜陋不中其意男子漢須比不得婦人只是出得人前罷了一定要選個陳平潘安不成一頭想一頭取鏡子自照側頭側腦的看了一回良心不昧自己也看不過了把鏡子向桌上一撇嘆了一口寡氣呆呆而坐准準的悶了一日不提且說尤辰是日同小乙駕了一隻三櫓快船趁著無風靜浪口尹呀的搖到西山高家門首停舶剛剛是未牌時分小乙將名帖遞了高公出迎問其來意說是與令愛作伐高贊問是何宅尤辰道就是敝縣一個舍親家業也不薄與宅上門戶相當此子年方十八讀書飽學高贊道人品生得如何老漢有言在前定要當面看過方敢應承尤辰見小乙緊緊靠在椅子後邊只得不老實扯個大謊便道若論人品更不必言堂堂一軀十全之相況且一肚文才十四歲出去考童生縣裡就高高取上一名這幾年為丁了父懮不曾進院所以未得游庠有幾個老學看了舍親的文字都許他京解之才就是在下也非慣於為媒的因年常在貴山買果偶聞令愛才貌雙全老翁又慎於擇婿因思舍親正合其選故此斗膽輕造高贊聞言心中甚喜便是令親果然有才有貌老漢敢不從命但老漢未曾經目終不放心若是足下引令親過寒家一會更無別說尤辰道小子並非謬言老翁他日自知只是舍親是個不出書房的小官人或者未必肯到宅上就是小子攛掇來時若成得親事還好萬一不成舍親何面目回轉小子必然討他抱怨了高贊道既然人品十全豈有不成之理老夫生性是這般小心過度的人所以必要著眼若是令親不屑下顧待老漢到宅足下不意之中引令親來一觀卻不妥貼尤辰恐怕高贊身到吳江訪出顏俊之丑即忙轉口道既然尊意決要會面小子還同舍親奉拜不敢煩尊駕動履說罷告別高公那裡肯放忙教整酒餚相款吃到更餘高公留宿尤辰道小舟帶有鋪陳明日要早行即今奉別等舍親登門卻又相擾高公取舟金一封相送尤辰作謝下船次早順風拽起飽帆不勾大半日就到了吳江顏俊正呆呆的站在門前望信一見尤辰回家便迎住問道有勞老兄往返事體如何尤辰把問答之言細述一遍他必要面會大官人如何處置顏俊嘿然無言尤辰便道暫別再會自回家去了顏俊到裡面喚過小乙來問其備細只恐尤辰所言不實小乙說來果是一般顏俊沈吟了半晌心生一計再走到尤辰家與他商議不知說的是甚麼計策正是為思佳偶情如火索盡枯腸夜不眠自古姻緣皆分定紅絲豈是有心牽顏俊對尤辰道適纔老兄所言我有一計在此也不打緊尤辰道有何好計顏俊道表弟錢萬選向在捨下同窗讀書他的才貌比我勝幾分兒明日我央及他同你去走一遭把他只說是我哄過一時待行過了聘不怕他賴我的姻事尤辰道若看了錢官人萬無不成之理只怕錢官人不肯顏俊道他與我至親又相處得極好只央他點一遍名兒有甚虧他處料他決然無辭說罷作別回家其夜就到書房中陪錢萬選夜飯酒餚比常分外整齊錢萬選愕然道日日相擾今日何勞盛設顏俊道且吃三杯有小事相煩賢弟則個只是莫要推故錢萬選道小弟但可效勞之處無不從命只不知甚麼樣事顏俊道不瞞賢弟說對門開果子店的尤少梅與我作伐說的女家是洞庭西山高家一時間誇了大口說我十分才貌不想說得忒高興了那高老定要先請我去面會一會然後行聘昨日商議若我自去恐怕不應了前言一來少梅沒趣二來這親事就難成了故此要勞賢弟認了我的名色同少梅一行瞞過那高老玉成這頭親事感恩不淺愚兄自當重報錢萬選想了一想道別事猶可這事只怕行不得一時便哄過了後來知道你我都不好看相顏俊道原只