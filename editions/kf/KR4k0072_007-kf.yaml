酒一來天氣寒冷二來心緒不佳斟著大杯只顧吃吃得爛醉如泥在一壁廂空椅子上打鼾去了錢青只得自家開口道此百年大事不可草草不妨另擇個日子再來奉迎高贊那裡肯依便道翁婿一家何分彼此況賢婿尊人已不在堂可以自專說罷高贊入內去了錢青又對各位親鄰再三央及不願在此結親眾人都是奉承高老的那一個不極口贊成錢青此時無可奈何只推出恭到外面時卻叫顏小乙與他商議小乙心上也道不該只教錢秀才推辭此外別無良策錢青道我已辭之再四其奈高老不從若執意推辭反起其疑我只要委曲周全你家主一樁大事並無欺心若有苟且天地不容主僕二人正在講話眾人都攢攏來道此是美事令岳意已決矣大官人不須疑慮錢青嘿然無語眾人揖錢青請進午飯已畢重排喜筵儐相披紅喝禮兩位新人打扮登堂照依常規行禮結了花燭正是百年姻眷今宵就一對夫妻此夜新得意事成失意事有心人遇沒心人其夜酒闌人散高贊老夫婦親送新郎進房伴娘替新娘卸了頭面幾遍催新郎安置錢青只不答應正不知什麼意故只得伏侍新娘先睡自己出房去了丫鬟將房門掩上又催促官人上床錢青心上如小鹿亂撞勉強答應一句道你們先睡丫鬟們亂了一夜各自倒東歪西去打瞌睡錢青本待秉燈達旦一時不曾討得幾支蠟燭到燭盡時又不好聲喚忍著一肚子悶氣和衣在床外側身而臥也不知女孩兒頭東頭西次早清清天亮便起身出外到舅子書館中去梳洗高贊夫妻只道他少年害羞亦不為怪是日雪雖住了風尚不息高贊且做慶賀筵席錢青吃得酩酊大醉坐到更深進房女孩兒又先睡了錢青打熬不過依舊和衣而睡連小娘子的被窩兒也不敢觸著又過一晚早起時見風勢稍緩便要起身高贊定要留過三朝方纔肯放錢青拗不過只得又吃了一日酒坐間背地裡和尤辰說起夜間和衣而臥之事尤辰口雖答應心下未必準信事已如此只索由他卻說女孩兒秋芳自結親之夜偷眼看那新郎生得果然齊整心中暗暗歡喜一連兩夜都則衣不解帶不解其故莫非怪我先睡了不曾等待得他此是第三夜了女孩兒預先咐咐丫鬟只等官人進房先請他安息丫鬟奉命只等新郎進來便替他解衣科帽錢青見不是頭除了頭巾急急的跳上床去貼著床裡自睡仍不脫衣女孩兒滿懷不樂只得也和衣睡了又不好告訴爹娘到第四日天氣晴和高贊預先備下送親船隻自己和老婆親送女孩兒過湖娘女共是一船高贊與錢青尤辰又是一船船頭俱掛了雜彩鼓樂振天好生鬧熱只有小乙受了家主之託心中甚不快意駕個小小快船趕路先行話分兩頭且說顏俊自從打發眾人迎親去後懸懸而望到初二日半夜聽得刮起大風大雪心上好不著忙也只道風雪中船行得遲只怕挫了時辰那想到過不得湖一應花燭筵席準備十全等了一夜不見動靜心下好悶想道這等大風到是不曾下船還好若在湖中行動老大擔懮哩又想道若是不曾下船我岳丈知道錯過吉期豈肯胡亂把女兒送來定然要另選個日子又不知幾時吉利可不悶殺了人又想道若是尤少梅能事時在岳丈前攛掇權且迎來那時我那管時日利與不利且落得早些受用如此胡思亂想坐不安蓆不住在門前張望到第四日風息料道決有佳音等到午後只見小乙先回報道新娘已取來了不過十里之遙顏俊問道吉期挫過他家如何肯放新人下船小乙道高家只怕挫過好日定要結親錢大官人替東人權做新郎三日了顏俊道既結了親這三夜錢大官人難道竟在新人房裡睡的小乙道睡是同睡的卻不曾動彈那錢大官人是看得熟鴨蛋伴得小娘眠的顏俊罵道放屁那有此理我托你何事你如何不叫他推辭卻做下這等勾當小乙道家人也說過來錢大官人道我只要周全你家之事若有半點欺心天神鑒察顏俊此時怒從心上起惡向膽邊生一把掌將小乙打在一邊氣忿忿地奔出門外專等錢青來廝鬧恰好船已攏岸錢青終有細膩預先囑付尤辰伴住高老自己先跳上岸只為自反無愧理直氣壯昂昂的步到顏家門首望見顏俊笑嘻嘻的正要上前作揖告訴衷情誰知顏俊以小人之心度君子之腹此際便是仇人相見分外眼睜不等開言便撲的一頭撞去咬定牙根狠狠的罵道天殺的你好快活說聲未畢查開五指將錢青和巾和發扯做一把亂踢亂打口裡不絕聲的道天殺的好欺心別人費了錢財把與你見成受用錢青口中也自分辯顏俊打罵忙了那裡聽他半個字兒家人也不敢上前相勸錢青吃打慌了但呼救命船上人聽得鬧吵都上岸來看只見一個丑漢將新郎痛打正不知甚麼意故都走攏來解勸那裡勸得他開高贊盤問他家人那家人料瞞不過只得實說了高贊不聞猶可一聞之時心頭火起大罵尤辰無理做這等欺三瞞四的媒人說騙人家女兒也扭著尤辰亂打起來高家送親的人也自心懷不平一齊動手要打那丑漢顏家的家人迴護家主就與高家從人對打先前顏俊和錢青是一對廝打以後高贊和尤辰是兩對廝打結末兩家家人扭做一團廝打看的人重重疊疊越發多了街道擁塞難行卻似九里山前擺陣勢昆陽城下賭輸贏事有湊巧其時本縣大尹恰好送了上司回轎至於北門見街上震天喧嚷卻是廝打的停了轎子喝教拿下眾人見知縣相公拿人都則散了只有顏俊兀自扭住錢青高贊兀自扭住尤辰紛紛告訴一時不得其詳大尹都教帶到公庭逐一細審不許攙口見高贊年長先叫他上堂詰問高贊道小人是洞庭山百姓叫做高贊為女擇婿相中了女婿才貌將女許配初三日女婿上門親迎因被風雪所阻小人留女婿在家完了親事今日送女到此不其遇了這個丑漢將小人的女婿毒打小人問期緣故卻是那丑漢買囑媒人要哄騙小人的女兒為婚卻將那姓錢的後生冒名到小人家裡老爺只問媒人便知奸弊大尹道媒人喚做甚名字可在這裡麼高贊道叫做尤辰見在臺下大尹喝退高贊喚尤辰上來罵道弄假成真以非為是都是你弄出這個伎倆你可實實供出免受重刑尤辰初時還只含糊抵賴大尹發怒喝教取夾棍伺候尤辰雖然市井從未熬刑只得實說起初顏俊如何央小人去說親高贊如何作難要選才貌後來如何央錢秀才冒名去拜望直到結親始末細細述了一遍大尹點頭道這是實情了顏俊這廝費了許多事卻被別人奪了頭籌也怪不得發惱只是起先設心哄騙的不是便教顏俊審其口詞顏俊已聽得尤辰說了實話又見知縣相公詞氣溫和只得也敘了一遍兩口相同大尹結末喚錢青上來一見錢青青年美貌且被打傷便有幾分愛他憐他之意問道你是個秀才讀孔子之書達周公之禮如何替人去拜望迎親同謀哄騙有乖行止錢青道此事原非生員所願只為顏俊是生員表兄生員家貧又館谷於他家被表兄再四央求不過勉強應承只道一時權宜玉成其事大尹道住了你既為親情而往就不該與那女兒結親了錢青道生員原只代他親迎只為一連三日大風太湖之隔不能行舟故此高贊怕誤了婚期要生員就彼花燭大尹道你自知替身就該推辭了顏俊從傍磕頭道青天老爺只看他應承花燭便是欺心大尹喝道不要多嘴左右扯他下去再問錢青你那時應承做親難道沒有個私心錢青道只問高贊便知生員再三推辭高贊不允生員若再辭時恐彼生疑誤了表兄的大事故此權成大禮雖則三夜同床生員和衣而睡並不相犯大尹呵呵大笑道自古以來只有一個柳下惠坐懷不亂那魯男子既自知不及風雪之中就不肯放婦人進門了你少年子弟血氣未定豈有三夜同床並不相犯之理這話哄得那一個錢青道生員今日自陳心跡父母老爺未必相信只教高贊去問自己的女兒便知真假大尹想道那女兒若有私情如何肯說實話當下想出個主意來便教左右喚到老實穩婆一名到舟中試驗高氏是否處女速來回話不一時穩婆來覆知縣相公那高氏果是處子未曾破身顏俊在階下聽說高氏還是處子便叫喊道既是小的妻子不曾破壞小的情願成就大尹又道不許多嘴再叫高贊道你心下願將女兒配那一個高贊道小人初時原看中了錢秀才後來女兒又與他做了花燭雖然錢秀才不欺暗室與小女即無夫婦之情已定了夫婦之義若教女兒另嫁顏俊不惟小人不願就是女兒也不願大尹道此言正合吾意錢青心下到不肯便道生員此行實是為公不為私若將此女歸了生員把生員三夜衣不解帶之意全然沒了寧可令此女別嫁生員決不敢冒此嫌疑惹人談論大尹道此女若歸他人你過湖這兩番替人誆騙便是行止有虧乾礙前程了今日與你成就親事乃是遮掩你的過失況你的心跡已自洞然女家兩相情願有何嫌疑休得過讓我自有明斷遂舉筆判雲高贊相女配夫乃其常理顏俊借人飾己實出奇聞東床已招佳選何知以羊易牛西鄰縱有責言終難指鹿為馬兩番渡湖不讓傳書柳毅三宵隔被何慚秉燭雲長風伯為媒天公作合佳男配了佳婦兩得其宜求妻到底無妻自作之孽高氏斷歸錢青不須另做花燭顏俊既不合設騙局於前又不合奮老拳於後事已不諧姑免罪責所費聘儀合助錢青以贖一擊之罪尤辰往來煽誘實啟釁端重懲示儆判訖喝教左右將尤辰重責三十板免其畫供竟行逐出蓋不欲使錢青冒名一事彰聞於人也高贊和錢青拜謝一乾人出了縣門顏俊滿面羞慚敢怒而不敢言抱頭鼠竄而去有好幾月不敢出門尤辰自回家將息棒瘡不提卻說高贊邀錢青到舟中反殷勤致謝道若非賢婿纔行俱全上官起敬小女幾乎錯配匪人今日到要屈賢婿同小女到舍下少住幾時不知賢婿宅上還有何人錢青道小婿父母俱亡別無親人在家高贊道既如此一發該在捨下住了老夫供給讀書賢婿意下如何錢青道若得岳父扶持足感盛德是夜開船離了吳江隨路宿歇次日早到西山一山之人聞知此事皆當新聞傳說又知錢青存心忠厚無不欽仰後來錢青一舉成名夫妻偕老有詩為證醜臉如何騙美妻作成表弟得便宜可憐一片吳江月冷照鴛鴦湖上飛
