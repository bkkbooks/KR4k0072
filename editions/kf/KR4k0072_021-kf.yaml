body:
  text: 第二十一卷張淑兒巧智脫楊生自昔財為傷命刃從來智乃護身符賊髡毒手謀文士淑女雙眸識俊儒已幸餘生逃密網誰知好事在窮途一朝獲把封章奏雪怨酬恩顯丈夫話說正德年間有個舉人姓楊名延和表字元禮原是四川成都府籍貫祖上流寓南直隸楊州府地方做客遂住楊州江都縣此人生得肌如雪暈脣若朱涂一個臉兒恰像羊脂白玉碾成的那裡有什麼裴楷那裡有什麼王衍這個楊元禮便真正是神清氣清第一品的人物更兼他文才天縱學問夙成開著古書簿葉一雙手不住的翻吸力豁剌不夠吃一杯茶時候便看完一部人只道他查點篇數那曉得經他一展逐行逐句都稀爛的熟在肚子裡頭一遇作文時節鋪著紙研著墨蘸著筆尖颼颼聲簌簌聲直揮到底好像猛雨般灑滿一紙句句是錦繡文章真個是筆落驚風雨書成泣鬼神終非池沼物堪作廟堂珍七歲能書大字八歲能作古詩九歲精通時藝十歲進了府庠次年第一補廩父母相繼而亡丁懮六載元禮因為少孤親事也都不曾定得喜得他苦志讀書十九歲便得中了鄉場第二名不得首薦心中悶悶不樂嘆道世少識者不耐煩赴京會試那些叔伯親友們那個不來勸他及早起程又有同年兄弟六人時常催促同行那楊元禮雖說不願會試也是不曾中得解元氣忿的說話功名心原是急的一日被這幾個同年們催逼不過發起興來整治行李原來父母雖亡他的老尊原是務實生理的人卻也有些田房遺下元禮變賣一兩處為上京盤纏同了六個鄉同年一路上京那六位同年是誰一個姓焦名士濟字子舟一個姓王名元暉字景照一個姓張名顯字伯一個姓韓名蕃錫字康侯一個姓蔣名義字禮生一個姓劉名善字取之六人裡頭只有劉蔣二人家事涼薄些兒那四位卻也一個個殷足那姓王的傢俬百萬地方上叫做小王愷說起來連這舉人也是有些緣故來的那時新得進身這幾個朋友好不高興帶了五六個家人上路一個個人材表表氣勢昂昂十分齊整怎見得但見輕眉俊眼繡腿花拳風笠飄飄雨衣鮮燦玉勒馬一聲嘶破柳堤煙碧帷車數武碾殘松嶺雪右懸雕矢行色增雄左插鮫函威風倍壯揚鞭喝躍途人誰敢爭先結隊驅馳村市盡皆驚盼正是處處綠楊堪系馬人人有路透長安這班隨從的人打扮出路光景雖然懸弓佩劍實落是一個也動不得手的大凡出路的人第一是老成二字最為緊要一舉一動俱要留心千不合萬不合是貪了小便宜在山東兗州府馬頭上各家的管家打開了銀包兌了多少銅錢放在皮箱裡頭壓得那馬背郎當擔夫跢軟一路上見的只認是銀子在內那裡曉得是銅錢在裡頭行到河南府榮縣地方相近離城尚有七八十里路上荒涼遠遠的聽得鐘聲清亮抬頭觀看望著一座大寺蒼松虯結古柏龍蟠千尋峭壁插漢芙蓉百道鳴泉灑空珠玉螭頭高拱上逼層霄鴟吻分張下臨無地顫巍巍恍是雲中雙闕光燦燦猶如海外五城寺門上有金字牌扁名曰寶華禪寺這幾個連日鞍馬勞頓見了這麼大寺心中歡喜一齊下馬停車進去遊玩但見稠陰夾道曲徑紆回旁邊多少舊碑七橫八豎碑上字跡模糊看起來唐時開元年間建造正看之間有小和尚疾忙進報隨有中年和尚油頭滑臉擺將出來見了這幾位冠冕客人踱進來便鞠躬迎進逐一位見禮看座問了某姓某處小和尚掇出一盤茶來吃了那幾個隨即問道師父法號那和尚道小僧賤號悟石列位相公有何尊乾到荒寺經過眾人道我們都是赴京會試的在此經過見寺宇整齊進來隨喜那和尚道失敬失敬家師遠出有失迎接卻怎生是好說了三言兩語走出來吩咐道人擺茶果點心便走到門前觀看只見行李十分華麗跟隨人役個個鮮衣大帽眉頭一蹙計上心來暗暗地歡喜道這些行李若謀了他的盡好受用我們這樣荒僻地面他每在此逗留正是天送來的東西了見物不取失之千里不免留住他們再作區處轉身進來就對眾舉人道列位相公在上小僧有一言相告勿罪唐突眾舉人道但說何妨和尚道說也奇怪小僧昨夜得一奇夢夢見天上一個大星端端正正的落在荒寺後園地上變了一塊青石小僧心上喜道必有大貴人到我寺中今日果得列位相公到此今科狀元決不出七位相公之外小僧這裡荒僻鄉村雖不敢屈留尊駕但小僧得此佳夢意欲暫留過宿列位相公若不棄嫌過了一宿應此佳兆只是山蔬野蔌怠慢列位相公不要見罪眾舉人聽見說了星落後園決應在我們幾人之內欲待應承過宿只有楊元禮心中疑惑密向眾同年道這樣荒僻寺院和尚外貌雖則殷勤人心難測他苦苦要留必有緣故眾同年道楊年兄又來迂腐了我們連主僕人夫算來約有四十多人那怕這幾個鄉村和尚若楊年兄行李萬有他虞都是我眾人賠償楊元禮道前邊只有三四十里便到歇宿所在還該趕去纔是道理卻有張伯與劉取之都是極高興的朋友心上只是要住對元禮道且莫說天時已晚趕不到村店此去途中尚有可慮現成這樣好僧房受用一宵明早起身也不為誤事若年兄必要趕到市鎮年兄自請先行我們不敢奉陪那和尚看見眾人低聲商議楊元禮聲聲要去便向元禮道相公此處去十來裡有黃泥壩歹人極多此時天時已晚路上難保無虞相公千金之軀不如小房過夜明日蚤行差得幾時路程卻不安穩了多少元禮被眾友牽制不過又見和尚十分好意況且跟隨的人見寺裡熱茶熱水也懶得趕路向主人道這師父說黃泥壩晚上難走不如暫過一夜罷元禮見說得有理只得允從眾友吩咐抬進行李明早起程那和尚心中暗喜中計連忙備辦酒席吩咐道人宰雞殺鵝烹魚炮鱉登時辦起盛席來這等地面那裡買得湊手原來這寺和尚極會受用件色雞鵝等類都養在家裡因此捉來便殺不費工夫佛殿旁邊轉過曲廊卻是三間精緻客堂上面一字兒擺下七個筵席下邊列著一個陪卓共有八席十分齊整悟石舉杯安蓆眾同年序齒坐定吃了數杯之後張伯開言道列位年兄必須行一酒令纔是有興劉取之道師父這裡可有色盆和尚道有有連喚道人取出色盆斟著大杯送第一位焦舉人行令焦子舟也不推遜吃酒便擲取麼點為文星擲得者卜色飛送眾人嘗得酒味甘美上口便乾原來這酒不比尋常卻是把酒來浸米曲中又放些香料用些熱藥做來顏色濃釅好像琥珀一般上口甘香吃了便覺神思昏迷四肢癱軟這幾個會試的路上吃慣了歪酒水般樣的淡酒藥般樣的苦酒還有尿般樣的臭酒這晚吃了恁般濃醞加倍放出意興來猜拳賭色一杯復一杯吃一個不住那悟石和尚又叫小和尚在外廂陪了這些家人叫道人支持這些轎夫馬夫上下人等都吃得泥爛只有楊元禮吃到中間覺酒味香濃心中漸漸昏迷暗道這所在那得恁般好酒且是昏迷神思其中決有緣故就地生出智著來假做腹痛吃不下酒那些人不解其意卻道途路上或者感些寒氣必是多吃熱酒纔可解散如何倒不用酒一齊來勸那和尚道楊相公這酒是三年陳的小僧輩置在床頭不敢輕用今日特地開出來奉敬相公腹內作痛必是寒氣連用十來大懷自然解散楊元禮看他勉強勸酒心上愈加疑惑堅執不飲眾人道楊年兄為何這般掃興我們是暢飲一番不要負了師父美情和尚合席敬大杯只放元禮不過心上道他不肯吃酒不知何故我也不怕他一個醒的跳出圈子外邊去又把大杯斟送元禮道實在吃不下了多謝厚情和尚只得把那幾位抵死勸酒卻說那些副手的和尚接了這些行李眾管家們各揀潔淨房頭鋪下鋪蓋這些吃醉的舉人大家你稱我頌亂叫著某狀元某會元東歪西倒跌到房中面也不洗衣也不脫爬上床磕頭便睡鼻勾鼻勾鼻息響動如雷這些手下人也被道人和尚們大碗頭勸著一發不顧性命吃得眼定口開手癱腳軟做了一堆矬倒卻說那和尚也在席上陪酒他便如何不受酒毒他每吩咐小和尚另藏著一把注子色味雖同酒力各別間或客人答酒只得呷下肚裡卻又有解酒湯在房裡去吃了不得昏迷酒散歸房人人熟睡那些賊禿們一個個磨拳擦掌思量動手悟石道這事須用乘機取勢不可遲延萬一酒力散了便難做事吩咐各持利刃悄悄的步到臥房門首聽了一番思待進房中間又有一個四川和尚號曰覺空悄向悟石道這些書呆不難了當必須先把跟隨人役完了事纔進內房這叫做斬草除根永無遺患悟石點頭道說得有理遂轉身向家人安歇去處掇開房門見頭便割這班酒透的人匹力撲六的好像切菜一般一齊殺倒血流遍地其實堪傷卻說那楊元禮因是心中疑惑和衣而睡也是命不該絕在床上展轉不能安寢側耳聽著外邊只覺酒散之後寂無人聲暗道這些和尚是山野的人收了這殘盤剩飯必然聚吃一番不然也要收拾家火為何寂然無聲又少頃聞得窗外悄步若有人聲心中愈發疑異又少頃只聽得外廂連叫噯喲又有模糊口聲又聽得匹撲的跳響慌忙跳起道不好了不好了中了賊僧計也隱隱的聞得腳蹤聲近急忙裡用力去推那些醉漢那裡推得醒也有木頭般不答應的也有胡胡盧盧說困話的推了幾推只聽得呀的房門聲響元禮顧不得別人事急計生聳身跳出後窗見庭中有一棵大樹猛力爬上偷眼觀看只見也有和尚也有俗人一伙兒擁進房門持著利刃望頸便刺元禮見眾人被殺驚得心搖膽戰也不知牆外是水是泥奮身一跳卻是亂棘叢中欲待蹲身又想後窗不曾閉得賊僧必從天井內追尋此處不當穩便用力推開棘剌滿面流血鑽出棘叢拔步便走卻是硬泥荒地帶跳而走已有二三里之遠雲昏地黑陰風淅淅不知是什麼所在卻都是廢冢荒丘又轉了一個彎角兒卻是一所人家孤丁丁住著板縫內尚有火光元禮道我已筋疲力盡不能行動此家燈火未息只得哀求借宿再作道理正是青龍白虎同行凶吉全然未保元禮低聲叩門只見五十來歲一個老嫗點燈開門見了元禮道夜深人靜為何叩門元禮道昏夜叩門實是學生得罪爭奈急難之中只得求媽媽方便容學生暫息半宵老嫗道老身孤寡難好留你且尊客又無行李又無隨從語言各別不知來歷決難從命元禮暗道事到其間不得不以實情告他媽媽在上其實小生姓楊是揚州府人會試來此被寶華寺僧人苦苦留宿不想他忽起狼心把我們六七位同年都灌醉了一齊殺倒只有小生不醉幸得逃生老嫗道噯喲阿彌陀佛不信有這樣事元禮道你不信看我面上血痕我從後庭中大樹上爬出跳出荊棘叢中面都刺碎老嫗睜睛看時果然面皮都碎對元禮道相公果然遭難老身只得留住相公會試中了看顧老身就有在裡頭了元禮道極感媽媽厚情自古道救人一命勝造七級浮屠我替你關了門你自去睡我就在此卓兒上假寐片時一待天明即便告別老嫗道你自請穩便那個門沒事不勞相公費心老身這樣寒家難得會試相公到來常言道貴人上宅柴長三千米長八百我老身有一個姨娘是賣酒的就住在前村我老身去打一壺來替相公壓驚省得你又無鋪蓋冷冰冰地睡不去元禮只道脫了大難心中又驚又喜謝道多承媽媽留宿已感厚情又承賜酒何以圖報小生倘得成名決不忘你大德媽媽道相公且寬坐片時有小女奉陪老身暫去就來女兒過來見了相公你且把門兒關著我取了酒就來也那老嫗吩咐女兒幾句隨即提壺出門去了不提卻說那女子把元禮仔細端詳若有嗟嘆之狀元禮道請問小姐姐今年幾歲了女子道年方一十三歲元禮道你為何只管呆看小生女子道我看你堂堂容貌表表姿材受此大難故此把你仔細觀看可惜你滿腹文章看不出人情世故元禮驚問道你為何說此幾句令我好生疑異女子道你只道我家母親為何不肯留你借宿元禮道孤寡人家不肯夤夜留人女子道後邊說了被難緣因他又如何肯留起來元禮道這是你令堂惻隱之心留我借宿女子道這叫做燕雀處堂不知禍之將及元禮益發驚問道難道你母親也待謀害我不成我如今孤身無物他又何所利於我小姐姐莫非道我傷弓之鳥故把言語來嚇詐我麼女子道你只道我家住居的房屋是那個的房屋我家營運的本錢是那個的本錢元禮道小姐姐說話好奇怪這是你家事小生如何知道女子道妾姓張有個哥哥叫做張小乙是我母親過繼的兒子在外面做些小經紀他的本錢也是寶華寺悟石和尚的這一所草房也是寺裡搭蓋的哥哥昨晚回來今日到寺裡交納利錢去了幸不在家若還撞見相公決不相饒元禮想道方纔眾和尚行凶內中也有俗人一定是張小乙了便問道既是你媽媽和寺裡和尚們一路如何又買酒請我女子道他那裡真個去賣酒假此為名出去報與和尚得知少頃他們就到了你終須一死我見你丰儀出眾決非凡品故此對你說知放你逃脫此難元禮嚇得渾身冷汗抽身便待走出女子扯住道你去了不打緊我家母親極是利害他回來不見了你必道我泄漏機關這場責罰教我怎生禁受元禮道你若有心救我只得吃這場責罰小生死不忘報女子道有計在此你快把繩子將我綁縛在柱子上你自脫身前去我口中亂叫母親等他回來只告訴他說你要把我強姦綁縛在此被我叫喊不過他怕母親歸來只得逃走了去必然如此方免責罰又急向箱中取銀一錠與元禮道這正是和尚借我家的本錢若母親問起我自有言抵對元禮初不欲受思量前路盤纏尚無毫忽只得受了把這女子綁縛起來心中暗道此女仁智兼全救我性命不可忘他大恩不如與他定約異日娶他回去便向女子道小生楊延和表字元禮年十九歲南直揚州府江都縣人氏因父母早亡尚未婚配受你活命之恩意欲結為夫婦後日娶你決不食言小姐姐意下如何女子道妾小名淑兒今歲十三歲若不棄微賤永結葭莩死且不恨只有一件我母親通報寺僧也是平昔受他恩惠故爾不肯負他請君日後勿復記懷事已危迫君無留戀元禮問言一畢抽身往外便走纔得出門回頭一看只見後邊一隊人眾持著火把蜂擁而來元禮魂飛魄喪好像失心風一般望前亂跌也不敢回頭再看話分兩頭單提那老嫗打頭川僧覺空持棍在前悟石隨後也有張小乙通共有二十餘人氣口牛口牛一直趕到老嫗家裡女子聽得人聲相近亂叫亂哭老嫗一進門來不見了姓楊的只見女子被縛嚇了一跳道女兒為何倒縛在那裡女子哭道那人見母親出去竟要把我強姦道我不從竟把繩子綁縛了我被我亂叫亂嚷只得奔去又轉身進來要借盤纏我回他沒有竟向箱中摸取東西不知拿了甚麼向外就走那老嫗聞言好像落湯雞一般口不能言連忙在箱子內查看不見了一錠銀子叫道不好了我借師父的本錢反被他掏摸去了眾和尚不見楊元禮也沒工夫逗留連忙向外追趕又不知東西南北那一條路去了走了一陣只得嘆口氣回到寺中跌腳嘆道打蛇不死自遺其害事已如此無可奈何且把殺死眾屍埋在後園空地上開了箱籠被囊等物原來多是銅錢在內銀子也有八九百兩把些來分與覺空又把些分與眾和尚眾道人等也分些與張小乙人人歡喜個個感激又另把些送與老嫗一則買他的口一則賠償他所失本錢依舊作借卻說那元禮脫身之後黑地裡走來走去原只在一笪地方氣力都盡只得蹲在一個冷廟堂裡頭天色微明向前又走已到榮縣剛待進城遇著一個老叟連叫老侄聞得你新中了舉人恭喜恭喜今上京會試如何在此獨步沒人隨從那老叟你道是誰卻就是元禮的叔父叫做楊小峰一向在京生理販貨下來經繇河間府到往山東劈面撞著了新中的侄兒真是一天之喜元禮正值窮途撞見了自家的叔父把寶華寺受難根因與老嫗家脫身的緣故一一告訴楊小峰十分驚嚇挽著手拖到飯店吃上了飯就把身邊隨從的阿三送與元禮伏侍又借他白銀一百二三十兩又替他叫了騾轎送他進京正叫做不是一番寒徹骨怎得梅花撲鼻香元禮別了小峰到京會試中了第二名會魁嘆道我楊延和到底遜人一籌然雖如此我今番得中一則可踐約二則得以伸冤矣殿試中了第一甲第三名入了翰林有相厚會試同年舒有慶他父親舒珽正在山東做巡按元禮把六個同年及從人受害本末細細與舒有慶說知有慶報知父親隨著府縣拘提合寺僧人到縣即將為首僧人悟石覺空二人極刑鞫問招出殺害舉人原繇押赴後園起屍相驗隨將眾僧拘禁此時張小乙已自病故了舒珽即時題請滅寺屠僧立碑道傍地方稱快後邊元禮告假回來親到廢寺基址作詩弔祭六位同年不提卻說那老嫗原系和尚心腹一聞寺滅僧屠正待逃走女子心中暗道我若跟隨母親同去前日那楊舉人從何尋問正在懮惶只見一個老人家走進門來問道這裡可是張媽媽家老嫗道老身亡夫其實姓張老叟道令愛可叫做淑兒麼老嫗道小女的名字老人家如何曉得老叟道老夫是揚州楊小峰我侄兒楊延和中了舉人在此經過往京會試不意這裡寶華禪寺和尚忽起狼心謀害同行六位舉人併殺跟隨多命侄兒幸脫此難現今中了探花感激你家令愛活命之恩又謝他贈了盤纏銀一錠因此托了老夫到此說親老嫗聽了嚇呆了半晌無言回答那女子窺見母親情慌無措扯他到房中說道其實那晚見他丰格超群必有大貴之日孩兒惜他一命只得贈了盤纏放他逃去彼時感激孩兒遂訂終身之約孩兒道母親平昔受了寺僧恩惠縱去報與寺僧知道也是各不相負你切不可懷恨他有言在先你今日不須驚怕楊小峰就接淑兒母子到揚州地方賃房居住等了元禮榮歸隨即結姻老嫗不敢進見元禮女兒苦苦代母請罪方得相見老嫗匍伏而前元禮扶起行禮不提前事卻說後來淑兒與元禮生出兒子又中乙未科狀元子孫榮盛若非黑夜逃生怎得佳人作合這叫做夫妻本是前生定曾向蟠桃會裡來有詩為證春闈赴選遇強徒解厄全憑女丈夫凡事必須留後看他年方不悔當初
