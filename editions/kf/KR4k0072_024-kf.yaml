body:
  text: 第二十四卷隋煬帝逸游召譴玉樹歌殘舞袖斜景陽宮裡事如麻曙星自合臨天下千里空教怨麗華這首詩單表隋文帝篡周滅陳奄有天下一統太平真個治得外戶不閉路不拾遺初時已立太子勇為東宮卻因不得母后獨孤氏歡心原來文帝獨孤皇后最是妒忌文帝畏而愛之常言前代帝王骨肉分爭皆因嫡庶相猜相忌致有禍胎今吾家五子同母傍無異生之子後來安享太平絕無後患不想太子勇嫡妃元氏無寵抑鬱而死專寵雲定興之女所生子女皆是庶出獨孤皇后心中甚是不憤每每在文帝前譖訴太子勇之短文帝極是懼內的聽他言話太子勇日漸日疏卻有第二子晉王廣為揚州都總管生來聰明俊雅儀容秀麗十歲即好觀古今書傳至於方藥天文地理百家技藝術數無不通曉卻只是心懷叵測陰賊刻深好鉤索人情深淺又能為矯情忍詢之事刺探得太子勇失愛母后日夜思所以間之日與蕭妃獨處後宮皆不得御幸每遇文帝及獨孤皇後使來必與蕭妃迎門候接飲食款待如平交往來臨去又以金錢納諸袖中以故人人到母后跟前交口同聲譽稱晉王仁孝聰明不似太子寡恩傲禮專寵阿雲致有如許豚犢獨孤皇后大以為然日夜譖之於文帝說太子勇不堪承嗣大統後來晉王廣又多以金寶珠玉結交越公楊素令他讒廢太子楊素是文帝第一個有功之臣言無不從皇后譖之於內楊素毀之於外文帝積怒太子勇已非一日竟廢太子勇為庶人幽之別宮卻立晉王廣為太子受命之日地皆震動識者皆知其奪嫡陰謀獨楊素殘忍深刻揚揚得意以為太子由我得立威權震天下百官皆畏而敬之後來獨孤皇后崩後宮卻得近幸文帝有一位宣華夫人陳氏陳宣帝之女也隋滅陳配掖庭性聰慧姿貌無雙及皇后崩後始進位為貴人專房擅寵後宮莫及文帝寢疾於仁壽宮夫人與太子廣同侍疾平旦夫人出更衣為太子所逼夫人拒之發亂神驚歸於帝所文帝怪其容色有異問其故夫人泫然泣曰太子無禮文帝大恚曰畜生何足付大事獨孤誤我蓋指皇后也因呼兵部尚書柳述黃門侍郎元岩司空越公楊素等曰召我兒來述等將呼太子廣帝曰勇也楊素曰國本不可屢易臣不敢奉詔帝氣哽塞回面向內不言素出語太子廣曰事急矣太子廣拜素曰以終身累公有頃左右報素曰帝呼不應喉中呦呦有聲素急入文帝已崩矣陳夫人與諸後宮相顧悲慟晡時太子廣遣使者賫金合緘封其際親書封字以賜夫人夫人見之惶懼以為藥酒不敢發使者促之乃開見盒中有同心結數枚宮人咸相慶曰得免死矣陳夫人恚而卻坐不肯致謝宮人咸逼之乃拜使者太子夜入焉明旦發喪使人殺故太子勇而後即位左右扶太子上殿太子足弱欲倒者數四不能上楊素叱去左右以手扶接太子援之乃上百官莫不嗟嘆楊素歸謂家人曰小兒子吾已提起教作大家即不知能了當否素恃己有功於帝多呼為郎君時宴內宮宮人偶遺酒污素衣素叱左右引下加撻焉帝甚不平隱忍不發一日帝與素釣魚於後苑池上並坐左右張傘以遮日帝起如廁回見素坐赭傘下風骨秀異神彩毅然帝大忌之帝每欲有所為素輒抑而禁之由是愈不快於素會素死帝曰使素不死夷其九族先是素一日欲入朝見文帝執金鉞逐之曰此賊吾欲立勇竟不從吾言今必殺汝素驚怖入室召子弟二人語曰吾必死矣出見文帝如此如此移時而死帝自素死益無忌憚沈迷女色一日顧詔近侍曰人主享天下之富亦欲極當年之樂自快其意今天下富安外內無事正吾行樂之日也今宮殿雖壯麗顯敞苦無曲房小室幽軒短檻若得此則吾期老於其中也近侍高昌奏曰臣有友項昇浙人也自言能構宮室翌日詔召問之昇曰臣乞先進圖本後日進圖帝覽之大悅即日詔有司供具材木凡役夫數萬經歲而成樓閣高下軒窗掩映幽房曲室玉欄朱互相連屬回環四合牖戶自通千門萬戶金碧相輝照耀人耳目金虯伏於棟下玉獸蹲於戶傍壁砌生光瑣窗曜日工巧之極自古未之有比也費用金寶珠玉庫藏為之一空人誤入其中者雖終日不能出帝幸之大悅顧左右曰使真僊遊其中亦當自迷也可目之曰迷樓詔以五品官賜昇仍給內庫金帛千匹賞之詔選良家女數千以居樓中帝每一幸經月不出是月大夫何稠進御女車車之制度絕小只容一人有機伏於其中若御童女則以機礙女之手足女纖毫不能動帝以處女試之極喜召何稠謂之曰卿之巧思一何神妙如此以千金贈之稠又進轉關車可以昇樓閣如行平地車中御女則自搖動帝尤喜悅謂稠曰此車何名稠曰臣任意造成未有名也原賜佳名帝曰卿任其巧意以成車朕得之任其意以自樂可命名任意車也帝又令畫工繪畫士女交合之圖數十幅懸於閣中其年上官時自江外得替回鑄烏銅鑒數十面其高五尺而闊三尺磨以成鏡為屏環於寢所詣闕投進帝以屏納迷樓中而御女於其傍纖毫運轉皆入於鑒中帝大喜曰繪畫得其形象耳此得人之真容也勝繪圖萬倍矣帝日夕沈荒於迷樓罄竭其力亦多倦息又闢地週二百里為西苑役民力常百萬內為十六院聚巧石為山鑿池為五湖四海詔天下境內所有鳥獸草木驛送京師詔定西苑十六院名景明迎暉棲鸞晨光明霞翠華文安積珍影紋儀鳳仁智清修寶林和明綺陰絳陽每院擇宮中佳麗謹厚有容色美人實之選帝常幸御者為之首分派宦者主出入易市又鑿五湖每湖四方十里東曰翠光湖南曰迎陽湖西曰金光湖北曰潔水湖中曰廣明湖湖中積土石為山構亭殿屈曲環繞澄泓皆窮極人間華麗又鑿北海周環四十里中有三山效蓬萊方丈瀛洲其上皆臺榭迴廊其下水深數丈開通五湖北海通行龍鳳舸帝多泛東湖因制湖上曲望江南八闋雲湖上月偏照列仙家水浸寒光鋪枕簟浪搖晴影走金蛇偏稱泛靈槎光景好輕彩望中斜清露冷侵銀兔影西風吹落桂枝花開宴思無涯其二云湖上柳煙裡不勝催宿霧洗開明媚眼東風搖弄好腰肢煙雨更相宜環曲岸陰覆畫橋低線拂行人春晚後絮飛晴雪暖風時幽意更依依其三云湖上雪風急墮還多輕片有時敲竹戶素華無韻入澄波望外玉相磨湖水遠天地色相和仰面莫思梁苑賦朝來且聽玉人歌不醉擬如何其四云湖上草碧翠浪通津修帶不為歌舞緩濃鋪堪作醉人茵無意襯香衾晴霽後顏色一般新遊子不歸生滿地佳人遠意正青春留詠卒難伸其五云湖上花天水浸靈芽淺蕊水邊勻玉粉濃苞天外剪明霞只在列仙家開爛熳插鬢若相遮水殿春寒幽冷艷玉軒晴照暖添華清賞思何賒其六云湖上女精選正輕盈猶恨乍離金殿侶相將盡是采蓮人清唱謾頻頻軒內好嬉戲下龍津玉管朱弦聞盡夜踏青斗草事青春玉輦從群真其七云湖上酒終日助清歡檀板輕聲銀甲緩醅浮香米玉蛆寒醉眼暗相看春殿晚仙艷奉杯盤湖上風光真可愛醉鄉天地就中寬帝主正清安其八云湖上水流繞禁園中斜日暖搖清翠動落花香暖眾紋紅蘋末起清風閑縱目魚躍小蓮東泛泛輕搖蘭棹穩沈沈寒影上仙宮遠意更重重帝常游湖上多令宮中美人歌唱此曲大業六年後苑草木鳥獸繁息茂盛桃蹊柳徑翠陰交合金猿青鹿動輒成群自大內開為御道直通西苑夾道植長松高柳帝多宿苑中去來無時侍御多夾道而宿帝往往於中夜即幸焉道州貢矮民王義眉目濃秀應對敏捷帝尤愛之常從帝游終不得入宮曰爾非宮中物也義乃出自宮以求進帝由是愈加憐愛得出入內寢義多臥御榻下帝游湖海回多宿十六院一夕中夜帝潛入棲鸞院時夏氣暄煩院妃慶兒臥於簾下初月照軒甚是明朗慶兒睡中驚魘若不救者帝使義呼慶兒帝自扶起久方清醒帝曰汝夢中何故而如此慶兒曰妾夢中如常時帝握妾臂游十六院至第十院帝入坐殿上俄時火發妾乃奔走回視帝坐烈焰中驚呼人救帝久方睡覺帝自強解曰夢死得生火有威烈之勢吾居其中得威者後帝幸江都被弒帝入第十院居火中此其應也一夕帝因觀殿壁上有廣陵圖帝注目視之移時不能舉步時蕭後在側謂帝曰知他是甚圖畫何消帝如此掛心帝曰朕不愛此畫只為思舊遊之處耳於是以左手憑後肩右手指圖上山水及人煙村落寺宇歷歷皆如在目前謂蕭後曰朕昔征陳後主時游此豈期久有天下萬機在躬便不得豁然於懷抱也言訖容色慘然蕭後奏曰帝意在廣陵何如一幸帝聞之言下恍然即日召群臣言欲至廣陵旦夕游賞議當泛巨舟自洛入河自河達海入淮至廣陵群臣皆言似此程途不啻萬里又孟津水緊滄海波深若泛巨舟事恐不測時有諫議大夫蕭懷靜乃皇後弟也奏曰臣聞秦始皇時金陵有王氣始皇使人鑿斷砥柱王氣遂絕今睢陽有王氣又陛下喜在東南欲泛孟津又慮危險況大梁西北有故河道乃是秦將王離畎水灌大梁之處乞陛下廣集兵夫於大梁起首開掘西自河陰引孟津水入東至淮陰放孟津水出此間地不過千里況於睢陽境內經過一則路達廣陵二則鑿穿王氣帝聞奏大喜出敕朝堂有敢諫開河者斬乃命征北大總管麻叔謀為開河都護以蕩寇將軍李淵為開河副使淵稱疾不赴即以左屯衛將軍令狐達代之詔發天下丁夫男年十五以上五十以下者皆至如有隱匿者斬三族凡役夫五百四十三萬餘人晝夜開掘急如星火又詔江淮諸州造大船五百隻使命促督民間有配著造船一隻者家產破用皆盡猶有不足枷項笞背然後鬻賣子女以供官費到得開河功役漸次將成龍舟亦就帝大喜將幸江都命越王侗留守東都宮女半不隨駕爭攀號留且言遼東小國不足以煩大駕願遣將征之帝意不回作詩留別宮人云我夢江南好征遼亦偶然但存顏色在離別只今年車駕既行師徒百萬離都旬日長安貢御車女袁寶兒年十五腰肢纖墮呆憨多態帝寵愛特厚時洛陽進合蒂迎輦花雲得之嵩山塢中人不知其名採花者異而貢之會帝駕適至因以迎輦名之帝令寶兒持之號曰司花女時詔虞世南草征遼指揮德音敕寶兒持花侍側注視久之帝謂世南曰昔傳飛燕可掌上舞朕常謂儒生飾於文字豈人能若是乎及今得寶兒方昭前事然多憨態今注目於卿卿才人可便作詩嘲之世南應詔為絕句云學畫鶯黃半未成垂肩嚲袖太憨生緣憨卻得君王寵長把花枝傍輦行帝大悅既至汴京帝御龍舟蕭後乘鳳舸於是吳越取民間女年十五六歲者五百人謂之殿腳女至龍舟鳳舸每船用彩纜十條每條用殿腳女十人嫩羊十口令殿腳女與羊相間而行時方盛暑翰林學士虞世基獻計請用垂柳栽於汴渠兩堤上一則樹根四散鞠護河堤二則牽舟之人庇其陰三則牽舟之羊食其葉上大喜詔民間獻柳一株賞一匹絹百姓競獻之又令親種帝自種一株群臣次第皆種方及百姓時有謠言曰天子先栽然後百姓栽栽與災同音蓋妖讖也栽畢取御筆寫賜垂柳姓楊曰楊柳也時舳艫相繼連接千里自大梁至淮口聯綿不絕錦帆過處香聞數裡一日帝將登龍舟憑殿腳女吳絳仙肩喜其媚麗不與群輩等愛之久不移步絳仙善畫長蛾眉帝色不自禁回輦召絳仙將拜婕妤蕭後性妒忌故不克諧帝寢興罷擢為龍舟首楫號曰崆峒夫人由是殿腳女爭效為長蛾眉司宮吏日給螺子黛五斛號為蛾綠螺子黛出波斯國每顆值十金後徵賦不足雜以銅黛給之獨絳仙得賜螺黛不絕帝每倚簾視絳仙移時不去顧內謁者曰古人言秀色若可餐如絳仙真可療飢矣因吟持楫篇賜之曰舊曲歌桃葉新妝艷落梅將身傍輕楫知是渡江來詔殿腳女千輩唱之時越溪進耀光綾綾紋突起時有光彩帝獨賜司花女及絳仙他人莫預蕭後恚憤不懌由是二姬稍稍不得親幸帝常登樓憶之題東南柱二篇云黯黯愁侵骨綿綿病欲成須知潘岳鬢大半為多情又云不信長相憶絲從鬢裡生閑來倚檻立相望幾含情殿腳女自至廣陵悉命備月觀行宮絳仙輩亦不得親侍寢殿有郎將自瓜州宣事回進合歡果一器帝命小黃門以一雙馳騎賜絳仙遇馬上搖動合歡蒂解絳仙拜賜因附紅箋小簡上進曰驛騎傳雙果君王寵念深寧知辭帝裡無複合歡心帝覽之不悅顧小黃門曰絳仙如何辭怨之深也黃門拜而言曰適走馬搖動及月觀果已離解不復連理帝因言曰絳仙不獨容貌可觀詩意深切乃女相如也亦何謝左貴嬪乎帝嘗醉游後宮偶見宮婢羅羅者悅而私之羅羅畏蕭後不敢迎帝因託辭以程姬之疾不可薦寢帝乃嘲之曰個人無賴是橫波黛染隆顱簇小峨幸好留儂伴成夢不留儂住意如何帝自達廣陵沈湎滋深荒淫無度往往為妖祟所惑嘗游吳公宅雞臺恍惚間與陳後主相遇帝幼年與後主甚善乃起迎之都忘其已死後主尚喚帝為殿下後主戴青紗皂幘青綽袖長裾綠錦純綠紫紋方平履舞女數十羅侍左右中有一女殊色帝屢目之後主雲殿下不識此人耶即張麗華貴妃也每憶桃葉山前乘戰艦與此妃北渡爾時麗華最恨方倚臨春閣試東郭鵕紫毫筆書小砑紅綃作答江令璧月句未終見韓擒虎躍青驄馬擁萬甲騎直來沖人都不存去就之禮以至有今日言罷即以綠文測海酒蠡酌紅梁新釀勸帝帝飲之甚歡因請麗華舞玉樹後庭花麗華白後主辭以拋擲歲久自井中出來腰肢粗巨無復往時姿態帝再三強之乃徐起舞終一曲後主問帝蕭妃何如此人帝曰春蘭秋菊各一時之秀也後主復誦詩十數篇帝不記之獨愛小窗詩及寄侍兒碧玉詩小窗詩云午醉醒來晚無人夢自驚夕陽如有意偏傍小窗明寄碧雲云離別腸應斷相思骨合銷愁魂若非散憑仗一相招麗華拜求帝賜一章帝辭以不能麗華笑曰嘗聞此處不留儂會有留儂處安得言不能耶帝強為之操筆立成曰見面無多事聞名爾許時坐來生百媚實個好相知麗華捧詩赧然不懌後主問帝龍舟之遊樂乎始謂殿下致治在堯舜之上今日仍此逸游大抵人生各圖快樂向時何見罪之深耶三十六封書至今使人怏怏不悅帝忽悟其已死叱之曰何今日尚呼我為殿下復以往事相訊耶恍惚不見帝兀然不自知驚悸移時帝後御龍舟中道聞歌者甚悲其辭曰我兄征遼東餓死青山下今我挽龍舟又困隋堤道方今天下飢路糧無些少前去三千程此身安可保寒骨枕荒沙幽魂泣煙草悲損門內妻望斷吾家老安得義男兒焚此無主屍引其孤魂回負其白骨歸帝聞其歌遽遣人求其歌者至曉不得其人帝頗旁彷徨通夕不寐帝知世祚已去意欲遂幸永嘉群臣皆不願從揚州朝百官天下朝貢使無一人至者有來者在途遭兵奪其貢物帝猶與群臣議詔十三道起兵誅不朝貢者帝深識玄象常夜起觀天乃召太史令袁充問曰天象如何充伏地泣涕曰星文大惡賊星逼帝座甚急恐禍起旦夕原陛下遽修德滅之帝不樂乃起入便殿索酒自歌曰宮木陰濃燕子飛興亡自古漫成悲他日迷樓更好景宮中吐艷戀紅輝歌竟不勝其悲近侍奏無故而歌甚悲臣皆不曉帝曰休問他日自知也俯首不語召矮民王義問曰汝知天下將亂乎義泣對曰臣遠方廢民得蒙上貢進入深宮久承恩澤又常自宮以近陛下天下大亂固非今日履霜堅冰其漸久矣臣料大禍事在不救帝曰子何不早告我也義曰臣惟不言言即死久矣帝乃泣下沾襟曰子為我陳敗亂之理朕貴知其故也明日義上書曰臣本出南楚卑薄之地逢聖明出治之時不愛此身願從入貢臣本侏儒性尤蒙滯出入左右積有年歲濃被聖私皆逾素望侍從乘輿周旋臺閣臣雖至鄙酷好窮經頗知善惡之本源少識興亡之所以還往民間周知利害深蒙顧問方敢敷陳自陛下嗣守元符體臨大器聖神獨斷謀諫莫從大興西苑兩至遼東龍舟逾萬艘宮闕遍天下兵甲常役百萬士民窮乎山谷征遼者百不存十歿葬者十未有一帑藏全虛谷粟湧貴乘輿竟往行幸無時兵人侍從常守空宮遂令四方失望天下為墟方今有家之村存者可數子弟死於兵役老弱困於蓬蒿兵屍如岳餓莩盈郊狗彘厭人之肉鳶魚食人之餘臭聞千里骨積高原陰風無人之墟鬼哭寒草之下目斷平野千里無煙萬民剝落不保朝昏父遺幼子妻號故夫孤苦何多餓荒尤甚亂離方始生死誰知人主愛人一何至此陛下聖性毅然孰敢上諫或有鯁言即令賜死臣下相顧箝結自全龍逢復生安敢議奏左右近臣阿諛順旨迎合帝意造作拒諫皆出此途乃逢富貴陛下惡過從何得聞方今又敗遼師再幸東土社稷危於春雪干戈遍於四方生民已入塗炭官吏猶未敢言陛下自惟若何為計陛下欲興師則兵吏不順欲行幸則將衛莫從適當此時何以自處陛下雖欲發憤修德特加愛民聖慈雖切救時天下不可復得大勢已去時不再來巨廈之崩一木不能支洪河已決掬壤不能救臣本遠人不知忌諱事急至此安敢不言臣今不死後必死兵敢獻此書延頸待盡帝省義奏曰自古安有不亡之國不死之主乎義曰陛下尚猶蔽飾己過陛下常言吾當跨三皇超五帝下視商周使萬世不可及今日之勢如何能自復回都輦乎帝再三加嘆義曰臣昔不言誠愛生也今既具奏願以死謝天下方亂陛下自愛少選左右報曰義自刎矣帝不勝悲傷命厚葬焉時值閣裴虔通虎賁郎將司馬德戡左右屯衛將軍宇文化及將謀作亂因請放官奴分直上下帝可其奏即下詔云寒暑迭用所以成歲功也日月代明所以均勞逸也故士子有游息之談農夫有休養之節諮爾髦眾服役甚勤執勞無怠埃垢溢於爪髮蟣虱結於兜鍪朕甚憫之俾爾休番從便嬉戲無煩方朔滑稽之請而從衛士旆上之文朕於侍從之間可謂恩矣可依前件施行不數日忽中夜聞外切切有聲帝急起衣冠御內殿坐未久左右伏兵俱起司馬德戡攜白刃向帝帝叱之曰吾終年重祿養汝吾無負汝汝何得負我帝常所幸朱貴兒在帝傍謂德戡曰三日前帝慮侍衛秋寒詔宮人悉絮袍褲帝自臨視造數千領兩日畢功前日頒賜爾等豈不知也何敢迫脅乘輿乃大罵德戡德戡斬之血濺帝衣德戡前數帝罪且曰臣實負陛下但今天下俱叛二京已為賊據陛下歸亦無門臣生亦無路臣已虧臣節雖欲復已不得也願得陛下首以謝天下乃攜劍逼帝帝復叱曰汝豈不知諸侯之血入地大旱三年況天子乎死自有法命索藥酒不得左右進練巾逼帝入閣自經死蕭後率左右宮娥輟床頭小版為棺斂粗備儀衛葬於吳公臺下即前此帝與陳後主相遇處也初帝不愛第三子齊王日柬見之常切齒每行幸輒錄以自隨及是難作謂蕭後曰得非阿孩耶阿孩齊王日柬小字也司馬德戡等既弒帝即馳遣騎兵執齊王日柬於私第倮跣驅至當街日柬曰大家計必殺兒願容兒衣冠就死猶意帝遣人殺之父子見殺至死不明可勝痛悼後唐文皇太宗皇帝提兵入京見迷樓太宗嘆曰此皆民膏血所為也乃命放出諸宮女焚其宮殿火經月不滅前謠前詩無不應驗方知煬帝非天亡之也後人有詩千里長河一旦開亡隋波浪九天來錦帆未落干戈起惆悵龍舟不更回
