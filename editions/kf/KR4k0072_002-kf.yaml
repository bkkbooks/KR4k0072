body:
  text: 第二卷三孝廉讓產立高名紫荊枝下還家日花萼樓中合被時同氣從來兄與弟千秋羞詠豆萁詩這首詩為勸人兄弟和順而作用著三個故事看官聽在下一一分剖第一句說紫荊枝下還家日昔時有田氏兄弟三人從小同居合爨長的娶妻叫田大嫂次的娶妻叫田二嫂妯娌和睦並無閑言惟第三的年小隨著哥嫂過日後來長大娶妻叫田三嫂那田三嫂為人不賢恃著自己有些妝奩看見夫家一鍋裡煮飯一卓上吃食不用私錢不動私秤便私房要吃些東西也不方便日夜在丈夫面前攛掇公堂錢庫田產都是伯伯們掌管一出一入你全不知道他是亮裡你是暗裡用一說十用十說百那裡曉得目今雖說同居到底有個散場若還家道消乏下來只苦得你年幼的依我說不如早早分析將財產三分撥開各人自去營運不好麼田三一時被妻言所惑認為有理央親戚對哥哥說要分析而居田大田二初時不肯被田三夫婦內外連連催逼只得依允將所有房產錢穀之類三分撥開分毫不多分毫不少只有庭前一棵大紫荊樹積祖傳下極其茂盛既要析居這樹歸著那一個可惜正在開花之際也說不得了田大至公無私議將此樹砍倒將粗本分為三截每人各得一截其餘零枝碎葉論秤分開商議已妥只待來日動手次日天明田大喚了兩個兄弟同去砍樹到得樹邊看時枝枯葉萎全無生氣田大把手一推其樹應手而倒根芽俱露田大住手向樹大哭兩個兄弟道此樹值得甚麼兄長何必如此痛惜田大道吾非哭此樹也思我兄弟三人產於一姓同爺合母比這樹枝枝葉葉連根而生分開不得根生本本生枝枝生葉所以榮盛昨日議將此樹分為三截那樹不忍活活分離一夜自家枯死我兄弟三人若分離了亦如此樹枯死豈有榮盛之日吾所以悲哀耳田二田三聞哥哥所言至情感動可以人而不如樹乎遂相抱做一堆痛哭不已大家不忍分析情願依舊同居合爨三房妻子聽得堂前哭聲出來看時方知其故大嫂二嫂各各歡喜惟三嫂不願口出怨言田三要將妻逐出兩個哥哥再三勸住三嫂羞慚還房自縊而死此乃自作孽不可活這話擱過不提再說田大可惜那棵紫荊樹再來看時其樹無人整理自然端正枝枯再活花萎重新比前更加爛熳田大喚兩個兄弟來看了各人嗟訝不已自此田氏累世同居有詩為證紫荊花下說三田人合人離花亦然同氣連枝原不解家中莫聽婦人言第二句說花萼樓中合被時那花萼樓在陝西長安城中大唐玄宗皇帝所建玄宗皇帝就是唐明皇他原是唐家宗室因為韋氏亂政武三思專權明皇起兵誅之遂即帝位有五個兄弟皆封王爵時號五王明皇友愛甚篤起一座大樓取詩經棠棣之義名曰花萼時時召五王登樓歡宴又製成大幔名為五王帳帳中長枕大被明皇和五王時常同寢其中有詩為證羯鼓頻敲玉笛催朱樓宴罷夕陽微宮人秉燭通宵坐不信君王夜不歸第四句說千秋羞詠豆萁詩後漢魏王曹操長子曹丕篡漢稱帝有弟曹植字子建聰明絕世操生時最所寵愛幾遍欲立為嗣而不果曹丕銜其舊恨欲尋事而殺之一日召子建問曰先帝每誇汝詩才敏捷朕未曾面試今限汝七步之內成詩一首如若不成當坐汝欺誑之罪子建未及七步其詩已成中寓規諷之意詩曰煮豆燃豆萁豆在釜中泣本是同根生相煎何太急曹丕見詩感泣遂釋前恨後人有詩為證從來寵貴起猜疑七步詩成亦可危堪嘆釜萁仇未已六朝骨肉盡誅夷說話的為何今日講這兩三個故事只為自家要說那三孝廉讓產立高名這段話文不比曹丕忌刻也沒子建風流勝如紫刑花下三田花萼樓中諸李隨你不和順的弟兄聽著在下講這節故事都要學好起來正是要知天下事須讀古人書這故事出在東漢光武年間那時天下義安萬民樂業朝有梧鳳之鳴野無谷駒之嘆原來漢朝取士之法不比今時他不以科目取士惟憑州郡選舉雖則有博學宏詞賢良方正等科惟以孝廉為重孝者孝弟廉者廉潔孝則忠君廉則愛民但是舉了孝廉便得出身做官若依了今日的事勢州縣考個童生還有幾十封薦書若是舉孝廉時不知多少分上鑽剌依舊是富貴子弟鑽去了孤寒的便有曾參之孝伯夷之廉休想揚名顯姓只是漢時法度甚妙但是舉過某人孝廉其人若果然有才有德不拘資格驟然昇擢連舉主俱紀錄受賞若所舉不得其人後日或貪財壞法輕則罪黜重則抄沒連舉主一同受罪那薦人的與所薦之人休戚相關不敢胡亂所以公道大明朝班清肅不在話下且說會稽郡陽羡縣有一人姓許名武字長文十五歲上父母雙亡雖然遺下些田產童僕奈門戶單微無人幫助更兼有兩個兄弟一名許晏年方九歲一名許普年方七歲都則幼小無知終日趕著哥哥啼哭那許武日則躬率童僕耕田種圃夜則挑燈讀書但是耕種時二弟雖未勝鋤必使從旁觀看但是讀書時把兩小兄弟坐於案旁將句讀親口傳授細細講解教以禮讓之節成人之道稍不率教輒跪於家廟之前痛自督責說自己德行不足不能化誨願父母有靈啟牖二弟涕泣不已直待兄弟號泣請罪方纔起身並不以疾言倨色相加也室中只用鋪陳一副兄弟三人同睡如此數年二弟俱已長成家事亦漸豐盛有人勸許武娶妻許武答道若娶妻便當與二弟別居篤夫婦之愛而忘手足之情吾不忍也繇是晝則同耕夜則同讀食必同器宿必同床鄉里傳出個大名都稱為孝弟許武又傳出幾句口號道是陽羡許季長耕讀晝夜忙教誨二弟俱成行不是長兄是父娘時州牧郡守俱聞其名交章薦舉朝廷征為議郎下詔會稽郡太守奉旨檄下縣令刻日勸駕許武迫於君命料難推阻分付兩個兄弟在家躬耕力學一如我在家之時不可懈惰廢業有負先人遺訓又囑付奴僕俱要小心安分聽兩個家主役使早起夜眠共扶家業囑付已畢收拾行裝不用官府車輛自己僱了腳力登車只帶一個童兒望長安進發不一日到京朝見受職長安城中聞得孝弟許武之名爭來拜訪識荊此時望重朝班名聞四野朝中大臣探聽得許武尚未婚娶多欲以女妻之者許武心下想道我兄弟三人年皆強壯皆未有妻我若先娶殊非為兄之道況我家世耕讀僥幸備員朝署便與縉紳大家為婚那女子自恃家門未免驕貴之氣不惟壞了我儒素門風異日我兩個兄弟娶了貧賤人家女子妯娌之間怎生相處從來兄弟不睦多因婦人而起我不可不防其漸也腹中雖如此躊論卻是說不出的話只得權辭以對說家中已定下糟糠之婦不敢停妻再娶恐被宋弘所笑眾人聞之愈加敬重況許武精於經術朝廷有大政事公卿不能決往往來請教他他引古證今議論悉中窾要但是許武所議眾人皆以為確不可易公卿倚之為重不數年間累遷至御史大夫之職忽一日思想二弟在家力學多年不見州郡薦舉誠恐怠荒失業意欲還家省視遂上疏其略雲臣以菲纔遭逢聖代致位通顯未謀報稱敢圖暇逸但古人云人生百行孝弟為先不孝有三無後為大先父母早背域兆未修臣弟二人學業未立臣三十未娶五倫之中乃缺其三願賜臣假暫歸鄉里倘念臣犬馬之力尚可鞭笞奔馳有日天子覽奏准給假暫歸命乘傳衣錦還鄉復賜黃金二十斤為婚禮之費許武謝恩辭朝百官俱於郊外送行正是報道錦衣歸故里爭誇白屋出公卿許武既歸省視先塋已畢便乃納還官誥只推有病不願為官過了些時從容召二弟至前詢其學業之進退許晏許普應答如流理明詞暢許武心中大喜再稽查田宅之數比前恢廓數倍皆二弟勤儉之所積也武於是遍訪裡中良家女子先與兩個兄弟定親自己方纔娶妻續又與二弟婚配約莫數月忽然對二弟說吾聞兄弟有析居之義今吾與汝皆已娶婦田產不薄理宜各立門戶二弟唯唯惟命乃擇日治酒遍召裡中父老三爵已過乃告以析居之事因悉召僮僕至前將所有家財一一分剖首取廣宅自予說道吾位為貴臣門宜棨戟體面不可不肅汝輩力田耕作得竹廬茅舍足矣又閱田地之籍凡良田悉歸之己將磽薄者量給二弟說道我賓客眾盛交游日廣非此不足以供吾用汝輩數口之家但能力作只此可無凍餒吾不欲汝多財以損德也又悉取奴僕之壯健伶俐者說道吾出入跟隨非此不足以給使令汝輩合力耕作正須此愚蠢者作伴老弱饋食足矣不須多人費汝衣食也眾父老一向知許武是個孝弟之人這番分財定然辭多就少不想他般般件件自佔便宜兩個小兄弟所得不及他十分之五全無謙讓之心大有欺凌之意眾人心中甚是不平有幾個剛直老人氣忿不過竟自去了有個心直口快的便想要開口說公道話與兩個小兄弟做喬主張其中又有個老成的背地裡捏手捏腳教他莫說以此罷了那教他莫說的也有些見識他道富貴的人與貧賤的人不是一般肚腸許武已做了顯官比不得當初了常言道疏不間親你我終是外人怎管得他家事就是好言相勸料未必聽從枉費了脣舌到挑撥他兄弟不和倘或做兄弟的肯讓哥哥十分之美你我又嘔這閑氣則甚若做兄弟的心上不甘必然爭論等他爭論時節我們替他做個主張卻不是好正是事非乾己休多管話不投機莫強言原來許晏許普自從蒙哥哥教誨知書達禮全以孝弟為重見哥哥如此分析以為理之當然絕無幾微不平的意思許武分撥已定眾人皆散許武居中住了正房其左右小房許晏許普各住一邊每日率領家奴下田耕種暇則讀書時時將疑義叩問哥哥以此為常妯娌之間也學他兄弟三人一般和順從此裡中父老人人薄許武之所為都可憐他兩個兄弟私下議論道許武是個假孝廉許晏許普纔是個真孝廉他思念父母面上一體同氣聽其教誨唯唯諾諾並不違拗豈不是孝他又重義輕財任分多分少全不爭論豈不是廉起初裡中傳個好名叫做孝弟許武如今抹落了武字改做孝弟許家把許晏許普弄出一個大名來那漢朝清議極重又傳出幾句口號道是假孝廉做官員真孝廉出口錢假孝廉據高軒真孝廉守茅檐假孝廉富田園真孝廉執鋤鐮真為玉假為瓦瓦為廈玉拋野不宜真只宜假那時明帝即位下詔求賢令有司訪問篤行有學之士登門禮聘傳驛至京詔書到會稽郡郡守分諭各縣縣令平昔已知許晏許普讓產不爭之事又值父老公舉他真孝真廉行過其兄就把二人申報本郡郡守和州牧皆素聞其名一同舉薦縣令親到其門下車投謁手捧玄纁束帛備陳天子求賢之意許晏許普謙讓不已許武道幼學壯行君子本分之事吾弟不可固辭二人只得應詔別了哥嫂乘傳到於長安朝見天子拜舞已畢天子金口玉言問道卿是許武之弟乎晏普叩頭應詔天子又道聞卿家有孝弟之名卿之廉讓有過於兄朕心嘉悅晏普叩頭道聖運龍興闢門訪落此乃帝王盛典郡縣不以臣晏臣普為不肖有溷聖聰臣幼失怙恃承兄武教訓兢兢自守耕耘誦讀之外別無他長臣等何能及兄武之萬一天子聞對嘉其謙德即日俱拜為內史不五年間皆至九卿之位居官雖不如乃兄赫赫之名然滿朝稱為廉讓忽一日許武致家書於二弟二弟拆開看之書曰匹夫而膺闢召仕宦而至九卿此亦人生之極榮也二疏有言知足不辱知止不殆既無出類拔萃之才宜急流勇退以避賢路晏普得書即日同上疏辭官天子不許疏三上天子問宰相宋均道許晏許普壯年入仕備位九卿朕待之不薄而屢屢求退何也宋均奏道晏普兄弟二人天性孝友今許武久居林下而晏普併駕天衢其心或有未安天子道朕並召許武使兄弟三人同朝輔政何如宋均道臣察晏普之意出於至誠陛下不若姑從所請以遂其高異日更下詔征之或訪先朝故事就近與一大郡以展其未盡之才因使便道歸省則陛下好賢之誠與晏普友愛之義兩得之矣天子准奏即拜許晏為丹陽郡太守許普為吳郡太守各賜黃金二十斤寬假三月以盡兄弟之情許晏許普謝恩辭朝公卿俱出郭到十里長亭相餞而別晏普二人星夜回到陽羡拜見了哥哥將朝廷所賜黃金盡數獻出許武道這是聖上恩賜吾何敢當教二弟各自收去次日許武備下三牲祭醴率領二弟到父母墳塋拜奠了畢隨即設宴遍召裡中父老許氏三兄弟都做了大官雖然他不以富貴驕人自然聲勢赫奕聞他呼喚尚不敢不來況且加個請字那時眾父老來得愈加整齊許武手捧酒卮親自勸酒眾人都道長文公與二哥三哥接風之酒老漢輩安敢僭先比時風俗淳厚鄉黨序齒許武出仕已久還叫一句長文公那兩個兄弟又下一輩了雖是九卿之貴鄉尊故舊依舊稱哥許武道下官此席專屈諸鄉親下降有句肺府之言奉告必須滿飲三杯方敢奉聞眾人被勸只得吃了許武教兩個兄弟次第把盞各敬一杯眾人飲罷齊聲道老漢輩承賢昆玉厚愛借花獻佛也要奉敬許武等三人亦各飲訖眾人道適纔長文公所論金玉之言老漢輩拱聽已久願得示下許武疊兩個指頭說將出來言無數句使聽者毛骨聳然正是斥晏鳥不知大鵬河伯不知海若聖賢一段苦心庸夫豈能測度許武當時未曾開談先流下淚來嚇得眾人驚惶無措兩個兄弟慌忙跪下問道哥哥何事悲傷許武道我的心事藏之數年今日不得不言指著晏普道只因為你兩個名譽未成使我作違心之事冒不韙之名有玷於祖宗貽笑於鄉里所以流淚遂取出一卷冊籍把與眾人觀看原來是田地屋宅及歷年收斂米粟布帛之數眾人還未曉其意許武又道我當初教育兩個兄弟原要他立身修道揚名顯親不想我虛名早著遂先顯達二弟在家躬耕力學不得州郡征闢我欲效古人祁大夫內舉不避親誠恐不知二弟之學行者說他因兄而得官誤了終身名節我故倡為析居之議將大宅良田強奴巧婢悉據為己有度吾弟素敦愛敬決不爭競吾暫冒貪饕之跡吾弟方有廉讓之名果蒙鄉里公評榮膺徵聘今位列公卿官常無玷吾志已遂矣這些田房奴婢都是公共之物吾豈可一人獨享這幾年以來所收米谷布帛分毫不敢妄用盡數開載在那冊籍上今日交付二弟表為兄的向來心跡也教眾鄉尊得知眾父老到此方知許武先年析產一片苦心自愧見識低微不能窺測齊聲稱嘆不已只有許晏許普哭倒在地道做兄弟的蒙哥哥教訓成人僥幸得有今日誰知哥哥如此用心是弟輩不肖不能自致青雲之上有累兄長今日若非兄長自說弟輩都在夢中兄長盛德從古未有只是弟輩不肖之罪萬分難贖這些小家財原是兄長苦掙來的合該兄長管業弟輩衣食自足不消兄長掛念許武道做哥的力田有年頗知生殖況且宦情已淡便當老於鋤以終天年二弟年富力強方司民社宜資莊產以終廉節晏普又道哥哥為弟輩而自污弟輩既得名又欲得利是天下第一等貪夫了不惟玷辱了祖宗亦且玷辱了哥哥萬望哥哥收回冊籍聊減弟輩萬一之罪眾父老見他兄弟三人交相掖讓你不收我不受一齊向前勸道賢昆玉所言都則一般道理長文公若獨得了這田產不見得向來成全兩位這一段苦心兩位若徑受了又負了令兄長文公這一段美意依老漢輩愚見宜作三股均分無厚無薄這纔見兄友弟恭各盡其道他三個兀自你推我讓那父老中有前番那幾個剛直的挺身向前厲聲說道吾等適纔處分甚得中正之道若再推遜便是矯情沽譽了把這冊籍來待老漢與你分剖許武弟兄三人更不敢多言只得憑他主張當時將田產配搭三股分開各自管業中間大宅仍舊許武居住左右屋宇窄狹以所在粟帛之數補償晏普他日自行改造其僮婢亦皆分派眾父老都稱為公平許武等三人施禮作謝邀入正席飲酒盡歡而散許武心中終以前番析產之事為歉欲將所得良田之半立為義莊以贍鄉里許晏許普聞知亦各出己產相助裡中人人嘆服又傳出幾句口號來道是真孝廉惟許武誰繼之晏與普弟不爭兄不取作義莊贍鄉里嗚呼孝廉誰可比晏普感兄之義又將朝廷所賜黃金大市牛酒日日邀裡中父老與哥哥會飲如此三月假期已滿晏普不忍與哥哥分別各要納還官誥許武再三勸諭責以大義二人只得聽從各攜妻小赴任卻說裡中父老將許武一門孝弟之事備細申聞郡縣郡縣為之奏聞聖旨命有司旌表其門稱其裡為孝弟裡後來三公九卿交章薦許武德行絕倫不宜逸之田野累詔起用許武只不奉詔有人問其緣故許武道兩弟在朝居位之時吾曾諷以知足知止我若今日復出應詔是自食其言了況方今朝廷之上是非相激勢利相傾恐非縉紳之福不如躬耕樂道之為愈耳人皆服其高見再說晏普到任守其乃兄之教各以清節自勵大有政聲後聞其兄高致不肯出山弟兄相約各將印綬納還奔回田裡日奉其兄為山水之游盡老百年而終許氏子孫昌茂累代衣冠不絕至今稱為孝弟許家雲後人作歌嘆道今人兄弟多分產古人兄弟亦分產古人分產成弟名今人分產但囂爭古人自污為孝義今人自污爭微利孝義名高身並榮微利相爭家共傾安得盡居孝弟裡卻把鬩牆人愧死
