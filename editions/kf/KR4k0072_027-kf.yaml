body:
  text: 第二十七卷李玉英獄中訟冤人間夫婦願白首男長女大無疾疚男娶妻兮女嫁夫頻見森孫會行走若還此願遂心懷百年瞑目黃泉臺莫教中道有差跌前妻晚婦情離乖晚婦狠毒勝蛇蠍枕邊譖語無休歇自己生兒似寶珍他人子女遭磨滅飯不飯兮茶不茶蓬頭垢面徒傷嗟君不見大舜歷山終夜泣閔騫十月衣蘆花這篇言語大抵說人家繼母心腸狠毒將親生子女勝過一顆九曲明珠乃希世之寶何等珍重這也是人之常情不足為怪單可恨的偏生要把前妻男女百般凌虐糞土不如若年紀在十五六歲還不十分受苦縱然磨滅漸漸長大日子有數惟有十歲內外的小兒女最為可憐然雖如此其間原有三等那三等第一等乃富貴之家幼時自有乳母養娘伏侍到五六歲便送入學中讀書況且親族蕃盛手下婢僕耳目眾多尚怕被人談論還要存個體面不致有飢寒打罵之苦或者自生得有子女要獨吞家業索性倒弄個斬草除根的手段有詩為證焚廩損階事可傷申生遭謗伯奇殃後妻煽處從來有幾個男兒肯直腸第二等乃中戶人家雖則體面還有料道幼時未必有乳母養娘伏侍諸色盡要在繼母手內出放那飢寒打罵就不能勾免了若父親是個硬掙的定然衛護女兒與老婆反目廝鬧不許他凌虐也有懼怕丈夫利害背著眼方敢施行倘遇了那不怕天不怕地也不怕羞也不怕死越殺越上的潑悍婆娘動輒拖刀弄劍不是刎頸上吊定是奔井投河慣把死來嚇老公常有弄假成真連家業都完在他身上俗語道得好逆子頑妻無藥可治遇著這般潑婦難道終日廝鬧不成少不得鬧過幾次奈何他不下到只得詐瞎裝聾含糊忍痛也有將來過繼與人也有送去為僧學道或托在父兄外家寄養這還是有些血氣的所為又有那一種橫肚腸爛心肝忍心害理無情義的漢子前妻在生時何等恩愛把兒女也何等憐惜到得死後娶了晚妻或奉承他妝奩富厚或貪戀顏色美麗或中年娶了少婦因這幾般上弄得神魂顛倒意亂心迷將前妻昔日恩義撇向東洋大海兒女也漸漸做了眼中之釘肉內之刺到得打罵莫說護衛勸解反要加上一頓取他的歡心常有後生兒女都已婚嫁前妻之子尚無妻室公論上說不去時胡亂娶個與他後母還千方百計做下魘魅要他夫妻不睦若是魘魅不靈便打兒子罵媳婦攛掇老公告忤逆趕逐出去那男女之間女兒更覺苦楚孩子家打過了或向學中攻書或與鄰家孩子們頑耍還可以消遣做了女兒時終日不離房戶與那夜叉婆擠做一塊不住腳把他使喚還要限每日做若干女工做得少打罵自不必說乃至攢足了卻又嫌好道歉也原脫白不過生下兒女恰像寫著包攬文書的日夜替他懷抱倘若啼哭便道是不情願使性兒難為他孩子偶或有些病癥又道是故意驚嚇出來的就是身上有個蚊蟲疤兒一定也說是故意放來釘的更有一節苦處任你滴水成冰的天氣少不得向冰孔中洗浣污穢衣服還要憎嫌洗得不潔淨加一場咒罵熬到十五六歲漸漸成人那時打罵就把污話來骯髒了不罵要趁漢定說想老公可憐女子家無處伸訴只好向背後吞聲飲泣倘或聽見又道裝這許多妖勢多少女子當不起恁般羞辱自去尋了一條死路有詩為證不正夫綱但怕婆怕婆無柰後妻何任他打罵親生女暗地心疼不敢訶第三等乃朝趁暮食肩擔之家此等人家兒女縱是生母在時只好苟免飢寒料道沒甚豐衣足食巴到十來歲也就要指望教去學做生意趁三文五文幫貼柴火若又遇著個凶惡繼母豈不是苦上加苦口中吃了定然有一頓沒一頓擔飢忍餓就要口熱湯也須請問個主意不敢擅專身上穿的不是前拖一塊定是後破一片受凍捱寒也不敢在他面前說個冷字那幾根頭髮整年也難得與梳子相會胡亂挽個角兒還不是扌尋得披頭蓋臉兩隻腳久常赤著從不曾見鞋襪面若得了雙草鞋就勝如穿著粉底皂靴專任的是劈柴燒火擔水提漿稍不如意軟的是拳頭腳尖硬的是木柴棍棒那咒罵乃口頭言語只當與他消閑到得將就挑得擔子便限著每日要賺若干錢鈔若還缺了一文少不得敲個半死倘肯攛掇老公賣與人家為奴這就算他一點陰騭所以小戶人家兒女經著後母十個到有九個磨折死了有詩為證小家兒女受艱辛後母加添妄怒瞋打罵飢寒渾不免人前一樣喚娘親說話的為何只管絮絮叨叨道後母的許多短處只因在下今日要說一個繼母謀害前妻兒女後來天理昭彰反受了國法與天下的後母做個榜樣故先略道其概這段話文若說出來時直教鐵漢也心酸總是石人亦淚灑你道這段話文出在那裡就在本朝正德年間北京順天府旗手衛有個蔭籍百戶李雄他雖是武弁出身卻從幼聰明好學深知典籍及至年長身材魁偉膂力過人使得好刀躲得好箭是一個文武兼備的將官因隨太監張永征陝西安化王有功昇錦衣衛千戶娶得個夫人何氏夫妻十分恩愛生下三女一男兒子名曰承祖長女名玉英次女名桃英三女名月英原來是先花後果的倒是玉英居長次即承祖不想何氏自產月英之後便染了個虛怯癥候不上半年嗚呼哀哉可憐留得舊時殘錦繡每因腸斷動悲傷那時玉英剛剛六歲承祖五歲桃英三歲月英止有五六個月雖有養娘奶子伏侍到底像小雞失了雞母七慌八亂啼啼哭哭李雄見兒女這般苦楚心下煩惱只得終日住在家中窩伴他本是個官身顧著家裡便擔擱了公事到得乾辦了公事卻又沒工夫照管兒女真個公私不能兩盡捱了幾個月日思想終不是長法要娶個繼室遂央媒尋親那媒婆是走千家踏萬戶的得了這句言語到處一兜那些人家聞得李雄年紀止有三十來歲又是錦衣衛千戶一進門就稱奶奶誰個不肯三日之間就請了若干庚貼送來任憑李雄選擇俗語有云姻緣本是前生定不許今人作主張李雄千擇萬選卻揀了個姓焦的人家女兒年方一十六歲父母雙亡哥嫂作主那哥哥叫做焦榕專在各衙門打乾是一個油裡滑的光棍李雄一時沒眼色成了這頭親事少不得行禮納聘不則一日娶得回家花燭成親那焦氏生得有六七分顏色女工針指卻也百伶百俐只是心腸有些狠毒見了四個小兒女便生嫉妒之念又見丈夫十分愛惜又不時叮囑好生撫育越發不懷好意他想道若沒有這一窩子賊男女那官職產業好歹是我生子女來承受如今遺下許多短命賊種縱掙得潑天家計少不得被他們先拔頭籌設使久後也只有今日這些家業派到我的子女所存幾何可不白白與他辛苦一世須是哄熱了丈夫然後用言語唆冷他父子磨滅死兩三個止存個把就易處了你道天下有恁樣好笑的事自己方纔十五六歲還未知命短命長生育不生育卻就算到幾十年後之事起這等殘忍念頭要害前妻兒女可勝嘆哉有詩為證娶妻原為生兒女見成兒女反為仇不是婦人心最毒還因男子沒長籌自此之後焦氏將著丈夫百般殷勤趨奉況兼正在妙齡打扮得如花朵相似枕蓆之間曲意取媚果然哄得李雄千歡萬喜百順百依只有一件不肯聽他你道是那件但說到兒女面上便道可憐他沒娘之子年幼嬌癡倘有不到之處須將好言訓誨莫要深責焦氏攛唆了幾次見不肯聽忍耐不住一日趁老公不在家尋起李承祖事過揪來打罵不道那孩子頭皮寡薄他的手兒又老辣一頓亂打那頭上卻如酵到饅頭登時腫起幾個大疙瘩可憐打得那孩子無個地孔可鑽號淘痛哭養娘奶子解勸不住那玉英年紀雖小生性聰慧看見兄弟無故遭此毒打已明白晚母不是個善良之輩心中苦楚淚珠亂落在旁看不過向前道告母親兄弟年幼無知望乞饒恕則個焦氏喝道小賤人誰要你多言難道我打不得的麼你的打也只就在頭上滴溜溜轉了卻與別人討饒玉英聞得這語愈加哀楚正打之間李雄已回那孩子抱住父親放聲號慟李雄見打得這般光景暴躁如雷翻天作地鬧將起來那婆娘索性抓破臉皮反要死要活分毫不讓早有人報知焦榕特來勸慰李雄告訴道娶令妹來專為要照管這幾個兒女豈是沒人打罵娶來凌賤不成況又幾番囑付可憐無母嬌幼你即是親母一般凡事將就些反故意打得如此模樣焦榕假意埋怨了妹子幾句陪個不是道舍妹一來年紀小不知世故二來也因從幼養嬌了性子在家任意慣了妹丈不消氣得又道省得在此不喜歡待我接回去住幾日勸喻他下次不可如此道罷作別而去少頃僱乘轎子差個女使接焦氏到家那婆娘一進門就埋怨焦榕道哥哥奴總有甚不好處也該看爹娘分上訪個好對頭匹配纔是怎麼胡亂骯髒送在這樣人家誤我的終身焦榕笑道論起嫁這錦衣衛千戶也不算骯髒了但是你自己沒有見識怎麼抱怨別人焦氏道那見得我沒有見識焦榕道妹夫既將兒女愛惜就順著他性兒一般著些疼熱焦氏嚷道又不是親生的教我著疼熱還要算計哩焦榕笑道正因這上說你沒見識自古道將欲取之必固與之你心下越不喜歡這男女越該加意愛護焦氏道我恨不得頃刻除了這幾個冤孽方才幹淨為何反要將他愛護焦榕道大抵小兒女料沒甚大過失況婢僕都是他舊人與你恩義尚疏稍加責罰此輩就到家主面前輕事重報說你怎地凌虐妹夫必然著意防範何繇除得他存了這片疑心就是生病死了還要疑你有甚緣故可不是無絲有線你若將就容得落得做好人撫養大了不怕不孝順你焦氏把頭三四搖道這是斷然不成焦榕道畢竟容不得須依我說話今後將他如親生看待婢僕們施些小惠結為心腹暗地察訪內中倘有無心向你並口嘴不好的便趕逐出去如此過了一年兩載妹夫信得你真了婢僕又皆是心腹你也必然生下子女分了其愛那時覷個機會先除卻這孩子料不疑慮到你那幾個丫頭等待年長叮囑童僕們一齊駕起風波只說有私情勾當妹夫是有官職的怕人恥笑自然逼其自盡是恁樣陰唆陽勸做去豈不省了目下受氣又見得你是好人焦氏聽了這片言語不勝喜歡道哥哥言之有理是我錯埋怨你了今番回去依此而行倘到緊要處再來與哥哥商量不提焦榕兄妹計議且說李雄因老婆凌賤兒女反添上一頂愁帽兒想道指望娶他來看顧兒女卻到增了一個魔頭後邊日子正長教這小男女怎生得過左思右算想出一個道理你道是什麼道理原來收拾起一間書室請下一個老儒把玉英承祖送入書堂讀書每日茶飯俱著人送進去吃直至晚方纔放學教他遠了晚娘躲這打罵那桃英月英自有奶子照管料然無妨常言夫妻是打罵不開的過了數日只得差人去接焦氏焦榕備些禮物送將回來焦氏知得請下先生也解了其意更不道破這番歸來果然比先大不相同一味將笑撮在臉上調引這幾個小男女親親熱熱勝如親生莫說打罵便是氣兒也不再呵一口待婢僕們也十分寬恕不常賞賜小東西大凡下人肚腸極是窄狹得了須微之利便極口稱功誦德歡聲溢耳李雄初時甚覺奇異只道懼怕他鬧吵當面假意殷勤背後未必如此幾遍暗地打聽冷眼偷瞧更不見有甚別樣做作過了年餘愈加珍愛李雄萬分喜悅想道不知大舅怎生樣勸喻便能改過從善如此可見好人原容易做的只在一轉念耳從此放下這片肚腸夫妻恩愛愈篤那焦氏巴不能生下個兒子誰知做親二年尚沒身孕心中著急往各處寺觀庵堂燒香許願那菩薩果是有些靈驗燒了香許過願真個就身懷六甲到得十月滿足生下一個兒子乳名亞奴你道為何叫這般名字原來民間有個俗套恐怕小兒家養不大常把賤物為名取其易長的意思因此每每有牛兒狗兒之名那焦氏也恐難養又不好叫恁般名色故只喚做亞奴以為比奴僕尚次一等即如牛兒狗兒之意李雄只道焦氏真心愛惜兒女今番生下亞奴亦十分珍重三朝滿月遍請親友吃慶喜筵宴不在話下常言說得好只愁不養不愁不長眨眼間不覺亞奴又已週歲那時玉英已是十齡長得婉麗飄逸如畫圖中人物且又賦性敏慧讀書過目成誦善能吟詩作賦其他描花刺繡不教自會兄弟李承祖雖然也是個聰明孩子到底趕不上姐姐曾詠綠萼梅詩曰並是調羹種偏栽碧玉枝不誇紅有艷兼笑白無奇蕊綻鶯忘啄花香蝶未窺隴頭羌笛奏芳草總堪疑因有了這般纔藻李雄倍加喜歡連桃英月英也送入書堂讀書又嘗對焦氏說道玉英女兒有如此美才後日不捨得嫁他出去訪一個有才學的秀士入贅家來待他夫婦唱和可不好麼焦氏口雖贊美心下越增妒忌正要設計下手不想其年乃正德十四年陝西反賊楊九兒據皋蘭山作亂累敗官軍地方告急朝廷遣都指揮趙忠充總兵官統領兵馬前去征討趙忠知得李雄智勇相兼特薦為前部先鋒你想軍情之事火一般緊急可能勾少緩半月之間擇日出師李雄收拾行裝器械帶領家丁起程臨行時又叮囑焦氏好生看管兒女焦氏答道這事不消分付但願你陣面上神靈護祐馬到成功博個封妻蔭子夫妻父子正在分別外邊報趙爺傳令教場相會李雄灑淚出衙急急上馬直至教場中演武廳上與諸將參謁已畢朝廷又差兵部官犒勞三軍齊向北闕謝恩口稱萬歲三聲趙爺分付李雄帶領前部軍馬先行李雄領了將令放起三個轟天大炮眾軍一聲吶喊遍地鑼鳴離了教場望陝西而進軍容整肅器杖鮮明一路上逢山開徑遇水疊橋不則一日已至陝西地面安營下寨等大軍到來一齊進發與賊兵連戰數陣互相勝負到七月十四賊兵挑戰趙爺令李雄出陣那李雄統領部下精兵奮勇殺入賊兵抵擋不住大敗而走李雄乘勝追逐數裡不想賊人伏兵四起團團圍住左沖右突不能得脫外面救兵又被截斷李雄部下雖然精勇終是眾寡不敵鏖戰到晚一軍盡沒可憐李雄蓋世英雄到此一場春夢正是正氣千尋橫宇宙孤魂萬里佔清寒趙忠出征之事按下不提卻說焦氏方要下手恰好遇著丈夫出征可不天湊其便李雄去了數日一乘轎子抬到焦榕家裡與他商議焦榕道據我主意再緩幾時焦氏道卻是為何焦榕道妹夫不在家死了定生疑惑如今還是把他倍加好好看承妹夫回家知道越信你是個好人那時出其不意弄個手腳必無疑慮可不妙哉焦氏依了焦榕說話真個把玉英姊妹看承比前又勝幾分終日盼望李雄得勝回朝誰知巴到八月初旬陝西報到京中說七月十四日與賊交鋒前部千戶李雄恃勇深入先勝後敗全軍盡沒焦榕是專在各衙門打乾的早已知得這個消息吃了一驚如飛報於妹子焦氏聞說丈夫戰死放聲號慟那玉英姊妹尤為可憐一個個哭得死而復甦焦氏與焦榕商議就把先生打發出門閤家掛孝招魂設祭擺設靈座親友盡來弔唁那時焦氏將臉皮翻轉動輒便是打罵又過了月餘焦氏向焦榕道如今丈夫已死更無別慮動了手罷焦榕道我有個妙策在此不消得下手只教他死在他鄉外郡又怨你不著焦氏忙問有何妙策焦榕道妹夫陣亡不知屍首下落再捱兩月等到嚴寒天氣差一個心腹家人同承祖去陝西尋覓妹夫骸骨他是個孩子家那曾經途路風霜之苦水土不服自然中道病死設或熬得到彼處叮囑家人撇了他暗地自回那時身畔沒了盤纏進退無門不是凍死定然餓死這幾個丫頭饒他性命賣與人為妾作婢還值好些銀子豈非一舉兩得焦氏連稱有理耐至臘月初旬焦氏喚過李承祖說道你父親半世辛勤不幸喪於沙場無葬身之地雖在九泉安能瞑目昨日聞得舅舅說近日趙總兵連勝數陣敵兵退去千里之外道路已是寧靜我欲親往陝西尋覓你父親骸骨歸葬少盡夫妻之情又恐我是個少年寡婦出頭露面必被外人談恥故此只得叫家人苗全服事你去走遭倘能尋得回來也見你為子的一點孝心行囊都已準備下了明早便可登程承祖聞言雙眼流淚道母親言之有理孩兒明早便行玉英料道不是好意大吃一驚乃道告母親爹爹暴棄沙場理合兄弟前去尋覓但他年紀幼小道途跋涉未曾經慣萬一有些山高水低可不枉送一死何不再差一人與苗全同去總是一般的焦氏大怒道你這逆種當初你父存日將你姐妹如珍寶一般愛惜如今死了便忘恩背義連骸骨也不要了你讀了許多書難道不曉得昔日木蘭代父征西緹縈上書代刑這兩個一般也是幼年女子有此孝順之心你不能勾學他恁般志氣也去尋覓父親骸骨反來阻當兄弟莫去況且承祖還是個男兒一路又有人服事須不比木蘭女上陣征戰出生入死那見得有什麼山高水低枉送了性命要你這樣不孝女何用一頓亂嚷把玉英羞得滿面通紅哭告道孩兒豈不念爹爹生身大恩要尋訪骸屍歸葬止因兄弟年紀尚幼恐受不得辛苦孩兒情願代兄弟一行焦氏道你便想要到外邊去遊山玩景快活只怕我心裡還不肯哩當晚玉英姊妹擠在一處言別嗚嗚的哭了半夜李承祖道姐姐爹爹骸骨暴棄在外就死也說不得待我去尋覓回來也教母親放心不必你懮慮到了次早焦氏催促起程姊妹們灑淚而別焦氏又道你若尋不著父親骸骨也不必來見我李承祖哭道孩兒如不得爹爹骨殖料然也無顏再見母親苗全扶他上了生口經出京師你道那苗全是誰乃是焦氏帶來贈嫁的家人中第一個心腹已暗領了主母之意自在不言之表主僕二人離了京師望陝西進發此時正是隆冬天氣朔風如箭地上積雪有三四尺高往來生口恰如在綿花堆裡行走那李承祖不上十歲的孩子況且從幼嬌養何曾受這般苦楚在