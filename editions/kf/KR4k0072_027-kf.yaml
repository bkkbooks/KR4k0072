至皋蘭山相近思想要祭奠父親一番怎奈身邊止存著十數文銅錢只得單買了一陌紙錢討個火種向戰場一路跑來遠遠望去只見一片曠野並無個人影來往心中先有五分懼怯便立住腳不敢進步卻又想道我受了千辛萬苦方到此間若是害怕怎能夠尋得爹爹骸骨須索拚命前去大著膽飛奔到戰場中舉目看時果然好淒慘也但見荒原漠漠野草萋萋四郊荊棘交纏一望黃沙無際髑髏暴露堪憐昔日英雄白骨拋殘可惜當年壯士陰風習習惟聞鬼哭神號寒露蒙蒙但見狐奔兔走猿啼夜月腸應斷雁唳秋雲魂自消李承祖吹起火種焚化紙錢望空哭拜一回起來仔細尋覓團團走遍但見白骨交加並沒一個全屍原來趙總兵殺退賊兵看見屍橫遍野心中不忍即於戰場上設祭陣亡將士收拾屍骸焚化因此沒有全屍遺存李承祖尋了半日身子因倦坐於亂草之中歇息片時忽然想起征戰之際遇著便殺即為戰場料非只此一處正不知爹爹當日喪於那個地方我卻專在此尋覓豈不是個呆子卻又想道我李承祖好十分蒙憧爹爹身死已久血肉定自腐壞骸骨縱在目前也難廝認若尋認不出可不空受這番勞碌心下苦楚又向空禱告道爹爹陰靈不遠孩兒李承祖千里尋訪至此收取骸骨怎奈不能識認爹爹你生前盡忠報國死後自必為神乞顯示骸骨所在奉歸安葬免使暴露荒丘為無祀之鬼祝罷放聲號哭又向白骨叢中東穿西走一回看看天色漸晚料來安身不得隨路行走要尋個歇處行不上一里田地斜插裡林子中走出一個和尚來那和尚見了李承祖把他上下一相說道你這孩子好大膽此是什麼所在敢獨自行走李承祖哭訴道小的乃京師人氏只因父親隨趙總兵出征陣亡特到此尋覓骸骨歸葬不道沒個下落天又將晚要覓個宿處師父若有庵院可憐借歇一晚也是無量功德那和尚道你這小小孩子反有此孝心難得難得只是屍骸都焚化盡了那裡去尋覓李承祖見說這話哭倒在地那和尚扶起道小官人哭也無益且隨我去住一晚明日打點回家去罷李承祖無奈只得隨著和尚又行了二里多路來到了個小小村落看來只有五六家人家那和尚住的是一座小茅庵開門進去吹起火來收拾些飯食與李承祖吃了問道小官人你父親是何衛軍士在那個將官部下叫甚名字李承祖道先父是錦衣衛千戶姓李名雄和尚大驚道原來是李爺的公子李承祖道師父你如何曉得我先父和尚道實不相瞞小僧原是羽林衛軍人名叫曾虎二去年出征撥在老爺部下因見我勇力過人留我帳前親隨另眼看承許我得勝之日扶持一官誰知七月十四隨老爺上陣先斬了數百餘級賊人敗去一時恃勇追逐十數裡深入重地賊人伏兵四起圍裹在內外面救兵又被截住全軍戰沒止存老爺與小僧二人各帶重傷只得同伏在亂屍之中到深夜起來逃走不想老爺已死小僧望見傍邊有一帶土牆隨負至牆下推倒牆土掩埋那時賊兵反攔在前面不能歸營逃到一個山灣中遇一老僧收留在庵虧他服事調養好了金瘡朝暮勸化我出家我也想死裡逃生不如圖個清閑自在因此依了他削髮為僧今年春間老師父身故有兩個徒弟道我是個氵吞來僧不容住在庵中我想既已出家爭甚是非讓了他們要往遠方去行腳經過此地見這茅庵空間就做個安身之處往遠近村坊抄化度日不想公子親來天遣相遇李承祖見說父親屍骨尚在倒身拜謝和尚連忙扶住又問道公子恁般年嬌力弱如何家人也不帶一個獨自行走李承祖將中途染病苗全拋棄逃回虧老嫗救濟前後事細細說出又道若尋不見父親骨殖已拚觸死沙場天幸得遇吾師使父子皆安和尚道此皆老爺英靈不泯公子孝行感格天使其然只是公子孑然一身又沒盤纏怎能夠裝載回去公子道意欲求本處官府設法不知可肯和尚笑道公子差矣常言道官情如紙薄總然極厚相知到得死後也還未可必何況素無相識卻做恁般癡想李承祖道如此便怎麼好和尚沈吟半晌乃道不打緊我有個道理在此明日將骸骨盛在一件家夥之內待我負著慢慢一路抄化至京可不好麼李承祖道吾師肯恁般用情生死銜恩不淺和尚道我蒙老爺識拔之恩少效犬馬之勞何足掛齒到了次日和尚向鄰家化了一隻破竹籠兩條索子又借柄鋤頭又買了幾陌紙錢鎖上庵門引李承祖前去約有數裡之程也是一個村落一發沒個人煙直到土牆邊放下竹籠李承祖就哭啼起來和尚將紙錢焚化拜祝一番運起鋤頭掘開泥土露出一堆白骨從腳上逐節兒收置籠中掩上籠蓋將索子緊緊捆牢和尚負在背上李承祖掮了鋤頭回至庵中和尚收拾衣缽被窩打個包兒做成一擔尋根竹子挑出庵門把鋤頭還了又與各鄰家作別央他看守二人離了此處隨路抄化盤纏盡是有餘不則一日已至保安村李承祖想念那老嫗的恩義徑來謝別誰知那老嫗自從李承祖去後日夕掛懷染成病癥一命歸泉有幾個親戚與他備辦後事送出郊外燒化久矣李承祖問知鄰里望空遙拜痛哭一場方纔上路共行了三個多月方達京都離城尚有十里之遠見旁邊有個酒店和尚道公子且在此少歇齊入店中將竹籠放於桌上對李承祖說道本該送公子到府向靈前叩個頭兒纔是只是我原系軍人雖則出家終有人認得倘被拿作逃軍便難脫身只得要在此告別異日再圖相會李承祖垂淚道吾師言雖有理但承大德到我家中或可少盡今在此處無以為報如之奈何和尚道何出此言此行一則感老爺昔日恩誼二則見公子窮途孤弱故護送前來那個貪圖你的財物正說間酒保將過酒餚和尚先擺在竹籠前祭奠一連叩了四五個頭起來又與李承祖拜別兩下各各流淚飲了數杯算還酒錢又將錢僱個生口與李承祖乘坐把竹籠教腳夫背了自己也背上包裹齊出店門灑淚而別有詩為證欲收父骨走風塵千里孤窮一病身老嫗周旋僧作伴皇天不負孝心人話分兩頭卻說苗全自從撇了李承祖僱著生口趕到家中只說已至戰場無處覓尋骸骨小官人患病身亡因少了盤纏不能帶回就埋在彼暗將真信透與焦氏那時玉英姊妹一來思念父親二來被焦氏日夕打罵不勝苦楚又聞了這個消息愈加悲傷焦氏也假意啼哭一番那童僕們見家主陣亡小官人又死各尋旺處飛去單單剩得苗全夫妻和兩個養娘門庭冷如冰炭焦氏恨不得一口氣吹大了亞奴襲了官職依然熱鬧又聞得兵科給事中上疏奏請優恤陣亡將士聖旨下在兵部查復焦氏多將金銀與焦榕到部中上下使用要謀昇個指揮之職那焦榕平日與人乾辦打慣了偏手就是妹子也說不得也要下隻手兒一日焦榕走來回復妹子說話焦氏安排酒餚款待原來他兄妹都與酒瓮同年吃殺不醉的從午後吃起直至申牌時分酒已將竭還不肯止又教苗全去買酒苗全提個酒瓶走出大門剛欲跨下階頭遠遠望見一騎生口上坐一個小廝卻是小主人李承祖吃這驚不小暗道原來這冤家還在掇轉身跑入裡邊悄悄報知焦氏焦氏即與焦榕商議停當教苗全出後門去買砒石霜二人依舊坐著飲酒等候李承祖進來不提且說李承祖到了自家門首跳下生口趕腳的背著竹籠跟將進來直至堂中靜悄悄並不見一人心內傷感道爹爹死了就弄得這般冷落教趕腳的把竹籠供在靈座上打發自去李承祖向靈前叩拜轉念去時的苦楚不覺淚如泉湧哭倒在拜臺之上焦氏聽得哭聲假意教丫頭出來觀看那丫頭跑至堂中見是李承祖驚得魂不附體帶跌而奔報道奶奶公子的魂靈來家了焦氏照面一口涎沫道啐青天白日這樣亂說丫頭道見在靈前啼哭奶奶若不信一同去看焦榕也假意說道不信有這般奇事一齊走出外邊李承祖看見帶著眼淚向前拜見焦榕扶住道途路風霜不要拜了焦氏掙下幾點眼淚說道苗全回來說你有不好的信息日夜想念懊悔當初教你出去今幸無事萬千之喜了只是可曾尋得骸骨李承祖指著竹籠道這個裡邊就是焦氏捧著竹籠便哭起天來玉英姊妹已是知得李承祖無恙又驚又喜奔至堂前四個男女抱做一團而哭哭了一回玉英道苗全說你已死怎地卻又活了李承祖將途中染病苗全不容暫停直至遇見和尚送歸始末一一道出焦榕怒道苗全這奴才恁般可惡待我送他到官活活敲死與賢甥出氣李承祖道若得舅舅主張可知好麼焦氏道你途中辛苦了且進去吃些酒飯將息身子遂都入後邊焦榕扯李承祖坐下玉英姊妹自避過一邊焦氏一面教丫頭把酒去熱自己踅到後門首恰好苗全已在那裡等候焦氏接了藥分付他停一回進來焦氏到廚下將丫頭使開把藥傾入壺中依原走來坐下少頃丫頭將酒鏇湯得飛滾拿至卓邊焦榕取過一隻茶甌滿滿斟一杯遞與承祖道賢甥借花獻佛權當與你洗塵承祖道多謝舅舅接過手放下也要斟一杯回敬焦榕又拿起直推至口邊道我們飲得多了這壺中所存有限你且乘熱飲一杯李承祖不知好歹骨都都飲個乾淨焦榕又斟過一杯道小官人家須要飲個雙杯又推到口邊那李承祖因是尊長相勸不敢推託又飲乾了焦榕再把壺斟時只有小半杯一發勸李承祖飲了那酒不飲也罷纔到腹中便覺難過連叫肚痛焦氏道想是路上觸了臭氣了李承祖道也不曾觸甚臭氣焦氏道或者三不知那裡覺得須臾間藥性發作猶如鋼槍攢刺烈火焚燒疼痛難忍叫聲痛死我也跌倒在地焦榕假驚道好端端地為何痛得恁般利害焦氏道一定是絞腸沙了急教丫頭扶至玉英床上睡下亂扌顛亂跌只叫難過慌得玉英姊妹手足無措那裡按得他住不消半個時辰五臟迸裂七竅流紅大叫一聲命歸泉府旁邊就哭殺了玉英姊妹喜殺了焦氏婆娘也假哭幾聲焦榕道看這模樣必是觸犯了神道被喪煞打了如今幸喜已到家裡還好只是佔了甥女臥處不當穩便就今夜殮過省得他們害怕焦氏便去取出些銀錢那時苗全已轉進前門打探聽得裡邊哭聲鼎沸量來已是完帳徑走入來焦氏恰好看見把銀遞與苗全急忙去買一具棺木又買兩壺酒與苗全吃夠一醉先把棺木放在一門廂房裡然後揎拳裸臂跨入房中教玉英姊妹走開向床上翻那屍首也不揩抹去血污也不換件衣服伸著雙手便抱起來一則那廝有些蠻力二則又趁著酒興三則十數歲孩子原不甚重輕輕的托在兩臂直至廂房內盛殮玉英姊妹隨後哭泣誰知苗全落了銀子買小了棺木屍首放下去兩隻腿露出了五六寸只得將腿兒豎起卻又頂浮了棺蓋苗全扯來拽去沒做理會玉英姊妹看了這個光景越發哭得慘傷焦氏沈吟半響心生一計把玉英姊妹並丫頭都打發出外掩上門兒教苗全將屍首拖在地上提起斧頭砍下兩隻小腿橫在頭下倒好做個枕兒收拾停當釘上棺蓋開門出來焦榕自回家去玉英覷見棺已釘好暗想道適來放不下如何打發我姊妹出來了便能釘上棺蓋難道他們有甚法術把棺木化大了屍首縮小了好生委決不下過了兩日焦氏備起衣衾棺槨將丈夫骸骨重新殮過擇日安葬祖塋恰好優恤的覆本已下李雄止贈忠勇將軍不準昇襲指揮焦氏用費若干銀兩空自送在水裡到了安葬之日親鄰齊來相送李承祖也就埋在墳側偶有人問及只說路上得了病癥到家便亡那親戚都不是切己之事那個去查他細底可憐李承祖沙場內倒掙扎得性命家庭中反斷送了殘生正是非故翻如故宜親卻不親萬般皆是命半點不由人常言道痛定思痛李承祖死時玉英慌張慌智不暇致詳到葬後漸漸想出疑惑來他道如何不前不後恰恰裡到家便死不信有恁般湊巧況兼口鼻中又都出血且不揀個時辰也不收拾個乾淨棺木小了也不另換哄了我們轉身不知怎地胡亂迭入裡面那苗全聽說要送他到官今半句不提比前反覺親密顯系是母親指使的看起那般做作我兄弟這死必定有些蹊蹺心中雖則明白然亦無可奈何只索付之涕泣而已那焦氏謀殺了李承祖之後卻又想道這小殺纔已除那幾個小賤人日常雖受了些磨折也只算與他拂養須是教他大大吃些苦楚方不敢把我輕覷自此日逐尋頭討腦動輒便是一頓皮鞭打得體無完膚卻又不許啼哭若還則一則聲又重新打起每日止給兩餐稀湯薄粥如做少了生活打罵自不消說連這稀湯薄粥也沒有得吃了身上的好衣服盡都剝去將丫頭們的舊衣舊裳換與穿著臘月天氣也只得三四層單衣背上披一件舊綿絮夜間止有一條藁薦一條破被單遮蓋寒冷難熬如蛆蟲般攪做一團苦楚不能盡述玉英姊妹捱忍不過幾遍要尋死路卻又指望還有個好日捨不得性命互相勸解真個求生不能求死不得看看過了殘歲又是新年玉英已是十二歲那年二月間正德爺晏駕嘉靖爺嗣統下速詔遍選嬪妃府司著令民間挨家呈報如有隱匿罪坐鄰里那焦氏的鄰家平昔曉得玉英才貌兼美將名具報本府一張上選的黃紙帖在門上那時焦氏就打帳了做皇親國戚的念頭掉過臉來將玉英百般奉承通身換了綾羅錦繡肥甘美味與他調養又將銀兩教焦榕到禮部使用那玉英雖經了許多磨折到底骨格猶存將息數日面容頓改又兼穿起華麗衣服便似畫中人物府司選到無數女子推他為第一備文齊送到禮部選擇禮部官見了玉英這個容儀已是萬分好了但只年紀幼小恐不諳侍御發回寧家那焦氏因用了許多銀子不能夠中選心下懊悔氣惱原翻過向日嘴臉好衣服也剝去了好飲食也沒得吃了打罵也更覺勤了常言說得好坐吃山空立吃地陷當初李雄家業原不甚大自從陣亡後焦氏單單算計這幾個小兒女那個思想去營運一窩子坐食能勾幾時況兼為封蔭選妃二事又用空了好些日漸日深看看弄得罄盡兩個丫頭也賣來完在肚裡那時沒處出豁只得將住房變賣誰知苗全這廝見家中敗落亞奴年紀正小襲職日子尚遠料想日前沒甚好處趁焦氏賣得房價夜間扌典入臥房偷了銀兩領著老婆逃往遠方受用去了到次早焦氏方纔覺得這股悶氣無處發泄又遷怒到玉英姊妹說道如何不醒睡卻被他偷了東西去又都奉承一頓皮鞭一面教焦榕告官緝捕過了兩月那裡有個蹤跡此時買主又來催促出房無可奈何與焦榕商議要把玉英出脫焦榕道玉英這個模樣兒慢慢的覓個好主顧怕道不是一大注銀子如今急切裡尋人能值得多少不若先把小的胡亂貨一個來使用焦氏依了焦榕便把桃英賣與一個豪富人家為婢姊妹分別之時你我不忍分捨好不慘傷焦氏賃了一處小房擇日遷居玉英想起祖父累世安居一旦棄諸他人不勝傷感走出堂前抬頭看見梁間燕子補綴舊壘旁邊又營一個新巢暗嘆道這燕兒是個禽鳥秋去春來倒還有歸巢之日我李玉英今日離了此地反沒個再來之期了撫景傷心託物喻意乃作別燕詩一首詩云新巢泥落舊巢欹塵半疏簾欲掩遲愁對呢喃終一別畫堂依舊主人非原來焦氏要依傍焦榕卻搬在他側邊小巷中相去只有半箭之遠間壁乃是貴家的花園那房屋止得兩間諸色不便要桶水兒直要到鄰家去汲那焦氏平昔受用慣的自去不成少不得通在玉英月英兩個身上姊妹此時也難顧羞恥只得出頭露面又過了幾時桃英的身價漸漸又將摸完一日傍晚焦氏引著亞奴在門首閑立見一個乞丐女兒止有十數歲在街上求討聲音叫得十分慘切有個鄰家老嫗對他說道這般時候那個肯捨不時回去罷那叫化女兒哭道奶奶你那裡曉得我的苦楚我家老的限定每日要討五十文錢若少了一文便打個臭死夜飯也不與我吃又要在明日補足如今還少六七文怎敢回去那老嫗聽說得苦惱就捨了兩文旁邊的人見老嫗捨了一時助興你一文我一文登時到有十數文那叫化女兒千恩萬謝轉身去了焦氏聽了這片言語那知反撥動了個貪念想道這個小化子一日倒討得許多錢我家月英那賤人面貌又不十分標致賣與人也值得有限何不教他也做這樁道路倒是個永遠利息正在沈吟恰好月英打水回來焦氏道小賤人你可見那叫街的丫頭麼他年紀比你還小每日倒趁五十文錢你可有處尋得三文五文哩月英道他是個乞丐千爺爺萬奶奶叫來的孩兒怎比得他焦氏喝道你比他有甚麼差自明日為始也要出去尋五十文一日若少一文便打下你下半截來玉英姊妹見說要他求乞驚得面面相覷滿眼垂淚一齊跪下說道母親我家世代為官多有人認得也要存個體面若教出去求乞豈不辱抹門風被人恥笑焦氏道見今飯也沒有得吃了還要甚麼體面怕甚麼恥笑月英又苦告道任憑母親打死了我決不去的焦氏怒道你這賤人恁般不聽教訓先打個樣兒與你嘗嘗即去尋了一塊木柴揪過來沒頭沒腦亂敲月英疼痛難忍只得叫道母親饒恕則個待我明日去便了焦氏放下月英向玉英道不教你去是我的好情了反來放屁阻撓拖翻在地也吃一頓木柴到次早即趕逐月英出門求乞月英無奈忍恥依隨自此日逐沿街抄化若足了這五十文還沒得開口些兒欠缺便打個半死光陰如箭不覺玉英年已一十六歲時值三月下旬焦榕五十壽誕焦氏引著亞奴同往祝壽月英自向街坊抄化去了止留玉英看家玉英讓焦氏去後掩上門兒走入裡邊手中拈著針指思想道爹爹當年生我姊妹猶如掌上之珠熱氣何曾輕呵一口誰道遇著這個繼母受萬般凌辱兄弟被他謀死妹子為奴為丐一個家業弄得瓦解冰消淪落到恁樣地位真個草菅不如尚不知去後還是怎地結果又想道在世料無好處不如早死為幸趁他今日不在家何不尋個自盡也省了些打罵之苦卻又想道我今年已十六歲了再忍耐幾時少不得嫁個丈夫或者有個出頭日子豈可枉送這條性命把那前後苦楚事想了又哭哭了又想直哭得個有氣無力沒情沒緒放下針指走至庭中望見間壁園內紅稀綠暗燕語鶯啼游絲斜裊榆莢亂墜看了這般景色觸目感懷遂吟送春詩一首詩云柴扉寂寞鎖殘春滿地榆錢不療貧雲鬢衣裳半泥土野花何事獨撩人玉英吟罷又想道自爹爹亡後終日被繼母磨難將那吟詠之情久已付之流水自移居時作了別燕詩倏忽又經年許時光迅速如此嗟嘆了一回又恐誤了女工急走入來趲趕見桌上有個帖兒便是焦榕請妹子吃壽酒的玉英在後邊栽下兩折尋出筆硯將兩首詩錄出細細展玩更嘆口氣道古來多少聰明女子或共姊妹賡酬或是夫妻唱和成千秋佳話偏我李玉英恁般命薄埋沒至此豈不可惜可悲又傷感多時愈覺無聊將那紙左折右折隨手摺成個方勝兒藏於枕邊卻忘收了筆硯忙忙的趕完針指天色傍晚剛是月英到家焦氏接腳也至見他淚痕未乾便道那個難為了你又在家做妖勢玉英不敢回答將做下女工與他點看月英也把錢交過收拾些粥湯吃了又做半夜生活方纔睡臥到了明日焦氏見桌上擺著筆硯檢起那帖兒後邊已去了幾折疑惑玉英寫他的不好處問道你昨日寫的是何事快把來我看玉英道偶然寫首詩兒沒甚別事焦氏嚷道可是寫情書約漢子壞我的帖兒玉英被這兩句話羞得徹耳根通紅焦氏見他臉漲紅了只道真有私情勾當逼他拿出這紙來又見折著方勝一發道是真了尋根棒子指著玉英道你這賤人恁般大膽我剛不在家便寫情書約漢子快些實說是那個有情幾時了玉英哭道那裡說起卻將無影醜事來骯髒可不屈殺了人焦氏怒道贓證現在還要口硬提起棒子沒頭沒腦亂打打得玉英無處躲閃掙脫了往門首便跑焦氏道想是要去叫漢子相幫打我麼隨後來趕不想絆上一交正磕在一塊磚上磕碎了頭腦鮮血滿面嚷道打得我好只教你不要慌月英上前扶起又要趕來到虧亞奴緊緊扯住道娘饒了姐姐罷那婆娘恐帶跌了兒子只得立住腳百般辱罵玉英閃在門旁啼哭那鄰家每日聽得焦氏凌虐這兩個女兒今日又聽得打得利害都在門首議論恰好焦榕撞來推門進去那婆娘一見焦榕便嚷道來得好玉英這賤人偷了漢子反把我打得如此模樣焦榕看見他滿面是血信以為實不問情由搶過焦氏手中棒子趕近前將玉英揪過來便打那鄰家抱不平齊走來說道一個十五六歲女子家纔打得一頓大棒不指望你來勸解反又去打他就是做母舅的也沒有打甥女之理焦榕自覺乏趣撇下棒子徑自去了那鄰家又說道也不見這等人家無一日不打罵這兩個女兒如今一發連母舅都來助興了看起來這兩個女子也難存活又一個道若死了我們就具個公呈不怕那姓焦的不償命焦氏一句句聽見鄰家發作只得住口喝月英推上大門自去揩抹血污依舊打發月英出去求乞玉英哭了一回忍著疼痛原入裡邊去做針指那焦氏恨聲不絕到了晚間吞聲飲泣想道人生百歲總是一死何苦受恁般恥辱打罵等至焦氏熟睡悄悄抽身起來扯下腳帶懸梁高掛也是命不該絕這到虧了晚母不去料理他身上不但衣衫襤褸只這腳帶不知纏過了幾個年頭布縷雖連沒有筋骨一用力就斷了剛剛上吊撲通的跌下地來驚覺月英身邊不見了阿姐情知必走這條死路叫聲不好了急跳起身救醒轉來兀自嗚嗚而哭那焦氏也不起身反罵道這賤人你把死來詐我麼且到明日與你理會至次早分付月英在家看守叫亞奴引著到焦榕家裡將昨日鄰家說話並夜來玉英上吊事說與又道倘然死了反來連累著你不如先送到官除了這個禍根罷焦榕道要擺佈他也不難那錦衣衛堂上昔年曾替他打乾與我極是相契你家又是衛籍竟送他到這個衙門誰個敢來放屁焦氏大喜便教焦榕央人寫下狀詞說玉英姦淫忤逆將那兩首詩做個執證一齊至錦衣衛衙門前焦榕與衙門中人都是廝熟的先央進去道知其意少頃陞堂准了焦氏狀詞差四個校尉前去拘拿玉英到來那問官聽了一面之詞不論曲直便動刑具玉英再三折辯那裡肯聽可憐受刑不過只得屈招擬成剮罪發下獄中兩個禁子扶出衙門正遇月英妹子原來月英見校尉拿去阿姐嚇得魂盡魄散急忙鎖上門兒隨後跟來打探望見禁子扶挾出來便鑽向前抱住放聲大哭旁邊轉過焦氏一把扯開道你這小賤人家裡也不顧了來此做甚月英見了焦氏猶如老鼠見貓膽喪心驚不敢不跟著他走到家又打勾半死恨道你下次若又私地去看了這賤人查訪著實好歹也送你到這所在去月英口裡雖答應終是同胞情分割捨不下過了兩三日多求乞得幾十文錢悄地踅到監門口來探望不提再說玉英下到獄中那禁子頭見他生得標致懷個不良之念假慈悲照顧他住在一個好房頭又將些飲食調養玉英認做好人感激不盡叮囑他有個妹子月英定然來看千萬放他進來相見一面那禁子緊緊記在心上至第四日午後月英到監門口道出姓名那禁子流水開門引見玉英兩下悲號自不必說漸至天晚只得分別自此月英不時進監看覷不在話下且說那禁子貪愛玉英容貌眠思夢想要去奸他一來耳目眾多無處下手二則恐玉英不從喊叫起來壞了好事捉空就走去說長問短把幾句風話撩撥玉英是聰明女子見話兒說得蹊蹺已明白是個不良之人留心提防便不十分招架一日正在檻上悶坐忽見那禁子輕手輕腳走來低聲啞氣笑嘻嘻的說道小娘子可曉得我一向照顧你的意思麼玉英知其來意即立起身道奴家不曉得是甚意思那禁子又笑道小娘子是個伶俐人難道不曉得便向前摟抱玉英著了急亂喊殺人那禁子見不是話頭急忙轉身口內說道你不從我麼今晚就與你個辣手玉英聽了這話捶胸跌腳的號哭驚得監中人俱來觀看玉英將那禁子調戲情由告訴眾人內中有幾個抱不平的叫過那禁子說道你強姦犯婦也有老大的罪名今後依舊照顧他萬事干休倘有些兒差錯我眾人連名出首但憑你去計較那禁子情虧理虛滿口應承陪告不是下次再不敢去惹他正是羊肉饅頭沒得吃空教惹得一身膻玉英在獄不覺又經兩月有餘已是六月初旬原來每歲夏間在朝廷例有寬恤之典差太監審錄各衙門未經發落之事凡事枉人冤許諸人陳奏比及六月初旬玉英聞得這個消息想一家骨肉俱被焦氏陷害此番若不伸冤再無昭雪之日矣遂草起辨冤奏章將閤家受冤始末細細詳述教月英賫奏其略雲臣聞先正有云五刑以不孝為先四德以無義為恥故竇氏投崖雲華墜井是皆畢命於綱常流芳於後世也臣父錦衣衛千戶李雄先娶臣母生臣姊妹三人及弟李承祖不幸喪母之日臣等俱在孩提父每見憐仍娶繼母焦氏撫養臣父於正德十四年七月十四日征陝西反賊陣亡天禍臣家流移日甚臣年十六未獲結縭姊妹伶仃孑無依荷標梅已過紅葉無憑嘗有送春詩一絕云云又有別燕詩一絕云云是皆有感而言情非得已奈母氏不察臣衷疑為外遇逼舅焦榕拿送錦衣衛誣臣姦淫不孝等情問官昧臣事理坐臣極刑臣女流難辨俯首聽從蓋不敢逆繼母之情以重不孝之罪也邇蒙聖恩熟審凡事枉人冤許諸人陳奏欽此欽遵故不得不生樂生之心以冀超脫臣父本武人頗知典籍臣雖妾婦幸領遺教臣繼母年二十有弟亞奴生方週歲母圖親兒蔭襲故當父方死之時計令臣弟李承祖十歲孩兒親往戰場尋父遺骨陷之死地以圖己私幸賴天佑父靈抱骨以歸前計不成仍將臣弟毒藥身死支解棄埋又將臣妹李桃英賣為人婢李月英屏去衣食沿街抄化今將臣誣陷前情臣設有不才四鄰何不糾舉又不曾經獲某人只憑數句之詩尋風捉影以陷臣罪臣之死固當矣十歲之弟有何罪乎數歲之妹有何辜乎臣母之過臣不敢言凱風有詩臣當自責臣死不足惜恐天下後世之為繼母者得以肆其奸妒而無忌也伏望陛下俯察臣心將臣所奏付諸有司先將臣速斬以快母氏之心次將臣詩委勘有無事情推詳臣母之心盡在不言之表則臣之生平獲雪而臣父之靈亦有感於地下穎這一篇章疏奏上天子重瞳親照憐其冤抑倒下聖旨著三法司嚴加鞫審三法司官不敢怠慢會同拘到一乾人犯連桃英也喚至當堂逐一細問焦氏焦榕初時抵賴動起刑法方纔吐露真情與玉英所奏無異勘得焦氏叛夫殺子逆理亂倫與無故殺子孫輕律不同宜加重刑以為繼母之戒焦榕通同謀命亦應抵償玉英月英亞奴發落寧家又令變賣焦榕家產贖回桃英覆本奏聞請旨天子怒其凶惡連亞奴俱敕即日處斬玉英又上疏懇言亞奴尚在襁褓無所知識且系李氏一線不絕之嗣乞賜矜宥天子准其所奏詔下刑部止將焦榕焦氏二人綁付法場即日雙雙受刑亞奴終身不許襲職別擇嫡枝次房承蔭以繼李雄之嗣玉英月英桃英俱擇士人配嫁至今列女傳中載有李玉英辨冤奏本又為贊雲李氏玉英父死家傾送春別燕母疑外情置之重獄險罹非刑陳情一疏冤滯始明後人又有詩嘆云昧心晚母曲如鉤只為親兒起毒謀假饒血化西江水難洗黃泉一段羞
