是自家故物愈加淒慘張孝基道你隨我來教你見一個人過遷正不知見那個只得又隨著而走卻從堂後轉向左邊過遷認得這徑道乃他家舊時往家廟去之路漸漸至近孝基指著堂中道有人在裡邊你進去認一認過遷急忙走去抬頭看見父親神影翻身拜倒在地哭道不肖子流落卑污玷辱家門生不能侍奉湯藥死不能送骨入土忤逆不道粉骨難贖以頭叩地血被於面正哭間只聽得背後有人哭來叫道哥哥你一去不回全不把爹爹為念過遷舉眼見是妹子一把扯住道妹子只道今生已無再見之期不料復得與你相會哥妹二人相持大哭昔年流落實堪傷今日相逢轉斷腸不是一番寒徹骨怎得梅花撲鼻香哥妹哭了一回過遷向張孝基拜謝道若非妹丈救我性命必作異鄉之鬼矣大恩大德將何補報張孝基扶起道自家骨肉何出此言但得老舅改過自新以慰岳丈在天之靈勝似報我也過遷泣謝道不肖謹守妹丈向日約束倘有不到處一依前番責罰張孝基笑道前者老舅不知詳細故用權宜之策今已明白豈有是理但須自戒可也當下張孝基喚眾家人來拜見已畢回至房中淑女整治酒餚款待過遷乃問你的大嫂嫁了何人淑女道哥哥你怎說這話卻不枉殺了人當日爹爹病重主張教嫂嫂轉嫁嫂嫂立志不從乃把前事細說一遍又道如今見守在家怎麼說他嫁人過遷見說妻子貞節又不覺淚下乃道我那裡曉得都是朱信之言張孝基道此乃一時哄你的話待過幾時同你去見令岳迎大嫂來家過遷道這個我也不想矣但要到爹爹墓上走遭張孝基道這事容易到次早備辦祭禮同到墓上過遷哭拜道不肖子違背爹爹罪該萬死今願改行自新以贖前非望乞陰靈洞鑒祝罷又哭張孝基勸住了回到家裡把解庫中銀錢點明付與過遷掌管那過遷雖管瞭解庫一照灌園時早起晏眠不辭辛苦出入銀兩公平謹慎往來的人無不歡喜將張孝基夫妻恭敬猶如父母倘有疑難之事便來請問終日住在店中毫無昔日之態此時親戚盡曉得他已回家俱來相探彼此只作個揖未敢深談過了兩三個月張孝基還恐他心活又令人來試他說小官人你平昔好頑沒銀時還各處抵借來用今見放著白晃晃許多東西到呆坐看守近日有個絕妙的人兒有十二分纔色藏在一個所在若有興同去吃杯茶何如過遷聽罷大喝道你這鳥人我只因當初被人引誘壞了弄得破家蕩產幾乎送了性命心下正恨著這班賊男女你卻又來哄我便要扯去見張孝基那人招稱不是方纔罷了孝基聞知如此不勝之喜時光迅速不覺又是半年張孝基把庫中賬目細細查算分毫不差乃對過遷說道不孝有三無後為大向日你初回時我便要上復令岳迎大嫂與老舅完聚恐他還疑你是個敗子未必肯許故此止了今你悔過之名人都曉得去迎大嫂料無推託如今可即同去過遷依允淑女取出一副新鮮衣服與他穿起同至方家方長者出來相見過遷拜倒在地道小婿不肖有負岳父賢妻今已改過前非欲迎令愛完聚方長者扶起道不消拜你之所行我盡已知道小女既歸於汝老夫自當送來張孝基道親翁還在何日送來方長者道就明日便了張孝基道親翁亦求一顧尚有話說方長者應允二人作別回到家裡張孝基遍請親戚鄰里於明日吃慶喜筵席到次日午前方氏已到過遷哥妹出去相迎相見之間悲喜交集方氏又請張孝基拜謝少頃諸親俱到相見已畢無不稱贊孝基夫婦玉成之德過遷改悔之善方氏志節之堅不一時酒筵完備張孝基安蓆定位敘齒而坐酒過數巡食供三套張孝基起身進去教人捧出一個箱兒放於卓上討個大杯滿斟熱酒親自遞與過遷道大舅滿飲此杯過遷見孝基所敬不敢推託雙手來接道過遷理合敬妹丈如何反勞尊賜張孝基道大舅就請乾了還有話說過遷一吸而盡孝基將鑰匙開了那只箱兒箱內取出十來本文簿遞與過遷道請收了這幾本賬目過遷接了問道妹丈這是什麼賬張孝基道你且收下待我細說乃對眾人道列位尊長在上小生有一言相稟眾人俱站立起身道不知足下有何見諭老漢們願聞清誨遂側耳拱聽張孝基疊出兩個指頭說將出來言無數句使聽者無不嘖嘖稱羡正是錢財如糞土仁義值千金曾記床頭語窮通不二心當下張孝基說道昔年岳父只因大舅蕩費家業故將財產傳與小生當時再三推辭岳父執意不從因見正在病中恐觸其怒反非愛敬之意故勉強承受此皆列位尊長所共見不必某再細言及岳父棄世之後差人四處尋訪大舅四五年間毫無蹤影天意陳留得遇當時本欲直陳交還原產仍恐其舊態猶存依然浪費豈不反負岳父這段恩德故將真情隱匿使之耕種繩以規矩勞其筋骨苦其心志兼以良言勸喻隱語諷刺冀其悔過自新幸喜彼亦自覺前非怨艾日深幡然遷改及令管庫處心公平臨事馴謹數月以來絲毫不苟某猶恐其心未堅幾遍教人試誘心如鐵石片語難投竟為志誠君子矣故特請列位尊長到此將昔日岳父所授財產並歷年收積米谷布帛銀錢分毫不敢妄用一一開載賬上今日交還老舅明早同令妹即搬歸寒舍矣又在篋中取出一紙文書也奉與過遷道這幅紙乃昔年岳父遺囑一發奉還適來這杯酒乃勸大舅自今以後兢兢業業克儉克勤以副岳父泉臺之望勿得意盈志滿又生別念戒之戒之眾人到此方知昔年張孝基苦辭不受乃是真情稱嘆不已過遷見說哭拜於地道不肖悖逆天道流落他鄉自分橫死街衢永無歸期此產豈為我有幸逢妹丈救回故里朝夕訓誨激勵成人全我父子完我夫婦延我宗祀正所謂生我者父母成我者妹丈此恩此德高天厚地殺身難報即使執鞭隨蹬亦為過分豈敢復有他望況不肖一生違逆父命罪惡深重無門可贖今此產乃先人主張授君如歸不肖卻不又逆父志益增我罪張孝基扶起道大舅差矣岳父一世辛苦實欲傳之子孫世守不意大舅飄零於外又無他子可承付之於我此乃萬不得已豈是他之本念今大舅已改前愆守成其業正是繼父之志岳父在天亦必徜徉長笑怎麼反增你罪過遷又將言語推辭兩下你讓我卻各不肯收受連眾人都沒主意方長者開言對張孝基道承姑丈高誼小婿義不容辭但全歸之其心何安依老夫愚見各受其半庶不過情眾人齊道長者之言甚是昔日老漢們亦有此議只因太公不允所以止了不想今日原從這著可見老成之見大略相同張孝基道親翁子承父業乃是正理有甚不安若各分其半即如不還一般了這怎使得方長者又道既不願分不若同居於此協力經營待後分之子孫何如張孝基道寒家自有敝廬薄產子孫豈可佔過氏之物眾人見執意不肯俱勸過遷受領過遷卻又不肯跑進裡邊見妹子正與方氏飲酒過遷上前哭訴其事教妹子勸張孝基受其半那知淑女說話與丈夫一般過遷夫婦跪拜哀求只是不允過遷推託不去再拜而受眾人齊贊道張君高義千古所無唐人羅隱先生有贊雲能生之不能富之能富之不能教之死而生之貧而富之小人而君子之嗚呼孝基真可為百世之師當日直飲至晚而散到次日張孝基叫渾家收拾回家過遷苦留道妹丈財產既已不受且同居於此相聚幾時何忍遽別張孝基道我家去此不遠朝暮便見與居此何異過遷料留不住乃道既如此容明日治一酌與妹丈為餞後日去何如孝基許之次日過遷大排筵席廣延男女親鄰並張太公夫婦張媽媽守家不至請張太公坐了首席其餘賓客依次而坐裡邊方氏姑嫂女親自不必說是日筵席水陸畢備極其豐富眾客盡歡而別客去後張孝基對過遷道大舅岳父存日從不曾如此之費下次只宜儉省不可以此為則過遷唯唯次日孝基夫婦止收拾妝奩中之物其餘一毫不動領著兩個兒子作辭起身過遷方氏同婢僕直送至張家置酒款待而回自此之後過遷操守愈勵遂為鄉閭善士只因勤苦太過漸漸習成父親慳吝樣子後亦生下一子名師儉因懲自己昔年之失嚴加教誨此是後話不提且說裡中父老敬張孝基之義將其事申聞郡縣郡縣上之於朝其時正是曹丕篡漢欲收人望遂下書徵聘孝基惡魏乃僭竊之朝恥食其祿以親老為辭不肯就闢後父母百年後哀毀骨立喪葬合禮其名愈著州郡俱舉孝廉凡五詔俱以疾辭有人問其緣故孝基笑而不答隱於田裡躬耕樂道教育二子長子名繼次子名紹皆仁孝有學行裡中咸願與之婚孝基擇有世德者配之孝基年五十外忽夢上帝膺召夫婦遂雙雙得疾二子日夜侍奉湯藥衣不解帶過遷聞知率其子過師儉同來亦如二子一般侍奉孝基謝而止之過遷道感君之德恨不能身代今聊效區區何足為謝過了數日夫婦同逝臨終之時異香滿室鄰里俱聞空中車馬音樂之聲從東而去二子哀慟自不必說那過遷哭絕復甦至於嘔血喪葬之費俱過遷為之置辦二子泣辭再三過遷不允一月後有親友從洛中回來至張家吊奠述雲某日於嵩山遊玩忽見旌幢騶御滿野某等避在林中觀看見車上坐著一人絳袍玉帶威儀如王者兩邊錦衣花帽侍衛多人仔細一認乃是令先君某等驚喜出林趨揖令先君下車相慰某等問道公何時就徵遂為此顯官令先君答云某非陽官乃陰職也上帝以某還財之事命主此山煩傳示吾子不必過哀言訖倏然不見方知令先君已為神矣二子聞言不勝哀感那時傳遍鄉里無不嘆異相率為善名其裡為義感鄉晉武帝時州郡舉二子孝廉俱為顯官過遷年至八旬外而終兩家子孫繁盛世為姻戚雲還財陰德澤流長千古名傳義感鄉多少競財疏骨肉應知無面向嵩山
