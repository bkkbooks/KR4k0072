body:
  text: 第十七卷張孝基陳留認舅士子攻書農種田工商勤苦掙家園世人切莫閑遊蕩遊蕩從來誤少年嘗聞得老郎們傳說當初有個貴人官拜尚書家財萬貫生得有五個兒子只教長子讀書以下四子農工商賈各執一藝那四子心下不悅卻不知甚麼緣故央人問老尚書四位公子何故都不教他習儒況且農工商賈勞苦營生非上人之所為府上富貴安享有餘何故捨逸就勞棄甘即苦只恐四位公子不能習慣老尚書呵呵大笑疊著兩指說出一篇長話來道是世人盡道讀書好只恐讀書讀不了讀書個個望公卿幾人能向金階跑郎不郎時秀不秀長衣一領遮前後畏寒畏暑畏風波養成嬌怯難生受算來事事不如人氣硬心高妄自尊稼穡不知貪逸樂那知逸樂會亡身農工商賈雖然賤各務營生不辭倦從來勞苦皆習成習成勞苦筋力健春風得力總繁華不論桃花與菜花自古成人不自在若貪安享豈成家老夫富貴雖然愛戲場紗帽輪流戴子孫失勢被人欺不如及早均平派一脈書香付長房諸兒恰好四民良暖衣飽食非容易常把勤勞答上蒼老尚書這篇話至今流傳人間人多服其高論為何的多有富貴子弟擔了個讀書的虛名不去務本營生戴頂角巾穿領長衣自以為上等之人習成一身輕薄稼穡艱難全然不知到知識漸開戀酒迷花無所不至甚者破家蕩產有上稍時沒下稍所以古人云五穀不熟不如荑稗貪卻賒錢失卻見在這叫做受用須從勤苦得淫奢必定禍災生說這漢末時許昌有一巨富之家其人姓過名善真是個田連阡陌牛馬成群莊房屋舍幾十餘處童僕廝養不計其數他雖然是個富翁一生省儉做家從沒有穿一件新鮮衣服吃一味可口東西也不曉得花朝月夕同個朋友到勝景處遊玩一番也不曾四時八節備個筵席會一會親族請一請鄉黨終日縮在家中皺著兩個眉頭吃這碗枯茶淡飯一把匙鑰緊緊掛在身邊絲毫東西都要親手出放房中卓上更無別物單單一個算盤幾本賬簿身子恰像生鐵鑄就熟銅打成長生不死一般日夜思算得一望十得十望百堆積上去分文不捨得妄費正是世無百歲人枉作千年調那過善年紀五十餘外閤家稱做太公媽媽已故止有兒女二人兒子過遷已聘下方長者之女為媳女兒淑女尚未議姻過善見兒子人材出眾性質聰明立心要他讀書卻又慳吝不肯延師在家送到一個親戚人家附學誰知過老本是個看財童子兒子卻是個敗家五道平昔有幾件毛病見了書本就如冤家遇著婦人便是性命喜的是吃酒愛的是賭錢蹴踘打彈賣弄風流放鷂擎鷹爭誇豪俠耍拳走馬骨頭輕使棒輪槍心竅癢自古道物以類聚過遷性喜遊蕩就有一班浮浪子弟引誘打合這時還懼怕父親早上去了至晚而歸過善一心單在錢財上做工夫的人每日見兒子早出晚入只道是在學裡那個去查考況且過遷把錢買囑了送飯的小廝日逐照舊送飯到半路上作成他飽啖歸來瞞得鐵桶相似過善何繇得知過遷在先生面前只說家中有事不得工夫過幾日間或去點個卯兒又時常將些小東西孝順那先生一來見他不像個讀書之人二來見他老官兒也不像認真要兒讀書三來又貪著些小利總然有些知覺也裝聾作啞只當不知不去拘管他所以過遷得恣意無藉家中毫不知覺常言說得好若要不知除非莫為不想方長者曉得了差人上覆過善過善不信想道若在外恁般遊蕩也得好些銀子使費他卻從何而來況且小廝日日送飯到學並不說起不在那有這事又想道方親家是個真誠之人必是有因方纔來說不可不信便喚送飯的小廝來問道小官人日日不在學裡你把飯都與那個吃了這小廝是個教熟猢猻便道呀小官人無一日不在學裡那個卻掉這樣大謊過善只道小廝家是實話更不再問到晚間過遷回來這小廝先把信兒透與知道到了房中過善問道你如何不在學裡讀書每日在外遊蕩過遷道這是那個說快叫來打他幾個耳聒子戒他下次不許說謊我那一日不在學裡造這話來謗我過善一來是愛子二來料他沒銀使費況說話與小廝一般遂信以為實然更不提起正是因無背後眼只當耳邊風過了幾日方長者又教人來說太公如何不拘管小官人到學裡讀書仍舊縱容在外狂放過善道不信有這等事即教人在學裡去問看他今日可在家人到學看時果然不見個影兒問那先生時答道他說家中有事好幾日不到學了家人急忙歸家回復了過善過善大怒道這畜生原來恁地即將送飯小廝拷打起來這小廝吃打不過說道小官人每日不知在何處頑耍果然不到學中再三教我瞞著太公過善聽說氣得手足俱戰恨不得此時那不肖子就立在眼前一棒敲死方泄其忿卻得淑女在傍解勸捱到晚間過遷回家老兒滿肚子氣已自平下了一半纔罵得一句畜生你在外胡為瞞得我好淑女就接口道哥哥你這幾日在那裡頑耍氣壞了爹爹還不跪著告罪過遷真個就跪下去扯個謊道孩兒一向在學攻書這三兩日因同學朋友家中賽神做會邀孩兒去看誠恐爹爹瞋責分咐小廝莫說望爹爹恕孩兒則個淑女道爹爹息怒哥哥從今讀書便了過善被他一片謊言瞞過又信以為實當下罵了一場關他在家中看書不放出門隔了兩日有人把幾百畝田賣與過善議定價錢做下文書到後房一隻箱內去取銀子開箱看時吃了一驚那箱內約有二千餘金已去其大半原來過遷曉得有銀在內私下配個匙鑰夜間俟父親妹子睡著便起來悄悄扌典開偷去花費陸續取溜了他也不知用過多少當下過善叫屈連天淑女聽得急忙來問見說沒了銀子便道這也奇怪在此間的東西如何失了爹莫不記錯了沒有這許多過善道不錯不錯原來這畜生偷我的銀子在外花費即忙尋了一條棒子喚過遷到來此時銀子為重把憐愛之情擱過一邊不由分說扯過來一頓棍棒只打得滿地亂滾淑女負命解勸將過善拉過一邊扯住了棒兒過善喝道畜生你怎樣偷的在那處花費實說出來還有個商量若一句支吾定然活活打死過遷打急了只得一一直說連那匙鑰在衤昆帶上解將下來氣得過善雙腳亂跳道留你這畜生總是不肖之子被人恥笑不如早死到得乾淨又要來打那時闔家男女都來下跪討饒過善討條鏈子鎖在一間空房裡去連這田也不買了氣倒在一個壁角邊坐地這老兒雖是一時氣不過把兒子痛打一頓卻又十分肉疼想道看他這模樣兒也不像落莫的誰道到是個敗子怎地使他迴心轉意便好心下躊躇無計可施淑女勸道爹爹事已至此氣亦無益只因哥哥年紀幼小被人誘引以致如此今後但在家中讀書不要放他出門遠著這班人他的念頭自然息了眾家人也勸道太公關鎖小官人也不是長法如今年已長大何不與他完了姻事有娘子絆住身子料必不想到外邊游蕩豈不兩全其美過善見說深以為然兩三日後放其鎖禁又將好言教誨過遷受了這場打罵勉強住在家中不敢出門半月之後過善擇了吉日叫媒人往方家去說要娶媳婦過門方長者也是大富之家妝奩久已完備一諾無辭到了吉期迎娶來家那過善素性儉樸諸事減省草草而已且說過遷初婚時見渾家面貌美麗妝奩富盛真個日日住在家中橫豎成雙全不想到外邊遊蕩過善見兒子如此甚是歡喜過了幾時方氏歸寧回去過遷在家無聊三不知閃出去尋著舊日這班子弟到各處頑耍只是手中沒有錢鈔使費不能恣意想起渾家箱籠中必然有物將出舊日手段逐一扌典開搜尋去撒漫使得手滑了連衣飾都把來弄得罄盡不一日渾家歸來見箱籠俱空叫苦不迭盤問過遷時只推不知夫妻反目起來過善聞知氣得手足麻冷喚出兒子來一把頭髮揪翻亂踢亂打這番連淑女也勸解不住了過善喝道只道你這畜生改悔前非尚有成人之日不想原復如是我還有甚指望不如速死留我老性命再活幾日見旁邊有個棒槌便搶在手劈頭就打嚇得淑兒魂不附體雙手扳住臂膊哭道爹爹別件打猶可這東西斷然使不得的方氏見勢頭利害心中懼怕說道公公請息怒媳婦沒不多幾件東西不為大事過善方纔放手淑女勸父親到房中坐下告道爹爹只有一子怎生如此毒打萬一失手打敗後來倚靠何人過善道這畜生到底不成人的了還指望倚靠著他打死了也省得被人談恥淑女道自古道敗子回頭便作家哥哥方纔少年那見得一世如此不爭今日一時之怒一下打死後來思想悔之何及過善被女兒苦勸一番怒氣少息欲要訪問同遊這班人告官懲治又怕反用銀子只得忍耐自此之後過遷日日躲在房裡不敢出門連父親面也不敢見常言道偷食貓兒性不改他在外邊放蕩慣了看著家中猶如牢獄一般那裡坐立得住過了月餘瞞著父親悄悄卻又出去渾家再三苦諫全不作準欲要向過善說知又見打得利害不敢開口只得到與他隱瞞過遷此時身邊並無財物寡闖了幾日甚覺沒趣料道家中決然無處出豁私下將田產央人四處抵借銀子日夜在花街柳巷酒館賭坊迷戀不想回家方氏察聽得實恐怕在外學出些不好事來只得告知過善過善大驚道我只道這畜生還躲在房裡元來又出去了埋怨方氏道娘子這畜生初出去時何不就說直至今日方言方氏道因見公公打得利害故不敢說過善道這樣不肖子打死罷了要他何用當下便差人四下尋覓淑兒姑嫂二人反替他擔著愁擔子將棍棒之類預先都藏過了早有人報知過遷過遷量得此番歸家必然鎖禁不能出來索性莫歸罷遂請著妓者藏在閑漢人家取樂覺道有人曉得即又換場一連在外四五個月這些家人們雖然知得些風聲那個敢與小主人做冤家只推沒處尋覓過善愈加氣惱寫一紙忤逆狀子告在縣裡卻得閑漢們替過遷衙門上下使費也不上緊拿人常言道水平不流人平不言這班閑漢替過遷衙門打點使錢亦是有所利而為之若是得利均分到也和其光而同其塵了因有手遲腳慢的眼看別人賺錢心中不忿卻去過老面前搬嘴說令郎與某人某人往來怎樣嫖賭將田產與某處抵銀多少算來共借有三千銀子把那老兒嚇得面如土色想道畜生恁般大膽如此花費能消幾時再過一二年連我身子也是別人的了問道如今這畜生在那裡其人道見在東門外三里橋北堍下老王三家他前門是不開的進了小巷中間有個小小竹園便是他後門內有茅亭三間此乃令郎安頓之所過善得了下落喚了五六個家人跟隨一徑出東門到三里橋分付眾人在橋下伺候莫要驚走了那畜生待我喚你們時便一齊上前也是這日合當有事過遷恰好和一個朋友說話不覺送出園門作別過了方欲轉身忽聽得背後吆喝一聲畜生那裡走過遷回頭一看原來是父親嚇得雙腳俱軟寸步也移不動說時遲那時快過善趕上一步不由分說在地下拾起一塊大石塊口裡恨著一聲照過遷頂門擘將去口舌喇一聲響只道這畜生今番性命休矣正是地府忽增不肖鬼人間已少敗家精這一響只道打碎天靈蓋了不想過遷後生眼快見父親來得凶惡剛打下時就傍邊一閃那石塊恰恰中在側邊一堆亂磚上打得磚頭亂滾下來過遷望著巷口便跑不想去得力猛反把過善沖倒過善爬起身來一頭趕一頭喊道殺爹的逆賊走了快些拿住眾家人聽得家長聲喚都走攏來看時過遷已自去得好遠過善氣得一句話也說不出只叫快趕趕著的有賞眾人領命分頭追趕小官人過善獨自個氣忿忿地坐在橋上約有兩個時辰不見回報天色將晚只得忍著氣一步步捱到家裡淑女見父親餘怒未息已猜著八九上前問其緣故過善細細告說如此如此淑女含淚勸道爹爹年過五旬又無七男八女只有這點骨血總雖不肖但可教誨何忍下此毒手適來幸喜他躲閃得快不致傷身倘有失錯豈不覆宗絕祀爹爹今後斷不可如此過善咬牙切齒恨道我便為無祀之鬼也罷這畜生定然饒他不得不提淑女苦勸父親且說過遷得了性命不論高低只望小路亂跑正行間背後二人飛也似趕來一把扯住定要小官人同回你道這二人是誰乃過善家裡義孫小三小四兄弟兩個領著老主之命做一路兒追趕小官人恰好在此遇見過遷扌卒脫不開心中忿怒提起拳頭照著小四心窩裡便打小四著了拳只叫得一聲阿呀仰後便倒更不做聲小三見兄弟跌悶在地只道死了高聲叫起屈來扭住小官人死也不放事到其間過遷也沒有主意左右是個左右不是他便是我一發並了命罷捏起兩個拳頭沒頭沒腦亂打將來他曾學個拳法頗有些手腳小三如何招架得住只得放他走了回身看小四時已自甦醒小三扶他起來就近處討些湯水與他吃了兩個一同回家報與家主別個家人趕不著的也都回了過善只是嘆氣不在話下且說過遷一頭走一頭想父親不懷好意了見今縣裡告下忤逆如今又打死小四罪上加罪這條性命休矣稱身邊還存得三四兩銀子可做盤纏且往遠處逃命再作區處算計已定連夜奔走正是忙忙如喪家之狗急急如漏網之魚過遷去有半年杳無音信裡中傳為已死這些幫閑的要自脫干係攛掇債主教人來過家取討銀子若不還銀要收田產那債主都是有勢有力之家過善不敢衝撞只得緩詞謝之回得一家去時接腳又是一家來說門上絡繹不絕都是討債之人過善索性不出來相見各家見不應承齊告在縣裡差人拘來審問縣令看了文契對過善道這都是你兒子借的須賴不得過善道逆子不遵教誨被這班小人引誘為非將家業蕩費殆盡向告在臺逃遁於外未蒙審結所存些少止勾小人送終之用豈可復與逆子還債況子債亦無父還之理縣令笑道汝尚不肯與子還債外人怎肯把銀與汝子白用且引誘汝子者決非放債之人如何賴得總之汝子不肖莫怪別人但父在子不得自專各家貪圖重利與敗子私自立券其心亦是不良今照契償還本銀利錢勿論銀完之日原契當堂銷毀居中人重責問罪過善被官府斷了怎敢不依只得逐一清楚心中愈加痛恨到以兒子死在他鄉為樂全無思念之意正是種田不熟不如荒養兒不肖不如無話休煩絮且說過善女兒淑女天性孝友相貌端莊長成一十八歲尚未許人你道恁樣大富人家為甚如此年紀猶未議婚過善只因是個愛女要覓個口奢口庶女婿為配所以高不成低不就揀擇了多少子弟沒個中意的蹉跎至今又因兒子不肖越把女兒值錢要擇個出人頭地的贅入家來付託家事故此愈難其配話分兩頭卻說過善鄰近有一人姓張名仁世代耕讀家頗富饒夫妻兩口單生一子取名孝基生得相貌魁梧人物濟楚深通今古廣讀詩書年方二十未曾婚配張仁正央媒人尋親恰好說至過家過善已曾看見孝基這個丰儀卻又門當戶對心中大喜道得此子為婚我女終身有托矣張仁是個獨子本不捨得贅出因過善央媒再三來說又聞其女甚賢故此允了少不得問名納彩奠雁傳書贅入過家孝基雖然贅在過家每日早晚省視父母並無少怠夫妻相待猶如賓客敬重過善同於父母又且為人謙厚待人接物一團和氣上下之人無不悅服過善愛之如子凡有疑難事體托他支理看其材乾孝基條分理析井井有方過善因此愈加歡喜只有方氏在房思想丈夫不知在於何處並無消耗未知死活存亡日夜悲傷不已光陰如箭張孝基在過家不覺又是二年有餘過善忽然染病求神罔效用藥無功方氏姑嫂二人晝夜侍奉湯藥孝基居在外廂綜理諸事那老兒漸漸危篤自料不起分付女兒治酒遍請鄰里親戚到家囑付道列位高宗在上老漢托賴天地祖宗掙得這些薄產指望傳諸子孫世守其業不幸命薄生此不肖逆賊破費許多向已潛遁在外未知死生幸爾尚有一女婚配得人聊慰老景不想今得重疾不久謝世故特請列位到來做個證明將所有財產盡傳付女夫接續我家宗祀久已寫下遺囑煩列位各署個花押倘或逆子猶在探我亡後回家爭執竟將此告送官司官府自然明白遂於枕邊摸出遺囑教家人遞與眾人觀看此時眾人疑是張孝基見識尚未開言只見張孝基說道多蒙岳父大恩但岳父現有子在萬無財產反歸外姓之理以小婿愚見當差人四面訪覓大舅回來將家業付之以全父子之情小婿夫妻自當歸宗設或大舅身已不幸尚有舅嫂守節當交與掌管然後訪族中之子立為後嗣此乃正理若是小婿承受外人必有逐子愛婿之謗鳩僭鵲巢小婿亦被人談論這決不敢奉命淑女也道哥哥只因懼怕爹爹責罰故躲避在外料必無恙丈夫乃外姓之人豈敢承受眾人見他夫妻說話出於至誠遂齊聲說道令婿令愛之言亦似有理且待尋訪小官人一年半載待有的信再作區處過善道小婿之言不是愛我乃是害我眾人道如何是害太公過善道老漢一生辛苦掙得這些家事逆子視之猶如糞土不上半年破散四千餘金如此揮霍便銅斗家計指日可盡財產既盡必至變賣塋墓那時不惟老漢不能入土恐祖宗在土之骨反暴棄荒野矣孝基又道大舅昔因年幼為匪人誘惑所致今已年長又有某輩好言勸喻料必改過自新決不至此過善道未必未必有我在日嚴加責罰尚不改悛我死之後又何人得而禁之眾人都道依著我們愚見不若均分了兩全其美令郎回時也沒得話說過善只是不許孝基夫婦再三苦辭過善大怒道汝亦效逆子要毆死我麼眾人見他發惡乃對孝基道令岳執意如此不必辭了遂將遺囑各寫了花押遞與過老