body:
  text: 第二十五卷獨孤生歸途鬧夢東園蝴蝶正飛忙又見羅浮花正香夢短夢長緣底事莫貪磁枕誤黃梁昔有夫妻二人各在芳年新婚燕爾如膠似漆如魚似水剛剛三日其夫被官府喚去原來為急解軍糧事文書上了僉了他名姓要他赴軍前交納如違限時刻軍法從事立刻起行身也不容他轉頭也不容他回只捎得個口信到家正是上命所差蓋不繇己一路趲行心心念念想著渾家綢又不好向人告訴只落得自己淒惶行了一日想到有萬遍是夜宿於旅店夢見與渾家相聚如常行其夫妻之事自此無夜不夢到一月之後夢見渾家懷孕在身醒來付之一笑且喜如期交納錢糧太平無事星夜趕回家鄉繳了批回入門見了渾家歡喜無限那一往一來約有三月之遙嘗言道新娶不如遠歸夜間與渾家繆恩愛自不必說其妻敘及別後相思因說每夜夢中如此如此所言光景與丈夫一般無二果然有了三個月身孕若是其夫先說的內中還有可疑卻是渾家先敘起的可見夢魂相遇又能交感成胎只是彼此精誠所致如今說個鬧夢故事亦繇夫婦積思而然正是夢中識想非全假白日奔馳莫認真話說大唐德宗皇帝貞元年間有個進士覆姓獨孤雙名遐叔家住洛陽城東崇賢裡中自幼穎異十歲便能作文到十五歲上經史精通下筆數千言不待思索父親獨孤及官為司封之職昔年存日曾與遐叔聘下同年司農白行簡女兒娟娟小姐為妻那娟娟小姐花容月貌自不必說刺繡描花也是等閑之事單喜他深通文墨善賦能詩若教去應文科穩穩裡是個狀元與遐叔正是一雙兩好彼此你知我見所以成了這頭親事不意遐叔父母連喪丈人丈母亦相繼棄世功名未遂家事日漸零落童僕也無半個留存剛剛剩得幾間房屋那白行簡的兒子叫做白長吉是個凶惡勢利之徒見遐叔家道窮了就要賴他的婚姻將妹子另配安陵富家幸得娟娟小姐是個貞烈之女截發自誓不肯改節白長吉強他不過只得原嫁與遐叔卻是隨身衣飾並無一毫妝奩止有從幼伏侍一個丫鬟翠翹從嫁白氏過門之後甘守貧寒全無半點怨恨只是晨炊夜績以佐遐叔讀書那遐叔一者敬他截發的志節二者重他秀麗的詞華三者又愛他嬌艷的顏色真個夫妻相得似水如魚白氏親族中到也憐遐叔是個未發達的才子十分尊敬止有白長吉一味趨炎附熱說妹子是窮骨頭要跟恁樣餓莩壞他體面見了遐叔就如眼中之刺肉內之釘遐叔雖然貧窮卻又是不肯俯仰人的因此兩下遂絕不相往時值貞元十五年朝廷開科取士傳下黃榜期於三月間諸進士都赴京師殿試遐叔別了白氏前往長安自謂文才必魁春榜那知貢舉的官是禮部侍郎同平章事鄭餘慶本取遐叔卷子第一豈知策上說著奉天之難皆因奸臣盧杞竊弄朝權致使涇原節度使姚令言與太尉朱氵此得以激變軍心劫奪府庫可見眾君子共佐太平而不足一小人攪亂天下而有餘故人君用捨不可不慎原來德宗皇帝心性最是猜忌說他指斥朝廷譏訕時政遂將頭卷廢棄不錄那白氏兩個族叔一個叫做白居易一個叫做白敏中文才本在遐叔之下卻皆登了高科單單隻有遐叔一人落第好生沒趣連夜收拾行李東歸白居易白敏中知得齊來餞行直送到十里長亭而別遐叔途中愁悶賦詩一首詩云童年挾策赴西秦弱冠無成逐路人時命不將明主合布衣空惹上京塵在路非止一日回到東都見了妻子好生慚赧終日只在書房裡發憤攻書每想起落第的光景便淒然淚下那白氏時時勸解道大丈夫功名終有際會何苦頹折如此遐叔謝道多感娘子厚意屢相寬慰只是家貧如洗衣食無聊縱然巴得日後亨通難救目前愁困如之奈何白氏道俗諺有云十訪九空也好省窮我想公公三十年宦游豈無幾個門生故舊在要路的你何不趁此閑時一去訪求倘或得他資助則三年誦讀之費有所賴矣只這句話頭提醒了遐叔答道娘子之言雖然有理但我自幼攻書未嘗交接人事先父的門生故舊皆不與知止認得個韋皋是京兆人表字仲翔當初被丈人張延賞逐出來投先父舉薦他為官甚是有恩如今他現做西川節度使我若去訪他必有所助只是東都到西川相隔萬里程途往返便要經年我去之後你在家中用度從何處置以此拋撇不下白氏道既有這個相識便當整備行李送你西去家中事體我自支持總有缺乏姑姊妹家猶可假貸不必懮慮遐叔歡喜道若得如此我便放心前去白氏道但是路途跋涉無人跟隨卻怎的好遐叔道總然有人也沒許多盤費只索罷了遂即揀了個吉日白氏與遐叔收拾了寒暑衣裝帶著丫鬟翠翹親至開陽門外一杯餞送夫妻正在不捨之際驟然下起一陣大雨急奔入路傍一個廢寺中去躲避這寺叫做龍華寺乃北魏時廣陵王所建殿宇十分雄壯階下栽種名花異果又有一座鐘樓樓上銅鐘響聞五十里外後被胡太后移入宮中去了到唐太宗時有胡僧另鑄一鍾在上卻也響得二十餘裡到玄宗時還有五百僧眾香火不絕後遭安祿山賊黨史思明攻陷東都殺戮僧眾將鍾磬毀為兵器花果伐為樵蘇以此寺遂頹敗遐叔與白氏看了嘆道這等一個道場難道沒有發心的重加修造因向佛前祈禱陰空保佑若得成名時節誓當捐俸再整山門雨霽之後登途分別正是蠅頭微利驅人去虎口危途訪客來不提白氏歸家且說遐叔在路曉行夜宿整整的一個月來到荊州地面下了川船從此一路都是上水除非大順風方使得布帆風略小些便要扯著百丈你道怎麼叫做百丈原來就是纖子只那川船上的有些不同用著一寸多寬的毛竹片子將生漆絞著麻絲接成的約有一百多丈為此川中人叫做百丈在船頭立個轆轤將百丈盤於其上岸上扯的人只聽船中打鼓為號遐叔看了方纔記得杜子美有詩道百丈內江船又道打鼓發船何處郎卻就是這件東西又走了十餘日纔是黃牛峽那山形生成似頭黃牛一般三四十裡外便遠遠望見這峽中的水更溜急切不能勾到因此上有個俗諺雲朝見黃牛暮見黃牛朝朝暮暮黃牛如故又走了十餘日纔是瞿塘峽這水一發急緊峽中有座石山叫做灩堆四五月間水漲這堆止留一些些在水面上下水的船一時不及回避觸著這堆船便粉碎尤為利害遐叔見了這般險路嘆道萬里投人尚未知失得如何卻先受許多驚恐我娘子怎生知道原來巴東峽江一連三個第一是瞿塘峽第二是廣陽峽第三是巫峽三峽之中唯巫峽最長兩岸都是高山峻嶺古木陰森映蔽江面止露得中間一線的青天除非日月正中時分方有光明透下數百里內岸上絕無人煙惟聞猿聲晝夜不斷因此有個俗諺雲巴東三峽巫峽長猿鳴三聲斷客腸這巫峽上就是巫山有十二個山峰山上有一座高唐觀相傳楚襄王曾在觀中夜寢夢見一個美人願薦枕蓆臨別之時自稱是伏羲皇帝的愛女小字瑤姬未行而死今為巫山之神朝為行雲暮為行雨朝朝暮暮陽臺之下那襄王醒後還想著神女教大夫宋玉做高唐賦一篇單形容神女十分的艷色因此後人立廟山上叫做巫山神女廟遐叔在江中遙望廟宇掬水為漿暗暗的禱告道神女既有精靈能通夢寐乞為我特托一夢與家中白氏妻子說我客途無恙免其愁念當賦一言相謝決不敢學宋大夫作此淫褻之語有污神女香名乞賜仙鑒自古道的好有其人則有其神既是禱告的許了做詩做賦也發下這點虔誠難道託夢的只會行雲行雨再沒有別些靈感少不得後來有個應驗正是禱祈仙夢通閨閣寄報平安信一緘出了巫峽再經由巴中巴西地面都是大江不覺又行一個多月方到成都城外臨著大江卻是濯錦江你道怎麼叫做濯錦江只因成都造得好錦朝廷稱為蜀錦造錦既成須要取這江水再加洗濯能使顏色倍加鮮明故此叫做濯錦江唐明皇為避安祿山之亂曾駐蹕於此改成都為南京這便是西川節度使開府之處真個沃野千里人煙湊集是一花錦世界遐叔無心觀玩一徑入城奔到帥府門首訪問韋皋消息豈知數月前因為雲南蠻夷反叛統領兵馬征剿去了須待平定之後方得回府你想那征戰之事可是期得日子定的麼遐叔得了這個消息驚得進退無措嘆口氣道常言鳥來投林人來投主偏是我遐叔恁般命薄萬里而來卻又投人不著況一路盤纏已盡這裡又無親識只有來的路沒有去的路天那兀的不是活活坑殺我也自古道吉人自有天相遐叔正在帥府門首嘆氣傍邊忽轉過一個道士問道君子何嘆遐叔答道我本東都人氏覆姓獨孤雙名遐叔只因下第家貧遠來投謁故人韋仲翔希他資助豈知時命不濟早已出征去了欲待候他只恐奏捷無期又難坐守欲待回去爭奈盤纏已盡無可圖歸使我進退兩難是以長嘆那道士說我本道家專以濟人為事敝觀去此不遠君子既在窮途若不嫌粗茶淡飯只在我觀中權過幾時等待節使回府也不負遠來這次遐叔再三謝道若得如此深感深感只是不好打攪便隨著道士徑投觀中而去我想那道士與遐叔素無半面知道他是甚底樣人便肯收留在觀中去住假饒這日無人搭救卻不窮途流落幾時歸去豈非是遐叔不遇中之遇當下遐叔與道士離了節度府前行不上一二里許只見蒼松翠柏交植左右中間龜背大路顯出一座山門題著碧落觀三個簸箕大的金字這觀乃漢時劉先主為道士李寂蓋造的到唐明皇時有個得道的叫做徐佐卿重加修建果然是一塵不到神仙境界遐叔進入觀中瞻禮法像了道士留入房內重新敘禮分賓主而坐遐叔舉目觀看這房收拾得十分清雅只見壁上掛著一幅詩軸你道這詩軸是那個名人的古跡卻就是遐叔的父親司封獨孤及送徐佐卿還蜀之作詩云羽客笙歌去路催故人爭勸別離杯蒼龍闕下長相憶白鶴山頭更不回原來昔日唐明皇聞得徐佐卿是個有道之士用安車蒲輪徵聘入朝佐卿不願為官欽賜馳驛還山滿朝公卿大夫賦詩相贈皆不如獨孤及這首以此觀中相傳珍重不啻拱璧遐叔看了父親遺跡不覺潸然淚下道士道君子見了這詩為何掉淚遐叔道實不相瞞因見了先人之筆故此傷感道士聞知遐叔即是獨孤及之子朝夕供待分外加敬光陰迅速不覺過了半年那時韋皋降服雲南諸蠻重回帥府遐叔連忙備禮求見一者稱賀他得勝而回二者訴說自己窮愁遠來干謁的意思正是故人長望貴人厚幾個貴人憐故人那韋皋一見遐叔盛相款宴正要多留幾日少盡闊懷豈知吐蕃贊普時常侵蜀專恃雲南諸蠻為之嚮導近聞得韋皋收服雲南失其羽翼遂起雄兵三十餘萬殺過界來要與韋皋親決勝負這是烽火緊切的事一面寫表申奏朝廷一面興師點將前去抵敵遐叔嘆道我在此守了半年纔得相見忽又有此邊報豈不是命便向節度府中告辭韋皋道吐蕃入寇滿地干戈豈還有路歸得我已分付道士好生管待且等殺退番兵道途寧靜然後慢慢的與仁兄餞行便了遐叔無奈只得依允照舊住在碧落觀中不在話下且說韋皋統領大兵離了成都直到葭萌關外正與吐蕃人馬相遇先差通使與他打話道我朝自與你邦和親之後出嫁公主做你國質婆永不許興兵相犯如今何故背盟屢屢擾我蜀地那贊普答道雲南諸夷元是臣伏我國的你怎麼輒敢加兵侵佔疆界好好的還我雲南我便收兵回去半聲不肯教你西川也是難保韋皋道聖朝無外普天下那一處不屬我大唐的要戰便戰雲南斷還不成原來吐蕃沒有雲南夷人嚮導終是路徑不熟卻被韋皋預在深林窮谷之間偏插旗幟假做伏兵又教步軍舞著藤牌伏地而進用大刀砍其馬腳一聲炮響鼓角齊鳴沖殺過去那吐蕃一時無措大敗虧輸被韋皋追逐出境直到贊普新築的王城叫做末波城盡皆打破殺得吐蕃屍橫遍野血染成河端的這場廝殺可也功勞不小韋皋見吐蕃遠遁即便下令班師一面差牌將賫捷書飛奏朝廷一路上喜孜孜鞭敲金凳響笑吟吟齊唱凱歌聲話分兩頭卻說獨孤遐叔久住碧落觀中十分郁郁信步遊覽消遣客懷偶到一個去處叫做昇仙橋乃是漢朝司馬相如在臨邛縣竊了卓文君回到成都只因家事消條受人侮慢題下兩行大字在這橋柱上說道大丈夫不乘駟馬高車不過此橋後來做了中郎奉詔開通雲南道徑持節而歸果遂其志遐叔在那橋上徘徊東望嘆道小生不愧司馬之纔娘子盡有文君之貌只是怎能勾得這駟馬高車的日子下了橋正待取路回觀此時恰是暮春天氣只聽得林中子規一聲聲叫道不如歸去遐叔聽了這個鳥聲愈加愁悶又嘆道我當初與娘子臨別本以一年半載為期豈知擔擱到今不能歸去天那我不敢望韋皋的厚贈只願他早早退了番兵送我歸家卻也免得娘子在家朝夕懸望不覺春去夏來又過一年有餘纔等候得韋皋振旅而還那時捷書已到朝中德宗天子知道韋皋戰退吐蕃成了大功龍顏大喜御筆加授兵部尚書太子太保仍領西川節度使回府之日合屬大小文武那一個不奉牛酒拜賀直待軍門稍暇遐叔也到府中稱慶自念客途無以為禮做得蜀道易一篇你道為何叫做蜀道易當時唐明皇天寶末年安祿山反亂卻是鄭國公嚴武做西川節度有個拾遺杜甫避難來到西川又有丞相房綰也貶做節度府屬官只因嚴武性子頗多猜狠所以翰林供奉李白做蜀道難詞其尾特雲錦城雖云樂不如早歸家乃是替房杜兩公懮危的意思遐叔故將這難字改作易字翻成樂府一者稱頌韋皋功德遠過嚴武二者見得自己僑遇錦城得其所主不比房杜兩公以此暗暗打動他詞云吁嗟蜀道古以為難蠶叢開國山川郁盤秦置金牛道路始刊天梯石棧勾接危巒仰薄青霄俯掛飛湍猿猱之捷尚莫能幹使人對此寧不悲嘆自我韋公建節當關蕩平西寇降服南蠻風煙寧息民物殷繁四方商賈爭出其間匪無跋涉豈乏躋攀若在衽席既坦而安蹲鴟療飢筒布禦寒是稱天府為利多端寄言客子可以開顏錦城甚樂何必思還韋皋看見蜀道易這一篇不勝嘆服便對遐叔說往時李白所作蜀道難詞太子賓客賀知章稱他是天上謫下來的仙人今觀仁兄高才何讓李白老夫幕府正缺書記一員意欲申奏取旨借重仁兄為禮部員外權充西川節度府記室參軍庶得朝夕領教不識仁兄肯曲從否遐叔答道我朝最重科目凡士子不繇及第出身便做到九棘三槐終久被人欺侮小生雖則三番落第壯氣未衰怎忍把先世科名一朝自廢如今叨寓貴鎮已過歲餘寒荊白氏在家久無音信朝夕縈掛不能去懷巴得旌旄回府正要告辭伏乞俯鑒微情勿嫌方命韋皋謝道既是仁兄不允老夫亦不敢相強只是目下歲暮冰雪載途不好行走不若少待開春治裝送別未為晚也遐叔一來見韋皋意思殷勤二來想起天氣果然寒冷路上難行又只得住下捱過殘臘到了新年又早是上元佳節原來成都府地沃人稠本是西南都會自唐明皇駐蹕之後四方朝貢皆集於此便有京都氣象又經嚴鄭公鎮守巴蜀專以平靜為政因此閭閻繁富庫藏充饒現今韋皋繼他降服雲南諸夷擊破吐蕃五十萬眾威名大振這韋皋最是豪傑的性子因見地方寧定民心歸附預傳號令分付城內城外都要點放花燈與民同樂那道令旨傳將出去誰敢不依自十三到十七共是五夜家家門首紮縛燈棚張掛新奇好燈巧樣煙火照耀如同白晝獅蠻社火鼓樂笙簫通宵達旦韋皋每夜大張筵宴在散花樓上單請遐叔慶賞元宵剛到下燈之日遐叔便去告辭韋皋再三苦留終不肯住乃對遐叔說道仁兄歸心既決似難相強只是老夫還有一杯淡酒些小資裝當在萬里橋東再與仁兄敘別幸勿固拒即傳令撥一船隻次日在萬里橋伺候送遐叔東歸又點長行軍士一名護送到明早韋皋設宴在萬里橋餞別遐叔親舉金杯說道此橋最古昔諸葛孔明送費使吳道是萬里之行實始於此這橋因以得名今仁兄青雲萬里亦由今始願努力自愛老夫蟬冠雖敝拱聽泥金佳報特為仁兄彈之一連的勸了三杯方纔捧出一個錦囊說道老夫深荷令先公推薦之力得有今日止因王事鞅掌未得少酬大恩有累遠臨豈不慚汗但今盜賊生髮勢難重挈老夫聊備三百金權充路費此外別有黃金萬兩蜀錦千端俟道路稍寧專人奉送勿謂老夫輕薄為負恩人也又喚過軍士分付道一路小心服事不可怠慢軍士叩頭答應遐叔再三拜謝道不才受此已屬過望敢煩後命領了錦囊軍士跟隨上船那韋皋還在橋上直等望不見這船然後回府不在話下且說遐叔別了韋皋開船東去原來下水船就如箭一般急的不消兩三日早到巫峽之下遠遠的望見巫山神女廟想起當時從此經過暗祈神女託夢我白氏娘子許他賦詩為謝不知這夢曾托得去不曾托得去我豈可失信便口佔一首以償宿願詩云古木陰森一線天巫峰十二鎖寒煙襄王自作風流夢不是陽臺雲雨仙題畢又向著山上作禮稱謝過了三峽又到荊州不想送來那軍士忽然生起病來遐叔反要去服事他又行了幾日來到漢口地方自此從汝寧到洛陽都是旱路那軍士病體雖愈難禁鞍馬馳驟遐叔寫下一封書信留了些盤費即令隨船回去獨自個收拾行李登岸卻也會算計自己買了一頭生口望東都進發約莫行了一個月頭纔到洛陽地面離著開陽門只有三十餘裡是時天色傍晚一心思量趕回家去策馬前行又走了十餘裡路早是一輪月上趁著月色又走了十來裡隱隱的聽得鐘鳴鼓響想道城門已閉縱趕到也進城不及了此間正是龍華古寺人疲馬乏不若且就安歇解囊下馬投入山門不爭此一夜有分教蝴蝶夢中逢佚女鷺鷥杓底聽嬌歌話說兩頭且說白氏自龍華寺前與遐叔分別之後雖則家事荒涼衣食無措猶喜白氏女工精絕翰墨傍通況白姓又是個東京大族姑姊妹間也有就他學習針指的也有學做詩詞的少不得具些禮物為酬謝之資因此盡堪支給但時時記念丈夫臨別之言本以一年為約如何三載尚未回家況聞西川路上有的是一線天人瓮蛇倒退鬼見愁都這般險惡地面所以古今稱說途路艱難無如蜀道想起丈夫經由彼處必多驚恐別後杳元書信知道安否如何教我這條肚腸怎生放得欲待親往西川體訪消息只我女娘家又是個不出閨門的人怎生去得除非夢寐之中與他相見也好得個明白因此朝夕懸念睡思昏沈深閨寂寞兀坐無聊題詩一首詩云西蜀東京萬里分雁來魚去兩難聞深閨只是空相憶不見關山愁殺人那白氏一心想著丈夫思量要做個夢去尋訪想了三年有餘再沒個真夢一日正是清明佳節姑姊妹中都來邀去踏青遊玩白氏那有恁樣閑心腸推辭不去到晚上對著一盞孤燈淒淒惶惶的呆想坐了一個黃昏回過頭來看見丫鬟翠翹已是鼻句鼻句睡去白氏自覺沒情沒緒只得也上床去睡臥翻來覆去那裡睡得安穩想道我直恁命薄要得個夢兒去會他也不能勾又想道總然夢兒裡會著了他到底是夢中的說話原作不得准如今也說不得了須是親往蜀中訪問他回來也放下了這條腸子卻又想道我家姊妹中曉得怎麼肯容我去不如瞞著他們就在明早悄悄前去正想之間只聽得喔喔雞鳴天色漸亮即忙起身梳裹扮作村莊模樣取了些盤纏銀兩並幾件衣服打個包裹收拾完備看翠翹時睡得正熟也不通他知道一路開門出去離了崇賢裡頃刻出了開陽門過了龍華寺不覺又早到襄陽地面有一座寄錦亭原來苻秦時有個安南將軍竇滔鎮守襄陽挈了寵妾趙陽臺隨任拋下妻子蘇氏那蘇氏名蕙字若蘭生得才貌雙絕將一幅素錦長廣八寸織成迴文詩句五色分章計八百四十一字詩三千七百五十二首寄與竇滔竇滔看見立時送還陽臺迎接蘇氏到任夫妻恩愛比前更篤後人遂為建亭於此那白氏在亭子上眺望良久嘆道我雖不及若蘭才貌卻也粗通文墨縱有織錦回文誰人為寄使他早整歸鞭長諧伉儷乎乃口佔回文詞一首題於亭柱上詞云陽春艷曲麗錦誇文傷情織怨長路懷君惜別同心膺填思悄碧鳳香殘青鸞夢曉若倒轉來又是一首好詞曉夢鸞青殘香鳳碧悄思填膺心同別惜君懷路長怨織情傷文誇錦麗曲艷春陽白氏題罷離了寄錦亭不覺又過荊州來到夔府恰遇天晚見前面有所廟宇遂入廟中投宿抬頭觀看上面懸一金字扁額寫著高唐觀三個大字乃知是巫山神女之廟便於神座前撮土為香禱告道我白氏小字娟娟本在東京居住只為兒夫獨孤遐叔去訪西川節度韋皋一別三年杳無歸信是以不辭跋涉萬里相尋今夕寄宿仙宮敢陳心曲吾想神女曾能通夢楚王況我同是女流豈不托我一夢伏乞大賜靈感顯示前期不勝虔懇之至禱罷而睡果然夢見神女備細說道遐叔久寓西川平安無恙如今已經辭別取路東歸你此去怎麼還遇得他著可早早回身家去須防途次尚有虛驚保重保重那白氏颯然覺來只見天已明了想起神女之言歷歷分明料然不是個春夢遂起來拜謝神女出了廟門重尋舊徑再轉東都在路曉行暮止迤邐望東而來此時正值暮春天氣只見一路上有的是紅桃綠柳燕舞鶯啼白氏貪看景致不覺日晚尚離開陽門二十餘裡便趁著月色趲步歸家忽遇前面一簇遊人笑語喧雜漸漸走近你道是甚麼樣人都是洛陽少年輕薄浪子每遇花前月下打伙成群攜著的錦瑟瑤笙挈著的青尊翠幕專慣窺人婦女逞己風流白氏見那伙人來得不三不四卻待躲避原來美人映著月光分外嬌艷早被這伙人瞧破便一圈圈將轉來對白氏道我們出郭春游步月到此有月無酒有酒無人豈不孤負了這般良夜此去龍華寺不遠桃李大開願小娘子不棄同去賞玩一回何如那白氏聽見不覺一點怒氣從腳底心裡直湧到耳朵根邊把一個臉都變得通紅了罵道你須不是史思明的賊黨清平世界誰敢調弄良家女子況我不是尋常已下之人是白司農的小姐獨孤司封的媳婦前進士獨孤遐叔的渾家誰敢羅唣怎禁這班惡少那管甚麼宦家良家任你喊破喉嚨也全不作準推的推擁的擁直逼入龍華寺去賞花這叫做鐵怕落爐人怕落套正是分明繡閣嬌閨婦權做徵歌侑酒人且說遐叔因進城不及權在龍華寺中寄宿一宵想起當初從此送別整整的過了三年不知我白氏娘子安否何如因誦襄陽孟浩然的詩說道近家心轉切不敢問來人吟詠數番潸然淚下坐到更深尚未能睡忽聽得牆外人語喧嘩漸漸的走進寺來遐叔想道明明是人聲須不是鬼似這般夜靜難道有甚官府到此正惶惑間只見有十餘人各執苕帚糞箕將殿上掃除乾淨去訖不多時又見上百的人也有鋪設茵席的也有陳列酒餚的也有提著燈燭的也有抱著樂器的絡繹而到擺設得十分齊整遐叔想道我曉得了今日清明佳節一定是貴家子弟出郭游春因見月色如晝殿庭下桃李盛開爛漫如錦來此賞玩若見我時必被他趕逐不若且伏在壁後佛卓下待他酒散然後就寢只是我恁般晦氣在古廟中要討一覺安睡也不能勾即起身躲在後壁聲也不敢則又隔了一回只見六七個少年服色不一簇擁著個女郎來到殿堂酒席之上單推女郎坐在西首卻是第一個坐位諸少年皆環向而坐都屬目在女郎身上遐叔想道我猜是富貴家游春的果然是了只這女郎不是個官妓便是個上妓何必這般趨奉他難道有甚良家女子肯和他們到此飲宴莫不是強盜們搶奪來的或拐騙來的只見那女郎側身西坐攢眉蹙額有不勝怨恨的意思遐叔凝著雙睛悄地偷看宛似渾家白氏吃了一驚這身子就似吊在冰桶裡遍體冷麻把不住的寒顫卻又想道呸我好十分蒙憧娘子是個有節氣的平昔間終日住在房裡親戚們也不相見如何肯隨這班人行走世上面貌廝像的盡多怎麼這個女郎就認做娘子雖這般想終是放心不下悄地的在黑影子裡一步步挨近前來仔細再看果然聲音舉止無一件不是白氏再無疑惑卻又想道莫不我一時眼花錯認了又把眼來擦得十分明亮再看時節一髮絲毫不差卻又想道莫不我睡了去在夢兒裡見他把眼霎霎把腳踏踏分明是醒的怎麼有此詫異的事難道他做閨女時尚能截發自誓今日卻做出這般勾當豈為我久客西川一定不回來了遂改了節操我想蘇秦落第瞋他妻子不曾下機迎接後來做了丞相尚然不肯認他不知我明早家看他還有甚面目好來見我心裡不勝忿怒磨拳擦掌的要打將出去因見他人多伙眾可不是倒捋虎鬚且再含忍看他怎生的下場只見一個長鬚的舉杯向白氏道古語云一人向隅滿坐不樂我輩與小娘子雖然乍會也是天緣如此良辰美景亦非易得何苦恁般愁鬱請放開懷抱歡飲一杯並求妙音以助酒情那白氏本是強逼來的心下十分恨他欲待不歌卻又想這班乃是無籍惡少我又孤身在此怕觸怒了他一時撒潑起來豈不反受其辱只得拭乾眼淚拔下金雀釵按板而歌歌云今夕何夕存耶沒耶良人去兮天之涯園樹傷心兮三見花自古道詞出佳人口那白氏把心中之事擬成歌曲配著那嬌滴滴的聲音嗚嗚咽咽歌將出來聲調清婉音韻悠揚真個直令高鳥停飛潛魚起舞滿座無不稱贊長鬚的連稱有勞有勞把酒一吸而盡遐叔在黑暗中看見渾家並不推辭就拔下寶釵按拍歌曲分明認得是昔年聘物心中大怒咬咬牙關也不聽曲中之意又要搶將出去廝鬧只是恐眾寡不敵反失便宜又只得按捺住了再看他們只見行酒到一個黃衫壯士面前也舉杯對白氏道聆卿佳音令人宿酲頓醒俗念俱消敢再求一曲望勿推卻白氏心下不悅臉上通紅說道好沒趣歌一曲盡勾了怎麼要歌兩曲那長鬚的便拿起巨觥說道請置監令有拒歌者罰一巨觥酒到不幹顏色不樂並唱舊曲者俱照此例白氏見長鬚形狀凶惡心中害怕只得又歌一曲歌云嘆衰草絡緯聲切切良人一去不復返今日坐愁鬢如雪歌罷眾人齊聲喝采黃衫人將酒飲乾道聲勞動遐叔見渾家又歌了一曲愈加忿恨恨不得眼裡放出火來連這龍華寺都燒個乾淨那酒卻行到一個白面少年面前說道適來音調雖妙但賓主正歡歌恁樣淒清之曲恰是不稱如今求歌一曲有情趣的眾人都和道說得有理歌一個新意兒的勸我們一杯白氏無可奈何又歌一曲云勸君酒君莫辭落花徒繞枝流水無返期莫恃少年時少年能幾時白氏歌還未畢那白面少年便嚷道方纔講過要個有情趣的卻故意唱恁般冷淡的聲音請監令罰一大觥長鬚人正待要罰一個紫衣少年立起身來說道這罰酒且謾著白面少年道卻是何為紫衣人道大凡風月場中全在幫襯大家得趣若十分苛罰反覺我輩俗了如今且權寄下這杯待他另換一曲可不是好長鬚的道這也說得是將大觥放下那酒就行到紫衣少年面前白氏料道推託不得勉強揮淚又歌一曲云怨空閨秋日亦難暮夫婿絕音書遙天雁空度歌罷白衣少年笑道到底都是那些淒愴怨暮之聲再沒一毫艷意紫衣人道想是他傳派如此不必過責將酒飲盡行至一個皂帽胡人面前執杯在手說道曲理俺也不十分明白任憑小娘子歌一個兒侑這杯酒下去罷了但莫要冷淡了俺白氏因連歌幾曲氣喘聲促心下好不耐煩聽說又要再歌把頭掉轉不去理他長鬚的見不肯歌叫道不應拒歌便拋一巨觥白氏到此地位勢不容已只得忍泣含啼飲了這杯罰酒又歌云切切夕風急露滋庭草濕良人去不回焉知掩閨泣皂帽胡人將酒飲罷卻行到一個綠衣少年舉杯請道夜色雖闌興猶未淺更求妙音以盡通宵之樂那白氏歌這一曲聲氣已是斷續好生吃力見綠衣人又來請歌那兩點秋波中撲簌簌淚珠亂灑眾人齊笑道對此好花明月美酒清歌真乃賞心樂事有何不美卻恁般淒楚忒煞不韻該罰該罰白氏恐怕罰酒又只得和淚而歌歌云螢火穿白楊悲風入荒草疑是夢中游愁迷故園道白氏這歌一發前聲不接後氣恰如啼殘的杜宇叫斷的哀猿滿座聞之盡覺淒然只見綠衣人將酒飲罷長鬚的含著笑說道我音律雖不甚妙但禮無不答信口謅一曲兒回敬一杯你們休要笑話眾人道你又幾時進了這樁學問快些唱來長鬚的頓開喉嚨唱道花前始相見花下又相送何必言夢中人生盡如夢那聲音猶如哮蝦蟆病老貓把眾人笑做一堆連嘴都笑歪了說道我說你曉得什麼歌曲弄這樣空頭長鬚人到掙得好副老臉但憑眾人笑話他卻面不轉色直到唱完了方答道休要見笑我也是好價錢學來的哩你們若學得我這幾句也盡勾了眾人聞說越發笑一個不止長鬚的由他們自笑卻執起一個杯兒滿滿斟上欠身親奉白氏一杯直待飲乾然後坐下遐叔起初見渾家隨著這班少年飲酒那氣惱到包著身子若沒有這兩個鼻孔險些兒肚子也脹穿了到這時見眾人單逼著他唱曲渾家又不勝懮恨涕泣交零方纔明白是逼勒來的這氣到也略平了些卻又想我娘子自在家裡為何被這班殺纔劫到這個荒僻所在好生委決不下我且再看他還要怎麼只見席上又輪到白面飲酒他舉著金杯對白氏道適勞妙歌都是懮愁怨恨的意思連我等眼淚不覺吊將下來終覺敗興必須再求一風月艷麗之曲我等洗耳拱聽幸勿推辭叔暗道這些殺纔劫掠良家婦女在此歌曲還有許多嫌好道歉那白氏心中正自煩惱況且連歌數曲口乾舌燥聲氣都乏了如何肯再唱低著頭只是不應那長鬚的叫道違令又拋下一巨觥這時遐叔一肚子氣怎麼再忍得住暗裡從地下摸得兩塊大磚橛子先一磚飛去恰好打中那長鬚的頭再一磚飛去打中白氏的額上只聽得殿上一片嚷將起來叫道有賊有賊東奔西散一霎眼間蚤不見了那遐叔走到殿上四下打看莫說一個人連這鋪設的灑筵器具一些沒有蹤跡好生奇怪嚇得眼跳心驚把個舌頭伸出半晌還縮不進去那遐叔想了一會嘆道我曉得了一定是我的娘子已死他的魂靈游到此間卻被我一磚把他驚散了這夜怎麼還睡得著等不得金雞三唱便束裝上路天色未明已到洛陽城外捱進開陽門經奔崇賢裡一步步含著眼淚而來遙望家門卻又不見一些孝事那心兒裡就是十五六個吊桶打水七上八落的跳一個不止進了大門走到堂上撞著梅香翠翹連忙問道娘子安否如何口內雖然問他身上卻擔著一把冷汗誠恐怕說出一句不吉利的話來只見翠翹不慌不忙的答道娘子睡在房裡說今蚤有些頭痛還未曾起來梳洗哩遐叔聽見翠翹說道娘子無恙這一句話就如分娩的孕婦苛底一聲孩子頭落地心下好不寬暢只是夜來之事好生疑惑忙忙進到臥房裡面問道夜來做甚不好睡今蚤走不起白氏答道我昨夜害魘哩只因你別去三年杳無歸信我心中時常懮憶夜來做成一夢要親到西川訪問你的消息直行到巫山地面在神女廟裡投歇那神女又託夢與我說你已離巴蜀蚤晚到家休得途中錯過枉受辛苦我依還尋著舊路而回將近開陽門二十餘裡踏著月色要趕進城忽遇一伙少年把我逼到龍華寺玩月賞花飲酒之間又要我歌曲整整的歌了六曲還被一個長鬚屢次罰酒不意從空中飛下兩塊磚橛子一塊打了長鬚的頭一塊打了我的額角上瞥然驚醒遂覺頭痛因此起身不得還睡在這裡遐叔聽罷連叫怪哉怪哉怎麼有恁般異事白氏便問有何異事遐叔把昨夜寺中宿歇看見的事情從頭細說一遍白氏見說也稱奇怪道原來我昨夜做的卻是真夢但不知這伙惡少是誰遐叔道這也是夢中之事不必要深究了說話的我且問你那世上說謊的也盡多少不得依經傍注有個邊際從沒有見你恁樣說瞞天謊的祖師那白氏在家裡做夢到龍華寺中歌曲須不是親身下降怎麼獨孤遐叔便見他的形象這般沒根據的話就騙三歲孩子也不肯信如何哄得我過看官有所不知大凡夢者想也因也有因便有想有想便有夢那白氏行思坐想一心記掛著丈夫所以夢中真靈飛越有形有像俱為實境那遐叔亦因想念渾家幽思已極故此雖在醒時這點神魂便入了渾家夢中此乃兩下精神相貫魂魄感通淺而易見之事怎說在下掉謊正是只因別後幽思切致使精靈暗往回當下白氏說道夢中之事所見皆同這也不必說了且問你一去許久並無音耗雖則夢中在巫山廟祈夢蒙神女指示說你一路安穩干求稱意我想蜀道艱難不知怎生到得成都便到了成都不知可曾見韋皋便見了韋皋不知贈得你幾何遐叔驚道我當初經過巫峽聽說山上神女頗有靈感曾暗祈他托汝一夢傳個平安消息不道果然夢見真個有些靈感只是我到得成都偶值韋皋兩次出征因此在碧落觀整整的住了兩年半路上走了半年遂至擔擱有負初盟猶喜得韋皋故人情重相待甚厚若不是我一意告辭這蚤晚還被他留住未得回來將那路途跋涉旅邸淒涼並韋皋款待贈金差人遠送前後之事一一細說夫妻二人感嘆不盡把那三百金日逐用度遐叔埋頭讀書約莫半年有餘韋皋差兩員將校賫書送到黃金一萬兩蜀錦一千匹遐叔連忙寫了謝書款待來使去後對白氏道我先人出仕三十餘年何嘗有此宦橐我一來家世清白二來又是儒素只前次所贈以足度日何必又要許多且把來封好收置待我異日成名另有用處白氏依著丈夫言語收置不提且說唐朝制科率以三歲為期遐叔自貞元十五年下第西遊巴蜀卻錯了十八年這次直到二十一年又該殿試時分打疊行囊辭別白氏上京應舉那知貢舉官乃是中書門下侍郎崔群素知遐叔纔名有心檢他出來取作首卷呈上德宗天子御筆親題狀元及第那遐叔有名已久榜下之日那一個不以為得人舊例游街三日曲江賜宴雁塔題名欽除翰林修撰專知製誥謝恩之後即寫家書差人迎接白氏夫人赴京共享富貴且說白氏在家掐指過了試期眼盼盼懸望佳音一日正在閨房中忽聽得堂前鼎沸連忙教翠翹出去看時恰正是京中走報的來報喜白氏問了詳細知得丈夫中了頭名狀元以手加額對天拜謝整備酒飯款待報人頃刻就嚷徧滿城白氏親族中俱來稱賀那白長吉昔日把遐叔何等奚落及到中了卻又老著臉皮備了厚禮也來稱賀那白氏是個記德不記仇的賢婦念著同胞分上將前情一筆都勾相見之間千歡萬喜白長吉自捱進了身子無一日不來掇臀捧屁就是平日從不往來極疏冷的親戚也來殷勤趨奉到教白氏應酬不暇那賫書的差人星夜趕到洛陽叩見白氏將書呈上白氏拆開看到書後有詩一首雲玉京仙府獻書人賜出宮袍似爛銀寄語機中愁苦婦好將顏面對蘇秦白氏看罷微微笑道原來相公要迎我至京遂留下差人擇吉起程那時府縣撥送船夫親戚都來餞送白長吉親送妹子至京遐叔接入衙門夫妻相見喜從天降白長吉向前請罪遐叔度量寬弘全無芥蒂即便擺設家筵款待不提不想那年德宗皇帝晏駕百官共立順宗登位不上半年順宗也就崩了又立憲宗登位改元元和元年到四月間遐叔蚤昇任翰林院學士知製誥如故你道他為何昇得恁驟原來大行皇帝的遺詔與新帝登極的詔書前後四篇都出遐叔之作這是朝廷極大手筆以此累功不次遷擢恰好五月間有大赦天下詔書遐叔乘這個機會就討了宣赦的差夫妻二人衣錦還鄉親戚們都在十里外迎接府縣官也出郭相迎遐叔回到家中焚黃謁墓殺豬宰羊做慶喜筵席遍請親鄰飲酒中間說起龍華寺曾許下願心要把韋皋送來的黃金萬兩蜀錦千匹都捨在寺裡重修寶殿再整山門即便選擇吉辰興動工役其時白敏中以中書侍郎請告歸家白居易新授杭州府太守回來赴任兩個都到遐叔處賀喜見此勝緣各各布施那州縣官也要奉承遐叔無一個不來助工眼見得這龍華寺不日建造起來比初時越覺齊整但見寶殿嵯峨侵碧落山門弘敞壓閻浮卻說韋皋久鎮蜀中自知年紀漸老萬一西番南夷有些決撒恐損威名上表固請賅骨因薦遐叔自代奉聖旨韋皋鎮蜀多年功勞積著可進光祿大夫右丞相同平章事封襄國公馳驛回朝獨孤遐叔累掌絲綸王言無忝訪之輿望僉謂通材可加兵部侍郎領西川節度使仍著走馬赴任無得遲誤欽此遐叔接了詔書恐怕違了欽限便同白氏夫人乘傳而去未到半路蚤有韋皋差官迎接約定在夔府交代恰好巫山神女廟正在夔府地方遐叔與白氏乘此便道先往廟中行香謝他託夢的靈感然後與韋皋相見敘過寒溫送過敕印把大小軍政一一交盤明白纔吃公宴當日遐叔就回了席明蚤點集車騎隊伍護送韋皋還朝從此上任之後專務鎮靜軍民安堵威名更勝朝廷纍加褒賞直做到太保兼吏兵二部尚書封魏國公白氏誥封魏國夫人夫妻偕老子孫榮盛有詩為證夢中光景醒時因醒若真時夢亦真莫怪癡人頻做夢怪他說夢亦癡人
