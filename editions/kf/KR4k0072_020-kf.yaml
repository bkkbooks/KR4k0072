有不到之處但憑責罰死而無怨若要孩兒出門這是斷然不去一頭說一頭哭好不淒慘趙昂恐丈人迴心轉來便襯道三官只是你不該這樣沒正經如今哭也遲了廷秀道我何嘗乾這等勾當卻霹空生造趙昂道這話一發差了那個與你有仇造言謗你況岳父又不是肯聽是非的必定做下一遭兩次露人眼目如今岳父察曉的實方纔著惱怎麼反歸怨別人廷秀道有那個看見的須叫他來對證王員外罵道畜生若要不知除非莫為你在外胡行那個不曉得尚要抵賴便搶過一根棒子劈頭就打道畜生還不快走廷秀反向前抱住痛哭道爹爹就打死也決不去的趙昂急忙扯開道三官岳父是這樣執性的你且依他暫去待氣平了少不得又要想你那時卻不原是父子翁婿如今正在氣惱上你便哭死料必不聽廷秀見丈人聲勢凶狠趙昂又從旁尖言冷語幫扶心中明白是他攛掇料道安身不住乃道既如此待我拜謝了母親去罷王員外那裡肯容連先生也不許他見趙昂推著廷秀背上往外而走道三官你怎麼恁樣不識氣又要見岳母做甚將他搡出大門而去正是人情若比初相識到底終無怨恨心且說徐氏在裡面聽得堂中喧嚷哭泣只道王員外打小廝們那裡想到廷秀身上故此不在其意童僕們也沒一個露些聲息到午後聞得先生也打發去了心中有些疑惑問眾家人都推不知至晚王員外進房詢問其故方曉得廷秀被人搬了是非趕逐去了徐氏再三與他分解勸員外原收留回來怎奈王員外被讒言蠱惑立意不肯反道徐氏護短那玉姐心如刀割又不敢在爹媽面前明言只好背地裡啼哭徐氏放心不下幾遍私自差人去請他來見那些童僕與趙昂通是一路只推尋訪不著按下徐氏母子且說廷秀離了王家心中又苦又惱不顧高低亂撞回來只見文秀正在門首問道哥哥如何又走轉來廷秀氣塞咽喉那裡答得出半個字兒文秀道哥哥因甚氣得這般模樣廷秀停了一回方將上項事說與兄弟文秀道世態炎涼自來如此不足為異只是王員外平昔待我父子何等破格今纔到家驀地生起事端趙昂又在旁幫扶必然都是他的緣故如今且莫與母親說知恐曉得了愈加煩惱廷秀道賢弟之言甚是次日來到牢中看覷父親那時張權虧了種義棒瘡已好身體如舊廷秀也將其事哭訴張權聞得嗟嘆王員外有始無終種義便道恁般說起來莫不你的事情想是趙昂所為張權道我與他素無仇隙恐沒這事廷秀道只有定親時聞得他夫妻說我家是木匠阻當岳父不要贅我岳父不聽反受了一場搶白或者這個緣故上起的種義道這樣說自然是他了如今且不要管是與不是目下新按院將到鎮江小官人可央人寫張狀子去告只說趙昂將銀買囑捕人強盜故此扳害待他們自去分辨若果然是他陷害動起刑具少不得內中有人招稱出來若不是時也沒甚大害張權父子連聲道是廷秀作別出監兄弟商議停當央人寫下狀詞要往鎮江去告狀常言道機不密禍先行這樣事體只宜悄然商議那張權是個老實頭不曾經歷事體的種義又是粗直之人說話全不照管早被一個禁子聽見這禁子與楊洪乃是姑舅弟兄聞此消息飛風便去報知楊洪聽得吃了一嚇連忙來尋趙昂商議走到王員外門首不敢直入見個小廝進去央他傳報說有府前姓楊的要尋趙相公說話趙昂料是楊洪即便出來相見問道楊兄有甚話說楊洪扯到一個僻靜所在道張廷秀已曉得你我害他即日要往按院去告狀倘若准了到審問時用起刑具一時熬不得招出真情反坐轉來卻不自害自身幸喜表弟聞得來報故此特來商議趙昂聽了驚得半晌說不出話來乃道如此卻怎麼好楊洪道一不做二不休尊相便拚用幾兩銀子我便拚折些工夫連這兩個小廝一併送了方纔斬草除根趙昂道銀子是小事只沒有個妙策楊洪道不打緊他們是個窮鬼料道僱船不起少不得是趁船我便裝起捕盜船來教我兄弟同兩個副手泊在閶門再令表弟去打聽了起身日子暗隨他出城招攬下船我便先到鎮江伺候孩子家那知路徑載他徑到江中攛入水裡可不幹淨趙昂大喜教楊洪少待便去取出三十兩銀子送與楊洪道煩兄用心務除其根事成之日再當厚謝楊洪收了銀子作別而去且說廷秀打聽得按院將及過江央人寫了狀詞要往鎮江去告那時陳氏病體痊愈已知王員外趕逐回來也只索無奈見說要去告狀對廷秀道你從未出路獨自個去我如何放心須是弟兄同行路上還有些商量廷秀道若得兄弟去便好只是母親在家無人伏侍陳氏道來往不過數日況有養娘在家陪伴不消牽掛廷秀依著母親收拾盤纏來到監中別過父親背上行李徑出閶門來搭船剛走到渡僧橋只聽得背後有人叫道二位小官人往那裡去廷秀道往鎮江去那人道到鎮江有便船在此又快當又安穩廷秀聽說有便船便立住腳與文秀說道若是便船到強如在航船上挨擠文秀道我任憑哥哥主張廷秀對船家說道你船在那裡可就開麼船家道他們是本府理刑廳提來差往公幹的私己搭一二人路上去買酒吃若沒人也就罷了有甚擔擱廷秀道既如此帶了我們去船家引他下了船住在稍上少頃只見一人背著行李而來稍公接著上船那人便問這兩個孩子是何人稍公道這兩個小官人也要往鎮江的容小人們帶他去趁幾文錢路上買酒吃望乞方便那人道止這兩個便容了你多便使不得稍公道只此兩個也是偶然遇著豈敢多搭說罷連忙開船你道這人是何等樣人就是楊洪兄弟楊江稍公便是副手當下楊江問道二位小官人姓甚住在何處到鎮江去何干廷秀說了姓名居處又說父親被人陷害緣由如今要往按院告狀楊江道原來是好人家兒女可憐可憐你住在稍上不便也到艙中來坐廷秀道如此多謝了弟兄搬到艙中住下楊江一路殷勤到買酒肉相請又許他到衙門上看顧弟兄二人感激不盡那船乃是捕盜的快船趁著順風連夜而走次日傍晚就到了鎮江船家與廷秀討了船錢假意催促上岸廷秀取了行李便要起身楊江道你這船家忒煞不行方便這兩位小官人從不曾出路的此時天色已晚教他那裡去尋宿處又向廷秀道莫要理他今夜且在舟中住了明早同上涯去尋寓所安下就到察院前去打聽按院幾時按臨卻不又省了今夜房錢廷秀弟兄只認做好人連聲稱謝依原把包裹放下楊江取出錢鈔教稍公買辦些酒肉吩咐移船到穩處安歇稍公答應將船直橕出西門閘外沿江闊處停泊稍公安排魚肉送入艙裡楊江滿斟苦勸將廷秀弟兄灌得大醉人事不醒倒在艙中那時楊洪已約定在此等候稍公口中唿哨一聲便跳下船即忙解纜開船悄悄的搖出江口沿溜而下過了焦山到一寬闊處取出索子將他弟兄捆綁起來恰如兩隻餛飩相似二子身上疼痛從醉夢中驚醒掙扎不動卻待喊叫被楊洪楊江扛起向江中撲嗵的攛將下去眼見得二子性命休了可憐世上聰明子化作江中浪宕魂你想長江中是何等樣水那水從四川湖廣江西一路上流沖將下來猶如滾湯一般緊急到了鎮江直溜入海就是落下一塊砂石少不得隨流而下偏有廷秀弟兄撇入江中卻反逆流上去楊洪楊江望見也道奇怪撥轉船頭趕上各提起篙子照著頭上便射說時遲那時快篙子離身不上一尺早被三四個大浪把二子直湧開去連船險些兒掀翻那篙子便不能傷楊江料道必無活理原移至沿口泊下次早開船歸到蘇州回復了趙昂趙昂心中大喜又找了三十兩銀子楊洪兀自嫌少兩下面紅頸赤而別不在話下且說河南府有一人喚做褚衛年紀六十已外平昔好善夫妻二人吃著一口長齋並無兒女專在江南販布營生一日正裝著一大船布疋出了鎮江望河南進發行不上三十餘裡天色將晚風逆浪大只得隨幫停泊江中睡到半夜聽得船旁像有物踵響他也不在其意方欲合眼又像有人推醒一般那船旁踵得越響了隱隱又有人聲心中奇怪爬起來開了篷窗打一看時只見水面上浮著一人口內微微有聲褚衛慌忙叫起水手撈救上船打起火來看時卻是十五六歲一個小廝生得眉清目秀渾身綁縛微微止有一息與他下了索子燒起熱湯灌了幾口那孩子漸漸醒轉嘔出許多清水褚衛將乾衣與他換了詢其緣故小廝哭訴道小人名喚張文秀只因父親被人陷害在牢同哥哥廷秀來鎮江按院告狀趁了個便船說是蘇州理刑差人一路假意殷勤照顧昨夜到了鎮江又留住在船將酒灌醉我弟兄雙雙綁入水中正不曉得他是何人害我等性命天幸得遇恩人救拔但不知恩人高姓大名這裡是何處離鎮江多少路了怎地送得小人歸家決不忘恩褚衛本是好善之人見他說得苦楚心下十分可憐初時到有送他回去之念忽地想起鎮江到此乃是逆水怎麼反淌了上來莫非此子後來有些好處暗中自有鬼神護佑麼我今尚無子嗣何不留他回去做個螟蛉之子卻不是好乃哄他道我是河南褚衛販布回去這裡離鎮江已遠有一千餘裡怎能送你回去況昨夜謀你的必是對頭差來心腹故此下這樣毒手今若依舊回家必然又尋別事害你我今又無兒子若不棄嫌認做父子隨我歸家去明年帶你下來訪出昨夜之人然後去告理救你父親可不好麼文秀雖然記掛父母到此無可奈何只得依允就拜褚衛為父改名褚嗣茂帶上河南不提且說張廷秀被楊洪捆入水中自分必死不想半沈半浮被大浪直湧到一個沙洲邊蘆葦之旁到了天明只見船隻甚多俱在江中往來叫喊不聞至午後有一隻船旁洲而來廷秀連喊救命那船攏到洲邊撈上船去割斷繩索放將起來且喜得毫無傷損廷秀舉目看船中時卻是兩個中年漢子十來個小廝約莫俱有十六七歲你道是何等樣人原來是浙江紹興府孫尚書府中戲子那兩個中年人一個是師父潘忠一個是管箱的家人領著行頭往南京去做戲在此經過恰好救了廷秀取幾件乾衣與他換了問其緣故廷秀把父親被害要到按院伸冤被船上謀害之事哭訴一遍又道多蒙救了性命若得送我回家定然厚報那潘忠因班中裝生的啞了喉嚨正要尋個頂替見廷秀人物標致聲音響亮卻又年紀相彷心下暗喜道若教此人起來到好個生腳心下懷了這個私念就是順路往蘇州去諒道也還不肯放他轉身莫說如今卻是逆路當下潘忠道我們乃紹興孫尚書府中子弟到南京去做生意那有工夫拗轉去送你回家我如今到京已近不如隨我們去住下慢慢覓便人帶你歸家你若不肯時我們也不管閑帳原送你到沙洲上等候別個便船帶回去罷廷秀聽得說出這話連忙道既然不是順路情願隨列位到京潘忠道這便使得廷秀自己雖然得了性命卻又想著兄弟必定死了不住流淚那日乃是順風晚間便到南京次早入城尋寓所安下那孫府戲子原是有名的一到京中便有人叫去扮演廷秀也隨著行走過了數日潘忠對廷秀道眾人在此做生意各要趁錢回去養家的誰個肯白白養你總然有便帶你回家那盤費從何而來不如暫學些本事吃些活飯那時回去卻也容易廷秀思量虧他們救了性命空手坐食心上已是過意不去又聽了潘忠這班說話愈覺羞慚暗道我只指望圖個出身的日子顯祖揚宗那知霹空降下這場沒影奇禍弄得家破人亡父南子北流落如此若學了這等下賤之事這有甚麼長俊如不依他定難存住卻又想道昔日箕子為奴伍員乞食他們都是大豪傑在患難之際也只得從權我今日到此地位也顧不得羞恥了且暫度幾日再做區處遂應承了潘忠就學個生腳他資性本來聰慧教來曲子那消幾遍卻就會了不勾數日便能登場扮來的戲出人意表賢愚共賞無一日空閑在京半年有餘積趲了些銀兩想道如今盤纏已有好回家了誰想潘忠先揣知其意悄悄溜過了他的銀子廷秀依舊一雙空手不能歸去潘忠還恐他私下去了行坐不離廷秀脫身不得只得住下這叫做情知不是伴事急且相隨話分兩頭卻說陳氏自從打發兒子去後只愁年幼上司衙門利害恐怕言語中差錯再不想到有人謀害已到十日之外風吹草動也認做兒子回了急出門觀看漸漸過了半月二十日一發專坐在門首盼望那時還道按院未曾到任在彼等候後來聞得按院鎮江行事已完又按臨別處得了這個消息急得如煎盤上螞蟻沒奔一頭處急到監中對丈夫說知央人遍貼招帖四處尋訪並無蹤跡正不知何處去了夫妻痛哭懊悔道早知如此不教他去也罷如今冤屈未伸到先送了兩個孩兒後來倚靠誰人轉思轉痛愈想愈悲初時還癡心妄想有歸家日子過了年餘不見回來料想已是死了招魂設祭日夜啼啼哭哭一個養娘卻又患病死了止留得孤身孑影越發淒慘正是屋漏更遭連夜雨船遲又遇打頭風且說王員外自那日聽了趙昂言語將廷秀逐出意欲就要把玉姐另配人家一來恐廷秀有言二來怕人誹議未敢便行次後聞得廷秀弟兄往鎮江按院告狀只道他告賴親這節老大著忙口雖不言暗自差人打聽漸漸知得二子去後不知死活存亡有了這個消耗不勝歡喜即央媒尋親媒人得了這句口風互相傳說開去那些人家只貪王員外是個無子富翁那管曾經招過養婿數日間就有幾十家來相求玉姐初時見逐出廷秀已是無限煩惱還指望父親原收留回來總然不留回家少不得嫁去成親後來微聞得有不好的信息也還半信半疑今番見父親流水選擇人家改嫁料想廷秀死是實了也怕不得羞恥放聲哭上樓去原來王員外的房屋卻是一帶樓子下邊老夫妻睡處樓上乃玉姐臥室當下玉姐在樓上啼哭送來茶飯也不要吃他想道我今雖未成親卻也從幼夫妻他總無祿夭亡我豈可偷生改節莫說生前被人唾罵就是死後亦有何顏見彼與其忍恥苟活何若從容就死一則與丈夫爭氣二則見我這點真心只有母親放他不下事到如今也說不得了想一回哭一回漸漸哭得前聲不接後氣那徐氏把他當做掌上之珠見哭得恁般模樣急得無法可治口中連連的勸他莫要哭且說為甚緣故自己卻又鼻涕眼淚流水淌出來玉姐只得從實說出徐氏勸道兒不要睬那老沒志氣凡事有我在此做主明日就差人去訪問三官下落設或真有些山高水低好歹將家業分一半與你守節若老沒志氣執意要把你改嫁我拚得與他性命相搏又對丫鬟道快去叫員外來說個明白又吩咐倘有人在彼莫說別話丫鬟急忙忙的來請誰想王員外因有個媒人說一個新進學小秀才來求親聞得才貌又美且是名門舊族十分中意款留媒人酒飯正說得濃釅飲得高興丫鬟說聲院君相請只當耳邊風如何肯走起身丫鬟站勾腿酸腳麻只得進去回覆徐氏百般苦勸剛剛略止又加個趙昂老婆闖上樓來重新哭起你道卻是為何那趙昂擺佈了張權趕逐了廷秀還要算計死了玉姐獨吞家業因無機會未曾下手今見王員外另擇人匹配滿懷不樂又沒個計策阻擋在房與老婆商議這時聽得玉姐不願在樓上哭卻不正中其意故此瑞姐走來故意說道妹子你如何不知好歹當初爹爹一時沒志氣把你配個木匠之子玷辱門風如今去了另配個門當戶對人家乃是你萬分造化了如何反恁地哭泣難道做強盜的媳婦木匠的老婆到勝似有名稱人家不成玉姐被這幾句話羞得滿面通紅顛倒大哭起來徐氏心中已是不悅瑞姐還不達時務且扯做娘的到半邊低低說道母親莫不妹子與小殺纔背地裡做下些蹊蹺勾當故此這般牽掛只這句話惱得徐氏兩太陽火星直爆把瑞姐劈面一啐又恐怕氣壞了玉姐不敢明說止道你是同胞姐妹不懷個好念我方勸得他住卻走來激得重複啼哭還要放恁樣冷屁由他是強盜媳婦木匠老婆罷了著你甚急胡言亂語瑞姐被娘這場搶白羞慚無地連忙下樓一頭走一頭說道護短得好只怕走盡天下也沒見人家有這樣無恥閨女早是不曾做親便恁般疼老公若是生男育女的真個要同死合棺材哩虧他到掙得一副好老臉皮全沒一毫羞恥夾七夾八一路嚷去明明要氣玉姐上路徐氏怕得合氣由他自說只做不聽見玉姐正哭得頭昏眼暗全不覺得看看到晚王員外吃得爛醉小廝扶進來自去睡了竟不知女兒這些緣故徐氏陪伴玉姐坐至更餘漸漸神思睏倦睡眼朦朧打熬不住向玉姐道兒不消煩惱總在明早還你個決裂夜深了去睡罷推至床上除去簪釵和衣撳在被裡下了帳幔又吩咐丫鬟們照管火燭大凡人家使女極是貪眼懶做十個裡邊難得一個長俊徐氏房中共有七八個丫鬟有三個貼身伏侍玉姐就在樓上睡臥那晚守到這時候一個個拗腰凸肚巴不能睡臥見徐氏勸玉姐睡了各自去收拾家火專等徐氏下樓關上樓門盡去睡了徐氏下得樓來看王員外醉臥正酣也不去驚動他將個燈火四面檢點一遍解衣就寢不提且說玉姐睡在床上轉思轉苦又想道母親雖這般說未必爹爹念頭若何總是依了母親到後終無結果又想起母親忽地將姐姐搶白必定有甚惡話傷我故此這般發怒我乃清清白白的人何苦被人笑恥不如死了到得乾淨又哭了一個更次聽丫鬟們都鼻勾鼻勾睡熟樓下也無一些聲息遂抽身起來一頭哭一頭檢起一條汗巾走到中間掇個杌子墊腳把汗巾搭在梁上做個圈兒將頭套入兩腳登空嗚呼哀哉正是難將幽恨和人說應向泉臺訴丈夫也是玉姐命不該絕剛上得吊不想一個丫鬟因日間玉姐不要吃飯瞞著那兩個丫鬟私自收去盡情