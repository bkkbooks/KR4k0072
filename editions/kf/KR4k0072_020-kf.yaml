親丁出來打官司告狀的麼趙昂道他名叫張權江西小木匠出身住在閶門皇華亭側舊時原是個窮漢近日得了一注不明不白的錢財買起一所大房開張布店止有兩個兒子都還是黃毛小廝此外更無別人不消慮的楊洪道這樣不打緊前日剛拿五個強盜是打劫龐縣丞的因總捕侯爺公出尚未到官待我分付了叫他當堂招出包你穩穩問他個死罪那時就獄中結果他性命如翻掌之易了趙昂深深作揖道全仗老兄著力正數之外另自有報楊洪道我與尊相從小相知怎說恁樣客話把銀子袖過兩下又吃了一大回酒起身會鈔臨出店門趙昂又千叮萬囑楊洪道不須多話包你妥當拱拱手原向府內去了趙昂回到家裡把上項事說與老婆知道兩人暗自歡喜且說楊洪得了銀子也不通夥計得知到衙門前完了些公事回到家中將銀交與老婆藏好便去買些魚肉安排起來又打一大壺酒燙得滾熱又煮一大鍋飯收拾停當把中門閉上走到後邊將匙鑰開了阱房那五個強盜見他進門只道又來拷打都慌張了口中只是哀告楊洪笑道我豈是要打你只為我們這些夥計見我不動手只道有甚私弊故此不得不依他們轉動兩日見你眾人吃這些痛苦心中好生不忍今日趁夥計都不在此特買些酒肉與你們將息一日好去見官那些強盜見說不去打他反有酒肉來吃喜出望外一個個千恩萬謝須臾搬進擺做一臺卻是每人一碗肉一碗魚一大碗酒兩大碗飯楊洪先將一名開了鐵鏈放他飲啖那強盜連日沒有酒肉到口又受了許多痛苦一見了猶如餓虎見羊不勾大嚼頃刻吃個乾淨吃完了依舊鎖好又放一個起來那未吃的口中好不流涎不一時輪流都吃遍了楊洪收過家火又走進來問道你們曾偷過閶門外開布店張木匠張權的東西麼都道沒有楊洪道既沒有為何曉得你們事露連日叫人來叮囑要快些了你們性命你們各自去想一想或者有些什麼冤仇眾強盜真個各去胡思亂想內中一個道是了是了三月前我曾在閶門外一個布店買布為爭等子頭上起被我痛罵了一場想是他懷恨在心故此要來傷我們性命楊洪便趁勢說道這等不消說起是了但不過是件小事怎麼就要害許多人的性命那人心腸卻也太狠眾強盜見說一個個咬牙切齒楊洪道你們要報仇有甚難處明日解審時當堂抬他是個同夥一向打劫的贓物都窩在他家況他又是驟發咬實了必然難脫卻教他陪你吃苦況他家中有錢也落得他使用又說道切不要就招待拷問到後邊眾口一詞招出方像真的眾人俱各歡喜道還是楊阿叔有見識楊洪又說了他出身細底又吩咐莫與夥計們得知他們通得了錢都是一路眾強盜牢記在心楊洪見事已諧心中歡喜依舊將門鎖好又來到府前打聽侯同知晚上回府便會同了眾捕快次日解官有詩為證只因強盜設捕人誰知捕人賽強盜買放真盜扳平民官法縱免幽亦報次早眾府快都至楊洪家裡寫了一張解呈拿了贓物帶著這班強盜來到總捕廳前伺候不多時侯爺陞堂楊洪同眾捕快將強盜解進跪在廳前把解呈遞上稟道前日在平望地方擒獲強盜一起五名正是打劫龐縣丞的真贓真盜解在臺下侯爺將解呈看了五個強盜都有姓名計文吉適袁良段文陶三虎點過了名又將贓物逐一點明不多什麼東西便問捕快道聞得龐縣丞十分貪污囊橐甚多俱被劫去如何只有這幾件粗重東西其餘的都在那裡眾捕快稟道小的們所獲只有這幾件此外並沒有了或者他們還窩在那處老爺審問便知侯爺喚上強盜問道你一班共有幾個做過幾年打劫多少人家贓物都窩頓在何處從實細說饒你刑罰那強盜一一招稱只有五個並無別人劫過東西俱已花費止存這些餘外更沒有窩頓所在侯爺大怒討過夾棍一齊夾起纔套得上都喊道還有幾名都已逃散只有一個江西木匠張權住在閶門外邊向來打劫銀兩都窩在他家如今見開布店侯爺見異口同聲認以為實連忙起簽差原捕楊洪等押著兩名強盜作眼同去擒拿張權起贓連解那三名鎖在庭柱上等解到同審侯爺再理別事且說楊洪同眾人押著強盜一徑望閶門而去趙昂也在府前打聽看見楊洪已知事妥自己躲過一邊卻教手下人遠遠跟去看其動靜楊洪到了張權門首立住腳道這裡是了只見張權在店中做生意擠著許多主顧打發不開楊洪分開眾人托地跳進店裡將鏈子望張權頸上便套張權叫聲呵呀卻是為何楊洪伸開手兩個大巴掌罵道你這強盜還要問甚你打劫許多東西在家好快活卻帶累我們不時比捕張權連聲叫苦道這是那裡說起正要分辨時眾捕人押著強盜望裡邊去了楊洪恐怕人揀好東西藏過忙將張權鎖好又取出鐵扭上了也牽入裡面起贓那時驚得一家無處躲避門前買布的與夥計討了銀錢自往別處去買看的人擁做一屋眾捕快將一應細軟都搜括出來只揀銀兩衣飾各自溜過其餘打起幾個大包連店中布疋盡情收拾張權夫妻抱頭大哭道不知這場橫禍那裡飛來兩下分捨不得捕人上前拆開牽著便走那些鄰里不曉得的認以為真便道我說他一向家事不濟如何忽地買起房屋開這樣大鋪子又與兒子定親只道他掘了藏原來卻做了這行生意故此有錢有幾個相識曉得些的與他分剖說是個好人這些東西是親家王員外扶持的不知為甚被人扳害眾人那裡肯信一路上說好說歹不止一個都跟來看且說楊洪一班押張權到了府中侯爺在堂立等回話解將進去跪下把東西放在一堂楊洪稟道張權拿到了侯爺教放下柱上三個強盜同審又將東西逐一驗過張權上前泣訴道爺爺小人是個良民從來與這班人不曾識面何嘗與他同盜其實是霹空陷害望爺爺超拔侯爺喝道既不曾同盜這些贓物那裡來的張權道這