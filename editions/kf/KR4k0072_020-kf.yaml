此好言問他今聽說在外做戲惱得登時紫榼了面皮氣倒在椅上喝道畜生誰是你的父親還不快走廷秀道既不要我父子稱呼叫聲岳丈何如王員外又怒道誰是你的岳丈廷秀道父親雖則假的岳父卻是真的如何也叫不得趙昂一見廷秀已是嚇勾面如土色暗道這小殺纔已綁在江裡死了怎生的全然無恙莫非楊洪得了銀子放走了卻來哄我又聽得稱他是姨夫也喝道張廷秀那個是你的姨丈到此胡言亂語若不走教人打你這花子的孤拐廷秀道趙昂富貴不壓於鄉里你便做得這螞蟻官兒就是這等輕薄我好意要做出戲兒賀你反恁般無禮趙昂見叫了他的名字一發大怒連叫家人快鎖這花子起來那時王三叔也在座間說道你們不要亂嚷是親不是親另日再說既是他會做戲好情來賀你只當做戲子一般演一出兒頑頑有何不可卻這般著惱推著廷秀背道你自去扮起來不要聽他們眾親戚齊拍手道還是三叔說得有理將廷秀推入戲房中把紗帽員領穿起就頂王十朋祭江這一折廷秀想起玉姐曾被逼嫁上吊恰與玉蓮相仿把胸中真境敷演在這折戲上渾如王十朋當日親臨眾親鼻涕眼淚都看出來連聲喝采不迭只有王員外趙昂又羞又氣正做之間忽見外面來報本府太爺來拜常州府理刑邵爺翰林院褚爺慌得眾賓客並戲子就存坐不住戲也歇了王員外趙昂急奔出外邊對賫帖的道並沒甚邵爺褚爺在我家作寓賫帖的道邵爺今早親口說寓在你家如何沒有將帖子撇下道你們自去回覆竟自去了王員外和趙昂慌得手足無措便道怎得個會說話的回復廷秀走過來道爹爹待我與你回罷王員外這時巴不得有個人兒回話便是好了見廷秀肯去到將先前這股怒氣撇開乃道你若回得甚好看他還穿著紗帽員領又道既如此快去換了衣服廷秀道就是恁般罷了誰耐煩去換趙昂道官府事情不是取笑的廷秀笑道不打緊凡事有我在此料道不累你王員外道你莫不風了廷秀又笑道就是風了也讓我自去不幹你們事只聽得鋪兵鑼響太守已到王員外趙昂著了急撇下廷秀躲進去了廷秀走出門前恰好太守下轎兩下一路打恭直到茶廳上坐下攀談吃過兩杯茶談論多時作別而去有詩為證誰識毗陵邵理刑就是場中王十朋太守自來賓客散仇人暗裡自心驚卻說玉姐日夕母子為伴足跡不下樓來那趙昂妻子因老公選了官在他面前賣弄他也全然不理這一日外邊開筵做戲瑞姐來請看戲玉姐不肯連徐氏因女兒不願也不走出來瞧少頃瑞姐見廷秀在廳前這番鬧炒心下也是駭異又看見當場扮戲故意跑進來報道妹子好了你日逐思想妹夫如今已是回了見在外邊扮戲玉姐只道是生這話來笑他臉上飛紅也不答應徐氏也認是假話不去采他瑞姐見他們冷淡又笑道再去看妹夫做戲即便下樓不一時丫鬟們都進來報徐氏還不肯信親至遮堂後一望果是此人心下又驚又喜暗嘆道如何流落到這個地位瑞姐道母親可是我說謊麼徐氏不去應他竟歸樓上說與女兒玉姐一言不發腮邊珠淚亂落徐氏勸道兒不必苦了還你個夫妻快活過日勸了一回恐王員外又把廷秀逐去放心不下復走出觀看只見趙昂和瑞姐望裡邊亂跑隨後王員外也跑進來你道為何原來王員外趙昂太守到時與眾賓客俱躲入裡邊忽見家人報道三官陪著太守坐了說話眾人通不肯信齊到遮堂後張看果然兩下一遞一答說話王員外暗道原來這冤家已做官了卻喬妝來哄我懊悔昔時錯聽了讒言將他逐出幸喜得女兒有志氣不曾改嫁還好解釋不然卻怎生處只是適來又傷了他幾句言語無顏相見且叫媽媽來做個引頭故此亂跑自古道賊人心虛那趙昂因有舊事在心比王員外更是不同嚇的魂魄俱無報知妻子跑回房裡打點收拾明日起身躲避這個冤家連酒席也不想終了正是早知今日悔不當初且說王員外跑來撞見徐氏便喊道媽媽小女婿回了徐氏道回了便罷何消恁般大驚小怪王員外道不要說起適來如此如此我因無顏見他特請你去做個解冤釋結徐氏得了這幾句話喜從天降乃道有這等事教丫鬟上樓報知玉姐與王員外同出廳前廷秀正送了太守進來眾親眷都來相迎徐氏道三官想殺我也你往何處去了再無處尋訪廷秀方上前請老夫婦坐下納頭便拜王員外以手扶住道賢婿老夫得罪多矣豈敢又要勞拜廷秀道某實不才不能副岳丈之望何云有罪拜罷起來與眾親眷一一相見已畢廷秀道趙姨夫如何不見快請來相會童僕連忙進去趙昂本不欲見他又恐不出去反使他疑心勉強出來相見說道適來言語衝撞望勿記懷廷秀道我是不達自取其辱怎取怪姨夫趙昂羞慚無地王員外見廷秀冷言冷語乃道賢婿當初一時誤聽讒言錯怪你了如今莫計較罷徐氏道你這幾年卻在那裡怎地就得了官廷秀乃將被人謀害直到做官前後話細說卻又不說出兄弟做官的緣由眾親眷聽了無不嗟嘆乃道只是甚冤家下此毒手如今可曉得麼廷秀道若是曉的卻便好了那時廷秀便說旁邊趙昂臉上一回紅一回白好不著急直聽到不曉的這句方纔放下心腸王三叔道不要閑講了且請坐著待我借花獻佛奉敬一杯賀喜眾親眷多要遜廷秀坐第一位廷秀不肯再三謙讓不過只得依了他竟穿著行頭中冠帶向外而坐戲子重新登場定戲這時眾親眷把他好不奉承徐氏自歸樓上不在話下卻說張權解審恤刑卻原是楊洪這班人押解原來捕人拿了強盜每至審錄俱要原捕押解其中恐有冤枉便要對審故此脫他不得那楊洪臨起解時先來與趙昂要銀若干盤纏與兄弟楊江一齊同去及到轉來將張權送入獄中弟兄二人假意來回復趙昂又要需他東西到了專諸巷內一路聽得人說太守方纔到王家拜望楊洪弟兄疑惑道趙昂是個監生官如何太爺去拜他且又不是屬下到了王家門首只聽得裡邊便鬧熱做戲門首悄悄的不見一人卻又不敢進去坐在門前石上等個人出來問個信剛剛坐得忽見一乘四人轎抬到門前歇下走出一位少年官員他二人連忙立起那官員是誰便是庶吉士張文秀他跨入門來抬頭看見二人到吃一嚇認得一個是楊洪一個是謀他性命的公差想道原來是他一路不知為何坐在此間且不說破竟望裡面而去楊洪已不認得向兄弟說趙昂多大官兒卻有大官府來拜你道楊洪如何便認不得了文秀當初謀他命時還是一個小廝如今頂冠束帶換了一番景象如何便認得出文秀乃切骨之仇日夜在心故此一經眼即便認得且說文秀走入裡面早有人看見飛報進去道又有一位官府來拜了說猶未了文秀已至廳前眾親眷並戲子們看見各自四散奔開又單撇下廷秀一人王員外原在遮堂後張看這官員卻又比先前太守不同廷秀也不與他作揖站起身說道你來了那官府道如何見我來都走散了廷秀忍不住笑文秀道且莫笑有句緊話在此附耳低聲道便是謀你我的公差與楊洪都坐在外面廷秀驚道有這等事如何坐在這裡其中可疑快些拿住莫被他走了一面討上冠帶換了身上行頭文秀即差眾家人出去擒拿廷秀一面換起冠帶脫下身上行頭且說眾人趕出去掀翻楊洪兄弟拖入裡邊來楊洪只道是趙昂的緣故口中罵道忘恩負義的賊我與你乾了許多大事今日反打我麼正在亂時報道理刑朱爺到了眾家人將楊洪推在半邊廷秀兄弟出來相迎接在茶廳上坐下廷秀耐不住乃道老先生天下有這般快事謀害愚兄弟的強盜今日自來送死已被拿住朱四府道如今在那裡廷秀教眾人推到面前跪下廷秀道你二人可認得我了楊洪道小人卻認不得二位老爺文秀道難道昔年趁船到鎮江告狀綁入水中的人就不認得了二人聞言已知是張廷秀弟兄嚇的縮作一堆朱四府道且問你有甚冤仇謀害他一家二人道沒甚冤仇朱四府道既無仇隙如何生此歹心二人料然性命難存想起趙昂平日送的銀子又不攀利怎生放得他過便道不幹小人之事都是趙昂與他有仇要謀害二位老爺父子央小人行的廷秀弟兄聞言失驚道原來正是這賊我與他有甚冤仇害我父子朱四府道趙昂是何人住在那裡廷秀道是個粟監就住在此間朱四府喝聲快拿手下人一聲答應蜂擁進去將趙昂拿出那時驚得一家兒啼女喊正不知為甚眾親都從後門走了戲子見這等沸亂也自各散去訖那趙昂見了楊洪二人已知事露並無半言朱四府即起身回到府中先差人至獄內將張權釋放討乘轎子送到王家然後細鞫趙昂初時抵賴用起刑具方纔一一吐實楊洪又招出兩個搖船幫手頃刻也拿到來趙昂楊洪楊江各打六十依律問斬兩個幫手各打四十擬成絞罪俱發司獄司監禁朱四府將廷秀父子被陷始末根繇備文申報撫按會同題請不在話下且說廷秀弟兄送朱四府去後回到裡邊易了公服那時王員外已知先來那官便是張文秀老夫婦齊出來相見問朱四府因甚拿了趙昂廷秀說出其情王員外咬牙切齒恨道原來都是這賊的奸計正說間丫鬟來報瑞姐吊死了原來瑞姐知得事露丈夫拿去必無活理自覺無顏見人故此走了這條徑路王員外與徐氏因恨他夫妻生心害人全無苦楚一面買棺盛殮自不必說王員外分付重整筵席款待一面差人到舟迎取陳氏一時間家人報道朱爺差人送太老爺來了廷秀弟兄王員外一齊出去相迎恰好陳氏轎子也至夫妻母子一見相抱而哭正是苦中得樂渾如夢死裡逃生喜欲狂一家骨肉重聚會千載令人笑趙昂張權道我只道此生永無見期了不料今日復能父子相逢一路哭入堂中先向王員外徐氏稱謝王員外再三請罪然後二子叩拜將趙昂設謀陷害前後情一一細訴說到傷心之處父子又哭不想哭興了竟忘記打發了朱爺差人那差人央家人們來稟知廷秀髮個謝帖賞差人三錢銀子而去當下徐氏邀陳氏自歸後房玉姐下樓拜見姑媳又是一番淒楚少頃筵宴已完內外兩席直飲到半夜方止次日廷秀弟兄到府中謝過朱四府打發了船隻一家都住於王員外家中等邵爺到後完姻赴任廷秀又將邵爺願招文秀為婿的事稟知父母備下聘禮一到便行半月之後邵爺方至河南褚長者夫妻也到常州府迎接的吏書也都到了那時王員外門庭好不熱鬧廷秀主意原作成王三叔為媒先行禮聘了邵小姐然後選起吉日弟兄一齊成親到了是日王員外要誇炫親戚大開筵宴廣請賓朋笙簫括地鼓樂喧天花燭之下烏紗絳袍鳳冠霞帔好不氣象恰好兩對新人配著四雙父母有詩為證四姓親家皆富貴兩雙夫婦倍歡娛枕邊忽訴傷心話淚珠猶然灑繡幘那府縣官聞知都去稱賀三朝之後各自分別起身張權夫婦隨廷秀常州上任褚長者與文秀自往京中邵爺自往福建王員外因家業廣大脫身不得夫妻在家受用不則一日聖旨頒下依擬將趙昂楊洪楊江處斬按院就委廷秀監斬行刑之日看的人如山如海都道趙昂自作之孽親戚中無有憐之者連丈人王員外也不到法場來看正是善惡到頭終有報只爭來早與來遲勸君莫把欺心使湛湛青天不可欺廷秀念種義之恩托朱爺與他開招釋罪又因父親被人陷害每事務必細詢鞫出實情方纔定罪為此聲名甚著行取至京昇為給事文秀以散館點了山西巡按那張權念祖塋俱在江西原歸故土恢復舊業建第居住後來邵爺與褚長者身故廷秀兄弟各自給假為之治喪營葬待三年之後方上表復了本姓廷秀生得三子將次子繼了王員外之後三子繼邵爺之後以表不負昔年父子之恩文秀亦生二子也將次子紹了褚長者香火張權夫婦壽至九旬之外無疾而終王員外夫妻亦享遐齡廷秀弟兄俱官至八座之位至今子孫科甲不斷詩曰繇來白屋出公卿到底窮通未可憑凡事但存天理念安心自有福來迎醒世恆言二馮夢龍
