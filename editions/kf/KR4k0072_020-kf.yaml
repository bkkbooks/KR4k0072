如真的一般滿座稱贊那邵爺深通相法見廷秀相貌堂堂後來必有好處又恐看錯了到半本時喚廷秀近前仔細一觀果是個未發積的公卿只可惜落於下賤問了姓名暗自留意到酒闌人散吩咐眾戲子都去止留正生在此承應夫人明日差人送來潘忠恐廷秀脫身去了滿懷不欲怎奈官府吩咐可敢不依連聲答應引著一班徒弟自去廷秀隨著邵爺直到後堂只見堂中燈燭輝煌擺著桌榼夫人同小姐向前相迎眾家人各自遠遠站立廷秀也立在半邊堂中伏侍俱是丫鬟之輩先是小姐拜壽然後夫人把盞稱慶邵爺回敬過了方纔就坐喚廷秀叩見夫人在旁唱曲廷秀唱了一會邵爺問道張廷秀我看你相貌魁梧決非下流之人你且實說是何處人氏今年幾歲了為甚習此下賤之事細細說來我自有處廷秀見問向前細訴前後始末根由又道小的年紀十八如今扮戲實出無奈非是甘心為此邵爺聞言嗟嘆良久乃道原來你抱此大冤今若流為戲子那有出頭之日既會讀書必能詩詞隨意作一首來看是何如即令左右取過文房四寶放在旁邊一隻卓上廷秀拈起筆來不解思索頃刻而成呈上邵爺舉目觀看乃是一首壽詞詞名千秋歲詞云瓊臺琪草玄鶴翔雲表華筵上笙歌繞玉京瑤島客笑傲乾坤小齊拍手唱道長春人不老北闕龍章耀南極祥光照海屋內籌添了青鳥銜箋至傳報群仙到同嵩祝萬年稱壽考邵爺看了這詞不勝之喜連聲稱好乃道夫人此子才貌兼美定有公卿之分意欲螟蛉為子夫人以為何如夫人道此乃美事有何不可邵爺對廷秀道我今年已六十尚無子嗣你若肯時便請個先生教你也強如當場獻丑廷秀道若得老爺提拔便是再生之恩但小人出身微賤恐為父子玷辱老爺邵爺道何出此言當下四雙八拜認了父母又與小姐拜為姐妹就把椅子坐在旁邊改名邵翼明吩咐家人都稱大相公如有違慢定行重責不在話下且說潘忠那晚眼也不合清早便來伺候等到午上不見出來只得央門上人稟知邵爺喚進去說道張廷秀本是良家之子被人謀害虧你們救了暫為戲子如今我已收留了你們另自合人罷教家人取五兩銀子賞他潘忠聽見邵爺留了廷秀開了口半晌還合不下無可奈何只得叩頭作謝而去邵爺即日就請個先生收拾書房讀書廷秀雖然荒廢多時恰喜得晝夜勤學埋頭兩個多月做來文字渾如錦繡一般邵爺好不快活那年正值鄉試之期即便援例入監到秋間應試中了第五名正魁喜得邵爺眼花沒縫廷秀謝過主司來稟邵爺要到蘇州救父邵爺道你且慢著不如先去會試若得連科謀選彼處地方查訪仇人正法豈不痛快倘或不中也先差人訪出仇家然後我同你去與地方官說知拿來問罪如今若去便是打草驚蛇必被躲過可不勞而無功卻又錯了會試廷秀見說得有理只得依允那時邵爺滿意欲將小姐配他因先繼為子恐人談論自不好啟齒倩媒略露其意廷秀一則為父冤未泄二則未知玉姐志向何如不肯先作負心之人與邵爺說明止住此事收拾上京會試正是未行雪恥酬凶事先作攀花折桂人話分兩頭且說張文秀自到河南已改名褚嗣茂褚長者夫妻珍重如寶延師讀書文秀因日夜思念父母兄長身子雖居河南那肝腸還掛在蘇州那有心情看到書上眼巴巴望著褚長者往下路去販布跟他回家誰知褚長者年紀老邁家道已富褚媽媽勸他棄了這行生意只在家中營運文秀聞得這個消息一發憂鬱成病褚長者請醫調治再三解勸約莫住了一年光景正值宗師考取童生文秀帶病去赴試便得入泮常言道福至心靈文秀入泮之後到將歸家念頭撇過一邊想道我如今進身有路了且趕一名遺纔入場倘得僥幸連科及第那時救父報仇豈不易如翻掌有了這般志氣少不得天隨人願果然有了科舉三場已畢名標榜上赴過鹿鳴宴回到家中拜見父母喜得褚長者老夫妻天花亂墜那時親鄰慶賀賓客填門把文秀好不奉承多少富室豪門情願送千金禮物聘他為婿文秀一心在父親身上那裡肯要忙忙的約了兩個同年收拾行李帶領僕從起身會試褚長者老夫妻直送到十里外方才分別在路曉行夜宿非止一日到了京都覓個寓所安下也是天使其然廷秀文秀兄弟恰好作寓在一處左右間壁時常會面此時居移氣養移體已非舊日枯槁之容了然骨韻猶存不免睹景思形只是一個是浙江邵翼明貴介公子一個是河南褚嗣茂富室之兒做夢也不想到親弟兄頭上不一日三場已畢同寓舉人候榜拉去行院中游串作東戲耍只有邵褚二人堅執不行褚嗣茂遂於寓中治榼邀請邵翼明閑講以遣寂寞兩下坐談愈覺情熱嗣茂遂問邵兄何以不往曲中行走莫非尊大人家訓嚴切翼明潸然下淚答道小弟有傷心之事就是今日會試亦非得已況於閑串那有心情只是尊兄為何也不去行走如此少年老成實是難得嗣茂淒然長嘆道若說起小弟心事比仁兄加倍不堪還仗仁兄高發替小弟做個報仇泄恨之人翼明見話頭有些相近便道你我雖則隔省同年今日天涯相聚便如骨肉一般兄之仇即吾仇也何不明言與小弟知之嗣茂沈吟未答連連被逼只得敘出真情纔說得幾句不待詞畢翼明便道原來你就是文秀兄弟則我就是你哥哥張廷秀兩下抱頭大哭各敘冒姓來歷且喜都中鄉科京都相會一則以悲一則以喜分明久旱逢甘雨賽過他鄉遇故知莫問洞房花燭夜且看金榜掛名時春榜既發邵翼明褚嗣茂俱中在百名之內到得殿試弟兄俱在二甲觀政已過翼明選南直隸常州府推官嗣茂考選了庶吉士入在翰林救父心急遂告個給假與翼明同回蘇州一面寫書打發家人歸河南迎褚長者夫妻至蘇州相會然後入京不提弟兄二人離了京師由陸路而回到了南京廷秀先來拜見邵爺老夫妻不