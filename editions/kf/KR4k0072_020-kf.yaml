body:
  text: 第二十卷張廷秀逃生救父萬事繇天莫強求何須苦苦用機謀飽三餐飯常知足得一帆風便可收生事事生何日了害人人害幾時休冤家宜解不宜結各自回頭看後頭話說國朝自洪武爺開基傳至萬曆爺乃第十三代天子那爺爺聖武神文英明仁孝真個朝無幸位野沒遺賢內中單表江西南昌府進賢縣有一人姓張名權其祖上原是富家報充了個糧長那知就這糧長役內壞了人家把房產陸續弄完傳到張權父親已是寸土不存這役子還不能脫間壁是個徽州小木匠店張權幼年間終日在那店門首閑看拿匠人的斧鑿學做這也是一時戲耍不想父母因家道貧乏見兒子沒甚生理就送他學成這行生意後來父母亡過那徽州木匠也年老歸鄉張權便頂著這店因做人誠實盡有主顧苦掙了幾年遂娶了個渾家陳氏夫妻二人將就過活怎奈裡役還不時纏擾張權與渾家商議離了故土搬至蘇州閶門外皇華亭側邊開了個店兒自起了個別號去那白粉牆上寫兩行大字道江西張仰亭精造堅固小木家火不誤主顧張權自到蘇州生意順溜頗頗得過卻又踏肩生下兩個兒子常言道的好只愁不養不愁不長不覺已到七八歲上送在鄰家一個義學中讀書大的取名廷秀小的喚做文秀這學中共有十來個孩子止他兩個教著便會不上幾年把經書讀的希爛看看廷秀長成一十三歲文秀長成一十二歲都生得眉目疏秀人物軒昂那時先生教他做文字卻就知佈局練格琢句修詞這張權雖是手藝之人因見二子勤苦讀書也有個向上之念誰想這年一秋無雨做了個旱荒寸草不苗大戶人家有米的卻又關倉遏糶只苦了那些小百姓若老若幼餓死無數官府看不過開發義倉賑濟百姓關支的十無三四白白裡與吏胥做了人家又發米於各處寺院煮粥救濟貧民卻又把米侵匿一碗粥中不上幾顆米粒還有把糠秕木屑攪和在內凡吃的俱各嘔吐往往反速其死上人只道百姓咸受其惠那知恁般弊竇有名無實正是任你官清似水難逃吏滑如油且說張權因逢著荒年只得把兒子歇了學也教他學做木匠二子天性聰明那消幾日就學會了且又做得精細比積年老匠更勝幾分喜得張權滿面添花只是木匠便會了做下家火擺在店中絕無人買不勾幾日將平日積下些小本錢看看摸盡連衣服都解當來吃在肚裡張權心下著忙與渾家陳氏商議要尋個所在趁工幾時度過荒年再作區處出去走了幾日無個安身之地只得依先在門首磨打家火眼巴巴望個主顧來買一日正當午後只見一人年紀五十以上穿著一身綢絹衣服旁邊小廝跟隨在街上踱將過去忽抬頭看見張權門首擺列許多家火做得精緻就停住腳觀看張權瞧見便放下手中生活上前招架道員外要甚家火裡面請看那人走上階頭問道這些家火都是你自己做的麼張權道盡是小子親手所造木料又乾又厚工夫精細比別家不同若是作成小子情願奉讓加一那人道我買到不要買問你可肯到人家做些家火麼張權道這也使得不知尊府住在何處要做甚家火那人道我家住在專諸巷內天庫前有名開玉器鋪的王家要做一副嫁妝木料盡多只要做得堅固精巧完了嫁妝還要做些卓椅書櫥等類你若肯做時再揀兩個好副手同來張權正要尋恁般所在這便叫作天賜其便乃答道多承員外下顧不知還在幾時起工那人道你若有工夫就是明日做起張權道既如此明日小子早到宅上伺候便了說罷那人作別而去你道那人是何等樣人物原來姓王名憲積祖豪富家中有幾十萬傢俬傳到他手裡卻又開了一個玉器鋪兒愈加饒裕人見他有錢都稱做王員外那王員外雖然是個富家到也做人謙虛忠厚樂善好施只是一件年過五旬卻沒有子嗣渾家徐氏單生兩個女兒長的喚做瑞姐二年前已招贅了個女婿趙昂在家次女玉姐年方一十四歲未有姻事生得人物聰明姿容端正王員外夫妻鍾愛猶勝過長女那趙昂元是個舊家子弟王員外與其父是通家好友因他父母雙亡王員外念是故人之子就贅入為婿又與他納粟入監指望讀書成器誰知趙昂一納了監生就擴而充之起來把書本撇開穿著一套闊服終日在街坊搖擺為人且又奸狡險惡見王員外沒有兒子以為自己是個贅婿這傢俬恰像木榜上刊定是他承受家業再沒統移的了遇著個老婆卻又是一個不賢慧的班頭一心只向著老公見父母喜歡妹子恐怕也贅個女婿分了傢俬好生妒忌有贅婿詩道的好人家贅婿一何癡異種如何接木枝兩口未曾沾孝順一心只想霸傢俬愁深只為防甥舅念狠兼之妒小姨半子虛名空受氣不如安命沒孩兒話分兩頭且說張權正愁沒飯吃今日攬了這樁大生意心中好生歡喜到次日起來備了些柴米在家分付渾家照看門戶同了兩個兒子帶了斧鑿鋸子進了閶門來到天庫前見個大玉器鋪子張權約莫是王家了立住腳正要問人時只見王員外從裡邊走將出來張權即忙上前相見王員外問道有幾個副手在此張權道止有兩個便教兒子過來見了員外弟兄兩人將家火遞與父親向前深深作揖王員外還了個半禮見是兩個小廝便道我因要做好生活故此尋你怎麼教這小廝來做張權正要開言廷秀上前道員外自古道後生可畏年紀雖小手段不小且試做來看莫要就輕忽了人王員外看見二子人物清秀又且能言快語乃問道這兩個小廝是你甚麼人張權道是小子的兒子王員外道你到生得這兩個好兒子張權道不敢只是沒飯吃王員外道有了恁樣兒子愁甚沒飯吃隨我到裡邊來當下父子三人一齊跟進大廳王員外喚家人王進開了一間房子搬出木料交與張權分付了樣式父子三人量畫定了動起斧鋸手忙腳亂直做到晚吃了夜飯又要個燈火做起夜作半夜方睡一連做了五日成了幾件家火請王員外來看王員外逐件仔細一觀連聲喝采道果然做得精巧他把家火看了一回又看張權兒子一回見他弟兄兩個只顧做生活頭也不抬不覺觸動無子之念嘿然傷感走入裡邊坐在房中一個牆角裡兩個眉頭蹙做一堆骨嘟了嘴口也不開渾家徐氏看見恁般模樣連問幾聲也不答應急走到外邊來問員外適纔與誰惹氣都說纔看了新做的家火進來並不曾與甚人惹氣徐氏問明白了又走到房裡見丈夫依舊如此悶坐乃上前道員外家中吃的盡有穿的盡有雖沒有萬貫傢俬也算做是個財主況今年紀五十以外便日日快活到八十歲也不上三十年了著甚要緊恁般煩惱王員外道媽媽正為後頭日子短了因此煩惱你想我辛勤半世掙了這些少傢俬卻又不曾生得個兒子傳授與他接紹香煙就是有兩個女兒縱養他一百來歲終是別人家媳婦與我毫沒相干譬如瑞姐自與他做親之後一心只對著丈夫把你我便撇在腦後何嘗牽掛父母著些痛熱反不如張木匠是個手藝之人看他年紀還小我十來年到生得兩個好兒子一個個眉清目秀齒白脣紅且又聰明勤謹父子恩恩愛愛不教而善適纔完下幾件家火十分精巧便是積年老手段也做他不過只可惜落在他家做了木匠若我得了這樣一個兒子就請個先生教他讀書怕不是聯科及第光耀祖宗徐氏見丈夫煩惱便解慰道員外這卻也不難常言道著意栽花花不活無心插柳柳成陰既張木匠兒子恁般聰明俊秀何不與他說承繼一個豈不是無子而有子王員外聞言心中歡喜道媽媽所見極是但不知他可肯哩當夜無話到次日飯後王員外走到廳上張權上前說道員外小子今晚要回去看看家裡相求員外借些工錢買辦柴米安頓了敝房明日早來王員外道這個易處我有句話兒問你張權道不知員外有甚分付王員外道兩位令郎今年幾歲叫甚名字張權道大的名廷秀年十四歲了小的名文秀年十二歲了王員外道可識字麼張權道也曾讀過幾年書只為讀書不起就住了字到也識的王員外說道我欲要承繼大令郎為子做個親戚往來你可肯麼張權道員外休得取笑小子乃手藝之人怎敢仰攀宅上就是小兒也沒有恁樣福分王員外道何出此言貧富那個是骨裡帶來的你若肯時就擇個吉日過門我便請個先生教他這些小傢俬好歹都是他的張權見王員外認真要過繼他兒子滿面堆起笑來道既承員外提拔小兒小子怎敢固辭今晚且同回去與敝房說知待員外擇日過門罷王員外道說得是進來回覆了徐氏取出一兩銀子工錢付與張權到晚上領著二子作別回家陳氏接著張權把王員外過繼兒子一事與渾家說知夫妻歡天喜地就是廷秀見說要請先生教他讀書也甚欲得話休絮煩王員外揀了吉日做下一身新衣送來穿著張權將廷秀打扮起來真個人是衣妝佛是金妝廷秀穿了一身華麗衣服比前愈加丰采全不像貧家之子當下廷秀拜別母親作辭兄弟陳氏又將言訓誨教他孝順親熱謙恭下氣廷秀唯唯雖然不是長別母子未免流淚張權親自送到王家只見廳上大排筵席親朋滿座見說到了盡來迎接到廳與眾親戚作揖過了先引去拜過家廟然請王員外夫婦到廳上坐下廷秀上前四雙八拜又與趙昂夫婦對拜又到裡邊與玉姐姐相見其餘內外男女親戚一一拜見已畢入席飲酒就改名王廷秀與玉姐兩下同年因小兩個月排行三官廷秀在席上謙恭揖讓禮數甚周親友無不稱贊內中止有趙昂夫婦心中不悅當日大吹大擂鼓樂喧天直到更餘而散次日張權同著次子來謝過了王員外依先到大廳上去做生活王員外數日內便聘了個先生到家又對張權說二令郎這樣青年美質豈可將他埋沒何不教他同廷秀一齊讀書就在這裡吃些現成茶飯張權道只是又來相擾小子心上不安王員外道如今已是一家何出此言自此文秀也在王家讀書張權另叫副手相幫不提且說文秀弟兄棄書原不多時都還記得那先生見二子聰明盡心指教一年之內三場俱通此時王員外家火已是做完張權趁了若干工銀王員外分外又資助些銀兩依舊在家開店過日雖然將上不足也還比下有餘且說王員外次女玉姐年已一十五歲未有親事做媒的絡繹不絕王員外因是愛女要揀個有才貌的女婿不知說過多少人家再沒有中意的看見廷秀勤謹讀書到有心就要把他為婿還恐不能成就私下詢問先生先生極口稱贊二子文章必然是個大器王員外見先生贊揚太過只道是面諛之詞反放心不下即討幾篇文字送與相識老學觀看所言與先生相合心下喜歡來對渾家商議徐氏也愛廷秀人材出眾又肯讀書一力攛掇王員外的主意已定央族弟王三叔往張家為媒王三叔得了言語一徑來到張家把王員外要贅廷秀為婿的話說與張權張權推託門戶不當不肯應承王三叔道此是家兄因愛令郎才貌異日定有些好處故此情願又非你去求他何必推辭張權方纔依允王三叔回覆了王員外便去擇選吉日行聘不提單表趙昂夫婦初時見王員外承繼張廷秀為子又請先生教他讀書心中已是不樂只不好來阻當今日見說要將玉姐贅他為婿愈加妒忌夫妻兩個商議了說話要來攔阻這事當下趙昂先走入來見王員外道有句話兒本不該小婿多口只是既在此間事同一體不得不說又恐說時反要招怪不敢啟齒王員外道我有甚差誤處得你點撥乃是正理怎麼怪你趙昂道便是小姨的親事向日有多少名門巨族求親岳父都不應承如何卻要配與三官我想他是個小戶出身岳父承繼在家不過是個養子原不算十分正經無人議論今若贅做女婿豈不被人笑話王員外笑道賢婿這事不勞你過懮我自有主見在此常言道會嫁嫁對