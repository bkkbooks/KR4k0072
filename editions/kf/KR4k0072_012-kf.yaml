body:
  text: 第十二卷佛印師四調琴娘文章落處天須泣此老已亡吾道窮纔業謾誇生仲達功名猶繼死姚崇人間便覺無清氣海內安能見古風平日萬篇何所在六丁收拾上瑤宮這八句詩是誰做的是宋理宗皇帝朝一個官人姓劉名莊道號後村先生做的單說那神宗皇帝朝有個翰林學士姓蘇名軾字子瞻道號東坡居士本貫是四川眉州眉山縣人氏這學士平日結識一個道友叫做佛印禪師你道這禪師如何出身他是江西饒州府浮梁縣人氏姓謝名端卿表字覺老幼習儒書通古今之蘊旁通二氏負博洽之聲一日應舉到京東坡學士聞其纔名每與談論甚相敬愛屢同詩酒之游遂為莫逆之友忽一日神宗皇帝因天時亢旱准了司天台奏章特於大相國寺建設一百八分大齋徵取名僧宣揚經典祈求甘雨以救萬民命翰林學士蘇軾制就吁天文疏就命軾充行禮官主齋三日前便要到寺中齋宿先有內官到寺看閱齋壇傳言御駕不日親臨方丈中備設御座一切規模務要十分齊整把個大相國寺打掃得一塵不染妝點到萬錦攢花府尹預先差官四圍把守不許閑人入寺恐防不時觸突了聖駕這都不在話下卻說謝端卿在東坡學士處聞知此事問道小弟欲兄長挈帶入寺一瞻御容未知可否東坡那時只合一句回絕了他何等乾淨只為東坡要得端卿相伴遂對他說道足下要去亦有何難只消扮作侍者模樣在齋壇上承直聖駕臨幸時便得飽看謝端卿那時若不肯扮做侍者也就罷了只為一時稚氣遂欣然不辭先去借辦行頭裝扮的停停噹噹跟隨東坡學士入相國寺來東坡已自分付了主僧只等報一聲聖駕到來端卿就頂侍者名色上殿執役閑時陪東坡在淨室閑講且說起齋之日主僧五鼓鳴鐘聚眾其時香煙繚繞燈燭輝煌幡幢五彩飄揚樂器八音嘹亮法事之盛自不必語東坡學士起了香頭拜了佛像退坐於僧房之內早齋方罷忽傳御駕已到東坡學士執掌絲綸日覲天顏到也不以為事慌得謝端卿面上紅熱心頭突突地跳矜持了一回按定心神來到大雄寶殿雜於侍者之中無過是添香剪燭供食鋪燈不一時神宗皇帝駕到東坡學士同眾僧擺班跪迎進入大殿內官捧有內府龍香神宗御手拈香已畢鋪設淨褥行三拜禮主僧引駕到於方丈神宗登了御座眾人叩見了畢神宗誇東坡學士所作文疏之美東坡學士再拜口稱不敢主僧取旨獻茶捧茶盤的卻是謝端卿原來端卿因大殿行禮之時擁擁簇簇不得仔細瞻仰特地充作捧茶盤的侍者直捱到龍座御膝之前偷眼看聖容時果然龍鳳之姿天日之表天威咫尺毛骨俱悚不敢恣意觀瞻慌忙退步卻被神宗龍目看見了只為端卿生得方面大耳秀目龍眉身軀偉岸與其他侍者不同所以天顏刮目當下開金口啟玉言指著端卿問道此侍者何方人氏在寺幾年了主僧先不曾問得備細一時不能對答還是謝端卿有量叩頭奏道臣姓謝名端卿江西饒州府人新來寺中出家幸瞻天表不勝欣幸神宗見他應對明敏龍情大喜又問卿頗通經典否端卿奏道臣自少讀書內典也頗知神宗道卿既通內典賜卿法名了元號佛印就於御前披剃為僧那謝端卿的學問與東坡肩上肩下他為應舉到京指望一舉成名建功立業如何肯做和尚常言道王言如天語違背聖旨罪該萬死今日玉音分付如何敢說我是假充的侍者不願為僧心下十萬分不樂一時出於無奈只得叩頭謝恩當下主僧引端卿重來正殿參見了如來然後引至御前如法披剃欽賜紫羅袈裟一領隨駕禮部官取羊皮度牒一道中書房填寫佛印法名及生身籍貫奏旨披剃年月付端卿受領端卿披了袈裟紫氣騰騰分明是一尊肉身羅漢手捧度牒重複叩頭謝恩神宗道卿既為僧即委卿協理齋事異日精嚴戒律便可作本寺主持勿得玷辱宗門有負朕意說罷起駕東坡和眾僧於寺門之外跪送過了依元來做齋事不在話下從此擱起端卿名字只稱佛印眾人都稱為印公為他是欽賜剃度好生敬重原來故宋時最以剃度為重每度牒一張要費得千貫錢財方得到手今日端卿不費分文得了度牒為僧若是個真侍者豈不是千古奇逢萬分歡喜只為佛印弄假成真非出本心一時勉強出家有好幾時氣悶不過後來只在相國寺翻經轉藏精通佛理把功名富貴之想化作清淨無為之業他原是個明悟禪師轉世根氣不同所以出儒入墨如洪爐點雪東坡學士他是個用世之人識見各別他道謝端卿本為上京赴舉我帶他到大相國寺教他假充侍者瞻仰天顏遂爾披剃為僧卻不是我連累了他他今在空門枯淡必有恨我之意雖然他戒律精嚴只恐體面上矜持心中不能無動每每於語言之間微微挑逗誰知佛印心冷如冰口堅如鐵全不見絲毫走作東坡只是不信後來東坡為吟詩觸犯了時相連遭謫貶到哲宗皇帝元年間復召為翰林學士其時佛印遊方轉來仍在相國寺掛錫年力尚壯東坡一見想起初年披剃之事遂勸佛印若肯還俗出仕下官當力薦清職佛印那裡肯依東坡遂嘲之曰不毒不禿不禿不毒轉毒轉禿轉禿轉毒佛印笑而不答那一日仲春天氣學士正在府中閑坐只見院子來報佛印禪師在門首學士聽得教請入來須臾之間佛印入到堂上見學士敘禮畢教院子點將茶來茶罷學士便令院子於後園中灑掃亭軒邀佛印同到園中去一座相近後堂的亭子坐定院子安排酒果餚饌之類排完使院子斟酒二人對酌酒至三巡學士道筵中無樂不成歡笑下官家中有一樂童令歌數曲以助筵前之樂道罷便令院子傳言入堂內去不多時佛印驀然耳內聽得有人唱詞真個唱得好聲清韻美紛紛塵落雕梁字正腔真拂拂風生綺席若上苑流鶯巧囀似丹山彩鳳和鳴詞歌白雪陽春曲唱清風明月佛印聽至曲終道奇哉韓娥之吟秦青之詞雖不遏住行雲也解梁塵撲簇東坡道吾師何不留一佳作佛印道請乞紙筆學士遂令院子取將文房四寶放在面前佛印口中不道心下自言唱卻十分唱得好了卻不知人物生得如何遂拈起筆來做一詞詞名西江月窄地重重簾幕臨風小小亭軒綠窗朱戶映嬋娟忽聽歌謳宛轉既是耳根有分因何眼界無緣分明咫尺遇神仙隔個繡簾不見佛印寫罷學士大笑曰吾師之詞所恨不見令院子向前把那簾子只一卷捲起一半佛印打一看時只見那女孩兒半截露出那一雙彎彎小腳兒佛印口中不道心下思量雖是捲簾已半奈簾鉤低下終不見他生得如何學士道吾師既是見了何惜一詞佛印見說便拈起筆來又做一詞詞名品字令覷著腳想腰肢如削歌罷遏雲聲怎得向掌中托醉眼不如歸去強把身心虛霍幾回欲待去掀簾猶恐主人惡佛印意不盡又做四句詩道只聞檀板與歌謳不見如花似玉眸焉得好風從地起倒垂簾卷上金鉤佛印吟詩罷東坡大笑教左右卷上繡簾喚出那女孩兒從裡面走出來看著佛印道了個深深萬福那女孩兒端端正正整容斂袂立於亭前佛印把眼一覷不但唱得好真個生得好但見娥眉淡拂蓮臉微勻輕盈真物外之仙雅淡有天然之態衣染鮫綃手持象板呈露筍指尖長足步金蓮行動鳳鞋弓小臨溪雙洛浦對月兩嫦娥好好好好如天上女強強強強似月中仙東坡喚院子斟酒叫那女孩兒近前來與吾師把盞學士道此女小字琴娘自幼在於府中善知音樂能撫七弦之琴會曉六藝之事吾師今日既見何惜佳作佛印當時已自八分帶酒言稱告回琴娘曰禪師且坐再飲幾杯佛印見學士所說便拿起筆來又寫一詞詞名蝴戀花執板嬌娘留客住初整金釵十指尖尖露歌斷一聲天外去清音已遏行雲住耳有姻緣能聽事眼見姻緣便得當前覷眼耳姻緣都已是姻緣別有知何處佛印寫罷東坡見了大喜便喚琴娘就唱此詞勸酒再飲數杯佛印大醉不知詞中語失天色已晚學士遂令院子扶入書院內安排和尚睡了學士心中暗想我一向要勸這和尚還俗出仕他未肯統口趁他今日有調戲琴娘之意若得他與這小妮子得手時便是出家不了那時拿定他破綻定要他還俗何怕他不從好計好計即喚琴娘到於面前道你省得那和尚做的詞中意後兩句道眼耳姻緣都已是姻緣別有知何處這和尚不是好人其中有愛慕你之心你可今夜到書院相伴和尚就寢須要了事可討執照來我明日賞你三千貫作房奩之資我與你主張教你出嫁良人如不了事明日喚管家婆來把你決竹篦二十逐出府門琴娘聽罷唬得顫做一團道領東人鈞旨離了房中輕移蓮步懷著羞臉徑來到書院內佛印已自大醉昏迷不省睡在涼床之上壁上燈尚明琴娘無計奈何坐在和尚身邊用尖尖玉手去搖那和尚時一似蜻蜒搖石柱螻蟻撼太山和尚鼻息如雷那裡搖得覺話休絮煩自初更搖起只要守和尚省覺直守到五更也不省那琴娘心中好慌不覺兩眼淚下自思量道倘或今夜不了得事明日乞二十竹篦逐出府門卻是怎地好爭奈和尚大醉不了得事琴娘彈眼淚卻好彈在佛印臉上只見那佛印颯然驚覺閃開眼來壁上燈尚明去那燈光之下只見一個如花似玉女子坐在身邊佛印大驚道你是誰家女子深夜至此有何理說琴娘見問且驚且喜揣著羞臉道個萬福道賤妾乃日間唱曲之琴娘也聽得禪師詞中有愛慕賤妾之心故夤夜前來無人知覺欲與吾師效雲雨之歡萬乞勿拒則個佛印聽說罷大驚曰娘子差矣貧僧夜來感蒙學士見愛置酒管待乘醉亂道此詞豈有他意娘子可速回倘有外人見之無絲有線吾這清德一旦休矣琴娘聽罷那裡肯去佛印見琴娘只管尤歹帶不肯去便道是了是了此必是學士教你苦難我來吾修行數年止以詩酒自娛豈有塵心俗意你若實對我說我有救你之心如是不從別無區處琴娘見佛印如此說罷眼中垂淚道此果是學士使我來如是吾師肯從賤妾雲雨之歡明日賞錢三千貫出嫁良人如吾師不從明日喚管家婆決竹篦二十逐出府門望吾師周全救我道罷深深便拜佛印聽罷呵呵大笑便道你休煩惱我救你遂去書袋內取出一副紙有見成文房四寶在卓上佛印捻起筆來做了一隻詞名浪淘沙昨夜遇神仙也是姻緣分明醉裡亦如然睡覺來時渾是夢卻在身邊此事怎生言豈敢相憐不曾撫動一條弦傳與東坡蘇學士觸處封全佛印寫了意不盡又做了四句詩傳與巫山窈窕娘休將魂夢惱襄王禪心已作沾泥絮不逐東風上下狂當下琴娘得了此詞徑回堂中呈上學士學士看罷大喜自到書院中見佛印盤膝坐在椅上東坡道善哉善哉真禪僧也亦賞琴娘三百貫錢擇嫁良人東坡自此將佛印愈加敬重遂為入幕之賓雖妻妾在傍並不回避佛印時時把佛理曉悟東坡東坡漸漸信心後來東坡臨終不亂相傳已證正果至今人猶喚為坡仙多得佛印點化之力有詩為證東坡不能化佛印佛印反得化東坡若非佛力無邊大那得慈航渡愛河
