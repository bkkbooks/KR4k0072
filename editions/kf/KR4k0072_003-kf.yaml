賣了他一個就討得五六個若湊巧撞得著相應的十來個也討得的這等便宜事如何不做王九媽道老身也曾算計過來那些有錢有力的不肯出錢專要討人便宜及至肯出幾兩銀子的女兒又嫌好道歉做張做智的不肯若有好主兒妹子做媒作成則個倘若這丫頭不肯時節還求你攛掇這丫頭做娘的話也不聽只你說得他信話得他轉劉四媽呵呵大笑道做妹子的此來正為與侄女做媒你要許多銀子便肯放他出門九媽道妹子你是明理的人我們這行戶中只有賤買那有賤賣況且美兒數年盛名滿臨安誰不知他是花魁娘子難道三百四百就容他走動少不得要他千金劉四媽道待妹子去講若肯出這個數目做妹子的便來多口若合不著時就不來了臨行時又故意問道侄女今日在那裡王九媽道不要說起自從那日吃了吳八公子的虧怕他還來淘氣終日裡抬個轎子各宅去分訴前日在齊太尉家昨日在黃翰林家今日又不知在那家去了劉四媽道有了你老人家做主按定了坐盤星也不容侄女不肯萬一不肯時做妹子自會勸他只是尋得主顧來你卻莫要捉班做勢九媽道一言既出並無他說九媽送至門首劉四媽叫聲口舌噪上轎去了這纔是數黑論黃雌陸賈說長話短女隨何若還都像虔婆口尺水能興萬丈波劉四媽回到家中與美娘說道我對你媽媽如此說這般講你媽媽已自肯了只要銀子見面這事立地便成美娘道銀子已曾辦下明日姨娘千萬到我家來玉成其事不要冷了場改日又費講四媽道既然約定老身自然到宅美娘別了劉四媽回家一字不提次日午牌時分劉四媽果然來了王九媽問道所事如何四媽道十有八九只不曾與侄女說過四媽來到美娘房中兩下相叫了講了一回說話四媽道你的主兒到了不曾那話兒在那裡娘美指著床頭道在這幾隻皮箱裡美娘把五六隻皮箱一時都開了五十兩一封搬出十三四封來又把些金珠寶玉算價足勾千金之數把個劉四媽驚得眼中出火口內流涎想道小小年紀這等有肚腸不知如何設法積下許多東西我家這幾個粉頭一般接客趕得著他那裡不要說不會生髮就是有幾文錢在荷包裡閑時買瓜子磕買糖兒吃兩條腳布破了還要做媽的與他買布哩偏生九阿姐造化討得著年時賺了若干錢鈔臨出門還有這一主大財又是取諸宮中不勞餘力這是心中暗想之語卻不曾說出來美娘見劉四媽沈吟只道他作難索謝慌忙又取出四匹潞綢兩股寶釵一對鳳頭玉簪放在卓上道這幾件東西奉與姨娘為伐柯之敬劉四媽歡天喜地對王九媽說道侄女情願自家贖身一般身價並不短少分毫比著孤老贖身更好省得閑漢們從中說合費酒費漿還要加一加二的謝他王九媽聽得說女兒皮箱內有許多東西到有個咈然之色你道卻是為何世間只有鴇兒的狠做小娘的設法些東西都送到他手裡纔是快活也有做些私房在箱籠內鴇兒曉得些風聲專等女兒出門扌典開鎖鑰翻箱倒籠取個罄空只為美娘盛名之下相交都是大頭兒替做娘的掙得錢鈔又且性格有些古怪等閑不敢觸他故此臥房裡面鴇兒的腳也不搠進去誰知他如此有錢劉四媽見九媽顏色不善便猜著了連忙道九阿姐你休得三心兩意這些東西就是侄女自家積下的也不是你本分之錢他若肯花費時也花費了或是他不長進把來津貼了得意的孤老你也那裡知道這還是他做家的好處況且小娘自己手中沒有錢鈔臨到從良之際難道赤身趕他出門少不得頭上腳下都要收拾得光鮮等他好去別人家做人如今他自家拿得出這些東西料然一絲一線不費你的心這一主銀子是你完完全全鱉在腰胯裡的他就贖身出去怕不是你女兒倘然他掙得好時時朝月節怕他不來孝順你就是嫁了人時他又沒有親爹親娘你也還去做得著他的外婆受用處正有哩只這一套話說得王九媽心中爽然當下應允劉四媽就去搬出銀子一封封兌過交付與九媽又把這些金珠寶玉逐件指物作價對九媽說道這都是做妹子的故意估下他些價錢若換與人還便宜得幾十兩銀子王九媽雖同是個鴇兒到是個老實頭兒憑劉四媽說話無有不納劉四媽見王九媽收了這主東西便叫亡八寫了婚書交付與美兒美兒道趁姨娘在此奴家就拜別了爹媽出門借姨娘家住一兩日擇吉從良未知姨娘允否劉四媽得了美娘許多謝禮生怕九媽翻悔巴不得美娘出了他門完成一事說道正該如此當下美娘收拾了房中自己的梳臺拜匣皮箱鋪蓋之類但是鴇兒家中之物一毫不動收拾已完隨著四媽出房拜別了假爹假媽和那姨娘行中都相叫了王九媽一般哭了幾聲美娘喚人挑了行李欣然上轎同劉四媽到劉家去四媽出一間幽靜的好房頓下美娘行李眾小娘都來與美娘叫喜是晚朱重差莘善到劉四媽家討信已知美娘贖身出來擇了吉日笙簫鼓樂娶親劉四媽就做大媒送親朱重與花魁娘子花燭洞房歡喜無限雖然舊事風流不減新婚佳趣次日莘善老夫婦請新人相見各各相認吃了一驚問起根由至親三口抱頭而哭朱重方纔認得是丈人丈母請他上坐夫妻二人重新拜見親鄰聞知無不駭然是日整備筵席慶賀兩重之喜飲酒盡歡而散三朝之後美娘教丈夫備下幾副厚禮分送舊相知各宅以酬其寄頓箱籠之恩並報從良信息此是美娘有始有終處王九媽劉四媽家各有禮物相送無不感激滿月之後美娘將箱籠打開內中都是黃白之資吳綾蜀錦何止百計共有三千餘金都將匙鑰交付丈夫慢慢的買房置產整頓家當油鋪生理都是丈人莘公管理不上一年把家業掙得花錦般相似驅奴使婢甚有氣象朱重感謝天地神明保佑之德發心於各寺廟喜捨合殿香燭一套供琉璃燈油三個月齋戒沐浴親往拈香禮拜先從昭慶寺起其他靈隱法相淨慈天竺等寺以次而行就中單說天竺寺是觀音大士的香火有上天竺中天竺下天竺三處香火俱盛卻是山路不通舟楫朱重叫從人挑了一擔香燭三擔清油自己乘轎而往先到上天竺來寺僧迎接上殿老香火秦公點燭添香此時朱重居移氣養移體儀容魁岸非復幼時面目秦公那裡認得他是兒子只因油桶上有個大大的秦字又有汴梁二字心中甚以為奇也是天然湊巧剛剛到上天竺偏用著這兩隻油桶朱重拈香已畢秦公托出茶盤主僧奉茶秦公問道不敢動問施主這油桶上為何有此三字朱重聽得問聲帶著汴梁人的土音忙問道老香火你問他怎麼莫非也是汴梁人麼泰公道正是朱重道你姓甚名誰為何在此出家共有幾年了秦公把自己姓名鄉里細細告訴其年上避兵來此因無活計將十三歲的兒子秦重過繼與朱家如今有八年之遠一向為年老多病不曾下山問得信息朱重一把抱住放聲大哭道孩兒便是秦重向在朱家挑油買賣正為要訪求父親下落故此於油桶上寫汴梁秦三字做個標識誰知此地相逢真乃天與其便眾僧見他父子別了八年今朝重會各各稱奇朱重這一日就歇在上天竺與父親同宿各敘情節次日取出中天竺下天竺兩個疏頭換過內中朱重仍改做秦重復了本姓兩處燒香禮拜已畢轉到上天竺要請父親回家安樂供養秦公出家已久吃素持齋不願隨兒子回家秦重道父親別了八年孩兒有缺侍奉況孩兒新娶媳婦也得他拜見公公方是秦公只得依允秦重將轎子讓父親乘坐自己步行直到家中秦重取出一套新衣與父親換了中堂設坐同妻莘氏雙雙參拜親家莘公親母阮氏齊來見禮此日大排筵席秦公不肯開葷素酒素食次日鄰里斂財稱賀一則新婚二則新娘子家眷團圓三則父子重逢四則秦小官歸宗復姓共是四重大喜一連又吃了幾日喜酒秦公不願家居思想上天竺故處清淨出家秦重不敢違親之志將銀二百兩於上天竺另造淨室一所送父親到彼居住其日用供給按月送去每十日親往候問一次每一季同莘氏往候一次那秦公活到八十餘端坐而化遺命葬於本山此是後話卻說秦重和莘氏夫妻偕老生下兩個孩兒俱讀書成名至今風月中市語凡誇人善於幫襯都叫做秦小官又叫賣油郎有詩為證春來處處百花新蜂蝶紛紛競采春堪愛豪家多子弟風流不及賣油人
