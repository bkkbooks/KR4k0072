body:
  text: 第三卷賣油郎獨佔花魁年少爭誇風月場中波浪偏多有錢無貌意難和有貌無錢不可就是有錢有貌還須著意揣摩知情識趣俏哥哥此道誰人賽我這首詞名為西江月是風月機關中撮要之論常言道妓愛俏媽愛鈔所以子弟行中有了潘安般貌鄧通般錢自然上和下睦做得煙花寨內的大王鴛鴦會上的主盟然雖如此還有個兩字經兒叫做幫襯幫者如鞋之有幫襯者如衣之有襯但凡做小娘的有一分所長得人襯貼就當十分若有短處曲意替他遮護更兼低聲下氣送暖偷寒逢其所喜避其所諱以情度情豈有不愛之理這叫做幫襯風月場中只有會幫襯的最討便宜無貌而有貌無錢而有錢假如鄭元和在卑田院做了乞兒此時囊篋俱空容顏非舊李亞仙於雪天遇之便動了一個惻隱之心將繡襦包裹美食供養與他做了夫妻這豈是愛他之錢戀他之貌只為鄭元和識趣知情善於幫襯所以亞仙心中捨他不得你只看亞仙病中想馬板腸湯吃鄭元和就把個五花馬殺了取腸煮湯奉之只這一節上亞仙如何不念其情後來鄭元和中了狀元李亞仙封為國夫人蓮花落打出萬年策卑田院只做了白玉堂一床錦被遮蓋風月場中反為美談這是運退黃金失色時來鐵也生光話說大宋自太祖開基太宗嗣位歷傳真仁英神哲共是七代帝王都則偃武修文民安國泰到了徽宗道君皇帝信任蔡京高俅楊戩朱面力之徒大興苑囿專務遊樂不以朝政為事以致萬民嗟怨金虜乘之而起把花錦般一個世界弄得七零八落直至二帝蒙塵高宗泥馬渡江偏安一隅天下分為南北方得休息其中數十年百姓受了多少苦楚正是甲馬叢中立命刀槍隊裡為家殺戮如同戲耍搶奪便是生涯內中單表一人乃汴梁城外安樂村居住姓莘名善渾家阮氏夫妻兩口開個六陳鋪兒雖則糶米為生一應麥豆茶酒油鹽雜貨無所不備家道頗頗得過年過四旬止生一女小名叫做瑤琴自小生得清秀更且資性聰明七歲上送在村學中讀書日誦千言十歲時便能吟詩作賦曾有閨情一絕為人傳誦詩云朱簾寂寂下金鉤香鴨沈沈冷畫樓移枕怕驚鴛並宿挑燈偏恨蕊雙頭到十二歲琴棋書畫無所不通若題起女工一事飛針走線出人意表此乃天生伶俐非教習之所能也莘善因為自家無子要尋個養女婿來家靠老只因女兒靈巧多能難乎其配所以求親者頗多都不曾許不幸遇了金虜猖獗把汴梁城圍困四方勤王之師雖多宰相主了和議不許廝殺以致虜勢愈甚打破了京城劫遷了二帝那時城外百姓一個個亡魂喪膽攜老扶幼棄家逃命卻說莘善領著渾家阮氏和十二歲的女兒同一般逃難的背著包裹結隊而走忙忙如喪家之犬急急如漏網之魚擔渴擔飢擔勞苦此行誰是家鄉叫天叫地叫祖宗惟願不逢韃虜正是寧為太平犬莫作亂離人正行之間誰想韃子到不曾遇見卻逢著一陣敗殘的官兵他看見許多逃難的百姓多背得有包裹假意吶喊道韃子來了沿路放起一把火來此時天色將晚嚇得眾百姓落荒亂竄你我不相顧他就乘機搶掠若不肯與他就殺害了這是亂中生亂苦上加苦卻說莘氏瑤琴被亂軍衝突跌了一交爬起來不見了爹娘不敢叫喚躲在道傍古墓之中過了一夜到天明出外看時但見滿目風沙死屍橫路昨日同時避難之人都不知所往瑤琴思念父母痛哭不已欲待尋訪又不認得路徑只得望南而行哭一步捱一步約莫走了二里之程心上又苦腹中又飢望見土房一所想必其中有人欲待求乞些湯飲及至向前卻是破敗的空屋人口俱逃難去了瑤琴坐於土牆之下哀哀而哭自古道無巧不成話恰好有一人從牆下而過那人姓卜名喬正是莘善的近鄰平昔是個游手游食不守本分慣吃白食用白錢的主兒人都稱他是卜大郎也是被官軍沖散了同夥今日獨自而行聽得啼哭之聲慌忙來看瑤琴自小相認今日患難之際舉目無親見了近鄰分明見了親人一般即忙收淚起身相見問道卜大叔可曾見我爹媽麼卜喬心中暗想昨日被官軍搶去包裹正沒盤纏天生這碗衣飯送來與我正是奇貨可居便扯個謊道你爹和媽尋你不見好生痛苦如今前面去了分付我道倘或見我女兒千萬帶了他來送還了我許我厚謝瑤琴雖是聰明正當無可奈何之際君子可欺以其方遂全然不疑隨著卜喬便走正是情知不是伴事急且相隨卜喬將隨身帶的乾糧把些與他吃了分付道你爹媽連夜走的若路上不能相遇直要過江到建康府方可相會一路上同行我權把你當女兒你權叫我做爹不然只道我收留迷失子女不當穩便瑤琴依允從此陸路同步水路同舟爹女相稱到了建康府路上又聞得金兀朮四太子引兵渡江眼見得建康不得寧息又聞得康王即位已在杭州駐蹕改名臨安遂趁船到潤州過了蘇常嘉湖直到臨安地面暫且飯店中居住也虧卜喬自汴京至臨安三千餘裡帶那莘瑤琴下來身邊藏下些散碎銀兩都用盡了連身上外蓋衣服脫下准了店錢止剩得莘瑤琴一件活貨欲行出脫訪得西湖上煙花王九媽家要討養女遂引九媽到店中看貨還錢九媽見瑤琴生得標致講了財禮五十兩卜喬兌足了銀子將瑤琴送到王家原來卜喬有智在王九媽前只說瑤琴是我親生之女不幸到你門戶人家須是款款的教訓他自然從願不要性急在瑤琴面前又只說九媽是我至親權時把你寄頓他家待我從容訪知你爹媽下落再來領你以此瑤琴欣然而去可憐絕世聰明女墮落煙花羅網中王九媽新討了瑤琴將他渾身衣服換個新鮮藏於曲樓深處終日好茶好飯去將息他好言好語去溫暖他瑤琴既來之則安之住了幾日不見卜喬回信思量爹媽噙著兩行珠淚問九媽道卜大叔怎不來看我九媽道那個卜大叔瑤琴道便是引我到你家的那個卜大郎九媽道他說是你的親爹瑤琴道他姓卜我姓莘遂把汴梁逃難失散了爹媽中途遇見了卜喬引到臨安並卜喬哄他的說話細述一遍九媽道原來恁地你是個孤身女兒無腳蟹我索性與你說明罷那姓卜的把你賣在我家得銀五十兩去了我們是門戶人家靠著粉頭過活家中雖有三四個養女並沒個出色的愛你生得齊整把做個親女兒相待待你長成之時包你穿好吃好一生受用瑤琴聽說方知被卜喬所騙放聲大哭九媽勸解良久方止自此九媽將瑤琴改做王美一家都稱為美娘教他吹彈歌舞無不盡善長成一十四歲嬌艷非常臨安城中這些富豪公子慕其容貌都備著厚禮求見也有愛清標的聞得他寫作俱高求詩求字的日不離門弄出天大的名聲出來不叫他美娘叫他做花魁娘子西湖上子弟編出一隻掛枝兒單道那花魁娘子的好處小娘中誰似得王美兒的標致又會寫又會畫又會做詩吹彈歌舞都餘事常把西湖比西子就是西子比他也還不如那個有福的湯著他身兒也情願一個死只因王美有了個盛名十四歲上就有人來講梳弄一來王美不肯二來王九媽把女兒做金子看成見他心中不允分明奉了一道聖旨並不敢違拗又過了一年王美年方十五原來門戶中梳弄也有個規矩十三歲太早謂之試花皆因鴇兒愛財不顧痛苦那子弟也只博個虛名不得十分暢快取樂十四歲謂之開花此時天癸已至男施女受也算當時了到十五謂之摘花在平常人家還算年小惟有門戶人以為過時王美此時未曾梳弄西湖上子弟又編出一隻掛枝兒來王美兒似木瓜空好看十五歲還不曾與人湯一湯有名無實成何干便不是石女也是二行子的娘若還有個好好的羞羞也如何熬得這些時癢王九媽聽得這些風聲怕壞了門面來勸女兒接客王美執意不肯說道要我會客時除非見了親生爹媽他肯做主時方纔使得王九媽心裡又惱他又不捨得難為他捱了好些時偶然有個金二員外大富之家情願出三百兩銀子梳弄美娘九媽得了這主大財心生一計與金二員外商議若要他成就除非如此如此金二員外意會了其日八月十五日只說請王美湖上看潮請至舟中三四個幫閑俱是會中之人猜拳行令做好做歉將美娘灌得爛醉如泥扶到王九媽家樓中臥於床上不省人事此時天氣和暖又沒幾層衣服媽兒親手伏侍剝得他赤條條任憑金二員外行事金二員外那話兒又非兼人之具輕輕的橕開兩股用些涎沫送將進去比及美娘夢中覺痛醒將轉來已被金二員外耍得勾了欲待掙扎爭奈手足俱軟繇他輕薄了一回直待綠暗紅飛方始雨收雲散正是雨中花蕊方開罷鏡裡娥眉不似前五鼓時美娘酒醒已知鴇兒用計破了身子自憐紅顏命薄遭此強橫起來解手穿了衣服自在床邊一個斑竹榻上朝著裡壁睡了暗暗垂淚金二員外來親近他時被他劈頭劈臉抓有幾個血痕金二員外好生沒趣捱得天明對媽兒說聲我去也媽兒要留他時已自出門去了從來梳弄的子弟早起時媽兒進房賀喜行戶中都來稱慶還要吃幾日喜酒那子弟多則住一二月最少也住半月二十日只有金二員外侵早出門是從來未有之事王九媽連叫詫異披衣起身上樓只見美娘臥於榻上滿眼流淚九媽要哄他上行連聲招許多不是美娘只不開口九媽只得下樓去了美娘哭了一日茶飯不沾從此託病不肯下樓連客也不肯會面了九媽心下焦燥欲待把他凌虐又恐他烈性不從反冷了他的心腸欲待繇他本是要他賺錢若不接客時就養到一百歲也沒用躊躇數日無計可施忽然想起有個結義妹子叫做劉四媽時常往來他能言快語與美娘甚說得著何不接取他來下個說詞若得他迴心轉意大大的燒個利市當下叫保兒去請劉四媽到前樓坐下訴以衷情劉四媽道老身是個女隨何雌陸賈說得羅漢思情嫦娥想嫁這件事都在老身身上九媽道若得如此做姐的情願與你磕頭你多吃杯茶去免得說話時口乾劉四媽道老身天生這副海口便說到明日還不幹哩劉四媽吃了幾杯茶轉到後樓只見樓門緊閉劉四媽輕輕的叩了一下叫聲侄女美娘聽得是四媽聲音便來開門兩下相見了四媽靠桌朝下而坐美娘傍坐相陪四媽看他桌上鋪著一幅細絹纔畫得個美人的臉兒還未曾著色四媽稱贊道畫得好真是巧手九阿姐不知怎生樣造化偏生遇著你這一個伶俐女兒又好人物又好技藝就是堆上幾千兩黃金滿臨安走遍可尋出個對兒麼美娘道休得見笑今日甚風吹得姨娘到來劉四媽道老身時常要來看你只為家務在身不得空閑聞得你恭喜梳弄了今日偷空而來特特與九阿姐叫喜美兒聽得提起梳弄二字滿臉通紅低著頭不來答應劉四媽知他害羞便把椅兒掇上一步將美娘的手兒牽著叫聲我兒做小娘的不是個軟殼雞蛋怎的這般嫩得緊似你恁地怕羞如何賺得大主銀子美娘道我要銀子做甚四媽道我兒你便不要銀子做娘的看得你長大成人難道不要出本自古道靠山吃山靠水吃水九阿姐家有幾個粉頭那一個趕得上你的腳跟來一園瓜只看得你是個瓜種九阿姐待你也不比其他你是聰明伶俐的人也須識些輕重聞得你自梳弄之後一個客也不肯相接是甚麼意兒都像你的意時一家人口似蠶一般那個把桑葉喂他做娘的抬舉你一分你也要與他爭口氣兒莫要反討眾丫頭們批點美娘道繇他批點怕怎地劉四媽道阿呀批點是個小事你可曉得門戶中的行徑麼美娘道行徑便怎的劉四媽道我們門戶人家吃著女兒穿著女兒用著女兒僥幸討得一個像樣的分明是大戶人家置了一所良田美產年紀幼小時巴不得風吹得大到得梳弄過後便是田產成熟日日指望花利到手受用前門迎新後門送舊張郎送米李