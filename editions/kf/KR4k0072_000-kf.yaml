body:
  text: 醒世恆言一明馮夢龍敘六經國史而外凡著述皆小說也而尚理或病於艱深修詞或傷於藻繪則不足以觸裡耳而振恆心此醒世恆言四十種所以繼明言通言而刻也明者取其可以導愚也通者取其可以適俗也恆則習之而不厭傳之而可久三刻殊名其義一耳夫人居恆動作言語不甚相懸一旦弄酒則叫號躑躅視塹如溝度城如檻何則酒濁其神也然而斟酌有時雖畢吏部劉太常未有時時如濫泥者豈非醒者恆而醉者暫乎繇此推之惕孺為醒下石為醉卻為醒食嗟為醉剖玉為醒題石為醉又推之忠孝為醒而悖逆為醉節儉為醒而淫蕩為醉耳和目章口順心貞為醒而即聾從昧與頑用為醉人之恆心亦可思已從恆者吉背恆者凶心恆心言恆言行恆行入夫婦而不驚質天地而無怍下之巫醫可怍而上之善人君子聖人亦可見恆之時義大矣哉自昔濁亂之世謂之天醉天不自醉人醉之則天不自醒人醒之以醒天之權與人而以醒人之權與言言恆而人恆人恆而天亦得其恆萬世太平之福其可量乎則茲刻者雖與康衢擊壤之歌並傳不朽可矣崇儒之代不廢二教亦謂導愚適俗或有藉焉以二教為儒之輔可也以明言通言恆言為六經國史之輔不亦可乎若夫淫談褻語取快一時貽穢百世夫先自醉也而又以狂藥飲之吾不知視此三言者得失何如也天啟丁卯中秋隴西可一居士題於白下之棲霞山房目錄第一卷兩縣令競義婚孤女第二卷三孝廉讓產立高名第三卷賣油郎獨佔花魁第四卷灌園叟晚逢仙女第五卷大樹坡義虎送親第六卷小水灣天狐詒書第七卷錢秀才錯佔鳳凰儔第八卷喬太守亂點鴛鴦譜第九卷陳多壽生死夫妻第十卷劉小官雌雄兄弟第十一卷蘇小妹三難新郎第十二卷佛印師四調琴娘第十三卷勘皮靴單證二郎神第十四卷鬧樊樓多情周勝仙第十五卷赫大卿遺恨鴛鴦絛第十六卷陸五漢硬留合色鞋第十七卷張孝基陳留認舅第十八卷施潤澤灘闕遇友第十九卷白玉娘忍苦成夫第二十卷張廷秀逃生救父第二十一卷張淑兒巧智脫楊生第二十二卷呂純陽飛劍斬黃龍第二十三卷金海陵縱欲亡身第二十四卷隋煬帝逸游召譴第二十五卷獨孤生歸途鬧夢第二十六卷薛錄事魚服證仙第二十七卷李玉英獄中訟冤第二十八卷吳衙內鄰舟赴約第二十九卷盧太學詩酒傲王侯第三十卷李公窮邸遇俠客第三十一卷鄭節使立功神臂弓第三十二卷黃秀才徼靈玉馬墜第三十三卷十五貫戲言成巧禍第三十四卷一文錢小隙造奇冤第三十五卷徐老僕義憤成家第三十六卷蔡瑞虹忍辱報仇第三十七卷杜子春三入長安第三十八卷李道人獨步雲門第三十九卷汪大尹火焚寶蓮寺第四十卷馬當神風送滕王閣
