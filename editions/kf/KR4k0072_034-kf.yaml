夜便道怪道我家妻子屍首當朝就不見蹤影原來卻是你們撇掉了如今有了實據綽板婆卻白賴不過了我同你們見官去當下一乾人牽了小二直到縣裡次早大尹陞堂解將進去地方將前後事細稟大尹又喚王婆問了備細小二料道情真難脫不待用刑從實招承打了三十問成死罪下在獄中丘乙大稟說妻子被劉三旺謀死正是此日這屍首一定是他撇下的證見已確要求審結此時婺源縣知會文書未到大尹因沒有屍首終無實據原發落出去尋覓再說小二初時已被鄰里打傷那頓板子又十分利害到了獄中沒有使用又遭一頓拳腳三日之間血崩身死為這一文錢起又送一條性命見因貪白鏘番自喪黃泉且說丘乙大從縣中回家正打白鐵門首經過只聽得裡邊叫天叫地的啼哭原來白鐵自那夜擔著驚恐出脫這屍首冒了風寒回家上得床就發起寒熱病了十來日方纔斷命所以老婆啼哭眼見為這一文錢又送一條性命化為陰府驚心鬼失卻陽間打鐵人丘乙大聞知白鐵已死嘆口氣說恁般一個好漢有得幾日卻又了賬可見世人真是沒根的走到家裡單單止有這個小廝鬼一般縮在半邊要口熱水也不能勾看了那樣光景方懊悔前日逼勒老婆做了這件拙事如今又弄得不尷不尬心下煩惱連生意也不去做終日東尋西覓並無屍首下落看看捱過殘年又蚤五月中旬那時朱常兒子朱太已在按院告准狀詞批在浮梁縣審問行文到婺源縣關提人犯屍棺起初朱太還不上緊到了五月間料得屍首已是腐爛大大送個東道與婺源縣該房起文關解那趙完父子因婺源縣已經問結自道沒事毫無畏懼抱卷赴理兩縣解子領了一乾人犯三具屍棺直至浮梁縣當堂投遞大尹將人犯羈禁屍棺發置官壇候檢打發婺源回文自不必說不則一日大尹吊出眾犯前去相驗那朱太合衙門通買囑了要勝趙完大尹到屍場上坐下趙完將浮梁縣案卷呈上大尹看了對朱常道你借屍紮詐打死二命事已問結如何又告朱常稟道爺爺趙完打餘氏落水身死眾目共見卻買囑了地鄰仵作妄報是縊死的那丁文田婆自己情慌謀害抵飾硬誣小人打死且不要論別件但據小人主僕俱被拿住趙家是何等勢力卻容小人打死二命況死的俱是七十多歲難道恁地不知利害只揀垂死之人來打爺爺推詳這上就見明白大尹道既如此當時怎就招承朱常道那趙完衙門情熟用極刑拷逼若不屈招性命已不到今日了趙完也稟道朱常當日倚仗假屍逢著的便打閤家躲避那丁文田婆年老奔走不及故此遭了毒手假屍縊死繩痕是婺源縣大爺親驗過的豈是仵作妄報如今日久腐爛巧言誑騙爺爺希圖漏網反陷但求細看招卷曲直立見大尹道這也難憑你說即教開棺檢驗天下有這等作怪的事只道屍首經了許多時已腐爛盡了誰知都一毫不變宛然如生那楊氏頸下這條繩痕轉覺顯明倒教仵作人沒做理會你道為何他已得了朱常錢財若屍首爛壞了好從中作弊要出脫朱常反坐趙完如今傷痕見在若虛報了恐大尹還要親驗實報了如何得朱常銀子正在躊躇大尹蚤已瞧破就走下來親驗那仵作人被大尹監定不敢隱匿一一實報朱常在傍暗暗叫苦大尹將所報傷處將卷對看分毫不差對朱常道你所犯已實怎麼又往上司誑告朱常又苦苦分訴大尹怒道還要強辨夾起來快說這縊死婦人是那裡來的朱常受刑不過只得招出本日蚤起在某處河沿邊遇見不知是何人撇下那大尹極有記性忽地想起去年丘乙大告稱不見了妻子屍首後來賣酒王婆告小二打死王公也稱是日抬屍首撇在河沿上起釁至今屍首沒有下落莫不就是這個麼暗記在心當下將朱常卜纔都責三十照舊死罪下獄其餘家人減徒召保趙完等發落寧家不提且說大尹回到縣中吊出丘乙大狀詞並王小二那宗案卷查對果然日子相同撇屍地處一般更無疑惑即著原差喚到丘乙大劉三旺乾證人等監中吊出綽板婆孫氏齊到屍場認看此時正是五月天道監中瘟疫大作那孫氏剛剛病好還行走不動劉三旺與再旺扶挾而行到了屍場上仵作揭開棺蓋那丘乙大認得老婆屍首放聲號慟連連叫道正是小人妻子乾證地鄰也道正是楊氏大尹細細鞠問致死情繇丘乙大咬定劉三旺夫妻登門打罵受辱不過以致縊死劉三旺孫氏又苦苦折辯地鄰俱稱是孫氏起釁與劉三旺無乾大尹喝教將孫氏拶起那孫氏是新病好的人身子虛弱又行走這番勞碌過度又費脣費舌折辯漸漸神色改變經著拶子疼痛難忍一口氣收不來翻身跌倒嗚呼哀哉只因這一文錢上起又送一條性命正是地獄又添長舌鬼相罵今無綽板聲大尹看見即令放拶劉三旺向前叫喊喊破喉嚨也喚不轉再旺在旁哀哀啼哭十分淒慘大尹心中不忍向丘乙大道你妻子與孫氏角口而死原非劉三旺拳手相交今孫氏亦亡足以抵償今後兩家和好屍首各自領歸埋葬不許再告違者定行重治眾人叩首依命各領屍首埋葬不在話下再說朱常卜纔下到獄中想起枉費許多銀兩反受一場刑杖心中氣惱染起病來卻又沾著瘟氣二病夾攻不勾數日雙雙而死只因這一文錢上起又送兩條性命未詐他人先損自己說話的我且問你朱常生心害人尚然得個喪身亡家之報那趙完父子活活打死無辜二人又誣陷了兩條性命他卻漏網安享可見天理原有報不到之處看官你可曉得古老有幾句言語麼是那幾句古語道善有善報惡有惡報不是不報時辰未到那天公算子一個個記得明白古往今來曾放過那個這趙完父子漏網受用一來他的頑福未盡二來時候不到三來小子只有一張口沒有兩副舌說了那邊便難顧這邊少不得逐節兒還你個報應閑話休題且說趙完父子又勝了朱常回到家中親戚鄰里齊來作賀吃了好幾日酒又過數日聞得朱常卜纔俱已死了一發喜之不勝田牛兒念著母親暴露領歸埋葬不提時光迅速不覺又過年餘原來趙完年紀雖老還愛風月身邊有個偏房名喚愛大兒那愛大兒生得四五分顏色喬喬畫畫正在得趣之時那老兒雖然風騷到底老人家只好虛應故事怎能勾滿其所欲看見義孫趙一郎身材雄壯人物乖巧尚無妻室到有心看上了常常走到廚房下捱肩擦背調嘴弄舌你想世上能有幾個坐懷不亂的魯男子婦人家反去勾搭他可有不肯之理兩下眉來眼去不則一日成就了那事彼此俱在少年猶如一對餓虎那有個飽期捉空就閃到趙一郎房中偷一手兒那趙一郎又有些本領弄得這婆娘體酥骨軟魄散魂銷恨不時刻並做一塊約莫串了半年有餘一日愛大兒對趙一郎說道我與你雖然快活了這幾多時終是礙人耳目心忙意急不能勾十分盡興不如悄地逃往遠處做個長久夫妻趙一郎道小娘子若真肯跟我就在此可以做得夫妻何必遠去愛大兒道你便是我心上人了有甚假意只是怎地在此就做得夫妻趙一郎道向年丁老官與田婆都是老爹與大官人自己打死詐賴朱家的當時教我相幫他扛抬曾許事完之日分一分傢俬與我那個棒棍還是我藏好一向多承小娘子相愛故不說起你今既有此心我與老爹說先要了那一分傢俬尋個所在住下然後再央人說要你為配不怕他不肯他若捨不得那時你悄地徑自走了出來他可敢道個不字麼設或不達時務便報與田牛兒同去告官教他性命也自難保愛大兒聞言不勝歡喜道事不宜遲作速理會說罷閃出房去次日趙一郎探趙完獨自個在堂中閑坐上前說道向日老爹許過事平之後分一股傢俬與我如今朱家了賬已久要求老爹分一股兒自去營運趙完答道我曉得了再過一日趙一郎轉入後邊遇著愛大兒遞個信兒道方纔與老爹說了娘子留心察聽看可像肯的愛大兒點頭會意各自開去不提且說趙完叫趙壽到一個廂房中去將門掩上低低把趙一郎說話學與兒子又道我一時含糊應了他如今還是怎地計較趙壽道我原是哄他的甜話怎麼真個就做這指望老兒道當初不合許出了今若不與他些這點念頭如何肯息趙壽沈吟了一回又生起歹念乃道若引慣了他做了個月月紅倒是無了無休的詐端想起這事止有他一個曉得不如一發除了根永無掛慮那老兒若是個有仁心的勸兒子休了這念胡亂與他些小東西或者免得後來之禍也未可知千不合萬不合卻說道我也有這念頭但沒有個計策趙壽道有甚難處明日去買些砒礵下在酒中到晚灌他一醉怕道不就完事外邊人都曉得平日將他厚待的決不疑惑趙完歡喜以為得計他父子商議只道神鬼不知那曉得卻被愛大兒瞧見料然必說此事悄悄走來覆在壁上窺聽雖則聽著幾句不當明白恐怕出來撞著急閃入去欲要報與趙一郎因聽得不甚真切不好輕事重報心生一計到晚間把那老兒多勸上幾杯酒吃得醉熏熏到了床上愛大兒反抱定了那老兒撒嬌撒癡淫聲浪語這老兒迷魂了乘著酒興未免做些沒正經事體方在酣美之時愛大兒道有句話兒要說恐氣壞了你不好開口若不說又氣不過這老兒正頑得氣喘吁吁借那句話頭就停住了說道是那個衝撞了你如此著惱愛大兒道叵耐一郎這廝今早把風話撩撥我我要扯他來見你倒說老爹和大官人性命都還在我手裡料道也不敢難為我不知有甚緣故說這般滿話倘在外人面前也如此說必疑我家做甚不公不法勾當可不壞了名聲那樣沒上下的人怎生設個計策擺佈死了也省了後患那老兒道原來這廝恁般無禮不打緊明晚就見功效了愛大兒道明晚怎地就見功效那老兒也是合當命盡將要藥死的話一五一十說出那婆娘得了實言次早閃來報知趙一郎趙一郎聞言吃那驚不小想道這樣反面無情的狠人倒要害我性命如何饒得他過摸了棒槌鎖上房門急來尋著田牛兒把前事說與田牛兒怒氣沖天便要趕去廝鬧趙一郎止住道若先嚷破了反被他做了準備不如竟到官司與他理論田牛兒道也說得是還到那一縣去趙一郎道當初先在婺源縣告起這大尹還在原到他縣裡去那太白村離縣止有四十餘裡二人拽開腳步直跑至縣中正好大尹早堂未退二人一齊喊叫大尹喚入當廳跪下卻沒有狀詞只是口訴先是田牛兒哭稟一番次後趙一郎將趙壽打死丁文田婆誣陷朱常卜才情繇細訴將行凶棒槌呈上大尹看時血痕雖乾鮮明如昨乃道既有此情當時為何不首趙一郎道是時因念主僕情分不忍出首如今恐小人泄漏昨日父子計議要在今晚將毒藥鴆害小人故不得不來投生大尹道他父子私議怎地你就曉得趙一郎急遽間不覺吐出實話說道虧主人偏房愛大兒報知方纔曉得大尹道你主人偏房如何肯來報信想必與你有奸麼趙一郎被道破心事臉色俱變強詞抵賴大尹道事已顯然不必強辨即差人押二人去拿趙完父子並愛大兒前來赴審到得太白村天已昏黑田牛兒留回家歇宿不提且說趙壽早起就去買下砒礵卻不見了趙一郎問家中上下都不知道父子雖然有些疑惑那個慮到愛大兒泄漏次日清晨差人已至一索捆翻拿到縣中趙完見愛大兒也拿了還錯認做趙一郎調戲他不從因此牽連在內直至趙一郎說出報他謀害情由方知向來有奸懊悔失言兩下辯論一番不肯招承怎當嚴刑鍛煉疼痛難熬只得一一細招大尹因害了四命情理可恨趙完父子各打六十依律處斬趙一郎奸騙主妾背恩反噬愛大兒通同姦夫謀害親夫各責四十雜犯死罪齊下獄中田牛兒釋放回家一面備文申報上司具疏題請不一日刑部奉旨倒下號札四人俱依擬秋後處決只因這一文錢又斷送了四條性命雖然是冤各有頭債各有主若不因那一文錢爭鬧楊氏如何得死沒有楊氏的死屍朱常這詐害一事也就做不成了總為這一文錢起共害了十三條性命這段話叫做一文錢小隙造奇冤奉勸世人捨財忍氣為上有詩為證相爭只為一文錢小隙誰知奇禍連勸汝捨財兼忍氣一生無事得安然
