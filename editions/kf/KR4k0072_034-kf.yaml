body:
  text: 第三十四卷一文錢小隙造奇冤世上何人會此言休將名利掛心田等閑倒盡十分酒遇興高歌一百篇物外煙霞為伴侶壺中日月任嬋娟他時功滿歸何處直駕雲車入洞天這八句詩乃回道人所作那道人是誰姓呂名岩號洞賓岳州河東人氏大唐咸通中應進士舉游長安酒肆遇正陽子锺離先生點破了黃梁夢知宦途不足戀遂求度世之術锺離先生恐他立志未堅十遍試過知其可度欲授以黃白秘方使之點石成金濟世利物然後三千功滿八百行圓洞賓問道所點之金後來還有變異否锺離先生答道直待三千年後還歸本質洞賓愀然不樂道雖然遂我一時之願可惜誤了三千年後遇金之人弟子不願受此方也锺離先生呵呵大笑道汝有此好心三千八百盡在於此吾向蒙苦竹真君分付道汝遊人間若遇兩口的便是你的弟子遍游天下從沒見有兩口之人今汝姓呂即其人也遂傳以分合陰陽之妙洞賓修煉丹成發誓必須度盡天下眾生方可上昇從此混跡塵途自稱為回道人回字也是二口暗藏著呂字嘗游長沙手持小小磁罐乞錢向市上大言我有長生不死之方有人肯施錢滿罐便以方授之市人不信爭以錢投罐罐終不滿眾皆駭然忽有一僧人推一車子錢從市東來戲對道人說我這車子錢共有千貫你罐裡能容之否道人笑道連車子也推得進何況錢乎那僧不以為然想著這罐子有多少大嘴能容得車兒明明是說謊道人見其沈吟便道只怕你不肯佈施若道個肯字不愁這車子不進我罐兒裡去此時眾人聚觀者極多一個個肉眼凡夫誰人肯信都去攛掇那僧人那僧人也道必無此事便道看你本事我有何不肯道人便將罐子側著將罐口向著車兒尚離三步之遠對僧人道你敢道三聲肯麼僧人連叫三聲肯肯肯每叫一聲肯那車子便近一步到第三個肯字那車兒卻像罐內有人扯拽一般一溜子滾入罐內去了眾人一個眼花不見了車兒發聲喊齊道奇怪奇怪都來張那罐口只見裡面黑洞洞地那僧人就有不悅之意問道你那道人是神仙還是幻術道人口佔八句道非神亦非仙非術亦非幻天地有終窮桑田經幾變此身非吾有財又何足戀苟不從吾游騎鯨騰汗漫那僧人疑心是個妖術欲同眾人執之送官道人道你莫非懊悔不捨得這車子錢財麼我今還你就是遂索紙筆寫一道符投入罐內喝聲出出眾人千百隻眼睛看著罐口並無動靜道人說道這罐子貪財不肯送將出來待貧道自去討來還你說聲未了聳身望罐口一跳如落在萬丈深潭影兒也不見了那僧人連呼道人出來道人快出來罐裡並不則聲僧人大怒提起罐兒向地下一擲其罐打得粉碎也不見道人也不見車兒連先前眾人佈施的散錢並無一個正不知那裡去了只見有字紙一幅取來看時題得有詩四句道尋真要識真見真渾未悟一笑再相逢驅車東平路眾人正在傳觀只見字跡漸滅須臾之間連這幅白紙也不見了眾人才信是神仙一鬨而散只有那僧人失脫了一車子錢財意氣沮喪忽想著詩中一笑再相逢驅車東平路之語汲汲回歸行到東平路上認得自家車兒車上錢物宛然分毫不動那道人立於車旁舉手笑道相待久矣錢車可自收之又嘆道出家之人尚且惜錢如此更有何人不愛錢者普天下無一人可度可憐哉可痛哉言訖騰雲而去那僧人驚呆了半晌去看那車輪上每邊各有一口字二口成呂乃知呂洞賓也懊悔無及正是天上神仙容易遇世間難得捨財人方纔說呂洞賓的故事因為那僧人捨不得這一車子錢把個活神仙當面挫過有人論這一車子錢豈是小事也怪那僧人不得世上還有一文錢也捨不得的依在下看來捨得一車子錢就從那捨得一文錢這一念推廣上去捨不得一文錢就從那捨不得一車子錢這一念算計入來不要把錢多錢少看做兩樣如今聽在下說這一文錢小小的故事列位看官們各宜警醒懲忿窒欲且休望超凡入道也是保身保家的正理詩云不爭閑氣不貪錢捨得錢時結得緣除卻錢財煩惱少無煩無惱即神仙話說江西饒州府浮梁縣有景德鎮是個馬頭去處鎮上百姓都以燒造磁器為業四方商賈都來載往蘇杭各處販賣盡有利息就中單表一人叫做丘乙大是窯戶家一個做手渾家楊氏善能描畫乙大做就磁胚就是渾家描畫花草人物兩口俱不吃空住在一個冷巷里盡可度日有餘那楊氏年三十六歲貌頗不醜也肯與人活動只為老公利害只好背地裡偶一為之卻不敢明當做事所生一子名喚丘長兒年十四歲資性愚魯尚未會做活只在家中走跳忽一日楊氏患肚疼思想椒湯吃把一文錢教長兒到市上買椒長兒拿了一文錢纔走出門剛剛遇著東間壁一般做磁胚劉三旺的兒子叫做再旺也走出門來那再旺年十三歲比長兒到乖巧平日喜的是攧錢耍子怎的樣攧錢也有八個六個攧出或字或背一色的謂之渾成也有七個五個攧去一背一字間花兒去的謂之背間再旺和長兒閑常有錢時多曾在巷口一個空階頭上耍過來這一日巷中相遇同走到當初耍錢去處再旺又要和長兒耍子長兒道我今日沒有錢在身邊再旺道你往那裡去長兒道娘肚疼叫我買椒泡湯吃再旺道你買椒一定有錢長兒道只有得一文錢再旺道一文錢也好耍我也把一文與你賭個背字兩背的便都贏去兩字便輸一字一背不算長兒道這文錢是要買椒的倘或輸與你了把什麼去買再旺道不妨事你若贏了是造化若輸了時我借與你下次還我就是長兒一時不老成就把這文錢撇在地上再旺在兜裡也摸出一個錢丟下地來長兒的錢是個背再旺的是個字這攧錢也有先後常規該是背的先攧長兒檢起兩文錢攤在第二手指上把大拇指掐住曲一曲腰叫聲背攧將下去果然兩背長兒贏了收起一文留一文在地再旺又在兜肚裡摸出一文錢來連地下這文錢揀起一般樣攤在第二手指上把大拇指掐住曲一曲腰叫一聲背攧將下去卻是兩個字又是再旺輸了長兒把兩個錢都收起和自己這一文錢共是三個長兒贏得順流動了賭興問再旺道還有錢麼再旺道錢盡有只怕你沒造化贏得當下伸手在兜肚裡摸出十來個淨錢捻在手裡嘖嘖誇道好錢好錢問長兒還敢攧麼又丟下一文來長兒又攧了兩背第四次再旺攧又是兩字一連了十來次都是長兒贏了共得了十二文分明是掘藏一般喜得長兒笑容滿面拿了錢便走再旺那肯放他上前攔住道你贏了我許多錢走那裡去長兒道娘肚疼等椒湯吃我去去閑時再來再旺道我還有錢在腰裡你贏得時都送你長兒只是要去再旺發起喉急來便道你若不肯攧時還了我的錢便罷你把一文錢來騙了我許多錢如何就去長兒道我是攧得有采須不是白奪你的再旺索性把兜肚裡錢盡數取出約莫有二三十文做一垛兒堆在地下道待我輸盡了這些錢便放你走長兒是個小廝家眼孔淺見了這錢不覺貪心又起況且再旺抵死纏住只得又攧誰知風無常順兵無常勝這番采頭又輪到再旺了照前攧了一二十次雖則中間互有勝負卻是再旺贏得多到結末來這十二文錢依舊被他復去長兒剛剛原剩得一文錢自古道賭以氣勝初番長兒攧贏了一兩文膽就壯了偶然有些采頭就連贏數次到第二番又攧時不是他心中所願況且著了個貪心手下就有些矜持到一連攧輸了幾文去了個捨不得一個又添了個吝字氣便索然怎當再旺一股憤氣又且稍長膽壯自然贏了大凡人富的好過貧的好過只有先富後貧的最是難過據長兒一文錢起手時贏得一二文也是勾了一連得了十二文錢一拳頭捻不住就似白手成家何等歡喜把這錢不看做倘來之物就認作自己東西重復輸去好不氣悶癡心還想再像初次贏將轉來就是輸了他原許下借我的有何不可這一交合該長兒攧了忍不住按定心坎再復一攧又是二字心裡著忙就去搶那錢手去遲些先被再旺搶到手中都裝入兜肚裡去了長兒道我只有這文錢要買椒的你原說過贏時借我怎的都收去了再旺怪長兒先前贏了他十二文錢就要走今番正好出氣君子報仇直待三年小人報仇只在眼前怎麼還肯把這文錢借他把長兒雙手擋開故意的一跳一舞跑入巷去了急得長兒且哭且叫也回身進巷扯住再旺要錢兩個扭做一堆廝打孫龐鬥智誰為勝楚漢爭鋒那個強卻說楊氏專等椒來泡湯吃望了多時不見長兒回來覺得肚疼定了走出門來張看只見長兒和再旺扭住廝打罵道小殺纔教你買椒不買到在此尋鬧還不撒開兩個小廝聽得罵都放了手再旺就閃在一邊楊氏問長兒買的椒在那裡長兒含著眼淚回道那買椒的一文錢被再旺奪去了再旺道他與我攧錢輸與我的楊氏只該罵自己兒子不該攧錢不該怪別人況且一文錢所值幾何即輸了去只索罷休單因楊氏一時不明惹出一場大禍展轉的害了多少人的性命正是事不三思終有悔人能百忍自無懮楊氏因等候長兒不來一肚子惡氣正沒出豁聽說贏了他兒子的一文錢便罵道天殺的野賊種要錢時何不教你娘趁漢卻來騙我家小斯攧錢口裡一頭罵一頭便扯再旺來打恰正抓住了兜肚鑿下兩個栗暴那小斯打急了把身子負命一掙卻掙斷了兜肚帶子落下地來索郎一聲響兜肚子裡面的錢撒做一地楊氏道只還我那一文便了長兒得了娘的口氣就勢搶了一把錢奔進自屋裡去再旺就叫起屈來楊氏趕進屋裡喝教長兒還了他錢長兒被娘逼不過把錢對著街上一撒再旺一頭哭一頭罵一頭檢錢檢起時少了六七文錢情知是長兒藏下攔著門只顧罵楊氏道也不見這天殺的野賊種恁地撒潑把大門關上走進去了再旺敲了一回門又罵了一回哭到自屋裡去母親孫大娘正在灶下燒火問其緣故再旺哭訴道長兒搶了我的錢他的娘不說他不是到罵我天殺的野賊種要錢時何不教你娘趁漢孫大娘不聽時萬事全休一聽了這句不入耳的言語不覺怒從心上起惡向膽邊生原來孫大娘最痛兒子極是護短又兼性暴能言快語是個攬事的女都頭若相罵起來一連罵十來日也不口乾有名叫做綽板婆他與丘家只隔得三四個間壁居住也曉得楊氏平日有些不三不四的毛病只為從無口面不好髮揮出來一聞再旺之語太陽裡爆出火來立在街頭罵道狗潑婦狗淫婦自己瞞著老公趁漢子我不管你罷了到來謗別人老娘人便看不像卻替老公爭氣前門不進師姑後門不進和尚拳頭上立得人起臂膊上走得馬過不像你那狗淫婦人硬貨不硬表壯裡不壯作成老公帶了綠帽兒羞也不羞還虧你老著臉在街坊上罵人便臊賤時也不恁般做作我家小廝年幼連頭帶腦也還不勾與你補空你休得纏他臊發時還去尋那舊漢子是多尋幾遭多養了幾個野賊種大起來好做賊一聲潑婦一聲淫婦罵一個路絕人稀楊氏怕老公不敢攬事又沒處出氣只得罵長兒道都是你那小天殺的不學好引這長舌婦開口提起木柴把長兒劈頭就打打得長兒頭破血淋豪淘大哭丘乙大正從窯上回來聽得孫大娘叫罵側耳多時一句句都聽在肚裡想道是那家婆娘不秀氣替老公妝幌子惹得綽板婆叫罵及至回家見長兒啼哭問起緣繇到是自家家裡招攬的是非丘乙大是個硬漢怕人恥笑聲也不嘖氣忿忿地坐下遠遠的聽得罵聲不絕直到黃昏後方纔住口丘乙大吃了幾碗酒等到夜深人靜叫老婆來盤問道你這賤人瞞著我做的好事趁的許多漢子姓甚名誰好好招將出來我自去尋他說話那婆娘原是怕老公的聽得這句話分明似半空中響一個霹靂戰兢兢還敢開口丘乙大道潑賤