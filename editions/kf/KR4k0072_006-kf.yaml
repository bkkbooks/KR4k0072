body:
  text: 第六卷小水灣天狐詒書蠢動含靈俱一性化胎濕卵命相關得人濟利休忘卻雀也知恩報玉環這四句詩單說漢時有一秀才姓楊名寶華陰人氏年方弱冠天資穎異學問過人一日正值重陽佳節往郊外遊玩因行倦坐於林中歇息但見樹木蓊郁百鳥嚶鳴甚是可愛忽聞撲碌的一聲墮下一隻鳥來不歪不斜正落在楊寶面前口內吱吱地叫卻飛不起在地上亂撲楊寶道卻不作怪這鳥為何如此向前抬起看時乃是一隻黃雀不知被何人打傷叫得好生哀楚楊寶心中不忍乃道將回去喂養好了放罷正看間見一少年手執彈弓從背後走過來道秀才這黃雀是我打下的望乞見還楊寶道還亦易事但禽鳥與人體質雖異生命則一安忍戕害況殺百命不作供君一膳鬻萬鳥不能致君之富奚不別為生業我今願贖此雀之命便去身邊取出錢鈔來少年道某非為口腹利物不過遊戲技耳既秀才要此雀即便相送楊寶道君欲取樂禽鳥何辜少年謝道某知過矣遂投弓而去楊寶將雀回家貯於巾箱中日采黃花蕊飼之漸漸羽翼長換育至百日便能飛翔時去時來楊寶十分珍重忽一日去而不回楊寶心中正在氣悶只見一個童子單眉細眼身穿黃衣走入其家望楊寶便拜楊寶急忙扶起童子將出玉環一雙遞與楊寶道蒙君救命之恩無以為報聊以微物相奉掌此當累世為三公楊寶道與卿素昧平生何得有救命之說童子笑道君忘之耶某即林中被彈君巾箱中飼黃花蕊之人也言訖化為黃雀而去後來楊寶生子震明帝朝為太尉震子秉和帝朝為太尉秉子賜安帝朝為司徒賜子彪靈帝朝為司徒果然世世三公德業相繼有詩為證黃花飼雀非圖報一片慈悲利物心累世簪纓看盛美始知仁義值千金說話的那黃雀銜環的故事人人曉得何必費講看官們不知只為在下今日要說個少年也因彈了個異類上起不能如彈雀的恁般悔悟乾把個老大家事弄得七顛八倒做了一場話柄故把銜環之事做個得勝頭回勸列位須學楊寶這等好善行仁莫效那少年招災惹禍正是得閉口時須閉口得放手時須放手若能放手和閉口是歲安寧有八九話說唐玄宗時有一少年姓王名臣長安人氏略知書史粗通文墨好飲酒善擊劍走馬挾彈尤其所長從幼喪父惟母在堂娶妻於氏同胞兄弟王宰膂力過人武藝出眾充羽林親衛未有妻室家頗富饒童僕多人一家正安居樂業不想安祿山兵亂潼關失守天子西幸王宰隨駕扈從王臣料道立身不住棄下房產收拾細軟引母妻婢僕避難江南遂家於杭州地名小水灣置買田產經營過日後來聞得京城克復道路寧靜王臣思想要往都下尋訪親知整理舊業為歸鄉之計告知母親即日收拾行囊止帶一個家人喚做王福別了母妻繇小路直至揚州馬頭上那揚州隋時謂之江都是江淮要衝南北襟喉之地往來檣櫓如麻岸上居民稠密做買做賣的挨擠不開真好個繁華去處當下王臣捨舟登陸僱倩腳力打扮做軍官模樣一路遊山玩水夜宿曉行不則一日來至一所在地名樊川乃漢時樊噲所封食邑之處這地方離都城已不多遠因經兵火之後村野百姓俱潛避遠方一路絕無人煙行人亦甚稀少但見岡巒圍繞樹木陰翳危峰秀拔插青霄峻嶺崔嵬橫碧漢斜飛瀑布噴萬丈銀濤倒掛藤蘿揚千條錦帶雲山漠漠鳥道逶迤行客少煙林靄靄荒村寥落土人稀山花多艷如含笑野鳥無名只亂啼王臣貪看山林景致緩轡而行不覺天色漸晚聽見茂林中似有人聲近前看時原來不是人卻是兩個野狐靠在一株古樹上手執一冊文書指點商榷若有所得相對談笑王臣道這孽畜作怪不知看的是什麼書且教他吃我一彈按住絲韁綽起那水磨角靶彈弓探手向袋中摸出彈子放上覷得較親弓開如滿月彈去似飛星叫聲著那二狐正在得意之時不防林外有人窺看聽得弓弦響方纔抬頭觀看那彈早已飛到不偏不斜正中執書這狐左目棄下書失聲嗥叫負痛而逃那一個狐卻待就地去拾被王臣也是一彈打中左腮放下四足嗥叫逃命王臣縱馬向前教王福拾起那書來看都是蝌蚪之文一字不識心中想道不知是甚言語在上把去慢慢訪博古者問之遂藏在袖裡拔馬出林循大道望都城而來那時安祿山雖死其子安慶緒猶強賊將史思明降而復叛藩鎮又各擁重兵俱蓄不臣之念恐有奸細至京探聽故此門禁十分嚴緊出入盤詰剛到晚城門就閉王臣抵城下時已是黃昏時候見城門已閉即投旅店安歇到店門口下馬入來主人家見他懸弓佩劍軍官打扮不敢怠慢上前相迎道長官請坐便令小二點杯茶遞上王福將行李卸下馱進店中王臣道主人家有穩便房兒開一間與我答道舍下客房盡多長官只揀中意的住便了即點個燈火引王臣往各房看過擇了一間潔淨所在將行李放下把生口牽入後邊喂料收拾停當小二進來問道告長官可吃酒麼王臣道有好酒打兩角牛肉切一盤伴當們照依如此小二答應出去王臣把房門帶轉也走到外邊小二捧著酒肉問道長官酒還送到房裡去飲或就在此間王臣道就在此罷小二將酒擺在一副座頭上王臣坐下王福在旁斟酒吃過兩三杯主人家上前問道長官從那鎮到此王臣道在下從江南來主人家道長官語音不像江南人物王臣道實不相瞞在下原是京師人氏因安祿山作亂車駕幸蜀在下挈家避難江南今知賊黨平復天子還都先來整理舊業然後迎接家小歸鄉因恐路上不好行走故此軍官打扮主人家道原來是自家人老漢一向也避在鄉村到此不上一年哩彼此因是鄉人分外親熱各訴流離之苦正是江山風景依然是城郭人民半已非兩下正說得熱鬧忽聽得背後有人叫道主人家有空房宿歇麼主人家答應道房屋還有不知客官有幾位安歇答道只有我一人主人家見是個單身又沒包裹乃道若止你一人不敢相留那人怒道難道賴了你房錢不肯留我主人家道客官不是這般說只因郭令公留守京師頒榜遠近旅店不許容留面生歹人如隱匿藏留者查出重治況今史思明又亂愈加緊急今客官又無包裹又不相認故不好留得那人笑道原來你不認得我我就是郭令公家丁胡二因有事往樊川去了轉回趕進城不及借你店裡歇一宵故此沒有包裹你若疑惑明早同到城門上去問那管門的誰個不認得我這主人家被他把大帽兒一磕便信以為真乃道老漢一時不曉得是郭爺長官莫怪請裡邊房裡去坐那人道且慢著我肚裡餓了有酒飯討些來吃了進房不遲又道我是吃齋止用素酒走過來向王臣桌上對面坐下小二將酒菜放下王臣舉目看時見他把一隻袖子遮著左眼似覺疼痛難忍之狀那人開言道主人家我今日造化低遇著兩個毛團跌壞了眼主人家道遇著什麼答道從樊川回來見樹林中兩個野狐打滾嗥叫我趕上前要去拿他不想絆上一交狐又走了反在地上磕損眼睛主人家道怪道長官把袖遮著眼兒王臣接口道我今日在樊川過也遇著兩個野狐那人忙問道可曾拿到麼王臣道他在林中把冊書兒觀看被我一彈打了執書這狐左眼遂棄書而逃那一個方待去拾又被我一彈打在腮上也亡命而走故此只取得這冊書沒有拿到那人和主人家都道野狐會看書這也是奇事那人又道那書上都是甚麼事體借求一觀王臣道都是異樣篆書一字也看他不出放下酒杯便向袖中去摸那冊書出來說時遲那時快手還未到袖裡時不想主人家一個孫兒年纔五六歲正走出來小廝家眼淨望見那人是個野狐卻叫不出名色奔向前指住道老爹怎麼這個大野貓坐在此還不趕他王臣聽了便省悟是打壞眼的這狐急忙拔劍照頂門就砍那狐望後一躲就地下打滾露出本相往外亂跑王臣仗劍追趕了十數家門面向個牆裡跳進王臣因黑夜之間無門尋覓只得回轉主人家點個燈火同著王福一齊來迎著道饒他性命罷王臣道若不是令孫看破幾乎被這孽畜賺了書去主人家道這毛團也奸巧哩只怕還要生計來取王臣道今後有人把野狐事來誘我的定然是這孽畜便揮他一劍一頭說已到店裡店左店右住宿的客商聞得當做一件異事都走出來訊問到拌得口苦舌乾王臣吃了夜飯到房中安息因想野狐忍痛來掇賺這冊書必定有些妙處愈加珍秘至三更時分外邊一片聲打門叫道快把書還了我尋些好事酬你若不還時後來有些事故莫要懊悔王臣聽得氣忿不過披衣起身拔劍在手又恐驚動眾人悄悄的步出房來去摸那大門時主人家已自下了鎖心中想道便叫起主人開門出去那毛團已自走了砍他不著空惹眾人憎厭不如別著鳥氣來朝卻又理會王臣依先進房睡了那狐喊了多時方去合店的人盡皆聽得到次早齊勸王臣道這書既看不出字留之何益不如還他去罷倘真個生出事來懊悔何及王臣若是個見機的聽了眾人言語把那冊書擲還狐精卻也罷了只因他是個倔強漢子不依眾人說話後來被那狐精把個家業弄得七零八落正是不聽好人言必有恓惶淚當下王臣吃了早飯算還房錢取出行李上馬進城一路觀看只見屋宇殘毀人民稀少街市冷落大非昔日光景來到舊居地面看時惟存一片瓦礫之場王臣見了不勝淒慘無處居住只得尋個寓所安頓了行李然後去訪親族卻也存不多幾家相見之間各訴向來蹤跡說到那傷心之處不覺撲簌簌淚珠拋灑王臣又言今欲歸鄉不想屋宇俱已蕩盡沒個住身之處親戚道自兵亂已來不知多少人家父南子北被擄被殺受無限慘禍就是我們一個個都從刀尖上脫過來的非容易得有今日像你家太平無事止去了住宅已是無量之福了況兼你的田產虧我們照管依然俱在若有念歸鄉整理起來還可成個富家王臣謝了眾人遂買一所房屋製備日用家夥物件將田園逐一經理停妥約過兩月王臣正走出門只見一人從東而來滿身穿著麻衣肩上背個包裹行履如飛漸漸至近王臣舉目觀看吃了一驚這人不是別個乃是家人王留兒王臣急呼道王留兒你從那裡來卻這般打扮王留兒見叫乃道原來官人住在這裡教我尋得個發昏王臣道你且說為何恁般妝束王留兒道有書在此官人看了就知道至裡邊放下包裹打開取出書信遞與家主王臣接來拆開看時卻是母親手筆上寫道從汝別後即聞史思明復亂日夕懮慮遂沾重疾醫禱無效旦夕必登鬼籍矣年逾六秩已不為夭第恨衰年值此亂離客死遠鄉又不得汝兄弟送我之終深為痛心耳但吾本家秦不願葬於外地而又慮賊勢方熾怨京城復如前番不守又不可居終夜思之莫若盡棄都下破殘之業以資喪事迎吾骨入土之後原返江東此地田土豐阜風俗醇厚況昔開創甚難決不可輕廢俟干戈寧靜徐圖歸鄉可也倘違吾言自罹羅網顛覆宗祀雖及泉下誓不相見汝其志之王臣看畢哭倒在地道指望至此重整家業同歸故鄉不想母親反為我而懮死早知如此便不來得也罷悔之何及哭了一回又問王留兒道母親臨終可還有別話王留兒道並無別話止叮囑說此處產業已荒廢總然恢復今史思明作反京城必定有變斷不可守教官人作速一切處置備辦喪葬之事迎柩葬後原往杭州避難若不遵依死不瞑目王臣道母親遺命豈敢違逆況江東真似可居長安戰爭未息棄之甚為有理急忙制辦裳擺設靈座一面差人往墳上收拾一面央人將田宅變賣王留兒住了兩日對王臣道官人修築墳墓起來尚有整月延遲家中必然懸望等小人先回以安其心王臣道此言正合我意即便寫下家書取出盤纏打發他先回王留兒臨出門又道小人雖去官人也須作速處置快回王臣道我恨不得這時就飛到家何消叮囑王留兒出門洋洋而去且說王臣這些親戚曉得都來弔唁勸他不該把田產輕廢王臣因是母命執意不聽眾人言語心忙意急上好田產都只賣得個半價盤桓二十餘日墳上開土築穴諸事色色俱已停妥然後打疊行裝帶領僕從離了長安星夜望江東趕來迎靈車安葬可憐仗劍長安悔浪游歸心一片水東流北堂空作斑衣夢淚灑白雲天盡頭話分兩頭且說王臣母妻在家真個聞得史思明又反日夜懮慮王臣懊悔放他出門過了兩三月一日忽見家人來報王福從京師賫信回了姑媳聞言即教喚進王福上前叩頭將書遞上卻見王福左眼損壞無暇詳問將書拆開觀看上寫道自離膝下一路託庇粗安至都查核舊業幸得一毫不廢已經理如昔矣更喜得遇故知胡八判官引至元丞相門下頗蒙青盼扶持一官幽薊誥身已領限期甚迫特遣王福迎母同之任所書至即將江東田產盡貨火速入京勿計微值有誤任期相見在邇書不多贅男臣百拜姑媳看罷書中之意不勝歡喜方問道王福為甚損了一目王福道不要說起在生口上打瞌睡不想跌下來磕損了這眼又問京師近來光景比舊日何如親戚們可都在麼王福道滿城殘毀過半與前大不相同了親戚們殺的殺擄的擄逃的逃總來存不多幾家尚還有搶去傢俬的燒壞屋宇的佔去田產的惟有我家田園屋宅一毫不動姑媳聞說愈加歡悅乃道家業又不曾廢卻又得了官職此皆天地祖宗保佑之力感謝不盡到臨起身須做場好事報答再祈此去前程遠大福祿永長又問道那胡八判官是誰王福道這是官人故交王媽媽道向來從不見說起有姓胡做官的來往媳婦道或者近日相交的也未可知王福接口道正是近日相識的當下問了一回王媽媽道王福你路上辛苦了且去吃些酒飯歇息則個到了次日王福說道奶奶這裡收拾起來也得好幾日官人在京卻又無人服侍待小人先去回覆打疊停當候奶奶一到即便起身往任何如王媽媽道此言甚是有理寫起書信付些盤纏銀兩打發先行王福去後王媽媽將一應田地宇捨什物器皿盡行變賣止留細軟東西因恐誤了兒子任期不擇善價半送與人又延請僧人做了一場好事然後僱下一隻官船擇日起程有幾個平日相往的鄰家女眷俱來相送登舟而別離了杭州由嘉禾蘇州常潤州一路出了大江望前進發那些奴僕因家主得了官一個個手舞足蹈好不興頭避亂南馳實可哀誰知富貴逼人來舉家手額歡聲沸指日長安晝錦回且說王臣自離都下兼程而進不則一日已到揚州馬頭上把行李搬在客店上打發生口去了吃了飯教王福向河下僱覓船隻自己坐在客店門首守著行囊觀看往來船隻只見一隻官船溯流而上船頭站著四五個人喜笑歌唱甚是得意漸漸至近打一看時不是別個都是自己家人王臣心中驚異道他們不在家中服役如何卻在這只官船上又想道想必母親亡後又歸他人了正疑訝間艙門簾兒啟處一個女子舒頭而望王臣仔細觀看又是房中侍婢連稱奇怪剛欲詢問那船上家人卻也看見齊道官人如何也在這裡卻又恁般服色忙教稍子攏船早驚動艙中王媽媽姑媳掀簾觀看王臣望見母親尚在急將麻衣脫下打開包裹換了衣服巾幘船上家人登岸相迎王臣教將行李齊搬下船自己上船來見母親一眼覷著王留兒在船頭上不問情繇揪住便打王媽媽走出說道他又無罪過如何把他來打王臣見母親出來放手上前拜道都是這狗纔將母親書信至京誤傳凶信陷兒於不孝姑媳俱驚訝道他日日在家何嘗有書差到京中王臣道一月前賫母親書來書中寫的如此如此這般這般住了兩日遣他先回安慰家中然後將田產處置了星夜趕來怎說不曾到京閤家大驚道有這等異事那裡一般又有個王留兒連王留兒到笑起來道莫說小人到京就是這個夢也不曾做王媽媽道你且取書來看可像我的字跡王臣道不像母親字跡我如何肯信便打開行李取出書來看時乃是一幅素紙那有一個字影把王臣驚得目睜口呆只管將這紙來翻看王媽媽道書在那裡把來我看王臣道卻不作怪書上寫著許多言語如何竟變做一幅白紙王媽媽不信道焉有此理自從你出門之後並無書信往來直至前日你差王福將書接我方有一信令他先來覆你如何有個假王留兒將假書哄你如今卻又說變了白紙這是那裡學來這些鬼話王臣聽說王福曾回家這話也甚驚駭乃道王福在京與兒一齊起身到此幾曾教他將書來接母親姑媳都道呀這話愈加說得混帳了一月前王福送書到家書上說都中產業俱在又遇什麼胡八判官引在元丞相門下得了官職教將江東田宅盡皆賣了火速入京同往任上故此棄了家業僱倩船隻入京怎說王福沒有回來王臣大驚道這事一發奇怪何曾有甚胡八判官引到元丞相門下選甚官職有書迎接母親王媽媽道難道王福也是假的快叫來問王臣道他去喚船了少刻就來眾家人都到船頭一望只見王福遠遠跑來卻也穿著凶服眾人把手亂招王福認得是自家人也道詫異說他們如何都在這裡走近船邊眾人看時與前日的王福不同了前日左目已是損壞如今這王福兩隻大眼滴溜溜恰如銅鈴一般眾人齊問道王福你前日回家眼已瞎了如今怎又好好地王福向眾人噴一口涎沫道啐你們的眼便瞎了我何曾回家卻又咒我眼瞎眾人笑道這事真個有些古怪奶奶在艙中喚你且除下身上麻衣快去相見王福見說呆了一呆道奶奶還在眾人道那裡去了不在王福不信也不脫麻衣徑撞入艙來王臣看見喝道這狗纔奶奶在這裡還不換了衣服來見王福慌忙退出船頭脫下進艙叩頭王媽媽擦磨老眼仔細一看連稱怪哉怪哉前日王福回家左目已損今卻無恙料然前日不是他了急去開出那封書來看時也是一張白紙並無一點墨跡那時閤家惶惑正不知假王留兒王福是甚變的又不知有何緣故卻哄騙兩頭把家業破毀還恐後來尚有變故驚疑不定王臣沈思凝想半日忽想到假王福左眼是瞎的恍然而悟乃道是了是了原來卻是這孽畜變來弄我王媽媽急問是甚東西王臣乃將樊川打狐得書客店變人詒騙和夜間打門之事說出又道當時我只道這孽畜不過變人來騙此書到不提防他有憑般賊智眾人聞言盡皆搖首咋舌道這妖狐卻也奸狡利害哩隔著幾多路卻會仿著字跡人形把兩邊人都弄得如耍戲一般早知如此把那書還了他去也罷王臣道叵耐這孽畜無禮如今越發不該還他了若再纏帳把那禍種頭一火而焚之於氏道事已如此莫要閑講了且商量正務如今住在這裡不上不下還是怎生計較王臣道京中產業俱已賣盡去也沒個著落況兼路途又遠不如且歸江東王媽媽道江東田宅也一毫無存卻住在何處王臣道權賃一所住下再作區處當下撥轉船頭原望江東而回那些家人起初像火一般熱到此時化做冰一般冷猶如斷線偶戲手足撣軟連話都無了正是乘興而來敗興而返到了杭州王臣同家人先上岸在舊居左近賃了一所房屋制辦日用家夥各色停當然後發起行李迎母妻進屋計點囊橐十無其半又惱又氣門也不出在家納悶這些鄰家見王媽媽去而復回齊來詢問王臣道知其詳眾人俱以為異事互相傳說遂嚷遍了半個杭城一日王臣在堂中督率家人收拾只見外邊一人走將入來威儀濟楚服飾整齊怎見得但見頭戴一頂黑紗唐巾身穿一領綠羅道袍碧玉環正綴巾邊紫絲絛橫圍袍上襪似兩堆白雪舄如二朵紅雲堂堂相貌生成出世之姿落落襟懷養就凌雲之氣若非天上神仙定是人間官宰那人走入堂中王臣仔細看時不是別人正是同胞兄弟王宰當下王宰向前作揖道大哥別來無恙王臣還了個禮乃道賢弟虧你尋到這裡王宰道兄弟到京回舊居時見已化為白地只道罹於兵火甚是悲痛即去訪問親故方知閤家向已避難江東近日大哥至京整理舊業因得母親凶問剛始離京兄弟聞了這信遂星夜趕來適纔訪到舊居鄰家說新遷於此母親卻也無恙故此又到舟中換了衣服纔來母親如今在那裡為何反遷這等破屋裡邊王臣道一言難盡待見過了母親與你細說引入後邊早有家人報知王媽媽聞次子歸家好生歡喜即忙出來恰好遇見王宰倒身下拜拜畢起身王媽媽道兒我日夜掛心一向好麼王宰道多謝母親記念待兒見過了嫂嫂少停細細說與母親知道當下王臣渾家並一家婢僕都來見過王宰扯王臣住外就走王媽媽也隨出來至堂中坐下問道大哥你且先說因甚弄得恁般模樣王臣乃將樊川打狐起直至兩邊掇賺變賣產業前後事細說一遍王宰聽了說原來有這個緣故以致如此這卻是你自取非乾野狐之罪那狐自在林中看書你是官道行路兩不妨礙如何卻去打他又奪其書及至客店中他忍著疼痛來賺你書想是萬不得已而然你不還他罷了怎地又起惡念拔劍斬逐及至夜間好言苦求你又執意不肯況且不識這字終於無用要他則甚今反吃他捉弄得這般光景都是自取其禍王媽媽道我也是這般說要他何用如今反受其累王臣被兄弟數落一番嘿然不語心中好不耐煩王宰道這書有幾多大還是什麼字體王臣道薄薄的一冊也不知是什麼字體一字也識不出王宰道你且把我看看王媽媽從旁襯道正是你去把來與兄弟看看或者識得這字也不可知王宰道這字料也難識只當眼見希奇物罷了當時王臣向裡邊取出到堂中遞與王宰王宰接過手從前直揭至後看了一看乃道這字果然稀見便立起身走在堂中向王臣道前日王留兒便是我今天天書已還不來纏你了請放心一頭說一頭往外就奔王臣大怒急趕上前大喝道孽畜大膽那裡走一把扯住衣裳走的勢發扯的力猛只聽得聒喇一響扯下一幅衣裳那妖狐索性把身一抖卸下衣服見出本相向門外亂跑風團也似去了王臣同家人一齊趕到街上四顧觀看並無蹤影王臣一來被他破蕩了人家二來又被他數落這場三來不忿得這書咬牙切齒東張西望尋覓只見一個瞎道人站在對面檐下王臣問道可見一個野狐從那裡去了瞎道人把手指道向東邊去了王臣同家人急望東而趕行不上五六家門面背後瞎道人叫道王臣前日王福便是我令弟也在這裡眾人聞得復轉身來兩個野狐執著書兒在前戲躍眾人奮勇前來追捕二狐放下四蹄飛也似去了王臣剛奔到自己門首王媽媽叫道去了這敗家禍胎已是安穩了又趕他則甚還不進來王臣忍著一肚子氣只得依了母親喚轉家人進來逐件檢起衣服觀看俱隨手而變你道都是甚麼東西破芭蕉化為羅服爛荷葉變做紗巾碧玉環柳枝圈就紫絲絛薜蘿搓成羅襪二張白素紙朱舄兩片老松皮眾人看了盡皆駭異道妖狐神通這般廣大二官人不知在何處卻變得恁般廝像王臣心中轉想轉惱氣出一場病來臥床不起王媽媽請醫調治自不必說過了數日家人們正在堂中只見走進一個人來看時卻是王宰也是紗巾羅服與前妖狐一般打扮眾家人只道又是假的一齊亂喊道妖狐又來了各去尋棍覓棒擁上前亂打王宰喝道這些潑男女為何這等無禮還不去報知奶奶眾人那個采他一味亂打王宰止遏不住惹惱性子奪過一根棒來打得眾人四分五落不敢近前都閃在裡邊門旁指著罵道你這孽畜書已拿去了又來做甚王宰不解其意心下大怒直打入去眾人往內亂跑早驚動王媽媽聽得外邊喧嚷急走出來撞見眾人問道為何這等慌亂眾人道妖狐又變做二官人模樣打進來也王媽媽驚道有這等事言還未畢王宰已在面前看見母親即撇下棒子上前叩拜道母親為甚這些潑男女將兒叫做妖狐孽畜執棍亂打王媽媽道你真個是我的孩兒不王宰道兒是母親生的有什麼假正說間外面七八個人扛抬鋪程行李進來眾家人方知是真上前叩頭謝罪王宰問其緣故王媽媽乃將妖狐前後事細說又道汝兄為此氣成病癥尚未能愈王宰聞言亦甚驚駭道恁樣說起來兒在蜀中王福賫書至也是這狐假的了王媽媽道你且說書上怎寫王宰道兒是隨駕入蜀分隸於劍南節度嚴武部下得蒙拔為裨將故上皇還京兒不相從歸國兩月前忽見王福賫哥哥書來說向避難江東不幸母親有變教兒速來計議扶柩歸鄉王福說要至京打掃塋墓次日先行兒為此辭了本官把許多東西都棄下了輕裝兼程趲來纔訪至舊居鄰家指引至此知母親無恙復到舟中易服來見正要問哥哥為甚把這樣凶信哄我不想卻有此異事即去行李中開出那封書來看時也是一幅白紙閤家又好笑又好惱王宰同母至內見過嫂子省視王臣道其所以王臣又氣得個發昏王媽媽道這狐雖然憊懶也虧他至蜀中賺你回來使我母子相會將功摺罪莫怨他罷王臣病了兩個月方纔痊可遂入籍於杭州所以至今吳越間稱拐子為野狐精有所本也蛇行虎走各為群狐有天書狐自珍家破業荒書又去世人千載笑王臣
