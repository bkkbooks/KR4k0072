body:
  text: 第二十八卷吳衙內鄰舟赴約貪花費盡採花心身損精神德損陰勸汝遇花休浪采佛門第一戒邪淫話說南宋時江州有一秀才姓潘名遇父親潘朗曾做長沙太守高致在家潘遇已中過省元別了父親買舟往臨安會試前一夜父親夢見鼓樂旗彩送一狀元扁額進門扁上正注潘遇姓名早起喚兒子說知潘遇大喜以為春闈首捷無疑一路去高歌暢飲情懷開發不一日到了臨安尋覓下處到一個小小人家主翁相迎問相公可姓潘麼潘遇道然也足下何以知之主翁道夜來夢見土地公公說道今科狀元姓潘明日午時到此你可小心迎接相公正應其兆若不嫌寒舍簡慢就在此下榻何如潘遇道若果有此事房價自當倍奉即令家人搬運行李到其家停宿主人有女年方二八頗有姿色聽得父親說其夢兆道潘郎有狀元之分在窗下偷覷又見他儀容俊雅心懷契慕無繇通款一日潘生因取硯水偶然童子不在自往廚房恰與主人之女相見其女一笑而避之潘生魂不附體遂將金戒指二枚玉簪一隻囑付童兒覷空致意此女懇求幽會此女欣然領受解腰間繡囊相答約以父親出外親赴書齋一連數日潘生望眼將穿未得其便直至場事已畢主翁治杯節勞飲至更深主翁大醉潘生方欲就寢忽聞輕輕叩門之聲啟而視之乃此女也不及交言捧進書齋成其雲雨十分歡愛約以成名之後當娶為側室是夜潘朗在家復夢向時鼓樂旗彩迎狀元扁額過其門而去潘朗夢中喚雲此乃我家旗扁送扁者答雲非是潘朗追而看之果然又一姓名矣送扁者雲今科狀元合是汝子潘遇因做了欺心之事天帝命削去前程另換一人也潘朗驚醒將信將疑未幾揭曉潘朗閱登科記狀元果是夢中所迎扁上姓名其子落第待其歸而叩之潘遇抵賴不過只得實說父子嘆嗟不已潘遇過了歲餘心念此女遣人持金帛往聘之則此女已適他人矣心中甚是懊悔後來連走數科不第郁郁而終因貪片刻歡娛景誤卻終身富貴緣說話的依你說古來才子佳人往往私諧歡好後來夫榮妻貴反成美談天公大算盤如何又差錯了看官有所不知大凡行奸賣俏壞人終身名節其過非小若是五百年前合為夫婦月下老赤繩繫足不論幽期明配總是前緣判定不虧行止聽在下再說一件故事也出在宋朝卻是神宗皇帝年間有一位官人姓吳名度汴京人氏進士出身除授長沙府通判夫人林氏生得一位衙內單諱個彥字年方一十六歲一表人才風流瀟灑自幼讀書廣通經史吟詩作賦件件皆能更有一件異處你道是甚異處這等一個清標人物卻吃得東西每日要吃三升米飯二斤多肉十餘斤酒其外飲饌不算這還是吳府尹恐他傷食酌中定下的規矩若論起吳衙內只算做半飢半飽未能趁心像意是年三月間吳通判任滿昇選揚州府尹彼處吏書差役帶領馬船直到長沙迎接吳度即日收拾行裝辭別僚友起程下了馬船一路順風順水非止一日將近江州昔日白樂天贈商婦琵琶行雲江州司馬青衫濕便是這個地方吳府尹船上正揚著滿帆中流穩度倏忽之間狂風陡作怒濤洶湧險些兒掀翻莫說吳府尹和夫人們慌張便是篙師舵工無不失色急忙收帆攏岸只有四五里江面也掙了兩個時辰回顧江中往來船隻那一隻上不手忙腳亂求神許願掙得到岸便謝天不盡了這裡吳府尹馬船至了岸旁拋錨系纜那邊已先有一隻官船停泊兩下相隔約有十數丈遠這官船艙門上簾兒半卷下邊站著一個中年婦人一個美貌女子背後又侍立三四個丫鬟吳衙內在艙中簾內早已瞧見那女子果然生得嬌艷怎見得有詩為證秋水為神玉為骨芙容如面柳如眉分明月殿瑤池女不信人間有異姿吳衙內看了不覺魂飄神蕩恨不得就飛到他身邊摟在懷中只是隔著許多路看得不十分較切心生一計向吳府尹道爹爹何不教水手移去幫在這只船上到也安穩吳府尹依著衙內分付水手移船水手不敢怠慢起錨解纜橕近那只船旁吳衙內指望幫過了船邊細細飽看誰知纔傍過去便掩上艙門把吳衙內一團高興直冷淡到那腳指尖上你道那船中是甚官員姓甚名誰那官人姓賀名章祖貫建康人氏也曾中過進士前任錢塘縣尉新任荊州司戶帶領家眷前去赴任亦為阻風暫駐江州三府是他同年順便進城拜望去了故此家眷開著艙門閑玩中年的便是夫人金氏美貌女子乃女兒秀娥原來賀司戶沒有兒子止得這秀娥小姐年纔十五真有沈魚落雁之容閉月羞花之貌女工針指百伶百俐不教自能兼之幼時賀司戶曾延師教過讀書識字寫作俱高賀司戶夫婦因是獨養女兒鍾愛勝如珍寶要贅個快婿難乎其配尚未許人當下母子正在艙門口觀看這些船隻慌亂卻見吳府尹馬船幫上來夫人即教丫鬟下簾掩門進去吳府尹是仕路上人便令人問是何處官府不一時回報說是荊州司戶姓賀諱章今去上任吳府尹對夫人道此人昔年至京應試與我有交向為錢塘縣尉不道也陞遷了既在此相遇禮合拜訪教從人取帖兒過去傳報從人又稟道那船上說賀爺進城拜客未回正說間船上又報道賀爺已來了吳府尹教取公服穿著在艙中望去賀司戶坐著一乘四人轎背後跟許多人從原來賀司戶去拜三府不想那三府數日前丁懮去了所以來得甚快抬到船邊下轎看見又有一隻座船心內也暗轉不知是何使客走入艙中方待問手下人吳府尹帖兒早已遞進賀司戶看罷即教相請恰好艙門相對走過來就是見禮已畢各敘間闊寒溫吃過兩杯茶吳府尹起身作別不一時賀司戶回拜吳府尹款留小酌喚出衙內相見命坐於旁賀司戶因自己無子觀見吳彥儀表超群氣質溫雅先有四五分歡喜及至問些古今書史卻又應答如流賀司戶愈加起敬稱贊不絕暗道此人人材學識盡是可人若得他為婿與女兒恰好正是一對但他居汴京我住建康兩地相懸往來遙遠難好成偶深為可惜此乃賀司戶心內之事卻是說不出的話吳府尹問道老先生有幾位公子賀司戶道實不相瞞止有小女一人尚無子嗣吳衙內也暗想道適來這美貌女子必定是了看來年紀與我相仿若求得為婦平生足矣但他止有此女料必不肯遠嫁說也徒然又想道莫說求他為婦今後要再見一面也不能勾了怎做恁般癡想吳府尹聽得賀司戶尚沒有子乃道原來老先生還無令郎此亦不可少之事須廣置姬妾以圖生育便好賀司戶道多承指教學生將來亦有此意彼此談論不覺更深方止臨別時吳府尹道儻今晚風息明晨即行恐不及相辭了賀司戶道相別已久後會無期還求再談一日道罷回到自己船中夫人小姐都還未臥秉燭以待賀司戶酒已半酣向夫人說起吳府尹高情厚誼又誇揚吳衙內青年美貌學問廣博許多好處將來必是個大器明日要設席請他父子因有女兒在旁不好說出意欲要他為婿這一段情來那曉得秀蛾聽了便懷著愛慕之念至次日風浪轉覺狂大江面上一望去煙水迷氵蒙浪頭推起約有二三丈高惟聞澎澎之聲往來要一隻船兒做樣卻也沒有吳府尹只得住下賀司戶清早就送請帖邀他父子赴酌那吳衙內記掛著賀小姐一夜臥不安穩早上賀司戶相邀正是挖耳當招巴不能到他船上希圖再得一覷偏這吳府尹不會湊趣道是父子不好齊擾吳府尹至午後獨自過去替兒子寫帖辭謝吳衙內難好說得好不氣惱幸喜賀司戶不聽再三差人相請吳彥不敢自專又請了父命方纔脫換服飾過去相見入坐飲酒早驚動後艙賀小姐悄悄走至遮堂後門縫中張望那吳衙內妝束整齊比平日愈加丰采飄逸怎見得也有詩為證何郎俊俏顏如粉荀令風流坐有香若與潘生同過市不知擲果向誰傍賀小姐看見吳衙內這表人物不覺動了私心想道這衙內果然風流俊雅我若嫁得這般個丈夫便心滿意足了只是怎好在爹爹面前啟齒除非他家來相求才好但我便在思想吳衙內如何曉得欲待約他面會怎奈爹媽俱在一處兩邊船上耳目又廣沒討個空處眼見得難就只索罷休心內雖如此轉念那雙眼卻緊緊覷定吳衙內大凡人起了愛念總有十分丑處俱認作美處何況吳衙內本來風流自然轉盼生姿愈覺可愛又想道今番錯過此人後來總配個豪家宦室恐未必有此才貌兼全左思右想把腸子都想斷了也沒個計策與他相會心下煩惱倒走去坐下席還未暖恰像有人推起身的一般兩隻腳又早到屏門後張望看了一回又轉身去坐不上吃一碗茶的工夫卻又走來觀看猶如走馬燈一般頃刻幾個盤旋恨不得三四步輦至吳衙內身邊把愛慕之情一一細罄說話的我且問你在後艙中非止賀小姐一人須有夫人丫鬟等輩難道這般著迷光景豈不要看出破綻看官有個緣故只因夫人平素有件毛病剛到午間便要熟睡一覺這時正在睡鄉不得工夫那丫頭們巴不得夫人小姐不來呼喚背地自去打伙作樂誰個管這樣閑帳為此並無人知覺少頃夫人睡醒秀娥只得耐住雙腳悶坐呆想正是相思相見知何日此時此際難為情且說吳衙內身雖坐於席間心卻掛在艙後不住偷眼瞧看見屏門緊閉毫無影響暗嘆道賀小姐我特為你而來不能再見一面何緣分淺薄如此怏怏不樂連酒也懶得去飲抵暮席散歸到自己船中沒情沒緒便向床上和衣而臥這裡司戶送了吳府尹父子過船請夫人女兒到中艙夜飯秀娥一心憶著吳衙內坐在旁邊不言不語如醉如癡酒也不沾一滴箸也不動一動夫人看了這個模樣忙問道兒為甚一毫東西不吃只是呆坐連問幾聲秀娥方答道身子有些不好吃不下司戶道既然不自在先去睡罷夫人便起身叫丫鬟掌燈送他睡下方纔出去停了一回夫人又來看覷一番催丫鬟吃了夜飯進來打鋪相伴秀娥睡在帳中翻來覆去那裡睡得著忽聞艙外有吟詠之聲側耳聽時乃是吳衙內的聲音其詩云天涯猶有夢對面豈無緣莫道歡娛暫還期盟誓堅秀娥聽罷不勝歡喜道我想了一日無計見他一面如今在外吟詩豈非天付良緣料此更深人靜無人知覺正好與他相會又恐丫鬟們未睡連呼數聲俱不答應量已熟睡即披衣起身將殘燈挑得亮亮的輕輕把艙門推開吳衙內恰如在門首守候的一般門啟處便鑽入來兩手摟抱秀娥又驚又喜日間許多想念之情也不暇訴說連艙門也不曾閉上相偎相抱解衣就寢成其雲雨正在酣美深處只見丫鬟起來解手喊道不好了艙門已開想必有賊驚動合船的人都到艙門口觀看司戶與夫人推門進來教丫鬟點火尋覓吳衙內慌做一堆叫道小姐怎麼處秀娥道要不著忙你只躲在床上料然不尋到此待我打發他們出去送你過船剛抽身下床不想丫鬟照見了吳衙內的鞋兒乃道賊的鞋也在此想躲在床上司戶夫妻便來搜看秀娥推住連叫沒有那裡肯聽向床上搜出吳衙內秀娥只叫得苦也司戶道叵耐這廝怎來點污我家夫人便說吊起拷打司戶道也不要打竟撇入江裡去罷教兩個水手扛頭扛腳抬將出去吳衙內只叫饒命秀娥扯住叫道爹媽都是孩兒之罪不幹他事司戶也不答應將秀娥推上一交把吳衙內撲通撇在水裡秀娥此時也不顧羞恥跌腳捶胸哭道吳衙內是我害著你了又想道他既因我而死我又何顏獨生遂搶出艙門向著江心便跳可憐嫩玉嬌香女化作隨波逐浪魂秀娥剛跳下水猛然驚覺卻是夢魘身子仍在床上旁邊丫鬟還在那裡叫喊小姐甦醒秀娥睜眼看時天已明瞭丫鬟俱已起身外邊風浪依然狂大丫鬟道小姐夢見甚的恁般啼哭叫喚不醒秀娥把言語支吾過了想道莫不我與吳衙內沒有姻緣之分顯這等凶惡夢兆又想道若得真如夢裡這回恩愛就死亦所甘心此時又被夢中那段光景在腹內打攪越發想得癡了覺道睡來沒些聊賴推枕而起丫鬟們都不在眼前即將門掩上看著艙門說道昨夜吳衙內明明從此進來樓抱至床不信到是做夢又想道難道我夢中便這般僥幸醒時卻真個無緣不成一面思想一面隨手將艙門推開用目一覷只見吳府尹船上艙門大開吳衙內向著這邊船上呆呆而坐原來二人臥處都在後艙恰好間壁只隔得五六尺遠若去了兩重窗便是一家那吳衙內也因夜來魂顛夢到清早就起身開著窗兒觀望賀司戶船這也是癩蝦蟆想天鵝肉吃的妄想那知姻緣有分數合當然湊巧賀小姐開窗而下正打個照面四目相視且驚且喜恰如識熟過的彼此微微而笑秀娥欲待通句話兒期他相會又恐被人聽見遂取過一幅桃花箋紙磨得墨濃醮得筆飽題詩一首折成方勝袖中摸出一方繡帕包裹卷做一團擲過船去吳衙內雙手承受深深唱個肥喏秀娥還了個禮然後解開看時其詩云花箋栽錦字繡帕裹柔腸不負襄王夢行雲在此方傍邊又有一行小字道今晚妾當挑燈相候以剪刀聲響為號幸勿爽約吳衙內看罷喜出望外暗道不道小姐又有如此秀美才華真個世間少有一頭贊羡即忙取過一幅金箋題詩一首腰間解下一條錦帶也卷成一塊擲將過來秀娥接得看時這詩與夢中聽見的一般轉覺駭然暗道如何他纔題的詩昨夜夢中倒見了看起來我二人合該為配故先做這般真夢詩後邊也有一行小字道承芳卿雅愛敢不如命看罷納諸袖中正在迷戀之際恰值丫鬟送面水叩門秀娥輕輕的上子開放丫鬟隨後夫人也來詢視見女兒已是起身纔放下這片愁心那日乃是吳府尹答席午前賀司戶就去赴宴夫人也自晝寢秀娥取出那首詩來不時展玩私心自喜盼不到晚有恁般怪事每常時霎霎眼便過了一日偏生這日的日子恰像有條繩子繫住現不能勾下去心下好不焦躁漸漸捱至黃昏忽地想著這兩個丫鬟礙眼不當穩便除非如此如此到夜飯時私自賞那貼身伏侍的丫鬟一大壺酒兩碗菜蔬這兩個丫頭猶如渴龍見水吃得一滴不留少頃賀司戶筵散回船已是爛醉秀娥恐怕吳衙內也吃醉了不能赴約反增懮慮回到後艙掩上門兒教丫鬟將香兒熏好了衾枕分付道我還要做些針指你們先睡則個那兩個丫鬟正是酒湧上來面紅耳熱腳軟頭旋也思量乾這道兒只是不好開口得了此言正中下懷連忙收拾被窩去睡頭兒剛剛著枕鼻孔中就扌肩風箱般打鼾了秀娥坐了更餘仔細聽那兩船人聲靜悄寂寂無聞料得無事遂把剪刀向棹兒上廝琅的一響那邊吳衙內早已會意原來吳衙內記掛此事在席上酒也不敢多飲賀司戶去後回至艙中側耳專聽約莫坐了一個更次不見些影響心內正在疑惑忽聽得了剪刀之聲喜不自禁連忙起身輕手輕腳開了窗兒跨將出去依原推上聳身跳過這邊船來向窗門上輕輕彈了三彈秀娥便來開窗吳衙內鑽入艙中秀娥原復帶上兩下又見了個禮兒吳衙內在燈下把賀小姐仔細一觀更覺千嬌百媚這時彼此情如火熱那有閑工夫說甚言語吳衙內捧過賀小姐鬆開鈕扣解卸衣裳雙雙就枕酥胸緊貼玉體輕偎這場雲雨十分美滿但見艙門輕叩小窗開瞥見猶疑夢裡來萬種歡娛愁不足梅香熟睡莫驚猜一回兒雲收雨散各道想慕之情秀娥又將夢中聽見詩句卻與所贈相同的話說出吳衙內驚訝道有恁般奇事我昨夜所夢與你分毫不差因道是奇異悶坐呆想不道天使小姐也開窗觀覷遂成好事看起來多分是宿世姻緣故令魂夢先通明日即懇爹爹求親以圖偕老百年秀娥道此言正合我意二人說到情濃之際陽臺重赴恩愛轉篤竟自一覺睡去不想那晚夜半風浪平靜五鼓時分各船盡皆開放賀司戶吳府尹兩邊船上也各收拾篷檣解纜開船眾水手齊聲打號子起蓬早把吳衙內賀小姐驚醒又聽得水手說道這般好順風怕趕不到蘄州嚇得吳衙內暗暗只管叫苦說道如今怎生是好賀小姐道低聲儻被丫鬟聽見反是老大利害事已如此急也無用你且安下再作區處吳衙內道莫要應了昨晚的夢便好這句話卻點醒了賀小姐想夢中被丫鬟看見鞋兒以致事露遂伸手摸起吳衙內那雙絲鞋藏過賀小姐躊躇了千百萬遍想出一個計來乃道我有個法兒在此吳衙內道是甚法兒賀小姐道日裡你便向床底下躲避我也只推有病不往外邊陪母親吃飯竟討進艙來待到了荊州多將些銀兩與你趁起岸時人從紛紜從鬧中脫身覓個便船回到揚州然後寫書來求親爹媽若是允了不消說起儻或不肯只得以實告之爹媽平日將我極是愛惜到此地位料也只得允從那時可不依舊夫妻會合吳衙內道若得如此可知好哩到了天明等丫鬟起身出艙去後二人也就下床吳衙內急忙鑽入床底下做一堆兒伏著兩旁俱有箱籠遮隱床前自有帳幔低垂賀小姐又緊緊坐在床邊寸步不離盥漱過了頭也不梳假意靠在桌上夫人走入看見便道呵呀為何不梳頭卻靠在此秀娥道身子覺道不快怕得梳頭夫人道想是起得早些傷了風了還不到床上去睡睡秀娥道因是睡不安穩纔坐在這裡夫人道既然要坐還該再添件衣服休得凍了越加不好教丫鬟尋過一領披風與他穿起又坐了一回丫鬟請吃朝膳夫人道兒身子不安莫要吃飯不如教丫鬟香香的煮些粥兒調養倒好秀娥道我心裡不喜歡吃粥還是飯好只是不耐煩走動拿進來吃罷夫人道既恁般我也在此陪你秀娥道這班丫頭背著你眼就要胡做了母親還到外邊去吃夫人道也說得是遂轉身出去教丫鬟將飯送進擺在桌上秀娥道你們自去待我喚時方來打發丫鬟去後把門頂上向床底下招出吳衙內來吃飯那吳衙內爬起身把腰伸了一伸舉目看桌上時乃是兩碗葷菜一碗素菜飯只有一吃一添原來內食三升米的腸子這兩碗飯填在那處微微笑了一笑舉起箸兩三超就便了帳卻又不好說得忍著餓原向床下躲過秀娥開門喚過丫鬟又教添兩碗飯來吃了那丫鬟互相私議道小姐自來只用得兩碗今日說道有病如何反多吃了一半可不是怪事不想夫人聽見走來說道兒你身子不快怎地反吃許多飯食秀娥道不妨事我還未飽哩這一日三餐俱是如此司戶夫婦只道女兒年紀長大增了飯食正不知艙中另有個替吃飯的還餓得有氣無力哩正是安排布地瞞天謊成就偷香竊玉情當晚夜飯過了賀小姐即教吳衙內先上床睡臥自己隨後解衣入寢夫人又來看時見女兒已睡問了聲自去丫鬟也掩門歇息吳衙內飢餒難熬對賀小姐說道事雖好了只有一件苦處秀娥道是那件吳衙內道不瞞小姐說我的食量頗寬今日這三餐還不勾我一頓若這般忍餓過日怎能捱到荊州秀娥道既恁地何不早說明日多討些就是吳衙內道十分討得多又怕惹人疑惑秀娥道不打緊自有道理但不知要多少纔勾吳衙內道那裡像得我意每頓十來碗也胡亂度得過了到次早吳衙內依舊躲過賀小姐詐病在床呻吟不絕司戶夫人擔著愁心要請醫人調治又在大江中沒處去請秀娥卻也不要只叫肚裡餓得慌夫人流水催進飯來又只嫌少共爭了十數多碗倒把夫人嚇了一跳勸他少吃時故意使起性兒連叫快拿去不要吃了索性餓死罷夫人是個愛女見他使性反陪笑臉道兒我是好話如何便氣你若吃得盡意吃罷了只不要勉強親自拿起碗箸遞到他手裡秀娥道母親在此看著我便吃不下去通出去了等我慢慢的或者吃不完也未可知夫人依他言語教丫鬟一齊出外秀娥披衣下床將門掩上吳衙內便鑽出來因是昨夜餓壞了見著這飯也不謙讓也不抬頭一連十數碗吃個流星趕月約莫存得碗餘方纔住手把賀小姐到看呆了低低問道可還少麼吳衙內道將就些罷再吃便沒意思了瀉杯茶漱漱口兒向床下颼的又鑽入去了賀小姐將餘下的飯吃罷拽開門兒原到床上睡臥那丫鬟專等他開門就奔進去看見飯兒菜兒都吃得精光收著家夥一路笑道原來小姐患的卻是吃飯病報知夫人夫人聞言只把頭搖說道虧他怎地吃上這些那病兒也患得蹊蹺急請司戶來說知教他請醫問卜連司戶也不肯信分付午間莫要依他恐食傷了五臟便難醫治那知未到午時秀娥便叫肚飢夫人再三把好言語安慰時秀娥就啼哭起來夫人沒法只得又依著他晚間亦是如此司戶夫妻只道女兒得了怪病十分慌張這晚已到蘄州停泊分付水手明日不要開船清早差人入城訪問名醫一面求神占卦不一時請一個太醫來那太醫衣冠濟楚氣宇軒昂賀司戶迎至艙中敘禮看坐那太醫嘵得是位官禮貌甚恭獻過兩杯茶問了些病緣然後到後艙認脈認過脈復至中艙坐下賀司戶道請問太醫小女還是何癥太醫先咳了一聲嗽方纔答道令愛是疳膨食積賀司戶道先生差矣疳膨食積乃嬰兒之癥小女今年十五歲了如何還犯此癥太醫笑道老先生但知其一不知其二令愛名雖十五歲即今尚在春間只有十四歲之實儻在寒月所生纔十三歲有餘老先生你且想十三歲的女子難道不算嬰孩大抵此癥起於飲食失調兼之水土不伏食積於小腹之中凝滯不消遂至生熱昇至胸中便覺飢餓及吃下飲食反資其火所以日盛一日若再過月餘不醫就難治了賀司戶見說得有些道理問道先生所見極是有理了但今如何治之太醫道如今學生先消其積滯去其風熱住了熱飲食自然漸漸減少平復如舊矣賀司戶道若得如此神效自當重酬道罷太醫起身拜別賀司戶封了藥資差人取了藥來流水煎起送與秀娥那秀娥一心只要早至荊州那個要吃什麼湯藥初時見父母請醫再三阻當不住又難好道出真情只得繇他慌亂曉得了醫者這班言語暗自好笑將來的藥也打發丫鬟將去竟潑入淨桶求神占卦有的說是星辰不利又觸犯了鶴神須請僧道禳解自然無事有的說在曠野處遇了孤魂餓鬼若設蘸追薦便可痊愈賀司戶夫妻一一依從見服了幾劑藥沒些效驗吃飯如舊又請一個醫者那醫者更是擴而充之乘著轎子三四個僕從跟隨相見之後高談闊論也先探了病源方纔認脈問道老先生可有那個看過麼賀司戶道前日曾請一位看來醫者道他看的是何癥賀司戶道說是疳膨食積醫者呵呵笑道此乃癆瘵之癥怎說是疳膨食積賀司戶道小女年紀尚幼如何有此癥候醫者道令愛非七情六欲癆怯之比他本秉氣虛弱所謂孩兒癆便是賀司戶道飲食無度這是為何醫者道寒熱交攻虛火上延因此容易飢餓夫人在屏後打聽教人傳說小姐身子並不發熱醫者又道這乃內熱外寒骨蒸之癥故不覺得又討前日醫者藥劑看了說道這般克罰藥削弱元氣再服幾劑便難救了待學生先以煎藥治其虛熱調和臟腑即進飲食那時方以滋陰降火養血補元的丸藥慢慢調理自當痊可賀司戶稱謝道全仗神力遂辭別而去少頃家人又請一個太醫到來那太醫卻是個老者須鬢皜然步履蹣跚剛坐下便誇張善識疑難怪異之病某官府虧老夫救的某夫人又虧老夫用甚藥奏效那門面話兒就說了一大派又纍纍問了病者起居飲食纔去診脈賀司戶被他大話一哄認做有意思的暗道常言老醫少卜或者這醫人有些效驗也未可知醫者認過了脈向賀司戶道還是老先生有緣得遇老夫令愛這個病癥非老夫不能識賀司戶道請問果是何疾醫者道此乃有名色的謂之膈病賀司戶道吃不下飲食方是膈病目今比平常多食幾倍如何是這癥候醫者道膈病原有幾般像令愛這膈病俗名喚做老鼠膈背後盡多盡吃及至見了人一些也難下咽喉後來食多發漲便成盅脹二病相兼便難醫治如今幸而初起還不妨得包在老夫身上可以除根言罷起身賀司戶送出船頭方別那時一家都認做老鼠膈見神見鬼的請醫問卜那曉得賀小姐把來的藥都送在淨桶肚裡背地冷笑賀司戶在蘄州停了幾日算來不是長法與夫人商議與醫者求了個藥方多買些藥材一路吃去且到荊州另請醫人那老兒因要他寫方著實詐了好些銀兩可不是他的造化有詩為證醫人未必盡知醫卻是將機便就機無病妄猜雲有病卻教司戶折便宜常言說得好少女少郎情色相當賀小姐初時還是個處子雲雨之際尚是逡巡畏縮況兼吳衙內心慌膽怯不敢恣肆彼此未見十分美滿兩三日後漸入佳境姿意取樂忘其所以一晚夜半丫鬟睡醒聽得床上唧唧噥噥床棱戛戛的響隔了一回又聽得氣喘吁吁心中怪異次早報與夫人夫人也因見女兒面色紅活不像個病容正有些疑惑聽了這話合著他的意思不去通知司戶竟走來觀看又沒些破綻及細看秀娥面貌愈覺丰采倍常卻又不好開口問得倒沒了主意坐了一回原走出去朝飯已後終是放心不下又進去探覷把遠話挑問秀娥見夫人話兒問得蹊蹺便不答應耳邊忽聞得打鼾之聲原來吳衙內夜間多做了些正經不曾睡得此時吃飽了飯在床底下酣睡秀娥一時遮掩不來被夫人聽見將丫鬟使遣開去把門頂上向床下一望只見靠壁一個攏頭孩子曲著身體睡得好不自在夫人暗暗叫苦不迭對秀娥道你做下這等勾當卻詐推有病嚇得我夫妻心花兒急碎了如今羞人答答怎地做人這天殺的還是那裡來的秀娥羞得滿面通紅說道是孩兒不是一時做差事了望母親遮蓋則個這人不是別個便是吳府尹的衙內夫人失驚道吳衙內與你從未見面況那日你爹在他船上吃酒還在席間陪侍夜深方散四鼓便開船了如何得能到此秀娥從實將司戶稱贊留心次日屏後張望夜來做夢早上開窗訂約並熟睡船開前後事細細說出又道不肖女一時情癡喪名失節玷辱父母罪實難逭但兩地相隔數千里一旦因阻風而會此乃宿世姻緣天遣成配非繇人力兒與吳衙內誓同生死各不更改望母親好言勸爹曲允尚可挽回前失倘爹有別念兒即自盡決不偷生苟活今蒙恥稟知母親一任主張道罷淚如雨下這裡母子便說話下邊吳衙內打鼾聲越發雷一般響了此時夫人又氣又惱欲待把他難為一來嬌養慣了那裡捨得二來恐婢僕聞知反做話靶吞聲忍氣拽開門走往外邊去了秀娥等母親轉身後急下床頂上門兒在床下叫醒吳衙內埋怨道你打鼾也該輕些兒驚動母親事都泄漏了吳衙內聽說事露嚇得渾身冷汗直淋上下牙齒頃刻就榼蹬蹬的相打半句話也掙不出秀娥道莫要慌適來與母親如此如此說了若爹爹依允不必講起不肯時拚得學夢中結局決不教你獨受其累說到此處不覺淚珠亂滾且說夫人急請司戶進來屏退丫鬟未曾開言眼中早已簌簌淚下司戶還道愁女兒病體反寬慰道那醫者說只在數日便可奏效不消煩惱夫人道聽那老光棍花嘴什麼老鼠膈論起恁般太醫莫說數日內奏效就一千日還看不出病體司戶道你且說怎的夫人將前事細述把司戶氣得個發昏章第十一連聲道罷了罷了這等不肖之女做恁般醜事敗壞門風要他何用趁今晚都結果了性命也脫了這個醜名這兩句話驚得夫人面如土色勸道你我已在中年止有這點骨血一發斷送更有何人論來吳衙內好人家子息才貌兼全招他為婿原是門當戶對獨怪他不來求親私下做這般勾當事已如此也說不得了將錯就錯悄地差人送他回去寫書與吳府尹令人來下聘然後成禮兩全其美今若聲張反妝幌子司戶沈吟半響無可奈何只得依著夫人出來問水手道這裡是甚地方水手答道前邊已是武昌府了司戶分付就武昌暫停要差人回去一面修起書札喚過一個心腹家人分付停當不一時到了武昌那家人便上涯寫下船隻旁在船邊賀司戶與夫人同至後艙秀娥見了父親自覺無顏把被蒙在面上司戶也不與他說話只道做得好事向床底下呼喚吳衙內那吳衙內看見了賀司戶夫婦不知是甚意兒戰兢兢爬出來伏在地上口稱死罪司戶低責道我只道你少年博學可以成器不想如此無行辱我家門本該撇下江裡纔消這點惡氣今姑看你父親面皮饒你性命差人送歸若得成名便把不肖女與你為妻如沒有這般志氣休得指望吳衙內連連叩頭領命司戶原教他躲過捱至夜深人靜悄地教家人引他過船連丫鬟不容一個見面彼時兩下分別都還道有甚歹念十分淒慘又不敢出聲啼哭秀娥又扯夫人到背後說道此行不知爹爹有甚念頭須教家人回時討吳衙內書信覆我方纔放心夫人真個依著他又叮囑了家人次日清早開船自去賀司戶船隻也自望荊州進發賀小姐誠恐吳衙內途中有變心下懮慮即時真個倒想出病來正是乍別冷如冰動念熱如火三百六十病唯有相思苦話分兩頭且說吳府尹自那早離了江州行了幾十里路已是朝膳時分不見衙內起身還道夜來中酒看看至午不見聲息以為奇怪夫人自去叫喚並不答應那時著了忙吳府尹教家人打開觀看只有一個空艙嚇得府尹夫妻魂魄飛散呼天愴地的號哭只是解說不出合船的人都道這也作怪總來只有只船那裡去了除非落水裡吳府尹聽了眾人遂泊住船尋人打撈自江州起至泊船之所百里內外把江也撈遍了那裡羅得屍首一面招魂設祭把夫人哭得死而復甦吳府尹因沒了兒子連官也不要做了手下人再三苦勸方纔前去上任不則一日賀司戶家人送吳衙內到來父子一見驚喜相半看了書札方知就裡將衙內責了一聲款留賀司戶家人住了數日準備聘禮寫起回書差人同去求親吳衙內也寫封私書寄與賀小姐兩下家人領著禮物別了吳府尹直至荊州參見賀司戶收了聘禮又做回書打發吳府尹家人回去那賀小姐正在病中見了吳衙內書信然後漸漸痊愈那吳衙內在衙中日夜攻書候至開科至京應試一舉成名中了進士湊巧除授荊州府湘潭縣縣尹吳府尹見兒子成名便告了致仕同至荊州上任擇吉迎娶賀小姐過門成親同僚們前來稱賀兩個花燭下新人錦衾內一雙鳳友秀娥過門之後孝敬公姑夫妻和順頗有賢名後來賀司戶因念著女兒也入籍汴京靠老終身吳彥官至龍圖閣學士生得二子亦登科甲這回書喚做吳衙內鄰舟赴約詩云佳人才子貌相當八句新詩暗自將百歲姻緣床下就麗情千古播詞場
