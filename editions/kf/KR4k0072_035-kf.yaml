個貪杯的吃了他的軟口湯不好回得一口應承當晚就往各村戶湊足其數裝裹停當恐怕客人們知得瞋怪到寄在鄰家放下次日起個五更打發阿寄起身那阿寄發利市就得了便宜好不喜歡教腳夫挑出新安江口又想道杭州離此不遠定賣不起價錢遂僱船直到蘇州正遇在缺漆之時見他的貨到猶如寶貝一般不勾三日賣個乾淨一色都是見銀並無一毫賒帳除去盤纏使用足足賺對合有餘暗暗感謝天地即忙收拾起身又想道我今空身回去須是趁船這銀兩在身邊反擔干係何不再販些別樣貨去多少尋些利息也好打聽得楓橋秈米到得甚多登時落了幾分價錢乃道這販米生意量來必不吃虧遂糴了六十多擔秈米載到杭州出脫那時乃七月中旬杭州有一個月不下雨稻苗都乾壞了米價騰湧阿寄這載米又值在巧裡每一挑長了二錢又賺十多兩銀子自言自語道且喜做來生意頗頗順溜想是我三娘福分到了卻又想道既在此間怎不去問問漆價若與蘇州相去不遠也省好些盤纏細細訪問時比蘇州更反勝你道為何原來販漆的都道杭州路近價賤俱往遠處去了杭州到時常短缺常言道貨無大小缺者便貴故此比別處反勝阿寄得了這個消息喜之不勝星夜趕到慶雲山只備下些小人事送與主人家依舊又買三杯相請那主人家得了些小便宜喜逐顏開一如前番悄悄先打發他轉身到杭州也不消三兩日就都賣完計算本利果然比起先這一帳又多幾兩只是少了那回頭貨的利息乃道下次還到遠處去與牙人算清了帳目收拾起程想道出門好幾時了三娘必然掛念且回去回復一聲也教他放心又想道總是收漆要等候兩日何不先到山中將銀子教主人家一面先收然後回家豈不兩便定了主意到山中把銀兩付與牙人自己趕回家去正是先收漆貨兩番利初出茅廬第一功且說顏氏自阿寄去後朝夕懸掛常恐他消折了這些本錢懷著鬼胎耳根邊又聽得徐言兄弟在背後攧脣簸嘴愈加煩惱一日正在房中悶坐忽見兩個兒子亂喊進來道阿寄回家了顏氏聞言急走出房阿寄早已在面前他的老婆也隨在背後阿寄上前深深唱個大喏顏氏見了他反增著一個蹬心拳頭胸前突突的亂跳誠恐說出句掃興話來便問道你做的是什麼生意可有些利錢那阿寄叉手不離方寸不慌不忙的說道一來感謝天地保佑二來托賴三娘洪福做的卻是販漆生意賺得五六倍利息如此如此這般這般恐怕三娘放心不下特歸來回復一聲顏氏聽罷喜從天降問道如今銀子在那裡阿寄道已留與主人家收漆不曾帶回我明早就要去的那時閤家歡天喜地阿寄住了一晚次日清早起身別了顏氏又往慶雲山去了且說徐言弟兄那晚在鄰家吃社酒醉倒故此阿寄歸家全不曉得到次日齊走過來問道阿寄做生意歸來趁了多少銀子顏氏道好教二伯伯知得他一向販漆營生倒覓得五六倍利息徐言道好造化恁樣賺錢時不勾幾年便做財主哩顏氏道伯伯休要笑話免得飢寒便勾了徐召道他如今在那裡出去了幾多時怎麼也不來見我這樣沒禮顏氏道今早原就去了徐召道如何去得恁般急速徐言又問道那銀兩你可曾見見數麼顏氏道他說俱留在行家買貨沒有帶回徐言呵呵笑道我只道本利已在手上了原來還是空口說白話眼飽肚中肌耳邊到說得熱哄哄還不知本在何處利在那裡便信以為真做經紀的人左手不托右手豈有自己回家銀子反留在外人據我看起來多分這本錢弄折了把這鬼話哄你徐召也道三娘子論起你家做事不該我們多口但你終是女眷家不知外邊世務既有銀兩也該與我二人商量買幾畝田地還是長策那阿寄曉得做甚生理卻瞞著我們將銀子與他出去瞎撞我想那銀兩不是你的妝奩也是三兄弟的私蓄須不是偷來的怎看得恁般輕易二人一吹一唱說得顏氏心中啞口無言心下也生疑惑委決不下把一天歡喜又變為萬般悶愁按下此處不提再說阿寄這老兒急急趕到慶雲山中那行家已與他收完點明交付阿寄此番不在蘇杭發賣徑到興化地方利息比這兩處又好賣完了貨卻聽得那邊米價一兩三擔斗斛又大想起杭州見今荒歉前次糴客販的去尚賺了錢今在出處販去怕不有一兩個對合遂裝上一大載米至杭州准准糴了一兩二錢一石斗斛上多來恰好頂著船錢使用那時到山中收漆便是大客人了主人家好不奉承一來是顏氏命中合該造化二來也虧阿寄經營伶俐凡販的貨物定獲厚利一連做了幾帳長有二千餘金看看捱著殘年算計道我一個孤身老兒帶著許多財物不是耍處倘有差跌前功盡棄況且年近歲逼家中必然懸望不如回去商議置買些田產做了根本將餘下的再出來運弄此時他出路行頭諸色盡備把銀兩逐封緊緊包裹藏在順袋中水路用舟陸路僱馬晏行早歇十分小心非止一日已到家中把行李馱入婆子見老公回了便去報知顏氏那顏氏一則以喜一則以懼所喜者阿寄回來所懼者未知生意長短若何因向日被徐言弟兄奚落了一場這番心裡比前更是著急三步併作兩步奔至外廂望見這堆行李料道不像個折本的心上就安了一半終是忍不住便問道這一向生意如何銀兩可曾帶回阿寄近前見了個禮說道三娘不要急待我慢慢的細說教老婆頂上中門把行李盡搬至顏氏房中打開將銀子逐封交與顏氏顏氏見著許多銀兩喜出望外連忙開箱啟籠收藏阿寄方把往來經營的事說出顏氏因怕惹是非徐言當日的話一句也不說與他知道但連稱都虧你老人家氣力了且去歇息則個又分付倘大伯們來問起不要與他講真話阿寄道老奴理會得正話間外面口平口平聲叩門原來卻是徐言弟兄聽見阿寄歸了特來打探消耗阿寄上前作了兩個揖徐言道前日聞得你生意十分旺相今番又趁若干利息阿寄道老奴托賴二位官人洪福除了本錢盤費乾淨趁得四五十兩徐召道阿呀前次便說有五六倍利了怎地又去了許多時反少起來徐言道且不要問他趁多趁少只是銀子今日可曾帶回阿寄道已交與三娘了二人便不言語轉身出去再說阿寄與顏氏商議要置買田產悄地央人尋覓大抵出一個財主生一個敗子那錦沙村有個晏大戶傢俬豪富田產廣多單生一子名為世保取世守其業的意思誰知這晏世保專於嫖賭把那老頭兒活活氣死合村的人道他是個敗子將晏世保三字順口改為獻世保那獻世保同著一班無藉朝歡暮樂弄完了家中財物漸漸搖動產業道是零星賣來不勾用索性賣一千畝討價三千餘兩又要一注兒交銀那村中富者雖有一時湊不起許多銀子無人上樁延至歲底獻世保手中越覺乾逼情願連一所莊房只要半價阿寄偶然聞得這個消息即尋中人去討個經帳恐怕有人先成了去就約次日成交獻世保聽得有了售主好不歡喜平日一刻也不著家的偏這日足跡不敢出門呆呆的等候中人同往且說阿寄料道獻世保是愛吃東西的清早便去買下佳餚美醞喚個廚夫安排又向顏氏道今日這場交易非同小可三娘是個女眷家兩位小官人又幼老奴又是下人只好在旁說話難好與他抗禮須請間壁大官人弟兄來作眼方是正理顏氏道你就過去請一聲阿寄即到徐言門首弟兄正在那裡說話阿寄道今日三娘買幾畝田地特請二位官人來張主二人口中雖然答應心內又怪顏氏不托他尋覓好生不樂徐言說道既要買田如何不托你我又教阿寄張主直至成交方纔來說只是這村中沒有什麼零星田賣徐召道不必猜疑少頃便見著落了二人坐於門首等至午前光景只見獻世保同著幾個中人兩個小廝拿著拜匣一路拍手拍腳的笑來望著間壁門內齊走進去徐言弟兄看了倒吃一嚇都道咦好作怪聞得獻世保要賣一千畝田實價三千餘兩不信他家有許多銀子難道獻世保又零賣一二十畝疑惑不定隨後跟入相見已罷分賓而坐阿寄向前說道晏官人田價昨日已是言定一依分付不敢斷少晏官人也莫要節外生枝又更他說獻世保亂嚷道大丈夫做事一言已出駟馬難追若又有他說便不是人養的了阿寄道既如此先立了文契然後兌銀那紙墨筆硯準備得停停噹噹拿過來就是獻世保拈起筆盡情寫了一紙絕契又道省得你不放心先畫了花約何如阿寄道如此更好徐言兄弟看那契上果是一千畝田一所莊房實價一千五百兩嚇得二人面面相覷伸出了舌頭半日也縮不上去都暗想道阿寄生意總是趁錢也趁不得這些莫不是做強盜打劫的或是掘著了藏好生難猜中人著完花押阿寄收進去交與顏氏他已先借下一副天秤法馬提來放在桌上與顏氏取出銀子來兌一色都是粉塊細絲徐言徐召眼內放出火來喉間煙也直冒恨不得推開眾人通搶回去不一時兌完擺出酒餚飲至更深方散次日阿寄又向顏氏道那莊房甚是寬大何不搬在那邊居住收下稻子也好照管顏氏曉得徐言弟兄妒忌也巴不能遠開一步便依他說話選了新正初六遷入新房阿寄又請個先生教他兩位小官人讀書大的名徐寬次的名徐宏家中收拾得十分次第那些村中人見顏氏買了一千畝田都傳說掘了藏銀子不計其數連坑廁說來都是銀的誰個不來趨奉再說阿寄將家中整頓停當依舊又出去經營這番不專於販漆但聞有利息的便做家中收下米谷又將來騰那十年之外傢俬巨富那獻世保的田宅盡歸於徐氏門庭熱鬧牛馬成群婢僕僱工人等也有整百好不興頭正是富貴本無根盡從勤裡得請觀懶惰者面帶飢寒色那時顏氏三個女兒都嫁與一般富戶徐寬徐宏也各婚配一應婚嫁禮物盡是阿寄支持不費顏氏絲毫氣力他又見田產廣多差役煩重與徐寬弟兄俱納個監生優免若干田役顏氏與阿寄兒子完了姻事又見那老兒年紀衰邁留在家中照管不肯放他出去又派個馬兒與他乘坐那老兒自經營以來從不曾私吃一些好飲食也不曾自私做一件好衣服寸絲尺帛必稟命顏氏方纔敢用且又知禮數不論族中老幼見了必然站起或乘馬在途中遇著便跳下來閃在路旁讓過去了然後又行因此遠近親鄰沒一人不把他敬重就是顏氏母子也如尊長看承那徐言徐召雖也掙起些田產比著顏氏尚有天淵之隔終日眼紅頸赤那老兒揣知二人意思勸顏氏各助百金之物又築起一座新墳連徐哲父母一齊安葬那老兒整整活到八十患起病來顏氏要請醫人調治那老兒道人年八十死乃分內之事何必又費錢鈔執意不肯服藥顏氏母子不住在床前看視一面準備衣衾棺槨病了數日勢漸危篤乃請顏氏母子到房中坐下說道老奴牛馬力已少盡死亦無恨只有一事越分張主不要見怪顏氏垂淚道我母子全虧你氣力方有今日有甚事體一憑分付決不違拗那老兒向枕邊摸出兩紙文書遞與顏氏道兩位小官人年紀已長後日少不得要分析倘那時嫌多道少便傷了手足之情故此老奴久已將一應田房財物等件分均停當今日交付與二位小官人各自去管業又叮囑道那奴僕中難得好人諸事須要自己經心切不可重托顏氏母子含淚領命他的老婆兒子都在床前啼啼哭哭也囑咐了幾句忽地又道只有大官人二官人不曾面別終是欠事可與我去請來顏氏即差個家人去請徐言徐召說道好時不直得幫扶我們臨死卻來思想可不扯淡不去不去那家人無法只得轉身卻見徐宏親自奔來相請二人滅不個侄兒面皮勉強隨來那老兒已說話不出把眼看了兩看點點頭兒奄然而逝他的老婆兒媳啼哭自不必說只這顏氏母子俱放聲號慟便是家中大小男女念他平日做人好處也無不下淚惟有徐言徐召反有喜色可憐那老兒辛勤好似蠶成繭繭老成絲蠶命休又似採花蜂釀蜜甜頭到底被人收顏氏母子哭了一回出去支持殯殮之事徐言徐召看見棺木堅固衣衾整齊扯徐寬弟兄到一邊說道他是我家家人將就些罷了如何要這般好斷送就是當初你家公公與你父親也沒恁般齊整徐寬道我家全虧他掙起這些事業若薄了他內心上也打不過去徐召笑道你老大的人還是個呆子這是你母子命中合該有此造化豈真是他本事掙來的哩還有一件他做了許多年數克剝的私房必然也有好些怕道沒得結果你卻挖出肉裡錢來與他備後事徐寵道不要冤枉壞人我看他平日一厘一毫都清清白白交與母親並不見有什麼私房徐召又說道做的私房藏在那裡難道把與你看不成若不信時如今將那房中一檢極少也有整千銀子徐寬道總有也是他掙下的好道拿他的不成徐言道雖不拿他的見個明白也好徐寬弟兄被二人說得疑疑惑惑遂聽了他也不通顏氏知道一齊走至阿寄房中把婆子們哄了出去閉上房門開箱倒籠遍處一搜只有幾件舊衣舊裳那有分文錢鈔徐召道一定藏在兒子房裡也去一檢尋出一包銀子不上二兩包中有個帳兒徐寬仔細看時還是他兒子娶妻時顏氏助作三兩銀子用剩下的徐宏道我說他沒有什麼私房卻定要來看還不快收拾好了倘被人撞見反道我們器量小了徐言徐召自覺乏趣也不別顏氏徑自去了徐寬又把這事學向母親愈加傷感令閤家掛孝開喪受吊多修功果追薦七終之後即安葬於新墳旁邊祭葬之禮每事從厚顏氏主張將家產分一股與他兒子自去成家立業奉養其母又教兒子們以叔侄相稱此亦見顏氏不泯阿寄恩義的好處那合村的人將阿寄生平行誼具呈府縣要求旌獎以勸後人府縣又查勘的實申報上司具疏奏聞朝廷旌表其間至今徐氏子孫繁衍富冠淳安詩云年老筋衰遜馬牛千金致產出人頭託孤寄命真無愧羞殺蒼頭不義侯
