body:
  text: 第三十五卷徐老僕義憤成家犬馬猶然知戀主況於列在生人為奴一日主人身情恩同父子名分等君臣主若虐奴非正道奴如欺主傷倫能為義僕是良民盛衰無改節史冊可傳神說這唐玄宗時有一官人姓蕭名穎士字茂挺蘭陵人氏自幼聰明好學該博三教九流貫串諸子百家上自天文下至地理無所不通無有不曉真個胸中書富五車筆下句高千古年方一十九歲高掇巍科名傾朝野是一個廣學的才子家中有個僕人名喚杜亮那杜亮自蕭穎士數齡時就在書房中服事起來若有驅使奮勇直前水火不避身邊並無半文私蓄陪伴蕭穎士讀書時不待分付自去千方百計預先尋覓下果品飲饌供奉有時或烹甌茶兒助他清思或暖杯酒兒節他辛苦整夜直服事到天明從不曾打個瞌睡如見蕭穎士讀到得意之處他在旁也十分歡喜那蕭穎士般般皆好件件俱美只有兩樁兒毛病你道是那兩樁第一件乃是恃才傲物不把人看在眼內纔登仕籍便去衝撞了當朝宰相那宰相若是個有度量的還恕得他過又正衝撞了是第一個忌纔的李林甫那李林甫混名叫做李貓平昔不知壞了多少大臣乃是殺人不見血的劊子手卻去惹他可肯輕輕放過被他略施小計險些連性命都送了又虧著座主搭救止削了官職坐在家裡第二件是性子嚴急卻像一團烈火片語不投即暴躁如雷兩太陽星直爆奴僕稍有差誤便加捶撻他的打法又與別人不同有甚不同別人責治家奴定然計其過犯大小討個板子教人行杖或打一十或打二十分個輕重惟有蕭穎士不論事體大小略觸著他的性子便連聲喝罵也不用什麼板子也不要人行杖親自跳起身來一把揪翻隨分掣著一件家火沒頭沒腦亂打憑你什麼人勸解他也全不作準直要打個氣息若不像意還要咬上幾口方纔罷手因是恁般利害奴僕們懼怕都四散逃去單單存得一個杜亮論起蕭穎士止存得這個家人種兒每事只該將就些纔是誰知他是天生的性兒使慣的氣兒打溜的手兒竟沒絲毫更改依然照舊施行起先奴僕眾多還打了那個空了這個到得禿禿裡獨有杜亮時反覺打得勤些論起杜亮遇著這般難理會的家主也該學眾人逃走去罷了偏又寸步不離甘心受他的責罰常常打得皮開肉綻頭破血淋也再無一點退悔之念一句怨恨之言打罷起來整一整衣裳忍著疼痛依原在旁答應說話的據你說杜亮這等奴僕莫說千中選一就是走盡天下也尋不出個對兒這蕭穎士又非黑漆皮燈泥塞竹管是那一竅不通的蠢物他須是身登黃甲位列朝班讀破萬卷明理的才人難道恁般不知好歹一味蠻打沒一點仁慈改悔之念不成看官有所不知常言道得好江山易改稟性難移那蕭穎士平昔原愛杜亮小心馴謹打過之後深自懊悔道此奴隨我多年並無十分過失如何只管將他這樣毒打今後斷然不可到得性發之時不覺拳腳又輕輕的生在他身上去了這也不要單怪蕭穎士性子急躁誰教杜亮剛聞得叱喝一聲恰如小鬼見了锺馗一般撲禿的兩條腿就跪倒在地蕭穎士本來是個好打人的見他做成這個要打局面少不得奉承幾下杜亮有個遠族兄弟杜明就住在蕭家左邊因見他常打得這個模樣心下到氣不過攛掇杜亮道凡做奴僕的皆因家貧力薄自難成立故此投靠人家一來圖個現成衣服二來指望家主有個發跡日子帶挈風光摸得些東西做個小小家業快活下半世像阿哥如今隨了這措大早晚辛勤服事竭力盡心並不見一些好處只落得常受他凌辱痛楚恁樣不知好歉的人跟他有何出息他家許多人都存住不得各自四散去了你何不也別了他另尋頭路有多少不如你的投了大官府人家吃好穿好還要作成趁一貫兩貫走出衙門前誰不奉承那邊纔叫某大叔有些小事相煩還未答應時這邊又叫某大叔我也有件事兒勞動真個應接不暇何等興頭若是阿哥這樣肚裡又明白筆下又來得做人且又溫存小心走到勢要人家怕道不是重用你那措大雖然中個進士發利市就與李丞相作對被他弄來坐在家中料道也沒個起官的日子有何撇不下定要與他纏帳杜亮道這些事我豈不曉得若有此念早已去得多年了何待吾弟今日勸諭古語云良臣擇主而事良禽擇木而棲奴僕雖是下賤也要擇個好使頭像我主人止是性子躁急除此之外只怕捨了他沒處再尋得第二個出來杜明道滿天下無數官員宰相貴戚豪家豈有反不如你主人這個窮官杜亮道他們有的不過是爵位金銀二事杜明道只這兩樁盡勾了還要怎樣杜亮道那爵位乃虛花之事金銀是臭污之物有甚希罕如何及得我主人這般高才絕學拈起筆來頃刻萬言不要打個稿兒真個煙雲繚繞華彩繽紛我所戀戀不捨者單愛他這一件耳杜明聽得說出愛他的纔學不覺呵呵大笑道且問阿哥你既愛他的才學到飢時可將來當得飯吃冷時可作得衣穿麼杜亮道你又說笑話才學在他腹中如何濟得我的飢寒杜明道原來又救不得你的飢又遮不得你的寒愛他何用當今有爵位的尚然只喜趨權附勢沒一個肯憐才惜學你我是個下人但得飽食暖衣尋覓些錢鈔做家乃是本等卻這般迂闊愛什麼才學情願受其打罵可不是個呆子杜亮笑道金銀我命裡不曾帶來不做這個指望還只是守舊杜明道想是打得你不爽利故此尚要捱他的棍棒杜亮道多承賢弟好情可憐我做兄的但我主這般博奥才學總然打死也甘心服事他遂不聽杜明之言仍舊跟隨蕭穎士不想今日一頓拳頭明日一頓棒子打不上幾年把杜亮打得漸漸遍身疼痛口內吐血成了個傷癆癥候初時還勉強趨承以後打熬不過半眠半起又過幾時便久臥床席那蕭穎士見他嘔血情知是打上來的心下十分懊悔還指望有好的日子請醫調治親自煎湯送藥捱了兩月嗚呼哀哉蕭穎士想起他平日的好處只管涕泣備辦衣棺埋葬蕭穎士日常虧杜亮服事慣了到得死後十分不便央人四處尋覓僕從因他打人的名頭出了那個肯來跟隨就有個肯跟他的也不中其意有時讀書到忘懷之處還認做杜亮在傍抬頭不見便掩卷而泣後來蕭穎士知得了杜亮當日不從杜明這班說話不覺氣咽胸中淚如泉湧大叫一聲杜亮我讀了一世的書不曾遇著個憐才之人終身淪落誰想你到是我的知己卻又有眼無珠枉送了你性命我之罪也言還未畢口中的鮮血往外直噴自此也成了個嘔血之疾將書籍盡皆焚化口中不住的喊叫杜亮病了數月也歸大夢遺命教遷杜亮與他同葬有詩為證納賄趨權步步先高才曾見幾人憐當路若能如杜亮草萊安得有遺賢說話的這杜亮愛纔戀主果是千古奇人然看起來畢竟還帶些腐氣未為全美若有別樁希奇故事異樣話文再講回出來列位看官穩坐著莫要性急適來小子道這段小故事原是入話還未曾說到正傳那正傳卻也是個僕人他比杜亮更是不同曾獨力與孤孀主母掙起個天大家事替主母嫁三個女兒與小主人娶兩房娘子到得死後並無半文私蓄至今名垂史冊待小子慢慢的道來勸諭那世間為奴僕的也學這般盡心盡力幫家做活傳個美名莫學那樣背恩反噬尾大不掉的被人唾罵你道這段話文出在那個朝代什麼地方原來就在本朝嘉靖爺年間浙江嚴州府淳安縣離城數裡有個鄉村名曰錦沙村村上有一姓徐的莊家恰是弟兄三人大的名徐言次的名徐召各生得一子第三個名徐哲渾家顏氏到生得二男三女他弟兄三人奉著父親遺命合鍋兒吃飯並力的耕田掙下一頭牛兒一騎馬兒又有一個老僕名叫阿寄年已五十多歲夫妻兩口也生下一個兒子還只有十來歲那阿寄就是本村生長當先因父母喪了又無力殯殮故此賣身在徐家為人忠謹小心朝起晏眠勤於種作徐言的父親大得其力每事優待到得徐言輩掌家見他年紀有了便有些厭惡之意那阿寄又不達時務遇著徐言弟兄行事有不到處便苦口規諫徐哲尚肯服善聽他一兩句那徐言徐召是個自作自用的性子反怪他多嘴擦舌高聲叱喝有時還要奉承幾下消食拳頭阿寄的老婆勸道你一把年紀的人了諸事只宜退縮算他們是後生家世界時時新局局變由他去主張罷了何苦的定要多口常討恁樣凌辱阿寄道我受老主之恩故此不得不說婆子道累說不聽這也怪不得你了自此阿寄聽了老婆言語緘口結舌再不幹預其事也省了好些恥辱正合著古人兩句言語道是閉口深藏舌安身處處牢不則一日徐哲忽地患了個傷寒癥候七日之間即便了帳那時就哭殺了顏氏母子少不得衣棺盛殮做些功果追薦過了兩月徐言與徐召商議道我與你各只一子三兄弟到有兩男三女一分就抵著我們兩分便是三兄弟在時一般耕種還算計不就何況他已死了我們日夜吃辛吃苦掙來卻養他一窩子吃死飯的如今還是小事到得長大起來你我兒子配婚了難道不與他婚男嫁女豈不比你我反多去四分意欲即今三股分開撇脫了這條爛死蛇由他們有得吃沒得吃可不與你我沒干涉了只是當初老官兒遺囑教道莫要分開今若違他言語被人談論卻怎麼處那時徐召若是個有仁心的便該勸徐言休了這念纔是誰知他的念頭一發起得久了聽見哥子說出這話正合其意乃答道老官兒雖有遺囑不過是死人說話了須不是聖旨違背不得的況且我們的家事那個外人敢來談論徐言連稱有理即將田產傢俬都暗地配搭停當只揀不好的留與侄子徐言又道這牛馬卻怎地分徐召沈吟半晌乃道不難那阿寄夫妻年紀已老漸漸做不動了活時到有三個吃死飯的死了又要賠兩口棺木把他也當作一股派與三房裡卸了這干係可不是好計議已定到次日備些酒餚請過幾個親鄰坐下又請出顏氏並兩個侄兒那兩個孩子大的纔得七歲喚做福兒小的五歲叫做壽兒隨著母親直到堂前連顏氏也不知為甚緣故只見徐言弟兄立起身來道列位高親在上有一言相告昔年先父原沒甚所遺多虧我弟兄掙得些小產業只望弟兄相守到老傳至子侄這輩分析不幸三舍弟近日有此大變弟婦又是個女道家不知產業多少況且人家消長不一到後邊多掙得分與捨侄便好萬一消乏了那時只道我們有甚私弊欺他孤兒寡婦反傷骨肉情義了故此我兄弟商量不如趁此完美之時分作三股各自領去營運省得後來爭多競少特請列位高親來作眼遂向袖中摸出三張分書來說道總是一樣配搭至公無私只勞列位著個花押顏氏聽說要分開自做人家眼中撲簌簌珠淚交流哭道二位伯伯我是個孤孀婦人兒女又小就是沒腳蟹一般如何橕持的門戶昔日公公原分付莫要分開還是二位伯伯總管在那裡扶持兒女大了但憑胡亂分些便罷決不敢爭多競少徐召道三娘子天下無有不散筵席就合上一千年少不得有個分開日子公公乃過世的人了他的說話那裡作得准大伯昨日要把牛馬分與你我想侄兒又小那個去看養故分阿寄來幫扶他年紀雖老筋力還健賽過一個後生家種作哩那婆子績麻紡線也不是吃死飯的這孩子再耐他兩年就可下得田了你不消愁得顏氏見他弟兄如此明知已是做就料道拗他不過一味啼哭那些親鄰看了分書雖曉得分得不公道都要做好好先生那個肯做閑冤家出尖說話一齊著了花押勸慰顏氏收了進去入席飲酒有詩為證分書三紙語從容人畜均分稟至公老僕不如牛馬用擁孤孀婦泣西風卻說阿寄那一早差他買東買西請張請李也不曉得又做甚事體恰好在南村去請個親戚回來時裡邊事已停妥剛至門口正遇著老婆那婆