body:
  text: 第一卷兩縣令競義婚孤女風水人間不可無也須陰騭兩相扶時人不解蒼天意枉使身心著意圖話說近代浙江衢州府有一人姓王名奉哥哥姓王名春弟兄各生一女王春的女兒名喚瓊英王奉的叫做瓊真瓊英許配本郡一個富家潘百萬之子潘華瓊真許配本郡蕭別駕之子蕭雅都是自小聘定的瓊英年方十歲母親先喪父親繼歿那王春臨終之時將女兒瓊英托與其弟囑付道我並無子嗣只有此女你把做嫡女看成待其長成好好嫁去潘家你嫂嫂所遺房奩衣飾之類盡數與之有潘家原聘財禮置下莊田就把與他做脂粉之費莫負吾言囑罷氣絕殯葬事畢王奉將侄女瓊英接回家中與女兒瓊真作伴忽一年元旦潘華和蕭雅不約而同到王奉家來拜年那潘華生得粉臉朱脣如美女一般人都稱玉孩童蕭雅一臉麻子眼瞘齒齒巴好似飛天夜叉模樣一美一丑相形起來那標致的越覺美玉增輝那醜陋的越覺泥塗無色況且潘華衣服炫麗有心賣富脫一通換一通那蕭雅是老實人家不以穿著為事常言道佛是金裝人是衣裝世人眼孔淺的多只有皮相沒有骨相王家若男若女若大若小那一個不欣羡潘小官人美貌如潘安再出暗暗地顛脣簸嘴批點那飛天夜叉之丑王奉自己也看不過心上好不快活不一日蕭別駕卒於任所蕭雅奔喪扶柩而回他雖是個世家累代清官家無餘積自別駕死後日漸消索潘百萬是個暴富家事日盛一日王奉忽起一個不良之心想道蕭家甚空女婿又醜潘家又富女婿又標致何不把瓊英瓊真暗地兌轉誰人知道也不教親生女兒在窮漢家受苦主意已定到臨嫁之時將瓊真充做侄女嫁與潘家哥哥所遺衣飾莊田之類都把他去卻將瓊英反為己女嫁與那飛天夜叉為配自己薄薄備些妝奩嫁送瓊英但憑叔叔做主敢怒而不敢言誰知嫁後那潘華自恃家富不習詩書不務生理專一嫖賭為事父親累訓不從氣憤而亡潘華益無顧忌日逐與無賴小人酒食遊戲不上十年把百萬家資敗得罄盡寸土俱無丈人屢次周給他如炭中添雪全然不濟結末迫於凍餒瞞著丈人要引渾家去投靠人家為奴王奉聞知此信將女兒瓊真接回家中養老不許女婿上門潘華流落他鄉不知下落那蕭雅勤苦攻書後來一舉成名直做到尚書地位瓊英封一品夫人有詩為證目前貧富非為準久後窮通未可知顛倒任君瞞昧做鬼神昭鑒定無私看官你道為何說這王奉嫁女這一事只為世人但顧眼前不思日後只要損人利己豈知人有百算天只有一算你心下想得滑碌碌的一條路天未必隨你走哩還是平日行善為高今日說一段話本正與王奉相反喚做兩縣令競義婚孤女這樁故事出在梁唐晉漢週五代之季其時周太祖郭威在位改元廣順雖居正統之尊未就混一之勢四方割據稱雄者還有幾處共是五國三鎮那五國周郭威南漢劉晟北漢劉旻南唐李昇蜀孟知祥那三鎮吳越錢繆湖南周行逢荊南高季昌單說南唐李氏有國轄下江州地方內中單表江州德化縣一個知縣姓石名璧原是撫州臨川縣人氏流寓建康四旬之外喪了夫人又無兒子止有八歲親女月香和一個養娘隨任那官人為官清正單吃德化縣中一口水又且聽訟明決雪冤理滯果然政簡刑清民安盜息退堂之暇就抱月香坐於膝上教他識字又或叫養娘和他下棋蹴踘百般頑耍他從旁教導只為無娘之女十分愛惜一日養娘和月香在庭中蹴那小小球兒為戲養娘一腳踢起去得勢重了些那球擊地而起連跳幾跳的溜溜滾去滾入一個地穴裡那地穴約有二三尺深原是埋缸貯水的所在養娘手短攪他不著正待跳下穴中去拾取球兒石璧道且住問女兒月香道你有甚計較使球兒自走出來麼月香想了想便道有計了即教養娘去提過桶水來傾在穴內那球便浮在水面再傾一桶穴中水滿其球隨水而出石璧本是要試女孩兒的聰明見其取水出球智意過人不勝之喜閑話休敘那官人在任不上二年誰知命裡官星不現飛禍相侵忽一夜倉中失火急去救時已燒損官糧千餘石那時米貴一石值一貫五百亂離之際軍糧最重南唐法度凡官府破耗軍糧至三百石者即行處斬只為石璧是個清官又且火災天數非關本官私弊上官都替他分解保奏唐主怒猶未息將本官削職要他賠償估價共該一千五百餘兩把傢俬變賣未盡其半石璧被本府軟監追逼不過郁成一病數日而死遺下女兒和養娘二口少不得著落牙婆官賣取價償官這等苦楚分明是屋漏更遭連夜雨船遲又遇打頭風卻說本縣人有個百姓叫做賈昌昔年被人誣陷坐假人命事問成死罪在獄虧石知縣到任審出冤情將他釋放賈昌銜保家活命之恩無從報效一向在外為商近日方回正值石知縣身死即往撫屍慟哭備辦衣衾棺木與他殯殮閤家掛孝買地營葬又聞得所欠官糧尚多欲待替他賠補幾分怕錢糧干係不敢開端惹禍見說小姐和養娘都著落牙婆官賣慌忙帶了銀子到李牙婆家問要多少身價李牙婆取出朱批的官票來看養娘十六歲只判得三十兩月香十歲到判了五十兩卻是為何月香雖然年小容貌秀美可愛養娘不過粗使之婢故此判價不等賈昌並無吝色身邊取出銀包兌足了八十兩紋銀交付牙婆又謝他五兩銀子即時領取二人回家李牙婆把兩個身價交納官庫地方呈明石知縣家財人口變賣都盡上官只得在別項那移賠補不在話下卻說月香自從父親死後沒一刻不啼啼哭哭今日又不認得賈昌是什麼人買他歸去必然落於下賤一路痛哭不已養娘道小姐你今番到人家去不比在老爺身邊只管啼哭必遭打罵月香聽說愈覺悲傷誰知賈昌一片仁義之心領到家中與老婆相見對老婆說此乃恩人石相公的小姐那一個就是伏侍小姐的養娘我當初若沒有恩人此身死於縲紲今日見他小姐如見恩人之面你可另收拾一間香房教他兩個住下好茶好飯供待他不可怠慢後來倘有親族來訪那時送還也盡我一點報效之心不然之時待他長成就本縣擇個門當戶對的人家一夫一婦嫁他出去恩人墳墓也有個親人看覷那養娘依舊教他伏侍小姐等他兩個作伴做些女工不要他在外答應月香生成伶俐見賈昌如此分付老婆慌忙上前萬福道奴家賣身在此為奴為婢理之當然蒙恩人抬舉此乃再生之恩乞受奴一拜收為義女說罷即忙下跪賈昌那裡肯要他拜別轉了頭忙教老婆扶起道小人是老相公的子民這螻蟻之命都出老相公所賜就是這位養娘小人也不敢怠慢何況小姐小人怎敢妄自尊大暫時屈在寒家只當賓客相待望小姐勿責怠慢小人夫妻有幸月香再三稱謝賈昌又分付家中男女都稱為石小姐那小姐稱賈昌夫婦但呼賈公賈婆不在話下原來賈昌的老婆素性不甚賢慧只為看上月香生得清秀乖巧自己無男無女有心要收他做個螟蛉女兒初時甚是歡喜聽說賓客相待先有三分不耐煩了卻滅不得石知縣的恩沒奈何依著丈夫言語勉強奉承後來賈昌在外為商每得好綢好絹先儘上好的寄與石小姐做衣服穿比及回家先問石小姐安否老婆心下漸漸不平又過些時把馬腳露出來了但是賈昌在家朝饔夕餐也還成個規矩口中假意奉承幾句但背了賈昌時茶不茶飯不飯另是一樣光景了養娘常叫出外邊雜差雜使不容他一刻空閑又每日間限定石小姐要做若干女工針指還他倘手遲腳慢便去捉雞罵狗口裡好不幹淨正是人無千日好花無百日紅養娘受氣不過稟知小姐欲待等賈公回家告訴他一番月香斷然不肯說道當初他用錢買我原不指望他抬舉今日賈婆雖有不到之處卻與賈公無乾你若說他把賈公這段美情都沒了我與你命薄之人只索忍耐為上忽一日賈公做客回家正撞著養娘在外汲水面龐比前甚是黑瘦了賈公道養娘我只教你伏侍小姐誰要你汲水且放著水桶另叫人來擔罷養娘放了水桶動了個感傷之念不覺滴下幾點淚來賈公要盤問時他把手拭淚忙忙的奔進去了賈公心中甚疑見了老婆問道石小姐和養娘沒有甚事麼老婆回言沒有初歸之際事體多頭也就擱過一邊又過了幾日賈公偶然到近處人家走動回來不見老婆在房自往廚下去尋他說話正撞見養娘從廚下來也沒有托盤右手拿一大碗飯左手一隻空碗碗上頂一碟醃菜葉兒賈公有心閃在隱處看時養娘走進石小姐房中去了賈公不省得這飯是誰吃的一些葷腥也沒有那時不往廚下竟悄悄的走在石小姐房前向門縫裡張時只見石小姐將這碟醃菜葉兒過飯心中大怒便與老婆鬧將起來老婆道葷腥盡有我又不是不捨得與他吃那丫頭自不來擔難道要老娘送進房去不成賈公道我原說過來石家的養娘只教他在房中與小姐作伴我家廚下走使的又不少誰要他出房擔飯前日那養娘噙著兩眼淚在外街汲水我已疑心是必家中把他難為了只為匆忙不曾細問得原來你恁地無恩無義連石小姐都怠慢見放著許多葷菜卻教他吃白飯是甚道理我在家尚然如此我出外時可知連飯也沒得與他們吃飽我這番回來見他們著實黑瘦了老婆道別人家丫頭那要你恁般疼他養得白白壯壯你可收用他做小老婆麼賈公道放屁說的是什麼話你這樣不通理的人我不與你講嘴自明日為始我教當直的每日另賣一分肉菜供給他兩口不要在家火中算帳省得奪了你的口食你又不歡喜老婆自家覺得有些不是口裡也含含糊糊的哼了幾句便不言語了從此賈公分付當直的每日肉菜分做兩分卻叫廚下丫頭們各自安排送飯這幾時好不齊整正是人情若比初相識到底終無怨恨心賈昌因牽掛石小姐有一年多不出外經營老婆卻也做意修好相忘於無言月香在賈公家一住五年看看長成賈昌意思要密訪個好主兒嫁他出去了方纔放心自家好出門做生理這也是賈公的心事背地裡自去勾當曉得老婆不賢又與他商量怎的若是湊巧時賠些妝奩嫁出去了可不幹淨何期姻緣不偶內中也有緣故但是出身低微的賈公又怕辱莫了石知縣不肯俯就但是略有些名目的那個肯要百姓人家的養娘為婦所以好事難成賈公見姻事不就老婆又和順了家中供給又立了常規捨不得擔擱生意只得又出外為商未行數日之前預先叮嚀老婆有十來次只教好生看待石小姐和養娘兩口又請石小姐出來再三撫慰連養娘都用許多好言安放又分付老婆道他骨氣也比你重幾百分哩你切莫慢他若是不依我言語我回家時就不與你認夫妻了又喚當直的和廚下丫頭都分付遍了方纔出門臨岐費盡叮嚀語只為當初受德深卻說賈昌的老婆一向被老公在家作興石小姐和養娘心下好生不樂沒奈何只得由他受了一肚子的醃臢昏悶之氣一等老公出門三日之後就使起家主母的勢來尋個茶遲飯晏小小不是的題目先將廚下丫頭試法連打幾個巴掌罵道賤人你是我手內用錢討的如何恁地托大你恃了那個小主母的勢頭卻不用心伏侍我家長在家日縱容了你如今他出去了少不得要還老娘的規矩除卻老娘外那個該伏侍的要飯吃時等他自擔不要你們獻勤卻擔誤老娘的差使罵了一回就乘著熱鬧中喚過當直的分付將賈公派下另一分肉菜錢乾折進來不要買了當直的不敢不依且喜月香能甘淡薄全不介意又過了些時忽一日養娘擔洗臉水遲了些水已涼了養娘不合哼了一句那婆娘聽得了特地叫來發作道這水不是你擔的別人燒著湯你便胡亂用些罷當初在牙婆家那個燒湯與你洗臉養娘耐嘴不住便回了幾句言語道誰要他們擔水燒湯我又不是不曾擔水過的兩隻手也會燒火下次我自擔水自燒不費廚下姐姐們力氣便了那婆娘提醒了他當初曾擔水過這句話便罵道小賤人你當先擔得幾桶水便在外面做身做分哭與家長知道連累老娘受了百般嘔氣今日老娘要討個帳兒你既說會擔水會燒火把兩件事都交在你身上每日常用的水都要你擔不許缺乏是火都是你燒若是難為了柴老娘卻要計較且等你知心知意的家長回家時你再啼啼哭哭告訴他便了也不怕他趕了老娘出去月香在房中聽得賈婆發作自家的丫頭慌忙移步上前萬福謝罪招稱許多不是叫賈婆莫怪養娘道果是婢子不是了只求看小姐面上不要計較那老婆愈加忿怒便道什麼小姐小姐是小姐不到我家來了我是個百姓人家不曉得小姐是什麼品級你動不動把來壓老娘老娘骨氣雖輕不受人壓量的今日要說個明白就是小姐也說不得費了大錢討的少不得老娘是個主母賈婆也不是你叫的月香聽得話不投機含著眼淚自進房去了那婆娘分付廚中不許叫石小姐只叫他月香名字又分付養娘只在廚下專管擔水燒火不許進月香房中月香若要飯吃時得他自到廚房來取其夜又叫丫頭搬了養娘的被窩到自己房中去月香坐個更深不見養娘進來只得自己閉門而睡又過幾日那婆娘喚月香出房卻教丫頭把他的房門鎖了月香沒了房只得在外面盤旋夜間就同養娘一鋪睡睡起時就叫他拿東拿西役使他起來在他矮檐下怎敢不低頭月香無奈何只得伏低伏小那婆娘見月香隨順了心中暗喜驀地開了他房門的鎖把他房中搬得一空凡丈夫一向寄來的好綢好緞曾做不曾做得都遷入自己箱籠被窩也收起了不還他月香暗暗叫苦不敢則聲忽一日賈公書信回來又寄許多東西與石小姐書中囑付老婆好生看待不久我便回來那婆娘把東西收起思想道我把石家兩個丫頭作賤勾了丈夫回來必然廝鬧難道我懼怕老公重新奉承他起來不成那老亡八把這兩個瘦馬養著不知作何結束他臨行之時說道若不依他言語就不與我做夫妻了一定他起了什麼不良之心那月香好副嘴臉年已長成倘或有意留他也不見得那時我爭風吃醋便遲了人無遠慮必有近懮一不做二不休索性把他兩個賣去他方老亡八回來也只一怪拚得廝鬧一場罷了難道又去贖他回來不成好計好計正是眼孔淺時無大量心田偏處有奸謀當下那婆娘分付當直的與我喚那張牙婆到來我有話說不一時當直的將張婆引到賈婆教月香和養娘都相見了卻發付他開去對張婆說道我家六年前討下這兩個丫頭如今大的忒大了小的又嬌嬌的做不得生活都要賣他出去你與我快尋個主兒原來當先官賣之事是李牙婆經手此時李婆已死官私做媒又推張婆出尖了張婆道那年紀小的正有個好主兒在此只怕大娘不肯賈婆道有甚不肯張婆道就是本縣大尹老爺復姓鍾離名義壽春人氏親生一位小姐許配德安縣高大尹的長公子在任上行聘的不日就要來娶親了本縣嫁裝都已備得十全只是缺少一個隨嫁的養娘昨日大尹老爺喚老媳婦當官分付過了老媳婦正沒處尋宅上這位小娘子正中其選只是異鄉之人怕大娘不捨得與他賈婆想道我正要尋個遠方的主顧來得正好況且知縣相公要了人去丈夫回來料也不敢則聲便道做官府家的陪嫁勝似在我家十倍我有什麼不捨得只是不要虧了我的原價便好張婆道原價許多賈婆道十來歲時就是五十兩討的如今飯錢又算一主在身上了張婆道吃的飯是算不得帳這五十兩銀子在老媳婦身上賈婆道那一個老丫頭也替我覓個人家便好他兩個是一伙兒來的去了一個那一個也養不住了況年紀一二十之外又是要老公的時候留他甚麼張婆道那個要多少身價賈婆道原是三十兩銀子討的牙婆道粗貨兒直不得這許多若是減得一半老媳婦到有個外甥在身邊三十歲了老媳婦原許下與他娶一房妻小的因手頭不寬展捱下去這到是雌雄一對兒賈婆道既是你的外甥便讓你五兩銀子張婆道連這小娘子的媒禮在內讓我十兩罷賈婆道也不為大事你且說合起來張婆道老媳婦如今先去回復知縣相公若講得成時一手交錢一手就要交貨的賈婆道你今晚還來不張婆道今晚還要與外甥商量來不及了明日早來回話多分兩個都要成的說罷別去不在話下卻說大尹鍾離義到任有一年零三個月了前任馬公是頂那石大尹的缺馬公升任去後鍾離義又是頂馬公的鍾離大尹與德安高大尹原是個同鄉高大尹生下二子長曰高登年十八歲次曰高昇年十六歲這高登便是鍾離公的女婿原來鍾離公未曾有子止生此女小字瑞枝年方一十七歲選定本年十月望日出嫁此時九月下旬吉期將近鍾離公分付張婆急切要尋個陪嫁張婆得了賈家這頭門路就去回復大尹大尹道若是人物好時就是五十兩也不多明日庫上來領價晚上就要過門的張婆道領相公鈞旨當晚回家與外甥趙二商議有這相應的親事要與他完婚趙二先歡喜了一夜次早趙二便去整理衣褶準備做新郎張婆在家中先湊足了二十兩身價隨即到縣取知縣相公鈞帖到庫上兌了五十兩銀子來到賈家把這兩項銀子交付與賈婆分疏得明明白白賈婆都收下了少頃縣中差兩名皂隸兩個轎夫抬著一頂小轎到賈家門首停下賈家初時都不通月香曉得臨期竟打發他上轎月香正不知教他那裡去和養娘兩個叫天叫地放聲大哭賈婆不管三七二十一和張婆兩個你一推我一搡搡他出了大門張婆方纔說明小娘子不要啼哭了你家主母將你賣與本縣知縣相公處做小姐的陪嫁此去好不富貴官府衙門不是耍處事到其間哭也無益月香只得收淚上轎而去轎夫抬進後堂月香見了鍾離公還只萬福張婆在傍道這就是老爺了須下個大禮月香只得磕頭立起身來不覺淚珠滿面張婆教他拭乾了淚眼引入私衙見了夫人和瑞枝小姐問其小名對以月香夫人道好個月香二字不必更改就發他伏侍小姐鍾離公厚賞張婆不在話下可憐宦室嬌香女權作閨中使令人張婆出衙已是酉牌時分再到賈家只見那養娘正思想小姐在廚下痛哭賈婆對他說道我今把你嫁與張媽媽的外甥一夫一婦比月香到勝幾分莫要悲傷了張婆也勸慰了一番趙二在混堂內洗了個淨浴打扮得帽兒光光衣衫簇簇自家提一碗燈籠前來接親張婆就教養娘拜別了賈婆那養娘原是個大腳張婆扶著步行到家與外甥成親話休絮煩再說月香小姐自那日進了鍾離相公衙內次日夫人分付新來婢子將中堂打掃月香領命攜帚而去鍾離義梳洗已畢打點早衙理事步出中堂只見新來婢子呆呆的把著一把掃帚立於庭中鍾離公暗暗稱怪悄地上前看時原來庭中有一個土穴月香對了那穴汪汪流淚鍾離公不解其故走入中堂喚月香上來問其緣故月香愈加哀泣口稱不敢鍾離公再三詰問月香方纔收淚而言道賤妾幼時父親曾於此地教妾蹴球為戲誤落球於此穴父親問妾道你可有計較使球自出於穴不須拾取賤妾答云有計即遣養娘取水灌之水滿球浮自出穴外父親謂妾聰明不勝之喜今雖年久尚然記憶睹物傷情不覺哀泣願相公俯賜矜憐勿加罪責鍾離公大驚道汝父姓甚名誰你幼時如何得到此地須細細說與我知月香道妾父姓石名璧六年前在此作縣尹只為天火燒倉朝廷將父革職勒令賠償父親病郁而死有司將妾和養娘官賣到本縣賈公家賈公向被冤系感我父活命之恩故將賤妾甚相看待撫養至今因賈公出外為商其妻不能相容將妾轉賣於此只此實情並無欺隱今朝訴出衷腸事鐵石人知也淚垂鍾離公聽罷正是兔死狐悲物傷其類我與石璧一般是個縣尹他只為遭時不幸遇了天災親生女兒就淪於下賤我若不聞不見到也罷了天教他到我衙裡我若不扶持他同官體面何存石公在九泉之下以我為何如人當下請夫人上堂就把月香的來歷細細敘明夫人道似這等說他也是個縣令之女豈可賤婢相看目今女孩兒嫁期又逼相公何以處之鍾離公道今後不要月香服役可與女孩兒姊妹相稱下官自有處置即時修書一封差人送到親家高大尹處高大尹拆書觀看原來是求寬嫁娶之期書上寫道婚男嫁女雖父母之心捨己成人乃高明之事近因小女出閣預置媵婢月香見其顏色端麗舉止安詳心竊異之細訪來歷乃知即兩任前石縣令之女石公廉吏因倉火失官喪軀女亦官賣轉展售於寒家同官之女猶吾女也此女年已及笄不惟不可屈為媵婢且不可使吾女先此女而嫁僕今急為此女擇婿將以小女薄奩嫁之令郎姻期少待改卜特此拜懇伏惟情諒鍾離義頓首高大尹看了道原來如此此長者之事吾奈何使鍾離公獨擅其美即時回書雲鸞鳳之配雖有佳期狐兔之悲豈無同志在親翁既以同官之女為女在不佞寧不以親翁之心為心三復示言令人悲惻此女廉吏血胤無慚閥閱願親家即賜為兒婦以踐始期令愛別選高門庶幾兩便昔蘧伯玉恥獨為君子僕今者願分親翁之誼高原頓首使者將回書呈與鍾離公看了鍾離公道高親家願娶孤女雖然義舉但吾女他兒久已聘定豈可更改還是從容待我嫁了石家小姐然後另備妝奩以完吾女之事當下又寫書一封差人再達高親家高公開書讀道娶無依之女雖屬高情更已定之婚終乖正道小女與令郎久諧鳳卜准擬鸞鳴在令郎停妻而娶妻已違古禮使小女舍婿而求婿難免人非請君三思必從前議義惶恐再拜高公讀畢嘆道我一時思之不熟今聞鍾離公之言慚愧無地我如今有個兩盡之道使鍾離公得行其志而吾亦同享其名萬世而下以為美談即時復書雲以女易女僕之慕誼雖殷停妻娶妻君之引禮甚正僕之次男高昇年方十七尚未締姻令愛歸我長兒石女屬我次子佳兒佳婦兩對良姻一死一生千秋高誼妝奩不須求備時日且喜和同伏冀俯從不須改卜原惶恐再拜鍾離公得書大喜道如此處分方為雙美高公義氣真不愧古人吾當拜其下風矣當下即與夫人說知將一副妝奩剖為兩分衣服首飾稍稍增添二女一般並無厚薄到十月望前兩日高公安排兩乘花花細轎笙簫鼓吹迎接兩位新人鍾離公先發了嫁妝去後隨喚出瑞枝月香兩個女兒教夫人分付他為婦之道二女拜別而行月香感念鍾離公夫婦恩德十分難捨號哭上轎一路趲行自不必說到了縣中恰好湊著吉日良時兩對小夫妻如花如錦拜堂合巹高公夫婦歡喜無限正是百年好事從今定一對姻緣天上來再說鍾離公嫁女三日之後夜間忽得一夢夢見一位官人幞頭象簡立於面前說道吾乃月香之父石璧是也生前為此縣大尹因倉糧失火賠償無措郁郁而亡上帝察其清廉憫其無罪敕封吾為本縣城隍之神月香吾之愛女蒙君高誼拔之泥中成其美眷此乃陰德之事吾已奏聞上帝君命中本無子嗣上帝以公行善賜公一子昌大其門君當致身高位安享遐齡鄰縣高公與君同心願娶孤女上帝嘉悅亦賜二子高官厚祿以酬其德君當傳與世人廣行方便切不可凌弱暴寡利己損人天道昭昭纖毫洞察說罷再拜鍾離公答拜起身忽然踏了衣服前幅跌上一交猛然驚醒乃是一夢即時說與夫人知道夫人亦嗟呀不已待等天明鍾離公打轎到城隍廟中焚香作禮捐出俸資百兩命道士重新廟宇將此事勒碑廣諭眾人又將此夢備細寫書報與高公知道高公把書與兩個兒子看了各各驚訝鍾離夫人年過四十忽然得孕生子取名天賜後來鍾離義歸宋仕至龍圖閣大學士壽享九旬子天賜為大宋狀元高登高昇俱仕宋朝官至卿宰此是後話且說賈昌在客中不久回來不見了月香小姐和那養娘詢知其故與婆娘大鬧幾場後來知得鍾離相公將月香為女一同小姐嫁與高門賈昌無處用情把銀二十兩要贖養娘送還石小姐那趙二恩愛夫妻不忍分拆情願做一對投靠張婆也禁他不住賈昌領了趙二夫妻直到德安縣稟知大尹高公高公問了備細進衙又問媳婦月香所言相同遂將趙二夫妻收留以金帛厚酬賈昌賈昌不受而歸從此賈昌惱恨老婆無義立誓不與他相處另招一婢生下兩男此亦作善之報也後人有詩嘆云人家嫁娶擇高門誰肯周全孤女婚試看兩公陰德報皇天不負好心人
