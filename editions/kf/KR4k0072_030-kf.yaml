body:
  text: 第三十卷李公窮邸遇俠客世事紛紛如弈棋輸贏變幻巧難窺但存方寸公平理恩怨分明不用疑話說唐玄宗天寶年間長安有一士人姓房名德生得方面大耳偉乾豐軀年紀三十以外家貧落魄十分淹蹇全虧著渾家貝氏紡織度日時遇深秋天氣頭上還裹著一頂破頭巾身上穿著一件舊葛衣那葛衣又逐縷縷綻開了卻與蓑衣相似思想天氣漸寒這模樣怎生見人知道老婆餘得兩匹布兒欲要討來做件衣服誰知老婆原是小家子出身器量最狹卻又配著一副悍毒的狠心腸那張嘴頭子又巧於應變賽過刀一般快憑你什麼事高來高就低來低對死的也說得活起來活的也說得死了去是一個翻脣弄舌的婆娘那婆娘看見房德沒甚活路靠他吃死飯常把老公欺負房德因不遇時說嘴不響每事只得讓他漸漸有幾分懼內是日貝氏正在那裡思想老公恁般的狼狽如何得個好日卻又怨父母嫁錯了對頭賺了終身心下正是十分煩惱恰好觸在氣頭上乃道老大一個漢子沒處尋飯吃靠著女人過日如今連衣服都要在老娘身上出豁說出來可不羞麼房德被搶白了這兩句滿面羞慚事在無奈只得老著臉低聲下氣道娘子一向深虧你的氣力感激不盡但目下雖是落薄少不得有好的日子權借這布與我後來發積時大大報你的情罷貝氏搖手道你的甜話兒哄得我多年了信不過這兩疋布老娘自要做件衣服過寒的休得指望房德布又取不得反討了許多沒趣欲待廝鬧一場因怕老婆嘴舌又利喉嚨又響恐被鄰家聽見反妝幌子敢怒而不敢言別口氣撞出門去指望尋個相識告借走了大半日一無所遇那天卻又與他做對頭偏生的忽地發一陣風雨起來這件舊葛衣被風吹得颼颼如落葉之聲就長了一身寒栗子冒著風雨奔向前面一古寺中躲避那寺名為雲華禪寺房德跨進山門看時已先有個長大漢子坐在左廊檻上殿中一個老僧誦經房德就向右廊檻上坐下呆呆的看著天上那雨漸漸止了暗道這時不走只怕少刻又大起來卻待轉身忽掉過頭來看見牆上畫了一隻禽鳥翎毛兒翅膀兒足兒尾兒件件皆有單單不畫鳥頭天下有恁樣空腦子的人自己飢寒尚且難顧有甚心腸卻評品這畫的鳥來想道常聞得人說畫鳥先畫頭這畫法怎與人不同卻又不畫完是甚意故一頭想一頭看轉覺這鳥畫得可愛乃道我雖不曉此道諒這鳥頭也沒甚難處何不把來續完即往殿上與和尚借了一枝筆蘸得墨飽走來將鳥頭畫出卻也不十分丑自覺歡喜道我若學丹青到可成得剛畫時左廊那漢子就捱過來觀看把房德上下仔細一相笑容可掬向前道秀才借一步說話房德道足下是誰有甚見教那漢道秀才不消細問同在下去自有好處房德正在困窮之鄉聽見說有好處不勝之喜將筆還了和尚把破葛衣整一整隨那漢子前去此時風雨雖止地上好生泥濘卻也不顧離了雲華寺直走出昇平門到樂游原傍邊這所在最是冷落那漢子向一小角門上連叩三聲停了一回有個人開門出來也是個長大漢子看見房德亦甚歡喜上前聲喏房德中心疑道這兩個漢子是何等樣人不知請我來有甚好處問道這裡是誰家二漢答道秀才到裡邊便曉得房德跨入門裡二漢原把門橕上引他進去及到裡面荊蓁滿目衰草漫天乃是個敗落花園灣灣曲曲轉到一個半塌不倒的亭子上裡邊又走出十四五個漢子一個個身長臂大面貌猙獰見了房德盡皆滿面堆下笑來道秀才請進房德暗自驚駭道這班人來得蹺蹊且看他有甚話說眾人迎進亭中相見已畢遜在板凳上坐下問道秀才尊姓房德道小生姓房不知列位有何說話起初同行那漢道實不相瞞我眾弟兄乃江湖上豪傑專做這件沒本錢的生意只為俱是一勇之夫前日幾乎弄出事來故此對天禱告要覓個足智多謀的好漢讓他做個大哥聽其指揮適來雲華寺牆上畫不完的禽鳥便是眾弟兄對天禱告設下的誓願取羽翼俱全單少頭兒的意思若合該興隆天遣個英雄好漢補足這鳥便迎請來為頭等候數日未得其人且喜天隨人願今日遇見秀才恁般魁偉相貌一定智勇兼備正是真命寨主了眾兄弟今後任憑調度保個終身安穩快活可不好麼對眾人道快去宰殺牲口祭拜天地內中有三四個一溜煙跑向後邊去了房德聞言道原來這班人卻是一伙強盜我乃清清白白的人如何做恁樣事答道列位壯士在上若要我做別事則可這一樁實不敢奉命眾人道卻是為何房德道我乃讀書之人還要巴個出身日子怎肯幹這等犯法的勾當眾人道秀才所言差矣方今楊國忠為相賣官鬻爵有錢的便做大官除了錢時就是李太白恁樣高才也受了他的惡氣不能得中若非辨識番書恐此時還是個白衣秀士哩不是冒犯秀才說看你身上這般光景也不像有錢的如何指望官做不如從了我們大碗酒大塊肉整套穿衣論秤分金且又讓你做個掌盤何等快活散誕倘若有些氣象時據著個山寨稱孤道寡也繇得你房德沈吟未答那漢又道秀才十分不肯時也不敢相強但只是來得去不得不從時便要壞你性命這卻莫怪都向靴裡颼的拔出刀來嚇得房德魂不附體倒退十數步來道列位莫動手容再商量眾人道從不從一言而決有甚商量房德想道這般荒僻所在若不依他豈不白白送了性命有那個知得且哄過一時到明日脫身去出首罷算計已定乃道多承列位壯士見愛但小生平昔膽怯恐做不得此事眾人道不打緊初時便膽怯做過幾次就不覺了房德道既如此只得順從列位眾人大喜把刀依舊納在靴中道即今已是一家皆以弟兄相稱了快將衣服來與大哥換過好拜天地便進去捧出一套錦衣一頂新唐巾一雙新靴房德著扮起來威儀比前更是不同眾人齊聲喝采道大哥這個人品莫說做掌盤就是皇帝也做得過古語云不見可欲使心不亂房德本是個貧士這般華服從不曾著體如今忽地煥然一新不覺動其念把眾人那班說話細細一味轉覺有理想道如今果是楊國忠為相賄賂公行不知埋沒了多少高才絕學像我恁樣平常學問真個如何能勾官做若不得官終身貧賤反不如這班人受用了又想起見今恁般深秋天氣還穿著破葛衣與渾家要疋布兒做件衣服尚不能勾及至仰告親識又並無一個肯慨然周濟看起來到是這班人義氣與他素無相識就把如此華美衣服與我穿著又推我為主便依他們胡做一場到也落得半世快活卻又想道不可不可倘被人拿住這性命就休了正在胡思亂想把腸子攪得七橫八豎疑惑不定只見眾人忙擺香案抬出一口豬一腔羊當天排列連房德共是十八個好漢一齊跪下拈香設誓歃血為盟祭過了天地又與房德八拜為交各敘姓名少頃擺上酒餚請房德坐了第一席肥甘美醞恣意飲啖房德日常不過黃齏淡飯尚且自不全間或覓得些酒肉也不能勾趁心醉飽今日這番受用喜出望外且又眾人輪流把盞大哥前大哥後奉承得眉花眼笑起初還在欲為未為之間到此時便肯死心塌地做這樁事了想道或者我命裡合該有些造化遇著這班弟兄扶助真個弄出大事業來也未可知若是小就時只做兩三次尋了些財物即便罷手料必無人曉得然後去打楊國忠的關節覓得個官兒豈不美哉萬一敗露已是享用過頭便吃刀吃剮亦所甘心也強如擔飢受凍一生做個餓莩有詩為證風雨蕭蕭夜正寒扁舟急槳上危灘也知此去波濤惡只為飢寒二字難眾人杯來盞去直吃到黃昏時候一人道今日大哥初聚何不就發個利市眾人齊聲道言之有理還是到那一家去好房德道京都富家無過是延平門王元寶這老兒為最況且又在城外沒有官兵巡邏前後路徑我皆熟慣只這一處就抵得十數家了不知列位以為何如眾人喜道不瞞大哥說這老兒我們也在心久了只因未得其便不想卻與大哥暗合足見同心即將酒席收過取出硫磺焰硝火把器械之類一齊紮縛起來但見白布羅頭嵡鞋兜腳臉上抹黑搽紅手內提刀持斧褲裩剛過膝牢拴裹肚衲襖卻齊腰緊纏搭膊一隊麼魔來世界數群虎豹入山林眾人結束停當捱至更餘天氣出了園門將門反橕好了如疾風驟雨而來這延平門離樂游原約有六七里之遠不多時就到了且說王元寶乃京兆尹王鉷的族兄家有敵國之富名聞天下玄宗天子亦嘗召見三日前被小偷竊了若干財物告知王鉷責令不良人捕獲又撥三十名健兒防護不想房德這班人晦氣正撞在網裡當下眾強盜取出火種引著火把照耀渾如白晝輪起刀斧一路砍門進去那些防護健兒並家人等俱從睡夢中驚醒鳴鑼吶喊各執棍捧上前擒拿莊前莊後鄰家聞得都來救護這班強盜見人已眾了心下慌張便放起火來奪路而走王家人分一半救火一半追趕上去團團圍住眾強盜拚命死戰戳傷了幾個莊客終是寡不敵眾被打翻數人餘皆盡力奔脫房德亦在打翻數內一齊繩穿索縛等到天明解進京兆尹衙門王鉷發下畿尉推問那畿尉姓李名勉字玄卿乃宗室之子素性忠貞尚義有經天緯地之才濟世安民之志只為李林甫楊國忠相繼為相妒賢嫉能病國殃民屈在下僚不能施展其纔這畿尉品級雖卑卻是個刑名官兒凡捕到盜賊俱屬鞠訊上司刑獄悉委推勘故歷任的畿尉定是酷吏專用那周興來俊臣索元禮遺下有名色的極刑是那幾般名色有西江月為證犢子懸車可畏驢兒拔橛堪哀鳳凰曬翅命難捱童子參禪魂焠玉女登梯最慘仙人獻果傷哉獼猴鑽火不招來換個夜叉望海那些酷吏一來仗刑立威二來或是權要囑託希承其旨每事不問情真情枉一味嚴刑鍛煉羅織成招任你銅筋鐵骨的好漢到此也膽喪魂驚不知斷送了多少忠臣義士惟有李勉與他尉不同專尚平恕一切慘酷之刑置而不用臨事務在得情故此並無冤獄那一日正值早衙京尹發下這件事來十來個強盜五六個戳傷莊客跪做一庭行凶刀斧都堆在階下李勉舉目看時內中惟有房德人材雄偉豐彩非凡想道恁樣一條漢子如何為盜心下就懷個矜憐之念當下先喚巡邏的並王家莊客問了被劫情由然後又問眾盜姓名逐一細鞫俱系當下就擒不待用刑盡皆款伏又招出黨羽窟穴李勉即差不良人前去捕緝問至房德乃匍匐到案前含淚而言道小人自幼業儒原非盜輩止因家貧無措昨到親戚處告貸為雨阻於雲華寺中被此輩以計誘威逼入夥出於無奈遂將畫鳥及入夥前後事一一細訴李勉已是惜其材貌又見他說得情詞可憫便有意釋放他卻又想一夥同罪獨放一人公論難泯況是上司所委如何回覆除非如此如此乃假意叱喝下去分付俱上了枷杻禁於獄中俟拿到餘黨再問砍傷莊客遣回調理巡邏人記功有賞發落眾人去後即喚獄卒王太進衙原來王太昔年因誤觸了本官被誣構成死罪也虧李勉審出原在衙門服役那王太感激李勉之德凡有委託無不盡力為此就參他做押獄之長當下李勉分付道適來強人內有個房德我看此人相貌軒昂言詞挺拔是個未遇時的豪傑有心要出脫他因礙著眾人不好當堂明放托在你身上覷個方便縱他逃走取過三兩一封銀子教他遞與贈為盤費速往遠處潛避莫在近邊又為人所獲王太道相公分付怎敢有違但恐遺累眾獄卒卻如何處李勉道你放他去後即引妻小躲入我衙中將申文俱做於你的名下眾人自然無事你在我左右做個親隨豈不強如做這賤役王太道因得相公收留在衙伏侍萬分好了將銀袖過急急出衙來到獄中對小牢子道新到囚犯未經刑杖莫教聚於一處恐弄出些事來小牢子依言遂將眾人四散分開王太獨引房德置在一個僻靜之處把本官美意細細說出又將銀兩交與房德不勝感激道煩禁長哥致謝相公小人今生若不能補報死當作犬馬酬恩王太道相公一片熱腸救你那指望報答但願你此去改行從善莫負相公起死回生之德房德道多感禁長哥指教敢不佩領捱到傍晚王太眼同眾牢子將眾犯盡上囚床第一個先從房德起然後挨次而去王太覷眾人正手忙腳亂之時捉空踅過來將房德放起開了枷鎖又把自己舊衣帽與他穿了引至監門口且喜內外更無一人來往急忙開了獄門搡他出去房德拽開腳步不顧高低也不敢回家挨出城門連夜而走心中思想多感畿尉相公救了性命如今投兀誰好想起當今惟有安祿山最為天子寵任收羅豪傑何不投之遂取路直至范陽恰好遇著個故友嚴莊為范陽長史引見祿山那時安祿山久蓄異志專一招亡納叛見房德生得人材出眾談吐投機遂留於部下房德住了幾時暗地差人迎取妻子到彼不在話下正是掙破天羅地網撇開悶海愁城得意盡誇今日回頭卻認前生且說王太當晚只推家中有事要回分付眾牢子好生照管將匙鑰交付明白出了獄門來至家中收拾囊篋悄悄領著妻子連夜躲入李勉衙中不提且說眾牢子到次早放眾囚水火看房德時枷鎖撇在半邊不知幾時逃去了眾人都驚得面如土色叫苦不迭道恁樣緊緊上的刑具不知這死囚怎地逃走了卻害我們吃屈官司又不知從何處去的四面張望牆壁並不見塊磚瓦落地連泥屑也沒有一些齊道這死囚昨日還哄畿尉相公說是初犯到是個積年高手內中一人道我去報知王獄長教他快去稟官作急緝獲那人一口氣跑到王太家見門閉著一片聲亂敲那裡有人答應間壁一個鄰家走過來道他家昨夜亂了兩個更次想是搬去了牢子道並不見王獄長說起遷居那有這事鄰家道無過止這間屋兒如何敲不應難道睡死不成牢子見說得有理盡力把搡開原來把根木子反橕的裡邊止有幾件粗重家夥並無一人牢子道卻不作怪他為甚麼也走了這死囚莫不到是他賣放的休管是不是且都推在他身上罷了把門依舊帶上也不回獄徑望畿尉衙門前來恰好李勉早衙理事牢子上前稟知李勉佯驚道向來只道王太小心不想恁般大膽敢賣放重犯料他也只躲在左近你們四散去緝訪獲到者自有重賞牢子叩頭而出李勉備文報府王鉷以李勉疏虞防閑以不職奏聞天子罷官為民一面懸榜捕獲房德王太李勉即日納還官誥收拾起身將王太藏於女人之中帶回家去不因濟困扶危意肯作藏亡匿罪人李勉家道素貧卻又愛做清官分文不敢妄取及至罷任依原是個寒士歸到鄉中親率童僕躬耕而食家居二年有餘貧困轉劇乃別了夫人帶著王太並兩個家奴尋訪故知由東都一路直至河北聞得故人顏杲卿新任常山太寧遂往謁之路經柏鄉縣過這地方離常山尚有二百餘裡李勉正行間只見一行頭踏手持白棒開道而來呵喝道縣令相公來還不下馬李勉引過半邊回避王太遠遠望見那縣令上張皂蓋下乘白馬威儀濟濟相貌堂堂仔細認時不是別個便是昔年釋放的房德乃道相公不消避得這縣令就是房德李勉聞言心中甚喜道我說那人是個未遇時的豪傑今卻果然但不知怎地就得了官職欲要上前去問又道我若問時此人只道曉得他在此做官來與索報了莫問罷分付王太禁聲把頭回轉讓他過去那房德漸漸至近一眼覷見李勉背身而立王太也在傍邊又驚又喜連忙止住從人跳下馬來向前作揖道恩相見了房德如何不喚一聲反掉轉頭去險些兒錯過李勉還禮道恐妨足下政事故不敢相通房德道說那裡話難得恩相至此請到敝衙少敘李勉此時鞍馬勞倦又見其意殷勤答道既承雅情當暫話片時遂上馬併轡而行王太隨在後面不一時到了縣中直至廳前下馬房德請李勉進後堂轉過左邊一個書院中來分付從人不必跟入止留一個心腹乾辦陳顏在門口伺候一面著人整備上等筵席將李勉四個生口發於後槽喂養行李即教王太等搬將入去又教人傳話衙中喚兩個家人來伏侍那兩個家人一個教做路信一個教做支成都是房德為縣尉時所買且說房德為何不要從人入去只因他平日冒稱是宰相房玄齡之後在人前誇炫家世同僚中不知他的來歷信以為真把他十分敬重今日李勉來至相見之間恐題起昔日為盜這段情由怕眾人聞得傳說開去被人恥笑做官不起因此不要從人進去這是他用心之處當下李勉步入裡邊去看時卻是向陽一帶三間書室側邊又是兩間廂房這書室庭戶虛敞窗明亮正中掛一幅名人山水供一個古銅香爐爐內香煙馥郁左邊設一張湘妃竹榻右邊架上堆滿若干圖書沿窗一隻幾上擺列文房四寶庭中種填許多花木鋪設得十分清雅這所在乃是縣官休沐之處故爾恁般齊整且說房德讓李勉進了書房忙忙的掇過一把椅子居中安放請李勉坐下納頭便拜李勉急忙扶住道足下如何行此大禮房德道某乃待死之囚得恩相超拔又賜贈盤纏遁逃至此方有今日恩相即某之再生父母豈可不受一拜李勉是個忠正之人見他說得有理遂受了兩拜房德拜罷起來又向王太禮謝引他三人到廂房中坐地又叮嚀道倘隸卒詢問時切莫與他說昔年之事王太道不消分付小人理會得房德復身到書房中扯把椅兒打橫相陪道深蒙相公活命之恩日夜感激未能酬報不意天賜至此相會李勉道足下一時被陷吾不過因便斡旋何德之有乃承如此垂念獻茶已畢房德又道請問恩相昇在何任得過敝邑李勉道吾因釋放足下京尹論以不職罷歸鄉里家居無聊故遍遊山水以暢襟懷今欲往常山訪故人顏太守路經於此不想卻遇足下且已得了官職甚慰鄙意房德道原來恩相因某之故累及罷官某反苟顏竊祿於此深切惶愧李勉道古人為義氣上雖身家尚然不顧區區卑職何足為道但不識足下別後歸於何處得宰此邑房德道某自脫獄逃至范陽幸遇故人引見安節使收於幕下甚蒙優禮半年後即署此縣尉之職近以縣主身故遂表某為令自愧譾陋匪纔濫叨民社還要求恩相指教李勉雖則不在其位卻素聞安祿山有反叛之志今見房德乃是他表舉的官職恐其後來黨逆故就他請教上把言語去規訓道做官也沒甚難處但要上不負朝廷下不害百姓遇著死生利害之處總有鼎鑊在前斧在後亦不能奪我之志切勿為匪人所惑小利所誘頓爾改節雖或僥幸一時實是貽笑千古足下立定這個主意莫說為此縣令就是宰相亦盡可做得過房德謝道恩相金玉之言某當終身佩銘兩下一遞一答甚說得來少頃路信來稟筵宴已完請爺入席房德起身請李勉至後堂看時乃是上下兩席房德教從人將下席移過左傍李勉見他要傍坐乃道足下如此相敘反覺不安還請坐轉房德道恩相在上侍坐已是僭妄豈敢抗禮李勉道吾與足下今已為聲氣之友何必過謙遂令左右依舊移在對席從人獻過杯筋房德安蓆定位庭下承應樂人一行兒擺列奏樂那筵席杯盤羅列非常豐盛雖無炮鳳烹龍也極山珍海錯當下賓主歡洽開懷暢飲更餘方止王太等另在一邊款待自不必說此時二人轉覺親熱攜手而行同歸書院房德分付路信取過一副供奉上司的鋪蓋親自施設裀褥提攜溺器李勉扯住道此乃僕從之事何勞足下自為房德道某受相公大恩即使生生世世執鞭隨鐙尚不能報萬一今不過少盡其心何足為勞鋪設停當又教家人另放一榻在傍相陪李勉見其言詞誠懇以為信義之士愈加敬重兩下挑燈對坐彼此傾心吐膽各道生平志願情投契合遂為至交只恨相見之晚直至夜分方纔就寢次日同僚官聞得都來相訪相見之間房德只說是昔年曾蒙識薦故此有恩同僚官又在縣主面上討好各備筵席款待話休煩絮房德自從李勉到後終日飲酒談論也不理事也不進衙其侍奉趨承就是孝子事親也沒這般盡禮李勉見恁樣殷勤諸事俱廢反覺過意不去住了十來日作辭起身房德那裡肯放說道恩相至此正好相聚那有就去之理須是多住幾月待某撥夫馬送至常山便了李勉道承足下高誼原不忍言別但足下乃一縣之主今因我在此耽誤了許多政務倘上司知得不當穩便況我去心已決強留於此反不適意房德料道留他不住乃道恩相既堅執要去某亦不好苦留只是從此一別後會無期明日容治一樽以盡竟日之歡後日早行何如李勉道既承雅意只得勉留一日房德留住了李勉喚路信跟著回到私衙要收拾禮物饋送只因這番有分教李畿尉險些兒送了性命正是禍兮福所倚福兮禍所伏所以恬淡人無營心自足話分兩頭卻說房德老婆貝氏昔年房德落薄時讓他做主慣了到今做了官每事也要喬主張此番見老公喚了兩個家人出去一連十數日不進衙只道瞞了他做甚事體十分惱恨這日見老公來到衙裡便待發作因要探口氣滿臉反堆下笑來問道外邊有何事久不退衙房德道不要說起大恩人在此幾乎當面錯過幸喜我眼快瞧著留得到縣裡故此盤桓了這幾日特來與你商量收拾些禮物送他貝氏道那裡什麼大恩人房德道哎呀你如何忘了便是向年救命的畿尉李相公只為我走了帶累他罷了官職今往常山去訪顏太守路經於此那獄卒王太也隨在這裡貝氏道原來是這人麼你打帳送他多少東西房德道我個大恩人乃再生父母須得重重酬報貝氏道送十匹絹可少麼房德呵呵大笑道奶奶到會說耍話恁地一個恩人這十匹絹送他家人也少貝氏道胡說你做了個縣官家人尚沒處一注賺十匹絹一個打抽豐的如何家人便要許多老娘還要算計哩如今做我不著再加十匹快些打發起身房德道奶奶怎說出恁樣沒氣力的話來他救了我性命又賫贈盤纏又壞了官職這二十匹絹當得甚的貝氏從來鄙吝連這二十匹絹還不捨得的只為是老公救命之人故此慨然肯出他已算做天大的事了房德兀自嫌少心中便有些不悅故意道一百匹何如房德道這一百匹只勾送王太了貝氏見說一百匹還只勾送王太正不知要送李勉多少十分焦躁道王太送了一百匹畿尉極少也送得五百匹哩房德道五百匹還不勾貝氏怒道索性湊足一千何如房德道這便差不多了貝氏聽了這話向房德劈面一口涎沫道啐想是你失心風了做得幾時官交多少東西與我卻來得這等大落恐怕連老娘身子賣來還湊不上一半哩那裡來許多絹送人房德看見老婆發喉急便道奶奶有話好好商量怎就著惱貝氏嚷道有甚商量你若有自去送他莫向我說房德道十分少只得在庫上撮去貝氏道嘖嘖你好天大的膽兒庫藏乃朝廷錢糧你敢私自用得的倘一時上司查核那時怎地回答房德聞言心中煩惱道話雖有理只是恩人又去的急一時沒處設法卻怎生處坐在旁邊躊躇誰想貝氏見老公執意要送恁般厚禮就是割身上肉也沒這樣疼痛連腸子也急做千百段頓起不良之念乃道看你枉做了個男子漢這些事沒有決斷如何做得大官我有個捷徑法兒在此到也一勞永逸房德認做好話忙問道你有甚麼法兒貝氏答道自古有言大恩不報不如今夜覷個方便結果了他性命豈不幹淨只這句話惱得房德穩耳根通紅喝道你這不賢婦當初只為與你討疋布兒做件衣服不肯以致出去求告相識被這班人誘去入夥險些兒送了性命若非這恩人捨了自己官職釋放出來安得今日夫妻相聚你不勸我行些好事反教傷害恩人於心何忍貝氏一見老公發怒又陪著笑道我是好話怎到發惡若說得有理你便聽了沒理時便不要聽何消大驚小怪房德道你且說有甚理貝氏道你道昔年不肯把布與你至今恨我麼你且想我自十七歲隨了你日逐所需哪一件不虧我支持難道這兩疋布真個不捨得因聞得當初有個蘇秦未遇時閤家佯為不禮激勵他做到六國丞相我指望學這故事也把你激發不道你時運不濟卻遇這強盜又沒蘇秦那般志氣就隨他們胡做弄出事來此乃你自作之孽與我什麼相干那李勉當時豈真為義氣上放你麼房德道難道是假意貝氏笑道你枉自有許多聰明這些事便見不透大凡做刑名官的多有貪酷之人就是至親至戚犯到手裡尚不肯順情何況他與你素無相識且又情真罪當怎肯捨了自己官職輕易縱放了重犯無非聞說你是個強盜頭兒定有贓物窩頓指望放了暗地去孝順將些去買上囑下這官又不壞又落些入己不然如何一伙之中獨獨縱你一個那裡知道你是初犯的窮鬼竟一溜煙走了他這官又罷休今番打聽著在此做官可可的來了房德搖首道沒有這事當初放我乃一團好意何嘗有絲毫別念如今他自往常山偶然遇見還怕誤我公事把頭掉轉不肯相見並非特地來相見不要疑壞了人貝氏又嘆道他說往常山乃是假話如何就信以為真且不要論別件只他帶著王太同行便見其來意了房德道帶王太同行便怎麼貝氏道你也忒殺懵懂那李勉與顏太守是相識或者去相訪是真了這王太乃京兆府獄卒難道也與顏太守有舊去相訪卻跟著同走若說把頭掉轉不來招攬此乃冷眼覷你可去相迎正是他奸巧之處豈是好意如果真要到常山怎肯又住這幾多時房德道他那裡肯住是我再三苦留下的貝氏道這也是他用心處試你待他的念頭誠也不誠房德原是沒主意的人被老婆這班話一聳漸生疑惑沈吟不語貝氏又道總來這恩是報不得的房德道如何報不得貝氏道今若報得薄了他一時翻過臉來將舊事和盤托出那時不但官兒了帳只怕當做越獄強盜拿去性命登時就送若報得厚了他做下額子不常來取索如照舊饋送自不必說稍不滿欲依然揭起舊案原走不脫可不是到底終須一結自古道先下手為強今若不依我言事到其彼悔之晚矣房德聞說至此暗暗點頭心腸已是變了又想了一想乃道如今原是我要報他恩德他卻從無一字題起恐沒這心腸貝氏笑道他還不曾見你出手故不開口到臨期自然有說話的還有一件他此來這番縱無別話你的前程已是不能保了房德道卻是為何貝氏道李勉至此你把他萬分親熱衙門中人不知來歷必定問他家人那家人肯替你遮掩少不得以直告之你想衙門人的口嘴好不利害知得本官是強盜出身定然當做新聞互相傳說同僚們知得雖不敢當面笑你背後誹議也經不起就是你也無顏再存坐得住這個還算小可的事那李勉與顏太守既是好友到彼難道不說自然一一道知其詳聞得這老兒最是古怪且又是他屬下倘被遍河北一傳連夜走路還只算遲了那時可不依舊落薄終身怎處如今急急下手還可免得顏太守這頭出醜房德初時原怕李勉家人走漏了消息故此暗地叮嚀王太如今老婆說出許多利害正投其所忌遂把報恩念頭撇向東洋大海連稱還是奶奶見得到不然幾乎反害自己但他來時合衙門人通曉得明日不見了豈不疑惑況那屍首也難出脫貝氏道這個何難少停出衙止留幾個心腹人答應其餘都打發去了將他主僕灌醉到夜靜更深差人刺死然後把書院放了一把火燒了明日尋出些殘屍剩骨假哭一番依棺盛殮那時人只認是火燒死的有何疑惑房德大喜道此計甚妙便要起身出衙那婆娘曉得老公心是活的恐兩下久坐長談說得入港又改過念頭乃道總則天色還早且再過一回出去房德依著老婆真個住下有詩為證猛虎口中劍長蛇尾上針兩般猶未毒最毒婦人心自古道隔牆須有耳窗外豈無人房德夫妻在房說話時那婆娘一味不捨得這絹匹專意攛唆老公害人全不提防有人窺聽況在私衙中料無外人來往恣意調脣弄舌不想家人路信起初聞得貝氏焦躁便覆在間壁牆上聽他們爭多競少直至放火燒屋一句句聽得十分仔細到吃了一驚想道原來我主曾做過強盜虧這官人救了性命今反恩將仇報天理何在看起來這般大恩人尚且如此何況我奴僕之輩倘稍有過失這性命一發死得快了此等殘薄之人跟他何益又想道常言救人一命勝造七級浮屠何不救了這四人也是一點陰騭卻又想到若放他們走了料然不肯饒我不如也走了罷遂取些銀兩藏在身邊覷個空悄悄閃出私衙一徑奔入書院只見支成在廂房中烹茶坐於檻上執著扇子打盹也不去驚醒他竟踅入書室看王太時卻都不在止有李勉正襟據案而坐展玩書籍路信走近案前低低道相公你禍事到了還不快走更待幾時李勉被這驚不小急問禍從何來路信扯到半邊將適纔所聞一一細說又道小人因念相公無辜受害特來通報如今不走少頃便不能免禍了李勉聽了這話驚得身子猶如吊在冰桶裡把不住的寒顫向著路信倒身下拜道若非足下仗義救我李勉性命定然休矣大恩大德自當厚報決不學此負心之人急得路信答拜不迭道相公不要高聲恐支成聽得走漏了消息彼此難保李勉道但我走了遺累足下於心何安路信道小人又無妻室待相公去後亦自遠遁不消慮得李勉道既如此何不隨我同往常山路信道相公肯收留小人情願執鞭隨鐙李勉道你乃大恩人怎說此話遂叫王太一連十數聲再沒一人答應跌足叫苦道他們都往那裡去了路信道待小人去尋來李勉又道馬匹俱在後槽卻怎處路信道也等小人去哄他帶來急出書室回頭看支成已不在檻上打盹了路信即走入廂房中觀看卻也不在原來支成登東廝去了路信只道