士憐念房某含冤負屈少展半臂之力刺死此賊生死不忘大德那人搖手道我說足下認錯了咱資身尚且無策安能為人謀大事況殺人勾當非通小可設或被人聽見這話反連累咱家快些請回言罷轉身先向外而走房德上前一把扯道聞得義士素抱忠義專一除殘祛暴濟困扶危有古烈士之風今房某身抱大冤義士反不見憐料想此仇永不能報矣道罷又假意啼哭那人冷眼瞧了這個光景只道是真情方道足下真個有冤麼房德道若沒大冤怎敢來求義士那人道既恁樣且坐下將冤抑之事並仇家姓名今在何處細細說來可行則行可止則止兩下遂對面而坐陳顏支成站於傍邊房德捏出一段假情反說李勉昔年誣指為盜百般毒刑拷打陷於獄中幾遍差獄卒王太謀害性命皆被人知覺不致於死幸虧後官審明釋放得官此邑今又與王太同來挾制索詐千金意猶未足又串通家奴暗地行刺事露適來連此奴挈去奔往常山要唆顏太守來擺佈把一片說話妝點得十分利害那人聽畢大怒道原來足下受此大冤咱家豈忍坐視足下且請回縣在咱身上今夜往常山一路找尋此賊為足下報仇夜半到衙中復命房德道多感義士高義某當秉燭以待事成之日另有厚報那人作色道咱一生路見不平拔刀相助那個希圖你的厚報這禮物咱也不受說猶未絕飄然出門其去如風須臾不見了房德與眾人驚得目睜口呆連聲道真異人也權將禮物收回待他復命時再送有詩為證報仇憑一劍重義藐千金誰謂奸雄舌能違烈士心話分兩頭且說王太同兩個家人見家主出了城門又不拜客只管亂跑正不知為甚緣故一口氣就行了三十餘裡天色已晚卻又不尋店宿歇那晚乃是十三一輪明月早已昇空趁著月色不顧途路崎嶇負命而逃常恐後面有人追趕在路也無半句言語只管趲向前去約莫有二更天氣共行了六十多裡來到一個村鎮已是井陘縣地方那時走得口中又渴腹內又飢馬也漸漸行走不動路信道來路已遠料得無事了且就此覓個宿處明日早行李勉依言徑投旅店誰想夜深了家家閉戶關門無處可宿直到市梢頭見一家門兒半開半掩還在那裡收拾家夥遂一齊下馬走入店門將生口卸了鞍轡係在槽邊喂料路信道主人家揀一處潔淨所在與我們安歇店家答道不瞞客官說小店房頭沒有個不潔淨的如今也止空得一間在此教小二掌燈引入房中李勉向一條板凳上坐下覺得氣喘吁吁王太忍不住問道請問相公那房縣主苦留後日撥夫馬相送從容而行有何不美卻反把自己行李棄下猶如逃難一般連夜奔走受這般勞碌路管家又隨著我們同來是甚意故李勉嘆口氣道汝那知就裡若非路管家我與汝死無葬身之地矣今幸得脫虎口已謝天不盡了顧得什麼行李辛苦王太驚問其故李勉方待要說不想店主人見他們五人五騎深夜投宿一毫行李也無疑是歹人走進來盤問腳色說道眾客長做甚生意打從何處來這時候到此李勉一肚子氣恨正沒處說見店主相問答道話頭甚長請坐下了待我細訴乃將房德為盜犯罪憐其才貌暗令王太釋放以致罷官及客游遇見留回厚款今日午後忽然聽信老婆讒言設計殺害虧路信報知逃脫前後之事細說一遍王太聽了這話連聲唾罵負心之賊店主人也不勝嗟嘆王太道主人家相公鞍馬辛苦快些催酒飯來吃了睡一覺好趕路店主人答應出去只見床底下忽地鑽出一個大漢渾身結束手持匕首威風凜凜殺氣騰騰嚇得李勉主僕魂不附體一齊跪倒口稱壯士饒命那人一把扶起李勉道不必慌張自有話說咱乃義士平生專抱不平要殺天下負心之人適來房德假捏虛情反說公誣陷謀他性命求咱來行刺那知這賊子恁般狼心狗肺負義忘恩早是公說出前情不然險些誤殺了長者李勉連忙叩下頭去道多感義士活命之恩那人扯住道莫謝莫謝咱暫去便來即出庭中聳身上屋疾如飛鳥頃刻不見主僕都驚得吐了舌縮不上去不知再來還有何意懷著鬼胎不敢睡臥連酒飯也吃不下有詩為證奔走長途氣上沖忽然床下出青鋒一番衷曲殷勤訴喚醒奇人睡夢中再說房德的老婆見丈夫回來大事已就禮物原封不動喜得滿臉都是笑靨連忙整備酒席擺在堂上夫妻秉燭以待陳顏也留在衙中俟候到三更時分忽聽得庭前宿鳥驚鳴落葉亂墜一人跨入堂中房德舉目看時恰便是那個義士打扮得如天神一般比前大似不同且驚且喜向前迎接那義士全不謙讓氣憤憤的大踏步走入去居中坐下房德夫妻叩拜稱謝方欲啟問只見那義士怒容可掬颼地掣出匕首指著罵道你這負心賊子李畿尉乃救命大恩人不思報效反聽婦人之言背恩反噬既已事露逃去便該悔過卻又架捏虛詞哄咱行刺若非他道出真情連咱也陷於不義剮你這負心賊一萬刀方出咱這點不平之氣房德未及措辨頭已落地驚得貝氏慌做一堆平時且是會話會講到此心膽俱裂一張嘴猶如膠漆粘牢動彈不得義士指著罵道你這潑賤狗婦不勸丈夫為善反唆他傷害恩人我且看你肺肝是怎樣生的托地跳起身來將貝氏一腳踢翻左腳踏住頭髮右膝捺住兩腿這婆娘連叫義士饒命今後再不敢了那義士罵道潑賤淫婦咱也到肯饒你只是你不肯饒人提起匕首向胸膛上一刀直剖到臍下將匕首銜在口中雙手拍開把五臟六腑摳將出來血瀝瀝提在手中向燈下照看道咱只道這狗婦肺肝與人不同原來也只如此怎生恁般狠毒遂撇過一邊也割下首級兩顆頭結做一堆盛在革囊之中揩抹了手中血污藏了匕首提起革囊步出庭中逾垣而去說時義膽包天地話起雄心動鬼神再說李勉主僕在旅店中守至五更時分忽見一道金光從庭中飛入眾人一齊驚起看時正是那義士放下革囊說道負心賊已被咱刳腹屠腸今攜其首在此向革囊中取出兩顆首級李勉又驚又喜倒身下拜道足下高義千古所無請示姓名當圖後報義士笑道咱自來沒有姓名亦不要人酬報頃咱從床下而來日後設有相逢竟以床下義士相呼便了道罷向懷中取一包藥兒用小指甲挑了少許彈於首級斷處舉手一拱早已騰上屋檐挽之不及須臾不知所往李勉見棄下兩個人頭心中慌張正在擺佈可霎作怪看那人頭時漸漸縮小須臾化為一搭清水李勉方纔放心坐至天明路信取些錢鈔還了店家收拾馬匹上路說話的據你說李勉共行了六十多裡方到旅店這義士又無牲口如何一夜之間往返如風這便是前面說起頃刻能飛行百里乃劍俠常事耳那義士受房德之託不過黃昏時分比及追趕李勉還在途中馳驟未曾棲息他先一步埋伏等候一往一來有風無影所以伏於床下店中全然不知此是劍術妙處且說李勉當夜無話次日起身又行了兩日方到常山徑入府中拜謁太守故人相見喜隨顏開遂留於衙署中安歇顏太守也見沒有行李心中奇怪問其緣故李勉將前事一一訴出不勝駭異過了兩日柏鄉縣將縣宰夫妻被殺緣由申文到府原來是夜陳顏支成同幾個奴僕見義士行凶一個個驚號鼠竄四散潛躲直至天明方敢出頭只見兩個沒頭屍首橫在血泊裡五臟六腑都摳在半邊首級不知去向桌上器皿一毫不失一家叫苦連天報知主簿縣尉俱吃一驚齊來驗過細詢其情陳顏只得把房德要害李勉央人行刺始末說出主簿縣尉即點起若干做公的各執兵器押陳顏作眼前去捕獲刺客那時哄動合縣人民都跟來看到了陳顏間壁打將入去惟有幾間空房那見一個人影主簿與縣尉商議申文已曉得李勉是顏太守的好友從實申報在他面上怕有乾礙二則又見得縣主薄德乃將真情隱過只說半夜被盜越入私衙殺死縣令夫婦竊去首級無從捕獲兩下週全其事一面買棺盛殮顏太守依擬申文上司那時河北一路是安祿山專制知得殺了房德豈不去了一個心腹倒下回文著令嚴加緝獲李勉聞了這個消息恐怕纏到身上遂作別顏太守回歸長安故里恰好王鉷坐事下獄凡被劾罷官盡皆起任李勉原起畿尉不上半年即昇監察御史一日在長安街上行過只見一人身衣黃衫跨下白馬兩個胡奴跟隨望著節導中亂撞從人呵喝不住李勉舉目觀看卻是昔日那床下義士遂滾鞍下馬鞠恭道義士別來無恙那義士笑道虧大人還認得咱家李勉道李某日夜在心安有不識之理請到敝衙少敘義士道咱另日竟誠來拜今日不敢從命倘大人不棄同到敝寓一話何如李勉欣然相從並馬而行來到慶元坊一個小角門內入去過了幾重門戶忽然顯出一座大宅院廳堂屋舍高聳雲漢奴僕趨承不下數百李勉暗暗點頭道真是個異人請入堂中重新見禮分賓主而坐頃刻擺下筵席豐富勝於王侯喚出家樂在庭前奏樂一個個都是明眸皜齒絕色佳人義士道隨常小飯不足以供貴人幸勿怪李勉滿口稱謝當下二人席間談論些古今英雄之事至晚而散次日李勉備了些禮物再來拜訪時止存一所空宅不知搬向何處去了嗟嘆而回後來李勉官至中書門下平章事封為國公王太路信亦扶持做個小小官職詩云從來恩怨要分明將怨酬恩最不平安得劍仙床下士人間遍取不平人
