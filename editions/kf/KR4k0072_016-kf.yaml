一口豬因副手出去了在那裡焦躁見陸婆歸家道來得極好且相幫我縛一縛豬兒那婆子平昔懼怕兒子不敢不依道待我脫了衣服幫你望裡邊進去陸五漢就隨他進來見婆子脫衣時落下一個紅綢包兒陸五漢只道是包銀子拾起來走到外邊解開看時卻是一雙合色女鞋喝采道誰家女子有恁般小腳相了一會又道這個小腳女子必定是有顏色的若得抱在身邊睡一夜也不枉此一生又想道這鞋如何在母親身邊卻又是穿舊的有恁般珍重把綢兒包著其中必有緣故待他尋時把話兒嚇他必有實信原把來包好揣在懷裡婆子脫過衣裳相幫兒子縛豬來殺了淨過手穿了衣服卻又要去尋張藎臨出門把手摸袖中時那雙鞋兒卻不見了連忙復轉身尋時影也不見急得那婆子叫天叫地陸五漢冷眼看母親恁般著急由他尋個氣嘆方纔來問道不見了什麼東西這樣著急婆子道是一件要緊物事說不得的陸五漢道若說個影兒或者你老人家目力不濟待我與你尋看如說不得的你自去尋不幹我事婆子見兒子說話蹺蹊便道你若拾得還了我有許多銀子在上勾你做本錢哩陸五漢見說有銀子動了火問道拾到是我拾得你說那根由與我方纔還你婆子叫到裡邊去一五一十把那兩個前後的事細細說與陸五漢探了婆子消息心中歡喜假意驚道早是與我說知不然幾乎做出事來婆子道卻是為何陸五漢道自古說得好若要不知除非莫為這樣事怎掩得人的耳目況且潘用那個老強盜可是惹得他的麼倘或事露曉得你賺了銀兩與他做腳那時不要說把我做本錢只怕連我的店底都倒在他手裡還不像意哩陸婆被兒子一嚇心中老大驚慌道兒說得有理如今我把這銀子和鞋兒還了他只說事體不諧不管他閑帳罷了陸五漢笑道這銀子在那裡陸婆便去取出來與兒子看五漢把來袖了道母親這銀子和鞋兒留在這裡萬一後日他們從別處弄出事來連累你時把他做個證見若不到這田地那銀子落得用的他敢來討麼陸婆道倘張大老來問回音卻怎麼處五漢道只說他家門戶緊急一時不能若有機會便來通報回他數次自然不來了那婆子銀子鞋兒都被五漢拿去又不敢討手中沒了把柄又怕弄出事來也不敢去約張藎且說陸五漢把這十兩銀子辦起幾件華麗衣服也買一頂縐紗巾兒到晚上等陸婆睡了約莫一更時分將行頭打扮起來把鞋兒藏在袖裡取鎖反鎖了大門一徑到潘家門首其夜微雲籠月不甚分明且喜夜深人靜陸五漢在樓牆下輕輕咳嗽一聲上面壽兒聽得連忙開窗那窗臼裡呀的有聲壽兒恐怕驚醒爹媽即卓上取過茶壺來灑些茶在裡邊開時卻就不響把布一頭緊緊的縛在柱上一頭便垂下來陸五漢見布垂下滿心歡喜撩衣拔步上前雙手挽住布兒兩腳挺在牆上逐步捱將上去頃刻已到樓窗邊輕輕跨下壽兒把布收起將窗兒掩上陸五漢就雙手抱住便來親嘴壽兒即把舌兒度在五漢口中此時兩情火熱又是黑暗之中那辨真假相偎相抱解衣就寢五漢將壽兒雙股拍開騰身上去壽兒亦聳身而就真個你貪我愛被陸五漢恣情取樂正是豆蔻包香卻被枯藤胡纏海棠含蕊無端暴雨摧殘鵂留鳥佔錦鴛之窠鳳凰作凡鴉之偶一個口裡呼肉肉肝肝還認做店中行貨一個心裡想親親愛愛那知非樓下可人紅娘約張珙錯訂鄭恆郭素學王軒偶迷西子可憐美玉嬌香體輕付屠酤市井人當下雨散雲收方纔敘闊五漢將出那雙鞋兒細述向來情款壽兒也訴想念之由情猶未足再赴陽臺愈加恩愛到了四更即便起身開了窗依舊把布放下五漢攀援下去急奔回家壽兒把布收起藏過輕輕閉上窗兒原復睡下自此之後但是雨下月明陸五漢就不來餘則無夜不會往來約有半年十分綢繆那壽兒不覺面目語言非復舊時潘用夫妻心中疑惑幾遍將女兒盤問壽兒只是咬定牙根一字不吐那晚五漢又來壽兒對他說道爹媽不知怎麼有些知覺不時盤問雖然再四白賴過了兩夜防謹愈嚴倘然候著大家不好今後你且勿來待他懶怠些兒再圖歡會五漢口中答道說得是心內甚是不然到四更時又下樓去了當夜潘用朦朧中覺道樓上有些唧唧噥噥側著耳要聽個仔細然後起來捉姦不想聽了一回忽地睡去天明方醒對潘婆道阿壽這賤人做下不明白的勾當是真了他卻還要口硬我昨夜明明裡聽得樓上有人說話欲待再聽幾句起身去捉他不想卻睡著去潘婆道便是我也有些疑心但算來這樓上沒個路道兒通得外邊難道是神仙鬼怪來無跡去無蹤潘用道如今少不得打他一頓拷問他真情出來潘婆道不好常言道家醜不可外揚若還一打鄰里都要曉得了傳說開去誰肯來娶他如今也莫論有這事沒這事只把女兒臥房遷在樓下臨臥時將他房門上落了鎖萬無他虞你我兩口搬在他樓上去睡看夜間有何動靜便知就裡潘用道說得有理到晚間吃晚飯時潘用對壽兒道今後你在我房中睡罷我老夫妻要在樓上做房了壽兒心中明白不敢不依只暗暗地叫苦當夜互相更換潘用把女兒房門鎖了對老婆道今夜有人上樓時拿住了只做賊論結果了他方出我這氣把窗兒也不扣上准候拿人不提潘用夫妻商議且說陸五漢當夜壽兒叮囑他且緩幾時來心上不悅卻也熬定了數晚果然不去過了十餘日忽一晚淫心蕩漾按納不住又想要與壽兒取樂恐怕潘用來捉姦身邊帶著一把殺豬的尖刀防備出了大門把門反鎖好了直到潘家門首依前咳嗽等候一回樓上毫無動靜只道壽兒不聽見又咳嗽兩聲更無音響疑是壽兒睡著了如此三四番看看等至四鼓事已不諧只得回家心中想道他見我好幾夜不去如何知道我今番在此這也不要怪他到次夜又去依原不見動靜等得不耐煩心下早有三分忿怒到第三夜自己在家中吃個半酣等到更闌掮了一張梯子直到潘家樓下也不打暗號一徑上到樓窗邊把窗輕輕一拽那窗呀的開了五漢跳身入去抽起梯子閉上窗兒摸至床上來正是一念願邀雲雨夢片時飛過鳳凰樓卻說潘用夫妻初到樓上這兩夜有心采聽風聲不敢熟睡一連十餘夜靜悄悄地老鼠也不聽得叫一聲心中已疑女兒沒有此事提防便懈怠了事有偶然恰好這一夜壽兒房門上的搭鈕斷了下不得鎖潘婆道只把前後門鎖斷房門上用個封條封記這一夜料沒甚事潘用依了他說話其夜老夫妻也用了幾杯酒帶著酒興兩口兒一頭睡了做了些不三不四沒正經的生活身子睏倦緊緊抱住睡熟故此五漢上來開閉窗分毫不知且說五漢摸到床邊正要解衣就寢卻聽得床上兩個人在一頭打鼻勾心中大怒道怪道兩夜咳嗽他只做睡著不瞅采我原來這淫婦又勾搭上了別人卻假意推說父母盤問教我且不要來明明斷絕我了這般無恩淫婦要他怎的身邊取出尖刀把手摸著二人頸項輕輕透入刀一勒先將潘婆殺死還怕咽喉未斷把刀在內三四卷眼見不能活了復刀轉來也將潘用殺死揩抹了手上血污將刀藏過推開窗子把梯兒墜下跨出樓窗把窗依舊閉好輕輕溜將下來擔起梯子飛奔回家去了且說壽兒自換了臥房恐怕情人又來打暗號露出馬腳放心不下到早上不見父母說起那一日方纔放心到十餘日後全然沒事了這一日睡醒了守到巳牌時分還不見父母下樓心中奇怪曉得門上有封記又不敢自開只在房中聲喚道爹媽起身罷天色晏了如何還睡叫喚多時並不答應只得開了房門走上樓來揭開帳子看時但見滿床流血血泊裡挺著兩個屍首壽兒驚倒在地半晌方蘇撫床大哭不知何人殺害哭了一回想道此事非同小可若不報知鄰里必要累及自己即便取了鑰匙開門出來卻又怕羞立在門內喊道列位高鄰不好了我家爹媽不知被甚人殺死乞與奴家作主連喊數聲那些對門間壁並街上過往的人聽見一齊擁進把壽兒到擠在後邊都問道你爹媽睡在那裡壽兒哭道昨夜好好的上樓今早門戶不開不知何人把來雙雙殺死眾人見說在樓上都趕上樓揭開帳子看時老夫妻果然殺死在床眾人相看這樓又臨著街道上面雖有樓窗下面卻是包檐牆無處攀援上來壽兒又說門戶都是鎖好的適纔方開家中卻又無別人都道此事甚是蹺蹊不是當耍的即時報地方總甲來看了同著四鄰引壽兒去報官可憐壽兒從不曾出門今日事在無奈只得把包頭齊眉兜了鎖上大門隨眾人望杭州府來那時哄動半個杭城都傳說這事陸五漢已曉得殺錯了心中懊悔不及失張失智顛倒在家中尋鬧陸婆向來也曉得兒子些來蹤去跡今番殺人一事定有干涉只是不敢問他卻也懷著鬼胎不敢出門正是理直千人必往心虧寸步難移且說眾人來到杭州府前正值太守坐堂一齊進去稟道今有十官子巷潘用家夜來門戶未開夫妻俱被殺死同伊女壽兒特來稟知太守喚上壽兒問道你且細說父母什麼時候睡的睡在何處壽兒道昨夜黃昏時吃了夜飯把門戶鎖好雙雙上樓睡的今早巳牌時分不見起身上樓看時已殺在被中樓上窗依舊關閉下邊門戶一毫不動封鎖依然太守又問道可曾失甚東西壽兒道件件俱在太守道豈有門戶不開卻殺了人東西又一件不失事有可疑想了一想又問道你家中還有何人壽兒道止有嫡親三口並無別人太守道你父親平昔可有仇家麼壽兒道並沒有甚仇家太守道這事卻也作怪沈吟了半晌心中忽然明白教壽兒抬起頭來見包頭蓋著半面太守令左右揭開看時生得非常艷麗太守道你今年幾歲了壽兒道十七歲了太守道可曾許配人家麼壽兒低低道未曾太守道你的睡處在那裡壽兒道睡在樓下太守道怎麼你到住在下邊父母反居樓上壽兒道一向是奴睡在樓上半月前換下來的太守道為甚換了下來壽兒對答不來道不知爹媽為甚要換太守喝道這父母是你殺的壽兒著了急哭道爺爺生身父母奴家敢做這事太守道我曉得不是你殺的一定是你心上人殺的快些說他名字上來壽兒聽說心中慌張賴道奴家足跡不出中門那有此等勾當若有時鄰里一定曉得爺爺問鄰里便知奴家平昔為人了太守笑道殺了人鄰里尚不曉得這等事鄰里如何曉得此是明明你與姦夫往來父母知覺了故此半月前換你下邊去睡絕了姦夫的門路他便忿怒殺了不然為甚換你在樓下去睡俗語道賊人心虛壽兒被太守句句道著心事不覺面上一回紅一回白口內如吃子一般半個字也說不清潔太守見他這個光景一發是了喝教左右拶起那些皂隸飛奔上前扯出壽兒手來如玉相似那禁得恁般苦楚拶子纔套得指頭上疼痛難忍即忙招道爺爺有有有個姦夫太守道叫甚名字壽兒道叫做張藎太守道他怎麼樣上你樓來壽兒道每夜等我爹媽睡著他在樓下咳嗽為號奴家把布接長係一頭在柱上垂下他從布上攀引上樓未到天明即便下去如此往來約有半年爹媽有些知覺幾次將奴盤問被奴賴過奴家囑咐張藎今後莫來省得出醜張藎應允而去自此爹媽把奴換在樓下來睡又將門戶盡皆下鎖奴家也要隱惡揚善情願住在下邊與他斷絕只此便是實情其爹媽被殺委果不知情由太守見他招了喝教放了拶子起簽差四個皂隸速拿張藎來審那四個皂隸飛也似去了這是閉門家裡坐禍從天上來且說張藎自從與陸婆在酒店中別後即到一個妓家住了三夜回家知陸婆來尋過兩遍急去問信時陸婆因兒子把話嚇住且又沒了鞋子假意說道鞋子是壽姐收了教多多拜上如今他父親利害門戶緊急無處可入再過幾時父親即要出去約有半年方纔回來待他起身後那時可放膽來會張藎只道是真話不時探問消息落後又見壽兒幾遭相對微笑兩下都是錯認壽兒認做夜間來的即是此人故見了喜笑張藎認做要調戲他上手時常現在他眼前賣俏日復一日並無確信張藎漸漸憶想成病在家服藥調治那日正在書房中悶坐只見家人來說有四個公差在外面問大爺什麼說話張藎見說吃了一驚想道除非妓弟傢什麼事故不免出廳相見問其來意公差答道想是為什麼錢糧裡役事情到彼自知張藎便放下了心討件衣服換了又打發些錢鈔隨著皂隸望府中而來後面許多家人跟著一路有人傳說潘壽兒同姦夫殺了爹媽張藎聽了甚是驚駭心下想道這丫頭弄出恁樣事來早是我不曾與他成就原來也是個不成才的爛貨險些把我也纏在是非之中不一時來到公廳太守舉目觀看張藎卻是個標致少年不像個殺人凶徒心下有些疑惑乃問道張藎你如何奸騙了潘用女兒又將他夫妻殺死那張藎乃風流子弟只曉得三瓦兩舍行奸賣俏是他的本等何曾看見官府的威嚴一拿到時已是膽戰心驚如今聽說把潘壽兒殺人的事坐在他身上就是青天裡打下一個霹靂嚇得半個字也說不出掙了半日方纔道小人與潘壽兒雖然有意卻未曾成奸莫說殺他父母就是樓上從不曾到太守喝道潘壽兒已招與你通姦半年如何尚敢抵賴張藎對潘壽兒道我何嘗與你成奸卻來害我起初潘壽兒還道不是張藎所殺這時見他不認姦情連殺人事到疑心是真了一口咬住哭哭啼啼張藎分辨不清太守喝教夾起來只聽得兩傍皂隸一聲吆喝蜂擁上前扯腳拽腳可憐張藎從小在綾羅堆裡滾大的就捱著線結也還過不去如何受得這等刑罰夾棍剛套上腳就殺豬般喊叫連連叩頭道小人願招太守教放了夾棍快寫供狀上來張藎只是啼哭道我並不知情卻教我寫甚麼來又向潘壽兒說道你不知被那個奸騙了卻扯我抵當如今也不消說起但憑你怎麼樣說來我只依你的口招承便了潘壽兒道你自作自受怕你不招承難道你不曾在樓下調戲我你不曾把汗巾丟上來與我你不曾接受我的合色鞋張藎道這都是了只是我沒有上樓與你相處太守喝道一事真百事真還要多說快快供招張藎低頭只聽潘壽兒說一句便寫一句輕輕裡把個死罪認在身上畫供已畢呈與太守看了將張藎問實斬罪壽兒雖不知情因奸傷害父母亦擬斬罪各責三十上了長板張藎押付死囚牢裡潘壽自入女監收管不在話下且說張藎幸喜皂隸們知他是有鈔主兒還打個出頭棒子不致十分傷損來到牢裡叫屈連聲無門可訴這些獄卒分明是挑一擔銀子進監那個不歡喜那個不把他奉承都來問道張大爺你怎麼做恁般勾當張藎道列位大哥不瞞你說當初其實與那潘壽姐曾見過一面兩下雖然有意卻從不曾與他一會不知被甚人騙了卻把我來頂缸你道我這樣一個人可是個殺人的麼眾人道既如此適纔你怎麼就招了張藎道我這瘦怯怯的身子可是熬得刑的麼況且新病了數日剛剛起來正是雪上加一霜般若招了還活得幾日若不招這條性命今夜就要送了這也是前世冤業不消說起但潘壽姐適纔說話歷歷有據其中必有緣故我如今願送十兩銀子與列位買杯酒吃引我去與潘壽姐一見細細問明這事我死亦瞑目內中一個獄卒頭兒道張大爺要看見潘壽兒也不難只是十兩太少張藎道再加五兩罷禁子頭道我們人眾分不來極少也得二十兩張藎依允兩個禁子扶著兩腋直到女監柵門外潘壽兒正在裡面啼哭獄卒扶他到柵門口見了張藎便一頭哭一頭罵道你這無恩無義的賊我一時迷惑被你奸騙有甚虧了你下這樣毒手殺我爹媽害我性命張藎道你且不要嚷如今待我細細說與你詳察起初見到你時多承顧盼留戀彼此有心以後月夜我將汗巾贈你你將合色鞋來酬我我因無由相會打聽賣花的陸婆在你家走動先送他十兩銀子將那鞋兒來討信他來回說鞋便你收了只因父親利害門戶緊急目下要出去幾個月待起身後即來相約是從那日為始朝三暮四約了無數日子已及半年並無實耗及至有時見你卻又微笑教我日夜牽掛成了思憶之病在家服藥何嘗到你樓上卻來誣害我至此地位壽兒哭道負心賊你還要賴哩那日你教陸婆將鞋來約會了定下計策教我等爹媽睡著聽下邊咳嗽為號把布接長垂下來與你為梯到次夜你果然在下邊咳嗽我依法用布引你上樓你出鞋為信此後每夜必來不想爹媽有些知覺將我盤問幾次我對你說此後且莫來恐防事露大家壞了名聲等爹媽不提防了再圖相會那知你這狠心賊就銜恨我爹媽昨夜不知怎生上樓把來殺了如今到還抵賴連前面的事都不肯承認張藎想了一想道既是我與你相處半年那形體聲音料必識熟你且細細審視可不差麼眾人道張大爺這話說得極是若果然不差你也須不是人了不要說問斬罪就問凌遲也不為過壽兒見說躊躇了半晌又睜目把他細細觀看張藎連問道是不是快些說出不要遲疑壽兒道聲音甚是不同身子也覺大似你向來都是黑暗中不能詳察止記得你左腰間有個瘡痕腫起大如銅錢只這個便是色認眾人道這個一發容易明白張大爺你且脫下衣來看若果然沒有明日稟知太爺我眾人為證出你罪名於是張藎滿心歡喜道多謝列位連忙把衣服褪下眾人看時遍身如玉腰間那有瘡痕壽兒看了啞口無言張藎道小娘子如今可知不是我麼眾人道不消說了這便真正冤枉明日與你稟官當下依舊扶到一個房頭住了一宵明早太守陞堂眾禁子跪下將昨夜張藎與潘壽兒面證之事一一稟知太守大驚即便吊出二人覆審先喚張藎上去從頭至尾細訴一遍太守道你那只鞋兒付與陸婆去後不曾還你張藎道正是又喚壽兒上去壽兒也把前後事又細細呈說太守道那鞋兒果是原與陸婆拿去明晚張藎到樓付你的麼壽兒道正是太守點頭道這等是陸婆賣了張藎將鞋另與別人冒名奸騙你了即便差人去拿那婆子不多時婆子拿到太守先打四十然後問道當初張藎央你與潘壽兒通信既約了明晚相會你如何又哄張藎不教他去卻把鞋兒與別人冒名去奸騙從實說來饒你性命若半句虛了登時敲死那婆子被這四十打得皮開肉綻那敢半字虛妄把那賣花為由定策期約連尋張藎不遇回來幫兒子殺豬落掉鞋子並兒子恐嚇說話已後張藎來討信因無了鞋子含糊哄他等情一一細訴其奸騙殺人情由卻不曉得太守見說話與二人相合已知是陸五漢所為即又差人將五漢拿到太守問道陸五漢你奸騙了良家女子卻又殺他父母有何理說陸五漢賴道爺爺小人是市井愚民那有此事這是張藎央小人母親做腳奸了潘家女兒殺了他父母怎推到小人身上壽兒不等他說完便喊道奸騙奴家的聲音正是那人爺爺止驗他左腰可有腫起瘡痕便知真假太守即教皂隸剝下衣服看時左腰間果有瘡痕腫起陸五漢方纔口軟連稱情願償命把前後奸騙誤殺潘用夫妻等情一一供出太守喝打六十問成斬罪追出行凶尖刀上庫壽兒依先原擬斬罪陸婆說誘良家女子依律問徒張藎不合希圖奸騙雖未成奸實為禍本亦問徒罪召保納贖當堂一一判定罪名備文書申報上司那潘壽兒思想卻被陸五漢奸騙父母為我而死出乖露醜懊悔不及無顏再活立起身來望丹墀階沿青石上一頭撞去腦漿迸出頃刻死於非命可憐慕色如花女化作含冤帶血魂太守見壽兒撞死心中不忍喝教把陸五漢再加四十湊成一百下在死囚牢裡聽候文書轉日秋後處決又拘鄰里將壽兒屍骸抬出把潘用房產傢俬盡皆變賣備棺盛殮三屍買地埋葬餘銀入官上庫不在話下且說張藎見壽兒觸階而死心下十分可憐想道皆因為我致他父子喪身亡家回至家中將銀兩酬謝了公差獄卒等輩又納了徒罪贖銀調養好了身子到僧房道院禮經懺超度潘壽兒父子三人自己吃了長齋立誓再不姦淫人家婦女連花柳之地也絕足不行在家清閑自在直至七十而終時人有詩嘆云賭近盜兮奸近殺古人說話不曾差奸賭兩般都不染太平無事做人家
