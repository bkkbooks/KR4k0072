body:
  text: 第十六卷陸五漢硬留合色鞋得便宜處笑嘻嘻不遂心時暗自悲誰識天公顛倒用得便宜處失便宜近時有一人姓強平日好佔便宜倚強凌弱裡中都懼怕他熬出一個渾名叫做強得利一日偶出街市行走看見前邊一個單身客人在地下撿了一個兜肚兒提起頗重想來其中有物慌忙趕上前攔住客人說道這兜肚是我腰間脫下來的好好還我客人道我在前面走你在後面來如何到是你腰間脫下來的好不通理強得利見客人不從就擘手去搶早扯住兜肚上一根帶子兩下你不松我不放街坊人都走攏來問其緣故二人各爭執是自己的兜肚兒眾人不能剖判其中一個老者開言道你二人口說無憑且說兜肚中什麼東西合得著便是他的強得利道誰耐煩與你猜謎道白我只認得自己的兜肚還我便休若不還時與你並個死活只這句話眾人已知不是強得利的兜肚了多有懼怕強得利的有心幫襯他便上前解勸道客人你不識此位強大哥麼是本地有名的豪傑這兜肚你是地下撿的料非己物就把來結識了這位大哥也是理所當然客人被勸不過便道這兜肚果然不是小人的只是財可義取不可力奪既然列位好言相勸小人情願將兜肚打開看是何物若果有些采頭分作三股小人與強大哥各得一股那一股送與列位們做個利市店中共飲三杯以當酬勞那老者道客官最說得是強大哥且放手都交付與老漢手裡老者取兜肚打開看時中間一個大布包包中又有三四層紙裹著光光兩錠雪花樣的大銀每錠有十兩重強得利見了這銀子愛不可言就使欺心起來便道論起三股分開可惜鏨壞了這兩個錁兒我身邊有幾兩散碎銀子要去買生口的把來送與客人留下這錁兒與我罷一頭說一頭在腰裡摸將出來三四個零碎包兒湊起還稱不上四兩銀子連眾人吃酒東道都在其內客人如何肯收兩下爭嚷起來又有人點撥客人道這位強大哥不是好惹的你多少得些采去罷老者也勸道客官這四兩銀子都把與你我們眾人這一股不要了那一日不吃酒省了這東道奉承你二位罷口裡說時那兩錠銀子在老者手中已被強得利擘手搶去那客人沒奈何只得留了這四兩銀子強得利道雖然我身邊沒有碎銀前街有個酒店是我舅子開的有勞眾位多時少不得同去一坐眾人笑道恁地時連客官也去吃三杯今後就做個相識一行十四五人同走到前街朱三郎酒店裡大樓上坐下強得利一來白白裡得了這兩錠大銀心中歡喜二來感謝眾人幫襯三來討了客人的便宜又賴了眾人一股利市心上也未免有些不安況且是自己舅子開張的酒店越要賣弄好酒好食只顧教搬來吃得個不亦樂乎眾人個個醉飽方纔撒手共吃了三兩多銀子強得利教記在自家帳上眾人出門作別各自散訖客人乾淨得了四兩銀子也自歸家去了過了兩日強得利要買生口舅子店裡又來取酒錢家中別無銀兩只得把那兩錠雪白樣的大銀在一個傾銀鋪裡去傾銷指望加出些銀水那銀匠接銀在手翻覆看了一回手內顛上幾顛問道這銀子那裡來的強得利道是交易上來的銀匠道大郎被人哄了這是鐵胎假銀外邊是細絲只薄薄一層皮兒裡頭都是鉛鐵強得利不信只要鏨開銀匠道鏨壞時大郎莫怪銀匠動了手乒乒乓乓鏨開一個口子那銀皮裂開裡面露出假貨強得利看了自也不信一生不曾做這折本的交易自作自受埋怨不得別人坐在櫃卓邊呆呆的對著這兩錠銀子只顧看引下許多人進店都來認那鐵胎銀的說長說短強得利心中越氣正待尋事發作只見門外兩個公差走入大喝一聲不由分說將鏈子扣了強得利的頸連這兩錠銀子都解到一個去處來原來本縣庫上錢糧收了幾錠假銀知縣相公暗差做公的在外緝訪這兜肚裡銀子不知是何人掉下的那錠樣正與庫上的相同因此被做公的拿了解上縣堂知縣相公一見了這錠樣認定是造假銀的光棍不容分訴一上打了三十毛板將強得利送入監裡要他賠補庫上這幾錠銀子三日一比較強得利無可奈何只得將田產變價上庫又央人情在知縣相公處說明這兩錠銀子的來歷知縣相公聽了分上饒了他罪名釋放寧家共破費了百外銀子一個小小家當弄得七零八落被裡中做下幾句口號傳做笑話道是強得利強得利做事全不濟得了兩錠寡鐵破了百金家計公堂上毛板是我打來酒店上東道別人吃去似此折本生涯下次莫要淘氣從今改強為弱得利喚做失利再來嚇裡欺鄰只怕縮不上鼻涕這段話叫做強得利貪財失采正是得便宜處失便宜如今再講一個故事叫做陸五漢硬留合色鞋也是為討別人的便宜後來弄出天大的禍來正是爽口食多應損胃快心事過必為殃話說國朝弘治年間浙江杭州府城有一少年子弟姓張名藎積祖是大富之家幼年也曾上學攻書只因父母早喪沒人拘管把書本拋開專與那些浮浪子弟往來學就一身吹彈蹴踘慣在風月場中賣弄煙花陣裡鑽研因他生得風流俊俏多情知趣又有錢鈔使費小娘們多有愛他的奉得神魂顛倒連家裡也不思想妻子累諫不止只索由他一日正值春間西湖上桃花盛開隔夜請了兩個名妓一個喚做嬌嬌一個叫做倩倩又約了一般幾個子弟教人喚下湖船要去游玩自己打扮起來頭戴一頂時樣縐紗巾身穿著銀紅吳綾道袍裡邊繡花白綾襖兒腳下白綾襪大紅鞋手中執一柄書畫扇子後面跟一個垂髫標致小廝叫做清琴是他的寵童左臂上掛著一件披風右手拿著一張弦子一管紫簫都是蜀錦製成囊兒盛裹離了家中望錢塘門搖擺而來卻打從十官子巷中經過忽然抬頭看見一家臨街樓上有個女子揭開簾兒潑那梳妝殘水那女子生得甚是嬌艷怎見得有清江引為證誰家女兒委實的好賽過西施貌面如白粉糰鬢似烏雲繞若得他近身時魂靈兒都掉了張藎一見身子就酥了半邊便立住腳不肯轉身假意咳嗽一聲那女子潑了水正待下簾忽聽得咳嗽聲響望下觀看一眼瞧見個美貌少年人物風流打扮喬畫也凝眸流盼兩面對覷四目相視那女子不覺微微而笑張藎一發魂不附體只是上下相隔不能通話正看間門裡忽走出個中年人來張藎急忙回避等那人去遠又復走轉看時女子已下簾進去站立一回不見蹤影教清琴記了門面明日再來打探臨行時還回頭幾次那西湖上平常是他的腳邊路偏這日見了那女子行一步懶一步就如走幾百里山路一般甚是厭煩出了錢塘門來到湖船上那時兩個妓女和著一班子弟都已先到見張藎上船俱走出船頭相迎張藎下了船清琴把衣服弦子簫兒放下稍子開船向湖心中去那一日天色晴明堤上桃花含笑柳葉舒眉往來踏春士女攜酒挈榼紛紛如蟻有詩為證山外青山樓外樓西湖歌舞幾時休暖風薰得遊人醉錯把杭州作汴州且說張藎船中這班子弟們一個個吹彈歌唱施逞技藝偏有張藎一意牽掛那樓上女子無心歡笑托腮呆想他也不像游春到似傷秋光景眾人都道張大爺平昔不是恁般今日為何如此不樂必定有甚緣故張藎含糊答應不言所以眾人又道大爺不要敗興且開懷吃酒有甚事等我眾弟兄與你去解紛又對嬌嬌倩倩道想是大爺怪你們不來幫襯故此著惱還不快奉杯酒兒下禮嬌嬌倩倩真個篩過酒來相勸張藎被眾人鬼諢勉強酬酢心不在焉未到晚就先起身眾人亦不強留上了岸進錢塘門原打十官子巷經過到女子門首復咳嗽一聲不見樓上動靜走出巷口又踅轉來一連數次都無音響清琴道大爺明日再來罷若只管往來被人疑惑張藎依言只得回家明日到他家左近訪問是何等人有人說他家有名叫做潘殺星潘用夫妻兩個止生一女年纔十六喚做壽兒那老兒與一官宦人家薄薄裡有些瓜葛冒著他的勢頭專在地方上嚇詐人的錢財騙人酒食地方上無一家不怕他無一個不恨他是個賴皮刁鑽主兒張藎聽了記在肚裡慢慢的在他門首踱過恰好那女子開簾遠望兩下又復相見彼此以目送情轉加親熱自此之後張藎不時往來其下探聽以咳嗽為號有時看見有時不見眉來眼去兩眼甚濃只是無門得到樓上一夜正是二月十五皜月當天渾如白晝張藎在家坐立不住吃了夜飯趁著月色獨步到潘用門首並無一個人來往見那女子正捲起簾兒倚窗望月張藎在下看見輕輕咳嗽一聲上面女子會意彼此微笑張藎袖中摸出一條紅綾汗巾結個同心方勝團做一塊望上擲來那女子雙手來接恰好正中就月底下仔細看了一看把來袖過就脫下一隻鞋兒投下張藎雙手承受看時是一隻合色鞋兒將指頭量摸剛剛一折把來係在汗巾頭上納在袖裡望上唱個肥喏女子還了個萬福正在熱鬧處那女子被父母呼喚只得將窗兒閉上自下樓去張藎也興盡而返歸到家裡自在書房中宿歇又解下這只鞋兒在燈前細玩果是金蓮一瓣且又做得甚精細怎見得也有清江引為證覷鞋兒三寸輕羅軟窄勝蕖花片若還繡滿花只費分毫線怪他香噴噴不沾泥只在樓上轉張藎看了一回依舊包在汗巾頭上心中想道須尋個人兒通信與他怎生設法上得樓去方好若只如此空砑光眼飽肚飢有何用處左思右算除非如此方能到手明日午前袖了些銀子走至潘家門首望樓上不見可人便遠遠的借個人家坐下看有甚人來往事有湊巧坐不多時只見一個賣婆手提著個小竹撞進他家去約有一個時辰依原提著竹撞出來從舊路而去張藎急趕上一步看時不是別人卻是慣走大家賣花粉的陸婆就在十官子巷口居住那婆子以賣花粉為名專一做媒做保做馬泊六正是他的專門故此家中甚是活動兒子陸五漢在門前殺豬賣酒平昔酗酒撒潑是個凶徒連那婆子時常要教訓幾拳的婆子怕打每事到都依著他不敢一毫違拗當下張藎叫聲陸媽媽陸婆回頭認得便道呀張大爺何來連日少會張藎道適纔去尋個朋友不遇便道在此經過你怎一向不到我家走走那些丫頭們都望你的花哩陸婆道老身日日要來拜望大娘偏有這些沒正經事絆住身子不曾來得一頭說已到了陸婆門首只見陸五漢在店中賣肉賣酒十分熱鬧陸婆道大爺吃茶去便好只是家間齷齪不好屈得貴人張藎道茶到不消還要借幾步路說話陸婆道少待連忙進去放了竹撞出來道大爺有甚事作成老媳婦張藎道這裡不是說話之處且隨我來直引到一個酒樓上揀個小閣兒中坐下酒保放下杯箸問道可還有別客麼張藎道只我二人上好酒暖兩瓶來時新果子先將來案酒好嗄飯只消三四味就勾了酒保答應下去不一時都已取到擺做一卓子斟過酒來吃了數杯張藎打發酒保下去把閣子門閉了對陸婆道有一事要相煩媽媽只怕你做不來那婆子笑道不是老身誇口憑你天大樣疑難事體經著老身一了百當大爺有甚事只管分付來包在我身上與你完成張藎道只要如此便好當下把兩臂靠在桌上舒著頸向婆子低低說道有個女子要與我勾搭只是沒有做腳的難得到手曉得你與他家最熟特來相求去通個信兒若說法得與我一會決不忘恩今日先有十兩白物在此送你開手事成之後還有十兩便去袖裡摸出兩個大錠放在卓上陸婆道銀子是小事你且說是那一家的雌兒張藎道十官子巷潘家壽姐可是你極熟的麼陸婆道原來是這個小鬼頭兒我常時見他端端正正還是黃花女兒不像要尋野食吃的怎生著了你的道兒張藎把前後遇見並夜來贈鞋的事細細與婆子說知陸婆道這事到也有些難處哩張藎道有甚難處陸婆道他家的老子利害家中並無一個雜