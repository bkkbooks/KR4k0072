body:
  text: 第三十八卷李道人獨步雲門盡說神仙事渺茫誰人能脫利名韁今朝偶讀雲門傳陣陣熏風透體涼話說昔日隋文帝開皇初年有個富翁姓李名清家住青州城裡世代開染坊為業雖則經紀人家宗族到也蕃盛合來共有五六千丁都是有本事光著手賺得錢的因此家家饒裕遠近俱稱為李半州一族之中惟李清年齒最尊推為族長那李清天性仁厚族中不論親疏遠近個個親熱一般看待再無兩樣心腸為這件上合族長幼男女沒一個不把他敬重每年生日都去置辦禮物與他續壽宗族已是大了卻又好勝各自搜覓異樣古物器玩錦繡綾羅饋送他生平省儉惜福不肯過費俱將來藏置土庫中逐年堆積上去也不計其數只有一件事再不吝惜你道是那一件他自幼行善利人濟物兼之慕仙好道整千貫價佈施若遇個雲游道士方外全真叩留至家中供養學些丹術講些內養誰想那班人都是走方光棍一味說騙錢財何曾有真實學問枉自費過若干東西便是戲法討不得一個然雖如此他這點精誠終是不改每日焚香打坐養性存心有出世之念其年恰好齊頭七十那些子孫們兩月前便在那裡商議說道七十古稀之年是人生最難得的須不比平常誕日各要尋幾件希奇禮物上壽祝他個長春不老李清也料道子孫輩必然如此預先設下酒席分著一支一支的次第請來赴宴因對眾人說賴得你等勤力各能生活每年送我禮物積至近萬衣裝器具華侈極矣只是我平生好道布衣蔬食垂五十年要這般華侈的東西也無用處我因不好拂你等盛情所以有受無卻然而一向貯在土庫未嘗檢閱多分已皆朽壞了費你等錢帛做我的糞土豈不可惜今日幸得天曹尚未錄我魂氣生日將到料你等必然經營慶生之禮甚非我的本意所以先期相告切莫為此子孫輩皆道慶生的禮自古叫做續壽況兼七十歲人生能有幾次若不慶賀何以少展卑下孝順之心這可是少得的李清道既你等主意難奪只憑我所要的將來送我何如子孫輩欣然道願聞尊命李清道我要生日前十日各將手指大麻繩百尺送我總算起來約有五六萬丈以此續壽豈不更為長遠眾人聞聲暗暗稱怪齊問道太公分付敢不奉命但不知要他做甚李清笑道且待你等都送齊了然後使你等知之今猶未可輕言也眾子孫領了李清分付之後真個一傳十十傳百都將麻繩百尺趕在生日前交納地上疊得高高的竟成一座繩山只是不知他要這許多繩何用原來離著青州城南十里有一座山叫做雲門山山頂上分做兩個儼如斧劈開的青州城里人家但是向南的無不看見這山飛雲度鳥窳兒內經過皆歷歷可數俗人又稱為劈山那山頂中間卻有個大穴澒澒洞洞的不知多少深也有好事的把大石塊投下從不曾聽見些聲響以此人都道是沒底的只見李清受了麻繩之後便差人到那山上緊靠著穴口豎起兩個大橛子架上轆轤家裡又喚打竹家火的做一個結結實實的大竹籃又到銅鋪裡買上大小銅鈴好幾百個也不知道弄出什麼勾當子孫輩一齊的都來請問李清方纔答道我元說終使你等知之難道我就瞞著去了我自幼好道今經五十餘年一無所得常見圖經載那雲門山是神仙第七個洞府我年已七十便活在世上也不過兩三年了趁今手足尚還強健欲於生日這一日借你等所送的麻繩用著四根懸在大竹籃四角中間另是一根係上銅鈴待我坐於籃內卻慢慢的絞下若有些不虞去處見我搖動中間這繩或聽見鈴響便好將我依舊盤上萬一有緣得與神仙相遇也少不得回來報知你等說猶未畢只見子孫輩都叩頭諫道不可不可這個大穴裡面且莫說山精木魅毒蛇怪獸藏著多少只是那一道烏黑的臭氣也把人熏死了高年之人怎麼禁得這般利害李清道我意已決便死無悔你等若不容我必然私自逃去從空投下不得麻繩竹籃永無出來的日子內中也有老成的曉得他生平是個執性的人便道恭敬不如從命只是這等天大的事豈可悄然便去須要遍告親戚同赴雲門山相送也使四海流傳做個美談不亦可乎李清道這卻使得那李家一姓子孫原有五六千又去通知親眷同來拜送只算一人一個卻不就是上萬的人了到得李清生辰這一日無不陳了鼓樂攜了酒饌一齊的捧著李清竟往雲門山去隨著去看的人也不知有多少幾乎把青州城都出空了不一時到了雲門山頂眾人舉目四下一望果然好景但見眾峰朝拱列嶂環圍響泠泠流泉幽咽密葺葺亂草迷離崖邊怪樹參天岩上奇花映日山徑煙深野色過橋青靄近岡形勢遠松聲隔水白雲連淅淅但聞林墜露蕭蕭只聽葉吟風那竹籃繩索等件俱已整備停當眾親眷們都更遞的上前奉酒內中也有一樣高年的說道老親家你好道之心這般決烈必然是神仙路上人此去保無他慮但我等做事也要老成方無後悔我想這等黑洞洞深穴從來沒人下去怎把千金之體輕投不測今日既有竹籃繩索不若先取一個狗來放下去看若是這狗無事再把一個伶俐些家人下去看道有甚麼仙跡在那裡待他上來說了方纔送老親家下去豈不萬全李清笑道承教承教只是要求道的長拚個死纔得神仙可憐或肯收為弟子這個穴內相傳是神仙第七洞府又不比砒霜毒藥怎麼要試他利害似此疑惑便是退悔道心怎能勾超凡脫濁我主意已定好歹自下去走遭不消列位高親擔懮老漢信口謅得四句俚言在此留別望勿見笑眾親眷齊道願聞珠玉李清隨念出一首詩來詩云久拚殘命已如無揮手雲門願不孤翻笑壺公曾得道猶煩市上有懸壺眾人聽了這詩無不點頭嗟嘆勉強解慰道老親家道心恁般堅固但願一下去便得逢仙李清道多謝列位祈祝且看老漢緣法何如遂起來向空拜了兩拜便去坐在竹籃內揮手與眾親眷子孫輩作別再也不說甚話一徑的把麻繩轣轣轢轢放將下去莫說眾親眷子孫輩都一個個面色如土連那看的人也驚呆了搖頭咋舌道這老兒好端端在家受用到不好卻癡心妄想往恁樣深穴中去求仙可不是討死吃麼噫李清這番下去了不知幾時纔出世哩正是神仙本是凡人做只為凡人不肯修卻說李清放下也不知有幾千多丈覺得到了底上便爬出竹籃去看那裡面有何仙跡豈知穴底黑洞洞的只是不見一些高低況是地下有水一般又滑又爛還不曾走得一步早跌上一交那七十歲老人家有甚氣力纔掙得起又閃上一跌只兩交就把李清跌得昏暈了去那上面親眷子孫輩看看日色傍晚又不見中間的麻繩曳動又不聽得銅鈴響都猜著道這老人家被那股陰濕的臭氣相觸多分不保了且把轆轤絞上竹籃看時只見一個空籃不見了李清其時就著了忙只得又把竹籃放下守了一會再絞上來依舊是個空籃那伙看的人也有嗟嘆的也有發笑的都一哄走了子孫輩向著穴口放聲大哭埋怨道我們苦苦諫阻只不肯聽偏要下去七十之人不為壽夭只是死便死了也留個骸骨等我們好辦棺槨葬他如今弄得屍首都沒了這事怎處那親眷們人人哀感無不灑淚內中也有達者說道人之生死無非大數今日生辰就是他數盡之日便留在家裡也少不得是死的況他志向如此縱死已遂其志當無所悔雖然沒了屍首他衣冠是有的不若今晚且回去明早請幾個有法力的道士重到這裡招他魂去只將衣冠埋葬也是古人一個葬法我聞軒轅皇帝得了大道已在鼎湖昇天去了還留下一把劍兩隻履裝在棺內葬於橋山又安知這老翁不做了神仙也要教我們與他做個空冢只管對著穴口啼啼哭哭豈不惑哉子孫輩只得依允拭了眼淚收拾回家到明日重來山頂招魂回去一般的設座停棺少不得諸親眾眷都來祭奠過了七七四十九日造墳下葬不在話下且說李清被這兩跌暈去好幾時方纔醒得轉來又去細細的摸看原來這穴底也不多大只有一丈來闊周圍都是石壁別無甚奇異之處況且腳下爛泥又滑得緊不能舉步只得仍舊去尋那竹籃坐下思量曳動繩索搖響銅鈴待他們再絞上去伸手遍地摸著已不見了竹籃叫又叫不應飛又飛不去真個來時有路去日無門教李清怎麼處置只得盤膝兒坐在地下也不知捱了幾日但覺飢渴得緊一時難過想道古人嚙雪吞氈尚且救了性命這裡無雪無氈只有爛泥在手頭便去抓一把來咽下豈知神仙窟宅每遇三千年纔一開底裡迸出泥來叫做青泥專是把與仙人做飯吃的盡也有些味道可解飢渴吃了幾口覺得精神好些卻又去細細摸看只見石壁擦底下又有個小穴高不上二尺心下想道只管坐在泥中有何了期左右沒命的人了便這裡面有甚麼毒蛇妖怪也顧不得且是爬將進去看個下落只因這番直教黑茫茫斷頭之路另見個境界風光活喇喇拚命之夫重開個鋪行生理正是閻王未注今朝死山穴寧無別道通李清不顧性命鑽進小穴裡去約莫的爬了六七里覺得裡面漸漸高了二尺來多左右是立不直的只是爬著地走那老人家也知天曉日暗倦時就睡上一覺飢時就把青泥吃上幾口又爬了二十餘裡只見前面透出星也似一點亮光想道且喜已有出路了再把青泥吃些打起精神一鑽鑽向前去出了穴口但見青的山綠的水又是一個境界李清起來伸一伸腰站一站腳整衣拂履望空謝道慚愧今朝脫得這一場大難依著大路走上十四五里腹中漸漸飢餒路上又沒一個人家賣得飯吃總有得買腰邊也沒錢鈔穴裡的青泥又不曾帶得些出來看看走不動了只見路傍碧靛青的流水兩岸覆著菊花且去捧些水吃豈知這水也不是容易吃的仙家叫做菊泉最能延年卻病那李清纔吃得幾口便覺神清氣爽手腳都輕快了又走上十多裡忽望見樹頂露出琉璃瓦蓋造的屋脊金碧閃爍不知甚麼所在飛捻的趕到那裡去看卻是座血紅的觀門周圍都是白玉石砌就臺基共有九層每一層約有一丈多高又沒個階坡只得攀藤捫葛拚命吊將上去那門兒又閉著不敢擅自去扣只得屏氣而待直等到一佛出世二佛昇天方纔有個青衣童子開門出來喝道李清你來此怎麼李清連忙伏地叩頭稱道青州染匠李清不揣凡庸冒叩洞府伏乞收為弟子生死難忘那童子笑道我怎好收留得你且引你進去懇求我主人便了那青衣童子入去不久便出來引李清進去到玉墀之下仰看壁上華麗如天宮一般端的好去處但見朱甍耀日碧瓦標霞起百尺琉璃寶殿九層白玉瑤臺隱隱雕梁鐫玳瑁行行繡柱嵌珊瑚琳宮貝闕飛檐長接彩雲浮玉宇瓊樓畫棟每含蒼霧宿曲曲欄干圍瑪瑙深深簾幕掛珍珠青鸞玄鶴雙雙舞白鹿丹麟對對游野外千花開爛熳林間百鳥囀清幽李清去那殿中看時只見正居中坐著一位仙長頭戴碧玉蓮冠身披縷金羽衣腰系黃絛足穿朱舄手中執著如意有神游八極之表東西兩傍每邊又坐著四位一個個仙風道骨服色不一滿殿祥雲繚繞香氣氤氳真個萬籟無聲一塵不到好生嚴肅李清上前逐位叩了頭依舊將這冒死投見的情節表訴一遍只見中間的仙長說道李清你未該來此怎麼就擅自投到我這裡沒有你的坐位快回去罷李清便涕泣稟道我李清一生好道不曾有些兒效驗今日幸得到了仙宮面見仙長豈肯空手回去我已是七十歲的人左右回去也沒多幾時活難道還再來得成情願死便死在階下斷然不回去了那仙長只是搖頭不允卻得旁邊的替他稟道雖則李清未該到此但他一片虔誠亦自可憐我今若不留他只道神仙到底修不得的了況我法門中本以度人為第一功德姑且收留門下若是不堪受教再遣他回去亦未遲也那仙長纔點著頭道也罷也罷姑容他在西邊耳房暫住李清連忙拜謝一頭走到耳房裡去一頭想道我若沒有些道氣怎得做仙家弟子只是當初曾與子孫們約道遇得仙時少不得給假回去報知你等今我再三哀稟又得傍邊這幾位仙長相勸纔許收留怎麼又請回去萬一觸忤了他瞋責我塵緣未淨如何是好且自安心靜坐再過幾時另作區處那李清走到西邊耳房下尚未坐定只見一個老者從門外進來稟道蓬萊山霞明觀丁尊師初到西王母特啟瑤池大宴請群真同赴並不見有人陳設早已幾乘鶴駕鸞車齊齊整整擺列殿下其時中間的仙長在前兩傍的八位在後次第步出殿來那李清也免不得隨著那伙青衣童子在丹墀裡候送只見仙長覷著李清分付道你在此若要觀山玩水任意無拘惟有北窗最是輕易開不得的謹記謹記說罷各各跨上鸞鶴騰空而起自然有雲霞擁護簫管喧闐這也不能備述豈知李清在耳房下憑窗眺望看見三面景致幽禽怪鳥四時有不絕之音異草奇花八節有長春之色真個觀之不足玩之有餘漸漸轉過身來只見北窗斜掩想道既是三面都好看得怎麼偏生一個北窗卻看不得必定有甚奇異之處故不把與我看如今仙長已去赴會不知多少程途未必就回且待我悄悄的開來看看仙家那裡便知道了走上前輕輕把手一推呀的一聲那窗早已開了舉目仔細一觀有恁般作怪的事一座青州城正臨在北窗之下見州里人家歷歷在目又見所住高房大宅漸已殘毀近族傍支漸已零落不勝慨嘆道怎麼我出來得這幾日家裡便是這等一個模樣了俗語道得好家無主屋倒柱我若早知如此就不到得這裡也罷何苦使我子孫恁般不成器壞了我的門風不覺歸心頓然而起豈知嘆聲未畢眾仙長已早回來了只聽得殿上大叫李清李清那李清連忙掩上北窗走到階下中間的仙長大怒道我分付你不許偷開北窗你怎麼違命擅自開了又嗟嘆懊悔思量回去我所以不肯收留者正為你塵心不斷故也今日如何還容得你在此便可速回無得溷我洞府那李清無言可答只是叩頭請罪哀告道我來時不知吃了多少苦楚真個性命是毫厘絲忽上掙來的如今回去休說竹籃繩索已被家里人絞上就是這三十多裡小小穴道中我老人家怎麼還爬得過仙長笑道這不必懮慮我另有個路徑教人指引你出去那李清方纔放下了這條肚腸起來拜謝出門只見東手頭一位向著仙長不知說甚話仙長便喚李清你且轉來李清想道一定的又似前番相勸收留我了不勝欣然急急走轉去跪下聽候法旨你道那仙長喚李清回來說些甚麼說道我遣便遣你回去只是你沒個生理何以度日我書架上有的是書你可隨意取一本去若是要覓衣飯只看這書上自然有了李清口裡答應心裡想道原來仙長也只曉得這裡的事不曉得我青州郡裡的事我本有萬金家計就是子孫輩連年送的生日禮物也有好幾千怎麼剛出來得這兩日便回去沒有飯吃了只是難得他一片好意不免走近書架上取了一本最薄的過去拜謝那仙長問道書有了麼李清道有了仙長道既有了書去罷李清正待出門只見西手頭一位向著仙長也不知說甚話那仙長把頭一點又叫道李清你且轉來李清想道難道這一番不是勸他收留我的豈知仍舊不是只見仙長道你回去也要走好些路纔到得家裡便到了家裡也不能勾就有飯吃你可吃飽了去早有童子拿出兩個大芋頭來遞與李清吃原來是煮熟的鵝卵石就似芋頭一般軟軟的嫩嫩的又香又甜比著雲門穴底的青泥越加好吃再走過去拜謝那仙長道李清你此去也只消七十多年還該到這裡的但是青州一郡多少小兒的性命都還在你身上你可廣行方便休得墮落我有四句偈語把與你一生受用你緊記著偈云見石而行聽簡而問傍金而居先裴而遁李清再拜受了這偈語卻教初來時元引進的童子送他回去竟不知又走出個甚的路徑來總便不消得萬丈麻繩難道也沒有一些險處原來那童子指引的路徑全不是舊時來的去處卻繞著這一所仙院倒轉向背後山坡上去只見一個所在出得好白石頭有許多人在那裡打他李清問道仙家要這石頭何用童子道這個是白玉因為早晚又有一個尊師該來故此差人打去要做第十把交椅李清便問道這個尊師是甚麼名姓童子道連我們也只聽得是這等說怎麼知道便知道也不好說得恐怕泄漏天機被主人見罪一頭說一頭走也行了十四五里都是龜背大路兩傍參天的古樹間著奇花異卉看不盡的景致便再走兩裡也不覺的又走過一座高山這路徑漸漸僻小童子把手指道此去不上十里就是青州北門了李清道我前日來時是出南門的怎麼今日卻進北門我生長在青州已七十歲了那曉得這座雲門山是環著州城的可知道開了北窗便直看見青州城裡但不知那一邊是前路那一邊是後路可指示我待我日後再來叩見仙長只打這條路上來卻不省費許多麻繩吊去雲門穴裡去問未絕口豈知颼颼的一陣風起托地跳出一個大蟲來向著李清便撲驚得李清魂膽俱喪叫聲苦也望後便倒嚇死在地可憐身名未得登仙府支體先歸虎腹中說話的我且問你嘗聞得古老傳說那青泥白石乃仙家糧糗凡人急切難遇若有緣的嘗一嘗便疾病不能侵妖怪不能近虎狼不能傷這李清兩件既已都曾飽食況又在洞府中住過雖則道心不堅打發回去卻又原許他七十年後還歸洞府分明是神仙了如何卻送在大蟲口裡看官們莫要性急待在下慢慢表白出來那大蟲不是平常吃人的虎乃是個神虎專與仙家看山守門的是那童子故意差來把李清驚嚇只教他迷了來路元非傷了性命那李清死去半晌漸漸的醒轉來口裡只叫救命救命慢慢掙扎坐起看時大蟲已是不見連青衣童子也不知去向跌足道罷了罷了這童子一定被大蟲馱去吃了可憐可憐卻又想道那童子是侍從仙長的料必也有些仙氣大蟲如何敢去傷他決無此理只是因甚不送我到家半路就撇了去心下好生疑惑爬將起來把衣服整頓好了忽地回頭觀看又吃了一驚怎麼那來路一剗都是高山陡壁全無路徑連稱奇怪奇怪口裡便說心中只怕又跳出一個大蟲來卻不喪了這條老命且自負命跑去約莫走上四五里卻是三叉路口又沒一個行人來往可以問信看看日色傍晚萬一走差路頭怎了正在沒擺佈處猛然看見一條路上卻有塊老大的石頭支出在那裡因而悟道仙長傳授我的偈語有句道見石而行卻不是教我往這條路去果然又走上四五里早是青州北門了進了城門覺得街道還略略可認只是兩邊的屋宇全比往時不同莫測其故欲要問人偏生又不遇著一個熟的漸漸天色又黑只得趕回家去豈知家裡房子也都改換卻另起了大門樓兩邊八字牆好不雄壯李清暗道莫非錯走到州前來了仔細再看像便像個衙門端只是我家裡難道這等改換了我便認不得想我離家去只在雲門穴裡不知擔擱了幾日也是有數的後面鑽出小穴來總是今日這一日怎麼便有這許多差異的事莫非州裡見我不在就把我家房子白白的佔做衙門可道凡事也不問個主只可惜今日晚了拚到明日打進狀詞與他理會隨你官府也少不得給官價還我只得尋個客店安歇爭奈身邊一個錢也沒有不免解件衣服下來換了一貫錢還覺腹中是飽的只買一角酒來吃了便待去睡終久心下徨這夜如何睡得著李清在床上翻來覆去自嗟自嘆悔道我怎麼倒去抱怨仙長他明明說我回去將何度日教我取書一本別做生理又道是我回去就也未有飯吃把兩個煮熟的石子與我豈不是預知已有今日了便去袖裡把書一摸且喜得尚在只如今未有工夫去看待到天明還了房錢便遍著青州大街上都走轉來莫說眾親眷子孫沒有一個連那染坊鋪面也沒一間留下的只得陪個小心逢人便問豈知個個搖頭人人努嘴都說道我們並不知道有甚李清也並不曾見說雲門山穴裡有人下去得的只教李清茫然莫知所以看看天晚只得又向客店中安歇到第二日又向小巷兒裡東抄西轉也不曾遇著一個但是問人都與大街上說話一般一發把李清弄呆了想道我也怪前日出來的路徑有些差異莫非這座青州城是新建的不是我舊青州故此沒個熟人相遇天下雲門山只有一個絕無兩個我何不出了南門徑到雲門山上一看若雲門山無異這便是我舊青州了再慢慢的訪問好歹究出甚的緣故來忙忙的奔出南門徑住雲門山去將至山頂早見一座亭子想道這路徑明明是雲門山的幾時有個亭子在這裡且待我看是甚麼亭原來題著爛繩亭開皇四年立李清道是了昔日樵夫曾遇見仙人下棋他看得一局棋完不知已過了多少年歲這斧柄坐在身下已爛壞了至今世人傳說爛柯的故事多分是我眾子孫道我將這麻繩吊下雲門穴底也去遇了神仙把繩都爛掉在山上故建立這座亭子名為爛繩亭無非要四方流傳做個美談的意思看他後面寫著開皇四年立卻不仍是今年的日月怎麼城里人家就是這等改換了且再到上邊去看只見當著穴口豎個碑石題道李清招魂處李清嚇了一跳道我現今活活的在此又不曾死要招我的魂做甚麼又想了一想道是了是了見我下到這般險處提起竹籃上來又不見了我疑心道死了故在此招我的魂回去又想一想道咦莫非是我真個死了今日是魂靈到此心下反徨起來不能自決想道既是招魂必有個葬處若是葬必在祖塋左右人家雖有改換之日祖宗墳墓卻千年不改換的何不再去祖墳上一看或者倒有個明白下了雲門山一徑的轉過東門遠遠望見祖墳上山勢活似一條青龍從天上飛將下來的想起葬經上面有云山如鳳舉或似龍蟠一千年後當出仙官看我家祖墳有這等風水怎麼剛出得我一個纔遇見仙人又被趕逐回家焉能勾昇天日子卻不知這風水畢竟應在那個身上到了祖墳不免拜了兩拜只見許多合抱的青松白楊盡被人伐去墳上的碑石也有推倒的也有打斷的全不似舊時模樣不勝淒感嘆道我家眾子孫真個都死斷了就沒一個來到墳上照管單有一個碑倒還是豎著的碑上字跡仿佛可認乃是故道士李清之墓七個字李清道既是招魂葬無過把些衣冠埋在裡面料必是個空冢只是碑石已被苔蘚駁蝕幾盡須不是開皇四年立的可知我死已多時了今日來家的一定是我魂靈故此幽冥間隔眾親眷子孫都不得與我相見不然這上千上萬的人怎麼就沒一個在的那李清滿肚子疑心只當青天白日做夢一般又不知是生又不知是死教我那裡去問個明白正在徨之際忽聽得隱隱的漁鼓簡響走去看時卻是東嶽廟前一個瞎老兒在那裡唱道情聚著人掠錢方纔想起臨出山時仙長傳授我的偈語第二句道聽簡而問這個不是漁鼓簡我該問他的且自站在一邊待眾人散後過去問他便了只見那瞎老兒止掠得十來文錢便沒人肯出內中一個道先生你且說唱起來待我們斂足與你瞽者道不成不成我是個瞎子倘說完了都一溜走開那裡來尋討眾人道豈有此理你是個殘疾人哄了你也不當人子那瞽者聽信眾人遂敲動漁鼓簡板先念出四句詩來道暑往寒來春復秋夕陽橋下水東流將軍戰馬今何在野草閑花滿地愁念了這四句詩次第敷衍正傳乃是莊子嘆骷髏一段話文又是道家故事正合了李清之意李清擠近一步側耳而聽只見那瞽者說一回唱一回正嘆到骷髏皮生肉長復命回陽在地下直跳將起來那些人也有笑的也有嗟嘆的卻好是個半本瞽者就住了鼓簡待掠錢足了方纔又說此乃是說平話的常規誰知眾人聽話時一團高興到出錢時面面相覷都不肯出手又有身邊沒錢的假意說幾句冷話佯佯的走開去了剛剛又只掠得五文錢那掠錢的人心中焦躁發起喉急將眾人亂罵內中有一後生出尖攬事就與那掠錢的爭嚷起來一遞一句你不謙我不讓便要上交廝打把前後掠的十五文錢撒做一地眾人發聲喊都走了有幾個不走的且去勸廝打單撇著瞽者一人李清動了個惻隱之心一頭在地上撿起那十五文錢交付與瞽者一頭口裡嘆道世情如此磽薄錢財恁般珍重瞽者接錢在手聞其嘆語問道你是兀誰李清道老漢是問信的你若曉得些根由到送你幾十文酒錢瞽者道問甚麼信李清道這青州城內有個做染匠的李家你可曉得麼瞽者道在下正姓李敢問老翁高姓大名李清道我叫做李清今年七十歲了瞽者笑道你怎麼欺我瞎子就要討我的便宜我也不是個小夥子年紀倒比你長些今年七十六歲了只我嫡堂的叔曾祖叫做李清你怎麼也叫做李清李清見他說話有些來歷便改著口道天下盡有同名同姓的豈敢討你的便宜我且問你那令曾叔祖如今到那去了瞽者道這說話長哩直在隋文帝開皇四年我那叔曾祖也是七十歲要到雲門山穴裡訪甚麼神仙洞府整下了許多麻繩一吊吊將下去你道這個穴裡可是下去得的自然死了原來我家合族全仗他一個的福力自他死後家事都就零落況又遭著兵火遂把我合族子孫都滅盡了單留得我一個現世報還在這裡卻又無男無女靠唱道情度日李清暗忖道元來錯認我死在雲門山穴裡了又問道他吊下雲門穴去也只一年裡面怎麼家事就這等零落得快合族的人也這等死滅得盡瞽者道哎呀敢是你老翁說夢哩如今須不是開皇四年是大唐朝高宗皇帝永徽五年了隋文帝坐了二十四年天下傳與煬帝也做了十四年被宇文化及謀殺了因此天下大亂卻是唐太宗打了天下又讓與父親做皇帝叫做高祖坐了九年太宗自家坐了二十三年如今皇帝就是太宗的太子又登基五年了從開皇四年算起共是七十二年我那叔曾祖去世時節我只有得五歲如今現活七十六歲了你還說道快哩李清又道聞得李家族裡有五六千丁便隔得七十二年也不該就都死滅只剩得你一個瞽者道老翁你怎知這個緣故只因我族里人都也有些本事會光著手賺得錢的不料隋煬帝死後有個王世充造反到我青州看見我家族裡人丁精壯盡皆拿去當軍那王世充又十分不濟屢戰屢敗遂把手下軍馬都消折了我那時若不虧著是個帶殘疾的也留不到今日李清聽了這一篇說話如夢初覺如醉方醒把一肚子疑心纔得明白身邊只有三四十文錢盡數送與瞽者也不與他說明這些緣故便作別轉身再進青州城來一路想道古詩有云山中方七日世上已千年果然有這等異事我從開皇四年吊下雲門穴去往還能得幾日豈知又是唐高宗永徽五年相隔七十二年了人世光陰這樣容易過的若是我在裡面多住幾時卻不連這青州城也沒有了如今我的子孫已都做故人自己住的高房大屋大皆屬了別姓這也不必說起只是我身邊沒有半分錢鈔眼前又別無熟識可以那借教我把甚麼度日左右也是個死那仙長何苦定要趕我回來怎的嘆了幾聲想了一會猛然省道我李清這般懵懂怎麼思量還要做仙哩我臨出門時仙長明明說我回家來怕沒飯吃曾教我到他書架上拿本書去如今現在袖裡何不取出書來看道另做甚麼生意你道這本書是甚麼書原來是本醫書專治小兒的病癥也不多幾個方子在上面那李清看見方纔悟道仙長曾對我說此去不消七十多年依舊容我來到那裡我想這七十年非比雲門穴底下須在人世上好幾時不是容易過的況我老人家從來藥材行裡不曾著腳怎便莽莽廣廣的要去行醫且又沒些本錢置辦藥料不如到藥鋪裡尋個老成人與他商量好做理會剛剛走得三百餘步就有一個白粉招牌上寫著道積祖金鋪出賣川廣道地生熟藥材當下李清看見便大喜道仙長傳授我的第三句偈語說道傍金而居這不是姓金的了世稱神仙未卜先知豈不信哉豈不信哉只見鋪中坐的還不上二十多歲叫做金大郎李清連忙向前與他唱個喏問道你這藥材還是現賣也肯賒賣金大郎道別人家買藥的就要現錢纔賣只有行醫開鋪的是長久主顧但要藥料只上個帳簿取去或一季或一月一算總數還錢叫做半賒半現李清便扯個謊道我原是個幼科醫人一向背著包沿村走的如今年紀老了也要開個鋪面坐地行醫不知那裡有空房可以賃住乞賜指引也好與貴鋪做個主顧金大郎道就是我家隔壁有一間空房不見門上貼著招賃兩字麼只怕窄狹不彀居住李清道我老身別無家小便一間也盡勾了只是鋪前須要豎面招牌鋪內須要藥箱藥刀各色家夥方纔像個行醫的這幾件都在那裡去置辦不知可也賒得否金大郎道我鋪裡盡有現成餘下的在此我一發都借了你去待生意興旺時連那藥帳一總算還與我豈不兩得其便那李清虧得金大郎一力周旋就在他藥鋪間壁住下想起當初在雲門山上與親族告別之時曾有詩云翻笑壺公曾得道猶煩市上有懸壺不意今日回來又要行醫卻不應了兩句讖語遂在門前橫吊起一面小牌寫著懸壺處三個字直豎起一面大牌寫著李氏專醫小兒疑難雜癥十個字鋪內一應什物家夥無不完備真個裝一佛像一佛自然像個專門的太醫起來恰好這一年青州城裡不論大小人家都害時行天氣叫做小兒瘟但沾著的便死那幼科就沒請處連大方脈的也請了去豈知這病偏生利害隨你有名先生下的藥只當投在水裡眼睜睜都看他死了只有李清這老兒古怪不消自到病人家裡切脈看病只要說個癥候怎生模樣便信手撮上一帖藥也不論這藥料有貴有賤也不論見效不見效但是一帖要一百個錢若討他兩帖的便道我的藥怎麼還用兩帖情願退還了錢連這一帖也不發了那討藥的人都也半信半不信無奈病勢危急只得也贖一帖回去吃看你道有這等妙藥纔到得小兒口裡病就好一半一咽咽下肚裡去便全然好了還有拿得藥回去小兒已是死了的但要煎的藥香沖在那小兒鼻孔內就醒將轉來這名頭就滿城傳遍都稱他做李一帖從此後也不知醫好了多少小兒也不知賺過了多少錢鈔我想李清是個單身子日逐用度有限除算還了房錢藥錢和那什物家夥錢以外贏餘的難道似平時積攢生日禮一般都爛掉在家裡畢竟有個來處也有個去處原來李清這一次回來大不似當初性子有積無散除還了金大郎鋪內賒下各色家夥併生熟藥料的錢其餘只勾了日逐用度盡數將來賑濟貧乏略不留難這叫做廣行方便無量功德以此聲名越加傳播莫說青州一郡遍齊魯地方但是要做醫的聞得李一帖名頭那一個不來拜從門下希圖學些方術只見李清再不看甚醫書又不親到病人家裡診脈凡遇討藥人來收了銅錢便撮上一帖藥又不多幾樣藥味也有說來病癥是一樣的倒與他各樣的藥也有說來病癥是各樣的倒與他一樣藥但見拿藥去吃的無有不效眾皆茫然莫測其故只得覓個空間小心請教李清道你等疑我不曾看脈就要下藥不知醫道中本以望聞問切目為神聖工巧可見看脈是醫家第四等不是上等況小兒科與大方脈不同他氣血未全有何脈息可以看得總之醫者意也無過要心下明指下明把一個意思揣摩將去怎麼靠得死方子就好療病你等但看我的下藥便當想我所以下藥的意思那大觀本草這部書卻不出在我山東的你等熟讀本草先知了藥性纔好用藥上者要看本年是甚司天就與他分個溫涼二者看害病的是那地方人就與他分個燥濕三者看是甚等樣人家富貴的人多分柔脆貧賤的人多分堅強就與他分個消補細細的問了癥候該用何等藥味然後出些巧思按著君臣佐使加減成方自然藥與病合病隨藥去所以古人將用藥比之用兵全在用得藥當不在藥多趙括徒讀父書終致敗滅此其鑒也眾等皆拜謝教而退豈知李清身邊自有薄薄的一本仙書怎肯輕易泄漏正是小兒有命終須救老子無書把甚看李清自唐高宗永徽五年行醫開鋪起真個光陰迅速不覺過了第六年又是顯慶五年龍朔三年麟德二年乾封二年總章二年咸亨四年上元二年儀鳳三年調露一年永隆一年開耀一年一總共是二十七年了這一年卻是永淳元年忽然有個詔書下來說御駕親幸泰山要修漢武帝封禪的故事你道如何叫做封禪只為天下五座名山稱做五嶽五嶽之中無如泰山尤為靈秀上通於天雲雨皆從此出故有得道的皇帝遇著天下太平風調雨順親到泰山頂上祭祀嶽神刻下一篇紀功德的頌告成天地那碑上刻的字都是赤金填的叫做金書碑外又有個白玉石的套子叫做玉檢最是朝廷盛舉那天帝是不好欺的頌上略有些不實便起怪風暴雨不能終事這也不是漢武帝一個創起的直從大禹以前就有七十九代都曾封禪後來只有秦始皇和漢武帝兩個這怎叫得有道之君無非要粉飾太平侈人觀聽畢竟秦始皇遇著大雨只得躲避松樹底下漢武帝下山也被傷了左足故此武帝之後再沒有敢去封禪的那唐高宗這次詔書已是第三次了青州地方正是上泰山的必由去處刺史官接了詔不免點起排門夫填街砌路迎候聖駕那李清既有鋪面便也編在人夫數內催去著役其時青州自有了李清行醫羞得那幼科先生都關了鋪門再沒個敢出頭的若教他去做夫砌路萬一小兒們有個急病一時怎麼就請得他到討得藥吃因此合郡的人都到州裡去替他稟脫少不得推幾個能言會語的做頭向前稟道現今行醫的李清已是九十七歲近百的人有甚麼氣力當夫我們情願替他出錢另僱精壯少年應役仍留他在鋪裡也好保全我一州的小兒性命原來李清開鋪這一年依還說是七十歲因此人只認他九十七歲那知他已是一百六十八歲了從來律上凡七十以上的即系是年老准免差役所以合郡的人借這個名色要與他僱工替役仍留他在鋪行醫豈知州刺史是嶺南人他那地方最是信巫不信醫的說道雖然李清已有九十七歲想他筋力強健盡好做工怎麼手裡撮得藥偏修不得路不見姜太公八十二歲還要輔佐周武王興兵上陣既做了朝廷的百姓死也則索要做躲避到那裡去總便他會醫小兒難道偌大一坐青州只有他幼科一個查他開鋪以來只得二十七年以前的青州人家小兒也不曾見都死絕了怎麼獨獨除下他一個名字何以服眾隨他合郡的人再三苦稟只是不聽急得那許多人就沒個處置都走到李清鋪前商議要央個緊要的分上再去與州官說李清道多謝列位盛情以我老朽看來到不去說也罷你道一些小事有何難聽那州官這等拘執無過慮著聖駕親來非尋常上司之比少有不當便是砍頭的罪過故此只要正身著役恐怕僱工的做出事來以後不好查究做官的肚腸大概如此斷然不肯再聽人說但我揣度事勢這詔書也多分要停止的在麟德二年一次調露元年又一次如今卻是第三次既是前兩次不來難道這一次又來得成包你五日裡面就有決裂不若且放下膽憑他怎生樣差撥便了眾人聽了這篇說話都怪道眼見得州裡早晚就要僉了牌分了路數押夫著役如火急一般那老兒倒說得冰也似冷若是詔書一日不停止怕你一日不做夫我們倒思量與他央個分上保求頂替他偏生自要去當想是在鋪裡收錢不迭只要到州裡去領他二分一日的工食哩都冷笑一聲各自散去豈知高宗皇帝這一次已是決意要到泰山封禪詔下禮部官草定了一應儀注只待擇個黃道吉日御駕啟行忽然患了個痿痺的癥候兩隻腳都站不起來怎麼還去行得這等大禮因此青州上司隔不得三日之內移文下來將前詔停止那合郡的人方信李清神見越加嘆服原來山東地面方術之士最多自秦始皇好道遣徐福載了五百個童男童女到蓬萊山采不死之藥那徐福就是齊人後來漢武帝也好道拜李少君為文成將軍欒大為五利將軍日逐在通天台竹宮桂館祈求神仙下降那少君欒大也是齊人所以世代相傳常有此輩一向看見李清自七十歲開醫鋪起過了二十七年已是近百的人再不見他添了一些兒老態反覺得精神顏色越越強壯都猜是有內養的如今又見他預知過往未來之事一定是得道之人與董奉韓康一般隱名賣藥因此那些方士紛紛然都來拜從門下參玄訪道希圖窺他底蘊屢屢叩問李清求傳大道李清只推著老朽元沒甚知覺唯有三十歲起便絕了欲萬事都不營心圖個靜養而已所以一向沒病沒痛或者在此方士們疑他隱諱不肯輕泄卻又問道壽便養得那過去未來之事須不是容易曉得的不知老師有何法術就預期五日內當有停止詔書消息李清道我那裡真是活神仙能未卜先知的人豈不知孔夫子萍實商羊故事只是平日裡聽得童謠揣度將去偶然符合蓋因童謠出於無心最是天地間一點靈機所以有心的試他無有不驗我從永徽五年在此開醫鋪起聽見龍朔年間就有個童謠料你等也該記得的那童謠上說道上泰山高高幾層不怕上不得到怕不得登三度徵兵馬旁道打騰騰三度去登不得果然前兩度已驗故知今次斷無登理大抵老人家聞見多經驗多也無過因此識彼難道有甚的法術不成這方士們見他不肯說又常是收錢撮藥忙忙的沒個閑暇還有那伙要賑濟的來打攪以此漸漸的也散去了明年高宗皇帝晏駕卻是武則天皇后臨朝坐了二十一年纔是太子中宗皇帝坐了六年又被韋皇后謀亂卻是叡宗皇帝除了韋後也坐了六年傳位玄宗皇帝初年叫做開元不覺又過了九年總共四十三年滿青州城都曉得李清已是一百四十歲一來見他醫藥神效如舊二來容顏不老也如舊日雖或不是得道神仙也是個高年人瑞因此學醫的學道的還有真實信他的只在門下不肯散去正是神仙原在閻浮界骨肉還須夙世成話分兩頭卻說玄宗天子也志慕神仙尊崇道教拜著兩個天師一個葉法善一個邢和璞皆是得道的專為天子訪求異人傳授玄素赤黃及還嬰溯流之事這一年卻是開元九年邢葉二天師奏道現有三個真仙在世一個叫做張果是恆州條山人一個叫做羅公遠是鄂州人一個叫做李清是北海人雖然在煙霞之外無意世上榮華若是朝廷虔心遣使聘他或者肯降體而來也未可知因此玄宗天子差中書舍人徐嶠去聘張果太常博士崔仲芳去聘羅公遠通事舍人裴晤聘李清三個使臣辭朝別聖捧著璽書各自去徵聘不提原來李清塵世限滿功行已圓自然神性靈通早已知裴舍人早晚將到省起昔日仙長分付的偈語第四句說道先裴而遁這個遁字是逃遁之遁難道叫我逃走不成明明是該屍解去了你道怎麼叫做屍解從來仙家成道之日少不得該離人世有一樣白日飛昇的謂之羽化有一樣也似世人一般死了的只是棺中到底沒有屍骸這為之屍解惟有屍解這門最是不同隨他五行皆可解去以此世人卻有不知道他是神仙的且說李清一個早起教門生等休掛牌面說道我今日不賣藥了只在午時就要與汝等告別眾門生齊吃一驚道師父好端端的如何說出這般沒正經話來況弟子輩久侍門下都不曾傳授得師父一毫心法怎的就去了還是再留幾時把玄妙與弟子們細講一講那時師父總然仙去道統流傳使後世也知師父是個有道之人李清笑道我也沒甚玄秘可傳也不必後人曉得今大限已至豈可強留只是隔壁金大郎又不在此可煩汝等為我買具現成棺木待我氣絕之後即便下棺把釘釘上切不可停到明日我鋪裡一應家夥什物都將來送與金大郎也見得我與他七十年老鄰老舍做主顧的意思眾門生一一領命流水去買辦棺木等件頃刻都完那金大郎也年八十九歲了筋骨亦甚強健步履如飛掙了老大家業兒孫滿堂人都叫他是金阿公只有李清還在少年時看他老起來的所以原呼他為大郎那日起五更往鄉間去了所以不在李清到了午時香湯沐浴換了新衣走入房中那些門生都緊緊跟著李清道你們且到門首去待我靜坐片時將心境清一清庶使臨期不亂問金大郎回了請來面別也不枉一向相處之情眾門生依言齊走出門就問金大郎卻還未回隔了片時進房觀看李清已是死了眾門生中也有相從久的一般痛哭流涕也有不長俊的只顧東尋西覓搜索財物亂了一回依他分付即便入棺原來這屍也有好些異外但見他一雙手兩隻腳都交在胸前如龍蟠一般怎好便放下去待要與他扯一扯直豈知是個僵屍就如一塊生鐵打成動也動不得只得將就抬入棺中釘上材蓋停在鋪裡李清是久名向知的頃刻便傳遍了半個青州城主顧人家都來吊探眾門生迎來送往一個個弄得口苦舌乾腰駝背曲有詩為證百年蹤跡混風塵一旦辭歸御白雲羽蓋霓旌何處在空留藥臼付門人卻說通事舍人裴晤一路乘傳而來早到青州境上那刺史官已是知得帥著合郡父老香燭迎接直到州堂開讀詔書卻是徵聘仙人李清刺史官茫然無知遂問眾父老父老們稟道青州地方但有個行小兒科的李清他今年一百四十歲昨日午時無病而死此外並不曾聞有甚仙人李清在那裡裴舍人見說倒吃了一驚嘆道下官受了多少跋涉賫詔到此下聘行醫的仙人李清指望敦請得入朝也叫做不辱君命偏生不遇巧剛剛的不先不後昨日死了連面也不曾得見這等無緣豈不可惜我想漢武帝時曾聞得有人修得神仙不死之藥特差中大夫去求他藥方這中大夫也是未到前適值那人死了武帝怪他去遲不曾求得藥方要殺這大夫虧著東方朔諫道那人既有不死之藥定然自己吃過不該死了既死了藥便不驗要這方也沒用武帝方悟今幸我天子神明勝於漢武縱無東方朔之諫必不至有中大夫之恐但邢葉二天師既稱他是仙人自當後天不老怎麼會死若果死就不是仙人了雖然如此一百四十歲的人無病而死便不是仙人卻也難得即便分付州官取左右鄰不扶結狀見得李清平日有何行誼怎地修行的於某年月某日時已經身死方好復命刺史不敢怠慢即喚李清左近鄰佑責令具結前來好送天使起身那些鄰舍領命出去內中一個道我們盡是後生不曉得他當初來歷詳細如何具結聞說止有金阿公是他起頭相處的必然知他始末根繇昨日往鄉間去了少不得只在今日明早便歸待他斟酌寫一張同去呈遞也好回答眾人齊稱有理同回家去恰好金老兒從鄉間歸來一個人背著一大包草頭跟著劈面遇見眾人迎住道好了金阿公回也你昨日不到鄉間去也好與你老友李太醫作別金老兒道他往那裡去要作別眾人道他昨日午時已辭世了金老兒道罪過罪過我昨日在南門遇見的怎說恁樣話咒他眾人反吃一驚道人也死了怎麼你又看見想是他的魂靈了金老兒也驚道不信有這等奇事也不回家一徑奔到李清鋪裡只見擺著靈柩眾門生一片都帶著白好些人在那裡弔問金老兒只管搖首道怪哉怪哉眾門生向前道我師父昨日午時歸天了因為你老人家不在這靈柩還停在此又遞過一張單來道鋪內一應什物家夥遺命送與你做遺念的金老兒接了單也不觀看只叫道難道真個死了我卻不信眾鄰舍問道金阿公你且說昨日怎的看見他來金老兒道昨日我出門雖早未出南門就遇了一個親戚苦留回去吃飯直弄到將晚方纔別得走到雲門山下已是午牌時分因見了幾種好草藥方在那裡收采撞見一個青衣童子捧個香爐前走我也不在其意不上六七十步便是你師父來不知何故左腳穿著鞋子右腳卻是赤的我問他到那裡去他說道我因雲門山上爛繩亭子裡有九位師父師兄專等我說話還有好幾日未得回來哩他又在袖裡取出一封書一個錦囊囊裡像是個如意一般遞與我教帶到州裡好好的送甚裴舍人不要誤了他事即今書與錦囊現在我處如何卻是死了便向袖中摸出來看眾門生起初疑心金老搗鬼還不肯信直待見了所寄東西方纔信道且莫論午時不午時只是我師父從不見出鋪門怎有這東西寄送豈不古怪眾鄰舍也道真也是希見的事他已死了如何又會寄東西卻又先曉得裴舍人來聘他便做道魂靈出現也沒恁般顯然一定是真仙了金老兒問道什麼裴舍人聘他眾鄰舍將朝廷差裴舍人徵聘州官知得已死著令結狀之事說出金老兒道原來如此如今他既有信物何必又要結狀我同你們去叩見州官轉達天使眾人依著金老兒說話一齊跟來金老兒持了書與錦囊直至州中將李清昨日遇見寄書的話稟知州官也道奇異即帶一乾人同去回覆天使那裴舍人正道此行沒趣連催州裡結狀就要起身只見州官引眾人捧著書禮稟是李清昨日午時轉托鄰佑金老兒送上天使的請自啟看裴舍人就教拆開書來卻是一通謝表表上說道陛下玉書金格已簡於九清矣真人降化保世安民但當法唐虞之無為守文景之儉約恭候運數之極便登蓬閬之庭何必木食草衣刳心滅智與區區山澤之流學習方術者哉無論臣初窺大道尚未證入仙班即張果仙尊羅公遠道友亦將告還方外皆不能久侍清朝而共佐至理者也昔秦始皇遠聘安期生於東海之上安期不赴因附使者回獻赤玉舄一雙臣雖不才敢忘答效謹以綠玉如意一枚聊布鄙忱願陛下鑒納裴舍人看罷不勝嘆異說道我聞神仙不死死者必屍解也何不啟他棺看若果系空的定為神仙無疑卻不我回朝去好復聖上連眾等亦解了無窮之惑合州官民皆以為然即便同赴鋪中將棺蓋打開看時棺中止有青竹杖一根鞋一隻竟不知昨日屍首在那裡去了倒是不開看也罷既是開看之後更加奇異但見一道青煙沖天而起連那一具棺木都飛向空中杳無蹤影唯聞得五樣香氣徧滿青州約莫三百里內外無不觸鼻裴舍人和合州官民盡皆望空禮拜少不得將謝表錦囊好好封裹送天使還朝去訖到得明年普天下疫癘大作只有青州但聞的這香氣的便不沾染方知李清死後為著故里猶留下這段功果至今雲門山上立祠春秋祭祀不絕詩云觀棋曾說爛柯亭今日雲門見爛繩塵世百年如旦暮癡人猶把利名爭
