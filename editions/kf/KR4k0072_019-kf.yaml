body:
  text: 第十九卷白玉娘忍苦成夫兩眼乾坤舊恨一腔今古閑愁隋宮吳苑舊風流寂寞斜陽渡口興到豪吟百首醉餘憑弔千秋神仙迂怪總虛浮只有綱常不朽這首西江月詞是勸人力行仁義扶植綱常從古以來富貴空花榮華泡影只有那忠臣孝子義夫節婦名傳萬古隨你負擔小人聞之起敬今日且說義夫節婦如宋弘不棄糟糠羅敷不從使君此一輩豈不是扶植綱常的又如王允欲娶高門預逐其婦買臣宦達太晚見棄於妻那一輩豈不是敗壞綱常的真個是人心不同涇渭各別有詩為證王允棄妻名遂損買臣離婦志甚悲夫妻本是鴛鴦鳥一對棲時一對飛話中單表宋末時一個丈夫姓程雙名萬里表字鵬舉本貫彭城人氏父親程文業官拜尚書萬里十六歲時椿萱俱喪十九歲以父蔭補國子生員生得人材魁岸志略非凡性好讀書兼習弓馬聞得元兵日盛深以為懮曾獻戰守和三策以直言觸忤時宰恐其治罪棄了童僕單身潛地走出京都卻又不敢回鄉欲往江陵府投奔京湖制置使馬光祖未到漢口傳說元將兀良哈歹統領精兵長驅而入勢如破竹程萬里聞得這個消息大吃一驚遂不敢前行躊躇之際天色已晚但見片片晚霞迎落日行行倦鳥盼歸巢程萬里想道且尋宿店打聽個實信再作區處其夜只聞得戶外行人奔走不絕卻都是上路逃難來的百姓哭哭啼啼耳不忍聞程萬里已知元兵迫近夜半便起身趁眾同走走到天明方纔省得忘記了包裹在客店中來路已遠卻又不好轉去取討身邊又沒盤纏腹中又餓不免到村落中告乞一飯又好掙扎路途約莫走半裡遠近忽然斜插裡一陣兵直衝出來程萬里見了飛向側邊一個林子裡躲避那枝兵不是別人乃是元朝元帥兀良哈歹部下萬戶張猛的游兵前鋒哨探見一個漢子面目雄壯又無包裹躲向樹林中而去料道必是個細作追入林中不管好歹一索捆翻解到張萬戶營中程萬里稱是避兵百姓並非細作張萬戶見他面貌雄壯留為家丁程萬里事出無奈只得跟隨每日間見元兵所過殘滅如秋風掃葉心中暗暗悲痛正是寧為太平犬莫作離亂人卻說張萬戶乃興元府人氏有千斤膂力武藝精通昔年在鄉里間豪橫守將知得他名頭收在部下為偏裨之職後來元兵犯境殺了守將叛歸元朝元主以其有獻城之功封為萬戶撥在兀良哈歹部下為前部響導屢立戰功今番從軍日久思想家裡寫下一封家書把那一路擄掠下金銀財寶裝做一車又將擄到人口男女分做兩處差帳前兩個將校押送回家可憐程萬里遠離鄉土隨著眾人一路啼啼哭哭直至興元府到了張萬戶家裡將校把家書金銀交割明白又令那些男女叩見了夫人那夫人做人賢慧就各撥一個房戶居住每日差事伏侍將校討了回書自向軍前回覆去了程萬里住在興元府不覺又經年餘那時宋元兩朝講和各自罷軍將士寧家張萬戶也回到家中與夫人相見過了閤家奴僕都來叩頭程萬里也只得隨班行禮又過數日張萬戶把擄來的男女揀身材雄壯的留了幾個其餘都轉賣與人張萬戶喚眾人來分付道你等不幸生於亂離時世遭此塗炭或有父母妻子料必死於亂軍之手就是汝等還喜得遇我所以尚在若逢著別個死去幾時了今在此地雖然是個異鄉既為主僕即如親人一般今晚各配妻子與你們可安心居住勿生異心後日帶到軍前尋些功績博個出身一般富貴若有他念犯出事來斷然不饒的家人都流淚叩頭道若得如此乃老爹再生之恩豈敢又生他念當晚張萬戶就把那擄來的婦女點了幾名夫人又各賞幾件衣服張萬戶與夫人同出堂前眾婦女跟隨在後堂中燈燭輝煌眾人都叉手侍立兩傍張萬戶一一喚來配合眾人一齊叩首謝恩各自領歸房戶且說程萬里配得一個女子引到房中掩上門兒夫妻敘禮程萬里仔細看那女子年紀到有十五六歲生得十分美麗不像個以下之人怎見得有西江月為證兩道眉彎新月一雙眼注微波青絲七尺挽盤螺粉臉吹彈得破望日嫦娥盼夜秋宵織女停梭畫堂花燭聽歡呼兀自含羞怯步程萬里得了一個美貌女子心中歡喜問道小娘子尊姓何名可是從幼在宅中長大的麼那女子見問沈吟未語早落下兩行珠淚程萬里把袖子與他拭了問道娘子為何掉淚那女子道奴家本是重慶人氏姓白小字玉娘父親白忠官為統制四川制置使餘調遣鎮守嘉定府不意餘制置身亡元將兀良哈歹乘虛來攻食盡兵疲力不能支破城之日父親被擒不屈而死兀良元帥怒我父守城抗拒將妾一門抄戮張萬戶憐妾幼小幸得免誅帶歸家中為婢伏侍夫人不意今日得配君子不知君乃何方人氏亦為所擄程萬里見說亦是羈囚觸動其心不覺也流下淚來把自己家鄉姓名被擄情由細細說與兩下淒慘一場卻已二鼓夫妻解衣就枕一夜恩情十分美滿明早起身梳洗過了雙雙叩謝張萬戶已畢玉娘原到裡邊去了程萬里感張萬戶之德一切乾辦公事加倍用心甚得其歡其夜是第三夜了程萬里獨坐房中猛然想起功名未遂流落異國身為下賤玷宗辱祖可不忠孝兩虛欲待乘間逃歸又無方便長嘆一聲潸潸淚下正在自悲自嘆之際卻好玉娘自內而出萬里慌忙拭淚相迎容顏慘淡餘涕尚存玉娘是個聰明女子見貌辨色當下挑燈共坐叩其不樂之故萬里是個把細的人倉卒之間豈明傾心吐膽自古道夫妻且說三分話未可全拋一片心當下強作笑容只答應得一句道沒有甚事玉娘情知他有含糊隱匿之情更不去問他直至掩戶息燈解衣就寢之後方纔低低啟齒款款開言道程郎妾有一言日欲奉勸未敢輕談適見郎君有不樂之色妾已猜其八九郎君何用相瞞萬里道程某並無他意娘子不必過疑玉娘道妾觀郎君纔品必非久在人後者何不覓便逃歸圖個顯祖揚宗卻甘心在此為人奴僕豈能得個出頭的日子程萬里見妻子說出恁般說話老大驚訝心中想道他是婦人女子怎麼有此丈夫見識道著我的心事況且尋常人家夫婦分別還要多少留戀不捨今成親三日恩愛方纔起頭豈有反勸我還鄉之理只怕還是張萬戶教他來試我便道豈有此理我為亂兵所執自分必死幸得主人釋放留為家丁又以妻子配我此恩天高地厚未曾報得豈可為此背恩忘義之事汝勿多言玉娘見說嘿然無語程萬里愈疑是張萬戶試他到明早起身程萬里思想張萬戶教他來試我我今日偏要當面說破固住了他的念頭不來提防好辦走路梳洗已過請出張萬戶到廳上坐下說道稟老爹夜來妻子忽勸小人逃走小人想來當初被游兵捉住蒙老爹救了性命留作家丁如今又配了妻子這般恩德未有寸報況且小人父母已死親戚又無只此便是家了還教小人逃到那裡去小人昨夜已把他埋怨一番恐怕他自己情虛反來造言累害小人故此特稟知老爹張萬戶聽了心中大怒即喚出玉娘罵道你這賤婢當初你父抗拒天兵兀良元帥要把你闔門盡斬我可憐你年紀幼小饒你性命又恐為亂軍所殺帶回來恩養長大配個丈夫你不思報效反教丈夫背我要你何用教左右快取家法來吊起賤婢打一百皮鞭那玉娘滿眼垂淚啞口無言眾人連忙去取索子家法將玉娘一索捆翻正是分明指與平川路反把忠言當惡言程萬里在旁邊見張萬戶發怒要吊打妻子心中懊悔道原來他是真心到是我害他了又不好過來討饒正在危急之際恰好夫人聞得丈夫發怒要打玉娘急走出來救護原來玉娘自到他家因德性溫柔舉止閑雅且是女工中第一伶俐夫人平昔極喜歡他的名雖為婢相待卻像親生一般立心要把他嫁個好丈夫因見程萬里人材出眾後來必定有些好日故此前晚就配與為妻今日見說要打他不知因甚緣故特地自己出來見家人正待要動手夫人止住上前道相公因甚要吊打玉娘張萬戶把程萬里所說之事告與夫人夫人叫過玉娘道我一向憐你幼小聰明特揀個好丈夫配你如何反教丈夫背主逃走本不當救你便是姑念初犯與老爹討饒下次再不可如此玉娘並不回言但是流淚夫人對張萬戶道相公玉娘年紀甚小不知世務一時言語差誤可看老身分上姑恕這次罷張萬戶道既夫人討饒且恕這賤婢倘若再犯二罪俱罰玉娘含淚叩謝而去張萬戶喚過程萬里道你做人忠心我自另眼看你程萬里滿口稱謝走到外邊心中又想道還是做下圈套來試我若不是怎麼這樣大怒要打一百夫人剛開口討饒便一下不打況夫人在裡面那裡曉得這般快就出來護救且喜昨夜不曾說別的言語還好到了晚間玉娘出來見他雖然面帶懮容卻沒有一毫怨恨意思程萬里想道一發是試我了說話越加謹慎又過了三日那晚玉娘看了丈夫上下只管相著欲言不言如此三四次終是忍耐不住又道妾以誠心告君如何反告主人幾遭棰撻幸得夫人救免然細觀君才貌必為大器為何還不早圖去計若戀戀於此終作人奴亦有何望程萬里見妻子又勸他逃走心中愈疑道前日恁般瞋責他豈不怕又來說起一定是張萬戶又教他來試我念頭果然決否也不回言徑自收拾而臥到明早程萬里又來稟知張萬戶張萬戶聽了暴躁如雷連喊道這賤婢如此可恨快拿來敲死了罷左右不敢怠緩即向裡邊來喚夫人見喚玉娘料道又有甚事不肯放將出來張萬戶見夫人不肯放玉娘出來轉加焦躁卻又礙著夫人面皮不好十分催逼暗想道這賤婢已有外心不如打發他去罷倘然夫妻日久恩深被這賤婢哄熱連這好人的心都要變了乃對程萬里道這賤婢兩次三番誘你逃歸其心必有他念料然不是為你久後必被其害待今晚出來明早就教人引去賣了別揀一個好的與你為妻程萬里見說要賣他妻子方纔明白渾家果是一片真心懊悔失言便道老爹如今警戒兩番下次諒必不敢總再說小人也斷然不聽若把他賣了只怕人說小人薄情做親纔六日就把妻子來賣張萬戶道我做了主誰敢說你道罷徑望裡邊而去夫人見丈夫進來怒氣未息恐還要責罰玉娘連忙教閃過一邊起身相迎並不問起這事張萬戶卻又怕夫人不捨得玉娘出去也分毫不提且說程萬里見張萬戶決意要賣心中不忍割捨坐在房中暗泣直到晚間玉娘出來對丈夫哭道妾以君為夫故誠心相告不想君反疑妾有異念數告主人主人性氣粗雄必然懷恨妾不知死所矣然妾死不足惜但君堂堂儀表甘為下賤不圖歸計為恨耳程萬里聽說淚如雨下道賢妻良言指迷自恨一時錯見疑主人使汝試我故此告知不想反累賢妻玉娘道君若肯聽妾言雖死無恨程萬里見妻子恁般情真又思明日就要分離愈加痛泣卻又不好對他說知含淚而寢直哭到四更時分玉娘見丈夫哭之不已料必有甚事故問道君如此悲慟定是主人有害妾之意何不明言程萬里料瞞不過方道自恨不才有負賢妻明日主人將欲鬻汝勢已不能挽回故此傷痛玉娘聞言悲泣不勝兩個攪做一團哽哽咽咽卻又不敢放聲天未明即便起身梳洗玉娘將所穿繡鞋一隻與丈夫換了一只舊履道後日倘有見期以此為證萬一永別妾抱此而死有如同穴說罷復相抱而泣各將鞋子收藏到了天明張萬戶坐在中堂教人來喚程萬里忍住眼淚一齊來見張萬戶道你這賤婢我自幼撫你成人有甚不好屢教丈夫背主本該一劍斬你便是且看夫人分上姑饒一死你且到好處受用去罷叫過兩個家人分付道引他到牙婆人家去不論身價但要尋一下等人家磨死不受人抬舉的賤婢便了玉娘要求見夫人拜別張萬戶不許玉娘向張萬戶拜了兩拜起來對著丈夫道聲保重含著眼淚同兩個家人去了程萬里腹中如割無可奈何送出大門而回正是世人萬般哀苦事無非死別與生離比及夫人知覺玉娘已自出門去了夫人曉得張萬戶情性誠恐他害了玉娘性命今日脫離虎口到也繇他且說兩個家人引玉娘到牙婆家恰好市上有個經紀人家要討一婢見玉娘生得端正身價又輕連忙兌出銀子交與張萬戶家人將玉娘領回家去不提且說程萬里自從妻子去後轉思轉悔每到晚間走進房門便覺慘傷取出那兩隻鞋兒在燈前把玩一回嗚嗚的啼泣一回哭勾多時方纔睡臥次後訪問得就賣在市上人家幾遍要悄地去再見一面又恐被人覷破報與張萬戶反壞了自己大事因此又不敢去那張萬戶見他不聽妻子言語信以為實諸事委託毫不提防程萬里假意殷勤愈加小心張萬戶好不喜歡又要把妻子配與程萬里不願道且慢著候隨老爺到邊上去有些功績回來尋個名門美眷也與老爺爭氣光陰迅速不覺又過年餘那時兀良哈歹在鄂州鎮守值五十誕辰張萬戶昔日是他麾下裨將收拾了許多金珠寶玉思量要差一個能幹的去賀壽未得其人程萬里打聽在肚裡思量趁此機會脫身去罷即來見張萬戶道聞得老爺要送兀良爺的壽禮尚未差人我想眾人都有掌管脫身不得小人總是在家沒有甚事到情願任這差使張萬戶道若得你去最好只怕路上不慣吃不得辛苦程萬里道正為在家自在慣了怕後日隨老爺出征受不得辛苦故此先要經歷些風霜勞碌好跟老爹上陣張萬戶見他說得有理並不疑慮就依允了寫下問候書札上壽禮帖又取出一張路引以防一路盤詰諸事停當擇日起身程萬里打疊行李把玉娘繡鞋都藏好了到臨期張萬戶把東西出來交付明白又差家人張進作伴同行又把十兩銀子與他盤纏程萬里見又有一人同去心中煩惱欲要再稟恐張萬戶疑惑且待臨時又作區處當下拜別張萬戶把東西裝上生口離了興元望鄂州而來一路自有館驛支討口糧並無擔擱不則一日到了鄂州借個飯店寓下來日清早二人賫了書札禮物到帥府衙門掛號伺候那兀良無帥是節鎮重臣故此各處差人來上壽的不計其數衙門前好不熱鬧三通畫角兀良元帥開門昇帳許多將官僚屬參見已過然後中軍官引各處差人進見呈上書札禮物兀良元帥一一看了把禮物查收分付在外伺候回書眾人答應出來不提且說程萬里送禮已過思量要走怎奈張進同行同臥難好脫身心中無計可施也是他時運已到天使其然那張進因在路上鞍馬勞倦卻又受了些風寒在飯店上生起病來程萬里心中歡喜正合我意欲要就走卻又思想道大丈夫作事須要來去明白原向帥府候了回書到寓所看張進時人事不省毫無知覺自己即便寫下一封書信一齊放入張進包裹中收好先前這十兩盤纏銀子張進便要分用程萬里要穩住張進的心卻總放在他包裹裡面等到鄂州一齊買人事送人今日張進病倒程萬里取了這十兩銀子連路引鋪陳打做一包收拾完備卻叫過主人家來分付道我二人乃興元張萬戶老爹特差與兀良爺上壽還要到山東史丞相處公乾不想同伴的路上辛苦身子有些不健如今行動不得若等他病好時恐怕誤了正事只得且留在此調養幾日我先往那裡公幹回來與他一齊起身即取出五錢銀子遞與道這薄禮權表微忱勞主人家用心看顧得他病體痊安我回時還有重謝主人家不知是計收了銀子道早晚伏侍不消牽掛但長官須要作速就來便好程萬里道這個自然又討些飯來吃飽背上包裹對主人家叫聲暫別大踏步而走正是鰲魚脫卻金鉤去擺尾搖頭再不來離了鄂州望著建康而來一路上有了路引不怕盤詰並無阻滯此時淮東地方已盡數屬了胡元萬里感傷不已一徑到宋朝地面取路直至臨安舊時在朝宰執都另換了一班人物訪得現任樞密副使周翰是父親的門生就館於其家正值度宗收錄先朝舊臣子孫全虧周翰提挈程萬里亦得補福建福清縣尉尋了個家人取名程惠擇日上任不在話下且說張進在飯店中病發數日方纔精神清楚眼前不見了程萬里問主人家道程長官怎麼不見主人家道程長官十日前說還要往山東史丞相處公幹因長官有恙他獨自去了轉來同長官回去張進大驚道何嘗又有山東公幹被這賊趁我有病逃了主人家驚問道長官一同來的他怎又逃去張進把當初擄他情由細說主人懊悔不迭張進恐怕連他衣服取去即忙教主人家打開包裹看時卻留下一封書信並兀良元帥回書一封路引盤纏盡皆取去其餘衣服一件不失張進道這賊狼子野心老爹恁般待他他卻一心戀著南邊怪道連妻子也不要又將息了數日方纔行走得動便去稟知兀良元帥另自打發盤纏路引一面行文挨獲程萬里那張進到店中算還了飯錢作別起身星夜趕回家參見張萬戶把兀良元帥回書呈上看過又將程萬里逃歸之事稟知張萬戶將他遺書拆開看時上寫道門下賤役程萬里奉書恩主老爺臺下萬里向蒙不殺之恩收為廝養委以腹心人非草木豈不知感但聞越鳥南棲狐死首丘萬里親戚墳墓俱在南朝早暮思想食不甘味意欲稟知恩相乞假歸省誠恐不許以此斗膽輒行在恩相幕從如雲豈少一走卒放某還鄉如放一鴿耳大恩未報刻刻於懷銜環結草生死不負張萬戶看罷頓足道我被這賊用計瞞過吃他逃了有日拿住教他碎屍萬段後來張萬戶貪婪太過被人參劾全家抄沒夫妻雙雙氣死此是後話不提且說程萬里自從到任以來日夜想念玉娘恩義不肯再娶但南北分爭無由訪覓時光迅速歲月如流不覺又是二十餘年程萬里因為官清正廉能已做到閩中安撫使之職那時宋朝氣數已盡被元世祖直搗江南如入無人之境逼得宋末帝奔入廣東崖山海島中駐蹕止有八閩全省未經兵火然亦彈丸之地料難抵敵行省官不忍百姓罹於塗炭商議將圖籍版輿上表亦歸元主元主將合省官俱加三級程萬里昇為陝西行省參知政事到任之後思想興元乃是所屬地方即遣家人程惠將了向日所贈繡鞋並自己這只鞋兒前來訪問妻子消息不提且說娶玉娘那人是市上開酒店的顧大郎家中頗有幾貫錢鈔夫妻兩口年紀將近四十並無男女渾家和氏每勸丈夫討個丫頭伏侍生育男女顧大郎初時恐怕淘氣心中不肯到是渾家叮囑牙婆尋覓聞得張萬戶家發出個女子一力攛掇討回家去渾家見玉娘人物美麗性格溫存心下歡喜就房中側邊打個鋪兒到晚間又準備些夜飯擺在房中玉娘暗解其意佯為不知坐在廚下和氏自家走來道夜飯已在房裡了你怎麼反坐在此玉娘道大娘自請婢子有在這裡和氏道我們是小戶人家不像大人家有許多規矩止要勤儉做人家平日只是姊妹相稱便了玉娘道婢子乃下賤之人倘有不到處得免瞋責足矣豈敢與大娘同列和氏道不要疑慮我不是那等嫉妒之輩就是娶你也到是我的意思只為官人中年無子故此勸他取個偏房若生得一男半女即如與我一般你不要害羞可來同坐吃杯合歡酒玉娘道婢子蒙大娘抬舉非不感激但生來命薄為夫所棄誓不再適倘必欲見辱有死而已和氏見說心中不悅道你既自願為婢只怕吃不得這樣苦哩玉娘道但憑大娘所命若不如意任憑責罰和氏道既如此可到房中伏侍玉娘隨至房中他夫妻對坐而飲玉娘在旁篩酒和氏故意難為他直飲至夜半顧大郎吃得大醉衣也不脫向床上睡了玉娘收拾過家火向廚中吃些夜飯自來鋪上和衣而睡明早起來和氏限他一日紡績玉娘頭也不抬不到晚都做完了交與和氏和氏暗暗稱奇又限他夜中趲趕多少玉娘也不推辭直紡到曉一連數日如此毫無厭倦之意顧大郎見他不肯向前日夜紡績只道渾家妒忌心中不樂又不好說得幾番背他渾家與玉娘調戲玉娘嚴聲厲色顧大郎懼怕渾家知得笑話不敢則聲過了數日忍耐不過一日對渾家道既承你的美意娶這婢子與我如何教他日夜紡績卻不容他近我和氏道非我之過只因他第一夜如此作喬恁般推阻為此我故意要難他轉來你如何反為好成歉顧大郎不信道你今夜不要他紡績教他早睡看是怎麼和氏道這有何難到晚間玉娘交過所限生活和氏道你一連做了這幾時今晚且將息一晚明日做罷玉娘也十數夜未睡覺道勞倦甚合其意吃過夜飯收拾已完到房中各自睡下玉娘是久困的人放倒頭便睡著了顧大郎悄悄的到他鋪上輕輕揭開被捱進身子把他身上一摸卻原來和衣而臥顧大郎即便與他解脫衣裳那衣帶都是死結如何扯拽得開顧大郎性急把他亂扯纔扯斷得一條帶子玉娘在睡夢中驚醒連忙跳起被顧大郎雙手抱住那裡肯放玉娘亂喊殺人顧大郎道既在我家喊也沒用不怕你不從我和氏在床假做睡著聲也不則玉娘摔脫不得心生一計道官人你若今夜辱了婢子明日即尋一條死路張萬戶夫人平昔極愛我的曉得我死了料然決不與你干休只怕那時破家蕩產連生命亦不能保悔之晚矣顧大郎見說果然害怕只得放手原走到自己床上睡了玉娘眼也不合直坐到曉和氏見他立志如此料不能強反認為義女玉娘方纔放心夜間只是和衣而臥日夜辛勤紡織約有一年玉娘估計積成布疋比身價已有二倍將來交與顧大郎夫婦求為尼姑和氏見他誠懇更不強留把他這些布疋盡施與為出家之費又備了些素禮夫婦二人同送到城南曇花庵出家玉娘本性聰明不勾三月把那些經典諷誦得爛熟只是心中記掛著丈夫不知可能勾脫身逃走將那兩隻鞋子做個囊兒盛了藏於貼肉老尼出庵去了就取出觀玩對著流淚次後央老尼打聽知得乘機走了心中歡喜早晚誦經祈保又感顧大郎夫婦恩德也在佛前保後來聞知張萬戶全家抄沒夫婦俱喪玉娘想念夫人幼年養育之恩大哭一場禮懺追薦詩云數載難忘養育恩看經禮懺薦夫人為人若肯存忠厚雖不關親也是親且說程惠奉了主人之命星夜趕至興元城中尋個客店寓下明日往市中訪到顧大郎家裡那時顧大郎夫婦年近七旬須鬢俱白店也收了在家持齋念佛人都稱他為顧道人程惠走至門前見老人家正在那裡掃地程惠上前作揖道太公借問一句說話顧老還了禮見不是本處鄉音便道客官可是要問路徑麼程惠道不是要問昔年張萬戶家出來的程娘子可在你家了顧老道客官你是那裡來的問他怎麼程惠道我是他的親戚幼年離亂時失散如今特來尋訪顧老道不要說起當初我因無子要娶他做個通房不想自到家來從不曾解衣而睡我幾番捉弄他他執意不從見伊立性貞烈不敢相犯到認做義女與老荊就如嫡親母子且是勤儉紡織有時直做到天明不上一年將做成布疋抵償身價要去出家我老夫妻不好強留就將這些布疋送與他出家費用又備些素禮送他到南城曇花庵為尼如今二十餘年了足跡不曾出那庵門我老夫婦到時常走去看看他也當做親人一般又聞得老尼說至今未嘗解衣寢臥不知他為甚緣故這幾時因老病不曾去看得客官既是你令親徑到那裡去會便了路也不甚遠見時到與老夫代言一聲程惠得了實信別了顧老問曇花庵一路而來不多時就到了看那庵也不甚大程惠走進了庵門轉過左邊便是三間佛堂見堂中坐著個尼姑誦經年紀雖是中年人物到還十分整齊程惠想道是了且不進去相問就在門檻上坐著袖中取出這兩隻鞋來細玩自言自語道這兩隻好鞋可惜不全那誦經的尼姑卻正是玉娘他一心對在經上忽聞得有人說話方纔抬起頭來見一人坐在門檻上手中玩弄兩隻鞋子看來與自己所藏無二那人卻又不是丈夫心中驚異連忙收掩經卷立起身向前問訊程惠把鞋放在檻上急忙還禮尼姑問道檀越借鞋履一觀程惠拾起遞與尼姑看了道檀越這鞋是那裡來的程惠道是主人差來尋訪一位娘子尼姑道你主人姓甚何處人氏程惠道主人姓程名萬里本貫彭城人氏今現任陝西參政尼姑聽說即向身邊囊中取出兩隻鞋來恰好正是兩對尼姑眼中流淚不止程惠見了倒身下拜道相公特差小人來尋訪主母適纔問了顧太公指引到此幸而得見尼姑道你相公如何得做這等大官程惠把歷官閩中並歸元昇任至此說了一遍又道相公分付如尋見主母即迎到任所相會望主母收拾行裝小人好去僱倩車輛尼姑道吾今生已不望鞋履複合今幸得全吾願畢矣豈別有他想你將此鞋歸見相公夫人為吾致意須做好官勿負朝廷勿虐民下我出家二十餘年無心塵世久矣此後不必掛念程惠道相公因念夫人之義誓不再娶夫人不必固辭尼姑不聽望裡邊自去程惠央老尼再三苦告終不肯出程惠不敢苦逼將了兩雙鞋履回至客店取了行李連夜回到陝西衙門見過主人將鞋履呈上細述顧老言語並玉娘認鞋不肯同來之事程參政聽了甚是傷感把鞋履收了即移文本省那省官與程參政昔年同在閩中為官有僚友之誼見了來文甚以為奇即行檄仰興元府官吏具禮迎請興元府官不敢怠慢準備衣服禮物香車細輦笙簫鼓樂又取兩個丫鬟伏侍同了僚屬親到曇花庵來禮請那時滿城人家盡皆曉得當做一件新聞扶老挈幼爭來觀看且說太守同僚屬到了庵前下馬約退從人徑進庵中老尼出來迎接太守與老尼說知來意要請程夫人上車老尼進去報知玉娘見太守與眾官來請料難推託只得出來相見太守道本省上司奉陝西程參政之命特著下官等具禮迎請夫人上車往陝西相會車輿已備望夫人易換袍服即便登輿教丫鬟將禮物服飾呈上玉娘不敢固辭教老尼收了謝過眾官即將一半禮物送與老尼為終老之資餘一半囑託地方官員將張萬戶夫妻以禮改葬報其養育之義又起七晝夜道場追薦白氏一門老小好事已畢丫鬟將袍服呈上玉娘更衣到佛前拜了四拜又與老尼作別出庵上車府縣官俱隨於後玉娘又分付還要到市中去拜別顧老夫妻路上鼓樂喧闐直到顧家門首下車顧老夫婦出來相迎慶喜玉娘到裡邊拜別又將禮物贈與顧老夫婦謝他昔年之恩老夫妻流淚收下送至門前不忍分別玉娘亦覺慘然含淚登車各官直送至十里長亭而別太守又委僚屬李克復率領步兵三百防護車輿一路經過地方官員知得都來迎送饋禮直至陝西省城那些文武僚屬準備金鼓旗幡離城十里迎接程參政也親自出城遠迎一路金鼓喧天笙簫振地百姓們都滿街結彩香花燈燭相迎直至衙門後堂私衙門口下車程參政分付僚屬明日相見把門掩上回至私衙夫妻相見拜了四雙八拜起來相抱而哭各把別後之事細說一遍說罷又哭然後奴僕都來叩見安排慶喜筵席直飲至二更方纔就寢可憐成親止得六日分離到有二十餘年此夜再合猶如一夢次日程參政陞堂僚屬俱來送禮慶賀程參政設席款待大吹大擂一連開宴三日各處屬下曉得都遣人稱賀自不必說且說白夫人治家有方上下欽服因自己年長料難生育廣置姬妾程參政連得二子自己直加銜平章封唐國公白氏封一品夫人二子亦為顯官後人有詩為證六日夫妻廿載別剛腸一樣堅如鐵分鞋今日再成雙留與千秋作話說
