body:
  text: 第十卷劉小官雌雄兄弟衣冠未必皆男子巾幗如何定婦人歷數古今多怪事高山為谷海生塵且說國朝成化年間山東有一男子姓桑名茂是個小家之子垂髻時生得紅白細嫩一日父母教他往村中一個親戚人家去中途遇了大雨閃在冷廟中躲避那廟中先有一老嫗也在內躲雨兩個做一堆兒坐地那雨越下越大了出頭不得老嫗看見桑茂標致將言語調他桑茂也略通些情竅只道老嫗要他幹事臨上交時原來老嫗腰間到有本錢把桑茂後庭弄將起來事畢雨還未止桑茂終是孩子家便問道你是婦道如何有那話兒老嫗道小官我實對你說莫要泄漏於他人我不是婦人原是個男子從小縛做小腳學那婦道妝扮習成低聲啞氣做一手好針線潛往他鄉假稱寡婦央人引進豪門巨室行教女眷們愛我手藝便留在家中出入房闈多與婦女同眠恣意行樂那婦女相處情厚整月留宿不放出門也有閨女貞娘不肯胡亂的我另有媚藥兒待他睡去用水噴在面上他便昏迷不醒任我行事及至醒來我已得手他自怕羞辱不敢聲張還要多贈金帛送我出門囑付我莫說我今年四十七歲了走得兩京九省到處嬌娘美婦同眠同臥隨身食用並無缺乏從不曾被人識破桑茂道這等快活好事不知我可學得麼老嫗道似小官恁般標致扮婦女極像樣了你若肯投我為師隨我一路去我就與你纏腳教導你做針線引你到人家去只說是我外甥女兒得便就有良遇我一發把媚藥方兒傳授與你包你一世受用不盡桑茂被他說得心癢就在冷廟中四拜投老嫗為師也不去訪親訪眷也不去問爹問娘等待雨止跟著老嫗便走那老嫗一路與桑茂同行宿出了山東境外就與桑茂三綹梳頭包裹中取出女衫換了腳頭纏緊套上一雙窄窄的尖頭鞋兒看來就像個女子改名鄭二姐後來年長到二十二歲上桑茂要辭了師父自去行動師父分付道你少年老成定有好人相遇只一件凡得意之處不可久住多則半月少則五日就要換湯免露形跡還一件做這道兒多見婦人少見男子切忌與男子相近交談若有男子人家預先設法躲避倘或被他看出破綻性命不保切記切記桑茂領教兩下分別後來桑茂自稱鄭二娘各處行游哄騙也走過一京四省所姦婦女不計其數到三十二歲上游到江西一個村鎮有個大戶人家女眷留住傳他針線那大戶家婦女最多桑茂迷戀不捨住了二十餘日不去大戶有個女婿姓趙是個納粟監生一日趙監生到岳母房中作揖偶然撞見了鄭二娘愛其俏麗囑咐妻子接他來家鄭二娘不知就裡欣然而往被趙監生邀入書房攔腰抱住定要求歡鄭二娘抵死不肯叫喊起來趙監生本是個粗人惹得性起不管三七二十一竟按倒在床上去解他褲襠鄭二娘擋抵不開被趙監生一手插進摸著那話兒方知是個男人女扮當下叫起家人一索捆翻解到官府用刑嚴訊招稱真姓真名及向來行奸之事污穢不堪府縣申報上司都道是從來未有之變具疏奏聞刑部以為人妖敗俗律所不載擬成凌遲重闢決不待時可憐桑茂假充了半世婦人討了若干便宜到頭來死於趙監生之手正是福善禍淫天有理律輕情重法無私方纔說的是男人妝女敗壞風化的如今說個女人妝男節孝兼全的來正本恰似薰蕕不共器堯桀好相形毫厘千里謬認取定盤星這話本也出在本朝宣德年間有一老者姓劉名德家住河西務鎮上這鎮在運河之旁離北京有二百里田地乃各省出入京都的要路舟楫聚泊如螞蟻一般車音馬跡日夜絡繹不絕上有居民數百餘家邊河為市好不富庶那劉德夫妻兩口年紀六十有餘並無弟兄子女自己有幾間房屋數十畝田地門首又開一個小酒店兒劉公平昔好善極肯周濟人的緩急凡來吃酒的偶然身邊銀錢缺少他也不十分計較或有人多把與他他便勾了自己價銀餘下的定然退還分毫不肯苟取有曉得的問道這人錯與你的落得將來受用如何反把來退還劉公說我身沒有子嗣多因前生不曾修得善果所以今世罰做無祀之鬼豈可又為恁樣欺心的事倘然命裡不該時錯得了一分到手或是變出些事端或是染患些疾病反用去幾錢卻不到折便宜不若退還了何等安逸因他做人公平一鎮的人無不敬服都稱為劉長者一日正值隆冬天氣朔風凜冽彤雲密佈降下一天大雪原來那雪能穿帷幕善度簾櫳乍飄數點俄驚柳絮飛揚狂舞一番錯認梨花亂墜聲從竹葉傳來香自梅枝遞至塞外征人穿凍甲山中隱士擁寒衾王孫綺席倒金尊美女紅爐添獸炭劉公因天氣寒冷暖起一壺熱酒夫妻兩個向火對飲吃了一回起身走到門首看雪只見遠遠一人背著包裹同個小廝迎風冒雪而來看看至近那人撲的一交跌在雪裡掙扎不起小廝便向前去攙扶年小力微兩個一拖反向下邊跌去都滾做一個肉餃兒抓了好一回方纔得起劉公擦摩老眼看時卻是六十來歲的老兒行纏絞腳八搭麻鞋身上衣服甚是襤褸這小廝到也生得清秀腳下穿一雙小布衤翁靴那老兒把身上雪片抖淨向小廝道兒風雪甚大身上寒冷行走不動這裡有酒在此且買一壺來蕩蕩寒再行便走入店來向一副座頭坐下把包裹放在桌上小廝坐於旁邊劉公去暖一壺熱酒切一盤牛肉兩碟小菜兩副杯箸做一盤兒托過來擺在桌上小廝捧過壺來斟上一杯雙手遞與父親然後篩與自己劉公見他年幼有些禮數便問道這位是令郎麼那老兒道正是小犬劉公道今年幾歲了答道乳名申兒十二歲了又問道客官尊姓是往哪裡去的恁般風雪中行走那老兒答道老漢方勇是京師龍虎衛軍士原籍山東濟寧今要回去取討軍莊盤纏不想下起雪來問主人家尊姓劉公道在下姓劉招牌上近河便是賤號又道濟寧離此尚遠如何不尋個腳力卻受這般辛苦答道老漢是個窮軍那裡僱得起腳力只得慢慢的捱去罷了劉公舉目看時只見他單把小菜下酒那盤牛肉全然不動問道長官父子想都是奉齋麼答道我們當軍的人吃什麼齋劉公道既不奉齋如何不吃些肉兒答道實不相瞞身邊盤纏短少吃小菜飯兒還恐走不到家若用了這大菜便去了幾日的口糧怎生得到家裡劉公見他說恁樣窮乏心中慘然便道這般大雪腹內得些酒肉還可擋得風寒你只管用我這裡不算賬罷了老軍道主人家休得取笑那有吃了東西不算賬之理劉公道不瞞長官說在下這裡比別家不同若過往客官偶然銀子缺少在下就肯奉承長官既沒有盤纏只算我請你罷了老軍見他當真便道多謝厚情只是無功受祿不當人子老漢轉來定當奉酬劉公道四海之內皆兄弟也這些小東西值得幾何怎說這奉酬的話老漢方纔舉箸劉公又盛過兩碗飯來道一發吃飽了好行路老軍道忒過分了父子二人正在飢餒之時拿起飯來狼餐虎咽盡情一飽這纔是救人須救急施人須當厄渴者易為飲飢者易為食當下吃完酒飯劉公又叫媽媽斟兩杯熱茶來吃了老軍便腰間取出銀子來還飯錢劉公連忙推住道剛纔說過是我請你的如何又要銀子恁樣時到像在下說法賣這肉了你且留下到前途去盤纏老軍便住了手千恩萬謝背上包裹作辭起身走出門外只見那雪越發大了對面看不出人兒被寒風一吹倒退了幾步小廝道爹這樣大雪如何行走老軍道便是沒奈何且捱到前途覓個宿店歇罷小廝眼中便流下淚來劉公心中不忍說道長官這般風寒大雪著甚要緊受此苦楚我家空房床鋪盡有何不就此安歇等天晴了走也未遲老軍道若得如此甚好只是打攪不當劉公道說那裡話誰人是頂著房子走的快些進來不要打濕了身上老軍引著小廝重新進門劉公領去一間房裡把包裹放下看床上時蓆子草薦都有劉公還恐怕他寒冷又取出些稻草來放在上面老軍打開包裹將出被窩鋪下此時天氣尚早准頓好了同小廝走出房去劉公已將店面關好同媽媽向火看見老軍出房便叫道方長官你若冷時有火在此烘一烘暖活也好老軍道好到好只是奶奶在那裡恐不穩便劉公道都是老人家了不妨得老漢方纔同小廝走過來坐於火邊那時比前又加識熟便稱起號來說近河怎麼只有老夫妻兩位想是令郎們另居麼劉公道不瞞你說老拙夫妻今年都癡長六十四歲從來不曾生育那裡得有兒子老軍道何不承繼一個伏侍你老年也好劉公答道我心裡初時也欲得如此因常見人家承繼來的不得他當家替力反惹悶氣不如沒有的到得清淨總要時急切不能有個中意的故此休了這念頭若得你令郎這樣一個卻便好了只是如何得能夠兩個閑話一回看看日晚老軍討了個燈火叫聲安置同兒子到客房中來安歇對兒子說兒今日天幸得遇這樣好人若沒有他時凍也要凍死了明日莫管天晴下雪早些走罷打攪他心上不安小廝道爹說得是父子上床安息不想老軍受了些風寒到下半夜火一般熱起來口內只是氣喘討湯水吃這小廝家夜晚間又在客店裡那處去取巴到天明起來開房門看時那劉公夫妻還未曾起身他又不敢驚動原把門兒掩上守在床前少頃聽得外面劉公咳嗽聲響便開門走將出來劉公一見便道小官兒如何起得恁早小廝道告公公得知不想爹爹昨夜忽然發起熱來口中不住吁喘要討口水吃故此起得早些劉公道噯呀想是他昨日受些寒了這冷水怎麼吃得待我燒些熱湯與你小廝道怎好又勞公公劉公便教媽媽燒起一大壺滾湯劉公送房裡小廝扶起來吃了兩碗老軍睜眼觀看見劉公在旁謝道難為你老人家怎生報答劉公走近前道休恁般說你且安心自在蓋熱了發出些汗來便好了小廝放倒下去劉公便扯被兒與蓋好見那被兒單薄說道可知道著了寒如何這被恁薄怎能發得汗出媽媽在門口聽見即去取出一條大絮被來道老官兒有被在此你與他蓋好了這般冷天氣不是當耍的小廝便來接去劉公與他蓋得停當方纔走出少頃梳洗過又走進來問可有汗麼小廝道我纔摸時並無一些汗氣劉公道若沒汗時這寒氣是感的重的了須請個太醫來用藥表他的汗出來方好不然這風寒怎麼勾發泄小廝道公公身伴無錢將何請醫服藥劉公道不消你費心有我在此小廝聽說即便叩頭道多蒙公公厚恩救我父親今生若不能補報死當為犬馬償恩劉公連忙扶起道快不要如此既在此安宿我便是親人了豈忍坐視你自去房中伏侍老漢與你迎醫其日雪止天霽街上的積雪被車馬踐踏盡為泥濘有一尺多深劉公穿了木屐出街頭望了一望復身進門小廝看劉公轉進來只道不去了噙著兩行珠淚方欲上前叩問只見劉公從後屋牽出個驢兒騎了出門而去小廝方纔放心且喜太醫住得還近不多時便到了那太醫也騎個驢兒家人背著藥箱隨在後面到門首下了劉公請進堂中吃過茶然後引至房裡此時老軍已是神思昏迷一毫人事不省太醫診了脈說道這是個雙感傷寒風邪已入於腠理傷寒書上有兩句歌云兩感傷寒不須治陰陽毒遍七朝期此乃不治之癥別個醫家便要說還可以救得學生是老實的不敢相欺這病下藥不得了小廝見說驚得淚如雨下拜倒在地上道先生可憐我父子是個異鄉之人怎生用貼藥救得性命決不忘恩太醫扶起道不是我作難其實病人已犯實教我也無奈劉公道先生常言道藥醫不死病佛度有緣人你且不要拘泥古法儘著自家意思大了膽醫去或者他命不該絕就好了也未可知萬一不好決無歸怨你之理先生道既是長老恁般說且用一貼藥看若吃了發得汗出便有可生之機速來報我再將藥與他吃若沒汗時這病就無救了不消來覆我教家人開了藥箱攝了一貼藥劑遞與劉公道用生薑為引快煮與他吃這也是萬分之一莫做指望劉公接了藥便去封出一百文錢遞與太醫道些少藥資權為利市太醫必不肯受而去劉公夫妻兩口親自把藥煎好將到房中與小廝相幫扶起吃了將被沒頭沒腦的蓋下小廝在旁守候劉公因此事忙亂一朝把店中生意都擔擱了連飯也沒工夫去煮直到午上方吃早膳劉公去喚小廝吃飯那小廝見父親病重心中慌急那裡要吃再三勸慰方吃了半碗看看到晚摸那老軍身上並無一些汗點那時連劉公也慌張起來又去請太醫時不肯來了准准到第七日嗚呼哀哉正是三寸氣在千般用一日無常萬事休可憐那小廝申兒哭倒在地劉公夫婦見他哭的悲切也涕淚交流扶起勸道方小官死者不可復生哭之無益你且將息自己身子小廝雙膝跪下哭告道兒不幸前年喪母未能入土故與父謀歸原籍求取些銀兩來殯葬不想逢此大雪路途艱楚得遇恩人賜以酒飯留宿在家以為萬千之幸誰料皇天不父忽驟病又蒙恩人延醫服藥日夜看視勝如骨肉只指望痊愈之日圖報大恩那知竟不能起有負盛意此間舉目無親囊乏錢鈔衣棺之類料不能辦欲求恩人借數尺之土把父骸掩蓋兒情願終身為奴僕以償大德不識恩人肯見允否說罷拜伏在地劉公扶起道小官人休慮這送終之事都在於我豈可把來藁葬小廝又哭拜道得求隙地埋骨已出望外豈敢復累恩人費心壞鈔此恩此德教兒將何補報劉公道這是我平昔的志願那望你的報償當下忙忙的取了銀子便去買辦衣衾棺木喚兩個土工來收拾入殮過了又備羹飯祭奠焚化紙錢那小廝悲慟自不必說就抬到屋後空地上埋葬好了又立一個碑額上寫龍虎衛軍士方勇之墓諸事停當小廝向劉公夫婦叩頭拜謝過了兩日劉公對小廝道我欲要教你回去訪問個親族來搬喪回鄉又恐怕你年紀幼小不認得路途你且暫住我家俟有識熟的在此經過托他帶回故鄉然後徐圖運柩回去不知你的意下何如小廝跪下泣告道兒受公公如此大恩地厚天高未曾報得豈敢言歸且恩人又無子嗣兒雖不才倘蒙不棄收充奴僕朝夕伏侍少效一點孝心萬一恩人百年之後亦堪為墳前拜掃之人那時到京取回先母遺骨同父骸葬於恩人墓道之側永守於此這便是兒之心願劉公夫婦大喜道若得你肯如此乃天賜與我為嗣豈有為奴僕之理今後當以父子相稱小廝道既蒙收留即今日就拜了爹媽便掇兩把椅兒居中放下請老夫婦坐了四雙八拜認為父子遂改姓為劉劉公又不忍沒其本姓就將方字為名喚做劉方自此日夜辛勤幫家過活奉侍劉公夫婦極其盡禮孝敬老夫婦也把他如親生一般看待有詩為證劉方非親是親劉德無子有子小廝事死事生老軍雖死不死時光似箭不覺劉方在劉公家裡已過了兩個年頭時值深秋大風大雨下了半月有餘那運河內的水暴漲有十來丈高下猶如白沸湯一般又緊又急往來的船隻壞了無數一日午後劉方在店中收拾只聽得人聲鼎沸他只道是什麼火發忙來觀看見岸上人捱擠不開都望著河中急走上前看時卻是上流頭一隻大客船被風打壞淌將下來船上之人飄溺已去大半餘下的抱桅攀舵呼號哀泣只叫救人那岸上看的人雖然有救撈之念只是風水利害誰肯從井救人眼盼盼看他一個個落水口中只好叫句可憐而已忽然一陣大風把那船吹近岸旁岸上人一齊喊聲好了頃刻挽撓鉤子二十多張一齊都下搭住那船救起十數多人各自分頭投店內有一個少年年紀不上二十身上被挽鉤摘傷幾處行走不動倒在地下氣息將絕尚緊緊抱住一隻竹箱不肯放捨劉方在旁睹景傷情觸動了自己往年冬間之事不覺流下淚來想道此人之苦正與我一般我當時若沒有劉公時父子屍骸不知歸於何處矣這人今日卻便沒人憐救了且回去與爹媽說知救其性命急急轉家把上項事報知劉公夫婦意欲扶他回家調養劉公道此是陰德美事為人正該如此劉媽媽道何不就同他來家劉方道未曾稟過爹媽怎敢擅便劉公道說那裡話我與你同去父子二人行至岸口只見眾人正圍著那少年觀看劉公分開眾人捱身而入叫道小官人你掙扎著我扶你到家去將息那少年睜眼看了一看點點頭兒劉公同劉方向前挽扶一個年幼力弱一個老年衰邁全不濟事旁邊轉過一個軒足乞刺的後生道老人家閃開待我來向前一抱輕輕的就扶了起來那後生在右劉公在左兩旁挾住膊便走少年雖然說話不出心下卻甚明白把嘴弩著竹箱劉方道這箱子待我與你馱去把來背在肩上在前開路眾人閃在兩邊讓他們前行隨後便都跟來看內中認得劉公的便道還是劉長者有些義氣這個異鄉落難之人在此這一回並沒有個慈悲的肯收留去偏他一曉的了便攙扶回家這樣人真個是世間少有只可惜無個兒子這也是天公沒分曉又有個道他雖沒有親兒如今承繼這劉方甚是孝順比嫡親的尤勝這也算是天報他了那不認得的見他老夫妻自來攙扶一個小廝與他馱了竹箱就認做那少年的親族以後見土人紛紛傳說方纔曉得無不贊嘆其義還有沒肚子的人稱量他那竹箱內有物無物財多財少此乃是人面相似人心不同不在話下且說劉公同那後生扶少年到家向一間客房裡放下劉公叫聲勞動後生自去劉方把竹箱就放在少年之旁劉媽媽連忙去取乾衣與他換下濕衣然後扶在鋪上原來落水人吃不得熱酒劉公曉得這道數教媽媽取釅酒略溫一下儘著少年痛飲就取劉方的臥被與他蓋了夜間就教劉方伴他同臥到次早劉公進房來探問那少年已覺健旺連忙掙扎起來要下床稱謝劉公急止住道莫要勞動調養身子要緊那少年便向枕上叩頭道小子乃垂死之人得蒙公公救拔實乃再生父母但不知公公尊姓劉公道老拙姓劉少年道原來與小子同姓劉公道官人那里人氏少年答道小子劉奇山東張秋人氏二年前隨父三考在京不幸遇了時疫數日之內父母俱喪無力扶柩還鄉只得將來火化指著竹箱道奉此骸骨歸葬不想又遭此大難自分必死天幸得遇恩人救我之命只是行李俱失一無所有將何報答大恩劉公道官人差矣不忍之心人皆有之救人一命勝造七級浮屠若說報答就是為利了豈是老漢的本意劉奇見說愈加感激將息了兩日便能起身向劉公夫婦叩頭泣謝那劉奇為人溫柔俊雅禮貌甚恭劉公夫婦十分愛他早晚好酒好食管待劉奇見如此殷勤心上好生不安欲要辭歸怎奈鉤傷之處潰爛成瘡步履不便身邊又無盤費不能行動只得暫且住下正是不戀故鄉生處好受恩深處便為家卻說劉方與劉奇年貌相仿情投契合各把生平患難細說二人因念出處相同遂結拜為兄弟友愛如嫡親一般一日劉奇對劉方道賢弟如此青年美質何不習些書史劉方道弟甚有此志只是無人教導劉奇道不瞞賢弟說我自幼攻書博通今古指望致身青雲不幸先人棄後無心於此賢弟肯讀書時尋些書本來待我指引便了劉方道若得如此乃弟之幸也連忙對劉公說知劉公見說是個飽學之士肯教劉方讀書分外歡喜即便去買許多書籍劉奇罄心指教那劉方穎悟過人一誦即解日裡在店中看管夜間挑燈而讀不過數月經書詞翰無不精通且說劉奇在劉公家中住有半年彼此相敬相愛勝如骨肉雖然依傍得所只是終日坐食心有不安此時瘡口久愈思想要回故土來對劉公道多蒙公公夫婦厚恩救活殘喘又攪擾半年大恩大德非口舌可謝今欲暫辭公公負先人骸骨歸葬服闋之後當圖報效劉公道此乃官人的孝心怎好阻當但不知幾時起行劉奇道今日告過公公明早就走劉公道既如此待我去覓個便船與你劉奇道水路風波險惡且乏盤纏還從陸路行罷劉公道陸路腳力之費數倍於舟且又勞碌劉奇道小子不用腳力只是步行劉公道你身子怯弱如何走得遠路劉奇道公公常言說得好有銀用銀無銀用力小子這樣窮人還怕得什麼辛苦劉公想了一想道這也易處便教媽媽整備酒餚與劉奇送行飲至中間劉公泣道老拙與官人萍水相逢敘首半年恩同骨肉實是不忍分離但官人送尊人入土乃人子大事故不好強留只是自今一別不知後日可能得再見否說罷欷不勝劉媽媽與劉方盡皆淚下劉奇也泣道小子此行實非得已俟服一滿即星夜馳來奉候幸勿過悲劉公道老拙夫婦年近七旬如風中之燭早暮難保恐君服滿來時在否不可知矣倘若不棄送尊人入土之後即來看我也是一番相知之情劉奇道既蒙分付敢不如命一宿晚景不提到了次早清晨劉媽媽又整頓酒飯與他吃了劉公取出一個包裹放在桌上又叫劉方在後邊牽出那小驢兒來對劉奇道此驢畜養已久老漢又無遠行少有用處你就乘他去罷省得路上僱倩這包裹內是一床被窩幾件粗布衣裳以防路上風寒又在袖中摸一包銀子交與道這三兩銀子將就盤纏亦可到得家了但事完之後即來走走萬勿爽信劉奇見了許多厚贈泣拜道小子受公公如此厚恩今生料不能報俟來世為犬馬以酬萬一劉公道何出此言當下將包裹竹箱都裝在生口身上作別起身劉公夫婦送出門首灑淚而別劉方不忍分捨又送十里之外方才分手正是萍水相逢骨肉情一朝分袂淚俱傾驪駒唱罷勞魂夢人在長亭共短亭且說劉奇一路夜住曉行飢餐渴飲不一日來到山東故鄉那知去年這場大風大雨黃河泛溢張秋村鎮盡皆漂溺人畜廬舍蕩盡無遺舉目遙望時幾十里田地絕無人煙劉奇無處投奔只得寄食旅店思想欲將骸骨埋葬於此卻又無處依棲何以營生須尋了個著落之處然後舉事遂往各市鎮鄉村訪問親舊一無所遇住了月餘這三兩銀子盤費將盡心下著忙若用完了這銀子就難行動了不如原往河西務去求恩人一搭空地埋了骨殖倚傍在彼處還是個長策算還店錢上了生口星夜趕來到了劉公門首下了生口看時只見劉方正在店中手裡拿著一本書兒在那裡觀看劉奇叫了一聲賢弟公公媽媽一向好麼劉方抬頭看時卻是劉奇把書撇下忙來接住生口牽入家中卸了行李作揖道爹媽日夜在此念兄來得正好一齊走入堂中劉公夫婦看見喜從天降便道官人想殺我也劉奇上前倒身下拜劉公還禮不迭見罷問道尊人之事想已畢了劉奇細細泣訴前因又道某故鄉已無處容身今復攜骸骨而來欲求一搭餘地葬埋就拜公公為父依傍於此朝夕奉侍不知尊意允否劉公道空地盡有任憑取擇但為父子恐不敢當劉奇道若公公不屑以某為子便是不允之意了便即請劉公夫婦上坐拜為父子將骸骨也葬於屋後地上自此兄弟二人並力同心勤苦經營家業漸漸興隆奉侍父母極盡人子之禮合鎮的人沒一個不欣羡劉公無子而有子皆是陰德之報時光迅速倏忽又經年餘父子正安居樂業不想劉公夫婦年紀老了筋力衰倦患起病來二子日夜伏侍夜不解帶求神罔效醫藥無功看看待盡二子心中十分悲切又恐傷了父母之心惟把言語安慰背地吞聲而泣劉公自知不起呼二子至床前分付道我夫妻老年孤孑自謂必作無祀之鬼不意天地憐念賜汝二人與我為嗣名雖義子情勝嫡血我死無遺恨矣但我去世之後汝二人務要同心經業共守此薄產我於九泉亦得瞑目二子哭拜受命又延兩日夫妻相繼而亡二子愴地呼天號淘痛哭恨不得以身代替置辦衣衾棺槨極其從厚又請僧人做九晝夜功果超薦入殮之後兄弟商議築起一個大墳要將三家父母合葬一處劉方遂至京中將母柩迎來擇了吉日以劉公夫婦葬於居中劉奇遷父母骸骨葬於左邊劉方父母葬於右邊三墳拱列如連珠相似那合鎮的人一來慕劉公向日忠厚之德二來敬他弟兄之孝盡來相送話休絮煩且說劉奇二人自從劉公亡後同眠同食情好愈篤把酒店收了開起一個布店來四方過往客商來買貨的見二人少年志誠物價公道傳播開去慕名來買者挨擠不開一二年間掙下一個老大家業比劉公時已多數倍討了兩房家人兩個小廝動用家火器皿甚是次第那鎮上有幾個富家見二子家業日裕少年未娶都央媒來與之議姻劉奇心上已是欲得只是劉方卻執意不願劉奇勸道賢弟今年一十有九我已二十有二正該及時求配以圖生育接續三家宗祀不知賢弟為何不願劉方答道我與兄方在壯年正好經營生理何暇去謀此事況我弟兄向來友愛何等安樂萬一娶了一個不好的反是一累不如不娶為上劉奇道不然常言說得好無婦不成家你我俱在店中支持了生意時裡面絕然無人照管況且交友漸廣設有個客人到來中饋無人主持成何體面此還是小事當初義父以我二人為子時指望子孫紹他宗祀世守此墳今若不娶必然湮絕豈不負其初念何顏見之泉下再三陳說劉方只把言支吾終不肯應承劉奇見兄弟不允自己又不好獨娶一日偶然到一相厚朋友欽大郎家中去探望兩個偶然言及姻事劉奇乃把劉方不肯之事細細說與又道不知捨弟是甚主意欽大郎笑道此事淺而易見他與兄共創家業況他是先到兄是後來不忿得兄先娶故此假意推託劉奇道舍弟乃仁義端直之士決無此意欽大郎道令弟少年英俊豈不曉得夫婦之樂恁般推阻兄若不信且教個人私下去見他先與之為媒包你一說就是劉奇被人言所惑將信將疑作別而回恰好路上遇見兩個媒婆正要到劉奇家說親所說的是本鎮開綢緞店崔三朝奉家敘起年庚正與劉方相合劉奇道這門親正對我家二官人只是他有些古怪人面前就害羞你只悄地去對他說若說得成時自當厚酬我且不歸去坐在巷口油店裡等你回話兩個媒婆應聲而去不一時回復劉奇道二官人果是古怪老媳婦恁般攛掇只是不允再說時他喉急起來好教媳婦們老大沒趣劉奇方纔信劉方不肯是個真心但不知什麼意故一日見梁上燕兒營巢劉奇遂題一詞於壁上以探劉方之意詞雲營巢燕雙雙雄朝暮銜泥辛苦同若不尋雌繼殼卵巢成畢竟巢還空劉方看見笑誦數次亦援筆和一首於後詞曰營巢燕雙雙飛天設雌雄事久期雌兮得雄願已足雄兮將雌胡不知劉奇見了此詞大驚道據這詞中之意吾弟乃是個女子了怪道他恁般嬌弱語音纖麗夜間睡臥不脫內衣連襪子也不肯去酷暑中還穿著兩層衣服原來他卻學木蘭所為雖然如此也還疑惑不敢去輕易發言又到欽大郎家中將詞念與他聽欽大郎道這詞意明白令弟確然不是男子了但與兄數年同榻難道看他不出劉奇敘起向來並未曾脫衣之事欽大郎道恁般一發是了如今兄當以實問之看他如何回答劉奇道我與他恩義甚重情如同胞安忍啟口欽大郎道他若果然是個女子與兄成配恩義兩全有何不可談論已久欽大郎將出酒餚款待兩人對酌竟不覺至晚劉奇回至家時已是黃昏時候劉方迎著見他已醉扶進房中問道兄從何處飲酒這時方歸劉奇答道偶在欽兄家小飲不覺話長坐久口中雖說細細把他祥視當初無心時全然不覺是女此時已是有心辨他真假越看越像個女子劉奇雖無邪念心上卻要見個明白又不好直言乃道今日見賢弟所和燕子詞甚佳非愚兄所能及但不知賢弟可能再和一首否劉方笑而不答取過紙筆來一揮就成詞曰營巢燕聲聲叫莫使青年空歲月可憐和氏璧無瑕何事楚君終不納劉奇接來看了便道原來賢弟果是女子劉方聞言羞得滿臉通紅未及答言劉奇又道你我情同骨肉何必避諱但不識賢弟昔年因甚如此妝束劉方道妾初因母喪隨父還鄉恐途中不便故為男扮後因父歿尚埋淺土未得與母同葬妾故不敢改形欲求一安身之地以厝先靈幸得義父遺此產業父母骸骨得以歸土妾是時意欲說明因思家事尚微恐兄獨力難成故復遲遲今見兄屢勸妾婚配故不得不自明耳劉奇道原來賢弟用此一段苦心成全大事況我與你同榻數年不露一毫棱角真乃節孝兼全女中丈夫可敬可羡但弟詞中已有俯就之意我亦決無他娶之理萍水相逢周旋數載昔為兄弟今為夫婦此豈人謀實繇天合倘蒙一諾便訂百年不知賢弟意下如何劉方道此事妾亦籌之熟矣三宗墳墓俱在於此妾若適他人父母三尺之土朝夕不便省視況義父義母看待你我猶如親生棄此而去亦難恝然兄若不棄陋質使妾得侍箕帚供奉三姓香火妾之願也但無媒私合於禮有虧惟兄裁酌而行免受傍人談議則全美矣劉奇道賢弟高見即當處分是晚兩人便分房而臥次早劉奇與欽大郎說了請他大娘為媒與劉方說合劉方已自換了女妝劉奇備辦衣飾擇了吉日先往三個墳墓上祭告過了然後花燭成親大排筵席廣請鄰里那時哄動了河西務一鎮無不稱為異事贊嘆劉家一門孝義貞烈劉奇成親之後夫婦相敬如賓掙起大大家事生下五男二女至今子孫蕃盛遂為巨族人皆稱為劉方三義村雲有詩為證無情骨肉成吳越有義天涯作至親三義村中傳美譽河西千載想奇人
