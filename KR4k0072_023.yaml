body:
  text: 第二十三卷金海陵縱欲亡身昨日流鶯今日蟬起來又是夕陽天六龍飛轡長相窘何忍乘危自著鞭這四句詩是唐朝司空圖所作他説流光迅速人壽無多何苦貪戀色欲自促其命看來這還是勸化平人的平人所有者不過一身一家就是好色貪淫還只心有餘而力不足若是貴為帝王富有四海何令不從何求不遂假如商惑妲己周愛褒姒漢嬖飛燕唐溺楊妃他所寵者止於一人尚且小則政亂民荒大則喪身亡國何況漁色不休貪淫無度不惜廉恥不論綱常若是安然無恙皇天福善禍淫之理也不可信了如今説這金海陵乃是大金國一朝聰明天子只為貪淫無道蔑禮敗倫坐了十三年寶位改了三個年號初次天德三年二次貞元也是三年末次正隆六年到正隆六年大舉侵宋被弒於瓜洲大定帝即位追廢為海陵王後人將史書所載廢帝海陵之事敷演出一段話文以為將來之戒正是後人請看前人樣莫使前人笑後人話説金廢帝海陵王初名迪古後改名亮字元功遼王宗乾第二子也為人善飾詐急多猜忌殘忍任數年十八以宗室子為奉國將軍赴梁王宗弼軍前任使梁王以為行軍萬戶遷驃騎上將軍未幾加龍虎衛上將軍纍遷尚書右丞留守汴京領行臺尚書省事後召入為丞相初熙宗以太祖嫡孫嗣位海陵念其父遼王本是長子己亦是太祖嫡孫合當有天下之分遂懷覬覦專務立威以壓伏人心後竟弒熙宗而篡其位心忌太宗諸子恐為後患欲除去之與祕書監蕭裕密謀裕傾險巧詐因構致太傅宗本秉德等反狀海陵殺宗本遣使殺秉德宗懿及太宗子孫七十餘人秦王宗翰子孫三十餘人宗本已死裕乃取宗本門客蕭玉教以具款反狀令作主名上變遍詔天下天下冤之蕭裕以誅宗本功為尚書右丞纍遷至平章政事專姿威福遂以謀逆賜死此是後話且説海陵初為丞相假意儉約妾媵不過三數人及踐大位侈心頓萌淫志蠱惑自徒單皇后而下有大氏蕭氏耶律氏俱以美色被寵凡平日曾與淫者悉召入內宮列之妃位又廣求美色不論同姓異姓名分尊卑及有夫無夫但心中所好百計求淫多有封為妃嬪者諸妃名號共有十二位昭儀至充媛九位婕妤美人才人三位殿直最下其他不可舉數大營宮殿以處妃嬪一木之費至二千萬牽一車之力至五百人宮殿之飾遍傅黃金而後絢以五采金屑飛空如落雪一殿之費以億萬計成而復毀務極華麗這俱不必題起且説昭妃阿裡虎姓蒲察氏駙馬都尉沒裡野女也生而妖嬈嬌媚嗜酒跌宕初末嫁時見其父沒裡野修合美女顫聲嬌金槍不倒丹硫磺箍如意帶等春藥不知其何所用乃竊以問侍婢阿喜留可道此名何物何所用而郎罷子急急治之阿喜留可道此春藥也男子與婦人交不能久戰者則用之以取樂阿裡虎問道何為交合阿喜留可道雞踏雄犬交戀即交合之狀也阿裡虎道交合有何妙處而人為之阿喜留可道初試之時亦覺難當試再試三便覺暢美阿裡虎聞其言哂笑不已情若有不禁者問道爾從何處得知如此阿喜留可笑道奴奴曾嘗此味來無何阿裡虎嫁於宗室子阿虎迭生女重節七歲阿虎迭伏誅阿裡虎不待閉喪攜重節再蘸宗室南家南家故善淫阿裡虎又以父所驗方修合春藥與南家晝夜宣淫重節熟睹其醜態阿裡虎恬不諱也久之南家髓竭而死南家父突葛速為南京元帥都監知阿裡虎淫蕩醜惡莫能禁止因南家死遂攜阿裡虎往南京幽閉一室中不令與人接見阿裡虎向聞海陵善嬲戲好美色恨天各一方不得與之接歡至是沈郁煩悶無以自解且知海陵亦在南京乃自圖其貌題詩於上詩曰阿裡虎阿裡虎夷光毛嬙非其伍一旦夫死來南京突葛爬灰真吃苦有人救我出牢籠脫卻從前從後苦題畢封緘固密拔頭上金簪一枝銀十兩賄屬監守閽人送於海陵海陵稔聞阿裡虎之美未之深信一見此圖不覺手舞足蹈羡慕不止於是託人達突葛速欲娶之突葛速不從海陵故意揚言突葛速有新臺之行欲突葛速避嫌而出之突葛速知海陵之意只不放出及篡位三日詔遣阿裡虎歸父母家以禮納之宮中阿裡虎益嗜酒喜淫海陵恨相見之晚數月後特封賢妃再封昭妃一日阿虎迭女重節來朝重節為海陵再從兄之女阿裡虎其生母也留宿宮中海陵猝至見重節年將及笄資色顧眄迥異諸女不覺情動思有以中之而虞阿裡虎之沮己乃高張燈燭令室中輝煌如晝自傅淫藥與阿裡虎及諸侍嬪裸逐而淫以動重節重節聞其嬉笑聲潛起以聽鑽穴隙窺之神癡心醉幾欲破戶趨前羞縮自止海陵嬲謔至四鼓方止諸嬪咸滅燭就寢寂然無聲獨重節咬指撫心倏起倏臥席不得暖只得和衣擁被長嘆歪眠忽聞阿裡虎床復有聲欲再起窺之頭岑岑不止倚枕聽之又聞有擊戶聲重節不應擊聲甚急重節問為誰海陵捏作侍嬪取燈聲以促其開重節強起拔去門拴海陵突入摟抱接脣重節欲脫身逃去海陵力挽就榻中以手探其股間則單裙無褲兩股滑膩如脂乃撫摩調弄重節情亦動乃以袖掩面任其作為不虞創之特甚爭奈海陵興發如狂陽巨如杵略加點破猩紅濺於裙幅重節於是時皺眉嚙齒嬌聲顫作幾不欲生再三求止遂輕輕款款若點水蜻蜓止止行行如貪花蜂蝶盤桓一夜謔浪千般置阿裡虎於不理者將及旬矣阿裡虎欲火高燒情煙陡發終日焦思竟忘重節之未出宮也命諸侍嬪偵察海陵之所在一侍嬪曰帝得新人撇卻舊人矣阿裡虎驚問道新人為誰幾時取入宮中嬪答道帝幸阿虎重節於昭華宮娘娘因何不知阿裡虎面皮紫紅怒髮如火捶胸跌腳詬詈重節侍嬪道娘娘與之爭鋒恐惹笑恥且帝性躁急禍且不測阿裡虎道彼父已死我身再醮恩義久絶我怕誰笑話我誓不與此淫種俱生帝亦奈我何哉侍嬪道重節少艾帝得之勝百斛明珠娘娘齒長矣自當甘拜下風何必發怒阿裡虎聞誚愈怒道帝初得我誓不相捨詎意來此淫種奪我口食乃促步至昭華宮見重節方理妝一嬪捧鳳叉於側遂向前批其頰罵道老漢不仁不顧情分貪圖淫樂固為可恨汝小小年紀又是我親生兒女也不顧廉恥便與老漢苟合豈是有人心的重節亦怒罵道老賤不知禮義不識羞恥明燭張燈與諸嬪裸裎奪漢求快於心我因來朝踏此淫網求生不得生求死不得死正怨你這老賤只圖利己不怕害人造下無邊惡孽如何反來打我兩下言語不讓一句扭做一團結做一塊衆多侍嬪從中勸釋阿裡虎忿忿歸宮重節大哭一場悶悶而坐頃之海陵來見重節面帶懮容兩頰淚痕猶濕便促膝近前偎其臉問道汝有恁事如此煩惱重節沈吟不答侍嬪説昭妃娘娘批貴人面頰辱罵陛下是以貴人失歡海陵聞之大怒道汝勿煩惱我當別有處分是日阿裡虎回宮益嗜酒無賴詆訾海陵不已海陵遣人責讓之阿裡虎恬無忌憚暗以衣服遺前夫南家之子海陵偵知之怒道身已歸我突葛速之情猶未斷也由是寵衰海陵制凡諸妃位皆以侍女服男子衣冠號假廝兒有勝哥者身體雄壯若男子給侍阿裡虎本位見阿裡虎懮愁抱病夜不成眠知其欲心熾也乃托宮豎市角先生一具以進阿裡虎使勝哥試之情若不足興更有餘嗣是與之同臥起日久不須臾離廚婢三娘者不知其詳密以告海陵道勝哥實是男子扮作女耳給侍昭妃非禮海陵曾幸勝哥知其非男子不以為嫌惟使人誡阿裡虎勿捶三娘阿裡虎怒三娘之泄其隱也榜殺之海陵聞昭妃閣有死者想道必三娘也若果爾吾必殺阿裡虎偵之果然是月為太子光英生月海陵私忌不行戮徒單後又率諸妃嬪為之哀求乃得免勝哥畏罪先仰藥而亡阿裡虎聞海陵將殺己又見勝哥先死亦絶粒不食日夕焚香吁天以冀脫死逾月阿裡虎已委頓不知所為海陵乃使人縊殺之併殺侍婢捶三娘者因此不復幸昭華宮出重節為民間妻後屢召幸出入昭妃位焉柔妃彌勒者耶律氏之女生有國色族中人無不奇之年十歲色益麗人益奇彌勒亦自謂異於衆人每每沽嬌誇詡其母與鄰母善時時迭為賓主鄰母之子哈密都盧年十二歲丰姿頗美間嘗與彌勒兒戲於房中互相嘲謔遂及於亂説話的那十二歲的孩兒和那十歲的女兒曉得甚麼做作只無過是頑耍而已怎麼就説個亂字看官們有所不知北方男女生得長大倜儻容易知事況且這些騷撻子幹事不瞞著兒女他們都看得慣熟了故此小小年紀便弄出事來光陰荏苒約摸有一年多光景一日也是合當敗露彌勒正在房中洗俗忘記上了門閂恰好哈密都盧闖進房來彌勒忙忙叫他回去説娘要來看添湯那哈密都盧見彌勒雪白身子在浴盆中有如玉柱一般歡喜得了不得偏要共盆洗浴彌勒苦不肯容正在拘執喧鬧其母突至哈密都盧乘間逸去母大怒將彌勒痛捶戒訓關防嚴密再不得與哈密都盧綢繆歡狎倏經天德二年彌勒年已逾笄海陵聞其美也使禮部侍郎迪輦阿不取之於汴京迪輦阿不者華言蕭拱也為彌勒女兄擇特懶之夫芳年美貌頗識風情一見彌勒心神搖動懼憚海陵強自沮遏不意彌勒久別哈密都盧欲火甚熱見迪輦阿不生得標致心裡便有幾分愛他只是船隻各居難於通情達意彌勒遂心生一計詐言鬼魅相侵夜中輒喊叫不止相從諸婢無可奈何只得請迪輦阿不同舟共濟果爾寂然從婢實不察其隱衷也於是眉目相調情興如火彼此俱不能遏遇晚便同席飲食謔浪無所不至所以不遽上手者迪輦阿不謂彌勒真處子恐點破其軀海陵見罪故耳一晚維舟傍岸大雨傾盆兩下正欲安眠忽聞歌聲聒耳迪輦阿不慮有穿窬坐而聽之乃岸上更夫倡和山歌歌雲雨落沈沈不見天八哥飛入畫堂前燕子無窠梁上宿阿姨相伴姐夫眠迪輦阿不聽見此歌嘆道作此歌者明是譏誚下官豈知下官並沒有這樣事情諺云羊肉不吃得空惹一身臊也嘆息未畢又聞得似有人行定睛一看只見彌勒踽踽涼涼緩步至床前矣迪輦阿不驚問貴人何所見而來彌勒道聞歌聲而來官人豈年高耳聾乎迪輦阿不道歌聲聒耳下官正無以自明貴人何不安寢彌勒道我不解歌欲求官人解一個明白迪輦阿不遂將歌詞四句逐一分析講解彌勒不覺面赤耳熱偎著迪輦阿不道山歌原來如此官人豈無意乎迪輦阿不跪於床前告道下官心非木石豈能無情但懼主上聞知取罪不小彌勒便摟抱他起來説道我和官人是至親瓜葛不比別人到主上跟前我自有道理支吾不必懼怕當下兩人興發如狂就在舟中成其雲雨但見蜂忙蝶戀弱態難支水滲露滋嬌聲細作一個原是慣熟風情一個也曾略嘗滋味慣熟風情的到此夜盡呈伎倆略嘗滋味的喜今番方稱情懷一個道大漢果勝似孩童一個道小姨又強如阿姊一個顧不得女身點破一個顧不得王命緊嚴鴛鴦雲雨百年情果然色膽天來大一路上朝歡暮樂荏苒耽延道出燕京迪輦阿不父蕭仲恭為燕京留守見彌勒面貌知非處女乃嘆道上必以疑殺珙矣卻不知珙之果有染也已而入宮彌勒自揣事必敗露惶悔無地見海陵來涕交頤下戰栗不敢迎海陵淫興大作遂列燭兩行命侍嬪脫其衣而淫之彌勒掩飾不來只得任其做作海陵見非處女大怒道迪輦阿不乃敢盜爾元紅可惱可恨呼宮豎捆綁彌勒審鞫其詳彌勒泣告道妾十三歲時為哈密都盧所淫以至於是與迪輦阿不實無干涉海陵叱問哈密都盧何在彌勒道死已久矣海陵道哈密都盧死時幾歲彌勒道方十六歲海陵怒道十六歲小孩童豈能巨創汝耶彌勒泣告道賤妾死罪實與迪輦阿不無乾海陵笑道我知道了是必哈密都盧取汝元紅迪輦阿不乘機入彀也彌勒頓首無言即日遣出宮致迪輦阿不於死彌勒出