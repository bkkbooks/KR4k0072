肯已惟上擇一人納之徒單貞道必須公等白之裕知不可止乃具奏遂納秉德弟裡妻高氏宗本子莎曾剌妻宗固子胡裡剌妻胡失來妻又納叔曹國王子宗敏妻阿懶於宮中貞元元年封為昭妃大臣奏宗敏屬近尊行不可乃令阿懶出宮而封高氏為修儀加其父高邪魯瓦輔國上將軍母完顏氏封密國夫人又宋王宗望女壽寧縣主什古梁王宗弼女靜樂縣主蒲剌及習手念宗雋女師姑兒皆海陵從姊妹也混同郡君莎裡古真及其妹餘都太傅宗本女也為海陵再從姊妹表兄張定安妻奈剌忽麗妃妹蒲魯胡只皆有夫惟什古喪夫海陵無所忌恥使高師姑內哥阿古等傳達言語皆與之私內中莎裡古真色最美而善淫高師姑對他説道上之好美色汝所知也汝之美主上能捨汝乎主上於汝為再從姊妹出閣之日服制無矣相遇猶路人然汝曷不入侍於上以博恩寵莎裡古真笑而從之入見海陵海陵幸之竭盡精力博得古真一笑次日以其夫撒速近侍局直宿海陵謂撒速道爾妻年少遇爾直宿不可令宿於家當令宿於妃位撒速默然不敢出一語每召古真入海陵必親伺候於廊下立久不至則坐於高師姑膝上以望之高師姑道陛下尊為天子嬪御滿前何勞苦如此海陵笑道我固以天子為易得耳此等期會乃可貴也莎裡古真一至則捧惜擁持無所不用其極惟恐古真之不悅己然古真在外頗姿淫佚恃寵笞決其夫亦不能制見官之尊貴人之有才者及美貌而饒於淫具者必招徠之與之交合不以為恥海陵聞之大怒道爾愛貴官有貴如天子者乎爾愛人才有才兼文武似我者乎爾愛娛樂有豐富偉岸過我者乎怒甚氣咽不能言莎裡古真恬不為意嘻嘻的道我只笑爾無能耳海陵又大怒遣之出宮後復思之屢召入焉其妹餘都牌印松古剌妻也海陵嘗私之謂之曰汝貌雖不揚而肌膚潔白可愛勝莎裡古真多矣餘都恚曰古真既有貌陛下何不易其肌膚作一全人海陵道我又不是閻羅天子安能取彼易此餘都道從今以後妾不敢復承幸御矣海陵慰之曰前言戲之耳汝毋以我言為實而生怨恚也進封壽陽縣主出入貴妃位又使內哥召什古出入昭妃位什古者將軍瓦剌哈迷妻也瓦剌哈迷豐軀偉乾長九尺有奇力能扛鼎氣可吞牛一夕常淫二三姬不則滿身抽徹難熬必提掇重物以泄其氣每與什古交合什古輒嬌顫逾時瞑目欲死後因瓦剌哈迷從征陳亡什古不耐寡居遂與門下少年相通恨不暢意少年乃覓淫藥傅之通宵不倦什古笑道今日差強人意後有知之者遂嘲少年為差強人以笑海陵聞什古之善嬲也遂使內哥傳語什古道你風流跌宕冠絶一時然沈溺下僚未見風流元帥豈不虛負此生主上陽尊九五傑出大僚爾何不獨當一隊分沾雨露以自快乎什古笑道主上雖逾雄諒不能敵瓦剌哈迷之半況且後宮森列何必召妾內哥道主上屬意爾久矣爾若不往恐上怒不測什古不得已乃入宮焉海陵乘其未至先於小殿位置琴阮其中什古來朝見禮畢海陵攜其手坐於膝上調琴撥阮以悅其心進封昭寧公主乃檢洞房春意一册戲道朕今宵與汝將此二十四勢次第試之什古笑道陛下即欲挑戰妾敢不為應兵海陵未盡其勢之半意欲少息什古抱持道陛下可謂善戰矣第恨具少弱耳海陵恧然道瓦刺哈迷之具何如什古道大異於是海陵不悅道汝齒長矣汝色衰矣朕不棄汝汝之大幸何得雲爾什古愧恨而罷翌日出宮潛以其狀對少年説道帝之交合果有傳授非空搏也少年不謹以其語泄之於人人笑謂少年道帝今作差強人矣奈剌忽者蒲只哈剌赤女也修美潔白見者無不嘖嘖及笄嫁於節度使張定安為妻定安為海陵表兄海陵未冠時常過定安家嬉戲即與奈剌忽同席接談謔笑竟日遂與之私無何張定安受熙宗命出使於宋海陵與奈剌忽通宵行樂遂如夫婦房中侍婢無得免者不料熙宗詔海陵赴梁王軍前聽用海陵只得辭別奈剌忽而去不復再見直至即位方才又召奈剌忽出入柔妃位女使闢懶有夫在外海陵欲幸之封以縣君召之入宮惡其有娠乃命人煎麝香湯躬自灌之且揉拉其腹闢懶欲全性命乃乞哀道苟得乳娩當不舉以侍陛下海陵道若待大産則汝陰寬衍不可用矣竟揉墮其胎越數日幸之闢懶惡路不淨海陵之陽濡染不潔顧視而笑作口號道禿禿光光一個瓜忽然紅水浸根芽今朝染作紅瓜出不怕瓜田不種他闢懶笑而答道淺淺平平一個溝鮎魚在內恣遨遊誰知水滿溝中淺變作紅魚不轉頭海陵道黑松林下水潺湲點點飛花落滿川魚銜桃浪遊春水沖破松林一片煙闢懶答道古寺門前一個僧袈裟紅映半邊身從今撇卻菩提路免得頻敲月下門海陵笑道爾可謂善於應對矣蒲察阿虎迭女義察海陵姊慶宜公主所生幼養於遼王宗乾府中及笄而嫁秉德之弟特裡秉德伏誅義察當連坐太后使梧桐請於海陵由是得免海陵遂白太后欲納之太后道是兒始生先帝親抱至吾家養之至於成人帝雖舅猶父也豈可為此非禮之事海陵屈於太后而止義察跌宕喜淫不安其室遂與完顏守誠有姦守城本名遏裡來芳年淑艾白皙過人更善交接義察絶愛之太后竊知其事乃以之嫁宗室安達海之子乙補剌乙補剌不勝其欲義察日與之反目海陵不知其故數使人諷乙補剌出之因而納之太后初不知也義察思念守誠愁眉不展每侍海陵強為笑樂轉背即詛詈不已偵者以告海陵海陵怒道朕乃不如完顏守誠耶遂撾殺守誠欲併殺義察又得太后求哀乃釋放出宮無何義察家奴告義察痛守誠之死日夜咒詛語涉不道海陵乃自臨問責義察道汝以守誠死詈我耶守誠不可得見矣朕欲令汝往見之遂殺義察而分其尸大宗正阿裡虎妻蒲速碗及元妃之妹也大有姿色而持身頗正因入見元妃留宿於宮中逮晚海陵強之同坐飲宴蒲速碗正色固拒退食於元妃之幕將周身衣服謹繫牢結坐而不臥以防海陵之辱己果然譙樓鼓急畫角聲摧銀缸半滅半明神思乍醒乍倦海陵突至強抱求歡蒲速碗再四不從海陵凌逼不已相持相拒將及更餘海陵乃以力制之怒髮如雷聲如吼虎喝教侍婢共挾持之盡斷其中外衣帶蒲速碗氣索力疲支橕不住叫不得撞天的冤屈只得緊閉著雙眼放開了兩手任憑著海陵百謔千嘲千抽萬迭就像喉嚨氣斷死了不得知的一般這海陵像心像意侮弄了許多時節見蒲速碗沒有一些兒情趣到也覺得沒意思興盡而去元妃問蒲速碗道妹妹你平昔的興在那裡去了今日做出這般模樣蒲速碗道姐姐你可是有人氣的古來那娥皇女英都是未出嫁的女子所以帝堯把他嫁得舜哥天子我是有丈夫的若和你合著個老公豈不惹人笑殺連姐姐也做人不成了元妃道事到其間連我也做不得主俗語説得好只好隨鄉入鄉那裡顧得人笑恥蒲速碗道姐姐你説得好話兒這話兒只當不説罷世上那有百世太平千年天子你倘或被人凌辱你心裡過去得否元妃慘沮不出一聲過了一夜次日早晨蒲速碗辭朝歸去再不入宮朝見雖是海陵假託別樣名目來宣召他他也只以疾辭道臣妾有死而已不能復見娘娘海陵亦付之無可奈何也張仲軻者幼名牛兒乃市井無賴小人慣説傳奇小説雜以俳優詼諧語為業其舌尖而且長伸出可以著鼻子海陵嘗引之左右以資戲笑及即位乃以為祕書郎使之入直宮中遇景生情乘機謔浪略無一些避忌海陵嘗與妃嬪雲雨必撤其帷帳使仲軻説淫穢語於其前以鼓其興或令之躬身曲背襯墊妃腰或令之調搽淫藥撫弄陽物又嘗使妃嬪裸列於左右海陵裸立於中間使仲軻以絨繩縛己陽物牽扯而走遇仲軻駐足之妃即率意嬲弄仲軻從後推送出入不敢稍緩故凡妃嬪之陰仲軻無不熟睹之者有一室女齠年樨齒貌美而捷於應對海陵喜之每每與他姬侍淫媾時輒指是女對仲軻説道此兒弱小不堪受大含弘朕姑待之不忍見其痛苦仲軻呼萬歲一日海陵晝醉隱幾而臥仲軻暫息於簷下此女恐海陵之寒提袍覆其肩海陵驚醒醉眼朦朧見是此女即摟抱於懷遂乘興幸之竟忘其質之弱年之小也此女果不能當涕泗交下海陵忙拔出其陽女陰中血流不止海陵憐惜之呼仲軻以舌其血仲軻但稱死罪不敢仰視海陵再三強仲軻之女羞縮自起而止海陵對仲軻道汝亦鬚眉男子非無陽者朝朝暮暮見朕與妃嬪嬲戲汝之陽亦崛強否汝可脫去下衣俾朕觀之仲軻道殿陛尊嚴宮闈謹肅臣何等人敢裸露醜形以取罪戾海陵道朕欲觀汝之陽物罪不在汝朕不汝責仲軻叩首求免海陵敕內豎盡褫其衣仲軻俯身蹲踞於地以雙手掩於胯前海陵又敕內豎以繩綁縛仲軻仰臥於凳上其陽直豎而起亦大而長僅有海陵三分之二諸妃嬪見者皆掩面而笑海陵道汝等莫笑此亦人道耳設使室女當之未必不作痛也妃嬪又笑久之見其痿縮不舉始釋其縛又嘗召侍臣聚於一殿各露其穢以相比並大者列為第一班賞以摧殘不用宮女一人給豫陽侯牙牌一面中者列為第二班賞以楮鈔百錠給豫陽伯牙牌一面不及二等者為最下不入選除正殿朝參奏事大宴賞依次敘爵外凡入宮直宿內殿賜飲即不論官爵崇卑悉照牙牌列成班次以為笑樂雖徒單貞亦不能免百人之中與海陵相伯仲者居其一父叔事海陵者居其二奴視海陵百不得一也時人為謠歌云朝廷做事忒興陽自做銓司開選場政事文章俱不用惟須腰下硬幫幫那歌謠直傳到海陵耳朵裡海陵也只當不得知一味頭只是作樂淫謔不要説起那宮中嬪御就是官庶婦人曾蒙幸者海陵也列在宮人數內雖有丈夫的皆分番出入聽其淫亂海陵還不足意欲把這些婦人隨意幸之限於更番不便乃盡遣其丈夫往下京去了恰把這些婦人都留在宮中每當行幸即令撤蔽去圍帳教坊司近前奏樂幸已方止再幸再奏一幸必及數婦徒以盡己之幸而諸婦皆不暢所欲人人嗟怨嘗幸室女必乘興狠觸不顧女之創痛有不遂其情者令妃嬪牽制其手足使不得動嘗與妃嬪同坐必自擲一物於地使近侍環視之他視者殺又誡宮中給使男子於妃嬪位舉首者剜其目出入不得獨行便旋須四人偕往所司執刀監護不由路者斬之日入後下階砌行者死告者賞錢百萬男女倉猝互相觸先聲言者賞三品官後言者死齊言者皆釋之有梁者本大宋家奴隨元妃入宮以閹豎事海陵性便佞善迎合人意海陵特見寵信言無不從嘗構求海上仙方遠覓興陽異物修合媚藥以奉海陵海陵試之頗有效驗益肆淫蠱中外嬪御婦女殆將萬人猶恨不得絶色以逞心意乃極言宋劉貴妃絶色傾國海陵道汝試言其容止道鬢發膩理姿質纖體欺皓雪之容光臉奪英華之濯艷顧影徘徊光彩溢目承迎盼睞舉止絶倫智算過人歌舞出衆海陵聞言大喜自此決南征之意將行命縣君高師姑預貯紫綃帳畫石床鷓鴣枕卻塵褥神絲繡被瑟瑟幕紋布巾帳輕疏而薄視之如無所礙雖屬隆冬而風不能入盛暑則清涼自至其色隱隱焉忽不知其帳也乃絞綃之類床文如錦繡石體甚輕郅支國所獻枕以七寶合為鷓鴣褥色殷鮮光軟無比雲是卻塵獸毛所為出自句驪國被繡三千鴛鴦仍間以奇花異葉上綴靈粟之珠如果粒五色輝煥其幕色如瑟瑟闊三丈長百尺輕明虛薄無以為比向空張之則疏朗之紋如碧絲之貫其珠雖大雨暴降不能濕漏雲以蛟人瑞香膏所傅故也紋布巾即手巾也潔白如雪光軟如綿試水不濡用之彌年不生垢膩乃得自鬼谷國者俟得劉貴妃時用之更帶九玉叉蠲忿犀如意玉龍綃衣龍髯紫拂叉刻九鸞皆九色其上有字白玉兒工巧妙麗殆非人制犀圓如彈丸帶之令人蠲忿怒玉類桃實上有七孔雲是通明之象衣重無一二兩傅之不盈一握拂色各如爛椹可長三尺削水晶為柄刻紅玉為環紐或風雨晦螟臨流沽灑則光彩動搖奮然如怒置於堂中則日無蠅蟲夜無蚊蚋拂之為聲則雞犬無不驚逸垂之池潭則鱗介之屬悉俯伏而至引水於空中則成瀑布燒燕肉熏之則焉若生雲霧雲得於洞庭湖中者俟得劉貴妃則以賜之海陵件件色色都打點端正不想探事人來報説劉貴妃已辭世矣海陵好不痛惜忙傳下號令説滅卻宋時把他死尸也抬來瞧一瞧完了心中一念這才是生前不結鴛鴦帶死後空勞李少君世宗時為濟南尹夫人烏林答氏玉質凝膚體輕氣馥綽約窈窕轉動照人海陵聞其美思有以通之而烏林答氏端方嚴愨無隙可乘一日傳旨召之世宗忿忿抗旨不使之去烏林答氏泣對世宗道妾之身王之身也一醮不再妾之志也寧肯為上所辱第妾不應召則無君王不承旨則不臣上坐是以殺王王更何辭以免我行當自勉不以纍王也世宗涕泣不忍分離烏林答氏毅然就道一路上淒其沮郁無以為情行至良鄉地方乃將周身衣服縫紉固密題詩一首於衣裙上遂自殺詩云世態翻如掌君心狠似狼凶狂圖快樂淫逆滅綱常我死身無辱夫存姓亦香敢勞傳旨客持血報君王烏林答氏既死使者以訃聞海陵偽為哀傷命歸其襯於世宗世宗發襯視之面色如生血凝喉吻撫尸痛悼以禮葬焉後世宗在位二十九年不復立後者以烏林答氏之死節也此是後話卻説海陵大舉南侵造戰船於江上毀民廬舍以為材煮死人膏以為油費財用如泥沙視人命如草菅既發兵南下群臣因萬民之嗟怨立曹國公烏祿為帝即位遼陽改名雍改元大定遙降海陵為王海陵聞之嘆道朕本欲削平江南然後改元大定今日之事豈非天乎因出素所書一著戎衣天下大定改元事以示群臣遂召諸將謀帥師北還至瓜洲浙西路都統制耶律元宜等謀弒之箭入帳中海陵以為宋兵追至及視箭曰此我兵也欲取弓還射忽又中一箭僕地延安少尹納合乾魯補先刃之手足猶動遂縊殺之妃嬪等數十人皆遇害後世宗數海陵過惡不當有王封土不當在諸王塋域乃降廢為海陵王復降為庶人改葬於西南四十里後人有詩嘆云世上誰人不愛色惟有海陵無止極未曾立馬向吳山大定改元空嘆息空嘆息空嘆息國破家亡回不得孤身客死倩人憐萬古傳名為逆賊
