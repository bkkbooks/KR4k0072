夫一婦天然成配心中好生委決不下回到家中渾家兀自在女兒房裡坐著看見丈夫到來慌忙搖手道不要則聲女兒才停了哭睡去了朱世遠夜來剔燈之時看見卓上一副柬帖無暇觀看其時取而觀之原來就是女壻所寫詩句後面又有一詩認得女兒之筆讀了一遍嘆口氣道真烈女也為父母者正當玉成其美豈可以非理強之遂將城隍廟簽詞説與渾家道福壽天成神明默定若私心更改皇天必不護況女孩兒吟詩自誓求死不求生我們如何看守得他多日倘然一個眼錯女兒死了時節空負不義之名反作一場笑話據吾所見不如把女兒嫁與陳家一來表得我們好情二來遂了女兒之意也省了我們乾紀不知媽媽心下如何柳氏被女兒嚇壞了心頭兀自突突的跳便答應道隨你作主我管不得這事朱世遠道此事還須央王三老講事有湊巧這裡朱世遠走出門恰好王三老在門首走過朱世遠就迎住了請到家中坐下將前後事情細細述了一遍如今欲把女兒嫁去專求三老一言王三老道老漢曾説過只管撮合不管撒開今日大郎所言是仗義之事老漢自當效勞朱世遠道小女兒見了小壻之詩曾和得一首情見乎詞若還彼處推託可將此詩送看王三老接了柬帖即便起身只為兩親家緊對門居住左腳跨出了朱家右腳就跨進了陳家甚是方便陳青聽得王三老到來只認是退親的話慌忙迎接問道三老今日光降一定朱親家處有言王三老道正是陳青道今番退親出於小兒情願親家那邊料無別説王三老道老漢今日此來不是退親到是要做親陳青道三老休要取笑王三老就將朱宅女兒如何尋死他爹媽如何心慌留女兒在家恐有不測情願送來伏侍小官人老漢想來此亦兩便之事令親家處脫了乾紀獲其美名你賢夫婦又得人幫助令郎早晚也有個著意之人照管豈不美哉陳青道雖承親家那邊美意還要問小兒心下允否王三老就將柬帖所和詩句呈於陳青道令媳和得有令郎之詩他十分烈性令郎若不允從必然送了他性命豈不可惜陳青道早晚便來回復當下陳青先與渾家張氏商議了一回道媳婦如此烈性必然賢孝得他來貼身看覷夫婦之間比爹娘更覺周備萬一度得個種時就是孩兒無命也絶不了我陳門後代我兩個做了主不怕孩兒不依當下雙雙兩口到書房中對兒子多壽説知此事多壽初時推卻及見了所和之詩頓口無言陳青已知兒子心肯回復了王三老擇卜吉日又送些衣飾之類那邊多福知是陳門來娶心安意肯至期笙簫鼓樂娶過門來街坊上聽説陳家癩子做親把做新聞傳説道癩蝦蟆也有吃天鵝肉的日子又有刻薄的間漢編成口號四句伯牛命短偏多壽嬌香女兒偏逐臭紅綾被裡合歡時粉花香與膿腥斗間話休題卻説朱氏自過門之後十分和順陳小官人全得他殷勤伏侍怎見得著意殷勤盡心伏侍熬湯煮藥果然味必親嘗早起夜眠真個衣不解帶身上東疼西癢時時撫摩衣裳血臭膿腥勤勤煎洗分明傅母育嬌兒只少開胸喂乳又似病姑逢孝婦每思割股烹羹雨雲休想歡娛歲月豈辭勞苦喚嬌妻有名無實憐美婦少樂多懮如此兩年公姑無不歡喜只是一件夫婦日間孝順無比夜裡各被各枕分頭而睡並無同衾共枕之事張氏欲得他兩個配合雌雄卻又不好開言忽一日進房見媳婦不在便道我兒你枕頭齷齪了我拿去與你拆洗又道被兒也齷齪了做一包兒卷了出去只留一床被一個枕頭在床明明要他夫婦二人共枕同衾生兒度種的意思誰知他夫婦二人肚裡各自有個主意陳小官人肚裡道自己十死九生之人不是個長久夫妻如何又去污損了人家一個閨女朱小娘子肚裡又道丈夫恁般病體血氣全枯怎經得女色相侵所以一向只是各被各枕分頭而睡是夜只有一床被一個枕卻都是朱小娘子的臥具每常朱小娘子伏侍丈夫先睡自己燈下還做針指直待公婆都睡了方才就寢當夜多壽與母親取討枕被張氏推道漿洗未乾胡亂同宿一夜罷朱氏將自己枕頭讓與丈夫安置多壽又怕污了妻子的被窩和衣而臥多福亦不解衣依舊兩頭各睡次日張氏曉得了反怪媳婦做格不去勾搭兒子幹事把一團美意看做不良之心捉雞罵狗言三語四影射的發作了一場朱氏是個聰明女子有何難解惟恐傷了丈夫之意只作不知暗暗偷淚陳小官人也理會得了幾分甚不過意如此又捱過了一個年頭當初十五歲上得病十六歲病凶十九歲上退親不允二十一歲上做親自從得病到今將近十載不生不死甚是悶人聞得江南新到一個算命的瞎子叫做靈先生甚肯直言央他推算一番以決死期遠近原來陳多壽自得病之後自嫌醜陋不甚出門今日特為算命整整衣冠走到靈先生鋪中來那先生排成八字推了五星運限便道這貴造是宅上何人先告過了若不見怪方敢直言陳小官人道但求據理直言不必忌諱先生道此造四歲行運四歲到十三童限不必説起十四歲至二十三此十年大忌該犯惡癥半死不生可曾見過麼陳小官人道見過了先生道前十年雖是個水缺還跳得過二十四到三十三這一運更不好船遇危波亡槳柁馬逢峭壁斷韁繩此乃夭折之命有好八字再算一個此命不足道也小官人聞言慘然無語忙把命金送與先生作別而行腹內尋思不覺淚下想著那先生算我前十年已自準了後十年運限更不好一定是難過我死不打緊可憐賢德娘子伏侍了我三年並無一宵之好如今又連纍他受苦怎的我今苟延性命與死無二便多活幾年沒甚好處不如早早死了出脫了娘子他也得趁少年美貌別尋頭路此時便萌了個自盡之念順路到生藥鋪上贖了些砒藏在身邊回到家中不提起算命之事至晚上床卻與朱氏敘話道我與你九歲上定親指望長大來夫唱婦隨生男育女把家當戶誰知得此惡疾醫治不痊惟恐擔擱了娘子終身兩番情願退親感承娘子美意不允拜堂成親雖有三年之外卻是有名無實並不敢污損了娘子玉體這也是陳某一點存天理處日後陳某死了娘子別選良緣也教你説得嘴響不纍你叫做二婚之婦朱氏道官人我與你結髮夫妻苦樂同受今日官人患病即是奴家命中所招同生同死有何理説別締良緣這話再也休題陳小官人道娘子烈性如此但你我相守終非長久之計你伏事我多年夫妻之情已自過分此恩料今生不能補報來生定有相會之日朱氏道官人怎説這傷心話兒夫妻之間説甚補報兩個你對我答足足的説了半夜方睡正是夫妻只説三分話未可全拋一片心次日陳小官人又與父母敘了許多説話這都是辦了個死字骨肉之情難割難捨的意思看看至晚陳小官人對朱氏説我要酒吃朱氏道你間常怕發癢不吃酒今日如何要吃陳小官人道我今日心上有些不爽快想酒你與我熱些燙一壺來朱氏為他夜來言語不祥心中雖然疑惑卻不想到那話兒當下問了婆婆討了一壺上好釅酒燙得滾熱取了一個小小杯兒兩碟小菜都放在卓上陳小官人道不用小杯就是茶甌吃一兩甌到也爽利朱氏取了茶甌守著要斟陳小官人道慢著待我自斟我不喜小菜有果子討些下酒把這句話遣開了朱氏揭開了壺蓋取出包內砒霜向壺中一傾忙斟而飲朱氏走了幾步放心不下回頭一看見丈夫手慌腳亂做張做智老大疑惑恐怕有些蹺蹊慌忙轉來已自呷了一碗又斟上第二碗朱氏見酒色不佳按住了甌子不容丈夫上口陳小官人道實對你説這酒內下了砒霜我主意要自盡免得纍你受苦如今已吃下一甌必然無救索性得我盡醉而死省得費了工夫説罷又奪了第二碗吃了朱氏道奴家有言在前與你同生同死既然官人服毒奴家義不獨生遂奪酒壺在手骨都都吃個罄盡此時陳小官人腹中作耗也顧不得渾家之事須臾之間兩個做一對兒跌倒時人有詩嘆此事云病中只道歡娛少死後方知情義深相愛相憐相殉死千金難買兩同心卻説張氏見兒子要吃酒妝了一碟巧糖自己送來在房門外便聽得服毒二字吃了一驚三步做兩步走只見兩口兒都倒在地下情知古怪著了個忙叫起屈來陳青走到見酒壺裡面還剩有砒霜平昔曉得一個單方凡服砒霜者將活羊殺了取生血灌之可活也是二人命中有救恰好左鄰是個賣羊的屠戶連忙喚他殺羊取血此時朱世遠夫妻都到了陳青夫婦自灌兒子朱世遠夫婦自灌女兒兩個虧得灌下羊血登時嘔吐方才蘇醒餘毒在腹中兀自皮膚迸裂流血不已調理月餘方才飲食如故有這等異事朱小娘子自不必説那陳小官人害了十年癩癥請了若干名醫用藥全無功效今日服了毒酒不意中正合了以毒攻毒這句醫書皮膚內迸出了許多惡血毒氣泄盡連癩瘡漸漸好了比及將息平安瘡痂脫盡依舊頭光面滑肌細膚榮走到人前連自己爹娘都認不得分明是脫皮換骨再投了一個人身此乃是個義夫節婦一片心腸感動天地所以毒而不毒死而不死因禍得福破泣為笑城隍廟籤詩所謂雲開終見日福壽自天成果有驗矣陳多壽夫婦俱往城隍廟燒香拜謝朱氏將所聘銀叉布施作供王三老聞知此事率了三鄰四捨提壺挈盒都來慶賀吃了好幾日喜酒陳多壽是年二十四歲重新讀書溫習經史到三十三歲登科三十四歲及第靈先生説他十年必死之運誰知一生好事偏在這幾年之中從來命之理微常人豈能參透言禍言福未可盡信也再説陳青和朱世遠從此親情愈高又下了幾年象棋壽並八十餘而終陳多壽官至僉憲朱氏多福恩愛無比生下一雙兒女盡老百年至今子孫繁盛這回書喚作生死夫妻詩曰從來美眷説朱陳一局棋枰締好姻只為二人多節義死生不解賴神明
