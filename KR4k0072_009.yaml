body:
  text: 第九卷陳多壽生死夫妻世事紛紛一局棋輸贏未定兩爭持須臾局罷棋收去畢竟誰贏誰是輸這四句詩是把棋局比著那世局世局千騰萬變轉盼皆空政如下棋的較勝爭強眼紅喉急分明似孫龐鬥智賭個你死我活又如劉項爭天下不到烏江不盡頭及至局散棋收付之一笑所以高人隱士往往寄興棋枰消間玩世其間吟詠不可勝述只有國朝曾棨狀元應制詩做得甚好詩曰兩君相敵立雙營坐運神機決死生十里封疆馳駿馬一川波浪動金兵虞姬歌舞悲垓下漢將旌旗逼楚城興盡計窮征戰罷松陰花影滿棋枰此詩雖好又有人駁他説虞姬漢將一聯是個套話第七句説興盡計窮意趣便蕭索了應制詩是進御的聖天子重瞳觀覽還該要有些氣象同時洪熙皇帝御製一篇詞意宏偉遠出尋常詩曰二國爭強各用兵擺成隊伍定輸贏馬行曲路當先道將守深營戒遠征乘險出車收散卒隔河飛炮下重城等間識得軍情事一著功成定太平今日為何説這下棋的話只為有兩個人家因這幾著棋子遂為莫逆之交結下兒女姻親後來變出花錦般一段説話正是夫妻不是今生定五百年前結下因話説江西分宜縣有兩個莊戶人家一個叫做陳青一個叫做朱世遠兩家東西街對面居住論起家事雖然不算大富長者靠祖上遺下些田業盡可溫飽有餘那陳青與朱世遠皆在四旬之外纍代鄰居志同道合都則本分為人不管間事不惹間非每日吃了酒飯出門相見只是一盤象棋消間遣日有時迭為賓主不過清茶寡飯不設酒肴以此為常那些三鄰四捨間時節也到兩家去看他下棋頑耍其中有個王三老壽有六旬之外少年時也自歡喜象棋下得頗高近年有個火癥生怕用心動火不與人對局了日常無事只以看棋為樂早晚不倦説起來下棋的最怕傍人觀看常言道傍觀者清當局者迷倘或傍觀的口嘴不緊遇煞著處溜出半句話來贏者反輸輸者反贏欲待發惡不為大事欲待不抱怨又忍氣不過所以古人説得好觀棋不語真君子把酒多言是小人可喜王三老偏有一德未曾分局時絶不多口到勝負已分卻分説那一著是先手所以贏那一著是後手所以輸朱陳二人到也喜他講論不以為怪一日朱世遠在陳青家下棋王三老亦在座吃了午飯重整棋枰方欲再下只見外面一個小學生踱將進來那學生怎生模樣面如傅粉脣若塗朱光著靛一般的青頭露著玉一樣的嫩手儀容清雅步履端詳卻疑天上仙童不信人間小子那學生正是陳青的兒子小名多壽抱了書包從外而入跨進坐啓不慌不忙將書包放下椅子之上先向王三老叫聲公公深深的作了個揖王三老欲待回禮陳青就坐上一把按住道你老人家不須多禮卻不怕折了那小廝一世之福王三老道説那裡話口中雖是恁般説被陳青按住只把臀兒略起了一起腰兒略曲了一曲也算受他半禮了那小學生又向朱世遠叫聲伯伯作揖下去朱世遠還禮時陳青卻是對坐隔了一張棋桌不便拖拽只得也作揖相陪小學生見過了二位尊客才到父親跟前唱喏立起身來稟道告爹爹明日是重陽節日先生放學回去了直過兩日才來分付孩兒回家不許頑耍限著書還要讀哩説罷在椅子上取了書包端端正正走進內室去了王三老和朱世遠見那小學生行步舒徐語音清亮且作揖次第甚有禮數口中誇獎不絶王三老便問令郎幾歲了陳青答應道是九歲王三老道想著昔年湯餅會時宛如昨日倏忽之間已是九年真個光陰似箭爭教我們不老又問朱世遠道老漢記得宅上令愛也是這年生的朱世遠道果然小女多福如今也是九歲了王三老道莫怪老漢多口你二人做了一世的棋友何不扳做兒女親家古時有個朱陳村一村中只有二姓世為婚姻如今你二人之姓適然相符應是天緣況且好男好女你知我見有何不美朱世遠已自看上了小學生不等陳青開口先答應道此事最好只怕陳兄不願若肯俯就小子再無別言陳青道既蒙朱兄不棄寒微小子是男家有何推託就煩三老作伐王三老道明日是個重陽日陽九不利後日大好個日子老夫便當登門今日一言為定出自二位本心老漢只圖吃幾杯見成喜酒不用謝媒陳青道我説個笑話你聽玉皇大帝要與人皇對親商量道兩親家都是皇帝也須得個皇帝為媒才好乃請灶君皇帝往下界去説親人皇見了灶君大驚道那做媒的怎的這般樣黑灶君道從來媒人那有白做的王三老和朱世遠都笑起來朱陳二人又下棋到晚方散只因一局輸贏子定了三生男女緣次日重陽節無話到初十日王三老換了一件新開折的色衣到朱家説親朱世遠已自與渾家柳氏説過誇獎女壻許多好處是日一諾無辭財禮並不計較他日嫁送稱家之有無各不責備便了王三老即將此言回復陳青陳青甚喜擇了個和合吉日下禮為定朱家將庚帖回來吃了一日喜酒從此親家相稱依先下棋來往時光迅速不覺過了六年陳多壽年一十五歲經書皆通指望他應試登科及第光耀門楣何期運限不佳忽然得了個惡癥叫做癩初時只道疥癬不以為意一年之後其疾大發形容改變弄得不像模樣了肉色焦枯皮毛皴裂渾身毒氣發成斑駁奇瘡遍體蟲鑽苦殺晨昏作癢任他凶疥癬只比三分不是大麻瘋居然一樣粉孩兒變作蝦蟆相少年郎活像老黿頭搔爬十指帶膿腥齷齪一身皆惡臭陳青單單生得這個兒子把做性命看成見他這個模樣如何不慌連象棋也沒心情下了求醫問卜燒香還願無所不為整整的亂了一年費過了若干錢鈔病勢不曾減得分毫老夫妻兩口愁悶自不必説朱世遠為著半子之情也一般著忙朝暮問安不離門限延捱過三年之外絶無個好消息朱世遠的渾家柳氏聞知女壻得個恁般的病癥在家裡哭哭啼啼抱怨丈夫道我女兒又不醃臭起來為甚忙忙的九歲上就許了人家如今卻怎麼好索性那癩嚇蟆死了也出脫了我女兒如今死不死活不活女孩兒年紀看看長成嫁又嫁他不得賴又賴他不得終不然看著那癩子守活孤孀不成這都是王三那老烏龜一力攛掇害了我女兒終身把王三老千烏龜萬烏龜的罵哭一番罵一番朱世遠原有怕婆之病憑他夾七夾八自罵自止並不敢開言一日柳氏偶然收拾櫥匱子看見了象棋盤和那棋子不覺勃然發怒又罵起丈夫來道你兩個老忘八只為這幾著象棋上説得著對了親賺了我女兒還要留這禍胎怎的一頭説一頭走到門前把那象棋子亂撒在街上棋盤也摜做幾片朱世遠是本分之人見渾家發性攔他不住洋洋的躲開去了女兒多福又怕羞不好來勸任他絮聒個不耐煩方才罷休自古道隔牆須有耳窗外豈無人柳氏鎮日在家中罵媒人罵老公陳青已自曉得些風聲將信未信到滿街撒了棋子是甚意故陳青心下了了與渾家張氏兩口兒商議道以己之心度人之心我自家晦氣兒子生了這惡疾眼見得不能痊可卻教人家把花枝般女兒伴這癩子做夫妻真是罪過料女兒也必然怨傷便強他進門終不和睦難指望孝順當初定這房親事都是好情原不曾費甚大財千好萬好總只一好有心好到底了休得為好成歉從長計較不如把媳婦庚帖送還他家任他別締良姻倘然皇天可憐我孩兒有病痊之日怕沒有老婆好歹與他定房親事如今害得人家夫婦反目哭哭啼啼絮絮聒聒我也於心何忍計議已定忙到王三老家來王三老正在門首同幾個老人家間坐白話見陳青到慌忙起身作揖問道令郎兩日尊恙好些麼陳青搖首道不濟正有句話要與三老講屈三老到寒舍一行王三老連忙隨著陳青到他家坐啓內分賓坐下獻茶之後三老便問大郎有何見教陳青將自己坐椅掇近三老四膝相湊吐露衷腸先敘了兒子病勢如何的利害次敘著朱親家夫妻如何的抱怨這句話王三老卻也聞知一二口中只得包慌只怕沒有此事陳青道小子豈敢亂言今日小子到也不怪敝親家只是自己心中不安情願將庚帖退還任從朱宅別選良姻此系兩家穩便並無勉強王三老道只怕使不得老漢只管撮合那有拍開之理足下異日翻悔之時老漢卻當不起陳青道此事已與拙荊再四商量過了更無翻悔就是當先行過須薄禮也不必見還王三老道既然庚帖返去原聘也必然還璧但吉人天相令郎尊恙終有好日還要三思而行陳青道就是小兒僥幸脫體也是水底撈針不知何日到手豈可擔擱人家閨女説罷袖中取出庚帖遞與王三老眼中不覺流下淚來王三老亦自慘然道既是大郎主意已定老漢只得奉命而行然雖如此料令親家是達禮之人必然不允陳青收淚而答道今回是陳某自己情願並非舍親家相逼若舍親家躊蹰之際全仗三老攛掇一聲説陳某中心計較不是虛情三老連聲道領命領命當下起身到於朱家朱世遠迎接講禮而坐未及開言朱世遠連聲喚茶這也有個緣故那柳氏終日在家中千烏龜萬烏龜指名罵媒人王三老雖然不聞朱世遠卻於心有愧只恐三老見怪所以殷勤喚茶誰知柳氏恨殺王三老做錯了媒任丈夫叫喚不肯將茶出來此乃婦人小見坐了一會王三老道有句不識進退的話特來與大郎商量先告過切莫見怪原來朱世遠也是行一裡中都稱他做朱大郎朱世遠道有話盡説你老人家有甚差錯豈有見怪之理王三老方才把陳青所言退親之事備細説了一遍此乃令親家主意老漢但傳言而已但憑大郎主張朱世遠終日被渾家聒絮得不耐煩也巴不能個一搠兩開只是自己不好啓齒得了王三老這句言語分明是朝廷新頒下一道赦書如何不喜當下便道雖然陳親家賢哲誠恐後來翻悔反添不美王三老道老漢都曾講過他主意已決不必懷疑宅上庚帖亦交付在此大郎請收過朱世遠道聘禮未還如何好收他的庚帖王三老道他説些須薄聘不須提起是老漢多口説道既然庚帖返去原聘必然返璧朱世遠道這是自然之理先曾受過他十二兩銀子分毫不敢短少還有銀叉二股小女收留容討出一併奉還這庚帖權收在你老人家處王三老道不妨事就是大郎收下老漢暫回明日來領取聘物卻到令親處回話説罷分別有詩為證月老繫繩今又解冰人傳語昔皆訛分宜好個王三老成也蕭何敗也何朱世遠隨即入內將王三老所言退親之事述與渾家知道柳氏喜不自勝自己私房銀子也搜括將出來把與丈夫湊足十二兩之數卻與女孩兒多福討那一對銀叉卻説那女兒雖然不讀詩書卻也天生志氣多時聽得母親三言兩語絮絮聒聒已自心慵意懶今日與他討取聘叉明知是退親之故並不答應一字徑走進臥房閉上門兒在裡面啼哭朱世遠終是男子之輩見貌辨色已知女孩兒心事對渾家道多福心下不樂想必為退親之故你須慢慢偎他不可造次萬一逼得他緊做出些沒下稍勾當悔之何及柳氏聽了丈夫言語真個去敲那女兒的房門低聲下氣的叫道我兒叉子肯不肯繇你何須使性你且開了房門有話時好好與做娘的講做娘的未必不依你那女兒初時不肯開門柳氏連叫了幾次只得拔了門閂叫聲開在這裡了自向兀子上氣忿忿的坐了柳氏另掇個兀子傍著女兒坐了説道我兒爹娘為將你許錯了對頭一向愁煩喜得男家願退許了一萬個利市求之不得那癩子終無好日可不誤了你終身之事如今把聘叉還了他家恩斷義絶似你恁般容貌怕沒有好人家來求你我兒休要執性快把叉兒出來還了他罷女兒全不做聲只是流淚柳氏偎了半晌看見女兒如此模樣又款款的説道我兒做爹娘的都只是為好替你計較你願與不願直直的與我説恁般自苦自知教爹娘如何過意女